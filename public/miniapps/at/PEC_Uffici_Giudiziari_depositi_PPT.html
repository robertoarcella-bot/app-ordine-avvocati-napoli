        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #004080;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #ffc107;
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        .search-container {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-container input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1.1em;
            min-width: 200px;
        }
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .result-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .result-card:hover {
            transform: translateY(-5px);
        }
        .result-card h3 {
            margin: 0 0 10px 0;
            color: #004080;
            font-size: 1.3em;
        }
        .result-card p {
            margin: 5px 0;
            font-size: 1.1em;
            word-wrap: break-word;
        }
        .pec-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .pec {
            color: #d9534f;
            font-weight: bold;
            word-break: break-all;
        }
        .copy-icon {
            cursor: pointer;
            width: 24px;
            height: 24px;
            fill: #004080;
            flex-shrink: 0;
        }
        .copy-icon:hover {
            fill: #0059b3;
        }
        .copy-icon.copied {
            fill: #28a745;
        }
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #333;
            color: white;
        }
    </style>
</head>

        function filterResults() {
            const searchUfficio = document.getElementById('searchUfficio').value.toLowerCase();
            const searchCitta = document.getElementById('searchCitta').value.toLowerCase();
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            const filteredData = data.filter(item => {
                const ufficioMatch = item.ufficio.toLowerCase().includes(searchUfficio);
                const cittaMatch = item.citta.toLowerCase().includes(searchCitta);
                return ufficioMatch && cittaMatch;
            });

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3>${item.ufficio}</h3>
                    <p><strong>Città:</strong> ${item.citta}</p>
                    <div class="pec-container">
                        <p class="pec"><strong>PEC:</strong> ${item.casella}</p>
                        <span onclick="copyToClipboard(this, '${item.casella}')" title="Copia PEC">
                            ${copyIconSVG}
                        </span>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function copyToClipboard(element, text) {
            navigator.clipboard.writeText(text).then(() => {
                element.innerHTML = copiedIconSVG;
                setTimeout(() => {
                    element.innerHTML = copyIconSVG;
                }, 2000);
            }).catch(err => {
                console.error("Errore nella copia: ", err);
            });
        }

        // Initial load
        window.onload = filterResults;
    </script>
