i cui alle lettere b) e h) del secondo comma dell'articolo 117, e disciplina inoltre forme di intesa e coordinamento nella materia della tutela dei beni culturali.\n Stato, Regioni, Citta' metropolitane, Province e Comuni favoriscono l'autonoma iniziativa dei cittadini, singoli e associati, per lo svolgimento di attivita' di interesse generale, sulla base del principio di sussidiarieta'.</p>","notesHtml":""},{"id":"art_119","numText":"Art. 119","group":"-","heading":"","contentHtml":"<p>I Comuni, le Province, le Citta' metropolitane e le Regioni hanno autonomia finanziaria di entrata e di spesa, nel rispetto dell'equilibrio dei relativi bilanci, e concorrono ad assicurare l'osservanza dei vincoli economici e finanziari derivanti dall'ordinamento dell'Unione europea. (19) \n I Comuni, le Province, le Citta' metropolitane e le Regioni hanno risorse autonome. Stabiliscono e applicano tributi ed entrate propri, in armonia con la Costituzione e secondo i principi di coordinamento della finanza pubblica e del sistema tributario. Dispongono di compartecipazioni al gettito di tributi erariali riferibile al loro territorio. \n La legge dello Stato istituisce un fondo perequativo, senza vincoli di destinazione, per i territori con minore capacita' fiscale per abitante. \n Le risorse derivanti dalle fonti di cui ai commi precedenti consentono ai Comuni, alle Province, alle Citta' metropolitane e alle Regioni di finanziare integralmente le funzioni pubbliche loro attribuite. \n Per promuovere lo sviluppo economico, la coesione e la solidarieta' sociale, per rimuovere gli squilibri economici e sociali, per favorire l'effettivo esercizio dei diritti della persona, o per provvedere a scopi diversi dal normale esercizio delle loro funzioni, lo Stato destina risorse aggiuntive ed effettua interventi speciali in favore di determinati Comuni, Province, Citta' metropolitane e Regioni. \n La Repubblica riconosce le peculiarita' delle Isole e promuove le misure necessarie a rimuovere gli svantaggi derivanti dall'insularita'. \n I Comuni, le Province, le Citta' metropolitane e le Regioni hanno un proprio patrimonio, attribuito secondo i principi generali determinati dalla legge dello Stato. Possono ricorrere all'indebitamento solo per finanziare spese di investimento, con la contestuale definizione di piani di ammortamento e a condizione che per il complesso degli enti di ciascuna Regione sia rispettato l'equilibrio di bilancio. E' esclusa ogni garanzia dello Stato sui prestiti dagli stessi contratti. (19)</p>","notesHtml":"<p>AGGIORNAMENTO (19)</p>\n<p>La L. costituzionale 20 aprile 2012, n. 1 ha disposto (con l'art. 6, comma 1) che le suddette modifiche si applicano a decorrere dall'esercizio finanziario relativo all'anno 2014.</p>"},{"id":"art_120","numText":"Art. 120","group":"-","heading":"","contentHtml":"<p>La Regione non puo' istituire dazi di importazione o esportazione o transito tra le Regioni, ne' adottare provvedimenti che ostacolino in qualsiasi modo la libera circolazione delle persone e delle cose tra le Regioni, ne' limitare l'esercizio del diritto al lavoro in qualunque parte del territorio nazionale.\n Il Governo puo' sostituirsi a organi delle Regioni, delle Citta' metropolitane, delle Province e dei Comuni nel caso di mancato rispetto di norme e trattati internazionali o della normativa comunitaria oppure di pericolo grave per l'incolumita' e la sicurezza pubblica, ovvero quando lo richiedono la tutela dell'unita' giuridica o dell'unita' economica e in particolare la tutela dei livelli essenziali delle prestazioni concernenti i diritti civili e sociali, prescindendo dai confini territoriali dei governi locali. La legge definisce le procedure atte a garantire che i poteri sostitutivi siano esercitati nel rispetto del principio di sussidiarieta' e del principio di leale collaborazione.</p>","notesHtml":""},{"id":"art_121","numText":"Art. 121","group":"-","heading":"","contentHtml":"<p>Sono organi della Regione: il Consiglio regionale, la Giunta e il suo presidente.\n Il Consiglio regionale esercita le potesta' legislative  . . .  attribuite alla Regione e le altre funzioni conferitegli dalla Costituzione e dalle leggi. Puo' fare proposte di legge alle Camere.\n La Giunta regionale e' l'organo esecutivo delle Regioni.\nIl Presidente della Giunta rappresenta la Regione; dirige la politica della Giunta e ne e' responsabile; promulga le leggi ed emana i regolamenti regionali; dirige le funzioni amministrative delegate dallo Stato alla Regione, conformandosi alle istruzioni del Governo della Repubblica.</p>","notesHtml":""},{"id":"art_122","numText":"Art. 122","group":"-","heading":"","contentHtml":"<p>Il sistema di elezione e i casi di ineleggibilita' e di incompatibilita' del Presidente e degli altri componenti della Giunta regionale nonche' dei consiglieri regionali sono disciplinati con legge della Regione nei limiti dei principi fondamentali stabiliti con legge della Repubblica, che stabilisce anche la durata degli organi elettivi.\n Nessuno puo' appartenere contemporaneamente a un Consiglio o a una Giunta regionale e ad una delle Camere del Parlamento, ad un altro Consiglio o ad altra Giunta regionale, ovvero al Parlamento europeo.\n Il Consiglio elegge tra i suoi componenti un Presidente e un ufficio di presidenza.\n I consiglieri regionali non possono essere chiamati a rispondere delle opinioni espresse e dei voti dati nell'esercizio delle loro funzioni.\n Il Presidente della Giunta regionale, salvo che lo statuto regionale disponga diversamente, e' eletto a suffragio universale e diretto. Il Presidente eletto nomina e revoca i componenti della Giunta.</p>","notesHtml":""},{"id":"art_123","numText":"Art. 123","group":"-","heading":"","contentHtml":"<p>Ciascuna Regione ha uno statuto che, in armonia con la Costituzione, ne determina la forma di governo e i principi fondamentali di organizzazione e funzionamento. Lo statuto regola l'esercizio del diritto di iniziativa e del referendum su leggi e provvedimenti amministrativi della Regione e la pubblicazione delle leggi e dei regolamenti regionali.\n Lo statuto e' approvato e modificato dal Consiglio regionale con legge approvata a maggioranza assoluta dei suoi componenti, con due deliberazioni successive adottate ad intervallo non minore di due mesi. Per tale legge non e' richiesta l'apposizione del visto da parte del Commissario del Governo. Il Governo della Repubblica puo' promuovere la questione di legittimita' costituzionale sugli statuti regionali dinanzi alla Corte costituzionale entro trenta giorni dalla loro pubblicazione.\n Lo statuto e' sottoposto a referendum popolare qualora entro tre mesi dalla sua pubblicazione ne faccia richiesta un cinquantesimo degli elettori della Regione o un quinto dei componenti il Consiglio regionale. Lo statuto sottoposto a referendum non e' promulgato se non e' approvato dalla maggioranza dei voti validi.\nIn ogni Regione, lo statuto disciplina il Consiglio delle autonomie locali, quale organo di consultazione fra la Regione e gli enti locali.</p>","notesHtml":""},{"id":"art_124","numText":"Art. 124","group":"-","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. COSTITUZIONALE 18 OTTOBRE 2001, N. 3</p>","notesHtml":""},{"id":"art_125","numText":"Art. 125","group":"-","heading":"","contentHtml":"<p>COMMA ABROGATO DALLA L. COSTITUZIONALE 18 OTTOBRE 2001, N. 3.\n Nella Regione sono istituiti organi di giustizia amministrativa di primo grado, secondo l'ordinamento stabilito da legge della Repubblica. Possono istituirsi sezioni con sede diversa dal capoluogo della Regione.</p>","notesHtml":""},{"id":"art_126","numText":"Art. 126","group":"-","heading":"","contentHtml":"<p>Con decreto motivato del Presidente della Repubblica sono disposti lo scioglimento del Consiglio regionale e la rimozione del Presidente della Giunta che abbiano compiuto atti contrari alla Costituzione o gravi violazioni di legge. Lo scioglimento e la rimozione possono altresi' essere disposti per ragioni di sicurezza nazionale. Il decreto e' adottato sentita una Commissione di deputati e senatori costituita, per le questioni regionali, nei modi stabiliti con legge della Repubblica.\n Il Consiglio regionale puo' esprimere la sfiducia nei confronti del Presidente della Giunta mediante mozione motivata, sottoscritta da almeno un quinto dei suoi componenti e approvata per appello nominale a maggioranza assoluta dei componenti. La mozione non puo' essere messa in discussione prima di tre giorni dalla presentazione.\n L'approvazione della mozione di sfiducia nei confronti del Presidente della Giunta eletto a suffragio universale e diretto, nonche' la rimozione, l'impedimento permanente, la morte o le dimissioni volontarie dello stesso comportano le dimissioni della Giunta e lo scioglimento del Consiglio. In ogni caso i medesimi effetti conseguono alle dimissioni contestuali della maggioranza dei componenti il Consiglio.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127","group":"-","heading":"","contentHtml":"<p>Il Governo, quando ritenga che una legge regionale ecceda la competenza della Regione, puo' promuovere la questione di legittimita' costituzionale dinanzi alla Corte costituzionale entro sessanta giorni dalla sua pubblicazione.\n La Regione, quando ritenga che una legge o un atto avente valore di legge dello Stato o di un'altra Regione leda la sua sfera di competenza, puo' promuovere la questione di legittimita' costituzionale dinanzi alla Corte costituzionale entro sessanta giorni dalla pubblicazione della legge o dell'atto avente valore di legge.</p>","notesHtml":""},{"id":"art_128","numText":"Art. 128","group":"-","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. COSTITUZIONALE 18 OTTOBRE 2001, N. 3</p>","notesHtml":""},{"id":"art_129","numText":"Art. 129","group":"-","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. COSTITUZIONALE 18 OTTOBRE 2001, N. 3</p>","notesHtml":""},{"id":"art_130","numText":"Art. 130","group":"-","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. COSTITUZIONALE 18 OTTOBRE 2001, N. 3</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131","group":"-","heading":"","contentHtml":"<p>Sono costituite le seguenti Regioni:\n\nPiemonte; Marche;\nValle d'Aosta; Lazio;\nLombardia; Abruzzi;\nTrentino-Alto Adige; Molise;\nVeneto; Campania;\nFriuli-Venezia Giulia; Puglia;\nLiguria; Basilicata;\nEmilia-Romagna; Calabria;\nToscana; Sicilia;\nUmbria; Sardegna.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132","group":"-","heading":"","contentHtml":"<p>Si puo' con legge costituzionale, sentiti i Consigli regionali, disporre la fusione di Regioni esistenti o la creazione di nuove Regioni con un minimo di un milione d'abitanti, quando ne facciano richiesta tanti Consigli comunali che rappresentino almeno un terzo delle popolazioni interessate, e la proposta sia approvata con referendum dalla maggioranza delle popolazioni stesse.\n Si puo', con l'approvazione della maggioranza delle popolazioni della Provincia o delle Province interessate e del Comune o dei Comuni interessati espressa mediante referendum e con legge della Repubblica, sentiti i Consigli regionali, consentire che Provincie e Comuni, che ne facciano richiesta, siano staccati da una Regione ed aggregati ad un'altra.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133","group":"-","heading":"","contentHtml":"<p>Il mutamento delle circoscrizioni provinciali e la istituzione di nuove Provincie nell'ambito d'una Regione sono stabiliti con leggi della Repubblica, su iniziative dei Comuni, sentita la stessa Regione.\n La Regione, sentite le popolazioni interessate, puo' con sue leggi istituire nel proprio territorio nuovi Comuni e modificare le loro circoscrizioni e denominazioni.</p>","notesHtml":""},{"id":"art_134","numText":"Art. 134","group":"-","heading":"","contentHtml":"<p>La Corte costituzionale giudica:\n sulle controversie relative alla legittimita' costituzionale delle leggi e degli atti, aventi forza di legge, dello Stato e delle Regioni;\n sui conflitti di attribuzione tra i poteri dello Stato e su quelli tra lo Stato e le Regioni, e tra le Regioni;\n sulle accuse promosse contro il Presidente della Repubblica  . . . , a norma della Costituzione.</p>","notesHtml":""},{"id":"art_135","numText":"Art. 135","group":"-","heading":"","contentHtml":"<p>La Corte costituzionale e' composta di quindici giudici nominati per un terzo dal Presidente della Repubblica, per un terzo dal Parlamento in seduta comune e per un terzo dalle supreme magistrature ordinaria ed amministrative.\n I giudici della Corte costituzionale sono scelti fra i magistrati anche a riposo delle giurisdizioni superiori ordinaria ed amministrative, i professori ordinari di universita' in materie giuridiche e gli avvocati dopo venti anni di esercizio.\n I giudici della Corte costituzionale sono nominati per nove anni, decorrenti per ciascuno di essi dal giorno del giuramento, e non possono essere nuovamente nominati.\n Alla scadenza del termine il giudice costituzionale cessa dalla carica e dall'esercizio delle funzioni.\n La Corte elegge tra i suoi componenti, secondo le norme stabilite dalla legge, il Presidente, che rimane in carica per un triennio, ed e' rieleggibile, fermi in ogni caso i termini di scadenza dall'ufficio di giudice.\n L'ufficio di giudice della Corte e' incompatibile con quello di membro del Parlamento, di un Consiglio regionale, con l'esercizio della professione di avvocato e con ogni carica ed ufficio indicati dalla legge.\n Nei giudizi d'accusa contro il Presidente della Repubblica \n . . .  intervengono, oltre i giudici ordinari della Corte, sedici membri tratti a sorte da un elenco di cittadini aventi i requisiti per l'eleggibilita' a senatore, che il Parlamento compila ogni nove anni mediante elezione con le stesse modalita' stabilite \nper la nomina dei giudici ordinari.</p>","notesHtml":""},{"id":"art_136","numText":"Art. 136","group":"-","heading":"","contentHtml":"<p>Quando la Corte dichiara l'illegittimita' costituzionale di una norma di legge o di atto avente forza di legge, la norma cessa di avere efficacia dal giorno successivo alla pubblicazione della decisione.\n La decisione della Corte e' pubblicata e comunicata alle Camere ed ai Consigli regionali interessati, affinche', ove lo ritengano necessario, provvedano nelle forme costituzionali.</p>","notesHtml":""},{"id":"art_137","numText":"Art. 137","group":"-","heading":"","contentHtml":"<p>Una legge costituzionale stabilisce le condizioni, le forme, i termini di proponibilita' dei giudizi di legittimita' costituzionale, e le garanzie d'indipendenza dei giudici della Corte.\n Con legge ordinaria sono stabilite le altre norme necessarie per la costituzione e il funzionamento della Corte.\n Contro le decisioni della Corte costituzionale non e' ammessa alcuna impugnazione.</p>","notesHtml":""},{"id":"art_138","numText":"Art. 138","group":"-","heading":"","contentHtml":"<p>Le leggi di revisione della Costituzione e le altre leggi costituzionali sono adottate da ciascuna Camera con due successive deliberazioni ad intervallo non minore di tre mesi, e sono approvate a maggioranza assoluta dei componenti di ciascuna Camera nella seconda votazione.\n Le leggi stesse sono sottoposte a referendum popolare quando, entro tre mesi dalla loro pubblicazione, ne facciano domanda un quinto dei membri di una Camera o cinquecentomila elettori o cinque Consigli regionali. La legge sottoposta a referendum non e' promulgata, se non e' approvata dalla maggioranza dei voti validi.\n Non si fa luogo a referendum se la legge e' stata approvata nella seconda votazione da ciascuna delle Camere a maggioranza di due terzi dei suoi componenti.</p>","notesHtml":""},{"id":"art_139","numText":"Art. 139","group":"-","heading":"","contentHtml":"<p>La forma repubblicana non puo' essere oggetto di revisione costituzionale.</p>","notesHtml":""}]
};</script>
<script>
(function() {
  'use strict';
  // DATA is injected per page

  var currentIdx = 0;
  var filteredIndices = CODE.articles.map(function(_, i) { return i; });

  function init() {
    // Pre-compute plain text for full-text search
    CODE.articles.forEach(function(art) {
      art._searchText = (art.numText + ' ' + (art.heading || '') + ' ' +
        (art.contentHtml || '').replace(/<[^>]+>/g, '')).toLowerCase();
    });
    renderToc();

    // Navigate to hash article if present, otherwise show first article
    var initHash = location.hash.replace('#', '');
    var initIdx = 0;
    if (initHash) {
      var found = CODE.articles.findIndex(function(a) { return a.id === initHash || a.numText === decodeURIComponent(initHash); });
      if (found >= 0) initIdx = found;
    }
    showArticle(initIdx);
    populateJump();

    // Workaround WebView Android: dopo il primo render dinamico il gesture
    // detector non si attiva finché l'utente non tocca un elemento focusabile.
    // Forziamo un piccolo "tickle" scroll + resize per svegliarlo.
    setTimeout(function() {
      window.scrollTo(0, 1); window.scrollTo(0, 0);
      window.dispatchEvent(new Event('resize'));
    }, 50);
    setTimeout(function() { window.scrollTo(0, 1); window.scrollTo(0, 0); }, 400);

    document.getElementById('search').addEventListener('input', onSearch);
    document.getElementById('prev-btn').addEventListener('click', function() { navigate(-1); });
    document.getElementById('next-btn').addEventListener('click', function() { navigate(1); });
    document.getElementById('hamburger').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    });
    window.addEventListener('hashchange', onHashChange);
  }

  function onHashChange() {
    var hash = location.hash.replace('#', '');
    if (!hash) return;
    var idx = CODE.articles.findIndex(function(a) { return a.id === hash || a.numText === decodeURIComponent(hash); });
    if (idx >= 0) showArticle(idx);
  }

  function renderToc() {
    var nav = document.getElementById('toc');
    var html = '';
    var lastGroup = null;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        html += '<div class="group-label">' + esc(art.group) + '</div>';
        lastGroup = art.group;
      }
      html += '<div class="art-link" data-idx="' + i + '" onclick="goTo(' + i + ')">' +
        '<span class="art-num">' + esc(art.numText) + '</span>' +
        '<span class="art-heading-mini">' + esc(art.heading || '') + '</span>' +
        '</div>';
    });
    nav.innerHTML = html;
  }

  function populateJump() {
    var sel = document.getElementById('article-jump');
    if (!sel) return;
    var html = '';
    var lastGroup = null;
    var inGroup = false;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        if (inGroup) html += '</optgroup>';
        var gLabel = art.group.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        html += '<optgroup label="' + gLabel + '">';
        lastGroup = art.group;
        inGroup = true;
      }
      var label = art.numText + (art.heading ? ' — ' + art.heading : '');
      if (label.length > 90) label = label.slice(0, 87) + '…';
      var safe = label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      html += '<option value="' + i + '">' + safe + '</option>';
    });
    if (inGroup) html += '</optgroup>';
    sel.innerHTML = html;
    sel.addEventListener('change', function() {
      var idx = parseInt(this.value, 10);
      if (!isNaN(idx)) showArticle(idx);
    });
  }

  function showArticle(idx) {
    if (idx < 0 || idx >= CODE.articles.length) return;
    currentIdx = idx;
    var art = CODE.articles[idx];

    // Sync dropdown jump
    var jumpSel = document.getElementById('article-jump');
    if (jumpSel) jumpSel.value = String(idx);

    // Update URL hash
    history.replaceState(null, '', '#' + encodeURIComponent(art.numText));

    // Update header title
    document.getElementById('header-article').textContent = art.numText + (art.heading ? ' – ' + art.heading : '');

    // Render article
    var notesSection = art.notesHtml
      ? '<div class="article-notes">' +
        '<button class="notes-toggle" onclick="toggleNotes(this)">Aggiornamenti e note</button>' +
        '<div class="notes-body"><div class="article-body">' + art.notesHtml + '</div></div>' +
        '</div>'
      : '';

    document.getElementById('article-view').innerHTML =
      '<div class="article-card">' +
        '<div class="article-badge">📖 ' + esc(CODE.shortTitle) + '</div>' +
        '<h1 class="article-num">' + esc(art.numText) + '</h1>' +
        (art.heading ? '<p class="article-heading">' + esc(art.heading) + '</p>' : '<div style="margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)"></div>') +
        '<div class="article-body">' + art.contentHtml + '</div>' +
        notesSection +
        '<div class="article-actions">' +
          '<button class="action-btn wa-btn" onclick="shareWhatsApp()" title="Invia su WhatsApp">' +
            '<span class="action-icon">📲</span> WhatsApp' +
          '</button>' +
          '<button class="action-btn" onclick="copyArticle()" title="Copia articolo">' +
            '<span class="action-icon">📋</span> Copia' +
          '</button>' +
        '</div>' +
      '</div>';

    // Update counter
    document.getElementById('article-counter').textContent = (idx + 1) + ' / ' + CODE.articles.length;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === CODE.articles.length - 1;

    // Highlight active in TOC
    document.querySelectorAll('.art-link').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.querySelector('.art-link[data-idx="' + idx + '"]');
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // Scroll main to top
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
  }

  window.goTo = function(idx) { showArticle(idx); closeSidebar(); };

  function navigate(dir) {
    var pos = filteredIndices.indexOf(currentIdx);
    if (pos === -1) pos = 0;
    var newPos = pos + dir;
    if (newPos >= 0 && newPos < filteredIndices.length) {
      showArticle(filteredIndices[newPos]);
    }
  }

  function onSearch(e) {
    var q = e.target.value.toLowerCase().trim();
    filteredIndices = [];
    document.querySelectorAll('.art-link').forEach(function(el) {
      var idx = parseInt(el.dataset.idx, 10);
      var art = CODE.articles[idx];
      var hidden = q && !art._searchText.includes(q);
      el.classList.toggle('hidden', hidden);
      if (!hidden) filteredIndices.push(idx);
    });
    if (!q) filteredIndices = CODE.articles.map(function(_, i) { return i; });
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
  window.toggleNotes = function(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  };

  function getArticleText(art, bold) {
    var body = (art.contentHtml || '').replace(/<\/p>\s*<p>/gi, '\n').replace(/<[^>]+>/g, '').replace(/[ \t]+/g, ' ').trim();
    var heading = art.numText;
    if (art.heading) heading += ' – ' + art.heading;
    if (bold) heading = '*' + heading + '*';
    return CODE.title + '\n' + heading + '\n' + body;
  }

  window.shareWhatsApp = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, true);
    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  };

  window.copyArticle = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, false);
    navigator.clipboard.writeText(text).then(function() {
      showToast('Articolo copiato negli appunti');
    }, function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Articolo copiato negli appunti');
    });
  };

  function showToast(msg) {
    var el = document.getElementById('copy-toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(function() { el.classList.remove('visible'); }, 2000);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
