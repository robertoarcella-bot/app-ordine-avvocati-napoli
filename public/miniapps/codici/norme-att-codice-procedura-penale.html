orni dalla ricezione della raccomandata. Decorso tale termine e assunte se del caso informazioni, il comitato delibera a norma dell'articolo 68 comma 3.</p>","notesHtml":""},{"id":"art_72","numText":"Art. 72","group":"Norme","heading":"Reclamo avverso le decisioni del comitato","contentHtml":"<p>1. Entro quindici giorni dalla notificazione, contro le decisioni del comitato puo' essere proposto reclamo sul quale decide una commissione composta dal presidente della corte di appello nel cui distretto ha sede il comitato, dal procuratore generale della Repubblica presso la corte medesima, dal presidente del consiglio dell'ordine forense, dal presidente dell'ordine o del collegio professionale cui l'interessato appartiene ovvero da loro delegati. \n 2. Della commissione non possono far parte persone che abbiano partecipato alla decisione oggetto del reclamo. \n 3. La commissione decide entro trenta giorni dalla ricezione degli atti.</p>","notesHtml":""},{"id":"art_72","numText":"Art. 72-bis","group":"Norme","heading":"Prelievo di campioni biologici e accertamenti medici su minori e su persone incapaci o interdette","contentHtml":"<p>1. Nei casi previsti dagli articoli 224-bis e 359-bis del codice, se la persona da sottoporre a prelievo di campioni biologici o ad accertamenti medici e' minore, incapace ovvero interdetta per infermita' di mente, il consenso e' prestato dal genitore o dal tutore, i quali possono presenziare alle operazioni. \n 2. Ai fini di cui al comma 1, se il genitore o il tutore mancano o non sono reperibili, ovvero si trovano in conflitto di interessi con la persona da sottoporre a prelievo di campioni biologici o ad accertamenti medici, il consenso e' prestato da un curatore speciale nominato dal giudice, il quale puo' presenziare alle operazioni. \n 3. Si osservano, in quanto applicabili, le disposizioni di cui agli articoli 224-bis e 359-bis del codice.</p>","notesHtml":""},{"id":"art_72","numText":"Art. 72-ter","group":"Norme","heading":"Redazione del verbale delle operazioni","contentHtml":"<p>1. Nel verbale relativo alle operazioni di prelievo di campioni biologici o all'effettuazione di accertamenti medici e' fatta espressa menzione del consenso eventualmente prestato dalla persona sottoposta ad esame.</p>","notesHtml":""},{"id":"art_72","numText":"Art. 72-quater","group":"Norme","heading":"Distruzione dei campioni biologici","contentHtml":"<p>1. All'esito della perizia su campioni biologici, ai sensi dell'articolo 224-bis del codice, il giudice dispone l'immediata distruzione del campione prelevato, salvo che non ritenga la conservazione assolutamente indispensabile. La distruzione e' effettuata a cura del perito il quale ha proceduto alla relativa analisi, che ne redige verbale da allegare agli atti. \n 2. Dopo la definizione del procedimento con decreto di archiviazione o dopo che e' stata pronunciata sentenza non piu' soggetta ad impugnazione, la cancelleria procede, in ogni caso e senza ritardo, alla distruzione dei campioni biologici prelevati ai sensi degli articoli 224-bis e 359-bis del codice.</p>","notesHtml":""},{"id":"art_73","numText":"Art. 73","group":"Norme","heading":"Consulente tecnico del pubblico ministero","contentHtml":"<p>1. Il pubblico ministero nomina il consulente tecnico scegliendo di regola una persona iscritta negli albi dei periti. Per la liquidazione del compenso al consulente tecnico si osservano le disposizioni previste per il perito.</p>","notesHtml":""},{"id":"art_74","numText":"Art. 74","group":"Norme","heading":"Consulenza o","contentHtml":"<p>Perizia nummaria) \n 1. Nei procedimenti per la falsificazione di biglietti di banca o di monete metalliche e' nominato consulente o perito rispettivamente un tecnico della direzione generale della Banca d'Italia o un tecnico della direzione generale del tesoro. \n 2. Se l'autorita' giudiziaria che ha disposto la perizia non ha sede in Roma, puo' richiedere per il relativo espletamento il giudice per le indagini preliminari presso il tribunale di Roma. A tal fine l'autorita' rogante pronuncia ordinanza con la quale formula i quesiti, indica le parti e i difensori da convocare e trasmette gli atti, anche in copia, il corpo del reato e i documenti occorrenti per l'espletamento della perizia. Il giudice per le indagini preliminari provvede nelle forme previste per l'incidente probatorio.</p>","notesHtml":""},{"id":"art_75","numText":"Art. 75","group":"Norme","heading":"Scritture di comparazione","contentHtml":"<p>1. Nei procedimenti per falsita' in atti, il giudice ordina la presentazione di scritture di comparazione che si trovano presso pubblici ufficiali o presso incaricati di un pubblico servizio.\nAmmette inoltre ogni altra scrittura quando non vi e' dubbio sulla sua autenticita', ordinando, se necessario, atti di perquisizione e di sequestro. Analogamente provvede il pubblico ministero nel corso delle indagini preliminari. \n 2. Il giudice puo' disporre che l'imputato, se possibile alla presenza del perito, rilasci una scrittura di comparazione facendo menzione dell'eventuale rifiuto dell'imputato stesso e di quant'altro interessi per valutare la genuinita' della scrittura.</p>","notesHtml":""},{"id":"art_76","numText":"Art. 76","group":"Norme","heading":"Consegna al perito di documenti o di altri oggetti","contentHtml":"<p>1. Quando il giudice ritiene necessario disporre la consegna al perito di documenti in originale o di altri oggetti, della consegna e' redatto verbale a cura del funzionario di cancelleria. In tal caso, il giudice puo' disporre che dei documenti venga estratta copia autentica.</p>","notesHtml":""},{"id":"art_77","numText":"Art. 77","group":"Norme","heading":"Attivita' di investigazione della polizia in materia di armi e di sostanze stupefacenti","contentHtml":"<p>1. Il dirigente del servizio di polizia giudiziaria puo' essere autorizzato dal giudice a prelevare, dopo l'espletamento della perizia, armi, munizioni, esplosivi e altri oggetti o sostanze equiparati occorrenti ai fini di investigazione o di prevenzione nonche' alla raccolta ed elaborazione dei relativi dati, sempre che tale attivita' non comporti modifiche o alterazioni degli oggetti o delle sostanze medesime. Analoga autorizzazione puo' essere concessa anche dopo che e' stata disposta la confisca e la distruzione ovvero dopo la chiusura del giudizio di primo grado, se la perizia non ha avuto luogo. \n 2. Dopo il provvedimento di archiviazione perche' e' ignoto l'autore del reato ovvero dopo che la sentenza e' divenuta inoppugnabile, il giudice puo' autorizzare il dirigente del servizio di polizia giudiziaria a prelevare gli oggetti e le sostanze indicate nel comma 1 anche per l'espletamento di accertamenti tecnici che ne determinano modifiche o alterazioni. \n 3. In ogni stato e grado del processo, il giudice puo' autorizzare il dirigente del servizio di polizia giudiziaria a prelevare, ai fini previsti dal comma 1, campioni di sostanze stupefacenti o psicotrope sequestrate o confiscate, se il quantitativo lo consente. Nel relativo verbale viene dato atto del quantitativo e della natura presunta della sostanza prelevata. \n 4. Delle operazioni di prelievo e di restituzione degli oggetti e delle sostanze previsti dai commi 1 e 3 e' redatto verbale a cura del pubblico ufficiale addetto alla cancelleria.</p>","notesHtml":""},{"id":"art_78","numText":"Art. 78","group":"Norme","heading":"Acquisizione di atti di un procedimento penale straniero","contentHtml":"<p>1. La documentazione di atti di un procedimento penale compiuti da autorita' giudiziaria straniera puo' essere acquisita a norma dell'articolo 238 del codice. \n 2. Gli atti non ripetibili compiuti dalla polizia straniera possono essere acquisiti nel fascicolo per il dibattimento se le parti vi consentono ovvero dopo l'esame testimoniale dell'autore degli stessi, compiuto anche mediante rogatoria all'estero in contraddittorio.</p>","notesHtml":""},{"id":"art_79","numText":"Art. 79","group":"Norme","heading":"Esecuzione di perquisizioni e ispezioni personali","contentHtml":"<p>1. Le perquisizioni e le ispezioni personali sono fatte eseguire da persona dello stesso sesso di quella che vi e' sottoposta, salvi i casi di impossibilita' o di urgenza assoluta. \n 2. La disposizione del comma 1 non si applica quando le operazioni sono eseguite da persona esercente la professione sanitaria.</p>","notesHtml":""},{"id":"art_80","numText":"Art. 80","group":"Norme","heading":"Esecuzione di perquisizioni locali","contentHtml":"<p>1. Se la copia del decreto di perquisizione locale e' consegnata al portiere o a chi ne fa le veci, si applica la disposizione di cui all'articolo 148, comma 3, del codice. \n 2. Se non si puo' provvedere a norma dell'articolo 250 comma 2 del codice, la copia del decreto di perquisizione e' depositata presso la cancelleria o la segreteria dell'autorita' giudiziaria che procede, e di tale deposito e' affisso un avviso alla porta del luogo dove e' stata eseguita la perquisizione.</p>","notesHtml":""},{"id":"art_81","numText":"Art. 81","group":"Norme","heading":"Redazione del verbale di sequestro","contentHtml":"<p>1. Il verbale di sequestro contiene l'elenco delle cose sequestrate, la descrizione delle cautele adottate per assicurarle e l'indicazione della specie e del numero dei sigilli apposti. Nel caso di beni contraffatti, l'elenco puo' essere sostituito dalla loro catalogazione per tipologia e la quantita' puo' essere indicata per massa, volume o peso. \n 2. Le carte sono numerate e sottoscritte singolarmente da chi procede al sequestro. Se cio' non e' possibile, esse sono rinchiuse in uno o piu' pacchi sigillati, numerati e timbrati. \n 3. Il verbale indica anche il luogo della custodia. Il provvedimento previsto dall'articolo 259 comma 1 secondo periodo del codice puo' essere adottato, quando ne ricorrono le condizioni, anche da chi ha provveduto al sequestro. Quando e' nominato un custode, questi dichiara di assumere gli obblighi di legge e sottoscrive il verbale. L'inosservanza di queste formalita' non esime il custode, che abbia assunto l'ufficio, dall'adempimento dei suoi doveri e dalla relativa responsabilita' disciplinare e penale. \n 4. Sulle cose sequestrate ovvero sui pacchi in cui esse sono rinchiuse e' apposta l'indicazione del procedimento al quale si riferiscono.</p>","notesHtml":""},{"id":"art_82","numText":"Art. 82","group":"Norme","heading":"Attivita' per il deposito e la custodia delle cose sequestrate","contentHtml":"<p>1. Le cose sequestrate sono annotate in apposito registro nel quale la cancelleria o la segreteria indica il numero del procedimento a cui si riferiscono, il cognome e il nome della persona a cui appartengono, se sono noti, e quelli della persona il cui nome e' stato iscritto nel registro delle notizie di reato, le trasmissioni ad altri uffici giudiziari e le restituzioni. \n 2. Le cose sequestrate non possono essere rimosse dal luogo in cui sono custodite, se non nei casi consentiti dalla legge. Quando i sigilli appaiono rotti o alterati, si procede alla verificazione delle cose sequestrate, a cura della cancelleria o della segreteria.\nDi ogni verificazione e in tutti i casi di rimozione e riapposizione di sigilli e' redatto verbale. \n 3. Con decreto del ministro di grazia e giustizia sono dettate le disposizioni regolamentari per il deposito e la custodia delle cose sequestrate. \n 4. Fino alla data di entrata in vigore del decreto previsto dal comma 3, le cose sequestrate, che a norma dell'articolo 259 del codice andrebbero depositate nella segreteria del pubblico ministero, sono depositate nella cancelleria del tribunale e annotate nei relativi registri. La stessa cancelleria provvede altresi' agli adempimenti previsti dall'articolo 83.</p>","notesHtml":""},{"id":"art_83","numText":"Art. 83","group":"Norme","heading":"Vendita o distruzione delle cose deperibili","contentHtml":"<p>1. La vendita delle cose indicate nell'articolo 260 comma 3 del codice e' eseguita a cura della cancelleria o della segreteria anche a trattativa privata. \n 2. Allo stesso modo si procede per la distruzione delle cose.\nTuttavia a questa puo' procedersi anche avvalendosi di persona idonea o della polizia giudiziaria che ha eseguito il sequestro. Delle operazioni compiute e' redatto verbale da allegare agli atti. \n 3. L'autorita' giudiziaria, prima che si proceda alle operazioni indicate nei commi 1 e 2, dispone il prelievo dei campioni, quando cio' e' possibile, dando avviso al difensore.</p>","notesHtml":""},{"id":"art_84","numText":"Art. 84","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_85","numText":"Art. 85","group":"Norme","heading":"Restituzione con imposizione di prescrizioni","contentHtml":"<p>1. Quando sono state sequestrate cose che possono essere restituite previa esecuzione di specifiche prescrizioni, l'autorita' giudiziaria, se l'interessato consente, ne ordina la restituzione impartendo le prescrizioni del caso e imponendo una idonea cauzione a garanzia della esecuzione delle prescrizioni nel termine stabilito. \n 2. Scaduto il termine, se le prescrizioni non sono adempiute, l'autorita' giudiziaria provvede a norma dell'articolo 260 comma 3 del codice qualora ne ricorrano le condizioni.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86","group":"Norme","heading":"Vendita o distruzione delle cose confiscate","contentHtml":"<p>1. La cancelleria provvede alla vendita delle cose di cui e' stata ordinata la confisca, salvo che per esse sia prevista una specifica destinazione. Il compimento delle operazioni di vendita puo' essere delegato a un istituto all'uopo autorizzato o ad uno dei professionisti indicati negli articoli 534-bis e 591-bis del codice di procedura civile, con le modalita' ivi previste, in quanto compatibili.\n 1-bis. Qualora sia stata disposta una confisca per equivalente di beni non sottoposti a sequestro o, comunque, non specificamente individuati nel provvedimento che dispone la confisca, l'esecuzione si svolge con le modalita' previste per l'esecuzione delle pene pecuniarie, ferma la possibilita' per il pubblico ministero di dare esecuzione al provvedimento su beni individuati successivamente. \n 2. Il giudice dispone la distruzione delle cose confiscate se la vendita non e' opportuna. All'affidamento dell'incarico procede la cancelleria. Il giudice puo' disporre che alla distruzione proceda la polizia giudiziaria che ha eseguito il sequestro.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86-bis","group":"Norme","heading":"","contentHtml":"<p> (Destinazione dei beni informatici o telematici sequestrati o confiscati in quanto utilizzati per la commissione dei reati di cui agli articoli 473, 474, 615-ter, 615-quater, 615-quinquies, 617-bis, 617-ter, 617-quater, 617-quinquies, 617-sexies, 635-bis, 635-ter, 635-quater, 635-quinquies, 640-ter e 640-quinquies del codice penale).</p>\n<p>1. I beni e gli strumenti informatici o telematici oggetto di sequestro che, a seguito di analisi tecnica forense, risultino essere stati in tutto o in parte utilizzati per la commissione dei reati di cui agli articoli 473, 474, 615-ter, 615-quater, 615-quinquies, 617-bis, 617-ter, 617-quater, 617-quinquies, 617-sexies, 635-bis, 635-ter, 635-quater, 635-quinquies, 640-ter e 640-quinquies del codice penale sono affidati dall'autorita' giudiziaria in custodia giudiziale con facolta' d'uso, salvo che vi ostino esigenze processuali, agli organi di polizia che ne facciano richiesta per l'impiego in attivita' di contrasto ai crimini informatici, ovvero ad altri organi dello Stato per finalita' di giustizia. \n 2. I beni e gli strumenti di cui al comma 1, ove acquisiti dallo Stato a seguito di procedimento definitivo di confisca, sono assegnati alle amministrazioni che ne facciano richiesta e che ne abbiano avuto l'uso ovvero, ove non vi sia stato un precedente affidamento in custodia giudiziale, agli organi di polizia che ne facciano richiesta per l'impiego in attivita' di contrasto ai crimini informatici ovvero ad altri organi dello Stato per finalita' di giustizia.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86-ter","group":"Norme","heading":"Destinazione dei beni confiscati in quanto utilizzati per la commissione del reato di esercizio abusivo della professione sanitaria","contentHtml":"<p>1. Nel caso di condanna o di applicazione della pena su richiesta delle parti a norma dell'articolo 444 del codice per l'esercizio abusivo di una professione sanitaria, i beni immobili confiscati sono trasferiti al patrimonio del comune ove l'immobile e' sito, per essere destinati a finalita' sociali e assistenziali.</p>","notesHtml":""},{"id":"art_87","numText":"Art. 87","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_88","numText":"Art. 88","group":"Norme","heading":"Destinazione delle monete metalliche e dei biglietti di banca confiscati","contentHtml":"<p>1. I biglietti di banca e le monete metalliche, di cui e' stata accertata la falsita' e ordinata la confisca, sono trasferiti rispettivamente alla filiale della Banca d'Italia o alla sezione della tesoreria provinciale piu' vicina, a cura della cancellieria del giudice che ha emesso il provvedimento, immediatamente dopo che questo e' divenuto esecutivo. \n 2. La disposizione del comma 1 si applica anche agli strumenti e agli altri oggetti destinati esclusivamente alla falsificazione dei quali e' stata ordinata la confisca.</p>","notesHtml":""},{"id":"art_89","numText":"Art. 89","group":"Norme","heading":"Verbale e registrazioni delle intercettazioni","contentHtml":"<p>1. Il verbale delle operazioni previsto dall'articolo 268 comma 1 del codice contiene l'indicazione degli estremi del decreto che ha disposto l'intercettazione, la descrizione delle modalita' di registrazione, l'annotazione del giorno e dell'ora di inizio e di cessazione della intercettazione nonche' i nominativi delle persone che hanno preso parte alle operazioni. Quando si procede ad intercettazione delle comunicazioni e conversazioni tra presenti mediante inserimento di captatore informatico su dispositivo elettronico portatile, il verbale indica il tipo di programma impiegato e, ove possibile, i luoghi in cui si svolgono le comunicazioni o conversazioni. \n 2. Ai fini dell'installazione e dell'intercettazione attraverso captatore informatico in dispositivi elettronici portatili, devono essere impiegati programmi conformi ai requisiti tecnici stabiliti con decreto del Ministro della giustizia. \n 3. Nei casi previsti dal comma 2 le comunicazioni intercettate sono conferite, dopo l'acquisizione delle necessarie informazioni in merito alle condizioni tecniche di sicurezza e di affidabilita' della rete di trasmissione, esclusivamente negli impianti della procura della Repubblica. Durante il trasferimento dei dati sono operati controlli costanti di integrita' che assicurino l'integrale corrispondenza tra quanto intercettato, registrato e trasmesso. \n 4. Quando e' impossibile il contestuale trasferimento dei dati intercettati, il verbale di cui all'articolo 268 del codice da' atto delle ragioni impeditive e della successione cronologica degli accadimenti captati e delle conversazioni intercettate. \n 5. Al termine delle operazioni si provvede, anche mediante persone idonee di cui all'articolo 348 del codice, alla disattivazione del captatore con modalita' tali da renderlo inidoneo a successivi impieghi. Dell'operazione si da' atto nel verbale. \n (90) <sup class=\"amd\">94</sup></p>","notesHtml":"<p>AGGIORNAMENTO (78)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il centottantesimo giorno successivo alla data di entrata in vigore del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 marzo 2019&quot;.</p>\n<p>AGGIORNAMENTO (86)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dalla L. 30 dicembre 2018, n. 145, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 luglio 2019&quot;.</p>\n<p>AGGIORNAMENTO (88a)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 14 giugno 2019, n. 53, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 dicembre 2019&quot;.</p>\n<p>AGGIORNAMENTO (90)</p>\n<p>Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 30 aprile 2020&quot;. \n Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano ai procedimenti penali iscritti dopo il 30 aprile 2020&quot;.</p>\n<p>AGGIORNAMENTO (94)</p>\n<p>Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, come modificato dal D.L. 30 aprile 2020, n. 28, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 31 agosto 2020, ad eccezione delle disposizioni di cui al comma 6 che sono di immediata applicazione&quot;.</p>"},{"id":"art_89","numText":"Art. 89-bis","group":"Norme","heading":"Archivio delle intercettazioni","contentHtml":"<p>1. Nell'archivio digitale istituito dall'articolo 269, comma 1, del codice, tenuto sotto la direzione e la sorveglianza del Procuratore della Repubblica, sono custoditi i verbali, gli atti e le registrazioni delle intercettazioni a cui afferiscono. \n 2. L'archivio e' gestito con modalita' tali da assicurare la segretezza della documentazione relativa alle intercettazioni non necessarie per il procedimento, ed a quelle irrilevanti o di cui e' vietata l'utilizzazione ovvero riguardanti categorie particolari di dati personali come definiti dalla legge o dal regolamento in materia o, comunque, dati personali relativi a soggetti diversi dalle parti. Il Procuratore della Repubblica impartisce, con particolare riguardo alle modalita' di accesso, le prescrizioni necessarie a garantire la tutela del segreto su quanto ivi custodito. \n 3. All'archivio possono accedere, secondo quanto stabilito dal codice, il giudice che procede e i suoi ausiliari, il pubblico ministero e i suoi ausiliari, ivi compresi gli ufficiali di polizia giudiziaria delegati all'ascolto, i difensori delle parti, assistiti, se necessario, da un interprete. Ogni accesso e' annotato in apposito registro, gestito con modalita' informatiche; in esso sono indicate data, ora iniziale e finale, e gli atti specificamente consultati. \n 4. I difensori delle parti possono ascoltare le registrazioni con apparecchio a disposizione dell'archivio e possono ottenere copia delle registrazioni e degli atti quando acquisiti a norma degli articoli 268, 415-bis e 454 del codice. Ogni rilascio di copia e' annotato in apposito registro, gestito con modalita' informatiche; in esso sono indicate data e ora di rilascio e gli atti consegnati in copia. \n (90) (94)</p>","notesHtml":"<p>AGGIORNAMENTO (78)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il centottantesimo giorno successivo alla data di entrata in vigore del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 marzo 2019&quot;.</p>\n<p>AGGIORNAMENTO (86)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dalla L. 30 dicembre 2018, n. 145, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 luglio 2019&quot;.</p>\n<p>AGGIORNAMENTO (88a)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 14 giugno 2019, n. 53, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 dicembre 2019&quot;.</p>\n<p>AGGIORNAMENTO (90)</p>\n<p>Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 30 aprile 2020&quot;. \n Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano ai procedimenti penali iscritti dopo il 30 aprile 2020&quot;.</p>\n<p>AGGIORNAMENTO (94)</p>\n<p>Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, come modificato dal D.L. 30 aprile 2020, n. 28, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 31 agosto 2020, ad eccezione delle disposizioni di cui al comma 6 che sono di immediata applicazione&quot;.</p>"},{"id":"art_90","numText":"Art. 90","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 19 FEBBRAIO 1998, N. 51","contentHtml":"<p>29a</p>","notesHtml":"<p>AGGIORNAMENTO (29a)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che l'abrogazione del presente articolo diventa efficace a decorrere dal 2 giugno 1999.</p>"},{"id":"art_91","numText":"Art. 91","group":"Norme","heading":"Giudice competente in ordine alle misure cautelari","contentHtml":"<p>1. Nel corso degli atti preliminari al dibattimento, i provvedimenti concernenti le misure cautelari sono adottati, secondo la rispettiva competenza, dal tribunale in composizione collegiale o monocratica, dalla corte di assise, dalla corte di appello o dalla corte di assise di appello; dopo la pronuncia della sentenza e prima della trasmissione degli atti a norma dell'articolo 590 del codice, provvede il giudice che ha emesso la sentenza; durante la pendenza del ricorso per cassazione, provvede il giudice che ha emesso il provvedimento impugnato.</p>","notesHtml":""},{"id":"art_92","numText":"Art. 92","group":"Norme","heading":"Trasmissione dell'ordinanza che dispone la misura cautelare","contentHtml":"<p>1. L'ordinanza che dispone la misura cautelare e' immediatamente trasmessa, in duplice copia, a cura della cancelleria del giudice che ha emesso il provvedimento, all'organo che deve provvedere all'esecuzione ovvero, nel corso delle indagini preliminari, al pubblico ministero che ne ha fatto richiesta, il quale ne cura l'esecuzione. \n 1-bis. Contestualmente sono restituiti al pubblico ministero, per la conservazione nell'archivio di cui all'articolo 89-bis, gli atti contenenti le comunicazioni e conversazioni intercettate ritenute dal giudice non rilevanti o inutilizzabili. (78) (83) (86) (88a) (90) <sup class=\"amd\">94</sup></p>","notesHtml":"<p>AGGIORNAMENTO (78)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il centottantesimo giorno successivo alla data di entrata in vigore del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 marzo 2019&quot;.</p>\n<p>AGGIORNAMENTO (86)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dalla L. 30 dicembre 2018, n. 145, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 luglio 2019&quot;.</p>\n<p>AGGIORNAMENTO (88a)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 14 giugno 2019, n. 53, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano alle operazioni di intercettazione relative a provvedimenti autorizzativi emessi dopo il 31 dicembre 2019&quot;.</p>\n<p>AGGIORNAMENTO (90)</p>\n<p>Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 30 aprile 2020&quot;. \n Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano ai procedimenti penali iscritti dopo il 30 aprile 2020&quot;.</p>\n<p>AGGIORNAMENTO (94)</p>\n<p>Il D.Lgs. 29 dicembre 2017, n. 216, come modificato dal D.L. 30 aprile 2020, n. 28, ha disposto (con l'art. 9, comma 1) che &quot;Le disposizioni di cui agli articoli 2, 3 4, 5 e 7 si applicano ai procedimenti penali iscritti dopo il 31 agosto 2020&quot;. \n Il D.L. 30 dicembre 2019, n. 161, convertito con modificazioni dalla L. 28 febbraio 2020, n. 7, come modificato dal D.L. 30 aprile 2020, n. 28, ha disposto (con l'art. 2, comma 8) che &quot;Le disposizioni del presente articolo si applicano ai procedimenti penali iscritti successivamente al 31 agosto 2020, ad eccezione delle disposizioni di cui al comma 6 che sono di immediata applicazione&quot;.</p>"},{"id":"art_93","numText":"Art. 93","group":"Norme","heading":"Deposito del verbale di interrogatorio","contentHtml":"<p>1. Il verbale dell'interrogatorio della persona in stato di custodia cautelare e' trasmesso al pubblico ministero. I difensori hanno diritto di prenderne visione ed estrarne copia.</p>","notesHtml":""},{"id":"art_94","numText":"Art. 94","group":"Norme","heading":"Ingresso in istituti penitenziari","contentHtml":"<p>1. Il pubblico ufficiale preposto a un istituto penitenziario non puo' ricevere ne' ritenervi alcuno se non in forza di un provvedimento dell'autorita' giudiziaria o di un avviso di consegna da parte di un ufficiale di polizia giudiziaria. \n 1-bis. Copia del provvedimento che costituisce titolo di custodia e' inserito nella cartella personale del detenuto. All'atto del colloquio previsto dall'articolo 23, quarto comma, del regolamento approvato con decreto del Presidente della Repubblica 29 aprile 1976, n. 431, o anche successivamente, il direttore o l'operatore penitenziario da lui designato accerta, se del caso con l'ausilio di un interprete, che l'interessato abbia precisa conoscenza del provvedimento che ne dispone la custodia e gliene illustra, ove occorra, i contenuti. \n 1-ter. L'autorita' giudiziaria che dispone la custodia cautelare in carcere o che pronuncia un provvedimento da cui non consegua la rimessione in liberta' del detenuto dispone che copia del provvedimento sia trasmessa, a cura della polizia giudiziaria o della cancelleria, al direttore dell'istituto penitenziario perche' provveda a quanto stabilito dal comma 1-bis. \n 1-quater. Il detenuto ha sempre diritto di consultare la propria cartella personale e di ottenere copia dei provvedimenti dell'autorita' giudiziaria in essa contenuti. \n 2. Nondimeno, se si presenta nell'istituto una persona che dichiari di avere commesso un reato per il quale e' obbligatorio l'arresto in flagranza, vi deve essere trattenuto a norma dell'articolo 349 del codice ad opera degli appartenenti al personale di custodia che abbiano qualita' di ufficiale o di agente di polizia giudiziaria, i quali redigono verbale e ne danno immediata notizia all'autorita' giudiziaria competente. \n 3. Allo stesso modo si procede nei confronti di un latitante che si sia sottratto alla esecuzione della custodia cautelare, di un evaso o di un condannato in via definitiva che non sia in grado di produrre copia dell'ordine di esecuzione.</p>","notesHtml":""},{"id":"art_95","numText":"Art. 95","group":"Norme","heading":"Esecuzione della custodia cautelare nei confronti dell'internato per misura di sicurezza","contentHtml":"<p>1. Con l'ordinanza che dispone la custodia cautelare nei confronti di persona internata per misura di sicurezza, il giudice ne dispone il trasferimento nell'istituto di custodia, salvo quanto previsto dall'articolo 286 del codice.</p>","notesHtml":""},{"id":"art_96","numText":"Art. 96","group":"Norme","heading":"Separazione degli imputati detenuti","contentHtml":"<p>1. Negli istituti di custodia gli imputati in uno stesso procedimento o comunque di uno stesso reato devono essere tenuti separati tra loro, se l'autorita' giudiziaria abbia cosi' ordinato.\nIn mancanza di tale ordine, la separazione deve essere disposta sempre che lo consentano le possibilita' dell'istituto.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97","group":"Norme","heading":"Comunicazioni al servizio informatico","contentHtml":"<p>1. I provvedimenti con i quali e' disposta una misura cautelare personale sono comunicati, a cura della cancelleria del giudice che li ha emessi, al servizio informatico istituito con decreto del ministro di grazia e giustizia, quando la misura ha avuto esecuzione.\nLa stessa comunicazione e' altresi' data quando e' dichiarato lo stato di latitanza. \n 2. Nel caso di fermo o di arresto in flagranza, alla comunicazione prevista dal comma 1 provvede la direzione dell'istituto di custodia al quale il fermato o l'arrestato e' consegnato. \n 3. Deve essere altresi' data immediata comunicazione al servizio previsto dal comma 1 del provvedimento con cui e' ordinata la immediata liberazione dell'arrestato o del fermato nonche' di ogni provvedimento estintivo o modificativo delle misure cautelari personali. Alla comunicazione provvede la cancelleria o la segreteria dell'autorita' giudiziaria che ha adottato il provvedimento.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97-bis","group":"Norme","heading":"Modalita' di esecuzione del provvedimento che applica gli arresti domiciliari","contentHtml":"<p>1. A seguito del provvedimento che sostituisce la misura della custodia cautelare in carcere con quella degli arresti domiciliari, l'imputato raggiunge senza accompagnamento il luogo di esecuzione della misura, individuato ai sensi dell'articolo 284 del codice; del provvedimento emesso, il giudice informa il pubblico ministero e la polizia giudiziaria che possono, anche di propria iniziativa, controllare l'osservanza delle prescrizioni imposte. \n 2. Qualora il giudice, anche a seguito della segnalazione operata dal pubblico ministero, dal direttore dell'istituto penitenziario o dalle forze di polizia, ritenga sussistenti specifiche esigenze processuali ovvero altre esigenze di sicurezza, con il provvedimento di sostituzione di cui al comma 1 dispone che l'imputato venga accompagnato dalle forze di polizia presso il luogo di esecuzione degli arresti domiciliari.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97-ter","group":"Norme","heading":"Modalita' di accertamento della fattibilita' tecnica, ivi inclusa quella operativa, delle particolari modalita' di controllo di cui agli articoli 275-bis, 282-bis e 282-ter del codice","contentHtml":"<p>1. Quando svolge l'accertamento della fattibilita' tecnica, ivi inclusa quella operativa, di cui agli articoli 275-bis, 282-bis e 282-ter del codice, preliminare alla prescrizione delle particolari modalita' di controllo da parte del giudice, la polizia giudiziaria, anche coadiuvata da operatori della societa' incaricata di fornire i relativi servizi elettronici o tecnici, verifica senza ritardo e comunque entro quarantotto ore l'attivabilita', l'operativita' e la funzionalita' dei mezzi elettronici o degli altri strumenti tecnici negli specifici casi e contesti applicativi, analizzando le caratteristiche dei luoghi, le distanze, la copertura di rete, la qualita' della connessione e i tempi di trasmissione dei segnali elettronici del luogo o dell'area di installazione, la gestione dei predetti mezzi o strumenti e ogni altra circostanza rilevante in concreto ai fini della valutazione dell'efficacia del controllo sull'osservanza delle prescrizioni imposte all'imputato. \n 2. La polizia giudiziaria trasmette , senza ritardo e comunque nelle successive quarantotto ore all'autorita' giudiziaria che procede, il rapporto che, ai sensi del comma 1, accerti la fattibilita' tecnica, ivi inclusa quella operativa, delle modalita' di controllo, per le valutazioni di competenza, compresa l'applicazione, anche congiunta, di ulteriori misure cautelari, anche piu' gravi.</p>","notesHtml":""},{"id":"art_98","numText":"Art. 98","group":"Norme","heading":"Cessazione delle misure cautelari estinte","contentHtml":"<p>1. Quando l'imputato sottoposto a custodia cautelare deve essere liberato, il giudice, con il provvedimento emesso a norma dell'articolo 306 del codice, ordina al direttore dell'istituto di custodia l'immediata dimissione. L'ordine e' trasmesso con urgenza. \n 2. Nel caso di imputato custodito in luogo di cura, il provvedimento previsto dal comma 1 e' trasmesso, con urgenza, al direttore del servizio psichiatrico ospedaliero dove l'imputato e' ricoverato nonche' alla polizia giudiziaria incaricata della custodia, la quale provvede agli adempimenti previsti dall'articolo 161 comma 3 del codice. \n 3. Nel caso di imputato agli arresti domiciliari o sottoposto alle misure del divieto o dell'obbligo di dimora, il giudice comunica, con urgenza, il provvedimento previsto dal comma 1, oltre che all'imputato, anche alla polizia giudiziaria competente a controllare l'osservanza delle prescrizioni imposte con le suddette misure. Nel caso della misura dell'obbligo di presentazione alla polizia giudiziaria, la comunicazione della cessazione deve essere data, oltre che all'imputato, anche all'ufficio di polizia giudiziaria competente. \n 4. In caso di cessazione della misura del divieto di espatrio e delle misure interdittive, il giudice dispone la comunicazione del provvedimento all'imputato e, se del caso, rispettivamente, all'organo competente ad assicurare la esecuzione della misura ovvero a quello eventualmente competente a disporre l'interdizione in via ordinaria.</p>","notesHtml":""},{"id":"art_99","numText":"Art. 99","group":"Norme","heading":"Inammissibilita' della richiesta di riesame","contentHtml":"<p>1. La disposizione dell'articolo 585 comma 5 del codice si applica anche ai termini per le impugnazioni previsti dal libro IV del codice.</p>","notesHtml":""},{"id":"art_100","numText":"Art. 100","group":"Norme","heading":"Trasmissione degli atti in caso di impugnazione","contentHtml":"<p>1. Quando e' impugnato un provvedimento concernente la liberta' personale, la cancelleria o la segreteria dell'autorita' giudiziaria procedente trasmette, in originale o in copia, al giudice competente gli atti necessari per decidere sull'impugnazione, con precedenza assoluta su ogni altro affare e, comunque, entro il giorno successivo alla ricezione dell'avviso della proposizione dell'impugnazione previsto dagli articoli 309, 310 e 311 del codice.</p>","notesHtml":""},{"id":"art_101","numText":"Art. 101","group":"Norme","heading":"Termine per la decisione sulla richiesta di riesame","contentHtml":"<p>1. Nel procedimento previsto dall'articolo 309 del codice, se l'udienza e' rinviata a norma dell'articolo 127 comma 4 del codice, il termine per la decisione sulla richiesta di riesame decorre nuovamente dalla data in cui il giudice riceve comunicazione della cessazione dell'impedimento o comunque accerta la cessazione dello stesso. \n 2. Quando l'imputato e' detenuto o internato in luogo posto fuori del circondario del tribunale competente, il termine previsto dall'articolo 309 comma 10 del codice decorre dal momento in cui pervengono al tribunale gli atti assunti dal magistrato di sorveglianza a norma dell'articolo 127 comma 3 del codice. Il magistrato di sorveglianza senza ritardo assume le dichiarazioni dell'imputato, previo tempestivo avviso al difensore e trasmette gli atti al tribunale con il mezzo piu' celere.</p>","notesHtml":""},{"id":"art_102","numText":"Art. 102","group":"Norme","heading":"Domanda di riparazione per l'ingiusta detenzione","contentHtml":"<p>1. La domanda di riparazione per l'ingiusta detenzione e' presentata presso la cancelleria della corte di appello nel cui distretto e' stata pronunciata la sentenza o il provvedimento di archiviazione che ha definito il procedimento. Nel caso di sentenza emessa dalla corte di cassazione, e' competente la corte di appello nel cui distretto e' stato emesso il provvedimento impugnato.</p>","notesHtml":""},{"id":"art_102","numText":"Art. 102-bis","group":"Norme","heading":"Reintegrazione nel posto di lavoro perduto per ingiusta detenzione","contentHtml":"<p>1. Chiunque sia stato sottoposto alla misura della custodia cautelare in carcere ai sensi dell'articolo 285 del codice ovvero a quella degli arresti domiciliari ai sensi dell'articolo 284 del codice e sia stato per cio' stesso licenziato dal posto di lavoro che occupava prima dell'applicazione della misura, ha diritto di essere reintegrato nel posto di lavoro medesimo qualora venga pronunciata in suo favore sentenza di assoluzione, di proscioglimento o di' non luogo a procedere ovvero venga disposto provvedimento di archiviazione.</p>","notesHtml":""},{"id":"art_103","numText":"Art. 103","group":"Norme","heading":"Trascrizione e cancellazione del sequestro conservativo","contentHtml":"<p>1. Per la trascrizione e la cancellazione del sequestro conservativo richiesto dal pubblico ministero, l'ufficio del conservatore dei registri immobiliari non puo' esigere alcuna tassa o diritto, salva l'azione contro il condannato.</p>","notesHtml":""},{"id":"art_104","numText":"Art. 104","group":"Norme","heading":"Esecuzione del sequestro preventivo","contentHtml":"<p>1. Il sequestro preventivo e' eseguito: \n a) sui mobili e sui crediti, secondo le forme prescritte dal codice di procedura civile per il pignoramento presso il debitore o presso il terzo in quanto applicabili; \n b) sugli immobili o mobili registrati, con la trascrizione del provvedimento presso i competenti uffici; \n c) sui beni aziendali organizzati per l'esercizio di un'impresa, oltre che con le modalita' previste per i singoli beni sequestrati, con l'immissione in possesso dell'amministratore, con l'iscrizione del provvedimento nel registro delle imprese presso il quale e' iscritta l'impresa; \n d) sulle azioni e sulle quote sociali, con l'annotazione nei libri sociali e con l'iscrizione nel registro delle imprese; \n e) sugli strumenti finanziari dematerializzati, ivi compresi i titoli del debito pubblico, con la registrazione nell'apposito conto tenuto dall'intermediario ai sensi dell'articolo 34 del decreto legislativo 24 giugno 1998, n. 213. Si applica l'articolo 10, comma 3, del decreto legislativo 21 maggio 2004, n. 170. \n 2. Si applica altresi' la disposizione dell'articolo 92.</p>","notesHtml":""},{"id":"art_104","numText":"Art. 104-bis","group":"Norme","heading":"Amministrazione dei beni sottoposti a sequestro e confisca. Tutela dei terzi nel giudizio","contentHtml":"<p>1. In tutti i casi in cui il sequestro preventivo o la confisca abbiano per oggetto aziende, societa' ovvero beni di cui sia necessario assicurare l'amministrazione, esclusi quelli destinati ad affluire nel Fondo unico giustizia, di cui all'articolo 61, comma 23, del decreto-legge 25 giugno 2008, n. 112, convertito, con modificazioni, dalla legge 6 agosto 2008, n. 133, l'autorita' giudiziaria nomina un amministratore giudiziario scelto nell'Albo di cui all'articolo 35 del codice di cui al decreto legislativo 6 settembre 2011, n. 159, e successive modificazioni. Con decreto motivato dell'autorita' giudiziaria la custodia dei beni suddetti puo' tuttavia essere affidata a soggetti diversi da quelli indicati al periodo precedente. \n 1-bis. Si applicano le disposizioni di cui al Libro I, titolo III, del codice di cui al decreto legislativo 6 settembre 2011, n. 159, e successive modificazioni nella parte in cui recano la disciplina della nomina e revoca dell'amministratore, dei compiti, degli obblighi dello stesso e della gestione dei beni. In caso di sequestro disposto ai sensi dell'articolo 321, comma 2, del codice o di confisca ai fini della tutela dei terzi e nei rapporti con la procedura di liquidazione giudiziaria si applicano, altresi', le disposizioni di cui al titolo IV del Libro I del citato decreto legislativo. (93) (96) (98) \n 1-bis.1. Quando il sequestro ha ad oggetto stabilimenti industriali o parti di essi dichiarati di interesse strategico nazionale ai sensi dell'articolo 1 del decreto-legge 3 dicembre 2012, n. 207, convertito, con modificazioni, dalla legge 24 dicembre 2012, n. 231, ovvero impianti o infrastrutture necessari ad assicurarne la continuita' produttiva, il giudice dispone la prosecuzione dell'attivita' avvalendosi di un amministratore giudiziario nominato ai sensi del comma 1. In caso di imprese che dopo il verificarsi dei reati che danno luogo all'applicazione del provvedimento di sequestro sono state ammesse all'amministrazione straordinaria, anche in via temporanea ai sensi dell'articolo 1 del decreto-legge 5 dicembre 2022, n. 187, la prosecuzione dell'attivita' e' affidata al commissario gia' nominato nell'ambito della procedura di amministrazione straordinaria. Ove necessario per realizzare un bilanciamento tra le esigenze di continuita' dell'attivita' produttiva e di salvaguardia dell'occupazione e la tutela della sicurezza sul luogo di lavoro, della salute, dell'ambiente e degli altri eventuali beni giuridici lesi dagli illeciti commessi, il giudice detta le prescrizioni necessarie, tenendo anche conto del contenuto dei provvedimenti amministrativi a tal fine adottati dalle competenti autorita'. Le disposizioni di cui al primo, secondo e terzo periodo non si applicano quando dalla prosecuzione puo' derivare un concreto pericolo per la salute o l'incolumita' pubblica ovvero per la salute o la sicurezza dei lavoratori non evitabile con alcuna prescrizione. Il giudice autorizza la prosecuzione dell'attivita' se, nell'ambito della procedura di riconoscimento dell'interesse strategico nazionale, sono state adottate misure con le quali si e' ritenuto realizzabile il bilanciamento tra le esigenze di continuita' dell'attivita' produttiva e di salvaguardia dell'occupazione e la tutela della sicurezza sul luogo di lavoro, della salute e dell'ambiente e degli altri eventuali beni giuridici lesi dagli illeciti commessi. In ogni caso i provvedimenti emessi dal giudice ai sensi dei periodi precedenti, anche se negativi, sono trasmessi, entro il termine di quarantotto ore, alla Presidenza del Consiglio dei ministri, al Ministero delle imprese e del made in Italy e al Ministero dell'ambiente e della sicurezza energetica. (111) \n 1-bis.2. Nei casi disciplinati dal comma 1-bis.1, il provvedimento con cui il giudice abbia escluso o revocato l'autorizzazione alla prosecuzione, o negato la stessa in sede di istanza di revoca, modifica o rivalutazione del sequestro precedentemente disposto, nonostante le misure adottate nell'ambito della procedura di riconoscimento dell'interesse strategico nazionale, puo' essere oggetto di impugnazione ai sensi dell'articolo 322-bis del codice, anche da parte della Presidenza del Consiglio dei ministri, del Ministero delle imprese e del made in Italy o del Ministero dell'ambiente e della sicurezza energetica. Sull'appello avverso il provvedimento di cui al primo periodo decide, in composizione collegiale, il tribunale di Roma. <sup class=\"amd\">118</sup> \n 1-ter. I compiti del giudice delegato alla procedura sono svolti nel corso di tutto il procedimento dal giudice che ha emesso il decreto di sequestro ovvero, nel caso di provvedimento emesso da organo collegiale, dal giudice delegato nominato ai sensi e per gli effetti dell'articolo 35, comma 1, del codice di cui al decreto legislativo 6 settembre 2011, n. 159, e successive modificazioni. \n 1-quater. Ai casi di sequestro e confisca in casi particolari previsti dall'articolo 240-bis del codice penale o dalle altre disposizioni di legge che a questo articolo rinviano, nonche' agli altri casi di sequestro e confisca di beni adottati nei procedimenti relativi ai delitti di cui all'articolo 51, comma 3-bis, del codice, si applicano le disposizioni del titolo IV del Libro I del decreto legislativo 6 settembre 2011, n. 159. Si applicano inoltre le disposizioni previste dal medesimo decreto legislativo in materia di amministrazione e destinazione dei beni sequestrati e confiscati e di esecuzione del sequestro. In tali casi l'Agenzia nazionale per l'amministrazione e la destinazione dei beni sequestrati e confiscati alla criminalita' organizzata coadiuva l'autorita' giudiziaria nell'amministrazione e nella custodia dei beni sequestrati, fino al provvedimento di confisca emesso dalla corte di appello e, successivamente a tale provvedimento, amministra i beni medesimi secondo le modalita' previste dal citato decreto legislativo 6 settembre 2011, n. 159. PERIODO SOPPRESSO DAL D.LGS. 10 OTTOBRE 2022, N. 150. (93) (96) (98) \n 1-quinquies. Nel processo di cognizione devono essere citati i terzi titolari di diritti reali o personali di godimento sui beni in sequestro, di cui l'imputato risulti avere la disponibilita' a qualsiasi titolo. \n 1-sexies. In tutti i casi di sequestro preventivo e confisca restano comunque salvi i diritti della persona offesa dal reato alle restituzioni e al risarcimento del danno. Le disposizioni di cui al presente articolo si applicano anche nel caso indicato dall'articolo 578-bis del codice. \n 1-septies. Nei casi previsti dal comma 1-bis.1, qualora la prosecuzione dell'attivita' sia stata autorizzata dopo l'adozione del provvedimento di sequestro, l'amministratore giudiziario, ovvero il commissario straordinario nominato nell'ambito di una procedura di amministrazione straordinaria, e' autorizzato a proseguire l'attivita' anche quando il provvedimento con cui e' disposta la confisca e' divenuto definitivo, fermo restando il rispetto delle prescrizioni impartite dal giudice ai sensi del terzo periodo del comma 1-bis.1 ovvero delle misure adottate nell'ambito della procedura di riconoscimento dell'interesse strategico nazionale ai sensi del quinto periodo del medesimo comma 1-bis.1. In questo caso, il giudice competente e' il giudice dell'esecuzione. (105) \n 1-octies. In caso di imprese ammesse all'amministrazione straordinaria di cui al decreto legislativo 8 luglio 1999, n. 270, ovvero al decreto-legge 23 dicembre 2003, n. 347, convertito, con modificazioni, dalla legge 18 febbraio 2004, n. 39, anche in via temporanea ai sensi dell'articolo 1 del decreto-legge 5 dicembre 2022, n. 187, convertito, con modificazioni, dalla legge 1° febbraio 2023, n. 10, il sequestro preventivo, disposto ai sensi dell'articolo 321 del codice di procedura penale ovvero di altre previsioni di legge che a detto articolo rinviano, non impedisce il trasferimento dei beni in sequestro ai sensi dell'articolo 27, comma 2, del decreto legislativo 8 luglio 1999, n. 270, in attuazione del programma di amministrazione straordinaria di cui all'articolo 4 del decreto-legge 23 dicembre 2003, n. 347, convertito, con modificazioni, dalla legge 18 febbraio 2004, n. 39, ovvero ai sensi di altre disposizioni di legge applicabili alla procedura di amministrazione straordinaria, se essi sono costituiti da stabilimenti industriali o parti di essi dichiarati di interesse strategico nazionale ai sensi dell'articolo 1 del decreto-legge 3 dicembre 2012, n. 207, convertito, con modificazioni, dalla legge 24 dicembre 2012, n. 231, ovvero impianti o infrastrutture necessari ad assicurarne la continuita' produttiva, purche' ricorrano le seguenti condizioni: \n a) l'ammissione all'amministrazione straordinaria e' intervenuta dopo il verificarsi dei reati che hanno dato luogo all'applicazione del provvedimento di sequestro; \n b) dopo l'adozione del provvedimento di sequestro, e' stata autorizzata la prosecuzione dell'attivita'; \n c) sono in corso di attuazione o sono state attuate le prescrizioni impartite dal giudice ai sensi del comma 1-bis.1, ovvero le misure indicate nell'ambito della procedura di riconoscimento dell'interesse strategico nazionale ai fini del bilanciamento tra esigenze di continuita' dell'attivita' produttiva e beni giuridici lesi dagli illeciti oggetto del giudizio penale, ovvero le prescrizioni dettate da provvedimenti amministrativi che autorizzino la prosecuzione dell'attivita' dettando misure dirette a tutelare i beni giuridici protetti dalle norme incriminatrici oggetto del giudizio penale; \n d) il soggetto al quale i beni sono trasferiti non risulta controllato, controllante o collegato ai sensi dell'articolo 2359 del codice civile, ne' altrimenti riconducibile, direttamente o indirettamente, al soggetto che ha commesso i reati per i quali il sequestro e' stato disposto, ovvero all'ente che ha commesso gli illeciti amministrativi per i quali il sequestro e' stato disposto, ovvero al soggetto per conto o nell'interesse del quale essi hanno agito; \n e) la congruita' del prezzo e' attestata mediante apposita perizia giurata, ivi compresa quella utilizzata ai fini della determinazione del valore del bene ai sensi degli articoli 62 e 63 del decreto legislativo 8 luglio 1999, n. 270, ovvero di altre disposizioni di legge applicabili alla procedura di amministrazione straordinaria, tenendo comunque conto delle valutazioni fatte nell'ambito delle procedure competitive per la cessione a terzi dei complessi aziendali. \n Le medesime disposizioni si applicano nel caso in cui sia intervenuto un provvedimento di confisca nei casi previsti dal comma 1-septies. (105) \n 1-novies. Nei casi di cui al comma 1-octies, il corrispettivo della cessione e' depositato dagli organi dell'amministrazione straordinaria presso la Cassa delle ammende, con divieto di utilizzo per finalita' diverse dall'acquisto di titoli di Stato, fino alla conclusione del procedimento penale, salvo il caso in cui il sequestro sia revocato. Dal momento del deposito del corrispettivo presso la Cassa delle ammende, gli effetti del sequestro sui beni cessano definitivamente, salvo quanto previsto, ai fini della loro utilizzazione, dal quinto periodo del presente comma. Nel caso in cui il giudice disponga la confisca, essa ha ad oggetto esclusivamente le somme depositate ai sensi del primo periodo, che sono acquisite al Fondo unico giustizia, di cui all'articolo 61, comma 23, del decreto-legge 25 giugno 2008, n. 112, convertito, con modificazioni, dalla legge 6 agosto 2008, n. 133. In caso di revoca del sequestro o di mancata adozione del provvedimento di confisca, le somme sono immediatamente restituite ai commissari straordinari e dagli stessi utilizzabili per le finalita' di cui al capo VI del titolo III del decreto legislativo 8 luglio 1999, n. 270. Al fine di poter utilizzare il bene, dopo che la confisca e' divenuta definitiva, l'acquirente e i successivi aventi causa devono rispettare le prescrizioni impartite dal giudice ai sensi del terzo periodo del comma 1-bis.1 del presente articolo ovvero le misure adottate nell'ambito della procedura di riconoscimento dell'interesse strategico nazionale ai sensi del quinto periodo del medesimo comma 1-bis.1, salvo che il giudice dell'esecuzione accerti, su istanza dell'interessato, la cessazione dei rischi conseguenti alla libera disponibilita' del bene medesimo. Qualora la cessione avvenga nei casi previsti dal comma 1-octies, ultimo periodo, la confisca dei beni perde efficacia e si trasferisce sul corrispettivo versato ai sensi del primo periodo del presente comma, ferma l'applicazione del quinto periodo. (105) \n 1-decies. Per le finalita' di cui al comma 1-octies, lettera c), la verifica relativa all'attuazione delle misure indicate nell'ambito della procedura di interesse strategico nazionale e' effettuata da un comitato di cinque esperti, scelti tra soggetti di comprovata esperienza e competenza in materia di tutela dell'ambiente e della salute e di ingegneria impiantistica, nominato con decreto del Ministro dell'ambiente e della sicurezza energetica, adottato sentiti i Ministri delle imprese e del made in Italy, della salute e per gli affari europei, il Sud, le politiche di coesione e il PNRR, nonche' la regione nel cui territorio sono ubicati gli impianti o le infrastrutture. Con il decreto di cui al primo periodo, si provvede altresi' alla determinazione del compenso riconosciuto a ciascun componente del comitato, in ogni caso non superiore ad euro 50.000 in ragione d'anno, con oneri posti a carico esclusivo dei terzi gestori dell'impianto o dell'infrastruttura. Il Ministro dell'ambiente e della sicurezza energetica trasmette alla Camere una relazione sull'attivita' di verifica effettuata dal comitato di cui al primo periodo. (105)</p>","notesHtml":"<p>AGGIORNAMENTO (93)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 8 aprile 2020, n. 23, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica dei commi 1-bis e 1-quater del presente articolo dal 15 agosto 2020 al 1° settembre 2021.</p>\n<p>AGGIORNAMENTO (96)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 24 agosto 2021, n. 118, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica dei commi 1-bis e 1-quater del presente articolo dal 1° settembre 2021 al 16 maggio 2022.</p>\n<p>AGGIORNAMENTO (98)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 30 aprile 2022, n. 36, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica dei commi 1-bis e 1-quater del presente articolo dal 16 maggio 2022 al 15 luglio 2022.</p>\n<p>AGGIORNAMENTO (105)</p>\n<p>Il D.L. 13 giugno 2023, n. 69, convertito con modificazioni dalla L. 10 agosto 2023, n. 103, ha disposto (con l'art. 9-bis, comma 4) che &quot;Le disposizioni di cui ai commi 1, 2 e 3 si applicano anche ai provvedimenti di sequestro o di confisca aventi ad oggetto stabilimenti industriali o parti di essi dichiarati di interesse strategico nazionale ai sensi dell'articolo 1 del decreto-legge 3 dicembre 2012, n. 207, convertito, con modificazioni, dalla legge 24 dicembre 2012, n. 231, ovvero impianti o infrastrutture necessari ad assicurarne la continuita' produttiva, non ancora definitivi alla data di entrata in vigore della legge di conversione del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (111)</p>\n<p>La Corte Costituzionale con sentenza 7 maggio - 13 giugno 2024, n. 105 (in G.U. 1ªs.s.19/06/2024, n. 25) ha dichiarato &quot;l'illegittimita' costituzionale dell'art. 104-bis, comma 1-bis.1, quinto periodo, delle Norme di attuazione del codice di procedura penale, come introdotto dall'art. 6 del decreto-legge 5 gennaio 2023, n. 2 (Misure urgenti per impianti di interesse strategico nazionale), convertito, con modificazioni, nella legge 3 marzo 2023, n. 17, nella parte in cui non prevede che le misure ivi indicate si applichino per un periodo di tempo non superiore a trentasei mesi&quot;.</p>\n<p>AGGIORNAMENTO (118)</p>\n<p>La Corte Costituzionale con sentenza 27 febbraio - 4 aprile 2025, n. 38 (in G.U. 1ªs.s. 9/04/2025, n. 15) ha dichiarato &quot;l'illegittimita' costituzionale dell'art. 104-bis, comma 1-bis.2, delle Norme di attuazione del codice di procedura penale, limitatamente alle parole «Sull'appello avverso il provvedimento di cui al primo periodo decide, in composizione collegiale, il tribunale di Roma.»&quot;.</p>"},{"id":"art_105","numText":"Art. 105","group":"Norme","heading":"Registrazione e conservazione dei provvedimenti del giudice per le indagini preliminari","contentHtml":"<p>1. Con il regolamento previsto dall'articolo 206 comma 1 sono stabiliti i casi e le modalita' di registrazione e di custodia dei provvedimenti del giudice per le indagini preliminari.</p>","notesHtml":""},{"id":"art_106","numText":"Art. 106","group":"Norme","heading":"Informativa al giudice civile o amministrativo che ha redatto denuncia di reato","contentHtml":"<p>1. Nel caso previsto dall'articolo 331 comma 4 del codice, il procuratore della Repubblica informa senza ritardo il giudice civile o amministrativo delle richieste da lui formulate alla conclusione delle indagini preliminari.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107","group":"Norme","heading":"Attestazione della presentazione di denuncia o querela ovvero della  mancata identificazione dell'autore del reato","contentHtml":"<p>1. La persona che presenta una denuncia o che propone una querela ha diritto di ottenere attestazione della ricezione dall'autorita' davanti alla quale la denuncia o la querela e' stata presentata o proposta. L'attestazione puo' essere apposta in calce alla copia dell'atto. \n 2. Anche nel corso delle indagini preliminari, la persona offesa e il danneggiato dal reato possono ottenere dal pubblico ministero attestazione relativa alla mancata identificazione della persona alla quale il reato e' attribuito, sempre che cio' non pregiudichi l'esito delle indagini.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107-bis","group":"Norme","heading":"Denunce a carico di ignoti","contentHtml":"<p>1. Le denunce a carico di ignoti sono trasmesse all'ufficio di procura competente da parte degli organi di polizia, unitamente agli eventuali atti di indagine svolti per la identificazione degli autori del reato, con elenchi mensili.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107-ter","group":"Norme","heading":"Assistenza dell'interprete per la proposizione o presentazione di denuncia o querela","contentHtml":"<p>1. La persona offesa che non conosce la lingua italiana, se presenta denuncia o propone querela dinnanzi alla procura della Repubblica presso il tribunale del capoluogo del distretto, ha diritto di utilizzare una lingua a lei conosciuta. Negli stessi casi ha diritto di ottenere, previa richiesta, la traduzione in una lingua a lei conosciuta dell'attestazione di ricezione della denuncia o della querela.</p>","notesHtml":""},{"id":"art_108","numText":"Art. 108","group":"Norme","heading":"Denunce e altri documenti anonimi","contentHtml":"<p>1. Con regolamento del ministro di grazia e giustizia sono stabilite le modalita' di conservazione delle denunce anonime e degli altri documenti anonimi che non possono essere utilizzati nel procedimento.</p>","notesHtml":""},{"id":"art_108","numText":"Art. 108-bis","group":"Norme","heading":"Modalita' particolari di trasmissione della notizia di reato","contentHtml":"<p>1. Tiene luogo della comunicazione scritta la comunicazione della notizia di reato consegnata su supporto magnetico o trasmessa per via telematica. Nei casi di urgenza, le indicazioni e la documentazione previste dall'articolo 347 commi 1 e 2 del codice sono trasmesse senza ritardo. \n 2. Quando la comunicazione e' eseguita nelle forme previste dal comma 1, la polizia giudiziaria indica altresi' la data di consegna e di trasmissione.</p>","notesHtml":""},{"id":"art_108","numText":"Art. 108-ter","group":"Norme","heading":"Denunce e querele per reati commessi in altro Stato dell'Unione europea","contentHtml":"<p>1. Quando la persona offesa denunciante o querelante sia residente o abbia il domicilio nel territorio dello Stato, il procuratore della Repubblica trasmette al procuratore generale presso la Corte di appello le denunce o le querele per reati commessi in altri Stati dell'Unione europea, affinche' ne curi l'invio all'autorita' giudiziaria competente.</p>","notesHtml":""},{"id":"art_109","numText":"Art. 109","group":"Norme","heading":"Ricezione della notizia di reato","contentHtml":"<p>1. La segreteria della procura della Repubblica annota sugli atti che possono contenere notizia di reato la data e l'ora in cui sono pervenuti in ufficio e li sottopone immediatamente al procuratore della Repubblica per l'eventuale iscrizione nel registro delle notizie di reato.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110","group":"Norme","heading":"Richiesta dei certificati","contentHtml":"<p>1. Non appena il nome della persona alla quale il reato e' attribuito e' stato iscritto nel registro indicato nell'articolo 335 del codice, la segreteria richiede: \n a) i certificati anagrafici; \n b) il certificato previsto dall'articolo 688 del codice; \n c) il certificato del casellario dei carichi pendenti; \n c-bis) il certificato del casellario giudiziale europeo. \n 1-bis. Quando la persona alla quale il reato e' attribuito e' un apolide, una persona della quale e' ignota la cittadinanza, un cittadino di uno Stato non appartenente all'Unione europea ovvero un cittadino di uno Stato membro dell'Unione europea privo del codice fiscale o che e' attualmente, o e' stato in passato, titolare anche della cittadinanza di uno Stato non appartenente all'Unione europea, la segreteria acquisisce altresi', ove necessario, una copia del cartellino fotodattiloscopico e provvede, in ogni caso, ad annotare il codice univoco identificativo della persona nel registro di cui all'articolo 335 del codice. \n 2. COMMA ABROGATO DAL D.P.R. 14 NOVEMBRE 2002, N. 313.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110-bis","group":"Norme","heading":"Richiesta di comunicazione delle iscrizioni","contentHtml":"<p>1. Quando vi e' richiesta di comunicazione delle iscrizioni contenute nel registro delle notizie di reato a norma dell'articolo 335, comma 3, del codice, la segreteria della procura della Repubblica, se la risposta e' positiva e non sussistono gli impedimenti a rispondere di cui all'articolo 335, commi 3 e 3-bis del codice, fornisce le informazioni richieste precedute dalla formula: &quot;Risultano le seguenti iscrizioni suscettibili di comunicazione&quot;. In caso contrario, risponde con la formula: &quot;Non risultano iscrizioni suscettibili di comunicazione.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110-ter","group":"Norme","heading":"Informazione sulle iscrizioni","contentHtml":"<p>1. Il pubblico ministero, quando presenta una richiesta al giudice per le indagini preliminari, indica sempre la notizia di reato e il nome della persona a cui il reato e' attribuito.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110-quater","group":"Norme","heading":"Riferimenti alla persona iscritta nel registro delle notizie di reato contenuti nelle disposizioni civili e amministrative","contentHtml":"<p>1. Le disposizioni da cui derivano effetti pregiudizievoli in sede civile o amministrativa per la persona sottoposta a indagini devono intendersi nel senso che esse si applicano comunque alla persona nei cui confronti e' stata emessa una misura cautelare personale o e' stata esercitata l'azione penale.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111","group":"Norme","heading":"Requisiti della richiesta di autorizzazione a procedere","contentHtml":"<p>1. Con la richiesta di autorizzazione a procedere, il pubblico ministero enuncia il fatto per il quale intende procedere, indicando le norme di legge che si assumono violate, e fornisce all'autorita' competente gli elementi sui quali la richiesta si fonda.</p>","notesHtml":""},{"id":"art_112","numText":"Art. 112","group":"Norme","heading":"Attivita' della polizia giudiziaria in mancanza di una condizione di procedibilita","contentHtml":"<p>1. La polizia giudiziaria riferisce senza ritardo al pubblico ministero l'attivita' di indagine prevista dall'articolo 346 del codice. Se sussistono ragioni di urgenza o si tratta di taluno dei delitti indicati nell'articolo 407, comma 2, lettera a), numeri da 1) a 6)  la comunicazione e' data immediatamente anche in forma orale. La documentazione delle attivita' compiute e' prontamente trasmessa al pubblico ministero se questi ne fa richiesta.</p>","notesHtml":""},{"id":"art_113","numText":"Art. 113","group":"Norme","heading":"","contentHtml":"<p>Art 113 \n (Accertamenti urgenti della polizia giudiziaria) \n 1. Nei casi di particolare necessita' e urgenza, gli atti previsti dagli articoli 352 e 354 commi 2 e 3 del codice possono essere compiuti anche dagli agenti di polizia giudiziaria.</p>","notesHtml":""},{"id":"art_114","numText":"Art. 114","group":"Norme","heading":"","contentHtml":"<p>Art 114 \n (Avvertimento del diritto all'assistenza del difensore) \n 1. Nel procedere al compimento degli atti indicati nell'articolo 356 del codice, la polizia giudiziaria avverte la persona sottoposta alle indagini, se presente, che ha facolta' di farsi assistere dal difensore di fiducia.</p>","notesHtml":""},{"id":"art_115","numText":"Art. 115","group":"Norme","heading":"Annotazioni e verbali della polizia giudiziaria","contentHtml":"<p>1. Le annotazioni previste dall'articolo 357 comma 1 del codice contengono l'indicazione dell'ufficiale o dell'agente di polizia giudiziaria che ha compiuto le attivita' di indagine, del giorno, dell'ora e del luogo in cui sono state eseguite e la enunciazione succinta del loro risultato. Quando assume dichiarazioni ovvero quando per il compimento di atti si avvale di altre persone, la polizia giudiziaria annota altresi' le relative generalita' e le altre indicazioni personali utili per la identificazione. \n 1-bis. Le annotazioni di cui al comma 1, se riguardanti le attivita' di indagine condotte da ufficiali o agenti di polizia giudiziaria nel corso delle operazioni sotto copertura ai sensi dell'articolo 9 della legge 16 marzo 2006, n. 146, e successive modificazioni, contengono le generalita' di copertura dagli stessi utilizzate nel corso delle attivita' medesime. \n 2. Copia delle annotazioni e dei verbali redatti a norma dell'articolo 357 del codice e' conservata presso l'ufficio di polizia giudiziaria.</p>","notesHtml":""},{"id":"art_116","numText":"Art. 116","group":"Norme","heading":"Indagini sulla morte di una persona per la quale sorge sospetto di reato","contentHtml":"<p>1. Se per la morte di una persona sorge sospetto di reato, il procuratore della Repubblica accerta la causa della morte e, se lo ravvisa necessario, ordina l'autopsia secondo le modalita' previste dall'articolo 360 del codice ovvero fa richiesta di incidente probatorio, dopo aver compiuto le indagini occorrenti per l'identificazione. Trattandosi di persona sconosciuta, ordina che il cadavere sia esposto nel luogo pubblico a cio' designato e, occorrendo, sia fotografato; descrive nel verbale le vesti e gli oggetti rinvenuti con esso, assicurandone la custodia. Nei predetti casi la sepoltura non puo' essere eseguita senza l'ordine del procuratore della Repubblica. \n 2. Il disseppellimento di un cadavere puo' essere ordinato, con le dovute cautele, dall'autorita' giudiziaria se vi sono gravi indizi di reato.</p>","notesHtml":""},{"id":"art_117","numText":"Art. 117","group":"Norme","heading":"Accertamenti tecnici che modificano lo stato dei luoghi, delle cose o delle persone","contentHtml":"<p>1. Le disposizioni previste dall'articolo 360 del codice si applicano anche nei casi in cui l'accertamento tecnico determina modificazioni delle cose, dei luoghi o delle persone tali da rendere l'atto non ripetibile.</p>","notesHtml":""},{"id":"art_118","numText":"Art. 118","group":"Norme","heading":"Deposito di atti compiuti nel corso delle indagini preliminari","contentHtml":"<p>1. Gli atti compiuti nel corso delle indagini preliminari, ai quali i difensori hanno diritto di assistere, sono raccolti in fascicolo separato; sulla copertina del fascicolo e' segnata la data del deposito nella segreteria del pubblico ministero. Scaduto il termine fissato dalla legge, gli atti sono riuniti a quelli non depositati.</p>","notesHtml":""},{"id":"art_118","numText":"Art. 118-bis","group":"Norme","heading":"Coordinamento delle indagini","contentHtml":"<p>1. Il procuratore della Repubblica, quando procede a indagini per taluno dei delitti indicati nell'articolo 407, comma 2 lettera a) del codice , nonche' per i delitti di cui agli articoli 452-bis, 452-quater, 452-sexies e 452-octies del codice penale,, ne da' notizia al procuratore generale presso la corte di appello nonche' all'Agenzia delle entrate ai fini dei necessari accertamenti. Se rileva trattarsi di indagini collegate, il procuratore generale ne da' segnalazione ai procuratori generali e ai procuratori della Repubblica del distretto interessati al coordinamento.Il procuratore della Repubblica, quando procede a indagini per i delitti di cui agli articoli 452-bis, 452-quater, 452-sexies e 452-octies del codice penale e all'articolo 260 del decreto legislativo 3 aprile 2006, n. 152, e successive modificazioni, ne da' altresi' notizia al Procuratore nazionale antimafia. \n 2. Quando, di loro iniziativa o a seguito della segnalazione prevista dal comma 1, piu' uffici del pubblico ministero procedono a indagini collegate, i procuratori della Repubblica ne danno notizia al procuratore generale del rispettivo distretto. \n 3. Quando il coordinamento, di cui ai commi precedenti, non e' stato promosso o non risulta effettivo, il procuratore generale presso la corte di appello puo' riunire i procuratori della Repubblica che procedono a indagini collegate. Se i procuratori della Repubblica appartengono a distretti diversi, la riunione e' promossa dai procuratori generali presso le corti di appello interessate, di intesa tra loro.</p>","notesHtml":""},{"id":"art_119","numText":"Art. 119","group":"Norme","heading":"Annotazione di atti del pubblico ministero","contentHtml":"<p>1. Per le annotazioni previste dall'articolo 373 comma 3 del codice si applicano, in quanto compatibili, le disposizioni dell'articolo 115 comma 1.</p>","notesHtml":""},{"id":"art_120","numText":"Art. 120","group":"Norme","heading":"Adempimenti conseguenti all'arresto o al fermo","contentHtml":"<p>1. Agli adempimenti previsti dall'articolo 386 del codice possono provvedere anche ufficiali e agenti di polizia giudiziaria diversi da quelli che hanno eseguito l'arresto o il fermo. Se l'arresto o il fermo e' stato eseguito da agenti di polizia giudiziaria, questi provvedono a darne immediata notizia all'ufficiale di polizia giudiziaria competente ad adottare il provvedimento di liberazione previsto dall'articolo 389 comma 2 del codice.</p>","notesHtml":""},{"id":"art_121","numText":"Art. 121","group":"Norme","heading":"Liberazione dell'arrestato o del fermato","contentHtml":"<p>1. Oltre che nei casi previsti dall'articolo 389 del codice, il pubblico ministero dispone con decreto motivato che l'arrestato o il fermato sia posto immediatamente in liberta' quando ritiene di non dovere richiedere l'applicazione di misure coercitive. \n 2. Nel caso di liberazione prevista dal comma 1, il giudice, nel fissare l'udienza di convalida, ne da' avviso, senza ritardo, anche alla persona liberata.</p>","notesHtml":""},{"id":"art_122","numText":"Art. 122","group":"Norme","heading":"Trasmissione della richiesta di convalida","contentHtml":"<p>1. Con la richiesta di convalida prevista dall'articolo 390 del codice, il pubblico ministero trasmette al giudice il verbale di arresto o di fermo e copia della documentazione attestante che l'arrestato o il fermato e' stato tempestivamente condotto nel luogo di custodia; trasmette altresi' il decreto di fermo emesso a norma dell'articolo 384 comma 1 del codice.</p>","notesHtml":""},{"id":"art_123","numText":"Art. 123","group":"Norme","heading":"Luogo di svolgimento dell'udienza di convalida e dell'interrogatorio del detenuto","contentHtml":"<p>1. Salvo quanto previsto dall'art.121, nonche' dagli artt.449 comma 1 e 558 del codice, l'udienza di convalida si svolge nel luogo dove l'arrestato o il fermato e' custodito salvo che nel caso di custodia nel proprio domicilio o altro luogo di privata dimora. Nel medesimo luogo si svolge l'interrogatorio della persona che si trovi, a qualsiasi titolo, in stato di detenzione. Tuttavia, quando sussistono eccezionali motivi di necessita' o di urgenza il giudice con decreto motivato puo' disporre il trasferimento dell'arrestato, del fermato o del detenuto per la comparizione davanti a se'. Il procuratore capo della Repubblica predispone le necessarie misure organizzative per assicurare il rispetto dei termini di cui all'articolo 558 del codice.</p>","notesHtml":""},{"id":"art_124","numText":"Art. 124","group":"Norme","heading":"Ordinanza che accoglie la richiesta di incidente probatorio","contentHtml":"<p>1. Con l'ordinanza che accoglie la richiesta di incidente probatorio il giudice dispone la citazione delle persone che devono comparire per l'assunzione della prova. Quando occorre procedere a una perizia, con la stessa ordinanza il giudice nomina il perito.</p>","notesHtml":""},{"id":"art_125","numText":"Art. 125","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150","contentHtml":"","notesHtml":""},{"id":"art_126","numText":"Art. 126","group":"Norme","heading":"Avviso alla persona offesa della richiesta di archiviazione","contentHtml":"<p>1. Nel caso previsto dall'articolo 408 comma 2 del codice, il pubblico ministero trasmette gli atti al giudice per le indagini preliminari dopo la presentazione dell'opposizione della persona offesa ovvero dopo la scadenza del termine indicato nel comma 3 del medesimo articolo.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127","group":"Norme","heading":"Comunicazione delle notizie di reato al procuratore generale","contentHtml":"<p>1. La segreteria del pubblico ministero trasmette ogni mese al procuratore generale presso la corte di appello i dati di cui al comma 3 relativi ai procedimenti di seguito indicati, da raggrupparsi in distinti elenchi riepilogativi: \n a) procedimenti nei quali il pubblico ministero non ha esercitato l'azione penale o richiesto l'archiviazione, entro i termini previsti dall'articolo 407-bis, comma 2, del codice, salvo che il pubblico ministero abbia formulato richiesta di differimento ai sensi dell'articolo 415-ter, comma 2, del codice; in tale ultima ipotesi, i procedimenti sono inseriti nell'elenco solo in caso di rigetto della richiesta; \n b) procedimenti nei quali il pubblico ministero non ha assunto le determinazioni sull'azione penale nei termini fissati ai sensi dell'artic
