<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norme Att. c.p.p. – Codici Italiani</title>
<meta name="description" content="Norme di attuazione, di coordinamento e transitorie del codice di procedura penale.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0066CC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root { --code-color: #d35400; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 300px;
  --header-h: 58px;
  --sidebar-bg: #003F7F;
  --sidebar-hover: rgba(255,255,255,.12);
  --sidebar-active-bg: rgba(255,255,255,.20);
  --sidebar-text: #ffffff;
  --sidebar-muted: #d6e2f4;
  --sidebar-border: rgba(255,255,255,.18);
  --main-bg: #f7f8fc;
  --article-bg: #ffffff;
  --text: #1a1d2e;
  --muted: #6b7280;
  --border: #e4e7f0;
  --accent: var(--code-color, #2471a3);
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: "SF Mono", Consolas, "Courier New", monospace;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--main-bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── HEADER ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--sidebar-border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  z-index: 100;
}
.site-logo {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.site-logo:hover { color: #dce8ff; }
.header-sep { width: 1px; height: 28px; background: var(--sidebar-border); }
.header-title {
  font-size: .875rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.header-vigenza {
  font-size: .75rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  background: rgba(255,255,255,.06);
  padding: 3px 10px;
  border-radius: 20px;
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--sidebar-text);
  border-radius: 2px;
  transition: all .2s;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform .25s ease;
}
.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px;
  color: #fff;
  font-size: .82rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input::placeholder { color: var(--sidebar-muted); }
.sidebar-search input:focus { border-color: rgba(255,255,255,.3); }
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

.group-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sidebar-muted);
  padding: 14px 16px 6px;
}
.art-link {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
}
.art-link:hover { background: var(--sidebar-hover); }
.art-link.active {
  background: var(--sidebar-active-bg);
  border-left-color: var(--accent);
}
.art-link.hidden { display: none; }
.art-num {
  font-size: .78rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 56px;
  flex-shrink: 0;
}
.art-heading-mini {
  font-size: .78rem;
  color: var(--sidebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: .85;
}
.art-link.active .art-heading-mini { opacity: 1; }

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── ARTICLE CARD ── */
.article-card {
  background: var(--article-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 820px;
  width: 100%;
  padding: 44px 52px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.article-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: color-mix(in srgb, var(--accent) 10%, white);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 18px;
}
.article-num {
  font-family: var(--sans);
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 6px;
}
.article-heading {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.85;
  color: var(--text);
}
.article-body p {
  margin-bottom: 1.1em;
  text-align: justify;
  hyphens: auto;
}
.article-body p:last-child { margin-bottom: 0; }
.para-num {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 700;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, white);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  vertical-align: middle;
}
mark.ins {
  background: color-mix(in srgb, #2980b9 12%, white);
  color: #1a5276;
  border-radius: 2px;
  padding: 0 2px;
  font-style: italic;
}

/* Notes / Aggiornamento */
.article-notes {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}
.notes-toggle {
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.notes-toggle::before { content: '▶'; font-size: .6em; transition: transform .2s; }
.notes-toggle.open::before { transform: rotate(90deg); }
.notes-body {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.notes-body.visible { display: block; }
.notes-body p { margin-bottom: .7em; }

/* ── NAV FOOTER ── */
.nav-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 820px;
  width: 100%;
  margin-top: 20px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.article-counter {
  font-size: .8rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  max-width: 820px;
  width: 100%;
}
.empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .hamburger { display: flex; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,.4);
  }
  .main-content {
    margin-left: 0;
    padding: 20px 12px 60px;
  }
  .article-card { padding: 28px 22px; }
  .article-num { font-size: 1.5rem; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 49;
    display: none;
  }
  .overlay.visible { display: block; }
}

/* ── ACTION BUTTONS (WA + COPY) ── */
.article-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.action-btn:hover {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}
.action-btn.wa-btn:hover {
  background: #25D366;
  border-color: #25D366;
}
.action-btn .action-icon {
  font-size: 1rem;
  line-height: 1;
}
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  opacity: 0;
  transition: all .3s ease;
  z-index: 9999;
  pointer-events: none;
}
.copy-toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── SCROLLBAR ── */
* { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }

</style>
</head>

<script>const CODE = {
  title: "Norme di Attuazione del Codice di Procedura Penale",
  shortTitle: "Norme Att. c.p.p.",
  slug: "norme-att-codice-procedura-penale",
  vigenza: "17/12/2025",
  color: "#d35400",
  articles: [{"id":"art_1","numText":"Art. 1","group":"Norme di attuazione del Codice di Procedura Penale","heading":"Modalita' di determinazione della competenza per i procedimenti riguardanti i magistrati","contentHtml":"<p>1. Agli effetti di quanto stabilito dall'articolo 11 del codice, il distretto di corte d'appello nel cui capoluogo ha sede il giudice competente e' determinato sulla base della tabella A allegata alle presenti norme.</p>","notesHtml":""},{"id":"art_2","numText":"Art. 2","group":"Norme","heading":"Riunione di processi","contentHtml":"<p>1. Se piu' processi che possono essere riuniti a norma dell'articolo 17 del codice pendono davanti a diversi giudici o a diverse sezioni dello stesso ufficio giudiziario, il dirigente dell'ufficio o della sezione designa per la eventuale riunione il giudice o la sezione cui e' stato assegnato per primo uno dei processi, salvo che sussistano rilevanti esigenze di servizio ovvero la designazione possa pregiudicare la rapida definizione dei processi medesimi. In tali ultime ipotesi provvede con decreto motivato. \n 1-bis. Fermo quanto previsto dalla seconda parte del comma 1, nel caso indicato dall'articolo 17 comma 1-bis del codice il dirigente dell'ufficio o della sezione designa per l'eventuale riunione il giudice o la sezione che procede in composizione collegiale cui e' stato assegnato per primo uno dei processi. Se la riunione non viene disposta, gli atti sono restituiti.</p>","notesHtml":""},{"id":"art_3","numText":"Art. 3","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 20 FEBBRAIO 2006, N. 106","contentHtml":"","notesHtml":""},{"id":"art_3","numText":"Art. 3-bis","group":"Norme","heading":"Priorita' nella trattazione delle notizie di reato e nell'esercizio dell'azione penale","contentHtml":"<p>1. Nella trattazione delle notizie di reato e nell'esercizio dell'azione penale il pubblico ministero si conforma ai criteri di priorita' contenuti nel progetto organizzativo dell'ufficio.</p>","notesHtml":""},{"id":"art_4","numText":"Art. 4","group":"Norme","heading":"Contrasto tra pubblici ministeri","contentHtml":"<p>1. Quando ricorre l'ipotesi prevista dall'articolo 54 comma 2 del codice, il pubblico ministero trasmette immediatamente al procuratore generale presso la corte di appello o presso la corte di cassazione gli atti del procedimento in originale o in copia.</p>","notesHtml":""},{"id":"art_4","numText":"Art. 4-bis","group":"Norme","heading":"Formalita' delle richieste per la trasmissione a un diverso ufficio del pubblico ministero","contentHtml":"<p>1. La richiesta al procuratore generale di cui all'articolo 54-quater, comma 3, del codice, deve essere depositata presso la segreteria del medesimo, unitamente a copia della richiesta presentata al pubblico ministero. \n 2. Ai fini della determinazione dell'ufficio del pubblico ministero che deve procedere, il procuratore generale presso la corte di appello o presso la Corte di cassazione, verificata l'ammissibilita' della richiesta, puo' richiedere la trasmissione di copia degli atti del procedimento.</p>","notesHtml":""},{"id":"art_4","numText":"Art. 4-ter","group":"Norme","heading":"Nucleo di polizia penitenziaria a supporto delle funzioni del procuratore nazionale antimafia","contentHtml":"<p>1. Nell'esercizio delle funzioni di cui all'articolo 371-bis, commi 1 e 2, del codice e con specifico riferimento all'acquisizione, all'analisi ed all'elaborazione dei dati e delle informazioni provenienti dall'ambiente penitenziario, il procuratore nazionale antimafia e antiterrorismo si avvale di un apposito nucleo costituito, fino a un massimo di venti unita', nell'ambito del Corpo di polizia penitenziaria e composto da personale del medesimo Corpo.\nL'assegnazione al predetto nucleo non determina l'attribuzione di emolumenti aggiuntivi.</p>","notesHtml":""},{"id":"art_5","numText":"Art. 5","group":"Norme","heading":"Composizione delle sezioni di polizia giudiziaria","contentHtml":"<p>1. Le sezioni di polizia giudiziaria sono composte dagli ufficiali e dagli agenti di polizia giudiziaria della polizia di Stato, dell'arma dei carabinieri e del corpo della guardia di finanza nonche' del Corpo forestale dello Stato. \n 2. Quando lo richiedono particolari esigenze di specializzazione dell'attivita' di polizia giudiziaria, su richiesta del procuratore generale presso la corte di appello e del procuratore della Repubblica interessato, possono essere applicati presso le sezioni, con provvedimento delle amministrazioni di appartenenza, ufficiali e agenti di polizia giudiziaria di altri organi. Si osservano le disposizioni dell'articolo 8 in quanto applicabili. \n 3. Al personale indicato nel comma 2 si applicano le disposizioni dell'articolo 10.</p>","notesHtml":""},{"id":"art_6","numText":"Art. 6","group":"Norme","heading":"Costituzione dell'organico delle sezioni","contentHtml":"<p>1. L'organico delle sezioni di polizia giudiziaria e' costituito da personale in numero non inferiore al doppio di quello dei magistrati previsti nell'organico delle procure della Repubblica. 2. Almeno due terzi dell'organico sono riservati ad ufficiali di polizia giudiziaria. \n 3. Fermi restando i limiti previsti dai commi 1 e 2, entro il 15 gennaio di ogni biennio il ministro di grazia e giustizia, di concerto con i ministri dell'interno, della difesa e delle finanze, determina con decreto l'organico delle sezioni, tenuto conto delle esigenze connesse all'esercizio delle funzioni di polizia giudiziaria e sentito il procuratore generale presso la corte di appello interessato. Nel decreto e' fissato, per ogni sezione, il contingente assegnato a ciascuna forza di polizia, tenuto conto dei rispettivi organici. \n 4. Il personale applicato a norma dell'articolo 5 comma 2 non viene calcolato nell'organico delle sezioni.</p>","notesHtml":""},{"id":"art_7","numText":"Art. 7","group":"Norme","heading":"Ripianamento organico e posti vacanti","contentHtml":"<p>1. Le amministrazioni rispettivamente interessate provvedono al ripianamento organico entro novanta giorni dalla pubblicazione del decreto previsto dall'articolo 6 comma 3. \n 2. Quando si deve provvedere alla copertura delle vacanze, l'elenco di queste e' pubblicato senza ritardo sul bollettino dell'amministrazione interessata su richiesta del procuratore generale presso la corte di appello. \n 3. Nell'ipotesi indicata nel comma 2, l'amministrazione interessata provvede alla copertura entro novanta giorni dalla richiesta del procuratore generale.</p>","notesHtml":""},{"id":"art_8","numText":"Art. 8","group":"Norme","heading":"Assegnazione alle sezioni","contentHtml":"<p>1. Gli interessati alla assegnazione alle sezioni di polizia giudiziaria presentano domanda alla amministrazione di appartenenza entro trenta giorni dalla pubblicazione delle vacanze indicando, se lo ritengono, tre sedi di preferenza. \n 2. Le domande, con il parere dell'ufficio o comando da cui dipendono gli interessati, sono trasmesse senza ritardo al procuratore generale presso la corte di appello nel cui distretto e' stata dichiarata la vacanza. \n 3. Quando mancano le domande o queste sono in numero inferiore al triplo delle vacanze, ciascuna amministrazione indica al procuratore generale, individuato a norma del comma 2, coloro che possono essere presi in considerazione ai fini della assegnazione alle sezioni sino a raggiungere, tenendo conto anche delle eventuali domande, un numero triplo a quello delle vacanze. \n 4. Un terzo dei soggetti indicati dalla amministrazione di appartenenza deve avere svolto attivita' di polizia giudiziaria per almeno due anni nelle sezioni o nei servizi di polizia giudiziaria. \n 5. Per ogni candidato, l'amministrazione di appartenenza trasmette contestualmente copia della documentazione caratteristica. \n 6. L'assegnazione e' disposta senza ritardo con provvedimento dell'amministrazione di appartenenza su richiesta nominativa congiunta del procuratore generale presso la corte di appello e del procuratore della Repubblica interessato. \n 7. Non sono considerate le domande e le posizioni rispetto alle quali ricorrono divieti previsti da leggi o da regolamenti concernenti gli ordinamenti delle amministrazioni di appartenenza. <sup class=\"amd\">43</sup></p>\n<p>AGGIORNAMENTO (43) \n La L. 24 dicembre 2003, n. 350 ha disposto (con l'art. 3, comma 74) che il presente articolo si interpreta nel senso che la domanda prodotta dagli ufficiali e dagli agenti di polizia giudiziaria della Polizia di Stato, dell'Arma dei carabinieri e del Corpo della guardia di finanza e' da considerare, ai fini dell'applicazione della legge 10 marzo 1987, n. 100, come domanda di trasferimento di sede.</p>","notesHtml":""},{"id":"art_9","numText":"Art. 9","group":"Norme","heading":"Direzione e coordinamento delle sezioni","contentHtml":"<p>1. Il capo dell'ufficio presso cui e' istituita la sezione la dirige e ne coordina l'attivita' in relazione alle richieste formulate dai singoli magistrati a norma dell'articolo 58 del codice. \n 2. Per ciascuna forza di polizia che compone la sezione, l'ufficiale di polizia giudiziaria piu' elevato in grado o con qualifica superiore e' responsabile del personale appartenente alla propria amministrazione.</p>","notesHtml":""},{"id":"art_10","numText":"Art. 10","group":"Norme","heading":"Stato giuridico e carriera del personale delle sezioni","contentHtml":"<p>1. Lo stato giuridico e la carriera del personale delle sezioni sono disciplinati dagli ordinamenti delle amministrazioni di appartenenza. \n 2. Ai fini della compilazione della documentazione caratteristica del personale, nei casi previsti dai rispettivi ordinamenti, il capo dell'ufficio presso cui e' istituita la sezione fornisce elementi informativi che concorrono alla formazione della valutazione. \n 3. Il personale delle sezioni e' esonerato, quanto all'impiego, dai compiti e dagli obblighi derivanti dagli ordinamenti delle amministrazioni di apparte nenza non inerenti alle funzioni di polizia giudiziaria, salvo che per casi eccezionali o per esigenze di istruzione e addestrative, previo consenso del capo dell'ufficio presso il quale la sezione e' istituita.</p>","notesHtml":""},{"id":"art_11","numText":"Art. 11","group":"Norme","heading":"Trasferimenti del personale delle sezioni","contentHtml":"<p>1. I trasferimenti del personale della sezione di polizia giudiziaria sono disposti dall'amministrazione di appartenenza su proposta motivata del capo dell'ufficio presso cui e' istituita la sezione ovvero, su iniziativa della amministrazione, previo nulla osta del medesimo e del procuratore generale presso la corte di appello. \n 2. Qualora il trasferimento si renda necessario in relazione alla progressione in carriera, e' sufficiente il tempestivo avviso al capo dell'ufficio e al procuratore generale da parte dell'amministrazione.</p>","notesHtml":""},{"id":"art_12","numText":"Art. 12","group":"Norme","heading":"Servizi di polizia giudiziaria","contentHtml":"<p>1. Agli effetti di quanto previsto dall'articolo 56 del codice, sono servizi di polizia giudiziaria tutti gli uffici e le unita' ai quali e' affidato dalle rispettive amministrazioni o dagli organismi previsti dalla legge il compito di svolgere in via prioritaria e continuativa le funzioni indicate nell'articolo 55 del codice. \n 2. Entro il termine stabilito per l'entrata in vigore del codice, le amministrazioni o gli organismi dai quali dipendono i servizi indicati nel comma 1 comunicano al procuratore generale presso la corte di appello e al procuratore della Repubblica presso il tribunale il nome e il grado degli ufficiali che dirigono i servizi di polizia giudiziaria e specifici settori o articolazioni di questi. \n 3. Salvo quanto disposto dall'articolo 14, ogni variazione dell'elenco degli ufficiali indicati nel comma 2 deve essere comunicata senza ritardo.</p>\n<p>--------------- \nNota redazionale \n Il testo del presente articolo e' gia' integrato con le correzioni apportate dall'avviso di rettifica pubblicato in G.U. 16/08/1989, n. 190 durante il periodo di &quot;vacatio legis&quot;. \n E' possibile visualizzare il testo originario accedendo alla versione pdf della relativa Gazzetta di pubblicazione.</p>","notesHtml":""},{"id":"art_13","numText":"Art. 13","group":"Norme","heading":"Servizi operanti in ambito piu' vasto del circondario","contentHtml":"<p>1. Quando i servizi di polizia giudiziaria sono costituiti per attivita' da svolgere in ambito territoriale piu' vasto del circondario, l'ufficiale preposto e' responsabile verso il procuratore generale del distretto dove ha sede il servizio.</p>","notesHtml":""},{"id":"art_14","numText":"Art. 14","group":"Norme","heading":"Allontanamento dei dirigenti dei servizi","contentHtml":"<p>1. Per allontanare anche provvisoriamente dalla sede o assegnare ad altri uffici i dirigenti dei servizi di polizia giudiziaria o di specifici settori o articolazioni di questi, le amministrazioni dalle quali essi dipendono devono ottenere il consenso del procuratore generale presso la corte di appello e del procuratore della Repubblica presso il tribunale. \n 2. Il diniego deve essere motivato. Qualora l'allontanamento si renda necessario ai fini della progressione in carriera, il consenso non puo' essere negato.</p>","notesHtml":""},{"id":"art_15","numText":"Art. 15","group":"Norme","heading":"Promozioni","contentHtml":"<p>1. Le promozioni degli addetti alle sezioni di polizia giudiziaria non possono essere disposte senza il parere favorevole del procuratore generale presso la corte di appello e del capo dell'ufficio presso cui e' istituita la sezione. \n 2. Le promozioni degli ufficiali che dirigono i servizi o specifici settori o articolazioni di questi non possono essere disposte senza il parere favorevole del procuratore generale presso la corte di appello e del procuratore della Repubblica presso il tribunale. \n 3. Le disposizioni dei commi 1 e 2 si applicano anche quando l'ufficiale o l'agente ha cessato dalle funzioni di polizia giudiziaria da non piu' di due anni.</p>","notesHtml":""},{"id":"art_16","numText":"Art. 16","group":"Norme","heading":"Sanzioni disciplinari","contentHtml":"<p>1. Gli ufficiali e gli agenti di polizia giudiziaria che senza giustificato motivo omettono di riferire nel termine previsto all'autorita' giudiziaria la notizia del reato, che omettono o ritardano l'esecuzione di un ordine dell'autorita' giudiziaria o lo eseguono soltanto in parte o negligentemente o comunque violano ogni altra disposizione di legge relativa all'esercizio delle funzioni di polizia giudiziaria, sono soggetti alla sanzione disciplinare della censura e, nei casi piu' gravi, alla sospensione dall'impiego per un tempo non eccedente sei mesi. \n 2. Nei confronti degli ufficiali e degli agenti indicati nell'articolo 56 comma 1 lettera b) del codice puo' essere altresi' disposto l'esonero dal servizio presso le sezioni. \n 3. Fuori delle trasgressioni previste dal comma 1, gli ufficiali e gli agenti di polizia giudiziaria rimangono soggetti alle sanzioni disciplinari stabilite dai propri ordinamenti.</p>","notesHtml":""},{"id":"art_17","numText":"Art. 17","group":"Norme","heading":"Procedimento disciplinare","contentHtml":"<p>1. L'azione disciplinare e' promossa dal procuratore generale presso la corte di appello nel cui distretto l'ufficiale o l'agente presta servizio. Dell'inizio dell'azione disciplinare e' data comunicazione all'amministrazione dalla quale dipende l'ufficiale o l'agente di polizia giudiziaria. \n 2. L'addebito e' contestato all'incolpato per iscritto. La contestazione indica succintamente il fatto e la specifica trasgressione della quale l'incolpato e' chiamato a rispondere. Essa e' notificata all'incolpato e contiene l'avviso che, fino a cinque giorni prima dell'udienza, egli puo' presentare memorie, produrre documenti e richiedere l'audizione di testimoni. \n 3. Competente a giudicare e' una commissione composta: \n a) da un presidente di sezione della corte di appello che la presiede e da un magistrato di tribunale, nominati ogni due anni dal consiglio giudiziario; \n b) da un ufficiale di polizia giudiziaria, scelto, a seconda dell'appartenenza dell'incolpato, fra tre ufficiali di polizia giudiziaria nominati ogni due anni rispettivamente dal questore, dal comandante di legione dei carabinieri e dal comandante di zona della guardia di finanza. Se l'incolpato non appartiene alla polizia di Stato, ai carabinieri o alla guardia di finanza, a comporre la commissione e' invece chiamato un ufficiale di polizia giudiziaria appartenente alla stessa amministrazione dell'incolpato e nominato ogni due anni dagli organi che la rappresentano. \n 4. Nel procedimento disciplinare si osservano, in quanto applicabili, le disposizioni dell'articolo 127 del codice. L'accusa e' esercitata dal procuratore generale che ha promosso l'azione disciplinare o da un suo sostituto. L'incolpato ha facolta' di nominare un difensore scelto tra gli appartenenti alla propria amministrazione ovvero tra gli avvocati e i procuratori iscritti negli albi professionali. In mancanza di tale nomina, il presidente della commissione designa un difensore di ufficio individuato secondo le modalita' previste dall'articolo 97 del codice. \n 5. Il procuratore generale presso la corte di appello comunica i provvedimenti all'amministrazione di appartenenza dell'ufficiale o agente di polizia giudiziaria nei cui confronti e' stata promossa l'azione disciplinare.</p>","notesHtml":""},{"id":"art_18","numText":"Art. 18","group":"Norme","heading":"Ricorso","contentHtml":"<p>1. Contro la decisione emessa a norma dell'articolo 17 l'incolpato e il procuratore generale presso la corte di appello possono proporre ricorso a una commissione che ha sede presso il ministero di grazia e giustizia ed e' composta: \n a) da un magistrato della corte di cassazione che la presiede e da un magistrato che esercita funzioni di appello, nominati ogni quattro anni dal Consiglio superiore della magistratura; \n b) da un ufficiale di polizia giudiziaria scelto, a seconda dell'appartenenza dell'incolpato, fra i tre nominati ogni quattro anni rispettivamente dal capo della polizia e dai comandanti generali dei carabinieri e della guardia di finanza. Se l'incolpato non appartiene alla polizia di Stato, ai carabinieri o alla guardia di finanza, a comporre la commissione e' chiamato un ufficiale di polizia giudiziaria appartenente alla stessa amministrazione dell'incolpato e nominato ogni quattro anni dagli organi che la rappresentano. \n 2. L'accusa e' esercitata da un magistrato della procura generale presso la corte di cassazione. \n 3. L'incolpato ha facolta' di nominare un difensore scelto tra gli avvocati e i procuratori iscritti negli albi professionali. In mancanza di tale nomina, il presidente della commissione designa un difensore di ufficio individuato secondo le modalita' previste dall'articolo 97 del codice. \n 4. La decisione e' immediatamente trasmessa per l'esecuzione all'amministrazione cui appartiene l'ufficiale o l'agente. \n 5. Contro la decisione l'incolpato e il procuratore generale presso la corte di cassazione possono proporre ricorso per cassazione per violazione di legge. Il ricorso non sospende l'esecuzione della decisione. Si osservano le disposizioni dell'articolo 611 del codice, in quanto applicabili. <sup class=\"amd\">29</sup></p>\n<p>AGGIORNAMENTO (29) \n La Corte Costituzionale, con sentenza 25 novembre-4 dicembre 1998, n. 394, (in G.U. 1a s.s. 9/12/1998, n. 49) ha dichiarato l'illegittimita' costituzionale del comma 5 del presente articolo.</p>","notesHtml":""},{"id":"art_19","numText":"Art. 19","group":"Norme","heading":"Sospensione cautelare","contentHtml":"<p>1. Le commissioni previste dagli articoli 17 e 18 possono disporre la sospensione cautelare dell'ufficiale o dell'agente dalle funzioni di polizia giudiziaria.</p>","notesHtml":""},{"id":"art_20","numText":"Art. 20","group":"Norme","heading":"Disposizione transitoria","contentHtml":"<p>1. Il personale di polizia giudiziaria attualmente operante presso gli uffici giudiziari e' mantenuto nelle sue funzioni fino a che non siano costituite per la prima volta le sezioni di polizia giudiziaria. \n 2. Per la prima costituzione delle sezioni di polizia giudiziaria, il decreto previsto dall'articolo 6 comma 3 e' emesso non oltre un mese prima della data di entrata in vigore del codice. \n 3. Il personale e' assegnato alle sezioni a norma degli articoli 7 e 8; tuttavia, al ripianamento si provvede entro trenta giorni dal decreto indicato nel comma 2 e alla assegnazione si provvede non oltre i sessanta giorni successivi.</p>","notesHtml":""},{"id":"art_21","numText":"Art. 21","group":"Norme","heading":"Notizie da chiedere all'imputato nel primo atto cui egli e' presente","contentHtml":"<p>1. Quando procede a norma dell'articolo 66 del codice, il giudice o il pubblico ministero invita l'imputato o la persona sottoposta alle indagini a dichiarare se ha un soprannome o uno pseudonimo, se ha beni patrimoniali e quali sono le sue condizioni di vita individuale, familiare e sociale. Lo invita inoltre a dichiarare se e' sottoposto ad altri processi penali, se ha riportato condanne nello Stato o all'estero e, quando ne e' il caso, se esercita o ha esercitato uffici o servizi pubblici o servizi di pubblica necessita' e se ricopre o ha ricoperto cariche pubbliche.</p>","notesHtml":""},{"id":"art_22","numText":"Art. 22","group":"Norme","heading":"Comparizione delle persone in stato di arresto o detenzione domiciliare","contentHtml":"<p>1. Quando una persona in stato di arresto o detenzione domiciliare deve comparire per ragioni di giustizia davanti all'autorita' giudiziaria, il giudice competente a norma dell'articolo 279 del codice ovvero il magistrato di sorveglianza del luogo dove si svolge la detenzione, se non ritiene di dover disporre l'accompagnamento o la traduzione per salvaguardare comprovate esigenze processuali o di sicurezza, autorizza l'allontanamento dal luogo di arresto o di detenzione per il tempo strettamente necessario. In tal caso detta le opportune prescrizioni e da' comunicazione del provvedimento all'ufficio di polizia giudiziaria territorialmente competente. Il giudice per le indagini preliminari provvede sentito il pubblico ministero. \n 2. L'autorizzazione prevista dal comma 1 puo' essere concessa anche quando la traduzione sia stata disposta da altra autorita' giudiziaria davanti alla quale la persona deve comparire.</p>","notesHtml":""},{"id":"art_23","numText":"Art. 23","group":"Norme","heading":"Assenza delle parti private diverse dall'imputato","contentHtml":"<p>1. L'assenza delle parti private diverse dall'imputato regolarmente citate non determina la sospensione o il rinvio del dibattimento, ne' la nuova fissazione della udienza preliminare a norma degli articoli 420-bis e 420-ter del codice. \n 2. Fermo quanto previsto dall'articolo 82 comma 2 del codice, nel caso di mancata comparizione delle parti private diverse dall'imputato, la sentenza e' notificata alle stesse per estratto unitamente all'avviso di deposito della sentenza.</p>","notesHtml":""},{"id":"art_24","numText":"Art. 24","group":"Norme","heading":"Nomina di piu' difensori","contentHtml":"<p>1. La nomina di ulteriori difensori si considera senza effetto finche' la parte non provvede alla revoca delle nomine precedenti che risultano in eccedenza rispetto al numero previsto dagli articoli 96, 100 e 101 del codice.</p>","notesHtml":""},{"id":"art_25","numText":"Art. 25","group":"Norme","heading":"Divieto di consigli circa la scelta del difensore di fiducia","contentHtml":"<p>1. Costituisce grave infrazione disciplinare per gli ufficiali e gli agenti di polizia giudiziaria e per tutti i dipendenti dell'amministrazione degli istituti di prevenzione e di pena dare consigli sulla scelta del difensore di fiducia.</p>","notesHtml":""},{"id":"art_26","numText":"Art. 26","group":"Norme","heading":"Nomina del difensore nei casi di uso di lingua diversa dall'italiano","contentHtml":"<p>1. Anche nei casi di uso di lingua diversa dall'italiano nel procedimento, l'imputato e le altre parti private hanno il diritto di nominare il difensore senza alcun limite derivante dall'appartenenza etnica o linguistica dello stesso. \n 2. Nei casi previsti dall'articolo 109 comma 2 del codice, quando cio' serve ad assicurare l'effettivita' della difesa, l'autorita' giudiziaria, nell'individuare il difensore di ufficio o nel designare il sostituto del difensore a norma dell'articolo 97 comma 4 del codice, tiene conto dell'appartenenza etnica o linguistica dell'imputato.</p>","notesHtml":""},{"id":"art_27","numText":"Art. 27","group":"Norme","heading":"Documentazione della qualita' di difensore","contentHtml":"<p>1. Quando e' richiesto, il difensore documenta la sua qualita' esibendo: \n a) la certificazione della nomina fatta con dichiarazione orale all'autorita' procedente; \n b) la copia della nomina recante l'attestazione dell'avvenuto deposito, nel caso di consegna da parte del difensore; \n c) la copia della nomina, certificata conforme all'originale da parte del difensore, e l'originale della ricevuta postale, nel caso di trasmissione a mezzo di raccomandata; \n d) la copia del verbale o dell'avviso indicati nell'articolo 30, nel caso di nomina di ufficio.</p>","notesHtml":""},{"id":"art_28","numText":"Art. 28","group":"Norme","heading":"Comunicazione del nominativo del difensore di ufficio","contentHtml":"<p>1. Il nominativo del difensore di ufficio e' comunicato senza ritardo all'imputato con l'avvertimento che puo' essere nominato, in qualunque momento, un difensore di fiducia. \n 1-bis. Contestualmente sono comunicati i recapiti, anche telefonici e telematici, del difensore.</p>","notesHtml":""},{"id":"art_29","numText":"Art. 29","group":"Norme","heading":"Elenchi e tabelle dei difensori di ufficio","contentHtml":"<p>1. Il Consiglio nazionale forense predispone e aggiorna, con cadenza trimestrale, l'elenco alfabetico degli avvocati iscritti negli albi, disponibili ad assumere le difese d'ufficio. \n 1-bis. L'inserimento nell'elenco di cui al comma 1 e' disposto sulla base di almeno uno dei seguenti requisiti: \n a) partecipazione a un corso biennale di formazione e aggiornamento professionale in materia penale, organizzato dal Consiglio dell'ordine circondariale o da una Camera penale territoriale o dall'Unione delle Camere penali, della durata complessiva di almeno 90 ore e con superamento di esame finale; \n b) iscrizione all'albo da almeno cinque anni ed esperienza nella materia penale, comprovata dalla produzione di idonea documentazione; \n c) conseguimento del titolo di specialista in diritto penale, secondo quanto previsto dall'articolo 9 della legge 31 dicembre 2012, n. 247. \n 1-ter. La domanda di inserimento nell'elenco nazionale di cui al comma 1 e' presentata al Consiglio dell'ordine circondariale di appartenenza, che provvede alla trasmissione degli atti, con allegato parere, al Consiglio nazionale forense. Avverso la decisione di rigetto della domanda e' ammessa opposizione ai sensi dell'articolo 7 del decreto del Presidente della Repubblica 24 novembre 1971, n. 1199. \n 1-quater. Ai fini della permanenza nell'elenco dei difensori d'ufficio sono condizioni necessarie: \n a) non avere riportato sanzioni disciplinari definitive superiori all'ammonimento; \n b) l'esercizio continuativo di attivita' nel settore penale comprovato dalla partecipazione ad almeno dieci udienze camerali o dibattimentali per anno, escluse quelle di mero rinvio. \n 1-quinquies. Il professionista iscritto nell'elenco nazionale deve presentare, con cadenza annuale, la relativa documentazione al Consiglio dell'ordine circondariale, che la inoltra, con allegato parere, al Consiglio nazionale forense. In caso di mancata presentazione della documentazione, il professionista e' cancellato d'ufficio dall'elenco nazionale. \n 1-sexies. I professionisti iscritti all'elenco nazionale non possono chiedere la cancellazione dallo stesso prima del termine di due anni. \n 2. E' istituito presso l'ordine forense di ciascun capoluogo del distretto di corte d'appello un apposito ufficio con recapito centralizzato che, mediante linee telefoniche dedicate, fornisce i nominativi dei difensori d'ufficio a richiesta dell'autorita' giudiziaria o della polizia giudiziaria. Non si ricorre al sistema informatizzato se il procedimento concerne materie che riguardano competenze specifiche. \n 3. L'ufficio di cui al comma 2 gestisce separatamente gli elenchi dei difensori d'ufficio di ciascun ordine forense esistente nel distretto di corte d'appello. \n 4. Il sistema informatizzato di cui al comma 2 deve garantire: \n a) che l'indicazione dei nominativi rispetti un criterio di rotazione automatico tra gli iscritti nell'elenco di cui al comma 1; \n b) che sia evitata l'attribuzione contestuale di nomine, ad un unico difensore, per procedimenti pendenti innanzi ad autorita' giudiziarie e di polizia distanti tra di loro e, comunque, dislocate in modo da non permettere l'effettivita' della difesa; \n c) l'istituzione di un turno differenziato, per gli indagati e gli imputati detenuti o arrestati all'estero in esecuzione di mandato di arresto europeo nell'ambito di procedura attiva di consegna, al fine di agevolare la tempestiva nomina di un difensore che assista quello officiato nello Stato di esecuzione, che assicuri, attraverso un criterio di rotazione giornaliera dei nominativi, la reperibilita' di un numero di difensori d'ufficio corrispondente alle esigenze. \n 5. L'autorita' giudiziaria e, nei casi previsti, la polizia giudiziaria, individuano il difensore richiedendone il nominativo all'ufficio di cui al comma 2. \n 6. Il presidente del consiglio dell'ordine forense o un componente da lui delegato vigila sul rispetto dei criteri per l'individuazione e la designazione del difensore d'ufficio. \n 7. I difensori inseriti nei turni giornalieri di cui al comma 4, lettera c), hanno l'obbligo della reperibilita'. \n 8. COMMA ABROGATO DALLA L. 6 MARZO 2001, N. 60. \n 9. COMMA ABROGATO DALLA L. 6 MARZO 2001, N. 60.</p>","notesHtml":""},{"id":"art_30","numText":"Art. 30","group":"Norme","heading":"Comunicazione al difensore di ufficio","contentHtml":"<p>1. Al difensore di ufficio e' data comunicazione della individuazione effettuata a norma dell'articolo 97 comma 3 del codice. \n 2. Allo stesso modo e' comunicata la designazione al sostituto nei casi previsti dall'articolo 97 comma 4 del codice. \n 3. Nel caso previsto dall'articolo 97 comma 5 del codice, il difensore di ufficio che si trova nell'impossibilita' di adempiere l'incarico e non ha nominato un sostituto deve avvisare immediatamente l'autorita' giudiziaria, indicandone le ragioni, affinche' si provveda alla sostituzione.</p>","notesHtml":""},{"id":"art_31","numText":"Art. 31","group":"Norme","heading":"Diritto alla retribuzione del difensore di ufficio","contentHtml":"<p>1. Fermo quanto previsto dalle norme sul gratuito patrocinio, l'attivita' del difensore di ufficio e' in ogni caso retribuita.</p>","notesHtml":""},{"id":"art_32","numText":"Art. 32","group":"Norme","heading":"Recupero dei crediti professionali","contentHtml":"<p>1. Le procedure intraprese per il recupero dei crediti professionali vantati dai difensori d'ufficio nei confronti degli indagati, degli imputati e dei condannati inadempienti sono esenti da bolli, imposte e spese. \n 2. COMMA ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115. \n 3. COMMA ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115.</p>","notesHtml":""},{"id":"art_32","numText":"Art. 32-bis","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_33","numText":"Art. 33","group":"Norme","heading":"Domicilio della persona offesa","contentHtml":"<p>1. Il domicilio della persona offesa dal reato che abbia nominato un difensore si intende eletto presso quest'ultimo.</p>","notesHtml":""},{"id":"art_34","numText":"Art. 34","group":"Norme","heading":"Designazione del sostituto del difensore","contentHtml":"<p>1. Il difensore designa il sostituto nelle forme indicate nell'articolo 96 comma 2 del codice.</p>","notesHtml":""},{"id":"art_35","numText":"Art. 35","group":"Norme","heading":"Corrispondenza e colloqui telefonici del difensore con l'imputato","contentHtml":"<p>1. Ai fini di quanto previsto dall'articolo 103 comma 6 del codice, la busta della corrispondenza tra l'imputato e il suo difensore deve riportare: \n a) il nome e il cognome dell'imputato; \n b) il nome, il cognome e la qualifica professionale del difensore; \n c) la dicitura &quot;corrispondenza per ragioni di giustizia&quot; con la sottoscrizione del mittente e l'indicazione del procedimento cui la corrispondenza si riferisce. \n 2. Quando mittente e' il difensore, la sottoscrizione e' autenticata dal presidente del consiglio dell'ordine forense di appartenenza o da un suo delegato. \n 3. Se l'imputato e' detenuto, l'autorita' che ne ha la custodia appone il proprio timbro o firma sulla busta chiusa che gia' reca le indicazioni suddette, senza che cio' ritardi l'inoltro della corrispondenza. \n 4. Alla corrispondenza tra l'imputato detenuto e il suo difensore, recante le indicazioni stabilite nei commi 1 e 2, non si applicano le disposizioni dell'articolo 18 commi 8 e 9 della legge 26 luglio 1975 n. 354 e degli articoli 20 comma 1 e 36 commi 7 e 8 del decreto del Presidente della Repubblica 29 aprile 1976 n. 431. \n 5. Ai fini di quanto previsto dall'articolo 103 comma 5 del codice, quando sono autorizzati colloqui telefonici tra l'imputato detenuto e il suo difensore, come risultante dall'indicazione del relativo procedimento, non si applica la disposizione dell'articolo 37 comma 8 del decreto del Presidente della Repubblica 29 aprile 1976 n. 431.</p>","notesHtml":""},{"id":"art_36","numText":"Art. 36","group":"Norme","heading":"Accesso del difensore al luogo di custodia","contentHtml":"<p>1. Per conferire con la persona fermata, arrestata o sottoposta a custodia cautelare, il difensore ha diritto di accedere ai luoghi in cui la persona stessa si trova custodita. \n 2. A tale fine la qualita' di difensore, che non risulti in qualsiasi modo all'autorita' che esercita la custodia, e' documentata a norma dell'articolo 27 o con altro mezzo equipollente. \n 3. Quando e' disposta la dilazione prevista dall'articolo 104 commi 3 e 4 del codice, copia del relativo decreto e' consegnata a chi esercita la custodia ed e' da questi esibita all'arrestato, al fermato, alla persona sottoposta a custodia cautelare o al difensore che richiedono il colloquio.</p>","notesHtml":""},{"id":"art_37","numText":"Art. 37","group":"Norme","heading":"Procura speciale rilasciata in via preventiva","contentHtml":"<p>1. La procura speciale prevista dall'articolo 122 del codice puo' essere rilasciata anche preventivamente, per l'eventualita' in cui si verifichino i presupposti per il compimento dell'atto al quale la procura si riferisce.</p>","notesHtml":""},{"id":"art_38","numText":"Art. 38","group":"Norme","heading":"ARTICOLO ABROGATO DALLA L. 7 DICEMBRE 2000, N. 397","contentHtml":"","notesHtml":""},{"id":"art_39","numText":"Art. 39","group":"Norme","heading":"Autenticazione della sottoscrizione di atti","contentHtml":"<p>1. Fermo quanto previsto da speciali disposizioni, l'autenticazione della sottoscrizione di atti per i quali il codice prevede tale formalita' puo' essere effettuata, oltre che dal funzionario di cancelleria, dal notaio, dal difensore, dal sindaco, da un funzionario delegato dal sindaco, dal segretario comunale, dal giudice conciliatore, dal presidente del consiglio dell'ordine forense o da un consigliere da lui delegato.</p>","notesHtml":""},{"id":"art_40","numText":"Art. 40","group":"Norme","heading":"","contentHtml":"<p>Art 40 \n (Copia dell'atto che surroga l'originale mancante) \n 1. Nel caso previsto dall'articolo 112 comma 1 del codice, la cancelleria attesta sulla copia autentica dell'atto che si tratta di copia che tiene luogo, ad ogni effetto, dell'originale distrutto, smarrito o sottratto.</p>","notesHtml":""},{"id":"art_41","numText":"Art. 41","group":"Norme","heading":"Atto ricostituito","contentHtml":"<p>1. Quando si procede a norma dell'articolo 113 commi 1 e 2 del codice, sull'atto ricostituito sono indicati gli estremi dell'ordinanza che ha disposto la ricostituzione.</p>","notesHtml":""},{"id":"art_42","numText":"Art. 42","group":"Norme","heading":"Trasmissione a distanza di copia di atti","contentHtml":"<p>1. Il rilascio di copie di atti del procedimento, nei casi previsti dalla legge, puo' avvenire mediante la trasmissione a distanza con mezzi tecnici idonei, previo accertamento della legittimazione del richiedente. In tal caso l'ufficio presso il quale l'atto si trova attesta, in calce ad esso, di aver trasmesso il testo originale.</p>","notesHtml":""},{"id":"art_43","numText":"Art. 43","group":"Norme","heading":"Autorizzazione al rilascio di copia di atti","contentHtml":"<p>1. L'autorizzazione prevista dall'articolo 116 comma 2 del codice non e' richiesta nei casi in cui e' riconosciuto espressamente al richiedente il diritto al rilascio di copie, estratti o certificati di atti.</p>","notesHtml":""},{"id":"art_44","numText":"Art. 44","group":"Norme","heading":"Comunicazione delle dichiarazioni e richieste di persone detenute o internate","contentHtml":"<p>1. Le impugnazioni, le richieste e le altre dichiarazioni previste dall'articolo 123 del codice sono comunicate nel giorno stesso, o al piu' tardi nel giorno successivo, all'autorita' giudiziaria competente mediante estratto o copia autentica, anche per mezzo di lettera raccomandata. Nei casi di speciale urgenza, la comunicazione puo' avvenire anche con telegramma confermato da lettera raccomandata ovvero mediante l'uso di altri mezzi tecnici idonei. In tal caso l'ufficio presso il quale l'atto si trova attesta, in calce ad esso, di aver trasmesso il testo originale.</p>","notesHtml":""},{"id":"art_45","numText":"Art. 45","group":"Norme","heading":"Relazione nel procedimento in camera di consiglio","contentHtml":"<p>1. Nel procedimento in camera di consiglio davanti alle corti e ai tribunali, la relazione orale e' svolta, appena compiuti gli atti introduttivi, da un componente del collegio previamente designato dal presidente.</p>","notesHtml":""},{"id":"art_45","numText":"Art. 45-bis","group":"Norme","heading":"Partecipazione al procedimento in camera di consiglio a distanza","contentHtml":"<p>1. la partecipazione dell'imputato o del condannato all'udienza procedimento in camera di consiglio avviene a distanza nei casi e secondo quanto previsto dall'articolo 146-bis, commi 1, 1-bis, 1-ter e 1-quater. (76) (83) \n 2. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 3. Si applicano, in quanto compatibili, le disposizioni previste dall'articolo 146-bis, comma 4-bis, e dall'articolo 133-ter del codice. (27) (33) (76) (83)</p>","notesHtml":"<p>AGGIORNAMENTO (27)</p>\n<p>La L. 7 gennaio 1998, n. 11 ha disposto (con l'art. 6, comma 1) che la suddetta modifica ha efficacia dal 31 dicembre 2000.</p>\n<p>AGGIORNAMENTO (33)</p>\n<p>La L. 7 gennaio 1998, n. 11, come modificata dal D.L. 24 novembre 2000, n. 341, convertito con modificazioni dalla L. 19 gennaio 2001, n. 4, ha disposto (con l'art. 6, comma 1) che le modifiche dalla stessa introdotte hanno efficacia dal 31 dicembre 2002.</p>\n<p>AGGIORNAMENTO (76)</p>\n<p>La L. 23 giugno 2017, n. 103, ha disposto (con l'art. 1, comma 81) che &quot;Le disposizioni di cui ai commi 77, 78, 79 e 80 acquistano efficacia decorso un anno dalla pubblicazione della presente legge nella Gazzetta Ufficiale, fatta eccezione per le disposizioni di cui al comma 77, relativamente alle persone che si trovano in stato di detenzione per i delitti di cui agli articoli 270-bis, primo comma, e 416-bis, secondo comma, del codice penale, nonche' di cui all'articolo 74, comma 1, del testo unico di cui al decreto del Presidente della Repubblica 9 ottobre 1990, n. 309, e successive modificazioni&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, nel modificare l'art. 1, comma 78 della L. 23 giugno 2017, n. 103, ha conseguentemente disposto (con l'art. 2, comma 2) che &quot;L'efficacia delle disposizioni di cui all'articolo 1, commi 77, 78, 79 e 80, della legge 23 giugno 2017, n. 103, fatta salva l'eccezione di cui al comma 81 dello stesso articolo 1 per le persone che si trovano in stato di detenzione per i delitti ivi indicati, e' sospesa dalla data di entrata in vigore del presente decreto fino al 15 febbraio 2019&quot;.</p>"},{"id":"art_45","numText":"Art. 45-ter","group":"Norme","heading":"Giudice competente in ordine all'accesso alla giustizia riparativa","contentHtml":"<p>1. A seguito dell'emissione del decreto di citazione diretta a giudizio i provvedimenti concernenti l'invio al Centro per la giustizia riparativa sono adottati dal giudice per le indagini preliminari fino a quando il decreto, unitamente al fascicolo, non e' trasmesso al giudice a norma dell'articolo 553, comma 1, del codice.\nDopo la pronuncia della sentenza e prima della trasmissione degli atti a norma dell'articolo 590 del codice, provvede il giudice che ha emesso la sentenza; durante la pendenza del ricorso per cassazione, provvede il giudice che ha emesso il provvedimento impugnato.</p>","notesHtml":""},{"id":"art_46","numText":"Art. 46","group":"Norme","heading":"Esecuzione dell'accompagnamento coattivo","contentHtml":"<p>1. Il provvedimento che dispone l'accompagnamento coattivo e' trasmesso, a cura della cancelleria o della segreteria dell'autorita' giudiziaria che lo ha emesso, all'organo che deve provvedere alla esecuzione. Copia del provvedimento e' consegnata all'interessato.</p>","notesHtml":""},{"id":"art_47","numText":"Art. 47","group":"Norme","heading":"Revoca della condanna pecuniaria inflitta alle persone non comparse","contentHtml":"<p>1. La condanna al pagamento di una somma a norma dell'articolo 133 del codice e' revocata con ordinanza dal giudice quando sono ritenute fondate le giustificazioni addotte dall'interessato.</p>","notesHtml":""},{"id":"art_48","numText":"Art. 48","group":"Norme","heading":"Cancellature, variazioni e aggiunte negli atti","contentHtml":"<p>1. Le cancellature che occorre eseguire nelle sentenze, nelle ordinanze, nei decreti, nei verbali o in altri atti del procedimento sono fatte in modo da lasciare leggere le parole cancellate. \n 2. Alle variazioni e alle aggiunte che occorre eseguire prima della sottoscrizione si provvede con postille, che devono essere approvate.</p>","notesHtml":""},{"id":"art_49","numText":"Art. 49","group":"Norme","heading":"Conservazione dei nastri e dei supporti fonografici e audiovisivi","contentHtml":"<p>1. I nastri e i supporti contenenti le riproduzioni fonografiche o audiovisive sono racchiusi in apposite custodie numerate e sigillate. \n 2. Ciascuna custodia, a sua volta, e' racchiusa in un involucro, sul quale e' trascritto il numero della custodia e sono indicati gli estremi del procedimento e le generalita' delle persone alle quali si riferiscono le riproduzioni nonche' la data in cui le singole riproduzioni sono state effettuate. \n 3. Al fine di evitarne il deterioramento, i nastri e i supporti possono essere conservati anche in contenitori separati dagli atti processuali.</p>","notesHtml":""},{"id":"art_50","numText":"Art. 50","group":"Norme","heading":"Redazione del verbale in forma stenotipica o con altro strumento meccanico","contentHtml":"<p>1. Quando il verbale e' redatto in forma stenotipica o con altro strumento meccanico, esso puo' essere formato da piu' ausiliari o da piu' tecnici autorizzati a norma dell'articolo 135 del codice, ciascuno dei quali lo sottoscrive per la parte di rispettiva competenza. \n 2. Se lo strumento meccanico impiegato non comporta la immediata impressione di caratteri comuni di scrittura, il relativo nastro e' sottoscritto dai soli verbalizzanti.</p>","notesHtml":""},{"id":"art_51","numText":"Art. 51","group":"Norme","heading":"Personale tecnico impiegato per la documentazione degli atti","contentHtml":"<p>1. Quando rileva l'esigenza di avvalersi di personale tecnico estraneo all'amministrazione dello Stato per la documentazione degli atti, nei casi previsti dagli articoli 135 comma 2, 138 comma 2 e 139 comma 4 del codice, l'autorita' giudiziaria ne fa richiesta al Presidente della Corte di appello perche' provveda alla scelta del personale idoneo. \n 2. Al fine indicato nel comma 1, il Ministero della giustizia, nei limiti delle risorse finanziarie attribuite e con le modalita' di cui al comma 3-bis, stipula contratti con imprese o cooperative di servizi specialistici. \n 3. Nell'ambito della politica di decentramento amministrativo e di contenimento della spesa pubblica, le procedure di cui al comma 2 possono essere delegate, per ciascun distretto, al Presidente della Corte di appello. \n 3-bis. Il Ministero della giustizia, al fine di attuare la delega di cui al comma 3, individua gli schemi di contratto di cui al comma 2, nonche', previo monitoraggio delle caratteristiche e del costo medio di mercato di prestazioni analoghe od equivalenti, la tipologia ed il costo massimo delle prestazioni.</p>","notesHtml":""},{"id":"art_51","numText":"Art. 51-bis","group":"Norme","heading":"Assistenza dell'interprete e traduzione degli atti","contentHtml":"<p>1. Per ciascuno dei casi previsti dall'articolo 143, comma 1, secondo periodo, del codice, l'imputato ha diritto all'assistenza gratuita dell'interprete per un colloquio con il difensore. Se per fatti o circostanze particolari l'esercizio del diritto di difesa richiede lo svolgimento di piu' colloqui in riferimento al compimento di un medesimo atto processuale, l'assistenza gratuita dell'interprete puo' essere assicurata per piu' di un colloquio. \n 2. Quando ricorrono particolari ragioni di urgenza e non e' possibile avere prontamente una traduzione scritta degli atti di cui all'articolo 143, comma 2, del codice l'autorita' giudiziaria dispone, con decreto motivato, se cio' non pregiudica il diritto di difesa dell'imputato, la traduzione orale, anche in forma riassuntiva, redigendo contestualmente verbale. \n 3. L'imputato puo' rinunciare espressamente, anche a mezzo di procuratore speciale, alla traduzione scritta degli atti. La rinuncia produce effetti solo se l'imputato ha consapevolezza delle conseguenze che da essa derivano, anche per avere a tal fine consultato il difensore. In tal caso il contenuto degli atti e' tradotto oralmente, anche in forma riassuntiva. \n 4. Nei casi di cui ai commi 2 e 3 della traduzione orale e' effettuata anche la riproduzione fonografica. \n 5. Ove vi siano strumenti tecnici idonei, l'autorita' procedente puo' disporre l'assistenza dell'interprete mediante l'utilizzo delle tecnologie di comunicazione a distanza, salvo che cio' possa causare concreto pregiudizio al diritto di difesa.</p>","notesHtml":""},{"id":"art_52","numText":"Art. 52","group":"Norme","heading":"Citazione dell'interprete","contentHtml":"<p>1. Con il provvedimento di nomina e' disposta la notificazione all'interprete del relativo decreto di citazione. Nei casi urgenti l'interprete puo' essere citato anche oralmente per mezzo dell'ufficiale giudiziario o della polizia giudiziaria.</p>","notesHtml":""},{"id":"art_53","numText":"Art. 53","group":"Norme","heading":"Sanzione pecuniaria inflitta all'interprete nel corso delle indagini preliminari","contentHtml":"<p>1. Nel corso delle indagini preliminari, quando si verifica l'ipotesi prevista dall'articolo 147 comma 2 del codice, il pubblico ministero richiede al giudice per le indagini preliminari di provvedere all'applicazione della sanzione pecuniaria.</p>","notesHtml":""},{"id":"art_54","numText":"Art. 54","group":"Norme","heading":"Copie degli atti da notificare","contentHtml":"<p>1. Quando l'atto da notificare viene trasmesso all'ufficiale giudiziario, questi deve formarne un numero di copie uguale a quello dei destinatari della notificazione. \n 2. Tengono luogo dell'originale le copie, trasmesse con mezzi tecnici idonei, quando l'ufficio che ha emesso l'atto attesta, in calce ad esso, di aver trasmesso il testo originale. \n 3. Quando la notificazione viene eseguita a mezzo della polizia giudiziaria, l'atto e' trasmesso all'ufficio di polizia competente per territorio con numero di copie uguale a quello dei destinatari della notificazione.</p>","notesHtml":""},{"id":"art_55","numText":"Art. 55","group":"Norme","heading":"Modalita' di attuazione delle notificazioni urgenti a mezzo del telefono o del telegrafo","contentHtml":"<p>1. Alla spedizione del telegramma previsto dall'articolo 149 commi 4 e 5 del codice provvede la cancelleria o la segreteria. \n 2. La copia e la ricevuta di spedizione del telegramma previsto dall'articolo 149 comma 2 del codice, con l'indicazione della persona che lo trasmette, di quella che lo riceve, dell'ora e del giorno di trasmissione, sono allegati agli atti del procedimento a cura della cancelleria o della segreteria.</p>","notesHtml":""},{"id":"art_56","numText":"Art. 56","group":"Norme","heading":"Notificazione a mezzo posta effettuata dal difensore","contentHtml":"<p>1. Ai fini previsti dall'articolo 152 del codice, il difensore che ha spedito l'atto da notificare con lettera raccomandata documenta tale spedizione depositando in cancelleria copia dell'atto inviato, attestandone la conformita' all'originale, e l'avviso di ricevimento. \n 2. Il difensore indica altresi' se l'atto e' stato spedito in busta chiusa o in piego.</p>","notesHtml":""},{"id":"art_56","numText":"Art. 56-bis","group":"Norme","heading":"Notificazione con modalita' telematiche eseguita dal difensore","contentHtml":"<p>1. La notificazione con modalita' telematiche e' eseguita dal difensore a mezzo di posta elettronica certificata o altro servizio elettronico di recapito certificato qualificato a un domicilio digitale risultante da pubblici elenchi, nel rispetto della normativa, anche regolamentare, concernente la sottoscrizione, la trasmissione e la ricezione dei documenti informatici. La notificazione puo' essere eseguita esclusivamente utilizzando un domicilio digitale del notificante risultante da pubblici elenchi. \n 2. L'avvocato redige la relazione di notificazione su documento informatico separato, sottoscritto con firma digitale o altra firma elettronica qualificata ed allegato al messaggio inviato con le modalita' di cui al comma 1. La relazione deve contenere: \n a) il nome e il cognome dell'avvocato notificante; \n b) il nome e il cognome della parte che lo ha nominato o nel cui interesse e' stato nominato; \n c) il nome e cognome del destinatario; \n d) il domicilio digitale a cui l'atto viene notificato; \n e) l'indicazione dell'elenco da cui il predetto domicilio digitale e' stato estratto; \n f) l'ufficio giudiziario, l'eventuale sezione e il numero del procedimento. \n 3. Quando l'atto da notificarsi e' redatto in forma di documento analogico, l'avvocato provvede ad estrarne copia informatica, sulla quale appone attestazione di conformita' nel rispetto delle modalita' previste per i procedimenti civili. \n 4. Ai fini previsti dall'articolo 152 del codice, il difensore documenta l'avvenuta notificazione dell'atto con modalita' telematiche depositando in cancelleria il duplicato informatico o la copia informatica dell'atto inviato, unitamente all'attestazione di conformita' all'originale, la relazione redatta con le modalita' di cui al comma 2, nonche' le ricevute di accettazione e di avvenuta consegna generate dal sistema.</p>","notesHtml":""},{"id":"art_57","numText":"Art. 57","group":"Norme","heading":"Rifiuto di ricezione dell'atto notificato all'imputato detenuto","contentHtml":"<p>1. Gli atti che l'imputato detenuto si e' rifiutato di ricevere e che devono essere consegnati al direttore dell'istituto a norma dell'articolo 156 comma 2 del codice sono inseriti nel fascicolo personale del detenuto. Se l'imputato richiede che gli atti depositati gli siano consegnati, della consegna e' fatta menzione in apposito registro.</p>","notesHtml":""},{"id":"art_58","numText":"Art. 58","group":"Norme","heading":"Informazione all'imputato detenuto legittimamente assente","contentHtml":"<p>1. Il direttore dell'istituto annota nel registro indicato nell'articolo 57 data, ora e modalita' dell'informazione prevista dall'articolo 156 comma 2 del codice.</p>","notesHtml":""},{"id":"art_59","numText":"Art. 59","group":"Norme","heading":"Secondo accesso per la prima notificazione all'imputato non detenuto","contentHtml":"<p>1. Nel caso previsto dall'articolo 157 comma 7 del codice, nella relazione di notificazione e' indicata anche l'ora in cui sono avvenuti gli accessi. In caso di mancanza o inidoneita' delle persone indicate nell'articolo 157 comma 1 del codice, il secondo accesso deve avvenire in uno dei giorni successivi e in orario diverso da quello del primo accesso.</p>","notesHtml":""},{"id":"art_60","numText":"Art. 60","group":"Norme","heading":"Informazione dell'avvenuta notificazione all'imputato in servizio militare","contentHtml":"<p>1. Il comandante militare che ha provveduto alla informazione a norma dell'articolo 158 del codice annota data, ora e modalita' in apposito registro.</p>","notesHtml":""},{"id":"art_61","numText":"Art. 61","group":"Norme","heading":"Documentazione delle nuove ricerche dell'imputato","contentHtml":"<p>1. La polizia giudiziaria, in caso di nuove ricerche disposte a norma dell'articolo 159 del codice, ne fa relazione all'autorita' richiedente, indicando i luoghi in cui le ricerche sono state svolte, gli ufficiali e gli agenti che le hanno eseguite, i nomi dei familiari dell'imputato reperiti e le notizie dagli stessi fornite circa il luogo in cui il loro congiunto si trova.</p>","notesHtml":""},{"id":"art_62","numText":"Art. 62","group":"Norme","heading":"Indicazione delle generalita' del domiciliatario","contentHtml":"<p>1. Nell'eleggere il domicilio a norma dell'articolo 162 del codice, l'imputato e' tenuto a indicare anche le generalita' del domiciliatario.</p>","notesHtml":""},{"id":"art_63","numText":"Art. 63","group":"Norme","heading":"Traduzione dell'avviso inviato all'imputato straniero all'estero","contentHtml":"<p>1. Ai fini di quanto previsto dall'articolo 169 comma 3 del codice, all'avviso redatto in lingua italiana e sottoscritto dall'autorita' giudiziaria che procede e' allegata la traduzione nella lingua ufficiale dello stato in cui l'imputato risulta essere nato.</p>","notesHtml":""},{"id":"art_63","numText":"Art. 63-bis","group":"Norme","heading":"Comunicazione di cortesia","contentHtml":"<p>1. Fuori del caso di notificazione al difensore o al domiciliatario, quando la relazione della notificazione all'imputato dell'avviso di fissazione dell'udienza preliminare, degli atti di citazione a giudizio ai sensi degli articoli 450, comma 2, 456, 552 e 601, nonche' del decreto penale di condanna attesta l'avvenuta consegna dell'atto a persona fisica diversa dal destinatario, la cancelleria o la segreteria da' avviso di cortesia al destinatario dell'avvenuta notifica dell'atto tramite comunicazione al recapito telefonico o all'indirizzo di posta elettronica dallo stesso indicato ai sensi dell'articolo 349, comma 3, del codice, annotandone l'esito.</p>","notesHtml":""},{"id":"art_64","numText":"Art. 64","group":"Norme","heading":"Comunicazione di atti","contentHtml":"<p>1. La comunicazione di atti del giudice ad altro giudice si esegue mediante trasmissione di copia dell'atto con le modalita' telematiche di cui all'articolo 148, comma 1, del codice o, nei casi di cui all'articolo 148, comma 4, del codice, con lettera raccomandata con avviso di ricevimento, ovvero mediante consegna al personale di cancelleria, che ne rilascia ricevuta su apposito registro custodito presso la cancelleria del giudice che ha emesso l'atto. \n 2. La comunicazione di atti dal giudice al pubblico ministero che ha sede diversa da quella del giudice si esegue mediante trasmissione di copia dell'atto con le modalita' telematiche di cui all'articolo 148, comma 1, del codice o, nei casi di cui all'articolo 148, comma 4, del codice, con lettera raccomandata con avviso di ricevimento. \n 3. Nei casi di cui all'articolo 148, comma 4, del codice, quando ricorre una situazione di urgenza o l'atto contiene disposizioni concernenti la liberta' personale, la comunicazione e' eseguita col mezzo piu' celere nelle forme previste dall'articolo 149 del codice ovvero e' eseguita dalla polizia giudiziaria mediante consegna di copia dell'atto presso la cancelleria o la segreteria. In questo ultimo caso, la polizia redige verbale, copia del quale e' trasmessa al giudice che ha emesso l'atto.</p>","notesHtml":""},{"id":"art_64","numText":"Art. 64-bis","group":"Norme","heading":"Comunicazioni e trasmissione di atti ad altre autorita' giudiziarie","contentHtml":"<p>1. Quando procede per reati commessi in danno del coniuge, del convivente o di persona legata da una relazione affettiva, anche ove cessata, il pubblico ministero accerta la pendenza di procedimenti relativi alla separazione personale dei coniugi, allo scioglimento o alla cessazione degli effetti civili del matrimonio, alla regolamentazione dell'esercizio della responsabilita' genitoriale nei confronti dei figli nati fuori dal matrimonio, alla modifica delle condizioni dei provvedimenti concernenti l'affidamento dei figli nonche' alla responsabilita' genitoriale e trasmette senza ritardo al giudice che procede copia degli atti di cui al comma 2, salvo che gli atti stessi siano coperti dal segreto di cui all'articolo 329 del codice. Allo stesso modo provvede quando procede per reati commessi in danno di minori dai genitori, da altri familiari o da persone comunque con loro conviventi, nonche' dalla persona legata al genitore da una relazione affettiva, anche ove cessata, ed e' pendente procedimento relativo alla responsabilita' genitoriale, al suo esercizio e al mantenimento del minore.</p>\n<p>2. Nei casi di cui al comma 1, il pubblico ministero trasmette al giudice civile o al tribunale per le persone, per i minorenni e per le famiglie che procede copia dei verbali di fermo, arresto, perquisizione e sequestro, delle ordinanze che applicano misure cautelari personali o ne dispongono la sostituzione o la revoca, nonche' degli atti di indagine non coperti dal segreto di cui all'articolo 329 del codice nonche' dell'avviso di conclusione delle indagini preliminari e degli atti di esercizio dell'azione penale.\nAlle stesse autorita' giudiziarie e' altresi' trasmessa, a cura della cancelleria, copia del decreto di archiviazione, della sentenza di primo e secondo grado, della sentenza emessa dalla Corte di cassazione nonche' delle ordinanze rese ai sensi dell'articolo 591, comma 2, del codice.</p>","notesHtml":""},{"id":"art_64","numText":"Art. 64-ter","group":"Norme","heading":"Diritto all'oblio degli imputati e delle persone sottoposte ad indagini","contentHtml":"<p>1. La persona nei cui confronti sono stati pronunciati una sentenza di proscioglimento o di non luogo a procedere ovvero un provvedimento di archiviazione puo' richiedere che sia preclusa l'indicizzazione o che sia disposta la deindicizzazione, sulla rete internet, dei dati personali riportati nella sentenza o nel provvedimento, ai sensi e nei limiti dell'articolo 17 del regolamento (UE) 2016/679 del Parlamento europeo e del Consiglio, del 27 aprile 2016. Resta fermo quanto previsto dall'articolo 52 del decreto legislativo 30 giugno 2003, n. 196. \n 2. Nel caso di richiesta volta a precludere l'indicizzazione, la cancelleria del giudice che ha emesso il provvedimento appone e sottoscrive la seguente annotazione, recante sempre l'indicazione degli estremi del presente articolo: «Ai sensi e nei limiti dell'articolo 17 del regolamento (UE) 2016/679 del Parlamento europeo e del Consiglio, del 27 aprile 2016, e' preclusa l'indicizzazione del presente provvedimento rispetto a ricerche condotte sulla rete internet a partire dal nominativo dell'istante.». \n 3. Nel caso di richiesta volta ad ottenere la deindicizzazione, la cancelleria del giudice che ha emesso il provvedimento appone e sottoscrive la seguente annotazione, recante sempre l'indicazione degli estremi del presente articolo: «Il presente provvedimento costituisce titolo per ottenere, ai sensi e nei limiti dell'articolo 17 del regolamento (UE) 2016/679 del Parlamento europeo e del Consiglio, del 27 aprile 2016, un provvedimento di sottrazione dell'indicizzazione, da parte dei motori di ricerca generalisti, di contenuti relativi al procedimento penale, rispetto a ricerche condotte a partire dal nominativo dell'istante.</p>","notesHtml":""},{"id":"art_65","numText":"Art. 65","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.L. 18 OTTOBRE 2001, N. 374, CONVERTITO,  CON MODIFICAZIONI, DALLA L. 15 DICEMBRE 2001, N. 438","contentHtml":"","notesHtml":""},{"id":"art_66","numText":"Art. 66","group":"Norme","heading":"","contentHtml":"<p>Procedimento di esclusione del segreto \n 1. Nei fatti, notizie e documenti indicati nell'articolo 204 comma 1 del codice non sono compresi i nomi degli informatori. \n 2. Quando perviene la comunicazione prevista dall'articolo 204, comma 2, del codice, il Presidente del Consiglio dei ministri, con atto motivato, conferma il segreto, se ritiene che non ricorrano i presupposti indicati nei commi 1, 1-bis e 1-ter dello stesso articolo, perche' il fatto, la notizia o il documento coperto dal segreto di Stato non concerne il reato per cui si procede. In mancanza, decorsi trenta giorni dalla notificazione della comunicazione, il giudice dispone il sequestro del documento o l'esame del soggetto interessato. \n 3. COMMA ABROGATO DALLA L. 3 AGOSTO 2007, N. 124.</p>","notesHtml":""},{"id":"art_67","numText":"Art. 67","group":"Norme","heading":"Albo dei periti presso il tribunale","contentHtml":"<p>1. Presso ogni tribunale e' istituito un albo dei periti, diviso in categorie. \n 2. Nell'albo sono sempre previste le categorie di esperti in medicina legale, psichiatria, contabilita', ingegneria e relative specialita', infortunistica del traffico e della circolazione stradale, balistica, chimica, analisi e comparazione della grafia , trascrizione, interpretariato e traduzione. \n 3. Quando il giudice nomina come perito un esperto non iscritto negli albi, designa, se possibile, una persona che svolge la propria attivita' professionale presso un ente pubblico. \n 4. Nel caso previsto dal comma 3, il giudice indica specificamente nell'ordinanza di nomina le ragioni della scelta. \n 5. In ogni caso il giudice evita di designare quale perito le persone che svolgano o abbiano svolto attivita' di consulenti di parte in procedimenti collegati a norma dell'articolo 371 comma 2 del codice. \n 5-bis. Con decreto del Ministro della giustizia, adottato di concerto con il Ministro dell'economia e delle finanze e con il Ministro delle imprese e del made in Italy, sono stabilite le ulteriori categorie dell'albo e i settori di specializzazione di ciascuna categoria.</p>","notesHtml":""},{"id":"art_67","numText":"Art. 67-bis","group":"Norme","heading":"Elenco nazionale degli interpreti e traduttori","contentHtml":"<p>1. Ogni tribunale trasmette per via telematica al Ministero della giustizia l'elenco aggiornato, in formato elettronico, degli interpreti e dei traduttori iscritti nell'albo dei periti di cui all'articolo 67. L'autorita' giudiziaria si avvale di tale elenco nazionale e nomina interpreti e traduttori diversi da quelli ivi inseriti solo in presenza di specifiche e particolari esigenze. \n 2. L'elenco nazionale di cui al comma 1 e' consultabile dall'autorita' giudiziaria, dagli avvocati e dalla polizia giudiziaria sul sito istituzionale del Ministero della giustizia, nel rispetto della normativa vigente sul trattamento dei dati personali.\nLe modalita' di consultazione dell'elenco nazionale sono definite con decreto del Ministro della giustizia, da adottarsi entro il termine di otto mesi dalla data di entrata in vigore della presente disposizione.</p>","notesHtml":""},{"id":"art_68","numText":"Art. 68","group":"Norme","heading":"Formazione e revisione dell'albo dei periti","contentHtml":"<p>1. L'albo dei periti previsto dall'articolo 67 e' tenuto a cura del presidente del tribunale ed e' formato da un comitato da lui presieduto e composto dal procuratore della Repubblica presso il medesimo tribunale, dal presidente del consiglio dell'ordine forense, dal presidente dell'ordine, del collegio ovvero delle associazioni rappresentative a livello nazionale delle professioni non regolamentate a cui appartiene la categoria di esperti per la quale si deve provvedere ovvero da loro delegati. \n 2. Il comitato decide sulla richiesta di iscrizione e di cancellazione dall'albo. \n 3. Il comitato puo' assumere informazioni e delibera a maggioranza dei voti. In caso di parita' di voti, prevale il voto del presidente. \n 4. Il comitato provvede ogni due anni alla revisione dell'albo per cancellare gli iscritti per i quali e' venuto meno alcuno dei requisiti previsti dall'articolo 69 comma 3 o e' sorto un impedimento a esercitare l'ufficio di perito.</p>","notesHtml":""},{"id":"art_69","numText":"Art. 69","group":"Norme","heading":"Requisiti per la iscrizione nell'albo dei periti","contentHtml":"<p>1. Salvo quanto previsto dal comma 3, possono ottenere l'iscrizione nell'albo le persone fornite di speciale competenza nella materia. \n 2. La richiesta di iscrizione, diretta al presidente del tribunale, deve essere accompagnata dall'estratto dell'atto di nascita, dal certificato generale del casellario giudiziale, dal certificato di residenza nella circoscrizione del tribunale e dai titoli e documenti attestanti la speciale competenza del richiedente. \n 3. Non possono ottenere l'iscrizione nell'albo le persone: \n a) condannate con sentenza irrevocabile alla pena della reclusione per delitto non colposo, salvo che sia intervenuta riabilitazione; \n b) che si trovano in una delle situazioni di incapacita' previste dall'articolo 222 comma 1 lettere a), b), c) del codice; \n c) cancellate o radiate dal rispettivo albo professionale a seguito di provvedimento disciplinare definitivo. \n 4. La richiesta di iscrizione nell'albo resta sospesa per il tempo in cui la persona e' imputata di delitto non colposo per il quale e' consentito l'arresto in flagranza ovvero e' sospesa dal relativo albo professionale.</p>","notesHtml":""},{"id":"art_70","numText":"Art. 70","group":"Norme","heading":"Sanzioni applicabili agli iscritti nell'albo dei periti","contentHtml":"<p>1. Agli iscritti nell'albo dei periti che non abbiano adempiuto agli obblighi derivanti dal conferimento dell'incarico possono essere applicate, su segnalazione del giudice procedente, le sanzioni dell'avvertimento, della sospensione dall'albo per un periodo non superiore a un anno o della cancellazione. \n 2. E' disposta la sospensione dall'albo nei confronti delle persone che si trovano nelle situazioni previste dall'articolo 69 comma 4 per il tempo in cui perdurano le situazioni medesime. \n 3. E' disposta la cancellazione dall'albo, anche prima della scadenza del termine stabilito per la revisione degli albi, nei confronti degli iscritti per i quali e' venuto meno alcuno dei requisiti previsti dall'articolo 69 comma 3. \n 4. Competente a decidere e' il comitato previsto dall'articolo 68.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71","group":"Norme","heading":"Procedimento per l'applicazione delle sanzioni","contentHtml":"<p>1. Ai fini dell'applicazione delle sanzioni previste dall'articolo 70, il presidente del tribunale contesta l'addebito al perito mediante lettera raccomandata con avviso di ricevimento, invitandolo a fornire deduzioni scritte entro il termine di dieci gi
