olo 415-ter, commi 4 e 5,, del codice; \n c) LETTERA SOPPRESSA DAL D.LGS. 19 MARZO 2024, N. 31. \n 1-bis. Il procuratore generale presso la corte di appello acquisisce ogni tre mesi dalle procure della Repubblica del distretto i dati sul rispetto dei termini relativi ai procedimenti di cui all'articolo 362-bis del codice di procedura penale e invia al procuratore generale presso la Corte di cassazione una relazione almeno semestrale. \n 2. COMMA ABROGATO DAL D.LGS. 19 MARZO 2024, N. 31. \n 3. Per ciascuno dei procedimenti indicati al comma 1, la segreteria del pubblico ministero comunica: \n a) le generalita' della persona sottoposta alle indagini o quanto altro valga a identificarla; \n b) il luogo di residenza, dimora o domicilio della persona sottoposta alle indagini; \n c) le generalita' della persona offesa o quanto altro valga a identificarla; \n d) il luogo di residenza, dimora o domicilio della persona offesa; \n e) i nominativi dei difensori della persona sottoposta alle indagini e della persona offesa e i relativi recapiti; \n f) il reato per cui si procede, con indicazione delle norme di legge che si assumono violate, nonche', se risultano, la data e il luogo del fatto.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127-bis","group":"Norme","heading":"Avocazione e criteri di priorita'","contentHtml":"<p>1. Nel disporre l'avocazione delle notizie di reato nei casi previsti dagli articoli 412 e 421-bis, comma 2, del codice, il procuratore generale presso la corte di appello tiene conto dei criteri di priorita' contenuti nel progetto organizzativo dell'ufficio della procura della Repubblica che ha iscritto la notizia di reato.</p>","notesHtml":""},{"id":"art_128","numText":"Art. 128","group":"Norme","heading":"Fissazione della udienza preliminare nel caso di mancato \n accoglimento della richiesta di archiviazione","contentHtml":"<p>1. Nel caso previsto dall'articolo 409 comma 5 del codice, il giudice fa notificare all'imputato e alla persona offesa dal reato il decreto di fissazione della udienza preliminare, nel quale sono enunciati gli elementi previsti dall'articolo 417 comma 1 lettere a), b), c) del codice.</p>","notesHtml":""},{"id":"art_129","numText":"Art. 129","group":"Norme","heading":"Informazioni sul procedimento penale","contentHtml":"<p>1. Quando esercita l'azione penale nei confronti di un impiegato dello Stato o di altro ente pubblico, il pubblico ministero informa l'autorita' da cui l'impiegato dipende, dando notizia dell'imputazione. Quando si tratta di personale dipendente dai servizi per le informazioni e la sicurezza militare o democratica, ne da' comunicazione anche al comitato parlamentare per i servizi di informazione e sicurezza e per il segreto di Stato. \n 2. Quando un ecclesiastico o un religioso del culto cattolico e' arrestato, fermato o sottoposto a una misura cautelare limitativa della liberta' personale o quando e' comunicata allo stesso o al suo difensore la pendenza del procedimento penale o, in ogni caso, quando e' esercitata l'azione penale nei suoi confronti, il pubblico ministero informa, segnalando le norme che si assumono violate, la data e il luogo del fatto, la seguente autorita' ecclesiastica: \n a) la Santa Sede, nella persona del Cardinale Segretario di Stato, quando la comunicazione riguarda vescovi titolari o emeriti, inclusi gli ordinari diocesani, i prelati territoriali, i coadiutori e ausiliari, oppure ordinari di luogo equiparati a vescovi diocesani, inclusi gli abati di abbazie territoriali o i sacerdoti che, in sede vacante, svolgono l'ufficio di amministratore della diocesi; \n b) l'ordinario diocesano nella cui circoscrizione territoriale ha sede la procura della Repubblica, quando la comunicazione riguarda sacerdoti, secolari o appartenenti a istituti di vita consacrata o a societa' di vita apostolica. \n 3. Quando esercita l'azione penale per un reato che ha cagionato un danno per l'erario, il pubblico ministero informa il procuratore generale presso la Corte dei conti, dando notizia della imputazione.\nQuando esercita l'azione penale per i delitti di cui agli articoli 317, 318, 319, 319-bis, 319-ter, 319-quater, 320, 321, 322, 322-bis, 346-bis, 353 e 353-bis del codice penale, il pubblico ministero informa il presidente dell'Autorita' nazionale anticorruzione, dando notizia dell'imputazione. \n 3-bis. Il pubblico ministero invia la informazione contenente la indicazione delle norme di legge che si assumono violate anche quando taluno dei soggetti indicati nel comma 1 e' stato arrestato o fermato ovvero si trova in stato di custodia cautelare. \n 3-ter. Quando esercita l'azione penale per i reati previsti nel decreto legislativo 3 aprile 2006, n. 152, ovvero per i reati previsti dal codice penale o da leggi speciali comportanti un pericolo o un pregiudizio per l'ambiente, il pubblico ministero informa il Ministero dell'ambiente e della tutela del territorio e del mare e la Regione nel cui territorio i fatti si sono verificati, dando notizia dell'imputazione. Qualora i reati di cui al primo periodo arrechino un concreto pericolo alla tutela della salute o alla sicurezza agroalimentare, il pubblico ministero informa anche il Ministero della salute o il Ministero delle politiche agricole alimentari e forestali. PERIODO SOPPRESSO DALLA L. 23 GIUGNO 2017, N.\n103. Le sentenze e i provvedimenti definitori di ciascun grado di giudizio sono trasmessi per estratto, a cura della cancelleria del giudice che ha emesso i provvedimenti medesimi, alle amministrazioni indicate nei primi due periodi del presente comma. I procedimenti di competenza delle amministrazioni di cui ai periodi precedenti, che abbiano ad oggetto, in tutto o in parte, fatti in relazione ai quali procede l'autorita' giudiziaria, possono essere avviati o proseguiti anche in pendenza del procedimento penale, in conformita' alle norme vigenti. Per le infrazioni di maggiore gravita', sanzionate con la revoca di autorizzazioni o con la chiusura di impianti, l'ufficio competente, nei casi di particolare complessita' dell'accertamento dei fatti addebitati, puo' sospendere il procedimento amministrativo fino al termine di quello penale, salva la possibilita' di adottare strumenti cautelari. \n 3-quater. Quando esercita l'azione penale per i delitti previsti dal decreto legislativo 10 marzo 2000, n. 74, il pubblico ministero informa la competente direzione provinciale dell'Agenzia delle entrate, dando notizia della imputazione.</p>","notesHtml":""},{"id":"art_130","numText":"Art. 130","group":"Norme","heading":"Contenuto del fascicolo trasmesso dal pubblico ministero con la richiesta di rinvio a giudizio","contentHtml":"<p>1. Se gli atti di indagine preliminare riguardano piu' persone o piu' imputazioni, il pubblico ministero forma il fascicolo previsto dall'articolo 416 comma 2 del codice, inserendovi gli atti ivi indicati per la parte che si riferisce alle persone o alle imputazioni per cui viene esercitata l'azione penale. \n 2. In ogni caso il pubblico ministero puo', a fini di indagine, trattenere copia della documentazione e degli atti trasmessi al giudice.</p>","notesHtml":""},{"id":"art_130","numText":"Art. 130-bis","group":"Norme","heading":"Separazione dei procedimenti in fase di indagine","contentHtml":"<p>1. Il pubblico ministero, prima dell'esercizio dell'azione penale, procede di regola separatamente quando ricorrono le ragioni di urgenza indicate nell'articolo 18, comma 1, lettera e-bis) del codice.</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131","group":"Norme","heading":"Deposito degli atti per l'udienza preliminare","contentHtml":"<p>1. Durante il termine per comparire e fino alla conclusione dell'udienza preliminare, le parti, la persona offesa e i difensori hanno facolta' di prendere visione, nel luogo dove si trovano, degli atti e delle cose indicati nell'articolo 419 commi 2 e 3 del codice e di estrarre copia degli atti suddetti.</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131-bis","group":"Norme","heading":"Liberazione dell'imputato prosciolto","contentHtml":"<p>1. L'imputato detenuto nei cui confronti e' pronunciata la sentenza di cui all'articolo 425 del codice e' posto in liberta' immediatamente dopo la lettura del dispositivo. Si applicano le disposizioni di cui al comma 2 dell'articolo 154- bis.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132","group":"Norme","heading":"Decreto che dispone il giudizio davanti alla corte di assise o al tribunale","contentHtml":"<p>1. Quando la corte di assise o il tribunale e' diviso in sezioni, il decreto che dispone il giudizio contiene anche l'indicazione della sezione davanti alla quale le parti devono comparire. \n 2. Per ogni processo il presidente del tribunale, in seguito alla richiesta del giudice per le indagini preliminari, comunica anche con mezzi telematici, sulla base dei criteri determinati dal Consiglio superiore della magistratura, il giorno e l'ora della comparizione e, quando occorre, anche la sezione da indicare nel decreto che dispone il giudizio.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132-bis","group":"Norme","heading":"Formazione dei ruoli di udienza e trattazione dei processi","contentHtml":"<p>1. Nella formazione dei ruoli di udienza e nella trattazione dei processi e' assicurata la priorita' assoluta: \n a) ai processi relativi ai delitti di cui all'articolo 407, comma 2, lettera a), del codice e ai delitti di criminalita' organizzata, anche terroristica; \n a-bis) ai delitti previsti dagli articoli 387-bis, 558-bis, 572, 582, nelle ipotesi aggravate ai sensi degli articoli 576, primo comma, numeri 2, 5 e 5.1, e 577, primo comma, numero 1, e secondo comma, 583-quinquies, 593-ter, da 609-bis a 609-octies, 612-bis, 612-ter e 613, terzo comma, del codice penale; \n a-ter) ai processi relativi ai delitti di cui agli articoli 589 e 590 del codice penale verificatisi in presenza delle circostanze di cui agli articoli 52, secondo, terzo e quarto comma, e 55, secondo comma, del codice penale; \n b) ai processi relativi ai delitti commessi in violazione delle norme relative alla prevenzione degli infortuni e all'igiene sul lavoro e delle norme in materia di circolazione stradale, ai delitti di cui al testo unico delle disposizioni concernenti la disciplina dell'immigrazione e norme sulla condizione dello straniero, di cui al decreto legislativo 25 luglio 1998, n. 286, nonche' ai delitti puniti con la pena della reclusione non inferiore nel massimo a quattro anni; \n c) ai processi a carico di imputati detenuti, anche per reato diverso da quello per cui si procede; \n d) ai processi nei quali l'imputato e' stato sottoposto ad arresto o a fermo di indiziato di delitto, ovvero a misura cautelare personale, anche revocata o la cui efficacia sia cessata; \n e) ai processi nei quali e' contestata la recidiva, ai sensi dell'articolo 99, quarto comma, del codice penale; \n f) ai processi da celebrare con giudizio direttissimo e con giudizio immediato; \n f-bis) ai processi relativi ai delitti di cui agli articoli 317, 319, 319-ter, 319-quater, 320, 321 e 322-bis del codice penale. (77) 2. I dirigenti degli uffici giudicanti adottano i provvedimenti organizzativi necessari per assicurare la rapida definizione dei processi per i quali e' prevista la trattazione prioritaria.</p>","notesHtml":"<p>AGGIORNAMENTO (77)</p>\n<p>La L. 17 ottobre 2017, n. 161 ha disposto (con l'art. 30, comma 3) che &quot;All'articolo 132-bis, comma 1, delle norme di attuazione, di coordinamento e transitorie del codice di procedura penale, dopo la lettera f) e' aggiunta la seguente: \n «f-bis) ai processi nei quali vi sono beni sequestrati in funzione della confisca di cui all'articolo 12-sexies del decreto-legge 8 giugno 1992, n. 306, convertito, con modificazioni, dalla legge 7 agosto 1992, n. 356, e successive modificazioni»&quot;.</p>"},{"id":"art_132","numText":"Art. 132-ter","group":"Norme","heading":"Fissazione dell'udienza per la riapertura del processo","contentHtml":"<p>1. I dirigenti degli uffici giudicanti adottano i provvedimenti organizzativi necessari per assicurare la celebrazione, nella medesima aula di udienza, il primo giorno non festivo del mese di febbraio e il primo giorno non festivo del mese di settembre di ogni anno, delle udienze destinate alla riapertura dei procedimenti definiti con sentenza resa ai sensi dell'articolo 420-quater del codice, nonche' alla celebrazione dei processi nei quali e' stata pronunciata l'ordinanza di cui all'articolo 598-ter, comma 2, del codice.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133","group":"Norme","heading":"Notificazione del decreto che dispone il giudizio","contentHtml":"<p>1. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 1-bis. Il decreto e' altresi' comunicato alle amministrazioni o enti di appartenenza quando e' emesso nei confronti di dipendenti di amministrazioni pubbliche o di enti pubblici ovvero di enti a prevalente partecipazione pubblica, per alcuno dei delitti previsti dagli articoli 314, primo comma, 317, 318, 319, 319-ter, 319-quater e 320 del codice penale e dall'articolo 3 della legge 9 dicembre 1941, n. 1383.</p>","notesHtml":""},{"id":"art_134","numText":"Art. 134","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150","contentHtml":"","notesHtml":""},{"id":"art_134","numText":"Art. 134-bis","group":"Norme","heading":"Partecipazione a distanza nel giudizio abbreviato","contentHtml":"<p>1. Nei casi previsti dall'articolo 146-bis, commi 1 , 1-bis e 1-quater, la partecipazione dell'imputato avviene a distanza anche quando il giudizio abbreviato si svolge in pubblica udienza. (76) <sup class=\"amd\">83</sup></p>","notesHtml":"<p>AGGIORNAMENTO (76)</p>\n<p>La L. 23 giugno 2017, n. 103, ha disposto (con l'art. 1, comma 81) che &quot;Le disposizioni di cui ai commi 77, 78, 79 e 80 acquistano efficacia decorso un anno dalla pubblicazione della presente legge nella Gazzetta Ufficiale, fatta eccezione per le disposizioni di cui al comma 77, relativamente alle persone che si trovano in stato di detenzione per i delitti di cui agli articoli 270-bis, primo comma, e 416-bis, secondo comma, del codice penale, nonche' di cui all'articolo 74, comma 1, del testo unico di cui al decreto del Presidente della Repubblica 9 ottobre 1990, n. 309, e successive modificazioni&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, nel modificare l'art. 1, comma 79 della L. 23 giugno 2017, n. 103, ha conseguentemente disposto (con l'art. 2, comma 2) che &quot;L'efficacia delle disposizioni di cui all'articolo 1, commi 77, 78, 79 e 80, della legge 23 giugno 2017, n. 103, fatta salva l'eccezione di cui al comma 81 dello stesso articolo 1 per le persone che si trovano in stato di detenzione per i delitti ivi indicati, e' sospesa dalla data di entrata in vigore del presente decreto fino al 15 febbraio 2019&quot;.</p>"},{"id":"art_135","numText":"Art. 135","group":"Norme","heading":"Decisione nel giudizio sulla richiesta di applicazione della pena","contentHtml":"<p>1. Il giudice, per decidere sulla richiesta di applicazione della pena rinnovata prima della dichiarazione di apertura del dibattimento di primo grado, ordina l'esibizione degli atti contenuti nel fascicolo del pubblico ministero. Se la richiesta e' accolta, gli atti esibiti vengono inseriti nel fascicolo per il dibattimento; altrimenti gli atti sono immediatamente restituiti al pubblico ministero.</p>","notesHtml":""},{"id":"art_136","numText":"Art. 136","group":"Norme","heading":"Limiti all'effetto estintivo","contentHtml":"<p>1. L'effetto estintivo previsto dall'articolo 445 comma 2 del codice non si produce se la persona nei cui confronti la pena e' stata applicata si sottrae volontariamente alla sua esecuzione.</p>","notesHtml":""},{"id":"art_137","numText":"Art. 137","group":"Norme","heading":"Concorso formale e continuazione","contentHtml":"<p>1. Nel caso di applicazione della pena richiesta dalle parti con piu' sentenze per reati unificati a norma dell'articolo 81 del codice penale, il termine di estinzione previsto dall'articolo 445 comma 2 del codice decorre nuovamente per tutti i reati dalla data in cui e' divenuta irrevocabile l'ultima sentenza. \n 2. La disciplina del concorso formale e del reato continuato e' applicabile anche quando concorrono reati per i quali la pena e' applicata su richiesta delle parti e altri reati.</p>","notesHtml":""},{"id":"art_138","numText":"Art. 138","group":"Norme","heading":"Formazione del fascicolo per il dibattimento nel giudizio direttissimo","contentHtml":"<p>1. In tutti i casi di giudizio direttissimo con imputato in stato di arresto o di custodia cautelare, il pubblico ministero forma il fascicolo per il dibattimento a norma dell'articolo 431 del codice.\nQuando l'imputato e' presentato davanti al giudice del dibattimento per la convalida dell'arresto e il contestuale giudizio, il fascicolo medesimo e' formato subito dopo il giudizio di convalida dal pubblico ministero presente all'udienza.</p>","notesHtml":""},{"id":"art_139","numText":"Art. 139","group":"Norme","heading":"Facolta' dei difensori di prendere visione del fascicolo trasmesso con la richiesta di giudizio immediato","contentHtml":"<p>1. Durante i termini previsti dall'articolo 458 del codice, le parti e i difensori hanno facolta' di prendere visione ed estrarre copia, nella cancelleria del giudice per le indagini preliminari, del fascicolo trasmesso a norma dell'articolo 454 comma 2 del codice.</p>","notesHtml":""},{"id":"art_140","numText":"Art. 140","group":"Norme","heading":"Facolta' dei difensori di prendere visione del fascicolo trasmesso con la richiesta di decreto penale di condanna","contentHtml":"<p>1. Durante il termine per proporre opposizione, le parti e i difensori hanno facolta' di prendere visione ed estrarre copia, nella cancelleria del giudice per le indagini preliminari, del fascicolo trasmesso a norma dell'articolo 459 comma 1 del codice.</p>","notesHtml":""},{"id":"art_141","numText":"Art. 141","group":"Norme","heading":"Procedimento di oblazione","contentHtml":"<p>1. Se la domanda di oblazione e' proposta nel corso delle indagini preliminari, il pubblico ministero la trasmette, unitamente agli atti del procedimento, al giudice per le indagini preliminari. \n 2. Il pubblico ministero, anche prima di presentare richiesta di decreto penale, puo' avvisare l'interessato, ove ne ricorrano i presupposti, che ha facolta' di chiedere di essere ammesso all'oblazione e che il pagamento dell'oblazione estingue il reato. \n 3. Quando per il reato per il quale si e' proceduto e' ammessa l'oblazione e non e' stato dato l'avviso previsto dal comma 2, nel decreto penale deve essere fatta menzione della relativa facolta' dell'imputato. \n 4. Quando e' proposta domanda di oblazione, il giudice, acquisito il parere del pubblico ministero, se respinge la domanda pronuncia ordinanza disponendo, se del caso, la restituzione degli atti al pubblico ministero; altrimenti ammette all'oblazione e fissa con ordinanza la somma da versare, dandone avviso all'interessato.\nAvvenuto il versamento della somma, il giudice, se la domanda e' stata proposta nel corso delle indagini preliminari, trasmette gli atti al pubblico ministero per le sue determinazioni; in ogni altro caso dichiara con sentenza l'estinzione del reato. Non si applica la disposizione dell'articolo, 75 comma 3, del codice. \n 4-bis. In caso di modifica dell'originaria imputazione in altra per la quale sia ammissibile l'oblazione, l'imputato e' rimesso in termini per chiedere la medesima. La disposizione di cui al primo periodo si applica anche nel caso di nuove contestazioni ai sensi degli articoli 517 e 518 del codice. Il giudice, se accoglie la domanda, fissa un termine non superiore a dieci giorni, per il pagamento della somma dovuta. Se il pagamento avviene nel termine il giudice dichiara con sentenza l'estinzione del reato.</p>","notesHtml":""},{"id":"art_141","numText":"Art. 141-bis","group":"Norme","heading":"Avviso del pubblico ministero per la richiesta di ammissione alla messa alla prova ((. Proposta di messa alla prova formulata dal pubblico ministero","contentHtml":"<p>1. Il pubblico ministero, anche prima di esercitare l'azione penale, puo' avvisare l'interessato, ove ne ricorrano i presupposti, che ha la facolta' di chiedere di essere ammesso alla prova, ai sensi dell'articolo 168-bis del codice penale, e che l'esito positivo della prova estingue il reato. \n 1-bis. Il pubblico ministero puo' formulare la proposta di sospensione del procedimento con messa alla prova, prevista dall'articolo 464-ter.1 del codice, in occasione della notifica dell'avviso previsto dall'articolo 415-bis del codice.</p>","notesHtml":""},{"id":"art_141","numText":"Art. 141-ter","group":"Norme","heading":"Attivita' dei servizi sociali nei confronti degli adulti ammessi alla prova","contentHtml":"<p>1. Le funzioni dei servizi sociali per la messa alla prova, disposta ai sensi dell'articolo 168-bis del codice penale, sono svolte dagli uffici locali di esecuzione penale esterna, nei modi e con i compiti previsti dall'articolo 72 della legge 26 luglio 1975, n. 354, e successive modificazioni. \n 1-bis. Gli uffici di esecuzione penale esterna forniscono le indicazioni loro richieste dal pubblico ministero ai sensi dell'articolo 464-ter.1, comma 1, del codice entro il termine di trenta giorni. \n 2. Ai fini del comma 1, l'imputato rivolge richiesta all'ufficio locale di esecuzione penale esterna competente affinche' predisponga un programma di trattamento. L'imputato deposita gli atti rilevanti del procedimento penale nonche' le osservazioni e le proposte che ritenga di fare. \n 3. L'ufficio di cui al comma 2, all'esito di un'apposita indagine socio-familiare, redige il programma di trattamento, acquisendo su tale programma il consenso dell'imputato e l'adesione dell'ente o del soggetto presso il quale l'imputato e' chiamato a svolgere le proprie prestazioni. L'ufficio trasmette quindi al giudice il programma accompagnandolo con l'indagine socio-familiare e con le considerazioni che lo sostengono. Nell'indagine e nelle considerazioni, l'ufficio riferisce specificamente sulle possibilita' economiche dell'imputato, sulla capacita' e sulla possibilita' di svolgere attivita' riparatorie nonche' sulla possibilita' di svolgimento di attivita' di mediazione, anche avvalendosi a tal fine di centri o strutture pubbliche o private presenti sul territorio. \n 4. Quando e' disposta la sospensione del procedimento con messa alla prova dell'imputato, l'ufficio di cui al comma 2 informa il giudice, con la cadenza stabilita nel provvedimento di ammissione e comunque non superiore a tre mesi, dell'attivita' svolta e del comportamento dell'imputato, proponendo, ove necessario, modifiche al programma di trattamento, eventuali abbreviazioni di esso ovvero, in caso di grave o reiterata trasgressione, la revoca del provvedimento di sospensione. \n 5. Alla scadenza del periodo di prova, l'ufficio di cui al comma 2 trasmette al giudice una relazione dettagliata sul decorso e sull'esito della prova medesima. \n 6. Le relazioni periodiche e quella finale dell'ufficio di cui al comma 2 del presente articolo sono depositate in cancelleria non meno di dieci giorni prima dell'udienza di cui all'articolo 464-septies del codice, con facolta' per le parti di prenderne visione ed estrarne copia.</p>","notesHtml":""},{"id":"art_142","numText":"Art. 142","group":"Norme","heading":"","contentHtml":"<p>Citazione di testimoni, periti, interpreti, consulenti tecnici e imputati di un procedimento connesso \n 1. COMMA SOPPRESSO DAL D.L. 8 GIUGNO 1992, N. 306, CONVERTITO CON MODIFICAZIONI DALLA L. 7 AGOSTO 1992, N. 356. \n 2. Quando per le notificazioni dei testimoni, dei periti, degli interpreti, dei consulenti tecnici e delle persone indicate nell'articolo 210 del codice e' richiesto l'ufficiale giudiziario, le parti devono consegnare al medesimo gli atti di citazione in tempo utile e nel numero di copie necessario. \n 3. L'atto di citazione contiene: \n a) l'indicazione della parte richiedente e dell'imputato nonche' del decreto che ha autorizzato la citazione; \n b) le generalita' e il domicilio della persona da citare; \n c) il giorno, l'ora e il luogo della comparizione e il giudice davanti al quale la persona citata deve presentarsi; \n d) l'indicazione degli obblighi e delle facolta' previsti dagli articoli 198, 210 e 226 del codice; \n d-bis) l'avvertimento che la mancata comparizione senza giustificato motivo del querelante all'udienza in cui e' citato a comparire come testimone integra remissione tacita di querela, nei casi in cui essa e' consentita; \n e) l'avvertimento che, fuori del caso previsto dalla lettera d-bis), in caso di mancata comparizione non dovuta a legittimo impedimento, la persona citata potra', a norma dell'articolo 133 del codice, essere accompagnata a mezzo della polizia giudiziaria e condannata al pagamento di una somma da lire centomila a lire un milione a favore della cassa delle ammende e alla rifusione delle spese alle quali la mancata comparizione ha dato causa. \n 4. Quando la citazione e' disposta di ufficio il decreto di citazione contiene i requisiti previsti dal comma 3 lettere b), c), d), d-bis), e) nonche' l'indicazione dell'imputato.</p>","notesHtml":""},{"id":"art_143","numText":"Art. 143","group":"Norme","heading":"Rinnovazione della citazione a giudizio","contentHtml":"<p>1. Negli atti preliminari al dibattimento, in tutti i casi in cui occorre, per qualunque motivo, rinnovare la citazione a giudizio o la relativa notificazione, vi provvede il presidente.</p>","notesHtml":""},{"id":"art_143","numText":"Art. 143-bis","group":"Norme","heading":"Adempimenti in caso di ((sentenza di non doversi procedere per mancata conoscenza della pendenza del processo da parte","contentHtml":"<p>dell'imputato).</p>\n<p>1. Quando il giudice emette la sentenza di cui all'articolo 420-quater del codice, ne dispone la trasmissione alla locale sezione di polizia giudiziaria, per l'inserimento nel Centro elaborazione dati, di cui all'articolo 8 della legge 1º aprile 1981, n. 121, e successive modificazioni. \n (65)</p>","notesHtml":"<p>AGGIORNAMENTO (65)</p>\n<p>La L. 28 aprile 2014, n. 67, come modificata dalla L. 11 agosto 2014, n. 118, ha disposto (con l'art. 15-bis, comma 1) che &quot;Le disposizioni di cui al presente capo si applicano ai procedimenti in corso alla data di entrata in vigore della presente legge, a condizione che nei medesimi procedimenti non sia stato pronunciato il dispositivo della sentenza di primo grado&quot;. \n Ha inoltre disposto (con l'art. 15-bis, comma 2) che &quot;In deroga a quanto previsto dal comma 1, le disposizioni vigenti prima della data di entrata in vigore della presente legge continuano ad applicarsi ai procedimenti in corso alla data di entrata in vigore della presente legge quando l'imputato e' stato dichiarato contumace e non e' stato emesso il decreto di irreperibilita'&quot;.</p>"},{"id":"art_144","numText":"Art. 144","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_145","numText":"Art. 145","group":"Norme","heading":"Comparizione dei testimoni, periti, consulenti tecnici e interpreti","contentHtml":"<p>1. I testimoni, i periti, i consulenti tecnici e gli interpreti citati devono trovarsi presenti all'inizio dell'udienza. \n 2. Se il dibattimento deve protrarsi per piu' giorni, il presidente, sentiti il pubblico ministero e i difensori, stabilisce il giorno in cui ciascuna persona deve comparire.</p>","notesHtml":""},{"id":"art_145","numText":"Art. 145-bis","group":"Norme","heading":"Aule di udienza protette","contentHtml":"<p>1. Nei procedimenti per taluno dei reati indicati nell'articolo 51, comma 3-bis, del codice, quando e' necessario, per ragioni di sicurezza, utilizzare aule protette e queste non siano disponibili nella sede giudiziaria territorialmente competente, il Presidente della Corte d'appello, su proposta del Presidente del Tribunale, individua l'aula protetta per il dibattimento nell'ambito del distretto. Qualora l'aula protetta non sia disponibile nell'ambito del distretto, il Ministero della giustizia fornisce al Presidente della Corte d'appello nel cui distretto si trova il giudice competente l'indicazione dell'aula disponibile individuata nel distretto di corte d'appello piu' vicino. \n 2. Il provvedimento di cui ai commi che precedono e' adottato prima della notificazione del decreto di citazione che dispone il giudizio a norma dell'articolo 133.</p>","notesHtml":""},{"id":"art_146","numText":"Art. 146","group":"Norme","heading":"Aula di udienza dibattimentale","contentHtml":"<p>1. Nelle aule di udienza per il dibattimento, i banchi riservati al pubblico ministero e ai difensori sono posti allo stesso livello di fronte all'organo giudicante. Le parti private siedono a fianco dei propri difensori, salvo che sussistano esigenze di cautela. Il seggio delle persone da sottoporre ad esame e' collocato in modo da consentire che le persone stesse siano agevolmente visibili sia dal giudice che dalle parti.</p>","notesHtml":""},{"id":"art_146","numText":"Art. 146-bis","group":"Norme","heading":"Partecipazione al dibattimento a distanza","contentHtml":"<p>1. La persona che si trova in stato di detenzione per taluno dei delitti indicati nell'articolo 51, comma 3-bis, nonche' nell'articolo 407, comma 2, lettera a), numero 4), del codice, partecipa a distanza alle udienze dibattimentali dei processi nei quali e' imputata, anche relativi a reati per i quali sia in liberta'. Allo stesso modo partecipa alle udienze penali e alle udienze civili nelle quali deve essere esaminata quale testimone. (76) (83) \n 1-bis. La persona ammessa a programmi o misure di protezione, comprese quelle di tipo urgente o provvisorio, partecipa a distanza alle udienze dibattimentali dei processi nei quali e' imputata. (76) (83) \n 1-ter. Ad esclusione del caso in cui sono state applicate le misure di cui all'articolo 41-bis della legge 26 luglio 1975, n. 354, e successive modificazioni, il giudice puo' disporre con decreto motivato, anche su istanza di parte, la presenza alle udienze delle persone indicate nei commi 1 e 1-bis del presente articolo qualora lo ritenga necessario. (76) (83) \n 1-quater. Fuori dei casi previsti dai commi 1 e 1-bis, il giudice puo' disporre con decreto motivato la partecipazione a distanza anche quando sussistano ragioni di sicurezza, qualora il dibattimento sia di particolare complessita' e sia necessario evitare ritardi nel suo svolgimento, ovvero quando si deve assumere la testimonianza di persona a qualunque titolo in stato di detenzione presso un istituto penitenziario. (76) (83) \n 2. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 3. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 4. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 4-bis. In tutti i processi nei quali si procede con il collegamento audiovisivo ai sensi dei commi precedenti, il giudice, su istanza, puo' consentire alle parti private e ai loro difensori di intervenire a distanza assumendosi l'onere dei costi del collegamento. (76) (83) \n 5. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 6. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 7. Se nel dibattimento occorre procedere a confronto o ricognizione dell'imputato o ad altro atto che implica l'osservazione della sua persona, il giudice, ove lo ritenga indispensabile, sentite le parti, dispone la presenza dell'imputato nell'aula di udienza per il tempo necessario al compimento dell'atto. (27) (33)</p>","notesHtml":"<p>AGGIORNAMENTO (27)</p>\n<p>La L. 7 gennaio 1998, n. 11 ha disposto (con l'art. 6, comma 1 che la suddetta modifica ha efficacia dal 31 dicembre 2000.</p>\n<p>AGGIORNAMENTO (33)</p>\n<p>La L. 7 gennaio 1998, n. 11, come modificata dal D.L. 24 novembre 2000, n. 341, convertito con modificazioni dalla L. 19 gennaio 2001, n. 4, ha disposto (con l'art. 6, comma 1) che le modifiche dalla stessa introdotte hanno efficacia dal 31 dicembre 2002.</p>\n<p>AGGIORNAMENTO (76)</p>\n<p>La L. 23 giugno 2017, n. 103, ha disposto (con l'art. 1, comma 81) che &quot;Le disposizioni di cui ai commi 77, 78, 79 e 80 acquistano efficacia decorso un anno dalla pubblicazione della presente legge nella Gazzetta Ufficiale, fatta eccezione per le disposizioni di cui al comma 77, relativamente alle persone che si trovano in stato di detenzione per i delitti di cui agli articoli 270-bis, primo comma, e 416-bis, secondo comma, del codice penale, nonche' di cui all'articolo 74, comma 1, del testo unico di cui al decreto del Presidente della Repubblica 9 ottobre 1990, n. 309, e successive modificazioni&quot;.</p>\n<p>AGGIORNAMENTO (83)</p>\n<p>Il D.L. 25 luglio 2018, n. 91, convertito con modificazioni dalla L. 21 settembre 2018, n. 108, nel modificare l'art. 1, comma 77, della L. 23 giugno 2017, n. 103, ha conseguentemente disposto (con l'art. 2, comma 2) che &quot;L'efficacia delle disposizioni di cui all'articolo 1, commi 77, 78, 79 e 80, della legge 23 giugno 2017, n. 103, fatta salva l'eccezione di cui al comma 81 dello stesso articolo 1 per le persone che si trovano in stato di detenzione per i delitti ivi indicati, e' sospesa dalla data di entrata in vigore del presente decreto fino al 15 febbraio 2019&quot;.</p>"},{"id":"art_147","numText":"Art. 147","group":"Norme","heading":"Riprese audiovisive dei dibattimenti","contentHtml":"<p>1. Ai fini dell'esercizio del diritto di cronaca, il giudice con ordinanza, se le parti consentono, puo' autorizzare in tutto o in parte la ripresa fotografica, fonografica o audiovisiva ovvero la trasmissione radiofonica o televisiva del dibattimento, purche' non ne derivi pregiudizio al sereno e regolare svolgimento dell'udienza o alla decisione. \n 2. L'autorizzazione puo' essere data anche senza il consenso delle parti quando sussiste un interesse sociale particolarmente rilevante alla conoscenza del dibattimento. \n 3. Anche quando autorizza la ripresa o la trasmissione a norma dei commi 1 e 2, il presidente vieta la ripresa delle immagini di parti, testimoni, periti, consulenti tecnici, interpreti e di ogni altro soggetto che deve essere presente, se i medesimi non vi consentono o la legge ne fa divieto. \n 4. Non possono in ogni caso essere autorizzate le riprese o le trasmissioni dei dibattimenti che si svolgono a porte chiuse a norma dell'articolo 472 commi 1, 2 e 4 del codice.</p>","notesHtml":""},{"id":"art_147","numText":"Art. 147-bis","group":"Norme","heading":"Esame degli operatori sotto copertura, delle persone che collaborano con la giustizia e degli imputati di reato connesso","contentHtml":"<p>1. L'esame in dibattimento delle persone ammesse, in base alla legge, a programmi o misure di protezione anche di tipo urgente o provvisorio si svolge con le cautele necessarie alla tutela della persona sottoposta all'esame, determinate, d'ufficio ovvero su richiesta di parte o dell'autorita' che ha disposto il programma o le misure di protezione, dal giudice o, nei casi di urgenza, dal presidente del tribunale o della corte di assise. \n 1-bis. L'esame in dibattimento degli ufficiali e degli agenti di polizia giudiziaria, anche appartenenti ad organismi di polizia esteri, degli ausiliari e delle interposte persone, che abbiano operato in attivita' sotto copertura ai sensi dell'articolo 9 della legge 16 marzo 2006, n. 146, e successive modificazioni, si svolge sempre con le cautele necessarie alla tutela e alla riservatezza della persona sottoposta all'esame e con modalita' determinate dal giudice o, nei casi di urgenza, dal presidente, in ogni caso idonee a evitare che il volto di tali soggetti sia visibile. \n 2. Il giudice o il presidente, sentite le parti, puo' disporre, anche d'ufficio, che l'esame si svolga a distanza. \n 3. Salvo che il giudice ritenga assolutamente necessaria la presenza della persona da esaminare, l'esame si svolge a distanza secondo le modalita' previste dal comma 2 nei seguenti casi: \n a) quando l'esame e' disposto nei confronti di persone ammesse al piano provvisorio di protezione previsto dall'articolo 13, comma 1, del decreto-legge 15 gennaio 1991, n. 8, convertito, con modificazioni, dalla legge 15 marzo 1991, n. 82, e successive modificazioni, o alle speciali misure di protezione di cui al citato articolo 13, commi 4 e 5, del medesimo decreto-legge; \n a-bis) quando l'esame o altro atto istruttorio e' disposto nei confronti di persone ammesse al piano provvisorio o al programma definitivo per la protezione dei testimoni di giustizia; \n b) quando nei confronti della persona sottoposta ad esame e' stato emesso il decreto di cambiamento delle generalita' di cui all'articolo 3 del decreto legislativo 29 marzo 1993, n. 119; in tale caso, nel procedere all'esame, il giudice o il presidente si uniforma a quanto previsto dall'articolo 6, comma 6, del medesimo decreto legislativo e dispone le cautele idonee ad evitare che il volto della persona sia visibile; \n c) quando nell'ambito di un processo per taluno dei delitti previsti dall'articolo 51, comma 3-bis, o dall'articolo 407, comma 2, lettera a), n. 4, del codice devono essere esaminate le persone indicate dall'articolo 210 del codice nei cui confronti si procede per uno dei delitti previsti dall'articolo 51, comma 3-bis o dall'articolo 407, comma 2, lettera a), n. 4, del codice, anche se vi e' stata separazione dei procedimenti. \n c-bis) quando devono essere esaminati ufficiali o agenti di polizia giudiziaria, anche appartenenti ad organismi di polizia esteri, nonche' ausiliari e interposte persone, in ordine alle attivita' dai medesimi svolte nel corso delle operazioni sotto copertura di cui all'articolo 9 della legge 16 marzo 2006, n. 146, e successive modificazioni. In tali casi, il giudice o il presidente dispone le cautele idonee ad evitare che il volto di tali soggetti sia visibile. \n 4. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 5. Le modaiita' di cui al comma 2 possono essere altresi' adottate, a richiesta di parte, per l'esame della persona di cui e' stata disposta la nuova assunzione a norma dell'articolo 495, comma 1, del codice, o quando vi siano gravi difficolta' ad assicurare la comparizione della persona da sottoporre ad esame. (27) (33)</p>","notesHtml":"<p>AGGIORNAMENTO (27)</p>\n<p>La L. 7 gennaio 1998, n. 11 ha disposto (con l'art. 6, comma 1) che la suddetta modifica ha efficacia dal 31 dicembre 2000.</p>\n<p>AGGIORNAMENTO (33)</p>\n<p>La L. 7 gennaio 1998, n. 11, come modificata dal D.L. 24 novembre 2000, n. 341, convertito con modificazioni dalla L. 19 gennaio 2001, n. 4, ha disposto (con l'art. 6, comma 1) che le modifiche dalla stessa introdotte hanno efficacia dal 31 dicembre 2002.</p>"},{"id":"art_147","numText":"Art. 147-ter","group":"Norme","heading":"Ricognizione in dibattimento delle persone che collaborano con la giustizia","contentHtml":"<p>1. Quando nel dibattimento occorre procedere a ricognizione della persona nei cui confronti e' stato emesso il decreto di cambiamento delle generalita' di cui all'articolo 3 del decreto legislativo 29 marzo 1993, n. 119, ovvero ad altro atto che implica l'osservazione del corpo della medesima, il giudice, ove lo ritenga indispensabile, ne autorizza o ordina la citazione o ne dispone l'accompagnamento coattivo per il tempo necessario al compimento dell'atto. \n 2. Durante tutto il tempo in cui la persona e' presente nell'aula di udienza, il dibattimento si svolge a porte chiuse a norma dell'articolo 473, comma 2, del codice. \n 3. Se l'atto da assumere non ne rende necessaria l'osservazione, il giudice dispone le cautele idonee ad evitare che il volto della persona sia visibile. (27) <sup class=\"amd\">33</sup></p>\n<p>AGGIORNAMENTO (27)\nLa L. 7 gennaio 1998, n. 11 ha disposto (con l'art. 6, comma 1) che la suddetta modifica ha efficacia dal 31 dicembre 2000.</p>\n<p>AGGIORNAMENTO (33)\nLa L. 7 gennaio 1998, n. 11, come modificata dal D.L. 24 novembre\n2000, n. 341, convertito con modificazioni dalla L. 19 gennaio 2001, n. 4, ha disposto (con l'art. 6, comma 1) che le modifiche dalla stessa introdotte hanno efficacia dal 31 dicembre 2002.</p>","notesHtml":""},{"id":"art_147","numText":"Art. 147-quater","group":"Norme","heading":"Requisiti tecnici di sicurezza in caso di partecipazione a distanza","contentHtml":"<p>1. Il Ministero della giustizia assicura che, nei casi di partecipazione a distanza al compimento di atti del procedimento ovvero alla celebrazione delle udienze, i collegamenti telematici agli uffici giudiziari siano realizzati attraverso reti o canali di comunicazione idonei a garantire l'integrita' e la sicurezza della trasmissione dei dati.</p>","notesHtml":""},{"id":"art_148","numText":"Art. 148","group":"Norme","heading":"Eliminazione di atti dal fascicolo \n per il dibattimento","contentHtml":"<p>1. Gli atti del fascicolo per il dibattimento dei quali il giudice ha disposto la eliminazione a norma dell'articolo 491 comma 4 del codice sono restituiti al pubblico ministero.</p>","notesHtml":""},{"id":"art_149","numText":"Art. 149","group":"Norme","heading":"Regole da osservare prima dell'esame testimoniale","contentHtml":"<p>1. L'esame del testimone deve avvenire in modo che nel corso della udienza nessuna delle persone citate prima di deporre possa comunicare con alcuna delle parti o con i difensori o consulenti tecnici, assistere agli esami degli altri o vedere o udire o essere altrimenti informata di cio' che si fa nell'aula di udienza.</p>","notesHtml":""},{"id":"art_150","numText":"Art. 150","group":"Norme","heading":"Esame delle parti private","contentHtml":"<p>1. L'esame delle parti private, nell'ordine previsto dall'articolo 503 comma 1 del codice, ha luogo appena terminata l'assunzione delle prove a carico dell'imputato.</p>","notesHtml":""},{"id":"art_151","numText":"Art. 151","group":"Norme","heading":"Assunzione di nuove prove","contentHtml":"<p>1. Nel caso previsto dall'articolo 507 del codice, il giudice dispone l'assunzione dei nuovi mezzi di prova secondo l'ordine previsto dall'articolo 496 del codice, se le prove sono state richieste dalle parti. \n 2. Quando e' stato disposto di ufficio l'esame di una persona, il presidente vi provvede direttamente stabilendo, all'esito, la parte che deve condurre l'esame diretto.</p>","notesHtml":""},{"id":"art_152","numText":"Art. 152","group":"Norme","heading":"Facolta' delle parti nel caso di perizia \n disposta nel dibattimento","contentHtml":"<p>1. Quando il giudice ha disposto la citazione del perito a norma dell'articolo 508 comma 1 del codice, le parti hanno facolta' di presentare al dibattimento, anche senza citazione, i propri consulenti tecnici a norma dell'articolo 225 del codice.</p>","notesHtml":""},{"id":"art_153","numText":"Art. 153","group":"Norme","heading":"Liquidazione delle spese processuali in favore \n della parte civile","contentHtml":"<p>1. Agli effetti dell'articolo 541 comma 1 del codice, le spese sono liquidate dal giudice sulla base della nota che la parte civile presenta al piu' tardi insieme alle conclusioni.</p>","notesHtml":""},{"id":"art_154","numText":"Art. 154","group":"Norme","heading":"Redazione non immediata dei motivi della sentenza","contentHtml":"<p>1. Nei casi previsti dall'articolo 544 commi 2 e 3 del codice, il presidente provvede personalmente alla redazione della motivazione o designa un estensore tra i componenti del collegio. \n 2. L'estensore rende disponibile la bozza della sentenza al presidente il quale, se sorgono questioni sulla motivazione, ne da' lettura al collegio, che puo' designare un altro estensore. \n 3. COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150. \n 4. Il presidente e l'estensore sottoscrivono la sentenza. \n 4-bis. Il Presidente della corte d'appello puo' prorogare, su richiesta motivata del giudice che deve procedere alla redazione della motivazione, i termini previsti dall'articolo 544, comma 3, del codice, per una sola volta e per un periodo massimo di novanta giorni, esonerando, se necessario, il giudice estensore da altri incarichi. Per i giudizi di primo grado provvede il presidente del tribunale. In ogni caso del provvedimento e' data comunicazione al Consiglio superiore della magistratura.</p>","notesHtml":""},{"id":"art_154","numText":"Art. 154-bis","group":"Norme","heading":"Liberazione dell'imputato prosciolto","contentHtml":"<p>1. L'imputato detenuto e' posto in liberta' immediatamente dopo la lettura in udienza del dispositivo della sentenza di proscioglimento, se non detenuto per altra causa. \n 2. L'imputato prosciolto e la persona di cui e' comunque disposta l'immediata liberazione sono accompagnati, separatamente dai soggetti da tradurre, presso l'istituto penitenziario, per il disbrigo delle formalita' conseguenti alla liberazione; se ne fanno richiesta, possono recarsi presso l'istituto anche senza accompagnamento. E' vietato l'uso di qualsiasi mezzo di coercizione fisica.</p>","notesHtml":""},{"id":"art_154","numText":"Art. 154-ter","group":"Norme","heading":"Comunicazione della sentenza","contentHtml":"<p>1. La cancelleria del giudice che ha pronunciato sentenza penale nei confronti di un lavoratore dipendente di un'amministrazione pubblica ne comunica il dispositivo all'amministrazione di appartenenza e, su richiesta di questa, trasmette copia integrale del provvedimento. La comunicazione e la trasmissione sono effettuate con modalita' telematiche, ai sensi del decreto legislativo 7 marzo 2005, n. 82, entro trenta giorni dalla data del deposito.</p>","notesHtml":""},{"id":"art_154","numText":"Art. 154-quater","group":"Norme","heading":"Sentenza che dispone una misura di sicurezza da eseguire presso una struttura sanitaria","contentHtml":"<p>1. Se non e' presentata impugnazione nei termini di legge avverso la sentenza che applica una misura di sicurezza di cui all'articolo 215, secondo comma, numeri 2 e 3, del codice penale, la cancelleria ne trasmette senza ritardo, e comunque entro cinque giorni, l'estratto al pubblico ministero presso il giudice indicato nell'articolo 665 del codice. Fermo quanto previsto dall'articolo 626 del codice, la cancelleria della Corte di cassazione provvede allo stesso modo quando l'esecuzione consegue alla decisione della stessa Corte.</p>","notesHtml":""},{"id":"art_155","numText":"Art. 155","group":"Norme","heading":"ARTICOLO ABROGATO DALLA L. 16 DICEMBRE 1999, N. 479","contentHtml":"","notesHtml":""},{"id":"art_156","numText":"Art. 156","group":"Norme","heading":"ARTICOLO ABROGATO DALLA L. 16 DICEMBRE 1999, N. 479","contentHtml":"","notesHtml":""},{"id":"art_157","numText":"Art. 157","group":"Norme","heading":"Ulteriori indagini. Avocazione","contentHtml":"<p>1. Quando emette decreto di archiviazione, il giudice per le indagini preliminari, se rileva l'esigenza di ulteriori indagini, ne informa il procuratore generale presso la corte di appello. Questi, se ne ravvisa i presupposti, richiede la riapertura delle indagini a norma dell'articolo 414 del codice. \n 2. Quando e' accolta la richiesta del procuratore generale, le nuove indagini restano avocate. <sup class=\"amd\">8</sup></p>\n<p>AGGIORNAMENTO (8) \n La Corte costituzionale, con sentenza 26 settembre-12 ottobre 1990, n. 445 (in G.U. 1a s.s. 17/10/1990, n. 41), ha dichiarato l'illegittimita' costituzionale del presente articolo.</p>","notesHtml":""},{"id":"art_158","numText":"Art. 158","group":"Norme","heading":"ARTICOLO ABROGATO DALLA L. 16 DICEMBRE 1999, N. 479","contentHtml":"","notesHtml":""},{"id":"art_159","numText":"Art. 159","group":"Norme","heading":"Indicazione dei procedimenti speciali nel decreto \n di citazione a giudizio","contentHtml":"<p>1. Nel decreto di citazione a giudizio sono indicati i procedimenti speciali, e i relativi articoli di legge, che possono trovare applicazione nel caso concreto. \n 2. Il pubblico ministero, nel decreto di citazione a giudizio, puo' manifestare il proprio consenso all'applicazione della pena su richiesta, indicando gli elementi previsti dall'articolo 444, comma&quot; 1, del codice.</p>","notesHtml":""},{"id":"art_160","numText":"Art. 160","group":"Norme","heading":"Determinazione della data dell'udienza dibattimentale o del procedimento speciale","contentHtml":"<p>1. Ai fini dell'emissione del decreto di citazione a giudizio ovvero del decreto che dispone il giudizio a seguito di opposizione a decreto penale, la richiesta prevista dall'articolo 132 comma 2 e' proposta al presidente del tribunale rispettivamente dal pubblico ministero o dal giudice per le indagini preliminari. \n 2. COMMA ABROGATO DALLA L. 16 DICEMBRE 1999, N. 479.</p>","notesHtml":""},{"id":"art_161","numText":"Art. 161","group":"Norme","heading":"ARTICOLO ABROGATO DALLA L. 16 DICEMBRE 1999, N. 479","contentHtml":"","notesHtml":""},{"id":"art_162","numText":"Art. 162","group":"Norme","heading":"Delega delle funzioni di pubblico ministero \n in udienza dibattimentale","contentHtml":"<p>1. La delega prevista dall'articolo 72 del regio decreto 30 gennaio 1941 n. 12 e' conferita con atto scritto di cui e' fatta annotazione in apposito registro ed e' esibita in dibattimento. \n 2. Nel caso di giudizio direttissimo, la delega puo' essere conferita anche per la partecipazione alla contestuale udienza di convalida. \n 3. Quando si presenta la necessita' di prestare il consenso all'applicazione della pena su richiesta o al giudizio abbreviato ovvero si deve procedere a nuove contestazioni, il pubblico ministero delegato puo' procedere a consultazioni con il procuratore della Repubblica. \n 4. Il giudice, nel caso previsto dal comma 3, puo' sospendere l'udienza per il tempo strettamente necessario.</p>","notesHtml":""},{"id":"art_163","numText":"Art. 163","group":"Norme","heading":"Presentazione dell'arrestato per la convalida","contentHtml":"<p>1. Nel caso previsto dall'articolo <sup class=\"amd\">558</sup> comma 1, la presentazione dell'arrestato al giudice per la convalida e il contestuale giudizio e' disposta dal procuratore della Repubblica con l'atto mediante il quale formula l'imputazione. \n 2. Gli ufficiali o gli agenti di polizia giudiziaria che hanno eseguito l'arresto consegnano immediatamente gli atti al pubblico ministero presente all'udienza.</p>","notesHtml":""},{"id":"art_163","numText":"Art. 163-bis","group":"Norme","heading":"Inosservanza delle disposizioni sulle attribuzioni delle sezioni distaccate del tribunale","contentHtml":"<p>1. L'inosservanza delle disposizioni di ordinamento giudiziario relative alla ripartizione tra sede principale e sezioni distaccate, o tra diverse sezioni distaccate, dei procedimenti nei quali il tribunale giudica in composizione monocratica e' rilevata fino alla dichiarazione di apertura del dibattimento di primo grado. \n 2. Il giudice, se ravvisa l'inosservanza o ritiene comunque non manifestamente infondata la relativa questione, rimette gli atti al presidente del tribunale, che provvede con decreto non impugnabile.</p>","notesHtml":""},{"id":"art_163","numText":"Art. 163-ter","group":"Norme","heading":"Presentazione dell'atto di impugnazione presso la sezione distaccata","contentHtml":"<p>1. Nei casi previsti dagli articoli 461 comma 1 e 582 comma 2 del codice, le dichiarazioni e le impugnazioni possono essere presentate anche nella cancelleria della sezione distaccata del tribunale.</p>","notesHtml":""},{"id":"art_164","numText":"Art. 164","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 150","contentHtml":"","notesHtml":""},{"id":"art_165","numText":"Art. 165","group":"Norme","heading":"Annotazione della impugnazione in calce \n al provvedimento impugnato","contentHtml":"<p>1. Prima della notificazione, l'impugnazione e' annotata in calce al provvedimento impugnato, con la indicazione di chi la ha proposta e della data della proposizione. \n 2. Le copie del provvedimento impugnato trasmesse al giudice dell'impugnazione contengono le indicazioni previste dal comma 1.</p>","notesHtml":""},{"id":"art_165","numText":"Art. 165-bis","group":"Norme","heading":"Adempimenti connessi alla trasmissione degli atti al giudice dell'impugnazione","contentHtml":"<p>1. Gli atti da trasmettere al giudice dell'impugnazione devono contenere, in distinti allegati formati subito dopo la presentazione dell'atto di impugnazione, a cura del giudice o del presidente del collegio che ha emesso il provvedimento impugnato, i seguenti dati: \n a) i nominativi dei difensori, di fiducia o d'ufficio, con indicazione della data di nomina; \n b) le dichiarazioni o elezioni o determinazioni di domicilio, con indicazione delle relative date; \n c) i termini di prescrizione riferiti a ciascun reato, con indicazione degli atti interruttivi e delle specifiche cause di sospensione del relativo corso, ovvero eventuali dichiarazioni di rinuncia alla prescrizione; \n d) i termini di scadenza delle misure cautelari in atto, con indicazione della data di inizio e di eventuali periodi di sospensione o proroga. \n 2. Nel caso di ricorso per cassazione, a cura della cancelleria del giudice che ha emesso il provvedimento impugnato, e' inserita in separato fascicolo allegato al ricorso, qualora non gia' contenuta negli atti trasmessi, copia degli atti specificamente indicati da chi ha proposto l'impugnazione ai sensi dell'articolo 606, comma 1, lettera e), del codice; della loro mancanza e' fatta attestazione.</p>","notesHtml":""},{"id":"art_165","numText":"Art. 165-ter","group":"Norme","heading":"Monitoraggio dei termini di cui all'articolo 344-bis del codice","contentHtml":"<p>1. I presidenti della Corte di cassazione e delle corti di appello adottano i provvedimenti organizzativi necessari per attuare il costante monitoraggio dei termini di durata massima dei giudizi di impugnazione e del rispetto della disposizione di cui all'articolo 175-bis.</p>","notesHtml":""},{"id":"art_166","numText":"Art. 166","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 6 FEBBRAIO 2018, N. 11","contentHtml":"","notesHtml":""},{"id":"art_166","numText":"Art. 166-bis","group":"Norme","heading":"Poteri del procuratore generale in materia di impugnazione delle sentenze di primo grado","contentHtml":"<p>1. Al fine di acquisire tempestiva notizia in ordine alle determinazioni relative all'impugnazione delle sentenze di primo grado, il procuratore generale presso la corte d'appello promuove intese o altre forme di coordinamento con i procuratori della Repubblica del distretto.</p>","notesHtml":""},{"id":"art_167","numText":"Art. 167","group":"Norme","heading":"Nuovi motivi della impugnazione gia' proposta","contentHtml":"<p>1. Nel caso di presentazione di motivi nuovi, si applicano le disposizioni dell'articolo 164 commi 2 e 3 e devono essere specificati i capi e i punti enunciati a norma dell'articolo 581 comma 1 lettera a) del codice, ai quali i motivi si riferiscono.</p>","notesHtml":""},{"id":"art_167","numText":"Art. 167-bis","group":"Norme","heading":"Adempimenti connessi all'udienza di cui all'articolo 598-bis del codice","contentHtml":"<p>1. L'avviso del deposito del provvedimento emesso dalla corte di appello in seguito alla camera di consiglio di cui all'articolo 598-bis del codice, contenente l'indicazione del dispositivo, e' comunicato a cura della cancelleria al procuratore generale e ai difensori delle altre parti.\n <sup class=\"amd\">99</sup></p>","notesHtml":"<p>AGGIORNAMENTO (99)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 150 ha disposto (con l'art. 94, comma 2) che &quot;Le disposizioni degli articoli 34, comma 1, lettere c), e), f), g), numeri 2), 3), 4), e h), 35, comma 1, lettera a), e 41, comma 1, lettera ee), si applicano a decorrere dalla scadenza del termine fissato dall'articolo 16, comma 1, del decreto-legge 30 dicembre 2021, n. 228, convertito, con modificazioni, dalla legge 25 febbraio 2022, n. 15&quot;.</p>"},{"id":"art_168","numText":"Art. 168","group":"Norme","heading":"Disposizione di rinvio","contentHtml":"<p>1. Nei giudizi di impugnazione si osservano, in quanto applicabili, le disposizioni di attuazione relative al giudizio di primo grado.</p>","notesHtml":""},{"id":"art_169","numText":"Art. 169","group":"Norme","heading":"Riduzione dei termini nel giudizio di cassazione","contentHtml":"<p>1. Nei casi di urgenza, le parti possono chiedere la riduzione dei termini stabiliti per il giudizio di cassazione. Il presidente, se accoglie la richiesta, dispone con decreto la riduzione dei termini in misura non superiore a un terzo. Del provvedimento di riduzione e' fatta menzione negli avvisi. \n 2. Con l'atto di ricorso o anche successivamente le parti possono rinunciare agli avvisi.</p>","notesHtml":""},{"id":"art_169","numText":"Art. 169-bis","group":"Norme","heading":"Sezione della corte di cassazione per l'esame dell'inammissibilita' dei ricorsi","contentHtml":"<p>1. La sezione di cui al comma 1 dell'articolo 610 del codice e' predeterminata con rotazione biennale dal provvedimento tabellare riguardante la corte di cassazione.</p>","notesHtml":""},{"id":"art_170","numText":"Art. 170","group":"Norme","heading":"Sezioni unite","contentHtml":"<p>1. Le sezioni unite sono convocate con decreto del presidente della corte di cassazione o del presidente aggiunto da lui delegato e sono composte con magistrati di tutte le sezioni penali. Il collegio e' presieduto dal presidente della corte ovvero, su sua \n delegazione, dal presidente aggiunto o da un presidente di sezione.</p>","notesHtml":""},{"id":"art_171","numText":"Art. 171","group":"Norme","heading":"Questione dedotta nel corso della discussione","contentHtml":"<p>1. Se una questione e' dedotta per la prima volta nel corso della discussione, il presidente puo' concedere nuovamente la parola alle parti gia' intervenute.</p>","notesHtml":""},{"id":"art_172","numText":"Art. 172","group":"Norme","heading":"Restituzione alla sezione di ricorsi gia' rimessi \n alle sezioni unite","contentHtml":"<p>1. Nel caso previsto dall'articolo 618 del codice, il presidente della corte di cassazione puo' restituire alla sezione il ricorso qualora siano stati assegnati alle sezioni unite altri ricorsi sulla medesima questione o il contrasto giurisprudenziale risulti superato. \n 2. In nessun caso puo' essere restituito il ricorso che, dopo una decisione delle sezioni unite, e' stato rimesso da una sezione della corte di cassazione con l'enunciazione delle ragioni che possono dar luogo a un nuovo contrasto giurisprudenziale.</p>","notesHtml":""},{"id":"art_173","numText":"Art. 173","group":"Norme","heading":"Motivazione della sentenza. Enunciazione \n del principio di diritto","contentHtml":"<p>1. Nella sentenza della corte di cassazione i motivi del ricorso sono enunciati nei limiti strettamente necessari per la motivazione. \n 2. Nel caso di annullamento con rinvio, la sentenza enuncia specificamente il principio di diritto al quale il giudice di rinvio deve uniformarsi. \n 3. Quando il ricorso e' stato rimesso alle sezioni unite, la sentenza enuncia sempre il principio di diritto sul quale si basa la decisione.</p>","notesHtml":""},{"id":"art_174","numText":"Art. 174","group":"Norme","heading":"Rettifiche e integrazioni alla motivazione","contentHtml":"<p>1. Nel caso previsto dall'articolo 617 comma 3 del codice, alla redazione del testo rettificato o integrato provvede la corte di cassazione in camera di consiglio. Quando cio' non e' possibile, provvede un consigliere che puo' anche essere diverso da quello precedentemente designato per la redazione della motivazione.</p>","notesHtml":""},{"id":"art_175","numText":"Art. 175","group":"Norme","heading":"Determinazione del giudice di rinvio","contentHtml":"<p>1. Per determinare ai fini del giudizio di rinvio la corte di appello, la corte di assise di appello, la corte di assise o il tribunale piu' vicino, si tiene conto della distanza chilometrica ferroviaria, e se del caso marittima, tra i capoluoghi del distretto o, rispettivamente, del circolo o del circondario.</p>","notesHtml":""},{"id":"art_175","numText":"Art. 175-bis","group":"Norme","heading":"Decisione sulla improcedibilita' ai sensi dell'articolo 344-bis del codice","contentHtml":"<p>1. Ai fini di cui agli articoli 578, comma 1-bis, e 578-ter, comma 2, del codice, la Corte di cassazione e le corti di appello, nei procedimenti in cui sono costituite parti civili o vi sono beni in sequestro, si pronunciano sulla improcedibilita' non oltre il sessantesimo giorno successivo al maturare dei termini di durata massima del giudizio di impugnazione di cui all'articolo 344-bis del codice.</p>","notesHtml":""},{"id":"art_176","numText":"Art. 176","group":"Norme","heading":"Rilascio dei documenti da unire alla domanda \n di riparazione dell'errore giudiziario","contentHtml":"<p>1. I documenti da unire alla domanda di riparazione dell'errore giudiziario, a norma dell'articolo 645 del codice, sono rilasciati gratuitamente dagli uffici competenti e sono esenti da imposta di bollo.</p>","notesHtml":""},{"id":"art_177","numText":"Art. 177","group":"Norme","heading":"Deferimento del giudizio a un giuri' d'onore","contentHtml":"<p>1. Agli effetti dell'articolo 597 del codice penale, la facolta' di deferire a un giuri' d'onore il giudizio sulla verita' del fatto s'intende esercitata quando i componenti il giuri' hanno accettato la nomina. L'accettazione deve risultare da atto scritto. \n 2. Nel deferire il giudizio previsto dal comma 1, le parti interessate, se non dichiarano espressamente di rinunciare al diritto al risarcimento e alla riparazione, possono demandare al giuri' il relativo accertamento e le conseguenti pronunce in via equitativa. \n 3. Su richiesta delle parti interessate, la nomina dei componenti il giuri' puo' essere fatta dal presidente del tribunale. \n 4. Su richiesta delle parti interessate, la nomina dei componenti il giuri' puo' essere fatta da associazioni legalmente riconosciute come enti morali. I componenti sono scelti fra le persone iscritte in appositi albi formati dalle stesse associazioni e approvati dal presidente del tribunale. \n 5. Se vengono a mancare per qualunque causa tutti o alcuni dei componenti il giuri', il presidente del tribunale o le associazioni provvedono alla loro sostituzione.</p>","notesHtml":""},{"id":"art_178","numText":"Art. 178","group":"Norme","heading":"Componenti del giuri' d'onore. \n Termine per la pronuncia del verdetto","contentHtml":"<p>1. Il giuri' d'onore si compone di uno o piu' membri in numero dispari. \n 2. Il giuri' deve pronunciare il verdetto nel termine di tre mesi dal giorno dell'accettazione. Il presidente del tribunale per gravi motivi puo' prorogare questo termine fino ad altri tre mesi.</p>","notesHtml":""},{"id":"art_179","numText":"Art. 179","group":"Norme","heading":"Procedimento davanti al giuri' d'onore","contentHtml":"<p>1. Le sedute del giuri' non sono pubbliche. \n 2. I componenti del giuri' sono obbligati al segreto per tutto cio' che concerne gli atti compiuti, salvo che per il verdetto. \n 3. E' vietata la pubblicazione, in tutto o in parte, anche per riassunto o a guisa di informazione, degli atti e documenti concernenti il giudizio, fatta eccezione per il verdetto. Sono applicabili gli articoli 684 e 685 del codice penale. \n 4. Quando lo ritiene necessario, il giuri' puo', anche di sua iniziativa, sentire testimoni. \n 5. Il giuri', quando e' stato nominato nei modi indicati nell'articolo 177 commi 3 e 4, puo' chiedere documenti e informazioni alle pubbliche amministrazioni, le quali hanno l'obbligo di fornirli, salvo che vi ostino gravi ragioni di servizio, e compiere altri accertamenti.</p>","notesHtml":""},{"id":"art_180","numText":"Art. 180","group":"Norme","heading":"Sanzioni pecuniarie","contentHtml":"<p>1. I componenti del giuri' che violano gli obblighi stabiliti dall'articolo 178 comma 2 o dall'articolo 179 comma 2 possono essere condannati al pagamento di una somma da lire cinquantamila a lire cinquecentomila a favore della cassa delle ammende. \n 2. Nel caso in cui il giuri' sia stato nominato nei modi indicati nell'articolo 177 commi 3 e 4, il testimone che omette senza legittimo impedimento di comparire nel luogo, giorno e ora stabiliti, puo' essere condannato al pagamento di una somma da lire venticinquemila a lire duecentocinquantamila a favore della cassa delle ammende. \n 3. Le condanne previste dai commi 1 e 2 sono pronunciate dal presidente del tribunale, sentito il trasgressore, e alla loro esecuzione provvede la cancelleria del tribunale, osservate le disposizioni dell'articolo 664 del codice.</p>","notesHtml":""},{"id":"art_181","numText":"Art. 181","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_181","numText":"Art. 181-bis","group":"Norme","heading":"Modalita' di pagamento delle pene pecuniarie","contentHtml":"<p>1. Le modalita' di pagamento delle pene pecuniarie applicate dal giudice con la sentenza o con il decreto di condanna sono indicate dal pubblico ministero, anche in via alternativa, nell'ordine di esecuzione di cui all'articolo 660 del codice. Esse comprendono, in ogni caso, il pagamento attraverso un modello precompilato, allegato all'ordine di esecuzione. \n 2. Le modalita' tecniche di pagamento, anche per via telematica, sono individuate e periodicamente aggiornate con decreto del Ministro della giustizia, da adottarsi entro novanta giorni dalla data di entrata in vigore della presente disposizione, sentito il Garante per la protezione dei dati personali.</p>","notesHtml":""},{"id":"art_182","numText":"Art. 182","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_183","numText":"Art. 183","group":"Norme","heading":"Richiesta di applicazione di pena accessoria","contentHtml":"<p>1. Quando alla condanna consegue di diritto una pena accessoria predeterminata dalla legge nella specie e nella durata, il pubblico ministero ne richiede l'applicazione al giudice dell'esecuzione se non si e' provveduto con la sentenza di condanna.</p>","notesHtml":""},{"id":"art_183","numText":"Art. 183-bis","group":"Norme","heading":"Esecuzione della misura di sicurezza dell'espulsione del cittadino di uno Stato non appartenente all'Unione europea e dell'apolide","contentHtml":"<p>1. L'espulsione del cittadino di uno Stato non appartenente all'Unione europea e dell'apolide dal territorio dello Stato e' eseguita dal questore secondo le modalita' di cui all'articolo 13, comma 4, del testo unico di cui al decreto legislativo 25 luglio 1998, n. 286.</p>","notesHtml":""},{"id":"art_183","numText":"Art. 183","group":"Norme","heading":"","contentHtml":"<p>Articolo 183-ter. \n(Esecuzione della misura di sicurezza dell'allontanamento del cittadino di uno Stato membro dell'Unione europea e di un suo familiare).</p>\n<p>1. L'allontanamento del cittadino di uno Stato membro dell'Unione europea o di un suo familiare, di cui agli articoli 2, comma 1, lettera b), e 3, comma 2, del decreto legislativo 6 febbraio 2007, n. 30, e' disposto in conformita' ai criteri ed alle modalita' fissati dall'articolo 20 del medesimo decreto legislativo.</p>","notesHtml":""},{"id":"art_183","numText":"Art. 183","group":"Norme","heading":"","contentHtml":"<p>Articolo 183-ter. \n  (Esecuzione della confisca in casi particolari).\n 1. Competente a emettere i provvedimenti di confisca in casi particolari previsti dall'articolo 240-bis del codice penale o da altre disposizioni di legge che a questo articolo rinviano dopo l'irrevocabilita' della sentenza, e' il giudice di cui all'articolo 666, commi 1, 2 e 3, del codice. Il giudice, sulla richiesta di sequestro e contestuale confisca proposta dal pubblico ministero, provvede nelle forme previste dall'articolo 667, comma 4, del codice.\nL'opposizione e' proposta, a pena di decadenza, entro trenta giorni dalla comunicazione o notificazione del decreto. \n 2. In caso di morte del soggetto nei cui confronti e' stata disposta la confisca con sentenza di condanna passata in giudicato, il relativo procedimento inizia o prosegue, a norma dell'articolo 666 del codice, nei confronti degli eredi o comunque degli aventi causa. \n 3. L'autorita' giudiziaria competente ad amministrare i beni sequestrati e' il giudice che ha disposto il sequestro ovvero, se organo collegiale, il giudice delegato nominato dal collegio stesso.\nL'opposizione ai provvedimenti adottati, ove consentita, e' presentata, nelle forme dell'articolo 666 del codice, allo stesso giudice ovvero, nel caso di provvedimento del giudice delegato, al collegio.</p>","notesHtml":""},{"id":"art_184","numText":"Art. 184","group":"Norme","heading":"Forma dei provvedimenti che applicano \n altre sanzioni pecuniarie","contentHtml":"<p>1. Salvo che la legge disponga altrimenti, i provvedimenti previsti dall'articolo 664 comma 1 del codice sono adottati con ordinanza.</p>","notesHtml":""},{"id":"art_185","numText":"Art. 185","group":"Norme","heading":"Assunzione delle prove nel procedimento \n di esecuzione","contentHtml":"<p>1. Il giudice, nell'assumere le prove a norma dell'articolo 666 comma 5 del codice, procede senza particolari formalita' anche per quanto concerne la citazione e l'esame dei testimoni e l'espletamento della perizia.</p>","notesHtml":""},{"id":"art_186","numText":"Art. 186","group":"Norme","heading":"Applicazione della disciplina del concorso \n formale e del reato continuato","contentHtml":"<p>1. Le copie delle sentenze o decreti irrevocabili, se non sono allegate alla richiesta prevista dall'articolo 671 comma 1 del codice, sono acquisite di ufficio.</p>","notesHtml":""},{"id":"art_187","numText":"Art. 187","group":"Norme","heading":"Determinazione del reato piu' grave","contentHtml":"<p>1. Per l'applicazione della disciplina del concorso formale e del reato continuato da parte del giudice dell'esecuzione si considera violazione piu' grave quella per la quale e' stata inflitta la pena piu' grave, anche quando per alcuni reati si e' proceduto con giudizio abbreviato.</p>","notesHtml":""},{"id":"art_188","numText":"Art. 188","group":"Norme","heading":"Concorso formale e reato continuato nel caso di piu' sentenze di applicazione della pena su richiesta delle parti","contentHtml":"<p>1. Fermo quanto previsto dall'articolo 137, nel caso di piu' sentenze di applicazione della pena su richiesta delle parti pronunciate in procedimenti distinti contro la stessa persona, questa e il pubblico ministero possono chiedere al giudice dell'esecuzione l'applicazione della disciplina del concorso formale o del reato continuato, quando concordano sulla entita' della sanzione sostitutiva o della pena detentiva, sempre che quest'ultima non superi complessivamente cinque anni, soli o congiunti a pena pecuniaria, ovvero due anni, soli o congiunti a pena pecuniaria, nei casi previsti nel comma 1-bis dell'articolo 444 del codice. Nel caso di disaccordo del pubblico ministero, il giudice, se lo ritiene ingiustificato, accoglie ugualmente la richiesta.</p>","notesHtml":""},{"id":"art_189","numText":"Art. 189","group":"Norme","heading":"Comunicazione dei provvedimenti del giudice \n di sorveglianza","contentHtml":"<p>1. Il dispositivo dei provvedimenti esecutivi del giudice di sorveglianza che incidono sulla durata della pena, o sulla data in cui la stessa deve avere inizio o termine, e' comunicato senza ritardo, a cura della cancelleria presso il giudice medesimo, al pubblico ministero competente per l'esecuzione della sentenza di condanna. Le medesime disposizioni si applicano ai provvedimenti esecutivi del giudice di sorveglianza concernenti le misure di sicurezza.</p>","notesHtml":""},{"id":"art_190","numText":"Art. 190","group":"Norme","heading":"Prescrizioni per la persona sottoposta \n a liberta' vigilata","contentHtml":"<p>1. Il magistrato di sorveglianza stabilisce le prescrizioni alle quali deve attenersi la persona sottoposta a liberta' vigilata a norma dell'articolo 228 del codice penale. \n 2. Le prescrizioni sono trascritte in una carta precettiva che e' consegnata all'interessato con obbligo di conservarla e di presentarla ad ogni richiesta dell'autorita'. In caso di irreperibilita', il magistrato di sorveglianza provvede a norma dell'articolo 231 del codice penale. \n 3. Il vigilato non puo', senza autorizzazione del magistrato di sorveglianza, trasferire la propria residenza o dimora in un comune diverso e deve informare gli organi ai quali e' stata affidata la vigilanza di ogni mutamento di abitazione nell'ambito del comune. \n 4. In caso di trasferimento non autorizzato, di successiva irreperibilita' e di altre trasgressioni, il magistrato di sorveglianza provvede a norma dell'articolo 231 del codice penale. \n 5. Copia delle prescrizioni indicate nel comma 1 e' comunicata agli organi e alle persone cui e' affidata la vigilanza a norma degli articoli 228 e 232 del codice penale nonche' al centro di servizio sociale. \n 6. La vigilanza e' esercitata in modo da non rendere difficoltosa alla persona che vi e' sottoposta la ricerca di un lavoro e da consentirle di attendervi con la necessaria tranquillita'.</p>","notesHtml":""},{"id":"art_191","numText":"Art. 191","group":"Norme","heading":"Applicazione del divieto di soggiorno","contentHtml":"<p>1. Il provvedimento del magistrato di sorveglianza che applica il divieto di soggiorno in determinati luoghi a norma dell'articolo 233 del codice penale e' immediatamente comunicato dalla cancelleria agli organi di pubblica sicurezza dei comuni o delle province cui si riferisce il divieto. Di ogni trasgressione gli organi predetti fanno rapporto al magistrato di sorveglianza per i provvedimenti conseguenti.</p>","notesHtml":""},{"id":"art_192","numText":"Art. 192","group":"Norme","heading":"Annotazione del decreto di grazia","contentHtml":"<p>1. Il pubblico ministero competente a norma dell'articolo 681 comma 4 del codice provvede senza ritardo affinche' il decreto di grazia sia annotato sull'originale della sentenza o del decreto penale di condanna.</p>","notesHtml":""},{"id":"art_193","numText":"Art. 193","group":"Norme","heading":"Annotazione del provvedimento di riabilitazione e di revoca delle sentenze di condanna","contentHtml":"<p>1. Il provvedimento che concede la riabilitazione, divenuto irrevocabile, e' annotato nella sentenza di condanna a cura della cancelleria del giudice che la ha emessa. Allo stesso modo si procede per i provvedimenti di revoca adottati a norma degli articoli 669 e 673 del codice.</p>\n<p>--------------- \nNota redazionale \n Il testo del presente articolo e' gia' integrato con le correzioni apportate dall'avviso di rettifica pubblicato in G.U. 28/09/1989, n. 227 durante il periodo di &quot;vacatio legis&quot;. \n E' possibile visualizzare il testo originario accedendo alla versione pdf della relativa Gazzetta di pubblicazione.</p>","notesHtml":""},{"id":"art_194","numText":"Art. 194","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 14 NOVEMBRE 2002, N. 313","contentHtml":"","notesHtml":""},{"id":"art_195","numText":"Art. 195","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 14 NOVEMBRE 2002, N. 313","contentHtml":"","notesHtml":""},{"id":"art_196","numText":"Art. 196","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 14 NOVEMBRE 2002, N. 313","contentHtml":"","notesHtml":""},{"id":"art_197","numText":"Art. 197","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 14 NOVEMBRE 2002, N. 313","contentHtml":"","notesHtml":""},{"id":"art_198","numText":"Art. 198","group":"Norme","heading":"ARTICOLO SOPPRESSO DAL D.LGS. 14 GENNAIO 1991, N. 12","contentHtml":"","notesHtml":""},{"id":"art_199","numText":"Art. 199","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_200","numText":"Art. 200","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_201","numText":"Art. 201","group":"Norme","heading":"Traduzione delle domande provenienti \n da un'autorita' straniera","contentHtml":"<p>1. Le domande provenienti da un'autorita' straniera nonche' i relativi atti e documenti sono accompagnati da una traduzione in lingua italiana.</p>","notesHtml":""},{"id":"art_202","numText":"Art. 202","group":"Norme","heading":"Consenso dell'interessato alla estradizione \n per l'estero","contentHtml":"<p>1. Fuori dei casi previsti dagli articoli 703 e 717 del codice, il consenso dell'interessato alla estradizione e' prestato davanti al presidente della corte di appello nel rispetto delle garanzie previste dall'articolo 701 comma 2. Il verbale e' compilato in due originali, uno dei quali e' trasmesso senza ritardo, a cura della cancelleria, al ministro di grazia e giustizia.</p>","notesHtml":""},{"id":"art_203","numText":"Art. 203","group":"Norme","heading":"Comunicazioni al ministro di grazia e giustizia \n in merito alla estradizione","contentHtml":"<p>1. La cancelleria comunica senza ritardo al ministro di grazia e giustizia l'avvenuta scadenza del termine per l'impugnazione della sentenza della corte di appello o l'avvenuto deposito della sentenza della corte di cassazione. Trasmette, inoltre, al ministro di grazia e giustizia copia della sentenza della corte di appello non piu' soggetta a impugnazione ovvero copia della sentenza della corte di cassazione.</p>","notesHtml":""},{"id":"art_204","numText":"Art. 204","group":"Norme","heading":"Comunicazioni all'autorita' giudiziaria \n che ha trasmesso la rogatoria all'estero","contentHtml":"<p>1. Le comunicazioni previste dall'articolo 727 comma 3 del codice devono pervenire all'autorita' giudiziaria richiedente senza ritardo.\nLe comunicazioni dell'avvenuto inoltro della rogatoria ovvero dell'emissione del decreto previsto dall'articolo 727 comma 2 del codice devono comunque pervenire entro cinque giorni dalle rispettive date di inoltro e di emissione.</p>","notesHtml":""},{"id":"art_204","numText":"Art. 204-bis","group":"Norme","heading":"Comunicazioni dell'autorita' giudiziaria in tema di rogatoria","contentHtml":"<p>1. Quando un accordo internazionale prevede la trasmissione diretta della richiesta di assistenza giudiziaria, l'autorita' giudiziaria indicata dagli articoli 724, 726 e 726-ter del codice che riceve direttamente la richiesta ovvero l'autorita' giudiziaria che la invia direttamente all'autorita' straniera ne trasmette senza ritardo copia al Ministero della giustizia.</p>","notesHtml":""},{"id":"art_205","numText":"Art. 205","group":"Norme","heading":"Richiesta del testo di leggi straniere","contentHtml":"<p>1. L'autorita' giudiziaria, per ragioni di ufficio, puo' richiedere al ministro di grazia e giustizia il testo di leggi straniere.</p>","notesHtml":""},{"id":"art_205","numText":"Art. 205-bis","group":"Norme","heading":"Irrevocabilita' del consenso nell'ambito di procedure di cooperazione giudiziaria","contentHtml":"<p>1. Quando e' previsto dal codice o da accordi internazionali, per l'espletamento di determinati atti, che l'interessato esprima il proprio consenso in una procedura di cooperazione giudiziaria, il consenso espresso non puo' essere revocato, salvo che l'interessato ignorasse circostanze di fatto rilevanti ai fini della sua decisione ovvero esse si siano successivamente modificate.</p>","notesHtml":""},{"id":"art_205","numText":"Art. 205-ter","group":"Norme","heading":"Partecipazione al processo a distanza per l'imputato detenuto all'estero","contentHtml":"<p>1. La partecipazione all'udienza dell'imputato detenuto all'estero, che non possa essere trasferito in Italia, ha luogo attraverso il collegamento audiovisivo, quando previsto da accordi internazionali e secondo la disciplina in essi contenuta. Per quanto non espressamente disciplinato dagli accordi internazionali, si applica la dispos
