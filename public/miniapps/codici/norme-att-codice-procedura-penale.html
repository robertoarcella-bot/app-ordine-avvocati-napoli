izione dell'articolo 133-ter del codice. \n 2. Non puo' procedersi a collegamento audiovisivo se lo Stato estero non assicura la possibilita' di presenza del difensore o di un sostituto nel luogo in cui viene assunto l'atto e se quest'ultimo non ha possibilita' di colloquiare riservatamente con il suo assistito. \n 3. L'imputato ha diritto alla presenza dell'interprete se non conosce la lingua del luogo ove l'atto e' compiuto o quella usata per rivolgergli le domande. \n 4. La detenzione dell'imputato all'estero non puo' comportare la sospensione o il differimento dell'udienza quando e' possibile la partecipazione all'udienza in collegamento audiovisivo, nei casi in cui l'imputato non da' il consenso o rifiuta di assistere. Si osservano, in quanto applicabili, le disposizioni di cui all'articolo 420-ter del codice. \n 5. La partecipazione all'udienza attraverso il collegamento audiovisivo del testimone o del perito si svolge secondo le modalita' e i presupposti previsti dagli accordi internazionali. Per quanto non espressamente disciplinato, si applica, in quanto compatibile, la disposizione dell'articolo 133-ter del codice.</p>","notesHtml":""},{"id":"art_206","numText":"Art. 206","group":"Norme","heading":"Regolamento ministeriale","contentHtml":"<p>1. Con decreto del ministro di grazia e giustizia sono adottate le disposizioni regolamentari che concernono: \n a) la tenuta, anche in forma automatizzata, dei registri e degli altri strumenti di registrazione in materia penale; \n b) le modalita' di formazione e di tenuta dei fascicoli degli uffici giudiziari penali; \n c) le altre attivita' necessarie per l'attuazione del codice non disciplinate dal presente decreto. \n 2. Il decreto previsto dal comma 1 e quello previsto dall'articolo 199 sono emanati entro il 30 settembre 1989; all'uopo il Consiglio di Stato deve pronunziarsi entro quindici giorni dalla richiesta del parere. <sup class=\"amd\">32</sup></p>\n<p>AGGIORNAMENTO (32) \n La L. 7 dicembre 2000, n. 397 ha disposto (con l'art. 25, comma 1) che le disposizioni del presente articolo sono modificate conformemente a quanto previsto dalla stessa L. 397/2000.</p>","notesHtml":""},{"id":"art_207","numText":"Art. 207","group":"Norme","heading":"Ambito di applicazione delle disposizioni \n del codice","contentHtml":"<p>1. Le disposizioni del codice si osservano nei procedimenti relativi a tutti i reati anche se previsti da leggi speciali, salvo quanto diversamente stabilito in questo titolo e nel titolo III.</p>","notesHtml":""},{"id":"art_208","numText":"Art. 208","group":"Norme","heading":"Corrispondenza tra gli istituti e le disposizioni \n del codice e del codice abrogato","contentHtml":"<p>1. Quando nelle leggi o nei decreti sono richiamati istituti o disposizioni del codice abrogato, il richiamo si intende riferito agli istituti o alle disposizioni del codice che disciplinano la corrispondente materia.</p>","notesHtml":""},{"id":"art_209","numText":"Art. 209","group":"Norme","heading":"Corrispondenza tra uffici e organi del codice \n e del codice abrogato","contentHtml":"<p>1. Quando leggi o decreti indicano uffici o organi giudiziari con la denominazione del codice abrogato, l'indicazione si intende riferita agli uffici o agli organi giudiziari ai quali il codice attribuisce funzioni corrispondenti o analoghe.</p>","notesHtml":""},{"id":"art_210","numText":"Art. 210","group":"Norme","heading":"Competenza","contentHtml":"<p>1. Continuano a osservarsi le disposizioni di leggi o decreti che regolano la competenza per materia o per territorio in deroga alla disciplina del codice nonche' le disposizioni che prevedono la competenza del giudice penale in ordine a violazioni connesse a fatti costituenti reato.</p>","notesHtml":""},{"id":"art_211","numText":"Art. 211","group":"Norme","heading":"Rapporti tra azione civile e azione penale","contentHtml":"<p>1. Salvo quanto disposto dall'articolo 75 comma 2 del codice, quando disposizioni di legge prevedono la sospensione necessaria del processo civile o amministrativo a causa della pendenza di un processo penale, il processo civile o amministrativo e' sospeso fino alla definizione del processo penale se questo puo' dare luogo a una sentenza che abbia efficacia di giudicato nell'altro processo e se e' gia' stata esercitata l'azione penale.</p>","notesHtml":""},{"id":"art_212","numText":"Art. 212","group":"Norme","heading":"Costituzione di parte civile e intervento \n nel processo","contentHtml":"<p>1. Quando leggi o decreti consentono la costituzione di parte civile o l'intervento nel processo penale al di fuori delle ipotesi indicate nell'articolo 74 del codice, e' consentito solo l'intervento nei limiti e alle condizioni previsti dagli articoli 91, 92, 93 e 94 del codice. \n 2. Resta in vigore l'articolo 240 del regio decreto 16 marzo 1942 n. 267.</p>","notesHtml":""},{"id":"art_213","numText":"Art. 213","group":"Norme","heading":"Responsabilita' civile derivante dalla circolazione dei veicoli a  motore e dei natanti e provvisoria esecuzione","contentHtml":"<p>1. Continua a osservarsi la disposizione dell'articolo 5 - bis del decreto-legge 23 dicembre 1976 n. 857, convertito nella legge 26 febbraio 1977 n. 39.</p>","notesHtml":""},{"id":"art_214","numText":"Art. 214","group":"Norme","heading":"Arresto o cattura da parte di organi \n che non esercitano funzioni penali","contentHtml":"<p>1. Sono abrogate le disposizioni di leggi o decreti che prevedono l'arresto o la cattura da parte di organi giudiziari che non esercitano funzioni penali.</p>","notesHtml":""},{"id":"art_215","numText":"Art. 215","group":"Norme","heading":"Rilascio del passaporto","contentHtml":"<p>1. E' abrogato l'articolo 3 comma 1 lettera c) della legge 21 novembre 1967 n. 1185.</p>","notesHtml":""},{"id":"art_216","numText":"Art. 216","group":"Norme","heading":"Modalita' di esecuzione della custodia cautelare, \n delle pene e delle misure di sicurezza","contentHtml":"<p>1. Continuano a osservarsi le disposizioni di leggi o decreti che prevedono speciali modalita' per l'esecuzione della custodia cautelare, delle pene e delle misure di sicurezza in istituti penitenziari.</p>","notesHtml":""},{"id":"art_217","numText":"Art. 217","group":"Norme","heading":"Applicazione provvisoria di pene accessorie","contentHtml":"<p>1. E' abrogato l'articolo 140 del codice penale. \n 2. E' abrogata, altresi', ogni altra disposizione che prevede l'applicazione provvisoria di pene accessorie.</p>","notesHtml":""},{"id":"art_218","numText":"Art. 218","group":"Norme","heading":"Ipoteca legale","contentHtml":"<p>1. Sono abrogate le disposizioni del codice penale che prevedono l'ipoteca legale. \n 2. L'ipoteca legale per illeciti penali prevista da altre disposizioni di legge e' sostituita con il sequestro conservativo secondo le norme del codice.</p>","notesHtml":""},{"id":"art_219","numText":"Art. 219","group":"Norme","heading":"Associazioni segrete","contentHtml":"<p>1. Continuano a osservarsi le disposizioni processuali della legge 25 gennaio 1982 n. 17.</p>","notesHtml":""},{"id":"art_220","numText":"Art. 220","group":"Norme","heading":"Attivita' ispettive e di vigilanza","contentHtml":"<p>1. Quando nel corso di attivita' ispettive o di vigilanza previste da leggi o decreti emergono indizi di reato, gli atti necessari per assicurare le fonti di prova e raccogliere quant'altro possa servire per l'applicazione della legge penale sono compiuti con l'osservanza delle disposizioni del codice.</p>","notesHtml":""},{"id":"art_221","numText":"Art. 221","group":"Norme","heading":"Modalita' particolari per la denuncia \n delle notizie di reato","contentHtml":"<p>1. Continuano a osservarsi le disposizioni di leggi o decreti che prevedono modalita' diverse da quelle indicate negli articoli 331 e 347 del codice per l'inoltro della denuncia all'autorita' giudiziaria ovvero consentono di presentare la denuncia stessa ad altra autorita' che a quella abbia l'obbligo di riferire.</p>","notesHtml":""},{"id":"art_222","numText":"Art. 222","group":"Norme","heading":"Investigatori privati","contentHtml":"<p>1. Fino all'approvazione della nuova disciplina sugli investigatori privati, l'autorizzazione a svolgere le attivita' indicate nell'articolo 327-bis del codice e' rilasciata dal prefetto agli investigatori che abbiano maturato una specifica esperienza professionale che garantisca il corretto esercizio dell'attivita'. \n 2. In deroga a quanto previsto dall'articolo 135 del regio decreto 18 giugno 1931 n. 773, l'incarico e' iscritto in uno speciale registro, in cui sono annotate: \n a) le generalita' e l'indirizzo del difensore committente; \n b) la specie degli atti investigativi richiesti; \n c) la durata delle indagini, determinata al momento del conferimento dell'incarico. \n 3. Nell'ambito delle indagini previste dal presente articolo non si applica la disposizione dell'articolo 139 del regio decreto 18 giugno 1931 n. 773. \n 4. Ai fini di quanto disposto dall'articolo 103, commi 2 e 5, del codice, il difensore comunica il conferimento dell'incarico previsto dal comma 2 del presente articolo all'autorita' giudiziaria procedente.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223","group":"Norme","heading":"Analisi di campioni e garanzie per l'interessato","contentHtml":"<p>1. Qualora nel corso di attivita' ispettive o di vigilanza previste da leggi o decreti si debbano eseguire analisi di campioni per le quali non e' prevista la revisione, a cura dell'organo procedente e' dato, anche oralmente, avviso all'interessato del giorno, dell'ora e del luogo dove le analisi verranno effettuate. L'interessato o persona di sua fiducia appositamente designata possono presenziare alle analisi, eventualmente con l'assistenza di un consulente tecnico. A tali persone spettano i poteri previsti dall'articolo 230 del codice. \n 2. Se leggi o decreti prevedono la revisione delle analisi e questa sia richiesta dall'interessato, a cura dell'organo incaricato della revisione, almeno tre giorni prima, deve essere dato avviso del giorno, dell'ora e del luogo ove la medesima verra' effettuata all'interessato e al difensore eventualmente nominato. Alle operazioni di revisione l'interessato e il difensore hanno diritto di assistere personalmente, con l'assistenza eventuale di un consulente tecnico. A tali persone spettano i poteri previsti dall'articolo 230 del codice. \n 3. I verbali di analisi non ripetibili e i verbali di revisione di analisi sono raccolti nel fascicolo per il dibattimento, sempre che siano state osservate le disposizioni dei commi 1 e 2.</p>","notesHtml":""},{"id":"art_224","numText":"Art. 224","group":"Norme","heading":"Violazione del foglio di via da parte dello straniero","contentHtml":"<p>1. Continuano a osservarsi le disposizioni dell'articolo 152 del regio decreto 18 giugno 1931 n. 773 che prevedono l'arresto dello straniero munito di foglio di via obbligatorio che si allontani dall'itinerario prescritto. \n 2. Se l'arresto e' convalidato e ricorre taluna delle esigenze cautelari previste dall'articolo 274 lettere a) e c) del codice ovvero concreto pericolo di fuga, in deroga a quanto stabilito dall'articolo 280 del codice il giudice, su richiesta del pubblico ministero, dispone l'applicazione di una misura coercitiva. \n 3. Nei casi di applicazione di misure coercitive a norma del comma 2, si applicano, ridotti di due terzi, i termini di durata previsti dall'articolo 303 del codice per i delitti puniti con la reclusione non superiore nel massimo a sei anni, ma la durata complessiva delle misure non puo' comunque superare il termine di tre mesi. \n 4. Le disposizioni del presente articolo si applicano non oltre il termine di due anni a decorrere dall'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_225","numText":"Art. 225","group":"Norme","heading":"Perquisizioni domiciliari","contentHtml":"<p>1. Continuano a osservarsi le disposizioni dell'articolo 41 del regio decreto 18 giugno 1931 n. 773 e dell'articolo 33 della legge 7 gennaio 1929 n. 4.</p>","notesHtml":""},{"id":"art_226","numText":"Art. 226","group":"Norme","heading":"Intercettazione e controlli preventivi sulle comunicazioni","contentHtml":"<p>1. Il Ministro dell'interno o, su sua delega, i responsabili dei Servizi centrali di cui all'articolo 12 del decreto-legge 13 maggio 1991, n. 152, convertito, con modificazioni, dalla legge 12 luglio 1991, n. 203, nonche' il questore o il comandante provinciale dei Carabinieri e della Guardia di finanza, richiedono al procuratore della Repubblica presso il tribunale del capoluogo del distretto in cui si trova il soggetto da sottoporre a controllo ovvero, nel caso non sia determinabile, del distretto in cui sono emerse le esigenze di prevenzione, l'autorizzazione all'intercettazione di comunicazioni o conversazioni, anche per via telematica, nonche' all'intercettazione di comunicazioni o conversazioni tra presenti anche se queste avvengono nei luoghi indicati dall'articolo 614 del codice penale quando sia necessario per l'acquisizione di notizie concernenti la prevenzione di delitti di cui all'articolo 407, comma 2, lettera a), n. 4 e 51, comma 3-bis, del codice , nonche' di quelli di cui all'articolo 51, comma 3-quater, del codice, commessi mediante l'impiego di tecnologie informatiche o telematiche. Il Ministro dell'interno puo' altresi' delegare il Direttore della Direzione investigativa antimafia limitatamente ai delitti di cui all'articolo 51, comma 3-bis, del codice. \n 2. Il procuratore della Repubblica, qualora vi siano elementi investigativi che giustifichino l'attivita' di prevenzione e lo ritenga necessario, autorizza l'intercettazione per la durata massima di giorni quaranta, prorogabile per periodi successivi di giorni venti ove permangano i presupposti di legge. L'autorizzazione alla prosecuzione delle operazioni e' data dal pubblico ministero con decreto motivato, nel quale deve essere dato chiaramente atto dei motivi che rendono necessaria la prosecuzione delle operazioni. \n 3. Delle operazioni svolte e dei contenuti intercettati e' redatto verbale sintetico che, unitamente ai supporti utilizzati, e' depositato presso il procuratore che ha autorizzato le attivita' entro cinque giorni dal termine delle stesse. Il predetto termine e' di dieci giorni se sussistono esigenze di traduzione delle comunicazioni o conversazioni. Il procuratore, verificata la conformita' delle attivita' compiute all'autorizzazione, dispone l'immediata distruzione dei supporti e dei verbali. \n 3-bis. In deroga a quanto previsto dal comma 3, il procuratore puo' autorizzare, per un periodo non superiore a ventiquattro mesi, la conservazione dei dati acquisiti, anche relativi al traffico telematico, esclusi comunque i contenuti delle comunicazioni, quando gli stessi sono indispensabili per la prosecuzione dell'attivita' finalizzata alla prevenzione di delitti di cui al comma 1. \n 4. Con le modalita' e nei casi di cui ai commi 1 e 3, puo' essere autorizzato il tracciamento delle comunicazioni telefoniche e telematiche, nonche' l'acquisizione dei dati esterni relativi alle comunicazioni telefoniche e telematiche intercorse e l'acquisizione di ogni altra informazione utile in possesso degli operatori di telecomunicazioni. \n 5. In ogni caso gli elementi acquisiti attraverso le attivita' preventive non possono essere utilizzati nel procedimento penale , fatti salvi i fini investigativi. In ogni caso le attivita' di intercettazione preventiva di cui ai commi precedenti, e le notizie acquisite a seguito delle attivita' medesime, non possono essere menzionate in atti di indagine ne' costituire oggetto di deposizione ne' essere altrimenti divulgate.</p>","notesHtml":""},{"id":"art_227","numText":"Art. 227","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 9 OTTOBRE 1990 N. 309","contentHtml":"","notesHtml":""},{"id":"art_228","numText":"Art. 228","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.P.R. 9 OTTOBRE 1990 N. 309","contentHtml":"","notesHtml":""},{"id":"art_229","numText":"Art. 229","group":"Norme","heading":"Disposizioni speciali in tema di sequestri","contentHtml":"<p>1. Continuano a osservarsi, se piu' brevi, i termini previsti da leggi o decreti per la trasmissione del verbale di sequestro effettuato dalla polizia giudiziaria e per la successiva convalida.\nIn ogni caso i provvedimenti relativi ai sequestri per il procedimento penale sono assoggettati soltanto ai rimedi previsti dal codice.</p>","notesHtml":""},{"id":"art_230","numText":"Art. 230","group":"Norme","heading":"Fermo, arresto e cattura","contentHtml":"<p>1. Le disposizioni dell'articolo 384 del codice si osservano anche quando leggi o decreti prevedono il fermo o l'arresto fuori dei casi di flagranza per delitti punibili con la reclusione superiore nel massimo a tre anni. \n 2. Ai fini della determinazione di effetti giuridici diversi dalla cattura, se in leggi o decreti si fa riferimento a reati per i quali e' previsto il mandato o l'ordine di cattura obbligatorio, il riferimento deve intendersi operato ai delitti non colposi consumati o tentati previsti dall'articolo 380 commi 1 e 2 lettere a), b), d), f), i) del codice nonche', se la legge stabilisce la pena della reclusione non inferiore nel massimo a dieci anni, dalle lettere c), g), h) dello stesso comma 2. Se il riferimento e' fatto a reati per i quali e' previsto il mandato o l'ordine di cattura facoltativo, esso deve intendersi operato ai delitti indicati nell'articolo 280 del codice diversi da quelli menzionati nel primo periodo del presente comma. \n 3. Restano in vigore l'articolo 133 comma 4 del decreto del Presidente della Repubblica 15 giugno 1959 n. 393 e l'articolo unico comma 1 del decreto del Presidente della Repubblica 4 luglio 1980 n. 575.</p>","notesHtml":""},{"id":"art_231","numText":"Art. 231","group":"Norme","heading":"Esercizio dell'azione penale da parte di organi \n diversi dal pubblico ministero","contentHtml":"<p>1. Sono abrogate le disposizioni di leggi o decreti che prevedono l'esercizio dell'azione penale da parte di organi diversi dal pubblico ministero.</p>","notesHtml":""},{"id":"art_232","numText":"Art. 232","group":"Norme","heading":"Corrispondenza tra sentenza istruttoria, sentenza di non luogo a  procedere e provvedimento di archiviazione","contentHtml":"<p>1. Le sentenze istruttorie di non doversi procedere emesse a norma del codice abrogato sono equiparate, nei corrispondenti casi, ai provvedimenti di archiviazione per mancanza di una condizione di procedibilita' o per essere ignoto l'autore del reato ovvero alle sentenze di non luogo a procedere previste dal codice.</p>","notesHtml":""},{"id":"art_233","numText":"Art. 233","group":"Norme","heading":"Giudizio direttissimo","contentHtml":"<p>1. Sono abrogate le disposizioni di leggi o decreti che prevedono il giudizio direttissimo in casi, con forme o termini diversi da quelli indicati nel codice. \n 2. Tuttavia, il pubblico ministero procede al giudizio direttissimo, anche fuori dei casi previsti dagli articoli 449 e 566 del codice, per i reati concernenti le armi e gli esplosivi e per i reati commessi con il mezzo della stampa. <sup class=\"amd\">12</sup></p>\n<p>AGGIORNAMENTO (12) \n La Corte costituzionale, con sentenza 28 gennaio-8 febbraio 1991, n. 68 (in G.U. 1a s.s. 13/2/1991, n. 7), ha dichiarato l'illegittimita' costituzionale del presente articolo.</p>","notesHtml":""},{"id":"art_234","numText":"Art. 234","group":"Norme","heading":"Richiesta di sanzioni sostitutive \n da parte dell'imputato","contentHtml":"<p>1. Salvo quanto stabilito dall'articolo 248 comma 4, sono abrogati gli articoli 77, 78, 79 e 80 della legge 24 novembre 1981 n. 689.</p>","notesHtml":""},{"id":"art_235","numText":"Art. 235","group":"Norme","heading":"Violazioni di leggi finanziarie","contentHtml":"<p>1. Nei procedimenti relativi a violazioni delle leggi finanziarie continua a osservarsi la disposizione dell'articolo 53 della legge 7 gennaio 1929 n. 4.</p>","notesHtml":""},{"id":"art_236","numText":"Art. 236","group":"Norme","heading":"Disposizioni concernenti il tribunale di sorveglianza","contentHtml":"<p>1. Competente a dichiarare l'estinzione della pena in conseguenza della liberazione condizionale o dell'affidamento in prova al servizio sociale e' il tribunale di sorveglianza. \n 2. Nelle materie di competenza del tribunale di sorveglianza continuano a osservarsi le disposizioni processuali della legge 26 luglio 1975 n. 354 diverse da quelle contenute nel capo II- bis del titolo II della stessa legge. <sup class=\"amd\">20</sup></p>\n<p>AGGIORNAMENTO (20) \n La Corte costituzionale con sentenza 8-16 febbraio 1993, n. 53 (in G.U. 1a s.s. 24/2/1993, n. 9) ha dichiarato l'illegittimita' costituzionale del comma 2 del presente articolo, nella parte in cui non consente l'applicazione degli artt. 666 e 678 del codice di procedura penale nel procedimento di reclamo avverso il decreto del magistrato di sorveglianza che esclude dal computo della detenzione il periodo trascorsoin permesso-premio.</p>","notesHtml":""},{"id":"art_237","numText":"Art. 237","group":"Norme","heading":"ARTICOLO ABROGATO DALA D.P.R. 14 NOVEMBRE 2002, N. 313","contentHtml":"","notesHtml":""},{"id":"art_238","numText":"Art. 238","group":"Norme","heading":"Individuazione del pubblico ministero e del giudice per le \n indagini preliminari nei procedimenti di assise","contentHtml":"<p>1. Per i reati di competenza della corte di assise le indagini preliminari sono svolte dal procuratore della Repubblica presso il tribunale individuato a norma degli articoli 8, 9, 10, 11 e 16 del codice. Con i medesimi criteri e' individuato il giudice per le indagini preliminari. E' fatto salvo quanto previsto dagli articoli 51 comma 3- bis e 328 comma 1- bis del codice. \n 2. Il procuratore della Repubblica indicato nel comma 1 partecipa al dibattimento davanti alla corte di assise e, nelle ipotesi di giudizio direttissimo, presenta l'imputato davanti al giudice del dibattimento. \n 3. Sono abrogati gli articoli 3 e 4 della legge 24 novembre 1951 n. 1324.</p>","notesHtml":""},{"id":"art_239","numText":"Art. 239","group":"Norme","heading":"Interruzione della prescrizione","contentHtml":"<p>1. Il comma 2 dell'articolo 160 del codice penale e' sostituito dal seguente: \n &quot;Interrompono pure la prescrizione l'ordinanza che applica le misure cautelari personali e quella di convalida del fermo o dell'arresto, l'interrogatorio reso davanti al pubblico ministero o al giudice, l'invito a presentarsi al pubblico ministero per rendere l'interrogatorio, il provvedimento del giudice di fissazione dell'udienza in camera di consiglio per la decisione sulla richiesta di archiviazione, la richiesta di rinvio a giudizio, il decreto di fissazione della udienza preliminare, l'ordinanza che dispone il giudizio abbreviato, il decreto di fissazione della udienza per la decisione sulla richiesta di applicazione della pena, la presentazione o la citazione per il giudizio direttissimo, il decreto che dispone il giudizio immediato, il decreto che dispone il giudizio e il decreto di citazione a giudizio&quot;.</p>","notesHtml":""},{"id":"art_240","numText":"Art. 240","group":"Norme","heading":"ARTICOLO ABROGATO DAL D.LGS. 2 OTTOBRE 2018, N. 123","contentHtml":"","notesHtml":""},{"id":"art_240","numText":"Art. 240-bis","group":"Norme","heading":"Sospensione dei termini processuali nel periodo feriale","contentHtml":"<p>1. L'articolo 2 della legge 7 ottobre 1969, n. 742, e' sostituito dal seguente: \n &quot;Art. 2. - In materia penale la sospensione dei termini procedurali, compresi quelli stabiliti per la fase delle indagini preliminari, non opera nei procedimenti relativi ad imputati in stato di custodia cautelare, qualora essi o i loro difensori rinunzino alla sospensione dei termini. \n Nei procedimenti per reati la cui prescrizione maturi durante la sospensione o nei successivi quarantacinque giorni, ovvero nelle ipotesi in cui durante il medesimo periodo scadano o siano prossimi a scadere i termini della custodia cautelare, il giudice che procede pronuncia, anche di ufficio, ordinanza non impugnabile con la quale e' specificamente motivata e dichiarata l'urgenza del processo. In tal caso i termini processuali decorrono, anche nel periodo feriale, dalla data di notificazione dell'ordinanza. Nel corso delle indagini preliminari l'urgenza e' dichiarata nella stessa forma dal giudice su richiesta del pubblico ministero. \n Nel corso delle indagini preliminari, quando occorre procedere con la massima urgenza nel periodo feriale al compimento di atti rispetto ai quali opera la sospensione dei termini stabilita dall'articolo 1, il giudice per le indagini preliminari, su richiesta del pubblico ministero o della persona sottoposta alle indagini o del suo difensore, pronuncia ordinanza nella quale sono specificamente enunciate le ragioni dell'urgenza e la natura degli atti da compiere.\nAllo stesso modo il pubblico ministero provvede con decreto motivato quando deve procedere al compimento degli atti previsti dall'articolo 360 del codice di procedura penale. \n Gli avvisi sono notificati alle parti o ai difensori. Essi devono far menzione dell'ordinanza o del decreto e i termini decorrono dalla data di notificazione. \n La sospensione dei termini non opera nelle ipotesi previste dall'articolo 467 del codice di procedura penale. \n Quando nel corso del dibattimento si presenta la necessita' di assumere prove nel periodo feriale, si procede a norma dell'articolo 467 del codice di procedura penale. Se le prove non sono state gia' ammesse, il giudice, nella prima udienza successiva, provvede a norma dell'articolo 495 dello stesso codice; le prove dichiarate inammissibili non possono essere utilizzate.&quot;</p>","notesHtml":""},{"id":"art_241","numText":"Art. 241","group":"Norme","heading":"Procedimenti in corso che si trovano in una fase \n diversa da quella istruttoria","contentHtml":"<p>1. Salvo quanto previsto dal presente titolo, i procedimenti in corso alla data di entrata in vigore del codice proseguono con l'applicazione delle norme anteriormente vigenti se a tale data e' stata gia' richiesta la citazione a giudizio ovvero sono stati emessi sentenza istruttoria di proscioglimento non irrevocabile, ordinanza di rinvio a giudizio, decreto di citazione a giudizio o decreto penale di condanna ovvero e' stato disposto il giudizio direttissimo.</p>","notesHtml":""},{"id":"art_242","numText":"Art. 242","group":"Norme","heading":"Procedimenti in fase istruttoria che proseguono con le norme anteriormente vigenti","contentHtml":"<p>1. La disposizione dell'articolo 241 si osserva altresi': \n a) nei procedimenti in corso alla data di entrata in vigore del codice quando e' stato compiuto un atto di istruzione del quale e' previsto il deposito e il fatto e' stato contestato all'imputato ovvero enunciato in un mandato o in un ordine rimasto senza effetto; \n b) quando, prima dell'entrata in vigore del codice, e' stato eseguito l'arresto in flagranza o il fermo; \n c) nei procedimenti connessi a norma dell'articolo 45 del codice abrogato per i quali le condizioni indicate nelle lettere a) e b) ricorrono anche relativamente a uno solo degli indiziati o imputati ovvero a una sola delle imputazioni, sempre che alla data di entrata in vigore del codice i procedimenti siano gia' riuniti. \n 2. Quando si procede con istruzione sommaria, se entro il 31 dicembre 1990 non e' stato ancora richiesto il decreto di citazione a giudizio o richiesta la sentenza di proscioglimento o non e' stato disposto il giudizio direttissimo, il pubblico ministero entro i successivi trenta giorni trasmette il fascicolo con le sue conclusioni al giudice istruttore. Questi provvede agli adempimenti previsti dall'articolo 372 del codice abrogato ed entro sessanta giorni dalla scadenza del termine ivi indicato pronuncia sentenza di proscioglimento od ordinanza di rinvio a giudizio. \n 3. Quando si procede con istruzione formale, se l'istruzione e' ancora in corso alla data del 31 dicembre 1990 ovvero, quando si tratta dei reati indicati nell'articolo 407 comma 2 lettera a) del codice, alla data del 30 giugno 1997, il giudice istruttore entro cinque giorni deposita il fascicolo in cancelleria, dandone avviso al pubblico ministero a norma dell'articolo 369 del codice abrogato.\nEntro sessanta giorni dalla scadenza del termine previsto dall'articolo 372 del codice abrogato, il giudice istrutture pronuncia sentenza di proscioglimento od ordinanza di rinvio a giudizio. <sup class=\"amd\">26</sup> \n 4. Nei procedimenti di competenza del pretore, se alla data del 31 dicembre 1990 l'istruzione e' ancora in corso, il pretore entro trenta giorni pronuncia sentenza di proscioglimento, decreto di citazione a giudizio o decreto penale di condanna ovvero dispone il giudizio direttissimo.</p>\n<p>AGGIORNAMENTO (26) \n La L. 27 giugno 1997, n. 183 ha disposto (con l'art. 1, comma 1) che il termine previsto dal comma 3 del presente articolo e' ulteriormente prorogato al 31 dicembre 1997, limitatamente ai procedimenti nei quali siano contestati i delitti previsti dagli articoli 285, 286, 422 e 428 del codice penale.</p>","notesHtml":""},{"id":"art_243","numText":"Art. 243","group":"Norme","heading":"Revoca delle sentenze di proscioglimento","contentHtml":"<p>1. Le sentenze istruttorie di proscioglimento emesse nei procedimenti indicati nell'articolo 242 comma 1 possono essere revocate nei casi e con le forme previste dal titolo X del libro V del codice. \n 2. In caso di revoca di una sentenze istruttoria di proscioglimento si osservano le disposizioni del codice. Gli atti di polizia giudiziaria e gli atti istruttori gia' compiuti sono considerati ad ogni effetto come compiuti nel corso delle indagini preliminari \n ; tuttavia, quando si tratta di esperimenti giudiziali, perizie o ricognizioni, anche compiuti all'estero col rispetto del contraddittorio, i relativi verbali sono raccolti nel fascicolo previsto dall'articolo 431 del codice.</p>","notesHtml":""},{"id":"art_244","numText":"Art. 244","group":"Norme","heading":"Disciplina applicabile in caso di regressione \n dei procedimenti alla fase istruttoria","contentHtml":"<p>1. Le disposizioni dell'articolo 243 comma 2 si osservano anche quando, dopo la scadenza dei termini indicati nell'articolo 242 commi 2, 3 e 4, i procedimenti proseguiti con l'applicazione delle norme vigenti anteriormente alla data di entrata in vigore del codice regrediscono per qualunque motivo alla fase istruttoria ovvero quando i termini suddetti non sono rispettati. In tali casi si osservano altresi' le seguenti disposizioni: \n a) i termini che, secondo il codice, decorrono dal momento in cui e' effettuata taluna delle iscrizioni nel registro previsto dall'articolo 335, sono computati a partire dalla data del provvedimento che dispone la regressione del procedimento o la trasmissione degli atti al pubblico ministero; \n b) alle nullita' relative verificatesi nel corso dell'istruzione si applica l'articolo 181 commi 1 e 2 del codice; \n c) alla parte civile ritualmente costituita spettano nelle indagini preliminari i poteri attribuiti dal codice alla persona offesa. \n 2. Quando non sono rispettati i termini indicati nell'articolo 242 commi 2, 3 e 4, il pubblico ministero, il giudice istruttore o il pretore comunica al procuratore generale presso la corte di appello, che ne informa il ministro di grazia e giustizia, le ragioni che hanno impedito l'osservanza dei predetti termini e dispone la trasmissione degli atti al pubblico ministero.</p>","notesHtml":""},{"id":"art_245","numText":"Art. 245","group":"Norme","heading":"Disposizioni del codice applicabili ai procedimenti \n che proseguono con le norme anteriormente vigenti","contentHtml":"<p>1. Nei procedimenti in corso alla data di entrata in vigore del codice che proseguono con l'applicazione delle norme anteriormente vigenti si osservano le disposizioni degli articoli 246, 247, 248, 249, 250, 251, 252, 253, 254, 255, 256 e 257. \n 2. Nei procedimenti indicati nel comma 1 si osservano, inoltre, le seguenti disposizioni del codice: \n a) articolo 104; \n b) articolo 192; \n c) articolo 200; \n d) articolo 207; \n e) articolo 296 comma 3, per i soli procedimenti pendenti nella fase istruttoria; \n f) articolo 298; \n g) articoli 314 e 315; \n h) articolo 476 comma 2; \n i) articolo 486 comma 5; \n l) articolo 508 commi 1 e 2; \n m) articolo 564; \n n) articolo 578; \n o) articolo 586; \n p) articolo 597 commi 4 e 5; \n q) articolo 599.</p>","notesHtml":""},{"id":"art_246","numText":"Art. 246","group":"Norme","heading":"Questioni pregiudiziali","contentHtml":"<p>1. Per la risoluzione delle questioni pregiudiziali si osservano le disposizione del codice nonche' quelle delle leggi vigenti. Se e' stata disposta la sospensione del processo e questa non e' piu' consentita, la relativa ordinanza e' revocata.</p>","notesHtml":""},{"id":"art_247","numText":"Art. 247","group":"Norme","heading":"Giudizio abbreviato","contentHtml":"<p>1. Prima che siano state compiute le formalita' di apertura del dibattimento di primo grado, l'imputato puo' chiedere, nella forma prevista dall'articolo 438 del codice, che il processo sia definito allo stato degli atti a norma dell'articolo 442 del codice. <sup class=\"amd\">3</sup> \n 2. Alla presentazione della richiesta il giudice, sospese le formalita' di apertura del dibattimento se gia' iniziate, ne da' avviso al pubblico ministero, che nei cinque giorni successivi esprime o nega il proprio consenso. Se il consenso interviene e il giudice ritiene di poter decidere allo stato degli atti, fissa con ordinanza l'udienza in camera di consiglio, dandone avviso al pubblico ministero, all'imputato, al difensore e alla parte civile.\nAll'udienza, il pubblico ministero e i difensori della parte civile e dell'imputato illustrano, nell'ordine, le rispettive conclusioni; l'imputato puo' chiedere di essere interrogato dopo le conclusioni del pubblico ministero. Terminata la discussione, il giudice pronuncia sentenza a norma dell'articolo 442 del codice. La sentenza ha autorita' di cosa giudicata nel giudizio civile se la parte civile ha presentato le sue conclusioni alla udienza. Si osservano le disposizioni previste dall'articolo 443 del codice. <sup class=\"amd\">3</sup> \n 3. Il giudice, se non vi e' il consenso del pubblico ministero o se ritiene di non poter decidere allo stato degli atti, pronuncia ordinanza con la quale dispone procedersi nelle forme ordinarie. <sup class=\"amd\">3</sup> \n 4. Quando la richiesta prevista dal comma 1 e' formulata nel corso dell'istruzione, la competenza a provvedere spetta al giudice istruttore. Se si procede con istruzione sommaria, la richiesta e' depositata presso la segreteria del pubblico ministero il quale, se esprime il proprio consenso, la trasmette al giudice istruttore unitamente agli atti del processo. Nei procedimenti di competenza del pretore il consenso e' espresso dal pubblico ministero indicato nell'articolo 550 comma 1 lettera a) del codice. Si osservano in ogni caso, in quanto applicabili, le disposizioni previste dai commi 1, 2 e 3. \n 5. Quando si procede a carico di piu' imputati o per piu' imputazioni e sussistono i presupposti per definire il processo allo stato degli atti solo per alcuni degli imputati o per alcune delle imputazioni, il giudice, anche di ufficio, dispone con ordinanza la separazione dei procedimenti.</p>\n<p>AGGIORNAMENTO (3) \n La Corte costituzionale, con sentenza 18 gennaio-8 febbraio 1990, n. 66 (in G.U. 1a s.s. 14/2/1990, n. 7), ha dichiarato l'illegittimita' costituzionale dei commi 1, 2 e 3 del presente articolo nella parte in cui non prevedono che il pubblico ministero, in caso di dissenso, debba enunciarne le ragioni e nella parte in cui non prevede che il giudice, quando, a dibattimento concluso, ritiene ingiustificato il dissenso del pubblico ministero, possa applicare all'imputato la riduzione di pena contemplata dall'art. 442, comma 2, del codice di procedura penale del 1988.</p>","notesHtml":""},{"id":"art_248","numText":"Art. 248","group":"Norme","heading":"Applicazione della pena su richiesta delle parti","contentHtml":"<p>1. Prima che siano compiute le formalita' di apertura del dibattimento di primo grado, l'imputato e il pubblico ministero possono chiedere al giudice l'applicazione della pena a norma dell'articolo 444 del codice. Se la richiesta non e' formulata in udienza, il giudice ne da' avviso all'altra parte che, nei cinque giorni successivi, esprime o nega il proprio consenso. La richiesta e il consenso sono espressi nelle forme previste dall'articolo 446 commi 2, 3 e 6 del codice. Il giudice, se non deve provvedere a norma dell'articolo 421 del codice abrogato e sempre che ne sussistano i presupposti, pronuncia la sentenza prevista dall'articolo 444 comma 2 del codice. Si osservano le disposizioni previste dagli articoli 444 comma 2, 445 e 448 del codice. Quando non pronuncia sentenza, il giudice dispone con ordinanza procedersi nelle forme ordinarie. \n 2. Se la richiesta e' formulata nel corso dell'istruzione, la competenza a provvedere spetta al giudice istruttore, osservate, in quanto compatibili, le disposizioni previste dall'articolo 447 del codice. Quando si procede con istruzione sommaria, la richiesta dell'imputato e' depositata presso la segreteria del pubblico ministero il quale, se esprime il proprio consenso, la trasmette al giudice istruttore unitamente agli atti del processo, altrimenti emette decreto motivato di dissenso. Quando il pubblico ministero ritiene che il processo possa essere definito con la sentenza prevista dall'articolo 444 del codice, notifica all'imputato avviso di deposito della richiesta che intende rivolgere al giudice; se l'imputato esprime il proprio consenso, il pubblico ministero trasmette la richiesta, il consenso e gli atti del procedimento al giudice istruttore che provvede a norma del primo periodo del presente comma. Nei procedimenti di competenza del pretore, il consenso o il dissenso motivato e' espresso dal pubblico ministero indicato nell'articolo 550 comma 1 lettera a) del codice. \n 3. Si osservano le disposizioni previste dall'articolo 247 comma 5. \n 4. Continuano ad osservarsi le disposizioni relative alla applicazione di sanzioni sostitutive su richiesta dell'imputato, a norma della legge 24 novembre 1981 n. 689, se la richiesta medesima e' stata formulata anteriormente all'entrata in vigore del codice e sempre che l'interessato non si avvalga delle facolta' previste dall'articolo 247 e dal presente articolo.</p>","notesHtml":""},{"id":"art_249","numText":"Art. 249","group":"Norme","heading":"Procedimento per decreto","contentHtml":"<p>1. Quando ritiene di emettere decreto di condanna, il pretore puo' applicare una pena diminuita sino alla meta' rispetto al minimo edittale. \n 2. Nei procedimenti di competenza del tribunale, sino alla chiusura dell'istruzione sommaria o formale, il pubblico ministero puo' chiedere al giudice istruttore di emettere decreto di condanna nei casi previsti dall'articolo 459 del codice, anche per una pena diminuita fino alla meta' rispetto al minimo edittale. Se il giudice accoglie la richiesta emette il decreto, altrimenti si procede secondo le forme ordinarie. Per il decreto di condanna e per l'eventuale giudizio di opposizione davanti al tribunale si osservano, in quanto compatibili, le disposizioni del codice abrogato.</p>","notesHtml":""},{"id":"art_250","numText":"Art. 250","group":"Norme","heading":"Disciplina delle misure cautelari, del fermo, \n dell'arresto e delle pene accessorie","contentHtml":"<p>1. Successivamente alla data di entrata in vigore del codice puo' procedersi al fermo solo nei casi e alle condizioni previste dal codice. I mandati di cattura e gli ordini e i mandati di arresto possono essere emessi solo se ricorrono i presupposti indicati negli articoli 273, 274 e 280 del codice. \n 2. I provvedimenti sulla liberta' personale disposti anteriormente alla data di entrata in vigore del codice sono revocati se non ricorrono i presupposti indicati nell'ultima parte del comma 1 ovvero, quando sono stati disposti con il provvedimento di convalida dell'arresto o di conferma della convalida, se sono relativi a reati per i quali il codice non consente l'arresto in flagranza. \n 3. Quando i provvedimenti indicati nel comma 2 sono stati emessi esclusivamente al fine di evitare il pericolo per l'acquisizione della prova, il termine previsto dall'articolo 292 lettera d) del codice e' fissato su richiesta di parte ovvero di ufficio se il provvedimento non e' stato ancora eseguito. Competente a fissare il suddetto termine e' il giudice che procede o, nel corso dell'istruzione sommaria, il giudice istruttore su richiesta del pubblico ministero o del pretore. \n 4. Alla data di entrata in vigore del codice cessa l'esecuzione delle pene accessorie provvisoriamente applicate. Il giudice indicato nel comma 3 puo' disporre in sostituzione di esse, qualora ne ricorrano le condizioni, le misure interdittive previste nel capo III del titolo I del libro IV del codice.</p>","notesHtml":""},{"id":"art_251","numText":"Art. 251","group":"Norme","heading":"Durata delle misure cautelari e restituzione \n della cauzione","contentHtml":"<p>1. Quando si procede nei confronti di un imputato che si trova in stato di custodia cautelare si osservano le disposizioni del codice sui termini di durata della custodia stessa calcolati a decorrere dalla data di entrata in vigore del codice. Tuttavia, la durata della custodia cautelare non puo' superare i termini previsti dalle norme del codice abrogato. \n 2. Le misure previste dall'articolo 282 comma 1 del codice abrogato, imposte anteriormente alla data di entrata in vigore del codice, sono revocate quando dalla loro esecuzione e' decorso un periodo di tempo pari a quello indicato nell'articolo 308 comma 1 del codice. \n 3. Se alla data di entrata in vigore del codice non e' stata pronunciata l'ordinanza prevista dal comma 4 ovvero quella prevista dal comma 6 dell'articolo 292 del codice abrogato, la cauzione e' restituita a richiesta dell'imputato o dei suoi eredi e i fideiussori sono liberati.</p>","notesHtml":""},{"id":"art_252","numText":"Art. 252","group":"Norme","heading":"Infermita' di mente sopravvenuta all'imputato","contentHtml":"<p>1. Quando l'imputato si trova ricoverato per infermita' di mente sopravvenuta a norma dell'articolo 88 del codice abrogato o tale infermita' e' accertata successivamente alla data di entrata in vigore del codice, si osservano le disposizioni previste dagli articoli 72 e 73 commi 1, 2 e 3 del codice. \n 2. I provvedimenti previsti dall'articolo 73 commi 1, 2 e 3 del codice sono adottati senza ritardo dal giudice anche di ufficio.</p>","notesHtml":""},{"id":"art_253","numText":"Art. 253","group":"Norme","heading":"Trasferimento delle funzioni della sezione \n istruttoria","contentHtml":"<p>1. Le funzioni attribuite dal codice abrogato alla sezione istruttoria sono esercitate dalla corte di appello.</p>","notesHtml":""},{"id":"art_254","numText":"Art. 254","group":"Norme","heading":"Formule di proscioglimento","contentHtml":"<p>1. Le sentenze di proscioglimento possono essere pronunciate solo con le formule previste dal codice.</p>","notesHtml":""},{"id":"art_255","numText":"Art. 255","group":"Norme","heading":"Ricorso immediato per cassazione","contentHtml":"<p>1. La parte che ha diritto di appellare la sentenza di primo grado puo' proporre direttamente ricorso per cassazione. Si osservano, in quanto applicabili, le disposizioni dell'articolo 569 del codice.</p>","notesHtml":""},{"id":"art_256","numText":"Art. 256","group":"Norme","heading":"Criteri per il rinvio a giudizio","contentHtml":"<p>1. La richiesta e il decreto di citazione a giudizio nonche' l'ordinanza di rinvio a giudizio sono emessi solo quando il pubblico ministero, il pretore o il giudice istruttore ritengono che gli elementi di prova raccolti siano sufficienti a determinare, all'esito della istruttoria dibattimentale, la condanna dell'imputato.</p>","notesHtml":""},{"id":"art_257","numText":"Art. 257","group":"Norme","heading":"Criteri per l'emissione delle sentenze \n di proscioglimento","contentHtml":"<p>1. Ai fini della pronuncia delle sentenze istruttorie di proscioglimento ovvero di quelle previste dall'articolo 421 del codice abrogato, il giudice puo' tenere conto delle diminuzioni di pena derivanti da circostanze attenuanti e applicare le disposizioni dell'articolo 69 del codice penale.</p>","notesHtml":""},{"id":"art_258","numText":"Art. 258","group":"Norme","heading":"Procedimenti che proseguono secondo le disposizioni del codice","contentHtml":"<p>1. I procedimenti in corso diversi da quelli indicati negli articoli 241 e 242 proseguono con l'osservanza delle disposizioni del codice, ma i termini previsti dagli articoli 405 comma 2 e 553 comma 1 del codice sono di dodici mesi e il termine di durata massima delle indagini preliminari scade il 31 dicembre 1991. \n 2. Il termine per la richiesta di giudizio immediato previsto dall'articolo 454 comma 1 del codice e' di nove mesi; il termine per la richiesta di emissione del decreto penale di condanna previsto dall'articolo 459 comma 1 del codice e' di dodici mesi. \n 3. Detti termini sono computati dalla data di entrata in vigore del codice. Per gli atti di polizia giudiziaria e per gli atti istruttori si osservano le disposizioni previste dagli articoli 243 comma 2 e 244 comma 1. \n 4. Qualora alla scadenza dei termini per le indagini preliminari il pubblico ministero non abbia esercitato l'azione penale o richiesto l'archiviazione, la proroga prevista dagli articoli 406 comma 1 e 553 comma 2 del codice opera di diritto fino al 31 dicembre 1991 per i procedimenti indicati nel comma 1 e per la durata di dodici mesi per i procedimenti relativi alle notizie di reato pervenute agli uffici di procura della Repubblica dalla data di entrata in vigore del codice fino a tutto il 31 maggio 1990. Per i suddetti procedimenti, in deroga a quanto previsto dall'articolo 412 comma 1 del codice, il procuratore generale presso la corte di appello ha facolta' di avocare le indagini preliminari qualora il pubblico ministero non abbia esercitato l'azione penale o richiesto l'archiviazione nei termini. Nei casi di proroga dei termini per le indagini preliminari previsti dal presente comma, la richiesta di emissione del decreto penale di condanna, in deroga a quanto previsto dall'articolo 459 comma 1 del codice, puo' essere trasmessa entro il termine prorogato.</p>","notesHtml":""},{"id":"art_259","numText":"Art. 259","group":"Norme","heading":"Disciplina della competenza e della riunione \n dei procedimenti","contentHtml":"<p>1. Ai fini della determinazione della competenza per materia e per territorio le disposizioni del codice si applicano solo per i reati commessi successivamente alla data di entrata in vigore dello stesso. \n 2. La riunione non puo' essere disposta e la connessione non opera tra i procedimenti che proseguono con l'osservanza del codice abrogato e quelli per i quali si applica il codice.</p>","notesHtml":""},{"id":"art_260","numText":"Art. 260","group":"Norme","heading":"Esecuzione","contentHtml":"<p>1. Nelle materie regolate dal libro X del codice si osservano le disposizioni ivi previste anche per i provvedimenti emessi anteriormente alla data di entrata in vigore del codice e per i procedimenti gia' iniziati a tale data, ferma restando la competenza del giudice davanti al quale i procedimenti medesimi sono in corso.</p>","notesHtml":""},{"id":"art_0","numText":"Art. 0","group":"Norme di attuazione del Codice di Procedura Penale-Tabella A","heading":"","contentHtml":"<p>Spostamenti di competenza per i procedimenti penali nei quali un magistrato assume la qualita' di persona sottoposta ad indagini, di imputato ovvero di persona offesa o danneggiata dal reato. \n Tabella A</p>\n<p>Dal distretto di</p>\n<p>Al distretto di</p>\n<p>Roma</p>\n<p>Perugia</p>\n<p>Perugia</p>\n<p>Firenze</p>\n<p>Firenze</p>\n<p>Genova</p>\n<p>Genova</p>\n<p>Torino</p>\n<p>Torino</p>\n<p>Milano</p>\n<p>Milano</p>\n<p>Brescia</p>\n<p>Brescia</p>\n<p>Venezia</p>\n<p>Venezia</p>\n<p>Trento</p>\n<p>Trento</p>\n<p>Trieste</p>\n<p>Trieste</p>\n<p>Bologna</p>\n<p>Bologna</p>\n<p>Ancona</p>\n<p>Ancona</p>\n<p>L'Aquila</p>\n<p>L'Aquila</p>\n<p>Campobasso</p>\n<p>Campobasso</p>\n<p>Bari</p>\n<p>Bari</p>\n<p>Lecce</p>\n<p>Lecce</p>\n<p>Potenza</p>\n<p>Potenza</p>\n<p>Catanzaro</p>\n<p>Cagliari</p>\n<p>Roma</p>\n<p>Palermo</p>\n<p>Caltanissetta</p>\n<p>Caltanissetta</p>\n<p>Catania</p>\n<p>Catania</p>\n<p>Messina</p>\n<p>Messina</p>\n<p>Reggio Calabria</p>\n<p>Reggio Calabria</p>\n<p>Catanzaro</p>\n<p>Catanzaro</p>\n<p>Salerno</p>\n<p>Salerno</p>\n<p>Napoli</p>\n<p>Napoli</p>\n<p>Roma.</p>","notesHtml":""}]
};</script>
<script>
(function() {
  'use strict';
  // DATA is injected per page

  var currentIdx = 0;
  var filteredIndices = CODE.articles.map(function(_, i) { return i; });

  function init() {
    // Pre-compute plain text for full-text search
    CODE.articles.forEach(function(art) {
      art._searchText = (art.numText + ' ' + (art.heading || '') + ' ' +
        (art.contentHtml || '').replace(/<[^>]+>/g, '')).toLowerCase();
    });
    renderToc();

    // Navigate to hash article if present, otherwise show first article
    var initHash = location.hash.replace('#', '');
    var initIdx = 0;
    if (initHash) {
      var found = CODE.articles.findIndex(function(a) { return a.id === initHash || a.numText === decodeURIComponent(initHash); });
      if (found >= 0) initIdx = found;
    }
    showArticle(initIdx);

    document.getElementById('search').addEventListener('input', onSearch);
    document.getElementById('prev-btn').addEventListener('click', function() { navigate(-1); });
    document.getElementById('next-btn').addEventListener('click', function() { navigate(1); });
    document.getElementById('hamburger').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    });
    window.addEventListener('hashchange', onHashChange);
  }

  function onHashChange() {
    var hash = location.hash.replace('#', '');
    if (!hash) return;
    var idx = CODE.articles.findIndex(function(a) { return a.id === hash || a.numText === decodeURIComponent(hash); });
    if (idx >= 0) showArticle(idx);
  }

  function renderToc() {
    var nav = document.getElementById('toc');
    var html = '';
    var lastGroup = null;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        html += '<div class="group-label">' + esc(art.group) + '</div>';
        lastGroup = art.group;
      }
      html += '<div class="art-link" data-idx="' + i + '" onclick="goTo(' + i + ')">' +
        '<span class="art-num">' + esc(art.numText) + '</span>' +
        '<span class="art-heading-mini">' + esc(art.heading || '') + '</span>' +
        '</div>';
    });
    nav.innerHTML = html;
  }

  function showArticle(idx) {
    if (idx < 0 || idx >= CODE.articles.length) return;
    currentIdx = idx;
    var art = CODE.articles[idx];

    // Update URL hash
    history.replaceState(null, '', '#' + encodeURIComponent(art.numText));

    // Update header title
    document.getElementById('header-article').textContent = art.numText + (art.heading ? ' – ' + art.heading : '');

    // Render article
    var notesSection = art.notesHtml
      ? '<div class="article-notes">' +
        '<button class="notes-toggle" onclick="toggleNotes(this)">Aggiornamenti e note</button>' +
        '<div class="notes-body"><div class="article-body">' + art.notesHtml + '</div></div>' +
        '</div>'
      : '';

    document.getElementById('article-view').innerHTML =
      '<div class="article-card">' +
        '<div class="article-badge">📖 ' + esc(CODE.shortTitle) + '</div>' +
        '<h1 class="article-num">' + esc(art.numText) + '</h1>' +
        (art.heading ? '<p class="article-heading">' + esc(art.heading) + '</p>' : '<div style="margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)"></div>') +
        '<div class="article-body">' + art.contentHtml + '</div>' +
        notesSection +
        '<div class="article-actions">' +
          '<button class="action-btn wa-btn" onclick="shareWhatsApp()" title="Invia su WhatsApp">' +
            '<span class="action-icon">📲</span> WhatsApp' +
          '</button>' +
          '<button class="action-btn" onclick="copyArticle()" title="Copia articolo">' +
            '<span class="action-icon">📋</span> Copia' +
          '</button>' +
        '</div>' +
      '</div>';

    // Update counter
    document.getElementById('article-counter').textContent = (idx + 1) + ' / ' + CODE.articles.length;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === CODE.articles.length - 1;

    // Highlight active in TOC
    document.querySelectorAll('.art-link').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.querySelector('.art-link[data-idx="' + idx + '"]');
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // Scroll main to top
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
  }

  window.goTo = function(idx) { showArticle(idx); closeSidebar(); };

  function navigate(dir) {
    var pos = filteredIndices.indexOf(currentIdx);
    if (pos === -1) pos = 0;
    var newPos = pos + dir;
    if (newPos >= 0 && newPos < filteredIndices.length) {
      showArticle(filteredIndices[newPos]);
    }
  }

  function onSearch(e) {
    var q = e.target.value.toLowerCase().trim();
    filteredIndices = [];
    document.querySelectorAll('.art-link').forEach(function(el) {
      var idx = parseInt(el.dataset.idx, 10);
      var art = CODE.articles[idx];
      var hidden = q && !art._searchText.includes(q);
      el.classList.toggle('hidden', hidden);
      if (!hidden) filteredIndices.push(idx);
    });
    if (!q) filteredIndices = CODE.articles.map(function(_, i) { return i; });
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
  window.toggleNotes = function(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  };

  function getArticleText(art, bold) {
    var body = (art.contentHtml || '').replace(/<\/p>\s*<p>/gi, '\n').replace(/<[^>]+>/g, '').replace(/[ \t]+/g, ' ').trim();
    var heading = art.numText;
    if (art.heading) heading += ' – ' + art.heading;
    if (bold) heading = '*' + heading + '*';
    return CODE.title + '\n' + heading + '\n' + body;
  }

  window.shareWhatsApp = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, true);
    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  };

  window.copyArticle = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, false);
    navigator.clipboard.writeText(text).then(function() {
      showToast('Articolo copiato negli appunti');
    }, function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Articolo copiato negli appunti');
    });
  };

  function showToast(msg) {
    var el = document.getElementById('copy-toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(function() { el.classList.remove('visible'); }, 2000);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
