ne o di riporto di titoli di credito, che siano in corso di esecuzione all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_178","numText":"Art. 178","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La prescrizione stabilita dall'art. 1541 del codice si applica anche se si tratta di contratto di vendita anteriore alla data dell'entrata in vigore del codice stesso qualora la consegna dell'immobile sia stata eseguita posteriormente e al momento della consegna non sia gia' decorso il termine stabilito dall'art. 1478 del codice del 1865.</p>","notesHtml":""},{"id":"art_179","numText":"Art. 179","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I patti di preferenza previsti dall'art. 1566 del codice che alla data dell'entrata in vigore di questo devono ancora durare oltre cinque anni, sono validi nei limiti di un quinquennio computabile da tale data.</p>\n<p>Le modalita' per l'esercizio del diritto di preferenza stabilite dal secondo comma dell'art. 1566 predetto, si osservano se l'esercizio medesimo ha luogo dopo l'entrata in vigore del codice, anche se il patto sia stato stipulato anteriormente.</p>","notesHtml":""},{"id":"art_180","numText":"Art. 180","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I rapporti di locazione in corso al giorno dell'entrata in vigore del nuovo codice sono regolati dal codice del 1865.</p>\n<p>Tuttavia si applicano, con effetto da tale data, le disposizioni del nuovo codice dichiarate inderogabili, o che siano comunque di ordine pubblico, e tutte le altre che regolano fatti o situazioni non previste specificamente dalla legge anteriore.</p>","notesHtml":""},{"id":"art_181","numText":"Art. 181","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1665, 1666, 1667 e 1668 del codice si applicano anche per i contratti anteriori, se l'opera o singole partite di essa siano compiute o comunque alla loro consegna si addivenga dopo l'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_182","numText":"Art. 182","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 1694 e della seconda parte dell'art. 1698 del codice si osservano anche se il contratto sia anteriore all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_183","numText":"Art. 183","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1706 e 1707 del codice si applicano anche se il mandato sia stato conferito anteriormente all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_184","numText":"Art. 184","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le cause di estinzione del mandato sono regolate dal codice se si verificano dopo l'entrata in vigore di questo, anche se si tratta di mandato conferito anteriormente.</p>","notesHtml":""},{"id":"art_185","numText":"Art. 185","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione del secondo comma dell'art. 1815 del codice si applica anche se il contratto di mutuo sia anteriore all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_186","numText":"Art. 186","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il creditore di una rendita e di ogni altra prestazione annua costituita anteriormente all'entrata in vigore del nuovo codice, puo' pretendere dal debitore il rilascio di un nuovo documento secondo la disposizione dell'art. 1870 del codice stesso, ma il termine di nove anni decorre dall'entrata in vigore di questo se non scada prima il termine di ventotto anni stabilito dall'art. 2136 del codice del 1865.</p>","notesHtml":""},{"id":"art_187","numText":"Art. 187","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1888, secondo e terzo comma, 1889, 1902, 1903, secondo comma, 1930 e 1931 del codice si applicano anche ai contratti in corso.</p>\n<p>Si applicano parimenti ai contratti suddetti le disposizioni degli articoli 1897, 1898 e 1926, quando le modificazioni del rischio da esse previste si verificano dopo l'entrata in vigore del codice, la disposizione del secondo comma dell'art. 1899, se la proroga tacita non e' gia' avvenuta anteriormente all'entrata in vigore medesima, le disposizioni dell'art. 1901 relativamente ai premi che scadono dopo l'entrata in vigore medesima, le disposizioni degli articoli 1914, secondo comma e 1915, secondo comma, per i sinistri verificatisi dopo l'entrata in vigore medesima.</p>","notesHtml":""},{"id":"art_188","numText":"Art. 188","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 1921 del codice si applicano alle dichiarazioni di revoca posteriori all'entrata in vigore di esso, anche se il contratto di assicurazione sia stato concluso anteriormente.</p>\n<p>Qualora i fatti che producono la decadenza del beneficiario o che autorizzano la revoca del beneficio si siano verificati dopo l'entrata in vigore predetta, si applicano le disposizioni dell'art. 1922 del codice, anche se il contratto di assicurazione sia anteriore.</p>","notesHtml":""},{"id":"art_189","numText":"Art. 189","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del primo comma dell'art. 1943 del codice si osservano quando la presentazione del fideiussore avviene posteriormente all'entrata in vigore del codice stesso, anche se l'obbligazione di dar fideiussore sia sorta anteriormente.</p>\n<p>La disposizione del precedente comma non si applica se l'obbligazione di dare un fideiussore deriva da un contratto.</p>","notesHtml":""},{"id":"art_190","numText":"Art. 190","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 1957 del codice si applica anche alle fideiussioni anteriori all'entrata in vigore del codice stesso se l'obbligazione principale scade dopo.</p>\n<p>Se l'obbligazione e' gia' scaduta, il termine di sei mesi stabilito dal primo comma dell'art. 1957 decorre dall'entrata in vigore suddetta.</p>","notesHtml":""},{"id":"art_191","numText":"Art. 191","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione del secondo comma dell'art. 1962 del codice si applica anche ai contratti di anticresi anteriori, ma il termine di dieci anni decorre dall'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_192","numText":"Art. 192","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il debitore puo' valersi della facolta' accordatagli dall'art. 1964 del codice, anche se il contratto di anticresi sia anteriore all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_193","numText":"Art. 193","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1979, 1980, 1982, 1983, 1984 e 1985 del codice si applicano anche ai contratti di cessione dei beni ai creditori, conclusi anteriormente all'entrata in vigore di esso.</p>","notesHtml":""},{"id":"art_194","numText":"Art. 194","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 2045, 2057 e 2058 del codice si applicano anche se i fatti da cui deriva la responsabilita' del loro autore sono avvenuti anteriormente all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_195","numText":"Art. 195","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni contenute nelle sezioni III e IV del capo I del titolo II del libro V del codice e quelle contenute nelle sezioni II, III, IV e V del capo II dello stesso titolo si applicano anche ai rapporti in corso al momento dell'entrata in vigore del codice, salvo quanto e' stabilito negli articoli seguenti.</p>","notesHtml":""},{"id":"art_196","numText":"Art. 196","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nei contratti di lavoro a tempo determinato in corso al giorno dell'entrata in vigore del codice, che devono ancora durare per un periodo superiore a quello indicato dall'ultimo comma dell'art. 2097 del codice stesso, il prestatore di lavoro puo' recedere dal contratto, decorso il quinquennio o il decennio dal giorno suddetto.</p>","notesHtml":""},{"id":"art_197","numText":"Art. 197","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le rinunzie e le transazioni successive alla cessazione del rapporto di lavoro previste dall'art. 2113 del codice, che hanno avuto luogo nei tre mesi anteriori all'entrata in vigore del codice, sono impugnabili a norma dell'articolo medesimo, e il termine per l'impugnazione decorre dalla data predetta.</p>","notesHtml":""},{"id":"art_198","numText":"Art. 198","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I patti di non concorrenza previsti dall'art. 2125 del codice, che al giorno dell'entrata in vigore del codice devono ancora durare per un periodo superiore a quello stabilito nell'articolo stesso, sono efficaci per il periodo previsto nella detta disposizione a decorrere dalla data predetta.</p>","notesHtml":""},{"id":"art_199","numText":"Art. 199","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'inabilitato, che al giorno dell'entrata in vigore del codice esercita un'impresa commerciale, non puo' continuarla se non con l'autorizzazione prevista dall'art. 425 del codice stesso. Questa autorizzazione produce effetto fin dal detto giorno qualora sia pubblicata, secondo le nuove disposizioni, entro tre mesi successivi.</p>","notesHtml":""},{"id":"art_200","numText":"Art. 200","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice, relative alla tenuta delle scritture contabili e alla redazione del bilancio per gli imprenditori che esercitano un'attivita' commerciale e per le societa' soggette a registrazione, entreranno in vigore il 1° gennaio 1943.</p>\n<p>Fino a tale data le scritture contabili si considerano regolarmente tenute tutti gli effetti previsti dal codice in quanto siano regolarmente tenute secondo le leggi anteriori.</p>\n<p>Fino all'attuazione delle disposizioni relative al registro delle imprese, la numerazione, la bollatura e la vidimazione dei libri contabili prescritte dal codice saranno eseguite dal cancelliere del tribunale o della pretura, o da un notaio secondo le leggi anteriori, e le relative richieste dovranno essere annotate nel registro dei libri di commercio istituito presso la cancelleria del tribunale a norma delle leggi anteriori.</p>","notesHtml":""},{"id":"art_201","numText":"Art. 201","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ai contratti d'opera stipulati prima dell'entrata in vigore del codice non si applica la decadenza prevista nel secondo comma dell'art. 2226 del codice, salvo che la consegna dell'opera avvenga posteriormente all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_202","numText":"Art. 202","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni contenute nel capo II del titolo III del libro V del codice si applicano anche ai rapporti di prestazione d'opera intellettuale in corso al giorno dell'entrata in vigore del codice stesso, salva l'osservanza delle leggi speciali.</p>","notesHtml":""},{"id":"art_203","numText":"Art. 203","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni contenute nel capo II del titolo IV del libro V del codice si applicano anche ai rapporti di lavoro domestico in corso al giorno dell'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_204","numText":"Art. 204","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' civili a tempo determinato, esistenti al giorno dell'entrata in vigore del codice, continuano ad essere soggette alle leggi anteriori per la durata del contratto, purche' questa risulti da atto scritto di data anteriore al 27 febbraio 1942. <sup class=\"amd\">15</sup></p>\n<p>Le societa' civili a tempo indeterminato e quelle, il cui termine di durata non risulta da atto scritto di data anteriore al 27 febbraio 1942, sono soggette alle norme del codice sulle societa' semplici a partire dal 1° luglio 1945. Tuttavia anche dopo tale data le obbligazioni sociali sorte antecedentemente alla data suddetta sono regolate dalle disposizioni delle leggi anteriori. (1) (2) (3) (4) (5) <sup class=\"amd\">15</sup></p>\n<p>Alle societa' civili costituite in forma di societa' per azioni, esistenti al giorno dell'entrata in vigore del codice, si applicano le disposizioni relative a questo tipo di societa'.</p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>\n<p>AGGIORNAMENTO (15)</p>\n<p>Il D.P.R. 22 dicembre 1986, n. 917 ha disposto (con l'art. 130, comma 1) che &quot;Ai fini delle imposte sui redditi le societa' civili esistenti alla data di entrata in vigore del codice civile, di cui all'articolo 204, commi primo e secondo, del regio decreto 30 marzo 1942, n. 318, sono equiparate alle societa' in nome collettivo o alle societa' semplici secondo che abbiano o non abbiano per oggetto l'esercizio di attivita' commerciali&quot;.</p>"},{"id":"art_205","numText":"Art. 205","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' commerciali e le societa' cooperative, esistenti al giorno dell'entrata in vigore del codice, ma non legalmente costituite secondo le leggi anteriori, devono adempiere, entro il 31 dicembre 1942, le formalita' stabilite dal codice secondo le norme dettate dall'art. 100 di queste disposizioni.</p>","notesHtml":""},{"id":"art_206","numText":"Art. 206","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' commerciali e le societa' cooperative, legalmente costituite al giorno dell'entrata in vigore del codice, devono provvedere ad uniformare l'atto costitutivo e lo statuto alle nuove disposizioni entro il 30 giugno 1945. Fino a questa data le disposizioni dell'atto costitutivo e dello statuto, in vigore al momento dell'attuazione del codice, conservano la loro efficacia, anche se non sono a questo conformi, salve le norme degli articoli seguenti. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_207","numText":"Art. 207","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Non e' necessario il consenso del socio receduto o degli eredi del socio defunto, richiesto dal secondo comma dell'art. 2292 del codice, se il socio e' receduto o defunto almeno un anno prima dell'entrata in vigore del codice stesso, ed il suo nome e' stato conservato nella ragione sociale senza opposizione del socio receduto o degli eredi del socio defunto.</p>","notesHtml":""},{"id":"art_208","numText":"Art. 208","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'incapace, che sia socio di una societa' in nome collettivo o socio accomandatario di una societa' in accomandita, deve ottenere le autorizzazioni previste dagli articoli 320, 371, 397, 424 e 425 del codice entro tre mesi dall'entrata in vigore di questo.</p>\n<p>Se entro tale termine non sono state ottenute le autorizzazioni prescritte, l'incapace puo' essere escluso a norma dell'art. 2286 del codice.</p>","notesHtml":""},{"id":"art_209","numText":"Art. 209","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Hanno immediata applicazione con l'entrata in vigore del codice, anche per le societa' esistenti a tale data, nonostante ogni contraria disposizione dell'atto costitutivo o dello statuto, gli articoli 2357 a 2362, 2367, 2373, 2377 a 2379, 2389, 2391 a 2396, 2398 a 2409, 2422 e 2446, nonche' le disposizioni del titolo XI del libro V del codice.</p>\n<p>Le societa', che anteriormente al giorno dell'entrata in vigore del codice hanno investito in tutto o in parte il proprio capitale in difformita' delle disposizioni degli articoli 2359 e 2360, devono uniformarsi alle disposizioni stesse entro il 30 giugno 1945. \n (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_210","numText":"Art. 210","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'emissione di obbligazioni da parte di societa' per azioni, esistenti al giorno dell'entrata in vigore del codice, e' regolata dalle nuove disposizioni.</p>\n<p>Gli articoli 2415, 2416, 2417, 2418, 2419 e 2420 del codice si applicano anche alle obbligazioni emesse anteriormente alla suddetta data.</p>","notesHtml":""},{"id":"art_211","numText":"Art. 211","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le modificazioni dell'atto costitutivo e dello statuto delle societa' commerciali e delle societa' cooperative, esistenti al giorno dell'entrata in vigore del codice, nonche' la trasformazione e la fusione delle societa' stesse sono regolate dalle nuove disposizioni.</p>","notesHtml":""},{"id":"art_211","numText":"Art. 211-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Il secondo periodo dell'articolo 2441, settimo comma, del codice non si applica alle azioni detenute, alla data del 7 marzo 1992, dai soggetti indicati nel medesimo comma, con obbligo di offrirle agli azionisti.","contentHtml":"","notesHtml":""},{"id":"art_212","numText":"Art. 212","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le deliberazioni di modifica dello statuto di societa' iscritte nel registro delle imprese alla data del 31 agosto 2014 con cui e' prevista la creazione di azioni a voto plurimo ai sensi dell'articolo 2351 del codice sono prese, anche in prima convocazione, con il voto favorevole di almeno i due terzi del capitale rappresentato in assemblea.</p>","notesHtml":""},{"id":"art_213","numText":"Art. 213","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Salvo contraria disposizione dell'atto costitutivo o dello statuto, la durata dell'ufficio degli amministratori delle societa' esistenti al giorno dell'entrata in vigore del codice, resta regolata dalla legge anteriore sino al 30 giugno 1945. Gli amministratori in carica a questa data decadono dall'ufficio alla, prima scadenza, per decorrenza del termine, di uno o piu' amministratori, successiva alla data stessa, salva la disposizione, del secondo comma dell'art. 2385 del codice. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_214","numText":"Art. 214","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 2387 del codice non si applicano agli amministratori in carica al giorno dell'entrata in vigore del codice stesso per la durata della loro nomina.</p>","notesHtml":""},{"id":"art_215","numText":"Art. 215","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' per azioni, che al giorno dell'entrata in vigore del codice hanno un capitale non inferiore a cinquecentomila lire, possono conservare la forma della societa' per azioni per il tempo stabilito per la loro durata antecedentemente al 27 febbraio 1942.</p>\n<p>Le societa' per azioni, che al giorno dell'entrata in vigore del codice, hanno un capitale inferiore a cinquecentomila lire e che entro il 30 giugno 1945 non abbiano provveduto a conformarsi a uno dei tipi sociali previsti dal codice, sono sciolte, e gli amministratori devono entro un mese convocare l'assemblea per le deliberazioni relative alla liquidazione secondo le norme stabilite dal codice stesso. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_216","numText":"Art. 216","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' a garanzia limitata, esistenti al giorno dell'entrata in vigore del codice nella Venezia Giulia e Tridentina, a norma del R. decreto 4 novembre 1928 n. 2325, se non hanno provveduto a conformarsi al codice entro il 30 giugno 1945, sono soggette a decorrere dal 1° luglio 1945 alle nuove disposizioni sulle societa' a responsabilita' limitata. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_217","numText":"Art. 217","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' cooperative in nome collettivo e quelle per azioni, esistenti al giorno dell'entrata in vigore del codice, sono soggette alle disposizioni dettate dal codice stesso rispettivamente per le societa' cooperative a responsabilita' illimitata e per le societa' cooperative a responsabilita' limitata, salvo quanto disposto dagli articoli 206 e seguenti di queste disposizioni.</p>\n<p>Le societa' cooperative in accomandita, esistenti al giorno dell'entrata in vigore del codice che entro il 30 giugno 1945 non abbiano provveduto a conformarsi al medesimo, devono essere poste in liquidazione. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>\n<p>Le disposizioni di questo articolo si applicano anche ai consorzi conservati in vigore nella Venezia Giulia e Tridentina a norma del primo comma dell'art. 41 del R. decreto 4 novembre 1928 n. 2325.</p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_218","numText":"Art. 218","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' in liquidazione alla data del 1 gennaio 2004, sono liquidate secondo le leggi anteriori.</p>\n<p>Le societa' in liquidazione dal 1° gennaio 2004, sono liquidate secondo le nuove disposizioni.</p>","notesHtml":""},{"id":"art_219","numText":"Art. 219","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I rapporti di associazione in partecipazione costituiti anteriormente all'entrata in vigore del codice sono regolati dalle leggi anteriori.</p>","notesHtml":""},{"id":"art_220","numText":"Art. 220","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione del secondo comma dell'art. 2560 del codice non si applica ai trasferimenti di azienda anteriori all'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_221","numText":"Art. 221","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'imprenditore deve, entro il 30 giugno 1945, uniformare alla disposizione dell'art. 2563 del codice la ditta costituita anteriormente all'entrata in vigore del codice stesso. (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_222","numText":"Art. 222","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 2596 del codice non si applica ai patti limitativi della concorrenza conclusi anteriormente al 27 febbraio 1942.</p>\n<p>Tuttavia i patti limitativi della concorrenza, conclusi prima del 27 febbraio 1942 per tempo indeterminato, o che alla data di entrata in vigore del codice devono ancora durare per oltre cinque anni, hanno efficacia entro i limiti di un quinquennio da quest'ultima data.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I contratti di consorzio previsti dal capo II del titolo X del libro V del codice, stipulati anteriormente all'entrata in vigore del codice stesso, sono soggetti alle nuove disposizioni a partire dal 1° luglio 1945.</p>\n<p>Entro il 30 giugno 1945 tali contratti devono essere uniformati alle disposizioni stesse: le relative deliberazioni sono prese con il voto favorevole della maggioranza dei consorziati e possono essere impugnate davanti all'autorita' giudiziaria dai consorziati assenti o dissenzienti entro trenta giorni dalla data della deliberazione. In mancanza il consorzio e' sciolto. \n (1) (2) (3) (4) <sup class=\"amd\">5</sup></p>","notesHtml":"<p>AGGIORNAMENTO (1)</p>\n<p>Il D.Lgs. Luogotenenziale 4 gennaio 1945, n. 11 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, 2° comma, 206, 209 capoverso, 213, 215, 2° comma, 216, 217, 2° comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con R. decreto 20 marzo 1942, n. 318, sono prorogati rispettivamente al 30 giugno ed al 1° luglio dell'anno successivo a quello in cui sara' dichiarata la cessazione del presente stato di guerra&quot;.</p>\n<p>AGGIORNAMENTO (2)</p>\n<p>Il D.Lgs. del Capo Provvisorio dello Stato 29 marzo 1947, n. 361 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1° luglio 1945, relativi agli adempimenti prescritti dagli articoli 204 secondo comma, 206, 209 capoverso, 213, 215 secondo comma, 216, 217 secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati rispettivamente al 30 giugno e al 1° luglio dell'anno successivo alla dichiarazione della cessazione dello stato di guerra, sono ulteriormente prorogati rispettivamente al 30 giugno 1948 e al 1° luglio 1948&quot;.</p>\n<p>AGGIORNAMENTO (3)</p>\n<p>Il D.Lgs. 25 marzo 1948, n. 484 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11 e 29 marzo 1947, n. 361, sono ulteriormente prorogati rispettivamente al 30 giugno 1949 e al 10 luglio 1949&quot;.</p>\n<p>AGGIORNAMENTO (4)</p>\n<p>La L. 19 dicembre 1949, n. 1051 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945 relativi agli adempimenti prescritti dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361 e 25 marzo 1948, n. 484, sono ulteriormente prorogati rispettivamente al 30 giugno 1950 e al 1 luglio 1950&quot;.</p>\n<p>AGGIORNAMENTO (5)</p>\n<p>La L. 18 ottobre 1950, n. 920 ha disposto (con l'art. 1, comma 1) che &quot;I termini del 30 giugno 1945 e del 1 luglio 1945, relativi agli adempimenti prescritti in materia di societa' e di consorzi dagli articoli 204, secondo comma, 206, 209, capoverso, 213, 215, secondo comma, 216, 217, secondo comma, 221 e 223 delle disposizioni per l'attuazione del Codice civile e transitorie, approvate con regio decreto 30 marzo 1942, n. 318, gia' prorogati con i decreti legislativi 4 gennaio 1945, n. 11, 29 marzo 1947, n. 361, 25 marzo 1948, n. 484 e con la legge 19 dicembre 1949, n. 1051, sono ulteriormente prorogati fino all'attuazione della revisione del Codice civile&quot;.</p>"},{"id":"art_223","numText":"Art. 223-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' di cui ai capi V, VI e VII del titolo V del libro V, del codice civile, iscritte nel registro delle imprese alla data del 1 gennaio 2004, devono uniformare l'atto costitutivo e lo statuto alle nuove disposizioni inderogabili entro il 30 settembre 2004.</p>\n<p>Le decisioni di trasformazione della societa' a responsabilita' limitata in societa' per azioni possono essere prese entro il 30 settembre 2004, anche in deroga a clausole statutarie, con il voto favorevole di una maggioranza che rappresenti piu' della meta' del capitale sociale.</p>\n<p>Le deliberazioni dell'assemblea straordinaria di mero adattamento dell'atto costitutivo e dello statuto a nuove disposizioni inderogabili possono essere assunte, entro il termine di cui al primo comma, a maggioranza semplice, qualunque sia la parte di capitale rappresentata in assemblea. Con la medesima maggioranza ed entro il medesimo termine possono essere assunte le deliberazioni dell'assemblea straordinaria aventi ad oggetto l'introduzione nello statuto di clausole che escludono l'applicazione di nuove disposizioni di legge, derogabili con specifica clausola statutaria; fino alla avvenuta adozione della modifica statutaria e comunque non oltre il 30 settembre 2004, per tali societa' resta in vigore la relativa disciplina statutaria e di legge vigente alla data del 31 dicembre 2003.</p>\n<p>Le modifiche statutarie necessarie per l'attribuzione all'organo amministrativo, al consiglio di sorveglianza o al consiglio di gestione della competenza all'adeguamento dello statuto alle disposizioni di cui all'articolo 2365, secondo comma, del codice sono deliberate dall'assemblea straordinaria con le modalita' e le maggioranze indicate nei commi precedenti.</p>\n<p>Fino alla data indicata al primo comma, le previgenti disposizioni dell'atto costitutivo e dello statuto conservano la loro efficacia anche se non sono conformi alle disposizioni inderogabili del presente decreto.</p>\n<p>Dalla data del 1 gennaio 2004 non possono essere iscritte nel registro delle imprese le societa' di cui ai capi V, VI e VII del titolo V del libro V del codice civile, anche se costituite anteriormente a detta data, che siano regolate da atto costitutivo e statuto non conformi al decreto medesimo. Si applica in tale caso l'articolo 2331, quarto comma, del codice.</p>\n<p>Le societa' costituite anteriormente al 1 gennaio 2004 possono, in sede di costituzione o di modificazione dello statuto, adottare clausole statutarie conformi ai decreti legislativi attuativi della legge 3 ottobre 2001, n. 366. Tali clausole avranno efficacia a decorrere dal momento, successivo alla data del 1 gennaio 2004, in cui saranno iscritte nel registro delle imprese con contestuale deposito dello statuto nella sua nuova versione.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' per azioni costituite prima del 1 gennaio 2004 con un capitale sociale inferiore a centoventimila euro possono conservare la forma della societa' per azioni per il tempo, stabilito antecedentemente alla data del 1° gennaio 2004, per la loro durata.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-quater","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Nel caso in cui la legge prevede che le autorizzazioni di cui agli articoli 2329, numero 3","contentHtml":"<p>, e 2436, secondo comma, del codice civile siano rilasciate successivamente alla stipulazione dell'atto costitutivo o, rispettivamente, alla deliberazione, i termini previsti dalle suddette disposizioni decorrono dal giorno in cui l'originale o la copia autentica del provvedimento di autorizzazione e' stato consegnato al notaio.</p>\n<p>L'autorita' competente al rilascio delle autorizzazioni di cui al primo comma e' altresi' legittimata, qualora l'iscrizione nel registro delle imprese sia avvenuta nonostante la loro mancanza o invalidita', a proporre istanza per la cancellazione della societa' medesima dal registro. Il tribunale provvede, sentita la societa', in camera di consiglio e nel caso di accoglimento dell'istanza si applica l'articolo 2332 del codice.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-quinquies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Tutti i termini previsti in disposizioni speciali con riferimento all'omologazione dell'atto costitutivo o di deliberazioni assembleari decorrono dalla data di iscrizione di tali atti nel registro delle imprese.","contentHtml":"","notesHtml":""},{"id":"art_223","numText":"Art. 223-sexies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 2377, 2378, 2379, 2379-bis, 2379-ter e 2434-bis del codice civile si applicano anche alle deliberazioni anteriori alla data del 1 gennaio 2004, salvo che l'azione sia stata gia' proposta. Tuttavia se i termini scadono entro il 31 marzo 2004, le azioni per l'annullamento o la dichiarazione di nullita' delle deliberazioni possono essere esercitate entro il 31 marzo 2004.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-septies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se non diversamente disposto, le norme del codice civile che fanno riferimento agli amministratori e ai sindaci trovano applicazione, in quanto compatibili, anche ai componenti del consiglio di gestione e del consiglio di sorveglianza, per le societa' che abbiano adottato il sistema dualistico, e ai componenti del consiglio di amministrazione e ai componenti del comitato per il controllo sulla gestione, per le societa' che abbiano adottato il sistema monistico.</p>\n<p>Ogni riferimento al collegio sindacale o ai sindaci presente nelle leggi speciali e' da intendersi effettuato anche al consiglio di sorveglianza e al comitato per il controllo sulla gestione o ai loro componenti, ove compatibile con le specificita' di tali organi.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-octies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La trasformazione prevista dall'articolo 2500-octies del codice civile e' consentita alle associazioni e fondazioni costituite prima del 1 gennaio 2004 soltanto quando non comporta distrazione, dalle originarie finalita', di fondi o valori creati con contributi di terzi o in virtu' di particolari regimi fiscali di agevolazione.\nNell'ipotesi di fondi creati in virtu' di particolari regimi fiscali di agevolazione, la trasformazione e' consentita nel caso in cui siano previamente versate le relative imposte.</p>\n<p>La trasformazione di cui al primo comma non e' consentita alle fondazioni bancarie.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-novies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I procedimenti previsti dall'articolo 2409 del codice, pendenti alla data del 1 gennaio 2004, proseguono secondo le norme anteriormente vigenti.</p>\n<p>Il tribunale ha il potere di dichiarare cessata la materia del contendere, qualora le modifiche introdotte comportino la sanatoria delle irregolarita' denunciate.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-decies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Gli articoli da 2415 a 2420 del codice civile si applicano anche alle obbligazioni emesse anteriormente al 1 gennaio 2004.","contentHtml":"","notesHtml":""},{"id":"art_223","numText":"Art. 223-undecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I bilanci relativi ad esercizi chiusi prima del 1 gennaio 2004 sono redatti secondo le leggi anteriormente vigenti.</p>\n<p>I bilanci relativi ad esercizi chiusi tra il 1 gennaio 2004 e il 30 settembre 2004 possono essere redatti secondo le leggi anteriormente vigenti o secondo le nuove disposizioni.</p>\n<p>I bilanci relativi ad esercizi chiusi dopo la data del 30 settembre 2004 sono redatti secondo le nuove disposizioni.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-duodecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' di cui al capo I del titolo VI del libro V del codice civile, iscritte nel registro delle imprese alla data del 1 gennaio 2004, devono uniformare l'atto costitutivo e lo statuto alle nuove disposizioni inderogabili entro il 31 marzo 2005.</p>\n<p>Le deliberazioni necessarie per l'adeguamento dell'atto costitutivo e dello statuto alle nuove disposizioni inderogabili possono essere adottate, in terza convocazione, a maggioranza semplice dei presenti.</p>\n<p>L'articolo 2365, secondo comma, del codice civile, nella parte relativa all'adeguamento dello statuto a disposizioni normative, trova applicazione anche per l'adeguamento alle norme introdotte con i decreti legislativi attuativi della legge n. 366 del 2001. Le modifiche statutarie necessarie per l'attribuzione all'organo amministrativo, al consiglio di sorveglianza o al consiglio di gestione della competenza all'adeguamento dello statuto alle disposizioni di cui al presente decreto sono deliberate dall'assemblea straordinaria con le modalita' e le maggioranze indicate nei commi precedenti.</p>\n<p>Fino alla data indicata al primo comma le previgenti disposizioni dell'atto costitutivo e dello statuto conservano la loro efficacia anche se non sono conformi alle disposizioni inderogabili del presente decreto.</p>\n<p>Dalla data del 1 gennaio 2004 non possono essere iscritte nel registro delle imprese le societa' di cui al capo I del titolo VI del libro V del codice, anche se costituite anteriormente a detta data, che siano regolate da atto costitutivo e statuto non conformi al decreto medesimo. Si applica in tale caso l'articolo 2331, quarto comma, del codice civile.</p>\n<p>Le disposizioni fiscali di carattere agevolativo previste dalle leggi speciali si applicano soltanto alle cooperative a mutualita' prevalente.</p>\n<p>Conservano le agevolazioni fiscali le societa' cooperative e i loro consorzi che, con le modalita' e le maggioranze previste per le deliberazioni assembleari dall'articolo 2538 del codice, adeguano i propri statuti alle disposizioni che disciplinano le societa' cooperative a mutualita' prevalente entro il 31 dicembre 2005.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-terdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Alle banche popolari e alle banche di credito cooperativo si applica l'articolo 223-duodecies; il termine per l'adeguamento degli statuti alle nuove disposizioni inderogabili del codice civile e' fissato al 30 giugno 2005. Entro lo stesso termine le banche cooperative provvedono all'iscrizione presso l'Albo delle societa' cooperative. \n Ai consorzi agrari continuano ad applicarsi le norme vigenti alla data di entrata in vigore della legge n. 366 del 2001.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-quaterdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nelle cooperative che hanno adottato e osservano le clausole previste dall'articolo 14 del decreto del Presidente della Repubblica 29 settembre 1973, n. 601, alla data del 1 gennaio 2004, la deliberazione di trasformazione deve devolvere il patrimonio in essere alla data di trasformazione, dedotti il capitale versato e rivalutato ed i dividendi non ancora distribuiti, eventualmente aumentato sino a concorrenza dell'ammontare minimo del capitale della nuova societa', ai fondi mutualistici per la promozione e lo sviluppo della cooperazione.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-quinquiesdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le cooperative che non hanno adottato le clausole previste dall'articolo 14 del decreto del Presidente della Repubblica 29 settembre 1973, n. 601, alla data del 1 gennaio 2004, possono deliberare la trasformazione in societa' lucrative con le maggioranze previste dall'articolo 2545-decies del codice senza che trovi applicazione la devoluzione del patrimonio ai fondi mutualistici.</p>\n<p>In deroga all'articolo 2545-quater del codice civile, le cooperative di cui al primo comma, qualora non accedano ai benefici fiscali, devono destinare al fondo di riserva legale il venti per cento degli utili netti annuali.</p>\n<p>L'obbligo di cui all'articolo 2545-undecies del codice si applica, salva la rinunzia ai benefici fiscali da parte della cooperativa, limitatamente alle riserve indivisibili accantonate ai sensi dell'articolo 2545-ter, primo comma, del codice dal 1 gennaio 2004.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-sexiesdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Entro il 30 giugno 2004, il Ministro delle attivita' produttive predispone un Albo delle societa' cooperative tenuto a cura del Ministero delle attivita' produttive, ove si iscrivono le cooperative a mutualita' prevalente, e a tal fine consente di comunicare annualmente attraverso strumenti di comunicazione informatica le notizie di bilancio, anche ai fini della dimostrazione del possesso del requisito di cui all'articolo 2513 del codice, all'amministrazione presso la quale e' tenuto l'albo. L'omessa comunicazione comporta l'applicazione della sanzione amministrativa della sospensione semestrale di ogni attivita' dell'ente, intesa come divieto di assumere nuove eventuali obbligazioni contrattuali. In una diversa sezione del medesimo Albo sono tenute ad iscriversi anche le cooperative diverse da quelle a mutualita' prevalente.</p>\n<p>Il Ministro delle attivita' produttive, di concerto con il Ministro dell'economia e delle finanze, adegua ogni tre anni, con proprio decreto le previsioni di cui all'articoli 2519 e 2525 del codice tenuto conto delle variazioni dell'indice nazionale generale annuo dei prezzi al consumo delle famiglie di operai e impiegati, calcolate dall'Istat.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-septiesdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Fermo restando quanto previsto degli articoli 2545-septiesdecies e 2545-octiesdecies del codice, gli enti cooperativi che non hanno depositato i bilanci di esercizio da oltre cinque anni, qualora non risulti l'esistenza di valori patrimoniali immobiliari, sono sciolti senza nomina del liquidatore con provvedimento dell'autorita' di vigilanza da iscriversi nel registro delle imprese. Entro il termine perentorio di trenta giorni dalla pubblicazione nella Gazzetta Ufficiale i creditori o gli altri interessati possono presentare formale e motivata domanda all'autorita' governativa, intesa ad ottenere la nomina del commissario liquidatore; in mancanza, a seguito di comunicazione dell'autorita' di vigilanza, il conservatore del registro delle imprese territorialmente competente provvede alla cancellazione della societa' cooperativa o dell'ente mutualistico dal registro medesimo.</p>\n<p>Ai fini dello scioglimento e della cancellazione ai sensi del primo comma, l'ente di cui all'articolo 7 della legge 29 dicembre 1993, n. 580, trasmette all'autorita' di vigilanza, alla chiusura di ogni semestre solare, l'elenco degli enti cooperativi, anche in liquidazione ordinaria, che non hanno depositato i bilanci di esercizio da oltre cinque anni. L'autorita' di vigilanza verifica l'assenza di valori patrimoniali immobiliari mediante apposita indagine massiva nei pubblici registri, in attuazione delle convenzioni che devono essere all'uopo stipulate con le competenti autorita' detentrici dei registri predetti.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-octiesdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I bilanci relativi ad esercizi chiusi prima del 1 gennaio 2004 sono redatti secondo le leggi anteriormente vigenti.</p>\n<p>I bilanci relativi ad esercizi chiusi tra la data del 1 gennaio 2004 e quella del 31 dicembre 2004 possono essere redatti secondo le leggi anteriormente vigenti o secondo le nuove disposizioni.</p>\n<p>I bilanci relativi ad esercizi chiusi dopo la data del 31 dicembre 2004 sono redatti secondo le nuove disposizioni.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-noviesdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Le societa' cooperative poste in liquidazione prima del 1 gennaio 2004 sono liquidate secondo le leggi anteriori. \n \n Le societa' cooperative poste in liquidazione dopo il 1 gennaio 2004 sono liquidate secondo le nuove disposizioni.","contentHtml":"","notesHtml":""},{"id":"art_223","numText":"Art. 223-vicies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"I procedimenti riguardanti societa' cooperative previsti dall'articolo 2409 del codice, pendenti al 1 gennaio 2004, proseguono secondo le norme anteriormente vigenti.","contentHtml":"","notesHtml":""},{"id":"art_223","numText":"Art. 223-vicies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>semel.</p>\n<p>Il limite di cinque anni previsto dall'articolo 2341-bis si applica ai patti parasociali stipulati prima del 1 gennaio 2004 e decorre dalla medesima data.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-vicies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>bis.</p>\n<p>Qualora la fattispecie di cui al primo comma dell'articolo 2362 del codice sia precedente al 1 gennaio 2004, il termine ivi previsto decorre dalla sua data di entrata in vigore.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223-vicies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>ter.</p>\n<p>Non si applica la lettera e) del primo comma dell'articolo 2437 del codice alla eliminazione delle cause di recesso, previste nel secondo comma del medesimo articolo, purche' deliberata entro il 30 giugno 2004.</p>","notesHtml":""},{"id":"art_224","numText":"Art. 224","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Salvo quanto e' disposto dagli articoli seguenti, la trascrizione di un atto, eseguita in conformita' delle leggi anteriori a effetti diversi da quelli stabiliti dal codice, produce gli effetti previsti dal codice stesso, a decorrere dal giorno dell'entrata in vigore di questo.</p>","notesHtml":""},{"id":"art_225","numText":"Art. 225","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice che regolano gli effetti dell'omissione della trascrizione o dell'annotazione non si applicano agli atti anteriori all'entrata in vigore del codice stesso, per i quali la trascrizione non era richiesta secondo le leggi precedenti o era richiesta a effetti diversi.</p>","notesHtml":""},{"id":"art_226","numText":"Art. 226","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La trascrizione delle domande giudiziali prevista dagli articoli 2652 e 2653 del codice, anche se eseguita prima dell'entrata in vigore di questo, non pregiudica in nessun caso i diritti acquistati dai terzi prima di tale entrata in vigore, se essi erano fatti salvi dalle leggi anteriori.</p>","notesHtml":""},{"id":"art_227","numText":"Art. 227","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice, secondo le quali la trascrizione di una domanda giudiziale eseguita oltre un certo termine non pregiudica i diritti acquistati dai terzi, non si applicano ai diritti che sono stati acquistati anteriormente all'entrata in vigore del codice stesso e che non erano fatti salvi dalle leggi anteriori, a meno che i diritti medesimi siano resi pubblici prima della trascrizione della domanda e il termine stabilito dal codice per la loro salvezza sia decorso dal giorno dell'entrata in vigore di questo.</p>","notesHtml":""},{"id":"art_228","numText":"Art. 228","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La trascrizione del testamento o del certificato di denunciata successione, eseguita a norma delle leggi anteriori, produce dal giorno dell'entrata in vigore del codice gli stessi effetti che questo attribuisce alla trascrizione dell'accettazione dell'eredita'.</p>","notesHtml":""},{"id":"art_229","numText":"Art. 229","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 2650 e 2834 del codice relative all'ipoteca legale a favore del condividente non si applicano alle divisioni stipulate prima dell'entrata in vigore del codice stesso, ancorche' trascritte successivamente.</p>","notesHtml":""},{"id":"art_230","numText":"Art. 230","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Salvo quanto e' disposto dai successivi articoli 231 e 232, le norme del R. decreto 28 marzo 1929 n. 499, e della legge sui libri fondiari nel testo allegato al decreto medesimo, fino a che non sara' provveduto al loro coordinamento con le disposizioni del codice, continuano ad avere vigore nei territori delle nuove province, e in luogo delle disposizioni del codice del 1865 s'intendono richiamate le corrispondenti disposizioni del nuovo codice.</p>","notesHtml":""},{"id":"art_231","numText":"Art. 231","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Formano oggetto di annotazione, secondo le disposizioni della legge sui libri fondiari, anche:</p>\n<p>1) gli atti menzionati dai nn. 10, 11 e 12 dell'art. 2643 del codice agli effetti previsti dall'art. 19 della legge sui libri fondiari;</p>\n<p>2) gli atti di costituzione del patrimonio familiare agli effetti previsti dalle disposizioni del codice;</p>\n<p>3) la cessione dei beni ai creditori agli effetti previsti dalle disposizioni del codice stesso;</p>\n<p>4) le domande e gli atti indicati dagli articoli 2652 e 2653 del codice agli effetti disposti dagli articoli medesimi, in quanto non siano incompatibili con gli effetti stabiliti dalla legge sui libri fondiari.</p>","notesHtml":""},{"id":"art_232","numText":"Art. 232","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'annotazione del vincolo dotale e della comunione dei beni tra coniugi prevista dall'art. 19, lett. c), della legge sui libri fondiari o l'omissione dell'annotazione medesima produce dal giorno dell'entrata in vigore del codice gli effetti da questo stabiliti.</p>","notesHtml":""},{"id":"art_232","numText":"Art. 232-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>A decorrere dal 25 novembre 1973, la responsabilita' per danni del conservatore dei registri immobiliari e' regolata dalle norme relative agli impiegati civili dello Stato, salvo che per i rapporti definiti con sentenza passata in giudicato, con transazione, o comunque esauriti.</p>","notesHtml":""},{"id":"art_233","numText":"Art. 233","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice relative alle prove si applicano anche nei giudizi pendenti, se non e stata pronunziata sentenza definitiva, ancorche' di primo grado.</p>\n<p>La prova testimoniale per gli atti seguiti anteriormente all'entrata in vigore del codice rimane tuttavia ammissibile anche nei casi in cui non e' da questo consentita, se essa poteva essere ammessa a norma del codice civile del 1865 o del codice di commercio del 1882.</p>","notesHtml":""},{"id":"art_234","numText":"Art. 234","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni d
