el codice relative ai diritti dei creditori privilegiati, all'ordine dei privilegi e all'efficacia di questi rispetto al pegno, alle ipoteche e agli altri diritti reali si osservano anche per i privilegi sorti anteriormente all'entrata in vigore del codice stesso, se sono fatti valere posteriormente.</p>","notesHtml":""},{"id":"art_235","numText":"Art. 235","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 2767 del codice si applica anche ai crediti per risarcimento sorti prima dell'entrata in vigore del codice stesso, se l'indennita' dovuta dall'assicuratore non e' stata ancora corrisposta.</p>","notesHtml":""},{"id":"art_236","numText":"Art. 236","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando un credito al quale le leggi speciali attribuiscono il privilegio del creditore pignoratizio viene in concorso con i crediti indicati dall'art. 2778 del codice, esso e' preferito a quelli di cui ai nn. 12 e seguenti dello stesso articolo e posposto agli altri.</p>","notesHtml":""},{"id":"art_237","numText":"Art. 237","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se il pegno e' stato costituito anteriormente all'entrata in vigore del codice, le condizioni per l'efficacia della prelazione sono determinate dalle leggi anteriori.</p>\n<p>Si osservano invece le disposizioni del codice per cio' che concerne i poteri e gli obblighi del creditore pignoratizio.</p>\n<p>Continua tuttavia ad applicarsi la disposizione del secondo comma dell'art. 1888 del codice del 1865, se il secondo credito e' divenuto esigibile anteriormente all'entrata in vigore del nuovo codice.</p>","notesHtml":""},{"id":"art_238","numText":"Art. 238","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'opponibilita' ai creditori ipotecari dei diritti costituiti sulla cosa ipotecata e delle cessioni o liberazioni di pigioni o di fitti e' regolata dalle disposizioni del codice, quantunque si tratti di diritti sorti o di cessioni o liberazioni effettuate anteriormente all'entrata in vigore del codice stesso, sempre che il pignoramento sia eseguito posteriormente.</p>","notesHtml":""},{"id":"art_239","numText":"Art. 239","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 2825 del codice si applicano anche alle ipoteche costituite e alle cessioni effettuate anteriormente all'entrata in vigore del codice stesso, se la divisione ha luogo posteriormente.</p>","notesHtml":""},{"id":"art_240","numText":"Art. 240","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le ipoteche iscritte prima dell'entrata in vigore del codice conservano la loro efficacia per venti anni dall'entrata in vigore del codice stesso, a meno che per la cessazione di tale efficacia, secondo le disposizioni del codice del 1865, rimanga a decorrere un termine piu' breve.</p>","notesHtml":""},{"id":"art_241","numText":"Art. 241","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'ultimo comma dell'art. 2855 del codice non si applica alle ipoteche iscritte prima dell'entrata in vigore del codice stesso. L'estensione degli effetti dell'iscrizione continua a essere regolata dalle leggi anteriori.</p>","notesHtml":""},{"id":"art_242","numText":"Art. 242","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice, secondo le quali l'esercizio di determinate facolta' del terzo acquirente dell'immobile ipotecato e' subordinato alla trascrizione del titolo, non si applicano a coloro il cui acquisto e anteriore all'entrata in vigore del codice stesso, se a norma del codice del 1865 la trascrizione non era a quell'effetto richiesta.</p>","notesHtml":""},{"id":"art_243","numText":"Art. 243","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 2872, secondo comma, e 2873, secondo e terzo comma, del codice si applicano anche alle ipoteche iscritte anteriormente all'entrata in vigore del codice stesso.</p>","notesHtml":""},{"id":"art_244","numText":"Art. 244","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se il processo di liberazione dei beni dalle ipoteche e' in corso all'entrata in vigore del codice esso prosegue secondo le norme delle leggi anteriori, ma, per quanto concerne l'espropriazione, si osservano le disposizioni dell'art. 222 delle norme di attuazione e transitorie relative al codice di procedura civile, approvate con R. decreto 18 dicembre 1941 n. 1368.</p>","notesHtml":""},{"id":"art_245","numText":"Art. 245","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli effetti del sequestro conservativo e del pignoramento eseguiti anteriormente all'entrata in vigore del nuovo codice sono determinati dalle disposizioni del codice del 1865.</p>","notesHtml":""},{"id":"art_246","numText":"Art. 246","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 2932 del codice si applicano anche se l'obbligo di concludere il contratto e' sorto anteriormente all'entrata in vigore del codice stesso, purche' l'inadempimento si verifichi posteriormente.</p>","notesHtml":""},{"id":"art_247","numText":"Art. 247","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Cessano di avere effetto dalla data dell'entrata in vigore del codice le cause di sospensione della prescrizione che non sono da questo ammesse.</p>","notesHtml":""},{"id":"art_248","numText":"Art. 248","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Rimangono immutate le disposizioni vigenti circa il termine della prescrizione nei riguardi dei buoni del tesoro ordinari e pluriennali, dei titoli del debito pubblico, delle cartelle della sezione autonoma del credito comunale e provinciale, dei libretti postali di risparmio, dei buoni postali fruttiferi e di quelli della cassa depositi e prestiti.</p>\n<p>Rimangono parimenti immutate le disposizioni delle leggi speciali che stabiliscono termini di prescrizione diversi da quello ordinario.</p>","notesHtml":""},{"id":"art_249","numText":"Art. 249","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nulla e' innovato a quanto dispone la legge 2 luglio 1890, n. 6917, sullo stato delle persone della Famiglia Reale.</p>","notesHtml":""},{"id":"art_250","numText":"Art. 250","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nelle leggi speciali possono essere stabilite discriminazioni tra gli appartenenti a razze diverse da quella ariana ai fini di escludere in tutto o in parte le limitazioni poste nel codice per le persone di razza non ariana.</p>","notesHtml":""},{"id":"art_251","numText":"Art. 251","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando nel codice o in queste disposizioni si fa riferimento a istituti di credito, in detta espressione s'intendono comprese, oltre l'istituto d'emissione, le imprese autorizzate e controllate, a norma delle leggi vigenti, dall'ispettorato per la difesa del risparmio e per l'esercizio del credito.</p>\n<p>COMMA ABROGATO DAL D.P.R. 10 FEBBRAIO 1986, N. 30.</p>","notesHtml":""},{"id":"art_252","numText":"Art. 252","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando per l'esercizio di un diritto ovvero per la prescrizione o per l'usucapione il codice stabilisce un termine piu' breve di quello stabilito dalle leggi anteriori, il nuovo termine si applica anche all'esercizio dei diritti sorti anteriormente e alle prescrizioni e usucapioni in corso, ma il nuovo termine decorre dal 1° luglio 1939 se esso e' stabilito dal I libro del codice, dal 21 aprile 1940, se e' stabilito dal II libro, dal 28 ottobre 1941 se e' stabilito dal III libro e dall'entrata in vigore del codice stesso se e' stabilito dagli altri libri, purche', a norma della legge precedente, non rimanga a decorrere un termine minore.</p>\n<p>La stessa disposizione si applica in ogni altro caso in cui l'acquisto di un diritto e' subordinato al decorso di un termine piu' breve di quello stabilito dalle leggi anteriori.</p>","notesHtml":""},{"id":"art_253","numText":"Art. 253","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le trascrizioni e le annotazioni di vincolo previste dal codice e da queste disposizioni, quando si tratta di rendite del debito pubblico o di altri beni per i quali leggi speciali stabiliscano determinate forme di pubblicita', si eseguono con l'osservanza di dette leggi.</p>","notesHtml":""},{"id":"art_254","numText":"Art. 254","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I modelli dei registri delle persone giuridiche, delle legittimazioni, per decreto reale, delle adozioni, delle tutele e curatele, delle successioni e di quello previsto dal secondo comma dell'art. 1524 del codice sono determinati con decreto del Ministro di grazia e giustizia.</p>","notesHtml":""},{"id":"art_255","numText":"Art. 255","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per la tenuta del registro previsto dal secondo comma dell'art. 1524 del codice e per le formalita' della trascrizione, si osservano, in quanto applicabili, le disposizioni degli articoli 2658, primo comma, 2659, 2664 2673, 2677 e 2680, primo, secondo e quarto comma del codice stesso.</p>\n<p>Le trascrizioni devono essere eseguite giornalmente al momento della presentazione della nota e dell'atto da trascriversi.</p>\n<p>Il numero d'ordine della trascrizione e' quello progressivo del registro delle trascrizioni.</p>\n<p>Il cancelliere deve formare un fascicolo per ogni trascrizione secondo le disposizioni stabilite per i fascicoli di cancelleria dall'art. 36 del R. decreto 18 dicembre 1941, n. 1368.</p>","notesHtml":""},{"id":"art_256","numText":"Art. 256","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando nelle leggi e nei regolamenti sono richiamate le disposizioni del codice civile del 1865 e del codice di commercio del 1882 s'intendono richiamate le disposizioni corrispondenti del nuovo codice.</p>\n<p>Visto, d'ordine di Sua Maesta' il Re d'Italia e di Albania \n Imperatore d'Etiopia</p>\n<p>Il Ministro per la grazia e giustizia \n GRANDI</p>","notesHtml":""}]
};</script>
<script>
(function() {
  'use strict';
  // DATA is injected per page

  var currentIdx = 0;
  var filteredIndices = CODE.articles.map(function(_, i) { return i; });

  function init() {
    // Pre-compute plain text for full-text search
    CODE.articles.forEach(function(art) {
      art._searchText = (art.numText + ' ' + (art.heading || '') + ' ' +
        (art.contentHtml || '').replace(/<[^>]+>/g, '')).toLowerCase();
    });
    renderToc();

    // Navigate to hash article if present, otherwise show first article
    var initHash = location.hash.replace('#', '');
    var initIdx = 0;
    if (initHash) {
      var found = CODE.articles.findIndex(function(a) { return a.id === initHash || a.numText === decodeURIComponent(initHash); });
      if (found >= 0) initIdx = found;
    }
    showArticle(initIdx);
    populateJump();

    // Workaround WebView Android: dopo il primo render dinamico il gesture
    // detector non si attiva finché l'utente non tocca un elemento focusabile.
    // Forziamo un piccolo "tickle" scroll + resize per svegliarlo.
    setTimeout(function() {
      window.scrollTo(0, 1); window.scrollTo(0, 0);
      window.dispatchEvent(new Event('resize'));
    }, 50);
    setTimeout(function() { window.scrollTo(0, 1); window.scrollTo(0, 0); }, 400);

    document.getElementById('search').addEventListener('input', onSearch);
    document.getElementById('prev-btn').addEventListener('click', function() { navigate(-1); });
    document.getElementById('next-btn').addEventListener('click', function() { navigate(1); });
    document.getElementById('hamburger').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    });
    window.addEventListener('hashchange', onHashChange);
  }

  function onHashChange() {
    var hash = location.hash.replace('#', '');
    if (!hash) return;
    var idx = CODE.articles.findIndex(function(a) { return a.id === hash || a.numText === decodeURIComponent(hash); });
    if (idx >= 0) showArticle(idx);
  }

  function renderToc() {
    var nav = document.getElementById('toc');
    var html = '';
    var lastGroup = null;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        html += '<div class="group-label">' + esc(art.group) + '</div>';
        lastGroup = art.group;
      }
      html += '<div class="art-link" data-idx="' + i + '" onclick="goTo(' + i + ')">' +
        '<span class="art-num">' + esc(art.numText) + '</span>' +
        '<span class="art-heading-mini">' + esc(art.heading || '') + '</span>' +
        '</div>';
    });
    nav.innerHTML = html;
  }

  function populateJump() {
    var sel = document.getElementById('article-jump');
    if (!sel) return;
    var html = '';
    var lastGroup = null;
    var inGroup = false;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        if (inGroup) html += '</optgroup>';
        var gLabel = art.group.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        html += '<optgroup label="' + gLabel + '">';
        lastGroup = art.group;
        inGroup = true;
      }
      var label = art.numText + (art.heading ? ' — ' + art.heading : '');
      if (label.length > 90) label = label.slice(0, 87) + '…';
      var safe = label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      html += '<option value="' + i + '">' + safe + '</option>';
    });
    if (inGroup) html += '</optgroup>';
    sel.innerHTML = html;
    sel.addEventListener('change', function() {
      var idx = parseInt(this.value, 10);
      if (!isNaN(idx)) showArticle(idx);
    });
  }

  function showArticle(idx) {
    if (idx < 0 || idx >= CODE.articles.length) return;
    currentIdx = idx;
    var art = CODE.articles[idx];

    // Sync dropdown jump
    var jumpSel = document.getElementById('article-jump');
    if (jumpSel) jumpSel.value = String(idx);

    // Update URL hash
    history.replaceState(null, '', '#' + encodeURIComponent(art.numText));

    // Update header title
    document.getElementById('header-article').textContent = art.numText + (art.heading ? ' – ' + art.heading : '');

    // Render article
    var notesSection = art.notesHtml
      ? '<div class="article-notes">' +
        '<button class="notes-toggle" onclick="toggleNotes(this)">Aggiornamenti e note</button>' +
        '<div class="notes-body"><div class="article-body">' + art.notesHtml + '</div></div>' +
        '</div>'
      : '';

    document.getElementById('article-view').innerHTML =
      '<div class="article-card">' +
        '<div class="article-badge">📖 ' + esc(CODE.shortTitle) + '</div>' +
        '<h1 class="article-num">' + esc(art.numText) + '</h1>' +
        (art.heading ? '<p class="article-heading">' + esc(art.heading) + '</p>' : '<div style="margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)"></div>') +
        '<div class="article-body">' + art.contentHtml + '</div>' +
        notesSection +
        '<div class="article-actions">' +
          '<button class="action-btn wa-btn" onclick="shareWhatsApp()" title="Invia su WhatsApp">' +
            '<span class="action-icon">📲</span> WhatsApp' +
          '</button>' +
          '<button class="action-btn" onclick="copyArticle()" title="Copia articolo">' +
            '<span class="action-icon">📋</span> Copia' +
          '</button>' +
        '</div>' +
      '</div>';

    // Update counter
    document.getElementById('article-counter').textContent = (idx + 1) + ' / ' + CODE.articles.length;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === CODE.articles.length - 1;

    // Highlight active in TOC
    document.querySelectorAll('.art-link').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.querySelector('.art-link[data-idx="' + idx + '"]');
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // Scroll main to top
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
  }

  window.goTo = function(idx) { showArticle(idx); closeSidebar(); };

  function navigate(dir) {
    var pos = filteredIndices.indexOf(currentIdx);
    if (pos === -1) pos = 0;
    var newPos = pos + dir;
    if (newPos >= 0 && newPos < filteredIndices.length) {
      showArticle(filteredIndices[newPos]);
    }
  }

  function onSearch(e) {
    var q = e.target.value.toLowerCase().trim();
    filteredIndices = [];
    document.querySelectorAll('.art-link').forEach(function(el) {
      var idx = parseInt(el.dataset.idx, 10);
      var art = CODE.articles[idx];
      var hidden = q && !art._searchText.includes(q);
      el.classList.toggle('hidden', hidden);
      if (!hidden) filteredIndices.push(idx);
    });
    if (!q) filteredIndices = CODE.articles.map(function(_, i) { return i; });
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
  window.toggleNotes = function(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  };

  function getArticleText(art, bold) {
    var body = (art.contentHtml || '').replace(/<\/p>\s*<p>/gi, '\n').replace(/<[^>]+>/g, '').replace(/[ \t]+/g, ' ').trim();
    var heading = art.numText;
    if (art.heading) heading += ' – ' + art.heading;
    if (bold) heading = '*' + heading + '*';
    return CODE.title + '\n' + heading + '\n' + body;
  }

  window.shareWhatsApp = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, true);
    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  };

  window.copyArticle = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, false);
    navigator.clipboard.writeText(text).then(function() {
      showToast('Articolo copiato negli appunti');
    }, function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Articolo copiato negli appunti');
    });
  };

  function showToast(msg) {
    var el = document.getElementById('copy-toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(function() { el.classList.remove('visible'); }, 2000);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
