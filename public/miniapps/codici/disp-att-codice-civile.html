lersi del diritto di cui all'articolo 1006 del codice ovvero si tratti di lavori od opere ai sensi degli articoli 985 e 986 del codice. In tutti questi casi l'avviso di convocazione deve essere comunicato sia all'usufruttuario sia al nudo proprietario.</p>\n<p>Il nudo proprietario e l'usufruttuario rispondono solidalmente per il pagamento dei contributi dovuti all'amministrazione condominiale.</p>","notesHtml":""},{"id":"art_68","numText":"Art. 68","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ove non precisato dal titolo ai sensi dell'articolo 1118, per gli effetti indicati dagli articoli 1123, 1124, 1126 e 1136 del codice, il valore proporzionale di ciascuna unita' immobiliare e' espresso in millesimi in apposita tabella allegata al regolamento di condominio.</p>\n<p>Nell'accertamento dei valori di cui al primo comma non si tiene conto del canone locatizio, dei miglioramenti e dello stato di manutenzione di ciascuna unita' immobiliare.</p>","notesHtml":""},{"id":"art_69","numText":"Art. 69","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I valori proporzionali delle singole unita' immobiliari espressi nella tabella millesimale di cui all'articolo 68 possono essere rettificati o modificati all'unanimita'. Tali valori possono essere rettificati o modificati, anche nell'interesse di un solo condomino, con la maggioranza prevista dall'articolo 1136, secondo comma, del codice, nei seguenti casi: \n 1) quando risulta che sono conseguenza di un errore; \n 2) quando, per le mutate condizioni di una parte dell'edificio, in conseguenza di sopraelevazione, di incremento di superfici o di incremento o diminuzione delle unita' immobiliari, e' alterato per piu' di un quinto il valore proporzionale dell'unita' immobiliare anche di un solo condomino. In tal caso il relativo costo e' sostenuto da chi ha dato luogo alla variazione.</p>\n<p>Ai soli fini della revisione dei valori proporzionali espressi nella tabella millesimale allegata al regolamento di condominio ai sensi dell'articolo 68, puo' essere convenuto in giudizio unicamente il condominio in persona dell'amministratore. Questi e' tenuto a darne senza indugio notizia all'assemblea dei condomini.\nL'amministratore che non adempie a quest'obbligo puo' essere revocato ed e' tenuto al risarcimento degli eventuali danni.</p>\n<p>Le norme di cui al presente articolo si applicano per la rettifica o la revisione delle tabelle per la ripartizione delle spese redatte in applicazione dei criteri legali o convenzionali.</p>","notesHtml":""},{"id":"art_70","numText":"Art. 70","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per le infrazioni al regolamento di condominio puo' essere stabilito, a titolo di sanzione, il pagamento di una somma fino ad euro 200 e, in caso di recidiva, fino ad euro 800. La somma e' devoluta al fondo di cui l'amministratore dispone per le spese ordinarie L'irrogazione della sanzione e' deliberata dall'assemblea con le maggioranze di cui al secondo comma dell'articolo 1136 del Codice.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il registro indicato dal quarto comma dell'art. 1129 e dal terzo comma dell'art. 1138 del codice e' tenuto presso l'associazione professionale dei proprietari di fabbricati.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Possono svolgere l'incarico di amministratore di condominio coloro: \n a","contentHtml":"<p>che hanno il godimento dei diritti civili; \n b) che non sono stati condannati per delitti contro la pubblica amministrazione, l'amministrazione della giustizia, la fede pubblica, il patrimonio o per ogni altro delitto non colposo per il quale la legge commina la pena della reclusione non inferiore, nel minimo, a due anni e, nel massimo, a cinque anni; \n c) che non sono stati sottoposti a misure di prevenzione divenute definitive, salvo che non sia intervenuta la riabilitazione; \n d) che non sono interdetti o inabilitati; \n e) il cui nome non risulta annotato nell'elenco dei protesti cambiari; \n f) che hanno conseguito il diploma di scuola secondaria di secondo grado; \n g) che hanno frequentato un corso di formazione iniziale e svolgono attivita' di formazione periodica in materia di amministrazione condominiale.</p>\n<p>I requisiti di cui alle lettere f) e g) del primo comma non sono necessari qualora l'amministratore sia nominato tra i condomini dello stabile.</p>\n<p>Possono svolgere l'incarico di amministratore di condominio anche societa' di cui al titolo V del libro V del codice. In tal caso, i requisiti devono essere posseduti dai soci illimitatamente responsabili, dagli amministratori e dai dipendenti incaricati di svolgere le funzioni di amministrazione dei condominii a favore dei quali la societa' presta i servizi.</p>\n<p>La perdita dei requisiti di cui alle lettere a), b), c), d) ed e) del primo comma comporta la cessazione dall'incarico. In tale evenienza ciascun condomino puo' convocare senza formalita' l'assemblea per la nomina del nuovo amministratore.</p>\n<p>A quanti hanno svolto attivita' di amministrazione di condominio per almeno un anno, nell'arco dei tre anni precedenti alla data di entrata in vigore della presente disposizione, e' consentito lo svolgimento dell'attivita' di amministratore anche in mancanza dei requisiti di cui alle lettere f) e g) del primo comma. Resta salvo l'obbligo di formazione periodica.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Su richiesta dell'assemblea, che delibera con la maggioranza di cui al secondo comma dell'articolo 1136 del codice, l'amministratore e' tenuto ad attivare un sito internet del condominio che consenta agli aventi diritto di consultare ed estrarre copia in formato digitale dei documenti previsti dalla delibera assembleare. Le spese per l'attivazione e la gestione del sito internet sono poste a carico dei condomini.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71-quater","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per controversie in materia di condominio, ai sensi dell'articolo 5, comma 1, del decreto legislativo 4 marzo 2010, n. 28, si intendono quelle derivanti dalla violazione o dall'errata applicazione delle disposizioni del libro III, titolo VII, capo II, del codice e degli articoli da 61 a 72 delle presenti disposizioni per l'attuazione del codice.</p>\n<p>COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197. <sup class=\"amd\">52</sup></p>\n<p>Al procedimento e' legittimato a partecipare l'amministratore secondo quanto previsto dall'articolo 5-ter del decreto legislativo 4 marzo 2010, n. 28. (50)(51)(52)</p>\n<p>COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197. <sup class=\"amd\">52</sup>\n COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197. <sup class=\"amd\">52</sup>\n COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197. <sup class=\"amd\">52</sup></p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (52)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dal D.L. 24 febbraio 2023, n. 13, ha disposto (con l'art. 41, comma 1) che le disposizioni dell'art. 2, comma 3 del medesimo D.Lgs. si applicano a decorrere dal 30 giugno 2023 e che l' efficacia dell'abrogazione dei commi 2, 4, 5 e 6 del presente articolo e' prorogata dal 28 febbraio 2023 al 30 giugno 2023.</p>"},{"id":"art_72","numText":"Art. 72","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I regolamenti di condominio non possono derogare alle disposizioni dei precedenti articoli 63, 66, 67 e 69.</p>","notesHtml":""},{"id":"art_73","numText":"Art. 73","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli atti di offerta reale e quelli di deposito previsti dagli articoli 1209, primo comma, 1212 e 1214 del codice, sono eseguiti da un notaio o da un ufficiale giudiziario.</p>\n<p>Le offerte per intimazione, previste dagli articoli 1209, secondo comma, e 1216, primo comma, sono eseguite con atto di ufficiale giudiziario.</p>","notesHtml":""},{"id":"art_73","numText":"Art. 73-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 13 LUGLIO 2017, N. 116","contentHtml":"<p><sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) la proroga al 31 ottobre 2025 dell'entrata in vigore della presente abrogazione.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) la proroga al 31 ottobre 2026 dell'entrata in vigore della presente abrogazione.</p>"},{"id":"art_74","numText":"Art. 74","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il processo verbale dell'offerta reale deve essere redatto in conformita' delle disposizioni dell'art. 126 del codice di procedura civile e deve in particolare contenere la specificazione dell'oggetto dell'offerta e le dichiarazioni del creditore.</p>\n<p>Quando l'offerta e' accettata, il pubblico ufficiale esegue il pagamento e riceve le dichiarazioni del creditore per quietanza e per liberazione dalle garanzie.</p>\n<p>Se il creditore non e' presente all'offerta, il processo verbale deve essergli notificato nelle forme prescritte per la citazione.</p>\n<p>L'intimazione prescritta dall'art. 1212 n. 1, del codice, puo' essere fatta con lo stesso atto di notificazione del verbale dell'offerta. In ogni caso tra l'intimazione e il deposito deve trascorrere un termine non minore di giorni tre.</p>","notesHtml":""},{"id":"art_75","numText":"Art. 75","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'atto di intimazione, nei casi previsti dagli articoli 1209, secondo comma, 1216, primo comma, del codice, deve contenere l'indicazione del giorno, dell'ora e del luogo in cui il debitore intende procedere alla consegna delle cose mobili o al rilascio dell'immobile a favore del creditore, con rispetto di un intervallo non minore di giorni tre.</p>\n<p>La mancata comparizione del creditore o il suo rifiuto di accettare l'offerta sono accertati con verbale redatto da un notaio o da un ufficiale giudiziario nel luogo, nel giorno e nell'ora indicati nell'atto di intimazione, con tutte le altre indicazioni prescritte dal primo comma dell'articolo precedente, e da tale giorno decorrono gli effetti della mora.</p>","notesHtml":""},{"id":"art_76","numText":"Art. 76","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I depositi che hanno per oggetto titoli di credito o somme di danaro debbono essere eseguiti presso la cassa dei depositi e prestiti secondo le norme della legge speciale oppure presso un istituto di credito.</p>","notesHtml":""},{"id":"art_77","numText":"Art. 77","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il deposito di cose mobili diverse dal danaro e di titoli di credito, nei casi previsti dagli articoli 1210, primo comma, e 1214 del codice e in ogni altro caso in cui esso sia prescritto dalla legge o dal giudice, ovvero sia voluto dalle parti, si esegue presso stabilimenti di pubblico deposito a norma delle leggi speciali.</p>\n<p>Qualora non esistano stabilimenti di pubblico deposito nel luogo in cui deve essere eseguita la prestazione, o se ricorrono particolari ragioni, il giudice di pace del luogo predetto, su ricorso della parte interessata, puo' autorizzare con decreto il deposito presso altro locale idoneo. <sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 2 del presente articolo entra in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 1 del presente articolo entra in vigore il 31 ottobre 2026.</p>"},{"id":"art_78","numText":"Art. 78","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il pubblico ufficiale, che a norma dell'art. 1210 del codice procede al deposito di danaro, di titoli di credito o di altre cose mobili, deve redigere processo verbale della relativa operazione in conformita' del successivo art. 1212, n. 3, e dell'art. 126 del codice di procedura civile, e consegnarne copia al depositario, nonche' al creditore comparso, se la richiede.</p>\n<p>Se il creditore non e' stato presente, deve essergli notificata copia del processo verbale nelle forme prescritte per gli atti di citazione.</p>","notesHtml":""},{"id":"art_79","numText":"Art. 79","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il sequestratario dell'immobile, nel caso previsto dal secondo comma dell'art. 1216 del codice, e' nominato, se non vi e' giudizio pendente, dal giudice di pace del luogo in cui si trova. <sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup>.</p>\n<p>Il giudice di pace provvede con decreto, sentito il creditore.\nContro tale decreto e' ammesso reclamo a norma dell'articolo 739 del codice di procedura civile. <sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>\n<p>La consegna dell'immobile al sequestratario deve risultare da processo verbale redatto da un notaio o da un ufficiale giudiziario.\nCopia del processo verbale deve essere notificata al creditore che non sia stato presente.</p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che le modifiche di cui ai commi 1 e 2 del presente articolo entrano in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che le modifiche di cui ai commi 1 e 2 del presente articolo entrano in vigore il 31 ottobre 2026.</p>"},{"id":"art_80","numText":"Art. 80","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'atto di intimazione previsto dall'art. 1217 del codice, se non e' determinato il tempo in cui la prestazione deve essere eseguita, e in ogni caso se la prestazione medesima deve effettuarsi in localita' diversa dal domicilio del creditore, deve contenere l'indicazione del giorno, dell'ora e del luogo in cui il debitore intende eseguire la prestazione, col rispetto di un intervallo di almeno tre giorni, a meno che la natura del rapporto non imponga un intervallo minore.</p>\n<p>Il mancato ricevimento della prestazione da parte del creditore nel giorno stabilito puo' essere accertato nelle forme di uso e da tale giorno decorrono gli effetti della mora.</p>","notesHtml":""},{"id":"art_81","numText":"Art. 81","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nei casi previsti dagli articoli 1286, terzo comma e 1287, terzo comma, del codice, l'istanza per la fissazione del termine entro il quale deve essere fatta la scelta e quella per la scelta della prestazione da parte del giudice si propongono, se non vi e' giudizio pendente, davanti l'autorita' giudiziaria del luogo in cui la prestazione deve eseguirsi, osservate le disposizioni previste rispettivamente dagli articoli 749 e 750 del codice di procedura civile.</p>","notesHtml":""},{"id":"art_82","numText":"Art. 82","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'istanza per la nomina del terzo nei casi previsti dal secondo comma dell'art. 1473 del codice, qualora non vi sia giudizio in corso, si propone con ricorso al presidente del tribunale del luogo in cui deve eseguirsi la consegna della cosa a norma dell'art. 1510 del codice.</p>\n<p>Il ricorso deve essere notificato alle altre parti interessate e al terzo. Il presidente del tribunale provvede con decreto; contro di questo e' ammesso reclamo al primo presidente della corte di appello entro dieci giorni dalla notificazione.</p>\n<p>La nomina deve cadere normalmente su persona esperta iscritta in albi o elenchi o ruoli istituiti a norma di legge.</p>","notesHtml":""},{"id":"art_83","numText":"Art. 83","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Sono autorizzati alle operazioni di vendita con o senza incanto a norma dell'art. 1515 del codice, o alle operazioni di compra a norma del successivo art. 1516:</p>\n<p>1) gli agenti di cambio, per i valori pubblici e per i titoli di credito specificati nelle leggi sulle borse;</p>\n<p>2) i mediatori in merci iscritti presso i consigli provinciali delle corporazioni, per le merci e le derrate.</p>\n<p>La vendita all'incanto deve essere annunziata con le forme di una pubblicita' commerciale adeguata alla natura ed al valore delle cose poste in vendita.</p>\n<p>Il verbale d'incanto e' depositato nella cancelleria della pretura del luogo in cui si e' proceduto alla vendita.</p>\n<p>Le operazioni di vendita senza incanto e quelle di compra devono essere documentate mediante certificato, fattura o fissato bollato, in doppio esemplare, uno dei quali e' consegnato alla parte richiedente e l'altro, vistato da questa, e' conservato dalla persona che ha eseguito l'incarico.</p>\n<p>Il compenso dovuto alla persona predetta, se non esiste una tariffa approvata, e' stabilito con decreto del pretore del luogo in cui l'incarico e' stato eseguito.</p>","notesHtml":""},{"id":"art_84","numText":"Art. 84","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il contratto di vendita con riserva di proprieta' di macchine per prezzo superiore a lire trentamila, deve essere iscritto, agli effetti previsti dal secondo comma dell'art. 1524 del codice, nel registro istituito presso la cancelleria del tribunale nella cui giurisdizione la macchina viene collocata.</p>\n<p>Le sottoscrizioni delle parti devono essere autenticate, se il confratto non risulta da atto pubblico.</p>","notesHtml":""},{"id":"art_85","numText":"Art. 85","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli organi corporativi, che a norma dell'art. 2089 del codice possono denunziare al pubblico ministero l'inosservanza degli obblighi imposti dall'ordinamento corporativo nell'interesse della produzione, sono la corporazione, l'ispettorato corporativo e il consiglio provinciale delle corporazioni.</p>\n<p>La denunzia deve essere trasmessa al pubblico ministero presso la corte d'appello della quale fa parte la magistratura del lavoro, che ha giurisdizione sul territorio in cui si trova la sede principale dell'impresa. Il pubblico ministero, prima di promuovere i provvedimenti contro l'imprenditore, puo' compiere le indagini occorrenti.</p>\n<p>L'istanza del pubblico ministero corredata dei documenti e' depositata nella cancelleria della magistratura del lavoro.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il presidente della magistratura del lavoro fissa, con decreto in calce all'istanza, l'udienza collegiale per la comparizione dell'imprenditore, assegnandogli un termine entro il quale egli deve depositare nella cancelleria le proprie deduzioni insieme coi documenti che intende produrre a sua difesa.</p>\n<p>Il termine di comparizione non puo' essere inferiore a dieci giorni.</p>\n<p>Copia dell'istanza col decreto presidenziale e' notificata a cura del cancelliere all'imprenditore. Copia del decreto e copia delle deduzioni dell'imprenditore sono comunicate al pubblico ministero.</p>","notesHtml":""},{"id":"art_87","numText":"Art. 87","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per i provvedimenti previsti nell'art. 2091 del codice la magistratura del lavoro e' costituita a norma dell'art. 14 della legge 3 aprile 1926, n. 563.</p>","notesHtml":""},{"id":"art_88","numText":"Art. 88","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'imprenditore deve comparire personalmente. In caso di legittimo impedimento puo' essere autorizzato dal presidente della magistratura del lavoro a farsi rappresentare da un mandatario speciale. Il mandato puo' essere scritto in calce alla copia del decreto notificata all'imprenditore.</p>","notesHtml":""},{"id":"art_89","numText":"Art. 89","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La magistratura del lavoro, se accerta che l'inosservanza non sussisteva o e' cessata, dichiara che non vi e' luogo a procedere. Se risulta che l'inosservanza perdura, stabilisce il termine entro il quale l'imprenditore deve uniformarsi agli obblighi impostigli dall'ordinamento corporativo.</p>","notesHtml":""},{"id":"art_90","numText":"Art. 90","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se l'imprenditore non ha ottemperato agli obblighi impostigli nel termine fissato a norma dell'articolo precedente, il pubblico ministero richiede alla magistratura del lavoro i provvedimenti previsti nel secondo e terzo comma dell'art. 2091 del codice.</p>\n<p>La procedura e' regolata dagli articoli 85, terzo comma, 86, 87 e 88 di queste disposizioni.</p>","notesHtml":""},{"id":"art_91","numText":"Art. 91","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I provvedimenti previsti dai precedenti articoli 89 e 90 sono dati con sentenza.</p>\n<p>La sentenza e' notificata all'imprenditore nelle forme prescritte per l'istanza e comunicata al pubblico ministero.</p>\n<p>Il dispositivo della sentenza che nomina un amministratore deve essere pubblicato, entro cinque giorni, a cura del cancelliere e a spese dell'imprenditore, nel foglio degli annunzi legali della provincia. La sentenza puo' stabilire altre forme di pubblicita'.</p>\n<p>Se la sentenza riguarda un'impresa commerciale o una societa' soggetta a registrazione, il dispositivo deve essere inoltre comunicato entro cinque giorni, a cura del cancelliere, all'ufficio del registro delle imprese per l'iscrizione. Fino all'attuazione del registro delle imprese l'iscrizione deve essere eseguita nel registro delle societa' provvisoriamente mantenuto a norma dell'art. 100 di queste disposizioni.</p>","notesHtml":""},{"id":"art_92","numText":"Art. 92","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il decreto, previsto dall'articolo 2409 del codice, che nomina l'amministratore giudiziario nelle societa' di cui ai capi V, VI e VII del titolo V del libro V del codice priva l'imprenditore, dalla sua data, dell'amministrazione della societa' nei limiti dei poteri conferiti all'amministratore giudiziario.</p>\n<p>Salvo che il decreto disponga diversamente, l'amministratore giudiziario non puo' compiere atti eccedenti l'ordinaria amministrazione, senza l'autorizzazione del tribunale.</p>\n<p>Entro i limiti dei poteri conferitigli, l'amministratore sta in giudizio nelle controversie, anche pendenti, relative alla gestione della societa'.</p>\n<p>All'amministratore giudiziario possono essere attribuiti per determinati atti i poteri dell'assemblea. Le relative deliberazioni non sono efficaci senza l'approvazione del tribunale.</p>\n<p>Il compenso dell'amministratore giudiziario e' determinato dal tribunale.</p>","notesHtml":""},{"id":"art_93","numText":"Art. 93","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'amministratore giudiziario e', per quanto attiene all'esercizio delle sue funzioni, pubblico ufficiale.</p>","notesHtml":""},{"id":"art_94","numText":"Art. 94","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'amministratore giudiziario deve adempiere ai doveri del proprio ufficio con la diligenza richiesta dalla natura del proprio ufficio e puo' essere revocato dal tribunale su richiesta dei soggetti legittimati a chiederne la nomina.</p>\n<p>L'amministratore che cessa dal suo ufficio deposita nella cancelleria del tribunale del luogo, ove e' la sede principale dell'impresa, il conto della gestione. L'avvenuto deposito e' comunicato immediatamente alla societa'.</p>\n<p>Il presidente del tribunale con decreto fissa l'udienza, in termine non inferiore a quindici giorni dal deposito, nella quale le parti possono presentare le loro osservazioni, e nomina un giudice per la procedura. Non sono ammes se contestazioni relative ai criteri tecnici della gestione nei limiti dei poteri conferiti all'amministratore.</p>\n<p>Si applicano le disposizioni degli articoli 263, secondo comma, e seguenti del codice di procedura civile.</p>","notesHtml":""},{"id":"art_95","numText":"Art. 95","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando le leggi o le norme corporative non dispongono, l'appartenenza alla categoria d'impiegato o di operaio e' determinata dal R. decreto-legge 13 novembre 1924 n. 1825, convertito nella legge 18 marzo 1926 n. 562.</p>","notesHtml":""},{"id":"art_96","numText":"Art. 96","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'imprenditore deve far conoscere al prestatore di lavoro, al momento dell'assunzione, la categoria e la qualifica che gli sono assegnate in relazione alle mansioni per cui e stato assunto.</p>\n<p>Le qualifiche dei prestatori di lavoro, nell'ambito di ciascuna delle categorie indicate nell'art. 2095 del codice, possono essere stabilite e raggruppate per gradi secondo la loro importanza nell'ordinamento dell'impresa. Il prestatore di lavoro assume il grado gerarchico corrispondente alla qualifica e alle mansioni.</p>\n<p>I contratti collettivi di lavoro possono stabilire che, nel caso di divergenza tra l'imprenditore e il prestatore di lavoro circa l'assegnazione della qualifica, l'accertamento dei fatti rilevanti per la determinazione della qualifica venga fatto da un collegio costituito da un funzionario dell'ispettorato corporativo che presiede, e da un delegato di ciascuna delle associazioni professionali che rappresentano le categorie interessate.</p>\n<p>Sui fatti rilevanti per la determinazione della qualifica che hanno formato oggetto dell'accertamento compiuto con tali forme, non sono ammesse nuove indagini o prove, salvo che l'accertamento sia viziato da errore manifesto.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nel caso previsto dall'art. 2106 del codice, ai prestatori di lavoro addetti alle imprese esercitate da enti pubblici inquadrati sindacalmente, le sanzioni disciplinari stabilite nei regolamenti emanati dagli enti medesimi si applicano solo in quanto compatibili con le particolari disposizioni dei contratti collettivi a cui gli enti sono soggetti.</p>","notesHtml":""},{"id":"art_98","numText":"Art. 98","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nei rapporti d'impiego inerenti all'esercizio dell'impresa, in mancanza di norme corporative o di usi piu' favorevoli, per quanto concerne il trattamento cui ha diritto l'impiegato nei casi d'infortunio, di malattia, di gravidanza o di puerperio, la durata del periodo feriale, del periodo di preavviso, la misura dell'indennita' sostitutiva di questo e l'ammontare dell'indennita' di anzianita' in caso di cessazione del rapporto, si applicano le corrispondenti norme del R. decreto-legge 13 novembre 1924, n. 1825, convertito nella legge 18 marzo 1926, n. 562.</p>\n<p>Le richiamate norme si applicano altresi' ai rapporti d'impiego dei dipendenti di enti pubblici anche se non inquadrati sindacalmente, in quanto il rapporto non sia diversamente disciplinato da leggi e regolamenti speciali, nonche' ai rapporti d'impiego non inerenti all'esercizio di un'impresa, in quanto non esistano convenzioni od usi piu' favorevoli al prestatore di lavoro.</p>","notesHtml":""},{"id":"art_99","numText":"Art. 99","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni relative all'istituzione del registro delle imprese previsto dall'art. 2188 del codice saranno emanate con decreto reale.\nTale decreto stabilira' altresi' la data di attuazione del registro delle imprese, nonche' le condizioni per l'iscrizione delle imprese individuali e sociali esistenti in tale momento.</p>","notesHtml":""},{"id":"art_100","numText":"Art. 100","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 17 GENNAIO 2003, N. 6","contentHtml":"","notesHtml":""},{"id":"art_101","numText":"Art. 101","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 17 GENNAIO 2003, N. 6","contentHtml":"","notesHtml":""},{"id":"art_101","numText":"Art. 101-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Copia integrale o parziale di ogni atto per il quale e' prescritta l'iscrizione o il deposito nel registro delle imprese deve essere rilasciata a chi ne faccia richiesta, anche per corrispondenza, senza che il costo di tale copia possa eccedere il costo amministrativo.</p>","notesHtml":""},{"id":"art_101","numText":"Art. 101-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ai fini della pubblicita' prescritta dagli articoli 2506 e 2507 del codice civile la societa' richiedente deve allegare agli atti e documenti ivi previsti la traduzione giurata in lingua italiana e deve indicare gli estremi della pubblicita' attuata nello Stato ove e' situata la sede principale. Dell'avvenuto deposito dei documenti deve essere fatta menzione nel Bollettino ufficiale delle societa' per azioni e a responsabilita' limitata.</p>","notesHtml":""},{"id":"art_101","numText":"Art. 101-quater","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le societa' soggette alla legislazione di un altro Stato appartenente alla Comunita' economica europea, le quali stabiliscono nel territorio dello Stato piu' sedi secondarie con rappresentanza stabile, possono attuare la pubblicita' dell'atto costitutivo, dello statuto e dei bilanci nell'ufficio del registro delle imprese di una soltanto delle sedi secondarie, depositando negli altri l'attestazione dell'eseguita pubblicita'.</p>","notesHtml":""},{"id":"art_102","numText":"Art. 102","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme per la formazione del ruolo, per la nomina e per la disciplina dei revisori ufficiali dei conti e quelle per la vigilanza e per la disciplina dei sindaci delle societa' saranno emanate con decreto reale.</p>\n<p>Fino all'entrata in vigore di tale decreto continueranno ad applicarsi le disposizioni anteriori.</p>","notesHtml":""},{"id":"art_103","numText":"Art. 103","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"I provvedimenti del tribunale previsti dall'articolo 2409 del codice sono disposti con decreto, il quale deve essere comunicato a cura del cancelliere, entro cinque giorni, all'ufficio del registro delle imprese per l'iscrizione.","contentHtml":"<p>COMMA ABROGATO DAL D.LGS. 17 GENNAIO 2003, N. 6.</p>","notesHtml":""},{"id":"art_104","numText":"Art. 104","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Il tribunale, prima di procedere alla nomina del rappresentante degli obbligazionisti prevista dall'articolo 2417 del codice, deve sentire gli amministratori o il consiglio di gestione della societa'.","contentHtml":"","notesHtml":""},{"id":"art_105","numText":"Art. 105","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La liquidazione coatta amministrativa delle societa' cooperative e' regolata dalle norme generali sulla liquidazione coatta amministrativa delle societa', salvo che le leggi speciali dispongano diversamente.</p>","notesHtml":""},{"id":"art_106","numText":"Art. 106","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme degli articoli 92, 93 e 94 di queste disposizioni si applicano anche al commissario governativo incaricato della gestione della societa' cooperativa a norma dell'articolo 2545-sexiesdecies del codice, intendendosi sostituiti nei poteri del tribunale, per quanto riguarda le disposizioni dei precedenti articoli 92 e 94, primo comma, l'autorita' governativa che ha nominato il commissario.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Alle mutue assicuratrici regolate da leggi speciali le disposizioni del capo II del titolo VI del libro V del codice si applicano in quanto compatibili con le leggi medesime.</p>","notesHtml":""},{"id":"art_108","numText":"Art. 108","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 17 GENNAIO 2003, N. 6","contentHtml":"","notesHtml":""},{"id":"art_109","numText":"Art. 109","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 17 GENNAIO 2003, N. 6","contentHtml":"","notesHtml":""},{"id":"art_110","numText":"Art. 110","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La competenza dell'autorita' governativa nell'esercizio dei poteri ad essa demandati dal libro V del codice e' determinata dalle leggi speciali.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme per l'attuazione delle disposizioni contenute nelle sezioni III e IV del capo II del titolo X del libro V del codice saranno emanate con decreto reale.</p>\n<p>Fino all'entrata in vigore di tale decreto la disciplina dei consorzi obbligatori i controlli dell'autorita' governativa sui consorzi volontari continuano ad essere regolati dalle leggi anteriori.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 5 MARZO 2024, N. 21","contentHtml":"","notesHtml":""},{"id":"art_111","numText":"Art. 111-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Chi richiede l'iscrizione presso il registro delle imprese dell'atto costitutivo di una societa' deve indicarne nella domanda l'indirizzo, comprensivo della via e del numero civico, ove e' posta la sua sede. In caso di successiva modificazione di tale indirizzo gli amministratori ne depositano apposita dichiarazione presso il registro delle imprese.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-quater","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La societa' di revisione di cui all'articolo 2447-ter del codice e' scelta tra quelle iscritte nell'albo speciale delle societa' di revisione tenuto dalla Commissione nazionale per le societa' e la borsa a norma delle leggi speciali; .</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-quinquies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'articolo 2632 del codice, come modificato dal decreto legislativo 11 aprile 2002, n. 61, e' sostituito dal seguente: `&quot;Art.\n2632. - Formazione fittizia del capitale. Gli amministratori e i soci conferenti che, anche in parte, formano od aumentano fittiziamente il capitale sociale mediante attribuzioni di azioni o quote in misura complessivamente superiore all'ammontare del capitale sociale, sottoscrizione reciproca di azioni o quote, sopravvalutazione rilevante dei conferimenti di beni in natura o di crediti ovvero del patrimonio della societa' nel caso di trasformazione, sono puniti con la reclusione fino ad un anno.&quot;.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-sexies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Gli articoli 100, 101, 108 e 109 sono abrogati.","contentHtml":"","notesHtml":""},{"id":"art_111","numText":"Art. 111-septies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le cooperative sociali che rispettino le norme di cui alla legge 8 novembre 1991, n. 381, sono considerate, indipendentemente dai requisiti di cui all'articolo 2513 del codice, cooperative a mutualita' prevalente. Le cooperative agricole che esercitano le attivita' di cui all'articolo 2135 del codice sono considerate cooperative a mutualita' prevalente se soddisfano le condizioni di cui al terzo comma dell'articolo 2513 del codice. Le piccole societa' cooperative costituite ai sensi della legge 7 agosto 1997, n. 266, nel termine previsto all'articolo 223-duodecies del codice devono trasformarsi nella societa' cooperativa disciplinata dall'articolo 2522 del codice.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-octies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Sono investitori istituzionali destinati alle societa' cooperative quelli costituiti ai sensi della legge 25 febbraio 1985, n. 49, i fondi mutualistici e i fondi pensione costituiti da societa' cooperative.","contentHtml":"","notesHtml":""},{"id":"art_111","numText":"Art. 111-novies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Le societa' di revisione di cui al secondo comma dell'articolo 2545-octies del codice sono quelle di cui al decreto legislativo 27 gennaio 1992, n. 88.","contentHtml":"","notesHtml":""},{"id":"art_111","numText":"Art. 111-decies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ferma restando la natura indivisibile delle riserve accantonate, non rilevano ai fini dell'obbligo di devoluzione previsto dall'articolo 17 della legge 23 dicembre 2000, n. 388, la modificazione delle clausole previste dall'articolo 26 del decreto legislativo Capo provvisorio dello Stato 14 dicembre 1947, n. 1577, ovvero la decadenza dai benefici fiscali per effetto della perdita del requisito della prevalenza come disciplinato dagli articoli 2512 e 2513 del codice.</p>\n<p>Gli amministratori devono, tuttavia, redigere un bilancio ai sensi dell'articolo 2545-octies del codice.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-undecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il Ministro delle attivita' produttive, di concerto con il Ministro dell'economia e delle finanze, stabilisce, con proprio decreto, regimi derogatori al requisito della prevalenza, cosi' come definite dall'articolo 2513 del codice, in relazione alla struttura dell'impresa e del mercato in cui le cooperative operano, a specifiche disposizioni normative cui le cooperative devono uniformarsi e alla circostanza che la realizzazione del bene destinato allo scambio mutualistico richieda il decorso di un periodo di tempo superiore all'anno di esercizio.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111-duodecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Qualora tutti i loro soci illimitatamente responsabili, di cui all'articolo 2361, comma secondo, del codice, siano societa' per azioni, in accomandita per azioni o societa' a responsabilita' limitata, le societa' in nome collettivo o in accomandita semplice devono redigere il bilancio secondo le norme previste per le societa' per azioni; esse devono inoltre redigere e pubblicare il bilancio consolidato come disciplinato dall'articolo 26 del decreto legislativo 9 aprile 1991, n. 127, ed in presenza dei presupposti ivi previsti. \n Il primo comma si applica anche qualora i soci illimitatamente responsabili siano societa' di capitali soggette al diritto di un altro Stato membro dell'Unione europea o societa' soggette al diritto di un altro Stato assimilabili giuridicamente alle imprese a responsabilita' limitata disciplinate dal diritto di uno Stato membro dell'Unione europea. <sup class=\"amd\">48</sup></p>","notesHtml":"<p>AGGIORNAMENTO (48)</p>\n<p>La L. 23 dicembre 2021, n. 238 ha disposto (con l'art. 24, comma 4) che la presente modifica si applica &quot;per la prima volta al bilancio dell'impresa e al bilancio consolidato relativi al primo esercizio successivo a quello chiuso o in corso al 31 dicembre 2019&quot;.</p>"},{"id":"art_111","numText":"Art. 111-terdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"La deliberazione prevista dal secondo comma dell'articolo 2446 del codice e' verbalizzata ed iscritta nel registro delle imprese a norma dell'articolo 2436 del codice.","contentHtml":"","notesHtml":""},{"id":"art_111","numText":"Art. 111-quaterdecies","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"La durata del primo incarico di controllo contabile puo' coincidere con quello di revisione affidato alla stessa societa'.","contentHtml":"","notesHtml":""},{"id":"art_112","numText":"Art. 112","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 21 GENNAIO 1983, N. 22","contentHtml":"","notesHtml":""},{"id":"art_113","numText":"Art. 113","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il reclamo menzionato nell'art. 2888 del codice si propone al tribunale, il quale provvede con decreto motivato in camera di consiglio, sentiti il conservatore e il pubblico ministero.</p>\n<p>Contro il provvedimento che non accoglie la domanda il richiedente puo' proporre reclamo alla corte d'appello.</p>\n<p>Il tribunale o la corte puo' ordinare che la domanda di cancellazione sia proposta nelle forme ordinarie in contraddittorio delle persone che ritiene abbiano interesse contrario alla cancellazione medesima.</p>","notesHtml":""},{"id":"art_113","numText":"Art. 113-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il conservatore, nel caso in cui non riceva i titoli e le note ai sensi dell'articolo 2674 del codice, indica sulle note i motivi del rifiuto e restituisce uno degli originali alla parte richiedente. La parte puo' avvalersi del procedimento stabilito nell'articolo 745 del codice di procedura civile. Dello stesso procedimento la parte puo' avvalersi per il ritardo nel rilascio di certificati o di copie. Il pubblico ministero comunica al Ministero di grazia e giustizia e al Ministero delle finanze la decisione adottata.</p>","notesHtml":""},{"id":"art_113","numText":"Art. 113-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il reclamo previsto nell'articolo 2674-bis del codice si propone con ricorso, entro il termine perentorio di trenta giorni dalla esecuzione della formalita', davanti al tribunale nella cui circoscrizione e' stabilita la conservatoria; entro lo stesso termine il ricorso deve essere notificato al conservatore, a pena di improcedibilita'.</p>\n<p>Il tribunale provvede in camera di consiglio, con decreto motivato, immediatamente esecutivo, sentiti il pubblico ministero, il conservatore e le parti interessate.</p>\n<p>Contro il provvedimento del tribunale e' consentito reclamo alla corte d'appello, con ricorso notificato, a pena di improcedibilita', anche al conservatore.</p>\n<p>A margine della formalita' eseguita con riserva il conservatore annota la proposizione del reclamo, il decreto immediatamente esecutivo del tribunale e il decreto definitivo.</p>\n<p>Quando il reclamo non e' proposto o e' rigettato definitivamente, la formalita' perde ogni effetto.</p>","notesHtml":""},{"id":"art_114","numText":"Art. 114","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La pronunzia di immissione nel possesso definitivo dei beni dell'assente, emessa a termine degli articoli 36 e 38 del codice del 1865, equivale a tutti gli effetti alla dichiarazione di morte presunta prevista nell'art. 58 del nuovo codice.</p>\n<p>Fino al 30 giugno 1942 non puo' essere dichiarata la morte presunta nell'ipotesi prevista nell'art. 58 del nuovo codice, se non quando concorrono le condizioni indicate negli articoli 36 e 38 del codice del 1865 per la pronunzia di immissione definitiva nei beni dell'assente.</p>","notesHtml":""},{"id":"art_115","numText":"Art. 115","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il termine di tre mesi, previsto nel secondo comma dell'art. 14 della legge 27 maggio 1929 n. 847, e' ridotto a un mese.</p>\n<p>Il capo primo della legge suddetta e' abrogato.</p>","notesHtml":""},{"id":"art_116","numText":"Art. 116","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'impugnazione prevista nell'art. 123, primo comma, del codice non puo' essere proposta dal coniuge impotente per i matrimoni anteriori al 1° luglio 1939.</p>\n<p>I matrimoni che sono stati celebrati anteriormente al 1° luglio 1939 davanti ad un ufficiale dello stato civile incompetente o senza la presenza dei testimoni non si possono piu' impugnare.</p>","notesHtml":""},{"id":"art_117","numText":"Art. 117","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se il matrimonio e' stato annullato prima del 1° luglio 1939 ed e' stata riconosciuta la mala fede di entrambi i coniugi, i figli nati o concepiti durante il matrimonio possono acquistare lo stato di figli nati fuori del matrimonio riconosciuti ai sensi dell'art. 128, ultimo comma, del codice con effetto dal giorno della domanda giudiziale proposta in contraddittorio dei genitori o dei loro eredi.</p>","notesHtml":""},{"id":"art_118","numText":"Art. 118","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli atti di costituzione di dote aventi per oggetto beni futuri, stipulati prima del 1° luglio 1939, conservano la loro efficacia anche rispetto ai beni che pervengono alla moglie dopo tale data.</p>","notesHtml":""},{"id":"art_119","numText":"Art. 119","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I lucri dotali in favore del coniuge sopravvivente, stipulati prima del 1° luglio 1939, conservano la loro efficacia.</p>\n<p>Conservano parimenti la loro efficacia le ipoteche iscritte a garanzia dei lucri medesimi.</p>","notesHtml":""},{"id":"art_120","numText":"Art. 120","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'azione di disconoscimento di paternita' e' soggetta ai termini e alle cause di decadenza previsti nel nuovo codice, anche quando si tratta di impugnare la legittimita' di figli nati prima dell'entrata in vigore dello stesso codice, sempre che l'azione non sia gia' estinta a norma delle disposizioni del codice del 1865.</p>","notesHtml":""},{"id":"art_121","numText":"Art. 121","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le azioni di reclamo di stato di figlio nato nel matrimonio, spettanti agli eredi che non siano discendenti del figlio a norma dell'art. 178 del codice del 1865, possono essere continuate quando la domanda e' stata proposta prima del 1° luglio 1939.</p>","notesHtml":""},{"id":"art_122","numText":"Art. 122","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice relative al riconoscimento dei figli nati fuori del matrimonio si applicano anche ai figli nati o concepiti prima del 1° luglio 1939.</p>\n<p>Il riconoscimento di figli nati fuori del matrimonio, compiuto prima di tale data fuori dei casi in cui era ammesso secondo le leggi anteriori, non puo' essere annullato, se al momento in cui fu fatto concorrevano le condizioni per cui sarebbe ammissibile secondo le disposizioni del codice.</p>\n<p>Tale riconoscimento vale anche agli effetti delle successioni aperte prima del 1° luglio 1939, purche' i diritti successori del figlio non siano stati esclusi con sentenza passata in giudicato o non sia intervenuta transazione tra le parti interessate o non siano trascorsi tre anni dall'apertura della successione senza che il figlio abbia fatto valere alcuna ragione ereditaria sui beni della successione.</p>","notesHtml":""},{"id":"art_123","numText":"Art. 123","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'azione per la dichiarazione giudiziale di paternita' puo' essere proposta dai figli nati prima del 1° luglio 1939 solo nel caso in cui ricorrono le condizioni previste dall'art. 189 del codice del 1865.\nL'azione puo' essere proposta, sempre che ricorrano tali condizioni, anche dai figli nati fuori del matrimonio per i quali e' ammessa dall'art. 278 nel nuovo codice. (6)</p>\n<p>I figli nati fuori del matrimonio che si trovano nelle condizioni previste nei numeri 1 e 4 dell'art. 269 del codice, ma che non possono ottenere la dichiarazione giudiziale di paternita' perche' nati prima del 1° luglio 1939, possono agire soltanto per ottenere gli alimenti. (6)</p>\n<p>Nei casi in cui l'azione per la dichiarazione giudiziale di paternita' e' ammessa secondo le norme del codice del 1865, essa e' soggetta al termine stabilito dall'art. 271 del nuovo codice.</p>\n<p>Le disposizioni del codice relative alle forme dei giudizi per la dichiarazione giudiziale di paternita' o di maternita' naturale si applicano anche ai figli nati o concepiti prima del 1° luglio 1939.</p>\n<p>I giudizi relativi alla dichiarazione di paternita' o di maternita' proposti prima del 1° luglio 1939 non possono essere proseguiti se non e' intervenuto il decreto contemplato dall'art. 274 del codice stesso, salvo il caso che si sia gia' ottenuta una sentenza anche se interlocutoria.</p>","notesHtml":"<p>AGGIORNAMENTO (6)</p>\n<p>La Corte Costituzionale, con sentenza 7 - 16 febbraio 1963, n. 7 (in G.U. 1a s.s. 23/02/1963, n. 53), ha dichiarato &quot;l'illegittimita' costituzionale dell'art. 123, primo comma, delle disposizioni transitorie del Codice civile, e, in conseguenza, dichiara altresi' la illegittimita' costituzionale del secondo comma del predetto art. 123 e del secondo comma dell'art. 136 delle disposizioni transitorie, in riferimento agli artt. 3 e 30 della Costituzione&quot;.</p>"},{"id":"art_124","numText":"Art. 124","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 28 DICEMBRE 2013, N. 154","contentHtml":"","notesHtml":""},{"id":"art_125","numText":"Art. 125","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 28 DICEMBRE 2013, N. 154","contentHtml":"","notesHtml":""},{"id":"art_126","numText":"Art. 126","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione del secondo comma dell'art. 293 del nuovo codice e' applicabile anche alle adozioni costituite prima del 1° luglio 1939, a meno che siano state gia' impugnate ai sensi dell'art. 205 del codice del 1865.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice sulla revoca dell'adozione si applicano anche alle adozioni costituite prima del 1° luglio 1939.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"I divieti contenuti nei numeri 6, 7, 8 e 9 dell'articolo 87 del codice civile sono applicabili all'affiliazione.","contentHtml":"","notesHtml":""},{"id":"art_128","numText":"Art. 128","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se l'ipotesi prevista dall'art. 342 del codice si e' verificata prima del 1° luglio 1939, il tribunale, su istanza del figlio medesimo o dei parenti o del pubblico ministero, puo' privare il genitore della patria potesta' sui figli, quando risulta che egli impartisce ad essi una educazione non corrispondente ai fini nazionali, e puo' provvedere in conformita' all'art. 342 del codice.</p>","notesHtml":""},{"id":"art_129","numText":"Art. 129","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme del codice in materia di tutela e di curatela si applicano anche alle tutele e alle curatele che si sono aperte prima del 1° luglio 1939.</p>\n<p>Tuttavia i tutori, i protutori e i curatori gia' nominati conservano l'ufficio, salve le disposizioni degli articoli 383, 384 e 393 del codice, e sempre che non ricorrano cause d'incapacita' previste dal codice stesso.</p>","notesHtml":""},{"id":"art_130","numText":"Art. 130","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 428 del codice e applicabile anche se gli atti in essa contemplati sono stati compiuti prima del 1° luglio 1939.</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le ipoteche legali sui beni del tutore iscritte a norma degli articoli 292, 293 e 1969 n. 3, del codice del 1865 possono essere cancellate quando il tutore ne fa istanza al giudice tutelare, il quale, se ordina la cancellazione, provvede secondo l'art. 381 del nuovo codice.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'erede col beneficio d'inventario puo' promuovere la procedura di liquidazione ai sensi dell'art. 503 del codice anche se l'accettazione, e' stata fatta prima del 21 aprile 1940.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La rinunzia all'eredita' o al legato, fatta dopo il 21 aprile 1940, produce tutti gli effetti previsti dal codice, ancorche' si tratti di successione apertasi anteriormente a quella data.</p>","notesHtml":""},{"id":"art_134","numText":"Art. 134","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 528 del codice e' applicabile anche per le successioni apertesi prima del 21 aprile 1940, se il chiamato non ha ancora accettato e non e' nel possesso di beni ereditari.</p>\n<p>L'obbligo del curatore di procedere alla liquidazione dell'eredita' giacente incombe anche sui curatori gia' nominati, se, in caso di opposizione dei creditori o legatari, il pretore ritiene opportuno disporre la liquidazione.</p>","notesHtml":""},{"id":"art_135","numText":"Art. 135","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme sulla riduzione delle donazioni sono applicabili anche alle donazioni fatte anteriormente al 21 aprile 1940, purche' la successione si sia aperta dopo. Tali donazioni sono soggette a riduzione, avuto riguardo alla misura dei diritti riservati ai legittimari stabilita dal codice.</p>\n<p>La medesima disposizione si applica per le regole stabilite dal codice sulla collazione, sull'imputazione e sulla riunione fittizia.</p>\n<p>Tuttavia per le donazioni di beni mobili fatte anteriormente al 21 aprile 1940, si tiene conto del valore risultante dalla stima annessa all'atto di donazione.</p>","notesHtml":""},{"id":"art_136","numText":"Art. 136","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 580 e 594 del codice si applicano anche alle successioni apertesi prima del 21 aprile 1940, se i diritti dei figli naturali non riconoscibili o non riconosciuti non sono stati definiti con sentenza passata in giudicato o mediante convenzione.</p>\n<p>Possono inoltre valersi delle disposizioni degli articoli 580 e 594 i figli naturali che si trovano nelle condizioni previste dai nn. 1 e 4 dell'art. 269 del codice, ma che non possono ottenere la dichiarazione giudiziale di paternita' perche' nati anteriormente al 1° luglio 1939. <sup class=\"amd\">6</sup></p>\n<p>I figli naturali indicati dal comma precedente hanno facolta' di chiedere l'assegno vitalizio anche per le successioni gia' aperte, ma non oltre cinque anni prima del 21 aprile 1940; l'assegno in questo caso deve essere calcolato con riguardo allo stato e al valore che i beni ereditari avevano a tale data.</p>","notesHtml":"<p>AGGIORNAMENTO (6)</p>\n<p>La Corte Costituzionale, con sentenza 7 - 16 febbraio 1963, n. 7 (in G.U. 1a s.s. 23/02/1963, n. 53), ha dichiarato &quot;l'illegittimita' costituzionale dell'art. 123, primo comma, delle disposizioni transitorie del Codice civile, e, in conseguenza, dichiara altresi' la illegittimita' costituzionale del secondo comma del predetto art. 123 e del secondo comma dell'art. 136 delle disposizioni transitorie, in riferimento agli artt. 3 e 30 della Costituzione&quot;.</p>"},{"id":"art_137","numText":"Art. 137","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Non possono essere promosse ne' proseguite azioni per la dichiarazione di nullita', per vizio di forma, per incapacita' a ricevere o per altre cause, di disposizioni testamentarie e di donazioni che sono valide secondo il codice. La nullita' ammessa anche da questo non puo' essere pronunziata se non nei limiti da esso previsti.</p>","notesHtml":""},{"id":"art_138","numText":"Art. 138","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le condizioni di vedovanza ammesse dall'ultimo comma dell'art. 850 del codice del 1865, relative alle successioni apertesi prima del 21 aprile 1940, conservano la loro efficacia.</p>","notesHtml":""},{"id":"art_139","numText":"Art. 139","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I diritti derivanti da una disposizione testamentaria sotto condizione sospensiva si trasmettono agli eredi dell'onorato, se questi muore dopo il 21 aprile 1940 senza che la condizione si sia verificata.</p>","notesHtml":""},{"id":"art_140","numText":"Art. 140","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ancorche' la divisione sia stata gia' effettuata, si applica la norma dell'art. 759 del codice, se l'evizione ha luogo dopo il 21 aprile 1940.</p>","notesHtml":""},{"id":"art_141","numText":"Art. 141","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le norme sulla revocazione per ingratitudine sono applicabili alle donazioni anteriori, se la causa di revocazione si e' verificata dopo il 21 aprile 1940. Tuttavia la norma del secondo comma dell'art. 802 del codice e' applicabile anche se la causa di revocazione e' anteriore.</p>","notesHtml":""},{"id":"art_142","numText":"Art. 142","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_143","numText":"Art. 143","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_144","numText":"Art. 144","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_145","numText":"Art. 145","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_146","numText":"Art. 146","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_147","numText":"Art. 147","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_148","numText":"Art. 148","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_149","numText":"Art. 149","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 22 LUGLIO 1966, N. 607","contentHtml":"","notesHtml":""},{"id":"art_150","numText":"Art. 150","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per l'acquisto dei frutti al termine dell'usufrutto, se questo ha avuto inizio anteriormente al 28 ottobre 1941, si osserva il disposto dell'art. 480 del codice del 1865.</p>","notesHtml":""},{"id":"art_151","numText":"Art. 151","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 999 del codice si applicano anche alle locazioni concluse dall'usufruttuario anteriormente al 28 ottobre 1941.</p>","notesHtml":""},{"id":"art_152","numText":"Art. 152","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il diritto di ritenzione ammesso dagli articoli 1006 e 1011 del codice spetta all'usufruttuario anche per le somme a lui dovute in dipendenza di anticipazioni effettuate prima del 28 ottobre 1941.</p>","notesHtml":""},{"id":"art_153","numText":"Art. 153","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 1023 del codice si applica anche ai diritti di uso e di abitazione costituiti prima del 28 ottobre 1941.</p>","notesHtml":""},{"id":"art_154","numText":"Art. 154","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Se l'interclusione del fondo si e' verificata per effetto di vendita anteriore al 28 ottobre 1941, il compratore non e' tenuto a dare il passaggio senza indennita'.</p>","notesHtml":""},{"id":"art_155","numText":"Art. 155","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni concernenti la revisione dei regolamenti di condominio e la trascrizione di essi si applicano anche ai regolamenti formati prima del 28 ottobre 1941.</p>\n<p>Cessano di avere effetto le disposizioni dei regolamenti di condominio che siano contrarie alle norme richiamate nell'ultimo comma dell'art. 1138 del codice e nell'art. 72 di queste disposizioni.</p>","notesHtml":""},{"id":"art_155","numText":"Art. 155-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'assemblea, ai fini dell'adeguamento degli impianti non centralizzati di cui all'articolo 1122-bis, primo comma, del codice, gia' esistenti alla data di entrata in vigore del predetto articolo, adotta le necessarie prescrizioni con le maggioranze di cui all'articolo 1136, commi primo, secondo e terzo, del codice.</p>","notesHtml":""},{"id":"art_156","numText":"Art. 156","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I condomini costituiti in forma di societa' cooperativa possono conservare tale forma di amministrazione.</p>\n<p>Ai rapporti di condominio negli edifici di cooperative edilizie le quali godono del contributo dello Stato nel pagamento degli interessi sui mutui si applicano le disposizioni delle leggi speciali.</p>","notesHtml":""},{"id":"art_157","numText":"Art. 157","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per i diritti spettanti al possessore, all'usufruttuario o all'enfiteuta a causa di riparazioni, di miglioramenti o di addizioni eseguite anteriormente al 28 ottobre 1941 si applicano le norme del codice del 1865, salvo quanto e' stabilito dall'art. 152 di queste disposizioni.</p>","notesHtml":""},{"id":"art_158","numText":"Art. 158","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il termine per l'usucapione delle servitu' discontinue apparenti comincia a decorrere dal 28 ottobre 1941.</p>\n<p>La disposizione dell'art. 1075 del codice si applica se la prescrizione del modo della servitu' non si e' compiuta prima del 28 ottobre 1941.</p>","notesHtml":""},{"id":"art_159","numText":"Art. 159","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il luogo in cui devono essere adempiute le obbligazioni che scadono dopo l'entrata in vigore del codice si determina in conformita' dell'art. 1182 del codice stesso, anche se si tratta di obbligazioni sorte anteriormente.</p>","notesHtml":""},{"id":"art_160","numText":"Art. 160","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del codice relative alla mora del creditore, all'inadempimento e alla mora del debitore si applicano anche se si tratta di obbligazione sorta prima dell'entrata in vigore del codice stesso, se l'offerta di pagamento sia stata compiuta ovvero l'inadempimento o la mora si sia verificato posteriormente.</p>","notesHtml":""},{"id":"art_161","numText":"Art. 161","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I crediti di somme di danaro che siano divenuti esigibili prima dell'entrata in vigore del nuovo codice, producono, da questa data, interessi di pieno diritto, anche se tale effetto non si verificava secondo le disposizioni del codice del 1865.</p>\n<p>Gli interessi legali che si maturano dopo la data predetta devono essere computati al saggio stabilito dall'art. 1284 del nuovo codice.</p>","notesHtml":""},{"id":"art_162","numText":"Art. 162","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione dell'art. 1283 del codice si applica anche se si tratta di obbligazioni sorte anteriormente all'entrata in vigore del codice stesso, quando gli interessi sono dovuti per almeno sei mesi.</p>","notesHtml":""},{"id":"art_163","numText":"Art. 163","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il giudice puo' ridurre la penale manifestamente eccessiva anche se il contratto sia stato concluso anteriormente all'entrata in vigore del codice e anche se il pagamento della penale sia stato giudizialmente domandato e il giudizio sia pendente alla data suddetta.</p>","notesHtml":""},{"id":"art_164","numText":"Art. 164","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del secondo e terzo comma dell'art. 1385 del codice si applicano anche se il contratto sia stato concluso anteriormente al giorno dell'entrata in vigore del codice stesso, e anche se a tale data sia stato gia' iniziato il giudizio e questo sia tuttora pendente.</p>","notesHtml":""},{"id":"art_165","numText":"Art. 165","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli effetti dell'annullamento o della risoluzione dei contratti rispetto ai terzi sono regolati dalle disposizioni del codice civile del 1865 se la domanda sia stata proposta anteriormente all'entrata in vigore del nuovo codice.</p>","notesHtml":""},{"id":"art_166","numText":"Art. 166","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per le vendite immobiliari stipulate anteriormente all'entrata in vigore del codice, la rescissione a causa di lesione e' regolata dalle disposizioni del codice del 1865.</p>","notesHtml":""},{"id":"art_167","numText":"Art. 167","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 1462 del codice si applicano anche se la clausola ivi prevista sia inserita in un contratto stipulato prima del giorno dell'entrata in vigore del codice stesso, quando l'eccezione del debitore sia opposta dopo o, se proposta prima, il relativo giudizio sia ancora pendente alla data predetta.</p>","notesHtml":""},{"id":"art_168","numText":"Art. 168","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni relative agli effetti dell'eccessiva onerosita' sopravvenuta si applicano anche per i contratti conclusi prima dell'entrata in vigore del codice se le circostanze e gli avvenimenti da cui deriva l'eccessiva onerosita' si siano verificati dopo.</p>","notesHtml":""},{"id":"art_169","numText":"Art. 169","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni che regolano le conseguenze del sopravvenuto mutamento nelle condizioni patrimoniali del debitore si applicano anche quando si tratti di contratti anteriori all'entrata in vigore del codice, se il mutamento si avveri posteriormente.</p>","notesHtml":""},{"id":"art_170","numText":"Art. 170","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni del secondo comma dell'art. 1473 del codice si applicano anche ai contratti di vendita conclusi anteriormente all'entrata in vigore del codice stesso, se il rifiuto o l'impedimento del terzo ad accettare l'incarico si verificano dopo.</p>","notesHtml":""},{"id":"art_171","numText":"Art. 171","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1478, 1479 e 1480 del codice si applicano anche ai contratti di vendita conclusi anteriormente al giorno dell'entrata in vigore di esso, se a tale data non ne era stato domandato in giudizio l'annullamento.</p>","notesHtml":""},{"id":"art_172","numText":"Art. 172","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni che impongono la denuncia dei vizi o della mancanza di qualita' della cosa venduta e stabiliscono i termini per farla, si applicano anche se il contratto sia stato concluso anteriormente all'entrata in vigore del codice, purche' la consegna o il ricevimento della cosa abbiano avuto luogo posteriormente.</p>","notesHtml":""},{"id":"art_173","numText":"Art. 173","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni relative al riscatto convenzionale nel contratto di vendita tranne quella del primo comma dell'art. 1501, si applicano anche ai contratti conclusi anteriormente all'entrata in vigore del codice quando il diritto di riscatto venga esercitato posteriormente.</p>","notesHtml":""},{"id":"art_174","numText":"Art. 174","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni dell'art. 1512 del codice si applicano ai contratti di vendita anteriori all'entrata in vigore di esso se il difetto di funzionamento sia scoperto posteriormente.</p>","notesHtml":""},{"id":"art_175","numText":"Art. 175","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Qualora secondo le leggi anteriori i contratti di vendita di cose mobili con riserva di proprieta' fossero opponibili ai creditori o ai terzi aventi causa dal compratore indipendentemente dai requisiti prescritti dall'art. 1524 del codice, le formalita' relative, trattandosi di contratti conclusi anteriormente al giorno dell'entrata in vigore di esso, devono essere adempiute entro tre mesi dalla data medesima. In mancanza, la riserva di proprieta' non puo' essere opposta ai creditori del compratore che abbiano pignorato la cosa e ai terzi aventi causa dal medesimo che abbiano acquistato diritti sulla cosa stessa posteriormente alla data anzidetta.</p>","notesHtml":""},{"id":"art_176","numText":"Art. 176","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1525 e 1526 del codice si applicano ai contratti conclusi anteriormente al giorno dell'entrata in vigore di esso e anche se la risoluzione per inadempimento sia stata giudizialmente domandata e il giudizio sia tuttora pendente alla data suddetta.</p>","notesHtml":""},{"id":"art_177","numText":"Art. 177","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le disposizioni degli articoli 1531, secondo comma e 1550, secondo comma, del codice, relative all'esercizio del diritto di voto, si applicano anche ai contratti di vendita a termi
