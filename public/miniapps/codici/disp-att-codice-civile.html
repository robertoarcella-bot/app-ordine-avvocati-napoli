<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Disp. Att. c.c. – Codici Italiani</title>
<meta name="description" content="Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0066CC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root { --code-color: #1a5276; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 300px;
  --header-h: 58px;
  --sidebar-bg: #003F7F;
  --sidebar-hover: rgba(255,255,255,.12);
  --sidebar-active-bg: rgba(255,255,255,.20);
  --sidebar-text: #ffffff;
  --sidebar-muted: #d6e2f4;
  --sidebar-border: rgba(255,255,255,.18);
  --main-bg: #f7f8fc;
  --article-bg: #ffffff;
  --text: #1a1d2e;
  --muted: #6b7280;
  --border: #e4e7f0;
  --accent: var(--code-color, #2471a3);
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: "SF Mono", Consolas, "Courier New", monospace;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--main-bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── HEADER ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--sidebar-border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  z-index: 100;
}
.site-logo {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.site-logo:hover { color: #dce8ff; }
.header-sep { width: 1px; height: 28px; background: var(--sidebar-border); }
.header-title {
  font-size: .875rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.header-vigenza {
  font-size: .75rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  background: rgba(255,255,255,.06);
  padding: 3px 10px;
  border-radius: 20px;
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--sidebar-text);
  border-radius: 2px;
  transition: all .2s;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform .25s ease;
}
.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px;
  color: #fff;
  font-size: .82rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input::placeholder { color: var(--sidebar-muted); }
.sidebar-search input:focus { border-color: rgba(255,255,255,.3); }
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

.group-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sidebar-muted);
  padding: 14px 16px 6px;
}
.art-link {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
}
.art-link:hover { background: var(--sidebar-hover); }
.art-link.active {
  background: var(--sidebar-active-bg);
  border-left-color: var(--accent);
}
.art-link.hidden { display: none; }
.art-num {
  font-size: .78rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 56px;
  flex-shrink: 0;
}
.art-heading-mini {
  font-size: .78rem;
  color: var(--sidebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: .85;
}
.art-link.active .art-heading-mini { opacity: 1; }

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── ARTICLE CARD ── */
.article-card {
  background: var(--article-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 820px;
  width: 100%;
  padding: 44px 52px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.article-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: color-mix(in srgb, var(--accent) 10%, white);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 18px;
}
.article-num {
  font-family: var(--sans);
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 6px;
}
.article-heading {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.85;
  color: var(--text);
}
.article-body p {
  margin-bottom: 1.1em;
  text-align: justify;
  hyphens: auto;
}
.article-body p:last-child { margin-bottom: 0; }
.para-num {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 700;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, white);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  vertical-align: middle;
}
mark.ins {
  background: color-mix(in srgb, #2980b9 12%, white);
  color: #1a5276;
  border-radius: 2px;
  padding: 0 2px;
  font-style: italic;
}

/* Notes / Aggiornamento */
.article-notes {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}
.notes-toggle {
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.notes-toggle::before { content: '▶'; font-size: .6em; transition: transform .2s; }
.notes-toggle.open::before { transform: rotate(90deg); }
.notes-body {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.notes-body.visible { display: block; }
.notes-body p { margin-bottom: .7em; }

/* ── NAV FOOTER ── */
.nav-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 820px;
  width: 100%;
  margin-top: 20px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.article-counter {
  font-size: .8rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  max-width: 820px;
  width: 100%;
}
.empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .hamburger { display: flex; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,.4);
  }
  .main-content {
    margin-left: 0;
    padding: 20px 12px 60px;
  }
  .article-card { padding: 28px 22px; }
  .article-num { font-size: 1.5rem; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 49;
    display: none;
  }
  .overlay.visible { display: block; }
}

/* ── ACTION BUTTONS (WA + COPY) ── */
.article-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.action-btn:hover {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}
.action-btn.wa-btn:hover {
  background: #25D366;
  border-color: #25D366;
}
.action-btn .action-icon {
  font-size: 1rem;
  line-height: 1;
}
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  opacity: 0;
  transition: all .3s ease;
  z-index: 9999;
  pointer-events: none;
}
.copy-toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── SCROLLBAR ── */
* { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }


/* ── ARTICLE JUMP BAR (v1.2.3) ── */
.article-jump-bar {
  max-width: 820px;
  width: 100%;
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.article-jump-bar label {
  font-size: .78rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  white-space: nowrap;
  flex-shrink: 0;
}
.article-jump-bar select {
  flex: 1 1 200px;
  min-width: 0;
  padding: 8px 10px;
  font-family: var(--sans);
  font-size: .85rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--article-bg);
  color: var(--text);
  cursor: pointer;
}
.article-jump-bar select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
}
.article-jump-bar .global-search-link {
  flex-shrink: 0;
  padding: 8px 12px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--article-bg);
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
  transition: all .15s;
}
.article-jump-bar .global-search-link:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
@media (max-width: 768px) {
  .article-jump-bar { padding: 0 4px; }
  .article-jump-bar label { display: none; }
  .article-jump-bar .global-search-link { padding: 8px 10px; font-size: .75rem; }
}

</style>
</head>
<body>

<script>const CODE = {
  title: "Disposizioni di Attuazione del Codice Civile",
  shortTitle: "Disp. Att. c.c.",
  slug: "disp-att-codice-civile",
  vigenza: "31/10/2025",
  color: "#1a5276",
  articles: [{"id":"art_1","numText":"Art. 1","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_2","numText":"Art. 2","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_3","numText":"Art. 3","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il notaio che interviene per la stipulazione di atti tra vivi ovvero per la pubblicazione di testamenti, con i quali si dispongono fondazioni o si fanno donazioni o lasciti in favore di enti da istituire, e' obbligato a farne denunzia al prefetto entro trenta giorni.</p>\n<p>La denunzia deve contenere gli estremi essenziali dell'atto, il testo letterale concernente la liberalita', la indicazione degli eredi e della loro residenza.</p>\n<p>Il prefetto e' autorizzato a promuovere, nei modi e nei casi stabiliti dalla legge, gli atti conservativi che reputa necessari per l'esecuzione della disposizione sia nei confronti degli eredi, sia nei confronti dei terzi.</p>\n<p>Puo' anche chiedere al tribunale, in caso di urgenza o di necessita', la nomina di un amministratore provvisorio dei beni. Il tribunale provvede con decreto in camera di consiglio.</p>","notesHtml":""},{"id":"art_4","numText":"Art. 4","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_5","numText":"Art. 5","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La domanda per ottenere l'autorizzazione prevista nell'art. 17 del codice deve essere presentata al prefetto della provincia in cui la persona giuridica ha la sua sede e accompagnata dai documenti necessari per dimostrare l'entita', le condizioni, l'opportunita' dell'acquisto, nonche' la destinazione dei beni.</p>\n<p>Il prefetto raccoglie le opportune informazioni, sente, quando trattasi di atti di ultima volonta', coloro ai quali per successione sarebbero devoluti i beni lasciati alla persona giuridica e, ove non sia delegato a concedere la chiesta autorizzazione, trasmette la domanda al ministero competente secondo l'attivita' che la persona giuridica svolge. In tal caso l'autorizzazione e' data con decreto reale.</p>\n<p>Durante il procedimento i rappresentanti della persona giuridica possono compiere gli atti che tendono a conservarne i diritti.</p>","notesHtml":""},{"id":"art_6","numText":"Art. 6","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'acquisto di beni immobili in seguito a subastazione effettuata a carico di un debitore della persona giuridica non e' soggetto alla necessita' dell'autorizzazione. Tuttavia entro trenta giorni dall'acquisto i rappresentanti della persona giuridica devono darne comunicazione al prefetto.</p>","notesHtml":""},{"id":"art_7","numText":"Art. 7","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il notaio che interviene per la stipulazione di atti tra vivi ovvero per la pubblicazione di testamenti, nei quali si dispongono donazioni o lasciti in favore di una persona giuridica, deve darne notizia entro trenta giorni al rappresentante della persona giuridica e al prefetto della provincia in cui questa ha la sua sede.</p>","notesHtml":""},{"id":"art_8","numText":"Art. 8","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La convocazione dell'assemblea delle associazioni deve farsi nelle forme stabilite dallo statuto e, se questo non dispone, mediante avviso personale che deve contenere l'ordine del giorno degli argomenti da trattare.</p>\n<p>Se non e' vietato dall'atto costitutivo o dallo statuto, gli associati possono farsi rappresentare nell'assemblea da altri associati mediante delega scritta anche in calce all'avviso di convocazione.</p>","notesHtml":""},{"id":"art_9","numText":"Art. 9","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nell'ipotesi prevista dal quarto comma dell'art. 23 del codice il provvedimento di sospensione deve essere comunicato agli amministratori, i quali possono entro quindici giorni proporre reclamo.</p>\n<p>In tal caso l'autorita' governativa, se non ritiene di revocare il provvedimento, ne da' comunicazione al pubblico ministero, il quale promuove l'azione di annullamento della deliberazione.</p>","notesHtml":""},{"id":"art_10","numText":"Art. 10","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_11","numText":"Art. 11","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando la persona giuridica e' dichiarata estinta o quando l'associazione e' sciolta, il presidente del tribunale, su istanza degli amministratori, dei soci, dei creditori, del pubblico ministero o anche d'ufficio, nomina uno o piu' commissari liquidatori, salvo che l'atto costitutivo o lo statuto non preveda una diversa forma di nomina e a questa si proceda entro un mese dal provvedimento. La preventiva designazione dei liquidatori nell'atto costitutivo o nello statuto non ha effetto.</p>\n<p>Quando lo scioglimento dell'associazione e' deliberato dall'assemblea, la nomina puo' essere fatta dall'assemblea medesima con la maggioranza prevista dall'art. 21 del codice.</p>\n<p>Possono essere nominati liquidatori anche gli amministratori uscenti.</p>\n<p>In ogni caso la nomina fatta dall'assemblea o nelle forme previste nell'atto costitutivo o nello statuto deve essere comunicata immediatamente al presidente del tribunale.</p>","notesHtml":""},{"id":"art_12","numText":"Art. 12","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I liquidatori esercitano la loro funzione sotto la diretta sorveglianza del presidente del tribunale e si considerano ad ogni effetto di legge pubblici ufficiali. Essi possono essere revocati e sostituiti in ogni tempo anche di ufficio dallo stesso presidente con provvedimento non soggetto a reclamo.</p>\n<p>I liquidatori deliberano a maggioranza.</p>","notesHtml":""},{"id":"art_13","numText":"Art. 13","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I liquidatori, entro quindici giorni dalla comunicazione avutane, devono procedere all'annotazione della loro nomina nel registro dove la persona giuridica e' iscritta, e richiedere agli amministratori la consegna dei beni e delle scritture della persona giuridica. All'atto della consegna e' redatto inventario, di cui e' trasmessa copia al presidente del tribunale.</p>\n<p>Se gli amministratori si rifiutano di procedere alla consegna, il presidente del tribunale autorizza il rilascio coattivo con decreto non soggetto a reclamo. In questo caso l'inventario e redatto dall'ufficiale giudiziario procedente.</p>","notesHtml":""},{"id":"art_14","numText":"Art. 14","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Entro trenta giorni dalla formazione dell'inventario i liquidatori, dopo avere determinato la consistenza dell'attivo e del passivo dell'ente, se riconoscono che il patrimonio non e' sufficiente al pagamento integrale delle passivita', devono iniziare la liquidazione generale dei beni nell'interesse di tutti i creditori, dandone avviso mediante annotazione nel registro delle persone giuridiche.</p>\n<p>Il medesimo avviso deve essere dato nel caso in cui i liquidatori non ritengono di dover procedere alla liquidazione generale, essendovi eccedenza dell'attivo sul passivo.</p>\n<p>In quest'ultimo caso i creditori dell'ente possono fare opposizione entro trenta giorni dall'annotazione chiedendo la liquidazione generale del patrimonio.</p>\n<p>Le opposizioni si propongono davanti al presidente del tribunale.\nContro il provvedimento di questo e' ammesso reclamo davanti al presidente della corte nel termine di quindici giorni. Il provvedimento definitivo e' annotato nel registro a cura dei liquidatori.</p>","notesHtml":""},{"id":"art_15","numText":"Art. 15","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando non sono intervenute opposizioni ai sensi dell'articolo precedente queste sono state rigettate con provvedimento definitivo, i liquidatori provvedono a riscuotere i crediti dell'ente, a convertire in danaro, nei limiti in cui e' necessario, i beni e a pagare i creditori a misura che si presentano.</p>\n<p>I liquidatori possono provvedere al pagamento anche dei creditori il cui credito non e' attualmente esigibile, e devono provvedere alle cautele necessarie per assicurare il pagamento dei creditori condizionali.</p>\n<p>Soddisfatti i creditori, i liquidatori formano l'inventario dei beni residuati e rendono conto della gestione al presidente del tribunale.</p>\n<p>Copia dell'inventario e del rendiconto approvato dal presidente del tribunale deve essere trasmessa all'autorita' governativa.</p>\n<p>I liquidatori distribuiscono i beni residuati a norma dell'art. 31 del codice, provocando, quando e' necessario, le disposizioni dell'autorita' governativa.</p>","notesHtml":""},{"id":"art_16","numText":"Art. 16","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando e' disposta la liquidazione generale del patrimonio dell'ente si osservano, in quanto applicabili, le disposizioni degli articoli 304, 308, 309, 310, 311, 312 e 313 del codice della crisi e dell'insolvenza, salve le disposizioni seguenti.</p>\n<p><sup class=\"amd\">36</sup>\n <sup class=\"amd\">39</sup>\n <sup class=\"amd\">46</sup>\n <sup class=\"amd\">49</sup></p>","notesHtml":"<p>AGGIORNAMENTO (36)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14 ha disposto (con l'art. 371, comma 2) che la presente modifica &quot;si applica alle liquidazioni generali del patrimonio disposte per effetto di domande depositate o iniziative comunque esercitate successivamente all'entrata in vigore del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (39)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 8 aprile 2020, n. 23, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica del presente articolo dal 15 agosto 2020 al 1° settembre 2021.</p>\n<p>AGGIORNAMENTO (46)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 24 agosto 2021, n. 118, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica del presente articolo dal 1° settembre 2021 al 16 maggio 2022.</p>\n<p>AGGIORNAMENTO (49)</p>\n<p>Il D.Lgs. 12 gennaio 2019, n. 14, come modificato dal D.L. 30 aprile 2022, n. 36, ha disposto (con l'art. 389, comma 1) la proroga dell'entrata in vigore della modifica del presente articolo dal 16 maggio 2022 al 15 luglio 2022.</p>"},{"id":"art_17","numText":"Art. 17","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I termini, che secondo le disposizioni richiamate nell'articolo precedente decorrono dalla data del provvedimento di liquidazione o di nomina dei liquidatori o dalla sua pubblicazione nella Gazzetta Ufficiale, decorrono dalla data in cui e' stato annotato nel registro il provvedimento che dispone la liquidazione generale della persona giuridica ai sensi del precedente art. 14.</p>","notesHtml":""},{"id":"art_18","numText":"Art. 18","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La pubblicita' del provvedimento che ordina la liquidazione e del bilancio finale di liquidazione si attua mediante annotazione nel registro delle persone giuridiche a cura dei liquidatori. Nei casi in cui le norme richiamate nell'art. 16 richiedono il deposito di atti nella cancelleria del tribunale, il deposito si deve effettuare presso la cancelleria in cui e' tenuto il registro delle persone giuridiche.</p>","notesHtml":""},{"id":"art_19","numText":"Art. 19","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le attribuzioni, che secondo le norme sulla liquidazione coatta amministrativa sono demandate all'autorita' che ha nominato il liquidatore, spettano al presidente del tribunale.</p>","notesHtml":""},{"id":"art_20","numText":"Art. 20","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Chiusa la liquidazione, il presidente del tribunale ordina la cancellazione dell'ente dal registro delle persone giuridiche.</p>\n<p>COMMA ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361.</p>","notesHtml":""},{"id":"art_21","numText":"Art. 21","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La competenza per i provvedimenti relativi alla liquidazione spetta al tribunale del capoluogo della provincia in cui e' registrata la persona giuridica.</p>","notesHtml":""},{"id":"art_22","numText":"Art. 22","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_23","numText":"Art. 23","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_24","numText":"Art. 24","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_25","numText":"Art. 25","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_26","numText":"Art. 26","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_27","numText":"Art. 27","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_28","numText":"Art. 28","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_29","numText":"Art. 29","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_30","numText":"Art. 30","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.P.R. 10 FEBBRAIO 2000, N. 361","contentHtml":"","notesHtml":""},{"id":"art_31","numText":"Art. 31","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il trasferimento della residenza si prova con la doppia dichiarazione fatta al comune che si abbandona e a quello dove s'intende fissare la dimora abituale. Nella dichiarazione fatta al comune che si abbandona deve risultare il luogo in cui e' fissata la nuova residenza.</p>","notesHtml":""},{"id":"art_32","numText":"Art. 32","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Il pubblico ministero deve essere sempre sentito nei procedimenti di volontaria giurisdizione riguardanti il fondo patrimoniale","contentHtml":"","notesHtml":""},{"id":"art_33","numText":"Art. 33","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Nel caso previsto dall'articolo 183 del codice, il tribunale, in camera di consiglio, provvede con decreto, su istanza dell'altro coniuge, e sentito il pubblico ministero","contentHtml":"","notesHtml":""},{"id":"art_34","numText":"Art. 34","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 28 DICEMBRE 2013, N. 154","contentHtml":"","notesHtml":""},{"id":"art_34","numText":"Art. 34-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il notaio rogante deve, nel termine di trenta giorni dalla data del matrimonio o dalla data dell'atto pubblico di modifica delle convenzioni, ovvero di quella dell'omologazione del caso previsto dal secondo comma dell'articolo 163 del codice, richiedere l'annotazione a margine dell'atto di matrimonio della convenzione matrimoniale dell'atto di modifica della stessa.</p>\n<p>Nello stesso termine deve richiedere l'annotazione di cui all'ultimo comma dell'articolo 163 del codice.</p>","notesHtml":""},{"id":"art_35","numText":"Art. 35","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Sulla domanda di adozione e di revoca della adozione di minore di eta' provvede il tribunale per i minorenni.","contentHtml":"","notesHtml":""},{"id":"art_36","numText":"Art. 36","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La rinunzia alla cittadinanza di cui all'articolo 143-ter del codice deve essere fatta dinanzi all'ufficiale di stato civile del luogo dove la rinunziante risiede, ed e' trascritta nei registri di cittadinanza.</p>\n<p>Qualora la rinunziante risieda all'estero, la rinunzia deve essere fatta dinanzi all'agente diplomatico o consolare del luogo di residenza. L'agente la trascrive in apposito registro e ne rimette immediatamente copia al Ministero dell'interno che ne cura, a mezzo dell'autorita' competente, la trascrizione nei registri di cittadinanza.</p>","notesHtml":""},{"id":"art_37","numText":"Art. 37","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"L'iscrizione nel registro previsto nell'articolo 314 del codice si esegue senza spese. \n \n L'iscrizione della sentenza che revoca la adozione deve essere altresi' annotata in margine all'iscrizione del decreto di adozione","contentHtml":"","notesHtml":""},{"id":"art_37","numText":"Art. 37-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"I figli maggiorenni portatori di handicap grave previsti dall'articolo 337-septies, secondo comma, del codice civile, sono coloro i quali siano portatori di handicap ai sensi dell'articolo 3, comma 3, della legge 5 febbraio 1992, n. 104.","contentHtml":"","notesHtml":""},{"id":"art_38","numText":"Art. 38","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Sono di competenza del tribunale per i minorenni i procedimenti previsti dagli articoli 84, 90, 250, ultimo comma, 251, 317-bis, ultimo comma, 330, 332, 333, 334, 335 e 371, ultimo comma, del codice civile. Sono di competenza del tribunale ordinario i procedimenti previsti dagli articoli 330, 332, 333, 334 e 335 del codice civile, anche se instaurati su ricorso del pubblico ministero, quando e' gia' pendente o e' instaurato successivamente, tra le stesse parti, giudizio di separazione, scioglimento o cessazione degli effetti civili del matrimonio, ovvero giudizio ai sensi degli articoli 250, quarto comma, 268, 277, secondo comma, e 316 del codice civile, dell'articolo 710 del codice di procedura civile e dell'articolo 9 della legge 1° dicembre 1970, n. 898. In questi casi il tribunale per i minorenni, d'ufficio o su richiesta di parte, senza indugio e comunque entro il termine di quindici giorni dalla richiesta, adotta tutti gli opportuni provvedimenti temporanei e urgenti nell'interesse del minore e trasmette gli atti al tribunale ordinario, innanzi al quale il procedimento, previa riunione, continua. I provvedimenti adottati dal tribunale per i minorenni conservano la loro efficacia fino a quando sono confermati, modificati o revocati con provvedimento emesso dal tribunale ordinario. Il pubblico ministero della procura della Repubblica presso il tribunale per i minorenni, nei casi di trasmissione degli atti dal tribunale per i minorenni al tribunale ordinario, provvede alla trasmissione dei propri atti al pubblico ministero della procura della Repubblica presso il tribunale ordinario. (47) (50)(51)</p>\n<p>Il tribunale per i minorenni e' competente per i procedimenti previsti dagli articoli 473-bis.38 e 473-bis.39 del codice di procedura civile, quando e' gia' pendente o e' instaurato successivamente, tra le stesse parti, un procedimento previsto dagli articoli 330, 332, 333, 334 e 335 del codice civile. Nei casi in cui e' gia' pendente o viene instaurato autonomo procedimento ai sensi degli articoli 473-bis.38 e 473-bis.39 del codice di procedura civile davanti al tribunale ordinario, quest'ultimo, d'ufficio o a richiesta di parte, senza indugio e comunque non oltre quindici giorni dalla richiesta, adotta tutti gli opportuni provvedimenti temporanei e urgenti nell'interesse del minore e trasmette gli atti al tribunale per i minorenni, innanzi al quale il procedimento, previa riunione, continua. I provvedimenti adottati dal tribunale ordinario conservano la loro efficacia fino a quando sono confermati, modificati o revocati con provvedimento emesso dal tribunale per i minorenni. (47) (50) (51) <sup class=\"amd\">54</sup></p>\n<p>Sono emessi dal tribunale ordinario i provvedimenti relativi ai minori per i quali non e' espressamente stabilita la competenza di una diversa autorita' giudiziaria. PERIODO SOPPRESSO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N.\n197.</p>\n<p>Quando il tribunale per i minorenni procede ai sensi dell'articolo 737 del codice di procedura civile, il reclamo si propone davanti alla sezione di corte di appello per i minorenni. (30) (50)(51)</p>","notesHtml":"<p>AGGIORNAMENTO (30)</p>\n<p>La L. 10 dicembre 2012, n. 219 ha disposto (con l'art. 4, comma 1) che &quot;Le disposizioni di cui all'articolo 3 si applicano ai giudizi instaurati a decorrere dalla data di entrata in vigore della presente legge&quot;.</p>\n<p>AGGIORNAMENTO (47)</p>\n<p>La L. 26 novembre 2021, n. 206, ha disposto (con l'art. 1, comma 37) che &quot;Le disposizioni dei commi da 27 a 36 del presente articolo si applicano ai procedimenti instaurati a decorrere dal centottantesimo giorno successivo alla data di entrata in vigore della presente legge&quot;.</p>\n<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 2, comma 1, lettera a che nel primo comma, secondo periodo del presente articolo le parole «o dell'articolo 710 del codice di procedura civile e dell'articolo 9 della legge 1° dicembre 1970, n. 898» sono sostituite dalle seguenti: «procedimento per la modifica delle condizioni dettate da precedenti provvedimenti a tutela del minore». \n Ha inoltre disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_38","numText":"Art. 38-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"","notesHtml":""},{"id":"art_38","numText":"Art. 38-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nei procedimenti riguardanti l'affidamento dei minori e l'esercizio della responsabilita' genitoriale non possono assumere l'incarico di tutore, curatore, curatore speciale, consulente tecnico d'ufficio o svolgere funzioni di assistente sociale coloro che rivestono, o hanno rivestito nei due anni antecedenti, cariche rappresentative in strutture o comunita' pubbliche o private presso le quali sono inseriti i minori, o partecipano alla gestione delle medesime strutture, o prestano a favore di esse attivita' professionale, anche a titolo gratuito, o fanno parte degli organi sociali di societa' che le gestiscono.</p>\n<p>Il divieto previsto dal primo comma si applica anche a coloro il cui coniuge, parte dell'unione civile, convivente o parente entro il quarto grado svolge, o ha svolto nei due anni antecedenti, le funzioni di cui al primo comma. \n (50)<sup class=\"amd\">51</sup></p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_39","numText":"Art. 39","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DALLA L. 9 GENNAIO 2004, N. 6","contentHtml":"","notesHtml":""},{"id":"art_40","numText":"Art. 40","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La domanda per l'interdizione del minore emancipato e quella per l'interdizione o l'inabilitazione del minore nell'ultimo anno della minore eta' devono essere proposte davanti al tribunale per i minorenni.</p>","notesHtml":""},{"id":"art_41","numText":"Art. 41","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"","notesHtml":""},{"id":"art_42","numText":"Art. 42","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I provvedimenti indicati nell'art. 423 del codice e le sentenze di revoca previste nell'art. 429 del codice stesso devono essere trasmessi in copia in carta libera, entro dieci giorni dalla pubblicazione, al giudice tutelare a cura del cancelliere dell'autorita' giudiziaria che li ha pronunziati.</p>","notesHtml":""},{"id":"art_43","numText":"Art. 43","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I provvedimenti del giudice tutelare sono emessi con decreto.</p>\n<p>Nei casi urgenti la richiesta di un provvedimento puo' essere fatta al giudice anche verbalmente.</p>","notesHtml":""},{"id":"art_44","numText":"Art. 44","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il giudice tutelare puo' convocare in qualunque momento il tutore, il protutore, il curatore e l'amministratore di sostegno allo scopo di chiedere informazioni, chiarimenti e notizie sulla gestione della tutela, della curatela o dell'amministrazione di sostegno, e di dare istruzioni inerenti agli interessi morali e patrimoniali del minore o del beneficiario.</p>","notesHtml":""},{"id":"art_45","numText":"Art. 45","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La competenza a decidere dei reclami avverso i decreti del giudice tutelare spetta al tribunale ordinario quando si tratta dei provvedimenti indicati negli articoli 320, 321, 372, 373, 374, 376, 386, 394 e 395 del codice. (50)<sup class=\"amd\">51</sup></p>\n<p>La competenza spetta al tribunale per i minorenni in tutti gli altri casi.</p>\n<p>Nell'ipotesi prevista nell'art. 386, ultimo comma, del codice l'autorita' giudiziaria competente provvede in sede contenziosa.</p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_46","numText":"Art. 46","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Tutti gli atti della procedura della tutela, compresi l'inventario, i conti annuali e il conto finale, sono esenti da tasse di bollo e di registro.</p>\n<p>Sono del pari esenti da tasse di bollo e di registro gli atti previsti nel titolo XI del libro I del codice.</p>","notesHtml":""},{"id":"art_46","numText":"Art. 46-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli atti e i provvedimenti relativi ai procedimenti previsti dal titolo XII del libro primo del codice non sono soggetti all'obbligo di registrazione e sono esenti dal contributo unificato previsto dall'articolo 9 del testo unico delle disposizioni legislative e regolamentari in materia di spese di giustizia, di cui al decreto del Presidente della Repubblica 30 maggio 2002, n. 115.</p>","notesHtml":""},{"id":"art_47","numText":"Art. 47","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Presso l'ufficio del giudice tutelare sono tenuti un registro delle tutele dei minori e degli interdetti, un registro delle curatele dei minori, dei minori emancipati e degli inabilitati ed un registro delle amministrazioni di sostegno. \n (50)<sup class=\"amd\">51</sup></p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_48","numText":"Art. 48","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nel registro delle tutele, in un capitolo speciale per ciascuna di esse, si devono annotare a cura del cancelliere:</p>\n<p>il giorno in cui si e' aperta la tutela;</p>\n<p>la data e gli estremi essenziali della sentenza che ha pronunziato la interdizione se trattasi di interdetti;</p>\n<p>il nome, il cognome, la condizione e il domicilio del tutore e del protutore, la data della loro nomina e della prestazione del giuramento da parte del tutore;</p>\n<p>le risultanze dell'inventario e del conto annuale;</p>\n<p>l'esonero e la rimozione del tutore o del protutore e in generale tutti i provvedimenti che portano modificazioni allo stato personale e patrimoniale della persona sottoposta a tutela;</p>\n<p>la chiusura della tutela e la menzione del provvedimento che ne ha provocato la chiusura;</p>\n<p>le risultanze del rendiconto definitivo.</p>","notesHtml":""},{"id":"art_49","numText":"Art. 49","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nel registro delle curatele, in un capitolo speciale per ciascuna di esse, si devono annotare a cura del cancelliere: \n a) la data e gli estremi essenziali del provvedimento che concede l'emancipazione o della sentenza che pronuncia l'inabilitazione o del provvedimento che dispone la nomina del curatore del minore ai sensi dell'articolo 473-bis.7, secondo comma, del codice di procedura civile; \n b) il nome, il cognome, la condizione, l'eta' e il domicilio del minore o della persona emancipata o inabilitata; \n c) il nome, il cognome, la condizione e il domicilio del curatore nominato al minore, all'emancipato, o all'inabilitato; \n d) la data del provvedimento che revoca la nomina del curatore del minore ai sensi dell'articolo 473-bis.7, secondo comma, del codice di procedura civile o l'emancipazione, o della sentenza che revoca l'inabilitazione. \n (50)<sup class=\"amd\">51</sup></p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_49","numText":"Art. 49-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Nel registro delle amministrazioni di sostegno, in un capitolo speciale per ciascuna di esse, si devono annotare a cura del cancelliere: \n 1","contentHtml":"<p>la data e gli estremi essenziali del provvedimento che dispone l'amministrazione di sostegno, e di ogni altro provvedimento assunto dal giudice nel corso della stessa, compresi quelli emanati in via d'urgenza ai sensi dell'articolo 405 del codice; \n 2) le complete generalita' della persona beneficiaria; \n 3) le complete generalita' dell'amministratore di sostegno o del legale rappresentante del soggetto che svolge la relativa funzione, quando non si tratta di persona fisica; \n 4) la data e gli estremi essenziali del provvedimento che dispone la revoca o la chiusura dell'amministrazione di sostegno.</p>","notesHtml":""},{"id":"art_50","numText":"Art. 50","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il cancelliere e' responsabile della tenuta dei registri, che sono da lui numerati e vidimati prima di essere posti in uso. \n (18) <sup class=\"amd\">20</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>"},{"id":"art_51","numText":"Art. 51","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Nei registri delle tutele e delle curatele devono essere annotati, in capitoli speciali per ciascun minore, i provvedimenti emanati dal tribunale per i minorenni e dal tribunale ordinario ai sensi degli articoli 252, 262, 279, 316, 317-bis, 330, 332, 333, 334 e 335 del codice, e delle altre disposizioni della legge speciale che prevedono la nomina del tutore. (50)<sup class=\"amd\">51</sup></p>\n<p>A tal fine la cancelleria del tribunale che ha emesso il provvedimento deve trasmetterne copia in carta libera entro dieci giorni all'ufficio del giudice tutelare del luogo in cui il minore ha il domicilio per la prescritta annotazione.</p>","notesHtml":"<p>AGGIORNAMENTO (50)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (51)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_51","numText":"Art. 51-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I provvedimenti previsti negli articoli 485, primo comma, 508, primo comma, 509, primo comma, 517, secondo comma, 528, primo comma, 529, 530, primo comma, 730, primo comma, del codice sono adottati dal tribunale in composizione monocratica. \n (18) (20) <sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>\n<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che le modifiche di cui al comma 1 del presente articolo entrano in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che le modifiche di cui al comma 1 del presente articolo entrano in vigore il 31 ottobre 2026.</p>"},{"id":"art_52","numText":"Art. 52","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Presso la cancelleria di ogni tribunale e' tenuto, a cura del cancelliere, il registro delle successioni. (18) <sup class=\"amd\">20</sup></p>\n<p>In questo registro sono inseriti gli estremi degli atti e delle dichiarazioni indicati dalla legge. L'inserzione e' fatta di ufficio dal cancelliere, se si tratta di dichiarazioni da lui ricevute o di provvedimenti del tribunale; su istanza della parte e dietro produzione di copia autentica dell'atto, negli altri casi. (18) <sup class=\"amd\">20</sup></p>\n<p>Il registro e' diviso in tre parti. Nella prima sono registrati le dichiarazioni di accettazione dell'eredita' con beneficio d'inventario e tutti gli atti e le indicazioni relativi al beneficio d'inventario e all'amministrazione e liquidazione delle eredita' beneficiate, comprese le nomine del curatore previste dagli articoli 508 e 509 del codice e la menzione della pubblicazione dell'invito ai creditori per la presentazione delle dichiarazioni di credito. Nella seconda sono registrate le dichiarazioni di rinunzia all'eredita'.\nNella terza sono registrati i provvedimenti di nomina dei curatori delle eredita' giacenti, nonche' gli atti relativi alla curatela e le dichiarazioni di accettazione o di rinunzia degli esecutori testamentari.</p>\n<p>Il registro deve essere alla fine munito di una rubrica alfabetica contenente l'indicazione del nome delle persone la cui successione si e' aperta e il riferimento alla pagina nella quale sono contenute le diverse indicazioni.</p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>"},{"id":"art_53","numText":"Art. 53","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il registro, prima di essere posto in uso, deve essere numerato e vidimato in ciascun foglio dal cancelliere. Nell'ultima pagina il cancelliere indica il numero dei fogli di cui esso e' composto. (18) <sup class=\"amd\">20</sup></p>\n<p>Il registro puo' essere esaminato da chiunque ne faccia domanda e la cancelleria deve rilasciare gli estratti e i certificati che sono richiesti.</p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>"},{"id":"art_54","numText":"Art. 54","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>I creditori e i legatari non separatisti, se hanno proposto domanda giudiziale allo scopo di far valere sugli immobili separati il diritto loro attribuito dal secondo comma dell'art. 514 del codice, possono fare annotare tale domanda in margine all'iscrizione in separazione.</p>\n<p>Eseguita l'annotazione della domanda di concorso, il vincolo della separazione non puo' cessare se non col consenso di coloro che hanno eseguito l'annotazione, salvo che la loro pretesa sia stata giudizialmente esclusa.</p>","notesHtml":""},{"id":"art_55","numText":"Art. 55","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le copie dei verbali e dei testamenti, che sono trasmesse alla cancelleria del tribunale secondo l'art. 622 del codice, devono, a cura del cancelliere, essere raccolte in appositi volumi e annotate in una rubrica alfabetica generale. Le copie possono essere esaminate da chiunque ne faccia richiesta. (18) <sup class=\"amd\">20</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>"},{"id":"art_56","numText":"Art. 56","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Il provvedimento dell'autorita' amministrativa con il quale si dispone che si proceda all'espropriazione a norma dell'art. 838 del codice e' dato con decreto motivato del ministro competente. Il decreto deve contenere la designazione precisa del bene soggetto a espropriazione e deve essere notificato all'interessato, il quale puo' impugnarlo con ricorso al consiglio di Stato.</p>\n<p>Si osservano nell'espropriazione, in quanto applicabili, le norme della legge generale sull'espropriazione per pubblica utilita'.</p>","notesHtml":""},{"id":"art_57","numText":"Art. 57","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Le azioni previste dall'articolo 849 del codice sono di competenza del tribunale, in quanto non siano di competenza del giudice di pace a norma dell'articolo 7, quarto comma, del codice di procedura civile.","contentHtml":"<p><sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>\n<p>Nel caso regolato dall'art. 849 il giudice fissa con ordinanza l'udienza per la comparizione del rappresentante dell'associazione professionale, il quale puo' delegare altra persona. Si osservano nel resto, in quanto applicabili, le disposizioni dettate dal codice di procedura civile per i consulenti tecnici.</p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 1 del presente articolo entra in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 1 del presente articolo entra in vigore il 31 ottobre 2026.</p>"},{"id":"art_57","numText":"Art. 57-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'autorizzazione prevista nell'articolo 915, primo comma, del codice e' data dal giudice di pace. \n (18) (20) <sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254&quot;.</p>\n<p>AGGIORNAMENTO (20)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999&quot;.</p>\n<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 1 del presente articolo entra in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che la modifica di cui al comma 1 del presente articolo entra in vigore il 31 ottobre 2026.</p>"},{"id":"art_58","numText":"Art. 58","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Le modalita' e gli effetti dell'affrancazione del fondo enfiteutico sono regolati dalle disposizioni della legge 11 giugno 1925 n. 998, e del R. decreto febbraio 1926 n. 426.</p>\n<p>Il prezzo di affrancazione puo' essere corrisposto anche in titoli del debito pubblico consolidato di qualsiasi specie, osservate, per la determinazione del loro valore, le disposizioni dell'art. 9 della legge anzidetta.</p>\n<p>Le disposizioni del primo comma del presente articolo si applicano anche alla riduzione in misura fissa dei canoni enfiteutici, dei censi e di altre prestazioni perpetue consistenti in una quota di prodotti naturali.</p>","notesHtml":""},{"id":"art_59","numText":"Art. 59","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La domanda per la nomina dell'amministratore o per la designazione dell'istituto di credito nei casi previsti dall'art. 1003 del codice, se non e' proposta in corso di giudizio, si propone con ricorso al presidente del tribunale: nel caso di nomina dell'amministratore, al presidente del tribunale del luogo in cui si trovano gli immobili o si trova la parte piu' rilevante di essi.</p>\n<p>Il presidente del tribunale provvede con decreto, sentita l'altra parte.</p>\n<p>Contro tale provvedimento si puo' proporre reclamo al presidente della corte d'appello nel termine di dieci giorni dalla notificazione.</p>","notesHtml":""},{"id":"art_60","numText":"Art. 60","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Gli uffici tecnici che devono essere sentiti a norma del terzo comma dell'art. 1092 del codice sono l'ufficio locale del genio civile e il locale ispettorato dell'agricoltura.</p>","notesHtml":""},{"id":"art_60","numText":"Art. 60-bis","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Le domande previste dall'articolo 1105, quarto comma, del codice si propongono con ricorso al giudice di pace.","contentHtml":"<p><sup class=\"amd\">34</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che le disposizioni del presente articolo entrano in vigore il 31 ottobre 2026.</p>"},{"id":"art_60","numText":"Art. 60-ter","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"Sull'impugnazione del regolamento e delle deliberazioni, di cui agli articoli 1107 e 1109 del codice, e' competente il giudice di pace.","contentHtml":"<p><sup class=\"amd\">34</sup>\n <sup class=\"amd\">37</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (37)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha disposto (con l'art. 32, comma 3) che le disposizioni del presente articolo entrano in vigore il 31 ottobre 2025.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che le disposizioni del presente articolo entrano in vigore il 31 ottobre 2026.</p>"},{"id":"art_61","numText":"Art. 61","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Qualora un edificio o un gruppo di edifici appartenenti per piani o porzioni di piano a proprietari diversi si possa dividere in parti che abbiano le caratteristiche di edifici autonomi, il condominio puo' essere sciolto e i comproprietari di ciascuna parte possono costituirsi in condominio separato.</p>\n<p>Lo scioglimento e' deliberato dall'assemblea con la maggioranza prescritta dal secondo comma dell'art. 1136 del codice, o e' disposto dall'autorita' giudiziaria su domanda di almeno un terzo dei comproprietari di quella parte dell'edificio della quale si chiede la separazione.</p>","notesHtml":""},{"id":"art_62","numText":"Art. 62","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>La disposizione del primo comma dell'articolo precedente si applica anche se restano in comune con gli originari partecipanti alcune delle cose indicate dall'art. 1117 del codice.</p>\n<p>Qualora la divisione non possa attuarsi senza modificare lo stato delle cose e occorrano opere per la sistemazione diversa dei locali o delle dipendenze tra i condomini, lo scioglimento del condominio deve essere deliberato dall'assemblea con la maggioranza prescritta dal quinto comma dell'art. 1136 del codice stesso.</p>","notesHtml":""},{"id":"art_63","numText":"Art. 63","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Per la riscossione dei contributi in base allo stato di ripartizione approvato dall'assemblea, l'amministratore, senza bisogno di autorizzazione di questa, puo' ottenere un decreto di ingiunzione immediatamente esecutivo, nonostante opposizione, ed e' tenuto a comunicare ai creditori non ancora soddisfatti che lo interpellino i dati dei condomini morosi.</p>\n<p>I creditori non possono agire nei confronti degli obbligati in regola con i pagamenti, se non dopo l'escussione degli altri condomini.</p>\n<p>In caso di mora nel pagamento dei contributi che si sia protratta per un semestre, l'amministratore puo' sospendere il condomino moroso dalla fruizione dei servizi comuni suscettibili di godimento separato.</p>\n<p>Chi subentra nei diritti di un condomino e' obbligato solidalmente con questo al pagamento dei contributi relativi all'anno in corso e a quello precedente.</p>\n<p>Chi cede diritti su unita' immobiliari resta obbligato solidalmente con l'avente causa per i contributi maturati fino al momento in cui e' trasmessa all'amministratore copia autentica del titolo che determina il trasferimento del diritto.</p>","notesHtml":""},{"id":"art_64","numText":"Art. 64","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Sulla revoca dell'amministratore, nei casi indicati dall'undicesimo comma dell'articolo 1129 e dal quarto comma dell'articolo 1131 del codice, il giudice di pace provvede in camera di consiglio, con decreto motivato, sentito l'amministratore in contraddittorio con il ricorrente. <sup class=\"amd\">34</sup>\n <sup class=\"amd\">55</sup>\n Contro il provvedimento del giudice di pace puo' essere proposto reclamo in tribunale entro dieci giorni dalla notificazione o dalla comunicazione.\n <sup class=\"amd\">34</sup>\n <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (34)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116 ha disposto (con l'art. 32, comma 5) che &quot;A decorrere dal 31 ottobre 2021 ai procedimenti civili contenziosi, di volontaria giurisdizione e di espropriazione forzata introdotti dinanzi al giudice di pace a norma dell'articolo 27 si applicano le disposizioni, anche regolamentari, in materia di processo civile telematico per i procedimenti di competenza del tribunale vigenti alla medesima data. Per i procedimenti di cui all'articolo 27, comma 1, lettera a), numero 1, lettera c), numero 2), e comma 3, lettera d), capoverso «Art. 60-bis», e lettera e), la disposizione del primo periodo si applica a decorrere dal 31 ottobre 2025&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 13 luglio 2017, n. 116, come modificato dal D.L. 8 agosto 2025, n. 117, convertito con modificazioni dalla L. 3 ottobre 2025, n. 148, ha disposto (con l'art. 32, comma 3) che le modifiche di cui ai commi 1 e 2 del presente articolo entrano in vigore il 31 ottobre 2026.</p>"},{"id":"art_65","numText":"Art. 65","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Quando per qualsiasi causa manca il legale rappresentante dei condomini, chi intende iniziare o proseguire una lite contro i partecipanti a un condominio puo' richiedere la nomina di un curatore speciale ai sensi dell'art. 80 del codice di procedura civile.</p>\n<p>Il curatore speciale deve senza indugio convocare l'assemblea dei condomini per avere istruzioni sulla condotta della lite.</p>","notesHtml":""},{"id":"art_66","numText":"Art. 66","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>L'assemblea, oltre che annualmente in via ordinaria per le deliberazioni indicate dall'art. 1135 del codice, puo' essere convocata in via straordinaria dall'amministratore quando questi lo ritiene necessario o quando ne e' fatta richiesta da almeno due condomini che rappresentino un sesto del valore dell'edificio.\nDecorsi inutilmente dieci giorni dalla richiesta, i detti condomini possono provvedere direttamente alla convocazione.</p>\n<p>In mancanza dell'amministratore, l'assemblea tanto ordinaria quanto straordinaria puo' essere convocata a iniziativa di ciascun condomino.</p>\n<p>L'avviso di convocazione, contenente specifica indicazione dell'ordine del giorno, deve essere comunicato almeno cinque giorni prima della data fissata per l'adunanza in prima convocazione, a mezzo di posta raccomandata, posta elettronica certificata, fax o tramite consegna a mano, e deve contenere l'indicazione del luogo e dell'ora della riunione o, se prevista in modalita' di videoconferenza, della piattaforma elettronica sulla quale si terra' la riunione e dell'ora della stessa. In caso di omessa, tardiva o incompleta convocazione degli aventi diritto, la deliberazione assembleare e' annullabile ai sensi dell'articolo 1137 del codice su istanza dei dissenzienti o assenti perche' non ritualmente convocati.</p>\n<p>L'assemblea in seconda convocazione non puo' tenersi nel medesimo giorno solare della prima.</p>\n<p>L'amministratore ha facolta' di fissare piu' riunioni consecutive in modo da assicurare lo svolgimento dell'assemblea in termini brevi, convocando gli aventi diritto con un unico avviso nel quale sono indicate le ulteriori date ed ore di eventuale prosecuzione dell'assemblea validamente costituitasi.</p>\n<p>Anche ove non espressamente previsto dal regolamento condominiale, previo consenso della maggioranza dei condomini, la partecipazione all'assemblea puo' avvenire in modalita' di videoconferenza. In tal caso, il verbale, redatto dal segretario e sottoscritto dal presidente, e' trasmesso all'amministratore e a tutti i condomini con le medesime formalita' previste per la convocazione.</p>","notesHtml":""},{"id":"art_67","numText":"Art. 67","group":"Disposizioni per l'attuazione del Codice Civile e disposizioni transitorie","heading":"","contentHtml":"<p>Ogni condomino puo' intervenire all'assemblea anche a mezzo di rappresentante, munito di delega scritta. Se i condomini sono piu' di venti, il delegato non puo' rappresentare piu' di un quinto dei condomini e del valore proporzionale.</p>\n<p>Qualora un'unita' immobiliare appartenga in proprieta' indivisa a piu' persone, queste hanno diritto a un solo rappresentante nell'assemblea, che e' designato dai comproprietari interessati a norma dell'articolo 1106 del codice.</p>\n<p>Nei casi di cui all'articolo 1117-bis del codice, quando i partecipanti sono complessivamente piu' di sessanta, ciascun condominio deve designare, con la maggioranza di cui all'articolo 1136, quinto comma, del codice, il proprio rappresentante all'assemblea per la gestione ordinaria delle parti comuni a piu' condominii e per la nomina dell'amministratore. In mancanza, ciascun partecipante puo' chiedere che l'autorita' giudiziaria nomini il rappresentante del proprio condominio. Qualora alcuni dei condominii interessati non abbiano nominato il proprio rappresentante, l'autorita' giudiziaria provvede alla nomina su ricorso anche di uno solo dei rappresentanti gia' nominati, previa diffida a provvedervi entro un congruo termine. La diffida ed il ricorso all'autorita' giudiziaria sono notificati al condominio cui si riferiscono in persona dell'amministratore o, in mancanza, a tutti i condomini.</p>\n<p>Ogni limite o condizione al potere di rappresentanza si considera non apposto. Il rappresentante risponde con le regole del mandato e comunica tempestivamente all'amministratore di ciascun condominio l'ordine del giorno e le decisioni assunte dall'assemblea dei rappresentanti dei condominii. L'amministratore riferisce in assemblea.</p>\n<p>All'amministratore non possono essere conferite deleghe per la partecipazione a qualunque assemblea.</p>\n<p>L'usufruttuario di un piano o porzione di piano dell'edificio esercita il diritto di voto negli affari che attengono all'ordinaria amministrazione e al semplice godimento delle cose e dei servizi comuni.</p>\n<p>Nelle altre deliberazioni, il diritto di voto spetta ai proprietari, salvi i casi in cui l'usufruttuario intenda avva
