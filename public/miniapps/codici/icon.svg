<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book base -->
  <g transform="translate(256,270)">
    <!-- Left page -->
    <path d="M-20,-120 Q-20,-130 -30,-130 L-130,-130 Q-140,-130 -140,-120 L-140,100 Q-140,110 -130,110 L-20,110 Z" fill="#e2e8f0"/>
    <!-- Right page -->
    <path d="M20,-120 Q20,-130 30,-130 L130,-130 Q140,-130 140,-120 L140,100 Q140,110 130,110 L20,110 Z" fill="#f1f5f9"/>
    <!-- Spine shadow -->
    <rect x="-20" y="-130" width="40" height="240" rx="4" fill="#cbd5e1"/>
    <!-- Left lines -->
    <line x1="-120" y1="-90" x2="-40" y2="-90" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="-60" x2="-40" y2="-60" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="-30" x2="-40" y2="-30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="0" x2="-70" y2="0" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="30" x2="-40" y2="30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="60" x2="-40" y2="60" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <!-- Right lines -->
    <line x1="40" y1="-90" x2="120" y2="-90" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="-60" x2="120" y2="-60" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="-30" x2="120" y2="-30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="90" y2="0" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="30" x2="120" y2="30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="60" x2="120" y2="60" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <!-- Section symbol -->
    <text x="0" y="-155" text-anchor="middle" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="#c9a227">§</text>
  </g>
</svg>
