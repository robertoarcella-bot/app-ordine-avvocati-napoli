<!DOCTYPE html>
<html lang="it">
<head>

<title>Disp. Att. c.p.c. – Codici Italiani</title>
<meta name="description" content="Disposizioni per l'attuazione del Codice di Procedura Civile e disposizioni transitorie.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root { --code-color: #148f77; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 300px;
  --header-h: 58px;
  --sidebar-bg: #003F7F;
  --sidebar-hover: rgba(255,255,255,.12);
  --sidebar-active-bg: rgba(255,255,255,.20);
  --sidebar-text: #ffffff;
  --sidebar-muted: #d6e2f4;
  --sidebar-border: rgba(255,255,255,.18);
  --main-bg: #f7f8fc;
  --article-bg: #ffffff;
  --text: #1a1d2e;
  --muted: #6b7280;
  --border: #e4e7f0;
  --accent: var(--code-color, #2471a3);
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: "SF Mono", Consolas, "Courier New", monospace;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--main-bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── HEADER ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--sidebar-border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  z-index: 100;
}
.site-logo {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.site-logo:hover { color: #dce8ff; }
.header-sep { width: 1px; height: 28px; background: var(--sidebar-border); }
.header-title {
  font-size: .875rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.header-vigenza {
  font-size: .75rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  background: rgba(255,255,255,.06);
  padding: 3px 10px;
  border-radius: 20px;
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--sidebar-text);
  border-radius: 2px;
  transition: all .2s;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform .25s ease;
}
.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px;
  color: #fff;
  font-size: .82rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input::placeholder { color: var(--sidebar-muted); }
.sidebar-search input:focus { border-color: rgba(255,255,255,.3); }
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

.group-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sidebar-muted);
  padding: 14px 16px 6px;
}
.art-link {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
}
.art-link:hover { background: var(--sidebar-hover); }
.art-link.active {
  background: var(--sidebar-active-bg);
  border-left-color: var(--accent);
}
.art-link.hidden { display: none; }
.art-num {
  font-size: .78rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 56px;
  flex-shrink: 0;
}
.art-heading-mini {
  font-size: .78rem;
  color: var(--sidebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: .85;
}
.art-link.active .art-heading-mini { opacity: 1; }

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── ARTICLE CARD ── */
.article-card {
  background: var(--article-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 820px;
  width: 100%;
  padding: 44px 52px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.article-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: color-mix(in srgb, var(--accent) 10%, white);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 18px;
}
.article-num {
  font-family: var(--sans);
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 6px;
}
.article-heading {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.85;
  color: var(--text);
}
.article-body p {
  margin-bottom: 1.1em;
  text-align: justify;
  hyphens: auto;
}
.article-body p:last-child { margin-bottom: 0; }
.para-num {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 700;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, white);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  vertical-align: middle;
}
mark.ins {
  background: color-mix(in srgb, #2980b9 12%, white);
  color: #1a5276;
  border-radius: 2px;
  padding: 0 2px;
  font-style: italic;
}

/* Notes / Aggiornamento */
.article-notes {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}
.notes-toggle {
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.notes-toggle::before { content: '▶'; font-size: .6em; transition: transform .2s; }
.notes-toggle.open::before { transform: rotate(90deg); }
.notes-body {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.notes-body.visible { display: block; }
.notes-body p { margin-bottom: .7em; }

/* ── NAV FOOTER ── */
.nav-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 820px;
  width: 100%;
  margin-top: 20px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.article-counter {
  font-size: .8rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  max-width: 820px;
  width: 100%;
}
.empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .hamburger { display: flex; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,.4);
  }
  .main-content {
    margin-left: 0;
    padding: 20px 12px 60px;
  }
  .article-card { padding: 28px 22px; }
  .article-num { font-size: 1.5rem; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 49;
    display: none;
  }
  .overlay.visible { display: block; }
}

/* ── ACTION BUTTONS (WA + COPY) ── */
.article-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.action-btn:hover {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}
.action-btn.wa-btn:hover {
  background: #25D366;
  border-color: #25D366;
}
.action-btn .action-icon {
  font-size: 1rem;
  line-height: 1;
}
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  opacity: 0;
  transition: all .3s ease;
  z-index: 9999;
  pointer-events: none;
}
.copy-toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── SCROLLBAR ── */
* { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }

</style>
</head>

<script>const CODE = {
  title: "Disposizioni di Attuazione del Codice di Procedura Civile",
  shortTitle: "Disp. Att. c.p.c.",
  slug: "disp-att-codice-procedura-civile",
  vigenza: "26/11/2024",
  color: "#148f77",
  articles: [{"id":"art_1","numText":"Art. 1","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Richiesta di comunicazione degli atti","contentHtml":"<p>In ogni stato e grado del processo il pubblico ministero puo' richiedere al giudice la comunicazione degli atti per l'esercizio dei poteri a lui attribuiti dalla legge.</p>","notesHtml":""},{"id":"art_2","numText":"Art. 2","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Intervento davanti all'istruttore","contentHtml":"<p>L'intervento del pubblico ministero davanti all'istruttore avviene nei modi previsti nell'art. 267 del Codice.</p>","notesHtml":""},{"id":"art_3","numText":"Art. 3","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Intervento davanti al collegio","contentHtml":"<p>Il pubblico ministero puo' spiegare il suo intervento anche quando la causa si trova davanti al collegio, mediante comparsa da depositarsi in cancelleria o all'udienza. <sup class=\"amd\">59</sup></p>\n<p>Il pubblico ministero che interviene all'udienza prende oralmente le sue conclusioni, che sono riportate a verbale. <sup class=\"amd\">59</sup></p>\n<p>Se il pubblico ministero che interviene davanti al collegio non si limita ad aderire alle conclusioni di una delle parti, ma prende proprie conclusioni, produce documenti o deduce prove, il presidente, d'ufficio o su istanza di parte, puo' rimettere con ordinanza la causa al giudice istruttore per l'integrazione dell'istruzione.</p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_4","numText":"Art. 4","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Albo degli esperti","contentHtml":"<p>Presso ogni corte d'appello e' istituito un albo di esperti per la composizione della magistratura del lavoro.</p>\n<p>L'albo e' diviso in categorie secondo i rami delle attivita' economiche esercitate nella circoscrizione della corte.</p>","notesHtml":""},{"id":"art_5","numText":"Art. 5","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Formazione dell'albo","contentHtml":"<p>L'albo e' tenuto dal primo presidente della corte d'appello ed e' formato da un comitato da lui presieduto e composto dal procuratore generale del Re Imperatore e dal presidente della sezione della corte funzionante come magistratura del lavoro.</p>\n<p>Le funzioni di segretario del comitato sono esercitate dal cancelliere della corte.</p>","notesHtml":""},{"id":"art_6","numText":"Art. 6","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Proposte d'iscrizione","contentHtml":"<p>Le iscrizioni nell'albo sono fatte su proposta per ciascuna provincia dei consigli provinciali delle corporazioni.</p>\n<p>Se non sono fatte proposte di esperti per una categoria, il comitato puo' provvedere direttamente all'iscrizione di coloro che hanno i requisiti indicati nell'articolo seguente.</p>","notesHtml":""},{"id":"art_7","numText":"Art. 7","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Requisiti per l'iscrizione","contentHtml":"<p>Possono essere iscritti nell'albo coloro che hanno particolare competenza in materia di produzione e di lavoro e:</p>\n<p>1) sono cittadini italiani, di razza italiana;</p>\n<p>2) hanno compiuto il venticinquesimo anno di eta';</p>\n<p>3) sono forniti di laurea universitaria o di altro titolo equipollente;</p>\n<p>4) sono di condotta morale e politica specchiata.</p>\n<p>Possono essere iscritti, anche se sforniti del titolo di studio, coloro che, per l'esercizio effettivo di una determinata attivita', hanno in questa acquistato singolare perizia.</p>\n<p>La qualita' di impiegato dello Stato o di altri enti pubblici non impedisce l'iscrizione nell'albo.</p>","notesHtml":""},{"id":"art_8","numText":"Art. 8","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Revisione dell'albo","contentHtml":"<p>L'albo e' permanente. Esso e' riveduto ogni biennio dal comitato previsto nell'articolo 5.</p>\n<p>Il primo presidente della corte d'appello invita i consigli provinciali delle corporazioni a fare le loro proposte, e quindi il comitato procede alla revisione, iscrivendo i nuovi proposti ed eliminando gli iscritti per i quali e' venuto meno alcuno dei requisiti previsti nell'articolo precedente o e' sorto un impedimento a esercitare l'ufficio.</p>","notesHtml":""},{"id":"art_9","numText":"Art. 9","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ruolo degli esperti","contentHtml":"<p>Al principio di ogni anno il primo presidente della corte d'appello, sentito il presidente della sezione funzionante come magistratura del lavoro, forma, per ciascuna categoria di iscritti nell'albo, il ruolo degli esperti che debbono concorrere durante l'anno a comporre il collegio.</p>\n<p>Il primo presidente puo' revocare per gravi motivi l'iscrizione nel ruolo dell'esperto che ne faccia istanza.</p>","notesHtml":""},{"id":"art_10","numText":"Art. 10","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Composizione del collegio giudicante","contentHtml":"<p>Per ogni causa il primo presidente designa con decreto a comporre il collegio giudicante due esperti scelti nel ruolo di cui all'articolo precedente, salvo che per motivi eccezionali debba fare la scelta fuori del ruolo tra gli iscritti nell'albo.</p>\n<p>Il cancelliere da' comunicazione del decreto ai designati e li invita a presentarsi davanti al presidente della magistratura del lavoro nel giorno e nel luogo da questo fissati.</p>","notesHtml":""},{"id":"art_11","numText":"Art. 11","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Astensione e ricusazione degli esperti","contentHtml":"<p>Per l'astensione e per la ricusazione degli esperti si applicano le disposizioni degli articoli 51 e seguenti del codice. La ricusazione puo' essere proposta anche per gravi ragioni di convenienza.</p>\n<p>Agli effetti dell'applicazione degli articoli indicati nel comma precedente gli esperti sono considerati consiglieri d'appello.</p>","notesHtml":""},{"id":"art_12","numText":"Art. 12","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Indennita' dovute agli esperti","contentHtml":"<p>Gli esperti chiamati a comporre la magistratura del lavoro hanno diritto ad una indennita' di lire cento per ogni giorno di effettivo esercizio delle funzioni del collegio; ad essi inoltre spettano le indennita' di trasferta e di soggiorno stabilite per i consiglieri di cori d'appello.</p>","notesHtml":""},{"id":"art_12","numText":"Art. 12-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dei mediatori familiari","contentHtml":"<p>Presso ogni tribunale e' istituito un elenco di mediatori familiari.</p>\n<p>L'elenco e' tenuto con modalita' informatiche in conformita' alle specifiche tecniche stabilite dal direttore dei sistemi informativi automatizzati del Ministero della giustizia e pubblicate nella Gazzetta Ufficiale della Repubblica italiana.\n <sup class=\"amd\">59</sup> \n (54) (55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 9) che &quot;Le disposizioni di cui agli articoli 4, comma 1, e 10, comma 1, hanno effetto a decorrere dal 30 giugno 2023&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_12","numText":"Art. 12-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Formazione e revisione dell'elenco","contentHtml":"<p>L'elenco e' tenuto dal presidente del tribunale ed e' formato da un comitato da lui presieduto e composto dal procuratore della Repubblica e da un mediatore familiare, designato dalle associazioni professionali di mediatori familiari inserite nell'elenco tenuto presso il Ministero dello sviluppo economico, che esercita la propria attivita' nel circondario del tribunale.</p>\n<p>Le funzioni di segretario del comitato sono esercitate dal cancelliere del tribunale.</p>\n<p>L'elenco e' permanente. Ogni quattro anni il comitato provvede alla sua revisione per eliminare coloro per i quali e' venuto meno alcuno dei requisiti previsti nell'articolo 12-quater o e' sorto un impedimento a esercitare l'ufficio.</p>\n<p>Si applicano gli articoli 19, 20 e 21, in quanto compatibili. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 9) che &quot;Le disposizioni di cui agli articoli 4, comma 1, e 10, comma 1, hanno effetto a decorrere dal 30 giugno 2023&quot;.</p>"},{"id":"art_12","numText":"Art. 12-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Iscrizione nell'elenco","contentHtml":"<p>Possono chiedere l'iscrizione nell'elenco coloro che sono iscritti da almeno cinque anni a una delle associazioni professionali di mediatori familiari inserite nell'elenco tenuto presso il Ministero dello sviluppo economico, sono forniti di adeguata formazione e di specifica competenza nella disciplina giuridica della famiglia nonche' in materia di tutela dei minori e di violenza domestica e di genere e sono di condotta morale specchiata.</p>\n<p>Sulle domande di iscrizione decide il comitato previsto dall'articolo 12-ter. Contro il provvedimento del comitato e' ammesso reclamo, entro quindici giorni dalla notificazione, al comitato previsto nell'articolo 5. \n (54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 9) che &quot;Le disposizioni di cui agli articoli 4, comma 1, e 10, comma 1, hanno effetto a decorrere dal 30 giugno 2023&quot;.</p>"},{"id":"art_12","numText":"Art. 12-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Domande di iscrizione","contentHtml":"<p>Coloro che aspirano all'iscrizione nell'elenco devono presentare domanda al presidente del tribunale, corredata dai seguenti documenti:</p>\n<p>1) estratto dell'atto di nascita;</p>\n<p>2) certificato generale del casellario giudiziario di data non anteriore a tre mesi dalla presentazione;</p>\n<p>3) certificato di residenza nella circoscrizione del tribunale;</p>\n<p>4) attestazione rilasciata dall'associazione professionale ai sensi dell'articolo 7 della legge 14 gennaio 2013, n. 4;</p>\n<p>5) i titoli e i documenti che l'aspirante intende allegare per dimostrare la sua formazione e specifica competenza.</p>\n<p>Gli stati, le qualita' personali e i fatti di cui al primo comma, numeri 1), 2) e 3) possono essere comprovati con dichiarazioni sostitutive di certificazioni ai sensi dell'articolo 46 del decreto del Presidente della Repubblica 28 dicembre 2000, n. 445. Il comitato di cui all'articolo 12-ter effettua i controlli previsti dall'articolo 71 del citato decreto. Il presidente procede in ogni caso ai sensi dell'articolo 17.\n <sup class=\"amd\">59</sup> \n (54) (55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 9) che &quot;Le disposizioni di cui agli articoli 4, comma 1, e 10, comma 1, hanno effetto a decorrere dal 30 giugno 2023.&quot;</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_12","numText":"Art. 12-sexies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Disciplina dell'attivita' di mediatore","contentHtml":"<p>L'attivita' professionale del mediatore familiare, la sua formazione, le regole deontologiche e le tariffe applicabili sono regolate con decreto del Ministro dello sviluppo economico, di concerto con il Ministro della giustizia e con il Ministro dell'economia e delle finanze, nel rispetto delle disposizioni di cui alla legge 14 gennaio 2013, n. 4. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 9) che &quot;Le disposizioni di cui agli articoli 4, comma 1, e 10, comma 1, hanno effetto a decorrere dal 30 giugno 2023&quot;.</p>"},{"id":"art_13","numText":"Art. 13","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Albo dei consulenti tecnici","contentHtml":"<p>Presso ogni tribunale e' istituito un albo dei consulenti tecnici.</p>\n<p>L'albo e' diviso in categorie.</p>\n<p>COMMA ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164. <sup class=\"amd\">59</sup></p>\n<p>Con decreto del Ministro della giustizia, adottato di concerto con i Ministri dell'economia e delle finanze e dello sviluppo economico, sono stabilite le categorie dell'albo e i settori di specializzazione di ciascuna categoria. Con lo stesso decreto sono indicati i requisiti per l'iscrizione all'albo nonche' i contenuti e le modalita' della comunicazione ai fini della formazione, della tenuta e dell'aggiornamento dell'elenco nazionale di cui all'articolo 24-bis. (54) (55) <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_14","numText":"Art. 14","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Formazione dell'albo","contentHtml":"<p>L'albo e' tenuto dal presidente del tribunale ed e' formato da un comitato da lui presieduto e composto dal procuratore del Regno e da un professionista iscritto nell'albo professionale, designato dal consiglio dall'ordine o del collegio della categoria a cui appartiene il richiedente la iscrizione nell'albo dei consulenti tecnici.</p>\n<p>Il consiglio predetto ha facolta' di designare, quando lo ritenga opportuno, un professionista iscritto nell'albo di altro ordine o collegio, previa comunicazione al consiglio che tiene l'albo a cui appartiene il professionista stesso.</p>\n<p>Quando trattasi di domande presentate da periti estimatori, la designazione e' fatta dalla Camera di commercio, industria e agricoltura.</p>\n<p>Le funzioni di segretario del comitato sono esercitate dal cancelliere del tribunale.</p>","notesHtml":""},{"id":"art_15","numText":"Art. 15","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Iscrizione e permanenza nell'albo (54) <sup class=\"amd\">55</sup></p>\n<p>Possono ottenere l'iscrizione nell'albo coloro che rispettano i requisiti determinati con il decreto di cui all'articolo 13, quarto comma, sono di condotta morale e politica specchiata e sono iscritti nelle rispettive associazioni professionali.(54) <sup class=\"amd\">55</sup></p>\n<p>Con riferimento alla categoria di cui all'articolo 13, terzo comma, numero 7), la speciale competenza tecnica sussiste qualora ricorrano, alternativamente o congiuntamente, i seguenti requisiti: \n 1) comprovata esperienza professionale in materia di violenza domestica e nei confronti di minori; \n 2) possesso di adeguati titoli di specializzazione o approfondimento post-universitari in psichiatria, psicoterapia, psicologia dell'eta' evolutiva o psicologia giuridica o forense, purche' iscritti da almeno cinque anni nei rispettivi albi professionali; \n 3) aver svolto per almeno cinque anni attivita' clinica con minori presso strutture pubbliche o private. (53)</p>\n<p>Nessuno puo' essere iscritto in piu' di un albo.</p>\n<p>Sulle domande di iscrizione decide il comitato indicato nell'articolo precedente.</p>\n<p>Contro il provvedimento del comitato e' ammesso reclamo, entro quindici giorni dalla notificazione, al comitato previsto nell'articolo 5.</p>\n<p>Con il decreto di cui all'articolo 13, quarto comma, sono stabiliti, per ciascuna categoria, i requisiti per l'iscrizione, gli obblighi di formazione continua e gli altri obblighi da assolvere per il mantenimento dell'iscrizione, nonche' le modalita' per la verifica del loro assolvimento. (54) <sup class=\"amd\">55</sup></p>\n<p>Con lo stesso decreto sono stabiliti altresi' i casi di sospensione volontaria dall'albo. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (53)</p>\n<p>La L. 26 novembre 2021, n. 206, ha disposto (con l'art. 1, comma 37) che &quot;Le disposizioni dei commi da 27 a 36 del presente articolo si applicano ai procedimenti instaurati a decorrere dal centottantesimo giorno successivo alla data di entrata in vigore della presente legge&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_16","numText":"Art. 16","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Domande d'iscrizione","contentHtml":"<p>Coloro che aspirano all'iscrizione nell'albo debbono farne domanda al presidente del tribunale.</p>\n<p>La domanda deve essere corredata dai seguenti documenti:</p>\n<p>1) estratto dell'atto di nascita;</p>\n<p>2) certificato generale del casellario giudiziario di data non anteriore a tre mesi dalla presentazione;</p>\n<p>3) certificato di residenza nella circoscrizione del tribunale;</p>\n<p>4) certificato di iscrizione all'associazione professionale;</p>\n<p>5) i titoli e i documenti che l'aspirante crede di esibire per dimostrare la sua speciale capacita' tecnica; (54) (55)</p>\n<p>5-bis. gli ulteriori documenti richiesti ai sensi del decreto ministeriale di cui all'articolo 13, quarto comma. (54) (55)</p>\n<p>Gli stati, le qualita' personali e i fatti di cui al secondo comma, numeri 1), 2) e 3) possono essere comprovati con dichiarazioni sostitutive di certificazioni ai sensi dell'articolo 46 del decreto del Presidente della Repubblica 28 dicembre 2000, n. 445.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_17","numText":"Art. 17","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Informazioni","contentHtml":"<p>A cura del presidente del tribunale debbono essere assunte presso le autorita' politiche e di polizia specifiche informazioni sulla condotta pubblica e priva dell'aspirante.</p>","notesHtml":""},{"id":"art_18","numText":"Art. 18","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Revisione dell'albo","contentHtml":"<p>L'albo e' permanente. Ogni due anni anni il comitato di cui all'articolo 14 deve provvedere alla revisione dell'albo per eliminare i consulenti per i quali e' venuto meno alcuno dei requisiti previsti nell'articolo 15 o e' sorto un impedimento a esercitare l'ufficio. (54)<sup class=\"amd\">55</sup></p>\n<p>Contro il provvedimento di esclusione adottato dal comitato e' ammesso reclamo, entro quindici giorni dalla notificazione, al comitato previsto dall'articolo 5. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_19","numText":"Art. 19","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Disciplina","contentHtml":"<p>La vigilanza sui consulenti tecnici e' esercitata dal presidente del tribunale, il quale, d'ufficio o su istanza del procuratore del Re Imperatore o del presidente dell'associazione professionale, puo' promuovere procedimento disciplinare contro i consulenti che non hanno tenuto una condotta morale e politica specchiata o non hanno ottemperato agli obblighi derivanti dagli incarichi ricevuti.</p>\n<p>Per il giudizio disciplinare e' competente il comitato indicato nell'articolo 14.</p>","notesHtml":""},{"id":"art_20","numText":"Art. 20","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sanzioni disciplinari","contentHtml":"<p>Ai consulenti che non hanno osservato i doveri indicati nell'articolo precedente possono essere inflitte le seguenti sanzioni disciplinari:</p>\n<p>1) l'avvertimento;</p>\n<p>2) la sospensione dall'albo per un tempo non superiore ad un anno;</p>\n<p>3) la cancellazione dall'albo.</p>","notesHtml":""},{"id":"art_21","numText":"Art. 21","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Procedimento disciplinare","contentHtml":"<p>Prima di promuovere il procedimento disciplinare, il presidente del tribunale contesta l'addebito al consulente e ne raccoglie la risposta scritta.</p>\n<p>Il presidente, se dopo la contestazione ritiene di dovere continuare il procedimento, fa invitare il consulente, con biglietto di cancelleria, davanti al comitato disciplinare.</p>\n<p>Il comitato decide sentito il consulente. Contro il provvedimento e' ammesso reclamo a norma dell'articolo 15 quinto comma. <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_22","numText":"Art. 22","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Distribuzione degli incarichi","contentHtml":"<p>Tutti i giudici che hanno sede nella circoscrizione del tribunale debbono affidare normalmente le fuizioni di consulente tecnico agli iscritti nell'albo del tribunale medesinio. I giudici presso le sezioni specializzate dei tribunali con competenza distrettuale possono conferire l'incarico ai consulenti iscritti negli albi dei tribunali del distretto. (54)<sup class=\"amd\">55</sup></p>\n<p>Il giudice puo' conferire, con provvedimento motivato, un incarico a un consulente iscritto in albo di altro tribunale o a persona non iscritta in alcun albo. Il provvedimento e' comunicato al presidente del tribunale. (54) <sup class=\"amd\">55</sup></p>\n<p>Le funzioni di consulente presso la corte d'appello sono normalmente affidate agli iscritti negli albi dei tribunali del distretto. L'incarico ad iscritti in altri albi o a persone non iscritte in alcun albo e' conferito con provvedimento motivato da comunicare al presidente della corte di appello. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (163)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_23","numText":"Art. 23","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Vigilanza sulla distribuzione degli incarichi","contentHtml":"<p>Il presidente del tribunale e il presidente della corte di appello vigilano affinche', senza danno per l'amministrazione della giustizia, gli incarichi siano equamente distribuiti tra gli iscritti nell'albo in modo tale che a nessuno dei consulenti iscritti possano essere conferiti incarichi in misura superiore al 10 per cento di quelli affidati dal rispettivo ufficio, e garantiscono che sia assicurata l'adeguata trasparenza del conferimento degli incarichi anche a mezzo di strumenti informatici.</p>\n<p>Per l'attuazione di tale vigilanza gli incarichi affidati e i compensi liquidati dal giudice agli iscritti nell'albo sono annotati nei sistemi informatici regolamentati secondo le regole tecniche per l'adozione nel processo civile delle tecnologie dell'informazione e della comunicazione. Gli incarichi e i compensi sono altresi' pubblicati sul sito dell'ufficio giudiziario. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_24","numText":"Art. 24","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"IL D.PR. 30 MAGGIO 2002, N. 115 HA CONFERMATO L'ABROGAZIONE DEL PRESENTE ARTICOLO","contentHtml":"","notesHtml":""},{"id":"art_24","numText":"Art. 24-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Elenco nazionale dei consulenti tecnici","contentHtml":"<p>Presso il Ministero della giustizia e' istituito un elenco nazionale dei consulenti tecnici, suddiviso per categorie e contenente l'indicazione dei settori di specializzazione di ciascuna categoria, nel quale, tramite i sistemi informatici di cui all'articolo 23, secondo comma, confluiscono le annotazioni dei provvedimenti di nomina.</p>\n<p>L'elenco e' tenuto con modalita' informatiche ed e' accessibile al pubblico attraverso il portale dei servizi telematici del Ministero della giustizia. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_25","numText":"Art. 25","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istituzione e formazione dell'albo","contentHtml":"<p>Presso ogni tribunale e' istituito uno speciale albo dei consulenti tecnici per le controversie individuali in materia corporativa.</p>\n<p>L'albo e' diviso in categorie secondo i rami delle attivita' economiche esercitate nella circoscrizione del tribunale.</p>\n<p>In esso deve essere sempre compresa la categoria dei consulenti per l'applicazione delle norme sugli infortuni sul lavoro industriale ed agricolo, sulle malattie professionali e sulle assicurazioni sociali.</p>\n<p>Per quanto attiene all'albo speciale e agli iscritti in esso si applicano le disposizioni della sezione precedente se non sono modificate dagli articoli seguenti.</p>","notesHtml":""},{"id":"art_26","numText":"Art. 26","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Iscrizione nell'albo","contentHtml":"<p>Possono essere iscritti d'ufficio nell'albo, quando hanno i requisiti richiesti, le persone di speciale competenza in uno o piu' rami della produzione, che siano indicate dal presidente del consiglio provinciale delle corporazioni.</p>\n<p>Per la categoria dei consulenti in materia di infortuni, di malattie professionali e di assicurazioni sociali possono essere iscritti, su istanza o d'ufficio, soltanto coloro che, per il titolo di studio conseguito o per l'attivita' medico-chirurgica spiegata, si dimostrano particolarmente versati nelle materie stesse.</p>","notesHtml":""},{"id":"art_27","numText":"Art. 27","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Consulenti in materie regolate da norme corporative o da accordi economici","contentHtml":"<p>Per le controversie indicate negli articoli 467 e seguenti del codice i consulenti tecnici sono scelti possibilmente nell'albo formato norma dell'articolo 25.</p>","notesHtml":""},{"id":"art_28","numText":"Art. 28","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Registri di cancelleria","contentHtml":"<p>1. Con decreto del Ministro di grazia e giustizia, ovvero con decreto del Ministro delle finanze, nei casi di sua competenza, di concerto con il Ministro di grazia e giustizia, sono stabiliti i registri che devono essere tenuti, a cura delle cancellerie, presso gli uffici giudiziari.<sup class=\"amd\">12</sup></p>","notesHtml":"<p>AGGIORNAMENTO (12)</p>\n<p>La L. 2 dicembre 1991, n. 399 ha disposto (con l'art. 7, comma 2) che &quot;Fino alla data di entrata in vigore dei decreti di cui agli articoli 1, 2 e 3 continuano comunque ad applicarsi le disposizioni vigenti anteriormente alla data di entrata in vigore della presente legge&quot;.</p>"},{"id":"art_29","numText":"Art. 29","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_30","numText":"Art. 30","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_31","numText":"Art. 31","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_32","numText":"Art. 32","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_33","numText":"Art. 33","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Divisione dei registri in piu' volumi","contentHtml":"<p>Negli uffici giudiziari aventi un numero rilevante di affari, ogni capo d'ufficio, su proposta del dirigente la cancelleria, puo' autorizzare la divisione per materia del ruolo generale e della rubrica alfabetica generale corrispondente.</p>\n<p>Il capo dell'ufficio puo' autorizzare inoltre la divisione del registro cronologico in due volumi contenenti uno i numeri pari e l'altro i numeri dispari o anche in volumi distinti per materia.</p>","notesHtml":""},{"id":"art_34","numText":"Art. 34","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_35","numText":"Art. 35","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Volumi dei provvedimenti originali","contentHtml":"<p>Il cancelliere deve riunire annualmente in volumi separati gli originali delle sentenze, dei decreti d'ingiunzione e dei processi verbali di conciliazione, nonche' le copie dei verbali contenenti le sentenze pronunciate a norma dell'articolo 281-sexies.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_36","numText":"Art. 36","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fascicoli di cancelleria","contentHtml":"<p>Il cancelliere deve formare un fascicolo per ogni affare del proprio ufficio, anche quando la formazione di esso non e' prevista espressamente dalla legge.</p>\n<p>Ogni fascicolo riceve la numerazione del ruolo generale sotto la quale e' iscritto l'affare.</p>\n<p>Ogni fascicolo contiene l'indicazione dell'ufficio, della sezione alla quale appartiene il giudice incaricato dell'affare e del giudice stesso, delle parti, dei rispettivi difensori muniti di procura e dell'oggetto e l'indice degli atti inseriti nel fascicolo con l'indicazione della natura e della data di ciascuno di essi. Gli atti sono inseriti nel fascicolo in ordine cronologico. (54)(55)</p>\n<p>COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197.</p>\n<p>COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197.</p>\n<p>La tenuta e conservazione del fascicolo informatico equivale alla tenuta e conservazione del fascicolo d'ufficio su supporto cartaceo, fermi restando gli obblighi di conservazione dei documenti originali unici su supporto cartaceo previsti dal codice dell'amministrazione digitale di cui al decreto legislativo 7 marzo 2005, n. 82, e dalla disciplina processuale vigente. (54)(55)</p>\n<p>Il terzo pignorato puo' accedere al fascicolo senza necessita' di autorizzazione del giudice.</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_37","numText":"Art. 37","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 2 DICEMBRE 1991, N. 399","contentHtml":"","notesHtml":""},{"id":"art_38","numText":"Art. 38","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_39","numText":"Art. 39","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_40","numText":"Art. 40","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_41","numText":"Art. 41","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_42","numText":"Art. 42","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_43","numText":"Art. 43","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_44","numText":"Art. 44","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Compilazione dei processi verbali","contentHtml":"<p>Oltre che nei casi specificamente indicati dalla legge, il cancelliere deve compilare processo verbale di tutti gli atti che compie con l'intervento di terzi interessati. Nel processo verbale fa risultare le attivita' da lui compiute, quelle delle persone intervenute nell'atto e le dichiarazioni da esse rese.</p>","notesHtml":""},{"id":"art_45","numText":"Art. 45","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma delle comunicazioni del cancelliere","contentHtml":"<p>La comunicazione eseguita dal cancelliere a norma dell'articolo 136 del codice contiene l'indicazione dell'ufficio giudiziario, della sezione alla quale la causa e' assegnata, dell'istruttore se e' nominato, del numero del ruolo generale sotto il quale l'affare e' iscritto e del ruolo dell'istruttore, il nome delle parti e il testo integrale del provvedimento comunicato.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_46","numText":"Art. 46","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma e criteri di redazione degli atti giudiziari","contentHtml":"<p>(54) (55)</p>\n<p>I processi verbali e gli altri atti giudiziari debbono essere scritti in carattere chiaro e facilmente leggibile. (54)(55)</p>\n<p>COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197.</p>\n<p>Quando sono redatti in forma di documento informatico, rispettano la normativa, anche regolamentare, concernente la redazione, la sottoscrizione, la trasmissione e la ricezione dei documenti informatici. (54)(55)</p>\n<p>Negli altri casi debbono essere scritti in continuazione, senza spazi in bianco e senza alterazioni o abrasioni. Le aggiunte, soppressioni o modificazioni eventuali debbono essere fatte in calce all'atto, con nota di richiamo senza cancellare la parte soppressa o modificata. (54)(55)</p>\n<p>Il Ministro della giustizia, sentiti il Consiglio superiore della magistratura e il Consiglio nazionale forense, definisce con decreto gli schemi informatici degli atti giudiziari con la strutturazione dei campi necessari per l'inserimento delle informazioni nei registri del processo. Con il medesimo decreto sono stabiliti i limiti degli atti processuali, tenendo conto della tipologia, del valore, della complessita' della controversia, del numero delle parti e della natura degli interessi coinvolti. Nella determinazione dei limiti non si tiene conto dell'intestazione e delle altre indicazioni formali dell'atto, fra le quali si intendono compresi un indice e una breve sintesi del contenuto dell'atto stesso. Il decreto e' aggiornato con cadenza almeno biennale. (54)(55)</p>\n<p>Il mancato rispetto delle specifiche tecniche sulla forma e sullo schema informatico e dei criteri e limiti di redazione dell'atto non comporta invalidita', ma puo' essere valutato dal giudice ai fini della decisione sulle spese del processo. (54)(55)</p>\n<p>Il giudice redige gli atti e i provvedimenti nel rispetto dei criteri e dei limiti di cui al presente articolo. (54) (55) <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_47","numText":"Art. 47","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ora della notificazione","contentHtml":"<p>Nella relazione di notificazione di cui all'articolo 148 del codice, se la parte interessata lo chiede, deve essere inserita l'indicazione dell'ora nella quale la notificazione e' stata eseguita.</p>","notesHtml":""},{"id":"art_48","numText":"Art. 48","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Avviso al destinatario della notificazione","contentHtml":"<p>L'avviso prescritto nell'articolo 140 del codice deve contenere:</p>\n<p>1) il nome della persona che ha chiesto la notificazione e del destinatario;</p>\n<p>2) l'indicazione della natura dell'atto notificato;</p>\n<p>3) l'indicazione del giudice che ha pronunciato il provvedimento notificato o davanti al quale si deve comparire con la data o il termine di comparizione;</p>\n<p>4) la data e la firma dell'ufficiale giudiziario.</p>","notesHtml":""},{"id":"art_49","numText":"Art. 49","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Nota da consegnarsi al pubblico ministero","contentHtml":"<p>L'ufficiale, che esegue la notificazione a norma degli articoli 142, 143 e 146 del codice, deve consegnare al pubblico ministero, insieme con la copia dell'atto, una nota contenente:</p>\n<p>1) l'indicazione del nome e della qualita' della persona che ha chiesto la notificazione;</p>\n<p>2) il nome, la residenza o la dimora del destinatario;</p>\n<p>3) la natura dell'atto notificato;</p>\n<p>4) il giudice che ha pronunciato il provvedimento notificato o davanti al quale si deve comparire;</p>\n<p>5) la data e la firma dell'ufficiale giudiziario.</p>\n<p>La nota e' trasmessa dal pubblico ministero insieme con l'atto al ministero degli affari esteri o al comando militare posto nella circoscrizione del tribunale, i quali provvedono d'urgenza alla consegna.</p>","notesHtml":""},{"id":"art_50","numText":"Art. 50","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza di autorizzazione alla notificazione per pubblici proclami","contentHtml":"<p>L'istanza di autorizzazione a procedere alla notificazione per pubblici proclami a norma dell'articolo 150 del codice e' fatta con ricorso steso in calce all'atto.</p>\n<p>Il pubblico ministero stende il suo parere di seguito al ricorso.</p>","notesHtml":""},{"id":"art_51","numText":"Art. 51","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Destinazione della copia dell'atto notificato depositata in cancelleria","contentHtml":"<p>La copia che l'ufficiale giudiziario deposita in carcelleria a norma dell'articolo 150 quarto comma del codice e' custodita dal cancelliere per essere inserita nel fascicolo d'ufficio.</p>\n<p>Nella copia depositata e in quella da consegnare alla parte che ha chiesto la notificazione, l'ufficiale giudiziario deve certificare la data dell'avvenuto deposito in cancelleria.</p>","notesHtml":""},{"id":"art_52","numText":"Art. 52","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Liquidazione del compenso","contentHtml":"<p>Il compenso agli ausiliari di cui all'articolo 68 del codice e' liquidato con decreto dal giudice che li ha nominati o dal capo dell'ufficio giudiziario al quale appartiene il cancelliere o l'ufficiale giudiziario che li ha chiamati, tenuto conto dell'attivita' svolta.</p>","notesHtml":""},{"id":"art_53","numText":"Art. 53","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Contenuto ed efficacia dei provvedimenti che liquidano compensi","contentHtml":"<p>I decreti con i quali il giudice liquida a favore del custode e degli altri ausiliari i compensi loro dovuti debbono indicare la parte che e' tenuta a corrisponderli. Tali decreti costituiscono titolo esecutivo contro la parte stessa.</p>","notesHtml":""},{"id":"art_54","numText":"Art. 54","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione dei giorni d'udienza","contentHtml":"<p>Le udienze di istruzione e di discussione delle cause sono tenute nei giorni e nelle ore che il capo dell'ufficio del giudice di pace stabilisce annualmente con decreto approvato dal presidente del tribunale d'intesa col procuratore della Repubblica. Il decreto deve rimanere affisso per tutto l'anno in ciascuna sala di udienza dell'ufficio del giudice di pace.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_55","numText":"Art. 55","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Distribuzione delle udienze tra i magistrati","contentHtml":"<p>Il capo dell'ufficio di conciliazione distribuisce con decreto al principio di ogni trimestre le udienze di istruzione o di discussione tra i magistrati addetti all'ufficio.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_56","numText":"Art. 56","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Designazione del giudice per ciascuna causa","contentHtml":"<p>Dopo il deposito dell'atto introduttivo del giudizio a norma dell'articolo 319 del codice, il capo dell'ufficio del giudice di pace designa il magistrato che viene incaricato dell'istruzione della causa.\n <sup class=\"amd\">59</sup>.</p>\n<p>COMMA ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_57","numText":"Art. 57","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio dell'udienza di comparizione","contentHtml":"<p>Se non vi e' udienza nel giorno fissato nell'atto di citazione o nel processo verbale indicato nell'articolo 316 secondo comma del codice, la comparizione s'intende rimandata all'udienza immediatamente successiva tenuta dal giudice designato.</p>\n<p>Se nell'udienza di comparizione non possono essere sentite le parti, il conciliatore da' atto nel processo verbale della loro comparizione e rimanda la causa all'udienza immediatamente successiva. \n (18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_58","numText":"Art. 58","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Mancanza di dichiarazione di residenza o di elezione di domicilio","contentHtml":"<p>Alla parte, che non ha fatto dichiarazione di residenza o elezione di domicilio o non ha indicato un indirizzo di posta elettronica certificata a norma dell'articolo 319 del codice, le notificazioni e le comunicazioni durante il procedimento possono essere fatte presso la cancelleria, salvo contrarie disposizioni di legge e fermo quanto previsto dall'articolo 149-bis del codice.(18) (19) <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_59","numText":"Art. 59","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dichiarazione di contumacia","contentHtml":"<p>La dichiarazione di contumacia della parte non costituita e' fatta dal conciliatore a norma dell'articolo 171 ultimo comma del codice, quando e' decorsa almeno un'ora dall'apertura dell'udienza.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_60","numText":"Art. 60","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Tempo degli atti di istruzione","contentHtml":"<p>Gli atti di istruzione debbono essere assunti dal conciliatore non oltre la terza udienza successiva a quella in cui sono stati ammessi o alla comunicazione dell'ordinanza di ammissione, se questa non e' stata pronunziata in udienza.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_61","numText":"Art. 61","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordine di trattazione e discussione delle cause","contentHtml":"<p>Nella trattazione e nella discussione il giudice di pace deve dare la precedenza alle cause per le quali sono stati abbreviati i termini a norma dell'articolo 163-bis del codice.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_62","numText":"Art. 62","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Udienza di discussione","contentHtml":"<p>Il conciliatore, quando dichiara chiusa l'istruzione, invita le parti a formulare nella stessa udienza o in una udienza successiva le conclusioni che, a norma dell'articolo 189 del codice, intendono sottoporre alla sua decisione e a procedere alla discussione della causa.(18)<sup class=\"amd\">19</sup></p>\n<p>L'udienza di discussione puo' essere rinviata soltanto una volta, per grave impedimento dell'ufficio o delle parti da specificarsi nel provvedimento di rinvio.</p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_63","numText":"Art. 63","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Giudice decidente","contentHtml":"<p>La causa deve essere decisa dal conciliatore che ha proceduto all'istruzione, salvo che sia stato sostituito a norma dell'articolo 174 del codice.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_64","numText":"Art. 64","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 19 FEBBRAIO 1998, N. 51","contentHtml":"<p><sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi
