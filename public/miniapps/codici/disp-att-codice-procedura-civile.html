, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_169","numText":"Art. 169-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Elenco dei professionisti che provvedono alle operazioni di vendita","contentHtml":"<p>Nelle comunicazioni previste dall'articolo 179-ter sono indicati anche gli elenchi dei notai, degli avvocati e dei commercialisti disponibili a provvedere alle operazioni di vendita di beni mobili iscritti nei pubblici registri.(25)<sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35 convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_169","numText":"Art. 169-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ulteriori modalita' del pagamento del prezzo di acquisto","contentHtml":"<p>Il prezzo di acquisto puo' essere versato con sistemi telematici di pagamento ovvero con carte di debito, di credito o prepagate o con altri mezzi di pagamento con moneta elettronica disponibili nei circuiti bancario e postale.</p>","notesHtml":""},{"id":"art_169","numText":"Art. 169-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Prospetto riepilogativo delle stime e delle vendite","contentHtml":"<p>I soggetti nominati commissionari a norma dell'articolo 532 del codice, o ai quali sono affidate le vendite con incanto a norma dell'articolo 534 del medesimo codice, al termine di ciascun semestre trasmettono al giudice dell'esecuzione, al presidente del tribunale e all'ufficiale giudiziario dirigente un prospetto informativo, redatto su supporto informatico, riepilogativo di tutte le vendite effettuate nel periodo con indicazione, per ciascuna procedura esecutiva, della tipologia dei beni pignorati, del valore ad essi attribuito ai sensi dell'articolo 518 del codice, della stima effettuata dall'esperto nominato e del prezzo di vendita. Il prospetto riepilogativo contiene i dati identificativi dello stimatore e dell'ufficiale giudiziario che ha attribuito il valore ai beni pignorati a norma dell'articolo 518 del codice. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_169","numText":"Art. 169-sexies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Elenco dei soggetti specializzati per la custodia e la vendita dei mobili pignorati","contentHtml":"<p> Presso ogni tribunale e' istituito un elenco dei soggetti specializzati di cui all'articolo 532 del codice per la custodia e la vendita dei beni mobili pignorati. Alle domande di iscrizione all'elenco e' allegata la documentazione comprovante le competenze maturate, anche relativamente a specifiche categorie di beni.\nL'elenco e' formato dal presidente del tribunale, che provvede sentito il procuratore della Repubblica. Si applicano gli articoli 13 e seguenti in quanto compatibili.</p>","notesHtml":""},{"id":"art_169","numText":"Art. 169-septies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Informazioni necessarie al pagamento dei crediti assegnati","contentHtml":"<p>La dichiarazione prevista dall'articolo 553, primo comma, del codice contiene le seguenti informazioni: \n 1) il numero di ruolo della procedura, l'indicazione del titolo esecutivo, i dati anagrafici e il codice fiscale del creditore e, se diverso, anche del destinatario del pagamento; \n 2) l'importo dovuto, comprensivo del dettaglio degli interessi, degli accessori e delle spese; \n 3) l'identificativo del conto di pagamento ovvero l'indicazione di altra modalita' di esecuzione del pagamento.</p>","notesHtml":""},{"id":"art_170","numText":"Art. 170","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Atto di pignoramento immobiliare","contentHtml":"<p>L'atto di pignoramento di beni immobili previsto nell'articolo 555 del codice deve essere sottoscritto, prima della relazione di notificazione, dal creditore pignorante a norma dell'articolo 125 del codice.</p>","notesHtml":""},{"id":"art_171","numText":"Art. 171","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Procedimento per le autorizzazioni al debitore e al custode","contentHtml":"<p>Le autorizzazioni al debitore e al custode previste nell'articolo 560 del codice sono date dal giudice dell'esecuzione, sentite le parti e gli altri interessati.</p>","notesHtml":""},{"id":"art_172","numText":"Art. 172","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Cancellazione della trascrizione del pignoramento","contentHtml":"<p>Il giudice dell'esecuzione deve sentire le parti prima di disporre la cancellazione della trascrizione del pignoramento a norma dell'articolo 562 del codice e in gni altro caso in cui deve dichiarare l'inefficacia del pignoramento per estinzione del processo.</p>","notesHtml":""},{"id":"art_173","numText":"Art. 173","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 173.</p>\n<p>ARTICOLO ABROGATO DAL D.L. 14 MARZO 2005, N. 35, CONVERTITO CON MODIFICAZIONI DALLA L. 14 MAGGIO 2005, N. 80 COME MODIFICATO DALLA L. 28 DICEMBRE 2005, N. 263<sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_173","numText":"Art. 173","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 173-bis.</p>\n<p>(Contenuto della relazione di stima e compiti dell'esperto).</p>\n<p>L'esperto provvede alla redazione della relazione di stima dalla quale devono risultare:</p>\n<p>1) l'identificazione del bene, comprensiva dei confini e dei dati catastali;</p>\n<p>2) una sommaria descrizione del bene;</p>\n<p>3) lo stato di possesso del bene, con l'indicazione, se occupato da terzi, del titolo in base al quale e' occupato, con particolare riferimento alla esistenza di contratti registrati in data antecedente al pignoramento;</p>\n<p>4) l'esistenza di formalita', vincoli o oneri, anche di natura condominiale, gravanti sul bene, che resteranno a carico dell'acquirente, ivi compresi i vincoli derivanti da contratti incidenti sulla attitudine edificatoria dello stesso o i vincoli connessi con il suo carattere storico-artistico;</p>\n<p>5) l'esistenza di formalita', vincoli e oneri, anche di natura condominiale, che saranno cancellati o che comunque risulteranno non opponibili all'acquirente;</p>\n<p>6) la verifica della regolarita' edilizia e urbanistica del bene nonche' l'esistenza della dichiarazione di agibilita' dello stesso previa acquisizione o aggiornamento del certificato di destinazione urbanistica previsto dalla vigente normativa;</p>\n<p>7) in caso di opere abusive, il controllo della possibilita' di sanatoria ai sensi dell'articolo 36 del decreto del Presidente della Repubblica 6 giugno 2001, n. 380 e gli eventuali costi della stessa; altrimenti, la verifica sull'eventuale presentazione di istanze di condono, indicando il soggetto istante e la normativa in forza della quale l'istanza sia stata presentata, lo stato del procedimento, i costi per il conseguimento del titolo in sanatoria e le eventuali oblazioni gia' corrisposte o da corrispondere; in ogni altro caso, la verifica, ai fini della istanza di condono che l'aggiudicatario possa eventualmente presentare, che gli immobili pignorati si trovino nelle condizioni previste dall'articolo 40, sesto comma, della legge 28 febbraio 1985, n. 47 ovvero dall'articolo 46, comma 5 del decreto del Presidente della Repubblica 6 giugno 2001, n. 380, specificando il costo per il conseguimento del titolo in sanatoria;</p>\n<p>8) la verifica che i beni pignorati siano gravati da censo, livello o uso civico e se vi sia stata affrancazione da tali pesi, ovvero che il diritto sul bene del debitore pignorato sia di proprieta' ovvero derivante da alcuno dei suddetti titoli;</p>\n<p>9) l'informazione sull'importo annuo delle spese fisse di gestione o di manutenzione, su eventuali spese straordinarie gia' deliberate anche se il relativo debito non sia ancora scaduto, su eventuali spese condominiali non pagate negli ultimi due anni anteriori alla data della perizia, sul corso di eventuali procedimenti giudiziari relativi al bene pignorato.</p>\n<p>L'esperto, prima di ogni attivita', controlla la completezza dei documenti di cui all'articolo 567, secondo comma, del codice, segnalando immediatamente al giudice quelli mancanti o inidonei.</p>\n<p>L'esperto, terminata la relazione, ne invia copia ai creditori procedenti o intervenuti e al debitore, anche se non costituito, almeno trenta giorni prima dell'udienza fissata ai sensi dell'articolo 569 del codice, a mezzo posta elettronica certificata ovvero, quando cio' non e' possibile, a mezzo posta ordinaria.(54)<sup class=\"amd\">55</sup></p>\n<p>Le parti possono depositare all'udienza note alla relazione purche' abbiano provveduto, almeno quindici giorni prima, ad inviare le predette note al perito, secondo le modalita' fissate al terzo comma; in tale caso l'esperto interviene all'udienza per rendere i chiarimenti.(25)(26)(27)</p>\n<p>La relazione di stima e' redatta in conformita' a modelli predisposti dal giudice dell'esecuzione. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_173","numText":"Art. 173","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 173-ter.</p>\n<p> (Pubblicita' degli avvisi tramite internet). \n Il Ministro della giustizia stabilisce con proprio decreto i siti internet destinati all'inserimento degli avvisi di cui all'articolo 490 del codice e i criteri e le modalita' con cui gli stessi sono formati e resi disponibili.<sup class=\"amd\">25</sup><sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_173","numText":"Art. 173","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 173-quater.</p>\n<p>(Avviso delle operazioni di vendita da parte del professionista delegato).</p>\n<p>L'avviso di cui al quarto comma dell'articolo 591-bis del codice deve contenere l'indicazione della destinazione urbanistica del terreno risultante dal certificato di destinazione urbanistica di cui all'articolo 30 del testo unico di cui al decreto del Presidente della Repubblica 6 giugno 2001, n. 380, nonche' le notizie di cui all'articolo 46 del citato testo unico e di cui all'articolo 40 della legge 28 febbraio 1985, n. 47, e successive modificazioni;(54)<sup class=\"amd\">55</sup> in caso di insufficienza di tali notizie, tale da determinare le nullita' di cui all'articolo 46, comma 1, del citato testo unico, ovvero di cui all'articolo 40, secondo comma, della citata legge 28 febbraio 1985, n. 47, ne va fatta menzione nell'avviso con avvertenza che l'aggiudicatario potra', ricorrendone i presupposti, avvalersi delle disposizioni di cui all'articolo 46, comma 5, del citato testo unico e di cui all'articolo 40, sesto comma, della citata legge 28 febbraio 1985, n. 47.(25)(26)(27)</p>\n<p>L'avviso e' redatto in conformita' a modelli predisposti dal giudice dell'esecuzione. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_173","numText":"Art. 173","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 173-quinquies.</p>\n<p>(Ulteriori modalita' di presentazione delle offerte d'acquisto, di prestazione della cauzione e di versamento del prezzo).</p>\n<p>Il giudice, con l'ordinanza di vendita di cui all'articolo 569, terzo comma, del codice, puo' disporre che la presentazione dell'offerta d'acquisto e la prestazione della cauzione ai sensi degli articoli 571, 579, 580 e 584 del medesimo codice possano avvenire con sistemi telematici di pagamento ovvero con carte di debito, di credito o prepagate o con altri mezzi di pagamento disponibili nei circuiti bancario e postale. E' consentita la prestazione della cauzione anche mediante fideiussione autonoma, irrevocabile e a prima richiesta, rilasciata da banche, societa' assicuratrici o intermediari finanziari che svolgono in via esclusiva o prevalente attivita' di rilascio di garanzie e che sono sottoposti a revisione contabile da parte di una societa' di revisione. Il giudice dell'esecuzione, con l'ordinanza di vendita, individua la categoria professionale alla quale deve appartenere il soggetto che puo' rilasciare la fideiussione a norma del periodo precedente. La fideiussione e' rilasciata in favore della procedura esecutiva ed e' escussa dal custode o dal professionista delegato su autorizzazione del giudice. In ogni caso, e' stabilito che l'offerente comunichi, a mezzo posta elettronica certificata, la dichiarazione contenente le indicazioni prescritte dall'articolo 571.</p>\n<p>Il versamento del prezzo puo' essere effettuato con le stesse modalita' di cui al primo comma.</p>","notesHtml":"<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_174","numText":"Art. 174","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dichiarazione di residenza e domicilio digitale dell'offerente","contentHtml":"<p><sup class=\"amd\">59</sup></p>\n<p>Chi offre un prezzo per l'acquisto senza incanto dell'immobile pignorato deve dichiarare la residenza o eleggere il domicilio nel comune nel quale ha sede il tribunale o indicare il proprio indirizzo di posta elettronica certificata risultante da pubblici elenchi o eleggere un domicilio digitale speciale. In mancanza le comunicazioni gli sono fatte presso la cancelleria , salvo quanto previsto dall'articolo 149-bis del codice. <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_175","numText":"Art. 175","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Convocazione delle parti per l'incanto","contentHtml":"<p>Il giudice dell'esecuzione, prima di ordinare l'incanto a norma dell'articolo 575 del codice, dispone l'audizione delle parti e dei creditori a norma dell'articolo 569 del codice.</p>","notesHtml":""},{"id":"art_176","numText":"Art. 176","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Comunicazione del decreto di decadenza","contentHtml":"<p>Il decreto col quale il giudice dell'esecuzione dichiara la decadenza dell'aggiudicatario a norma dell'articolo 587 del codice e' comunicato dal cancelliere al creditore che ha chiesto la vendita e all'aggiudicatario.</p>\n<p>Con lo stesso decreto il giudice dell'esecuzione fissa un'udienza per l'audizione delle parti a norma dell'articolo 569 del codice.</p>","notesHtml":""},{"id":"art_177","numText":"Art. 177","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dichiarazione di responsabilita' dell'aggiudicatario","contentHtml":"<p>L'aggiudicatario inadempiente e' condannato, con decreto del giudice dell'esecuzione, al pagamento della differenza tra il prezzo da lui offerto e quello minore per il quale e' avvenuta la vendita.</p>\n<p>Il decreto del giudice costituisce titolo esecutivo a favore dei creditori ai quali nella distribuzione della somma ricavata e' stato attribuito il credito da esso portato.</p>","notesHtml":""},{"id":"art_178","numText":"Art. 178","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Procedimento di rendiconto","contentHtml":"<p>Quando l'amministratore dell'immobile pignorato ha depositato il conto a norma dell'articolo 593 del codice, il giudice dell'esecuzione, sentite le parti, provvede all'approvazione del conto.</p>\n<p>Le disposizioni per l'assegnazione delle rendite riscosse a norma dell'articolo 594 del codice sono date dal giudice dell'esecuzione con ordinanza non impugnabile.</p>","notesHtml":""},{"id":"art_179","numText":"Art. 179","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Graduazione e liquidazione","contentHtml":"<p>Quando lo ritiene opportuno, il giudice dell'esecuzione puo' limitare il progetto di distribuzione della somma ricavata di cui all'articolo 596 del codice alla sola graduazione dei creditori partecipanti all'esecuzione, salva la liquidazione delle quote spettanti a ciascuno di essi dopo che sia approvata la graduazione.</p>\n<p>Il giudice che ha disposto a norma del comma precedente forma il progetto di liquidazione delle quote entro trenta giorni dall'approvazione della graduazione.</p>\n<p>Al progetto di liquidazione si applicano le disposizioni degli articoli 596 e seguenti del codice.</p>","notesHtml":""},{"id":"art_179","numText":"Art. 179-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione e liquidazione dei compensi per le operazioni delegate dal giudice dell'esecuzione","contentHtml":"<p>Con decreto del Ministro della giustizia, di concerto con il Ministro dell'economia e delle finanze, sentiti il Consiglio nazionale del notariato, il Consiglio nazionale dell'ordine degli avvocati e il Consiglio nazionale dell'ordine dei dottori commercialisti e degli esperti contabili, e' stabilita ogni triennio la misura dei compensi dovuti a notai, avvocati e commercialisti per le operazioni di vendita di beni immobili.</p>\n<p>Il compenso dovuto al professionista e' liquidato dal giudice dell'esecuzione con specifica determinazione della parte riguardante le operazioni di vendita e le successive che sono poste a carico dell'aggiudicatario. Il provvedimento di liquidazione del compenso costituisce titolo esecutivo.(25)<sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_179","numText":"Art. 179-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Elenco dei professionisti che provvedono alle operazioni di vendita","contentHtml":"<p>Presso ogni tribunale e' istituito l'elenco dei professionisti che provvedono alle operazioni di vendita ai sensi degli articoli 534-bis e 591-bis del codice.</p>\n<p>L'elenco e' tenuto dal presidente del tribunale ed e' formato da un comitato presieduto da questi o da un suo delegato e composto da un giudice addetto alle esecuzioni immobiliari e da un professionista iscritto nell'albo professionale, designato dal consiglio dell'ordine, a cui appartiene il richiedente l'iscrizione nell'elenco. Le funzioni di segretario del comitato sono esercitate dal cancelliere del tribunale.</p>\n<p>Possono ottenere l'iscrizione nell'elenco gli avvocati, i commercialisti e i notai che hanno una specifica competenza tecnica nella materia dell'esecuzione forzata, sono di condotta morale specchiata e sono iscritti ai rispettivi ordini professionali.</p>\n<p>Coloro che aspirano all'iscrizione nell'elenco debbono farne domanda al presidente del tribunale. Nella domanda l'aspirante, a pena di inammissibilita', indica mediante dichiarazione sostitutiva resa ai sensi dell'articolo 46 del decreto del Presidente della Repubblica 28 dicembre 2000, n. 445:</p>\n<p>1) data e luogo di nascita; \n 2) domicilio professionale nel circondario del tribunale; \n 3) indirizzo di posta elettronica certificata risultante dai pubblici elenchi; \n 4) di non aver riportato condanne passate in giudicato, oppure le condanne eventualmente riportate; \n 5) di essere iscritto all'ordine professionale.\n <sup class=\"amd\">59</sup>.</p>\n<p>Alla domanda sono allegati i titoli e i documenti idonei a dimostrare la specifica competenza tecnica del richiedente. I requisiti per la dimostrazione della specifica competenza tecnica ai fini della prima iscrizione nell'elenco sono, anche alternativamente, i seguenti: <sup class=\"amd\">59</sup></p>\n<p>a) avere svolto nel quinquennio precedente non meno di dieci incarichi di professionista delegato alle operazioni di vendita, senza che alcuna delega sia stata revocata in conseguenza del mancato rispetto dei termini o delle direttive stabilite dal giudice dell'esecuzione;</p>\n<p>b) essere in possesso del titolo di avvocato specialista in diritto dell'esecuzione forzata ai sensi del decreto del Ministro della giustizia 12 agosto 2015, n. 144;</p>\n<p>c) avere partecipato in modo proficuo e continuativo a scuole o corsi di alta formazione, organizzati, anche delegando gli Ordini locali, dal Consiglio nazionale forense o dal Consiglio nazionale dei dottori commercialisti e degli esperti contabili o dal Consiglio nazionale del notariato ovvero organizzati dalle associazioni forensi specialistiche maggiormente rappresentative di cui all'articolo 35, comma 1, lettera s), della legge 31 dicembre 2012, n. 247, nello specifico settore della delega delle operazioni di vendita nelle esecuzioni forzate e aver superato con profitto la prova finale di esame al termine della scuola o del corso. La specifica formazione di cui alla presente lettera puo' essere acquisita anche mediante la partecipazione ad analoghi corsi per i quali sia previsto il superamento con profitto di una prova finale di esame, organizzati da universita' pubbliche o private.</p>\n<p>I professionisti che aspirano alla conferma dell'iscrizione nell'elenco debbono farne domanda al presidente del tribunale ogni tre anni; la domanda deve essere corredata dalla dichiarazione sostitutiva di cui al quarto comma, numeri 3) e 4), e dai titoli e documenti idonei a dimostrare il mantenimento della specifica competenza tecnica del professionista ai sensi del settimo comma.\n <sup class=\"amd\">59</sup></p>\n<p>Ai fini della conferma dell'iscrizione nell'elenco, devono ricorrere, anche alternativamente, i seguenti requisiti:</p>\n<p>a) essere in possesso del titolo di avvocato specialista in diritto dell'esecuzione forzata ai sensi del decreto del Ministro della giustizia 12 agosto 2015, n. 144;</p>\n<p>b) avere partecipato in modo proficuo e continuativo a scuole o corsi di alta formazione, organizzati, anche delegando gli Ordini locali, dal Consiglio nazionale forense o dal Consiglio nazionale dei dottori commercialisti e degli esperti contabili o dal Consiglio nazionale del notariato ovvero organizzati dalle associazioni forensi specialistiche maggiormente rappresentative di cui all'articolo 35, comma 1, lettera s), della legge 31 dicembre 2012, n. 247, nello specifico settore della delega delle operazioni di vendita nelle esecuzioni forzate conseguendo un numero di crediti non inferiore a 60 nel triennio di riferimento e, comunque, a 15 per ciascun anno. La specifica formazione di cui alla presente lettera puo' essere acquisita anche mediante la partecipazione ad analoghi corsi da universita' pubbliche o private.</p>\n<p>La Scuola superiore della magistratura elabora con cadenza triennale le linee guida generali per la definizione dei programmi dei corsi di formazione e di aggiornamento, sentiti il Consiglio nazionale forense, il Consiglio nazionale dei dottori commercialisti e degli esperti contabili e il Consiglio nazionale notarile.</p>\n<p>Sulle domande di iscrizione e di conferma della stessa decide il comitato di cui al secondo comma. Ogni tre anni il comitato deve provvedere alla revisione dell'elenco per eliminare i professionisti per i quali e' venuto meno o non e' stato dimostrato uno dei requisiti previsti per il mantenimento dell'iscrizione o e' sorto un impedimento a esercitare l'ufficio. Contro i provvedimenti del comitato e' ammesso reclamo, entro quindici giorni dalla notificazione, al comitato previsto nell'articolo 5.\n <sup class=\"amd\">59</sup></p>\n<p>Al termine di ciascun semestre, previa audizione dell'interessato, il comitato dispone la sospensione fino a un anno e, in caso di gravi o reiterati inadempimenti, la cancellazione dall'elenco dei professionisti ai quali in una o piu' procedure esecutive sia stata revocata la delega in conseguenza del mancato rispetto dei termini per le attivita' delegate, delle direttive stabilite dal giudice dell'esecuzione o degli obblighi derivanti dagli incarichi ricevuti.\nI professionisti cancellati dall'elenco a seguito di revoca della delega non possono essere reinseriti nel triennio in corso e nel triennio successivo.</p>\n<p>Nessuno puo' essere iscritto in piu' di un elenco.</p>\n<p>Il giudice dell'esecuzione puo' delegare le operazioni di vendita a un professionista iscritto nell'elenco di un altro circondario del distretto di corte di appello di appartenenza, senza obbligo di specifica motivazione.\n <sup class=\"amd\">59</sup></p>\n<p>Il giudice dell'esecuzione sostituisce senza ritardo il professionista delegato che sia stato sospeso o cancellato dall'elenco. \n (54) (55)</p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>\n<p>AGGIORNAMENTO (41)</p>\n<p>Il D.L. 3 maggio 2016, n. 59, convertito con modificazioni dalla L. 30 giugno 2016, n. 119 ha disposto (con l'art. 5-bis, comma 5) che &quot;Sino alla scadenza del dodicesimo mese successivo all'emanazione del decreto del Ministro della giustizia di cui al citato articolo 179-ter, primo comma, delle disposizioni per l'attuazione del codice di procedura civile, come sostituito dal comma 1 del presente articolo, da adottare entro sessanta giorni dalla data di entrata in vigore della legge di conversione del presente decreto, le operazioni di vendita continuano ad essere delegate ad uno dei professionisti iscritti nell'elenco di cui al predetto articolo 179-ter, nel testo vigente prima della data di entrata in vigore della legge di conversione del presente decreto&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_179","numText":"Art. 179-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Distribuzione degli incarichi","contentHtml":"<p>Il presidente del tribunale vigila affinche', senza danno per l'amministrazione della giustizia, le deleghe siano assegnate tra gli iscritti nell'elenco di cui all'articolo 179-ter in modo tale che a nessuno dei professionisti iscritti possano essere conferiti incarichi in misura superiore al 10 per cento di quelli affidati dall'ufficio e dal singolo giudice e garantisce che sia assicurata l'adeguata trasparenza del conferimento degli incarichi anche a mezzo di strumenti informatici. (54) <sup class=\"amd\">55</sup></p>\n<p>Per l'attuazione di tale vigilanza debbono essere annotate dal cancelliere in apposito registro tutte le deleghe che gli iscritti ricevono e i relativi compensi liquidati.</p>\n<p>Il registro e' pubblico e liberamente consultabile e dello stesso possono essere rilasciate copie o estratti.</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_180","numText":"Art. 180","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Avviso di pignoramento ai comproprietari del bene pignorato","contentHtml":"<p>L'avviso ai comproprietari dei beni indivisi nel caso previsto dall'articolo 599 secondo comma del codice deve contenere l'indicazione del creditore pignorante, del bene pignorato, della data dell'atto di pignoramento e della trascrizione di esso. L'avviso e' sottoscritto dal creditore pignorante.</p>\n<p>Con lo stesso avviso o con altro separato gli interessati debbono essere invitati a comparire davanti al giudice dell'esecuzione per sentire dare i provvedimenti indicati nell'articolo 600 del codice.</p>","notesHtml":""},{"id":"art_181","numText":"Art. 181","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 181.</p>\n<p>(Disposizioni sulla divisione).</p>\n<p>Il giudice dell'esecuzione, quando dispone che si proceda a divisione del bene indiviso, provvede all'istruzione della causa a norma degli articoli 175 e seguenti del codice, se gli interessati sono tutti presenti.</p>\n<p>Se gli interessati non sono tutti presenti, il giudice dell'esecuzione, con l'ordinanza di cui all'articolo 600, secondo comma, del codice, fissa l'udienza davanti a se' per la comparizione delle parti, concedendo termine alla parte piu' diligente fino a sessanta giorni prima per l'integrazione del contraddittorio mediante la notifica dell'ordinanza. Al procedimento si applicano le disposizioni di cui agli articoli 281-undecies e seguenti del codice.(25) <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005, n. 115, convertito con modificazioni dalla L. 17 agosto 2005, n. 168 ha disposto (con l'art. 2, comma 3-quater) che la presente modifica decorre dal 1° gennaio 2006. \n Ha inoltre disposto (con l'art. 2, comma 3-quinquies) che &quot;Le disposizioni di cui ai commi 3, lettere b-bis), b-ter), c-bis), c-ter), e-bis) ed e-ter), 3-bis e 3-ter non si applicano ai giudizi civili pendenti alla data del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_182","numText":"Art. 182","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Intimazione al detentore del pegno","contentHtml":"<p>Il creditore pignorante deve fare l'intimazione di cui all'articolo 544 del codice con l'atto di pignoramento, se il pegno e' detenuto dal debitore, o con atto separato, notificato a norma degli articoli 137 e seguenti del codice, se il pegno e' detenuto da altri.</p>","notesHtml":""},{"id":"art_183","numText":"Art. 183","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Provvedimenti temporanei nell'esecuzione per consegna o rilascio","contentHtml":"<p>I provvedimenti temporanei di cui all'articolo 610 del codice sono dati dal giudice dell'esecuzione con decreto.(18) <sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_184","numText":"Art. 184","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Contenuto dei ricorsi d'opposizione all'esecuzione","contentHtml":"<p>I ricorsi previsti negli articoli 615 secondo comma e 619 del codice, oltre le indicazioni volute dall'articolo 125 del codice, debbono contenere quelle di cui ai numeri 4 e 5 dell'articolo 163 del codice.</p>","notesHtml":""},{"id":"art_185","numText":"Art. 185","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Udienza di comparizione davanti al giudice dell'esecuzione","contentHtml":"<p>All'udienza di comparizione davanti al giudice dell'esecuzione fissata sulle opposizioni all'esecuzione, di terzo ed agli atti esecutivi si applicano le norme del procedimento camerale di cui agli articoli 737 e seguenti del codice.</p>","notesHtml":""},{"id":"art_186","numText":"Art. 186","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fascicolo della causa di opposizione all'esecuzione","contentHtml":"<p>Se per la causa di opposizione all'esecuzione e' competente un giudice diverso da quello dell'esecuzione, il cancelliere del giudice davanti al quale la causa e' riassunta deve immediatamente richiedere al cancelliere del giudice dell'esecuzione la trasmissione del ricorso di opposizione, di copia del processo verbale dell'udienza di comparizione di cui agli articoli 615, 618 e 619 del codice e dei documenti allegati relativi alla causa di opposizione.</p>","notesHtml":""},{"id":"art_186","numText":"Art. 186-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Trattazione delle opposizioni in materia esecutiva","contentHtml":"<p>I giudizi di merito di cui all'articolo 618, secondo comma, del codice sono trattati da un magistrato diverso da quello che ha conosciuto degli atti avverso i quali e' proposta opposizione.</p>","notesHtml":""},{"id":"art_187","numText":"Art. 187","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Regolamento di competenza delle sentenze in materia esecutiva","contentHtml":"<p>Le sentenze dichiarate non impugnabili che il giudice pronuncia sulle opposizioni agli atti esecutivi sono sempre soggette a regolamento di competenza a norma degli articoli 42 e seguenti del codice.</p>","notesHtml":""},{"id":"art_187","numText":"Art. 187-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Intangibilita' nei confronti dei terzi degli effetti degli atti esecutivi compiuti","contentHtml":"<p>In ogni caso di estinzione o di chiusura anticipata del processo esecutivo avvenuta dopo l'aggiudicazione, anche provvisoria, o l'assegnazione, restano fermi nei confronti dei terzi aggiudicatari o assegnatari, in forza dell'articolo 632, secondo comma, del codice, gli effetti di tali atti. Dopo il compimento degli stessi atti, l'istanza di cui all'articolo 495 del codice non e' piu' procedibile.</p>","notesHtml":""},{"id":"art_188","numText":"Art. 188","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dichiarazione di inefficacia del decreto d'ingiunzione","contentHtml":"<p>La parte alla quale non e' stato notificato il decreto d'ingiunzione nei termini di cui all'articolo 644 del codice puo' chiedere con ricorso al giudice, che ha pronunciato il decreto, che ne dichiari l'inefficacia.</p>\n<p>Il giudice fissa con decreto un'udienza per la comparizione delle parti davanti a se' e il termine entro il quale il ricorso e il decreto debbono essere notificati alla controparte. La notificazione e' fatta nel domicilio di cui all'articolo 638 del codice se avviene entro l'anno dalla pronuncia e personalmente alla parte a norma degli articoli 137 e seguenti del codice se e' fatta posteriormente.</p>\n<p>Il giudice, sentite le parti, dichiara con ordinanza non impugnabile l'inefficacia del decreto ingiuntivo a tutti gli effetti.</p>\n<p>Il rigetto dell'istanza non impedisce alla parte di proporre domanda di dichiarazione d'inefficacia nei modi ordinari.</p>","notesHtml":""},{"id":"art_189","numText":"Art. 189","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Provvedimenti relativi alla separazione personale dei coniugi","contentHtml":"<p>L'ordinanza con la quale il presidente del tribunale o il giudice istruttore da' i provvedimenti di cui all'articolo 708 del codice costituisce titolo esecutivo. Essa conserva la sua efficacia anche dopo l'estinzione del processo finche' non sia sostituita con altro provvedimento emesso dal presidente o dal giudice istruttore a seguito di nuova presentazione del ricorso per separazione personale dei coniugi.</p>","notesHtml":""},{"id":"art_190","numText":"Art. 190","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Documentazione dell'istanza di dichiarazione di assenza o di morte presunta","contentHtml":"<p>Ai ricorsi indicati negli articoli 722 e 726 del codice debbono essere allegati i documenti comprovanti lo stato di famiglia, il fatto e il tempo della scomparsa.</p>","notesHtml":""},{"id":"art_191","numText":"Art. 191","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Efficacia del processo verbale di vendita di beni immobili appartenenti a minori","contentHtml":"<p>Il processo verbale di vendita dei beni immobili appartenenti a minori costituisce titolo esecutivo per il rilascio.</p>","notesHtml":""},{"id":"art_192","numText":"Art. 192","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modalita' di chiusura dell'inventario","contentHtml":"<p>L'ufficiale che procede all'inventario deve, prima di chiuderlo, interrogare coloro che avevano la custodia dei mobili o abitavano la casa in cui questi erano posti, se siano a conoscenza che esistano altri oggetti da comprendere nell'inventario.</p>","notesHtml":""},{"id":"art_193","numText":"Art. 193","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Giuramento del curatore dell'eredita' giacente","contentHtml":"<p>Il curatore dell'eredita' giacente, prima d'iniziare l'esercizio delle sue funzioni, deve prestare giuramento davanti al pretore di custodire e amministrare fedelmente i beni dell'eredita'.</p>","notesHtml":""},{"id":"art_194","numText":"Art. 194","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Nomina dell'esperto nel giudizio di divisione","contentHtml":"<p>Quando per la formazione della massa da dividersi e delle quote e' necessaria l'opera di un esperto, questi e' nominato, d'ufficio o su istanza del notaio o di uno degli interessati, dal giudice istruttore, che ne riceve il giuramento a norma dell'articolo 193 del codice.</p>","notesHtml":""},{"id":"art_195","numText":"Art. 195","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Decreto di approvazione dell'attribuzione delle quote nel giudizio di divisione","contentHtml":"<p>Il processo verbale dal quale risulta l'attribuzione delle quote nelle operazioni di divisione e' approvato con decreto del giudice istruttore se non sorgono contestazioni o con la sentenza che decide sulle contestazioni sorte.</p>\n<p>Il decreto del giudice istruttore costituisce titolo esecutivo.</p>","notesHtml":""},{"id":"art_196","numText":"Art. 196","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 5 GENNAIO 1994, N. 25","contentHtml":"<p><sup class=\"amd\">15</sup></p>","notesHtml":"<p>AGGIORNAMENTO (15)</p>\n<p>La L. 5 gennaio 1994, n. 25 ha disposto (con l'art. 27, comma 3) che &quot;Qualora il decreto che nega l'esecutorieta' del lodo sia stato emesso anteriormente alla data di entrata in vigore della presente legge e il termine di cui all'ultimo comma dell'articolo 196 delle disposizioni d'attuazione e transitorie del codice di procedura civile, abrogato dall'articolo 17, comma 2, della presente legge, sia ancora in corso, il termine stesso e' prorogato sino al trentesimo giorno&quot;.</p>"},{"id":"art_196","numText":"Art. 196-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Comunicazioni a cura della cancelleria e avvisi in materia di azione di classe","contentHtml":"<p>Tutte le comunicazioni a cura della cancelleria previste dalle disposizioni contenute nel titolo VIII-bis del libro quarto del codice sono eseguite con modalita' telematiche all'indirizzo di posta elettronica certificata ovvero al servizio elettronico di recapito certificato qualificato dichiarato dall'aderente. Si applicano le disposizioni in materia di comunicazioni telematiche.</p>\n<p>Il portale dei servizi telematici gestito dal Ministero della giustizia deve inviare all'indirizzo di posta elettronica ordinaria o certificata ovvero al servizio elettronico di recapito certificato qualificato, ad ogni interessato che ne ha fatto richiesta e si e' registrato mediante un'apposita procedura, un avviso contenente le informazioni relative agli atti per i quali le disposizioni del titolo VIII-bis del libro quarto del codice prevedono la pubblicazione. La richiesta puo' essere limitata alle azioni di classe relative a specifiche imprese o enti gestori di servizi pubblici o di pubblica utilita', anche prima della loro proposizione.\n <sup class=\"amd\">44</sup>\n <sup class=\"amd\">45</sup>\n <sup class=\"amd\">50</sup>\n <sup class=\"amd\">49</sup></p>","notesHtml":"<p>AGGIORNAMENTO (44)</p>\n<p>La L. 12 aprile 2019, n. 31 ha disposto (con l'art. 7, comma 2) che &quot;Le disposizioni della presente legge si applicano alle condotte illecite poste in essere successivamente alla data della sua entrata in vigore. Alle condotte illecite poste in essere precedentemente continuano ad applicarsi le disposizioni vigenti prima della medesima data di entrata in vigore&quot;.</p>\n<p>AGGIORNAMENTO (45)</p>\n<p>La L. 12 aprile 2019, n. 31, come modificata dal D.L. 30 dicembre 2019, n. 162, aveva precedentemente disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entravano in vigore il 19/10/2020. \n La L. 12 aprile 2019, n. 31, come modificata dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha successivamente disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/11/2020.</p>\n<p>AGGIORNAMENTO (50)</p>\n<p>- La L. 12 aprile 2019, n. 31, come modificata dal D.L. 9 novembre 2020, n. 149, ha disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/05/2021. \n - L'aggiornamento in calce, disposto dall'art. 7, comma 1, della L. 12 aprile 2019, n. 31, come modificata dal D.L. 9 novembre 2020, n. 149, ha perso efficacia a seguito dell'abrogazione del su indicato D.L. 9 novembre 2020, n. 149, ad opera della L. 18 dicembre 2020, n. 176, la quale ne ha contestualmente fatti salvi gli effetti.</p>\n<p>AGGIORNAMENTO (49)</p>\n<p>La L. 12 aprile 2019, n. 31, come modificata dal D.L. 28 ottobre 2020, n. 137, convertito con modificazioni dalla L. 18 dicembre 2020, n. 176, ha disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/05/2021.</p>"},{"id":"art_196","numText":"Art. 196-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Elenco delle organizzazioni e associazioni legittimate all'azione di classe","contentHtml":"<p>Con decreto del Ministro della giustizia, di concerto con il Ministro dello sviluppo economico, previo parere delle Commissioni parlamentari competenti, sono stabiliti i requisiti per l'iscrizione nell'elenco di cui all'articolo 840-bis, secondo comma, del codice, i criteri per la sospensione e la cancellazione delle organizzazioni e associazioni iscritte, nonche' il contributo dovuto ai fini dell'iscrizione e del mantenimento della stessa. Il contributo di cui al presente comma e' fissato in misura tale da consentire comunque di far fronte alle spese di istituzione, di sviluppo e di aggiornamento dell'elenco. I requisiti per l'iscrizione comprendono la verifica delle finalita' programmatiche, dell'adeguatezza a rappresentare e tutelare i diritti omogenei azionati e della stabilita' e continuita' delle associazioni e delle organizzazioni stesse, nonche' la verifica delle fonti di finanziamento utilizzate. Con il medesimo decreto sono stabilite le modalita' di aggiornamento dell'elenco.</p>\n<p><sup class=\"amd\">44</sup>\n <sup class=\"amd\">45</sup>\n <sup class=\"amd\">50</sup>\n <sup class=\"amd\">49</sup></p>","notesHtml":"<p>AGGIORNAMENTO (44)</p>\n<p>La L. 12 aprile 2019, n. 31 ha disposto (con l'art. 7, comma 2) che &quot;Le disposizioni della presente legge si applicano alle condotte illecite poste in essere successivamente alla data della sua entrata in vigore. Alle condotte illecite poste in essere precedentemente continuano ad applicarsi le disposizioni vigenti prima della medesima data di entrata in vigore&quot;.</p>\n<p>AGGIORNAMENTO (45)</p>\n<p>La L. 12 aprile 2019, n. 31, come modificata dal D.L. 30 dicembre 2019, n. 162, aveva precedentemente disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entravano in vigore il 19/10/2020. \n La L. 12 aprile 2019, n. 31, come modificata dal D.L. 30 dicembre 2019, n. 162, convertito con modificazioni dalla L. 28 febbraio 2020, n. 8, ha successivamente disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/11/2020.</p>\n<p>AGGIORNAMENTO (50)</p>\n<p>- La L. 12 aprile 2019, n. 31, come modificata dal D.L. 9 novembre 2020, n. 149, ha disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/05/2021. \n - L'aggiornamento in calce, disposto dall'art. 7, comma 1, della L. 12 aprile 2019, n. 31, come modificata dal D.L. 9 novembre 2020, n. 149, ha perso efficacia a seguito dell'abrogazione del su indicato D.L. 9 novembre 2020, n. 149, ad opera della L. 18 dicembre 2020, n. 176, la quale ne ha contestualmente fatti salvi gli effetti.</p>\n<p>AGGIORNAMENTO (49)</p>\n<p>La L. 12 aprile 2019, n. 31, come modificata dal D.L. 28 ottobre 2020, n. 137, convertito con modificazioni dalla L. 18 dicembre 2020, n. 176, ha disposto (con l'art. 7, comma 1) che le disposizioni di cui al presente articolo entrano in vigore il 19/05/2021.</p>"},{"id":"art_196","numText":"Art. 196-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Obbligatorieta' del deposito telematico di atti e di provvedimenti","contentHtml":"<p>Il deposito degli atti processuali e dei documenti da parte del pubblico ministero, dei difensori e dei soggetti nominati o delegati dall'autorita' giudiziaria ha luogo esclusivamente con modalita' telematiche. Con le stesse modalita' le parti depositano gli atti e i documenti provenienti dai soggetti da esse nominati. Quando e' necessario ai fini della decisione, il giudice puo' ordinare il deposito di singoli atti e documenti su supporto cartaceo, indicandone specificamente la ragione.(56) <sup class=\"amd\">59</sup></p>\n<p>Il deposito dei provvedimenti del giudice e dei verbali di udienza ha luogo con modalita' telematiche. (56)</p>\n<p>Il deposito con modalita' telematiche e' effettuato nel rispetto della normativa anche regolamentare concernente la sottoscrizione, la trasmissione e la ricezione dei documenti informatici.</p>\n<p>Il capo dell'ufficio autorizza il deposito con modalita' non telematiche quando sussiste una situazione di urgenza e il direttore generale per i servizi informativi automatizzati del Ministero della giustizia certifica che i sistemi informatici del dominio giustizia non sono funzionanti. La certificazione del direttore generale e' pubblicata sul portale dei servizi telematici del Ministero della giustizia. Il ripristino del corretto funzionamento e' comunicato con le medesime modalita'.\n <sup class=\"amd\">59</sup> \n (54)(55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.L.gs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, commi 2, 3 e 4) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter del codice di procedura civile, quelle previste dal Capo I del Titolo V-ter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' l'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotte dal presente decreto hanno effetto a decorrere dal 1° gennaio 2023 e da tale data si applicano ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Gli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 30 giugno 2023. \n 3. Davanti al giudice di pace e al tribunale superiore delle acque pubbliche le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal 30 giugno 2023, anche ai procedimenti pendenti a tale data, fatte salve le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter che hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al primo periodo. \n 4. Ai procedimenti civili pendenti davanti agli uffici giudiziari diversi da quelli di cui ai commi 2 e 3 le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal quindicesimo giorno successivo alla pubblicazione nella Gazzetta Ufficiale della Repubblica italiana dei decreti, non aventi natura regolamentare, con i quali il Ministro della giustizia accerta la funzionalita' dei relativi servizi&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 2) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile, quelle previste dal capo I del titolo Vter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' quelle previste dall'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano a decorrere dal 1° gennaio 2023 anche ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Le disposizioni degli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 28 febbraio 2023&quot;. \n - (con l'art. 35, comma 3) che &quot;Davanti al giudice di pace, al tribunale per i minorenni, al commissario per la liquidazione degli usi civici e al tribunale superiore delle acque pubbliche, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile e quelle dell'articolo 196-duodecies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, introdotti dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Davanti ai medesimi uffici, le disposizioni previste dal capo I del titolo V-ter delle citate disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotto dal presente decreto, si applicano a decorrere dal 30 giugno 2023 anche ai procedimenti pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al secondo periodo&quot;.</p>\n<p>AGGIORNAMENTO (56)</p>\n<p>Il D.L. 24 febbraio 2023, n. 13 ha disposto (con l'art. 35, comma 4) che, salvo quanto previsto dall'articolo 35, comma 3, secondo periodo, del decreto legislativo 10 ottobre 2022, n. 149, le disposizioni di cui al comma 3 del presente articolo hanno effetto a decorrere dal 1° marzo 2023 e si applicano anche ai procedimenti gia' pendenti a quella data.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_196","numText":"Art. 196-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Dell'atto del processo redatto in formato elettronico","contentHtml":"<p>L'atto del processo e' redatto in formato elettronico dal magistrato o dal personale degli uffici giudiziari e degli uffici notificazioni, esecuzioni e protesti ed e' depositato telematicamente nel fascicolo informatico. <sup class=\"amd\">59</sup></p>\n<p>In caso di atto formato da organo collegiale l'originale del provvedimento e' sottoscritto con firma digitale secondo quanto previsto dagli articoli 132, terzo comma, 134, primo comma, e 135, quarto comma, del codice. <sup class=\"amd\">59</sup></p>\n<p>Quando l'atto e' redatto dal cancelliere o dal segretario dell'ufficio giudiziario questi vi appone la propria firma digitale e ne effettua il deposito nel fascicolo informatico.</p>\n<p>Se l'atto del processo e' in formato cartaceo il cancelliere ne estrae copia informatica, nel rispetto della normativa anche regolamentare, che deposita nel fascicolo informatico. Il provvedimento del magistrato si intende depositato, anche agli effetti di cui all'articolo 133 del codice, quando e' effettuato il deposito nel fascicolo informatico.\n <sup class=\"amd\">59</sup></p>\n<p>Se il provvedimento di correzione di cui all'articolo 288 del codice e' redatto in formato elettronico, il cancelliere forma un documento informatico contenente la copia del provvedimento corretto e del provvedimento di correzione, lo sottoscrive digitalmente e lo inserisce nel fascicolo informatico. \n (54)(55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.L.gs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, commi 2, 3 e 4) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter del codice di procedura civile, quelle previste dal Capo I del Titolo V-ter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' l'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotte dal presente decreto hanno effetto a decorrere dal 1° gennaio 2023 e da tale data si applicano ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Gli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 30 giugno 2023. \n 3. Davanti al giudice di pace e al tribunale superiore delle acque pubbliche le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal 30 giugno 2023, anche ai procedimenti pendenti a tale data, fatte salve le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter che hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al primo periodo. \n 4. Ai procedimenti civili pendenti davanti agli uffici giudiziari diversi da quelli di cui ai commi 2 e 3 le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal quindicesimo giorno successivo alla pubblicazione nella Gazzetta Ufficiale della Repubblica italiana dei decreti, non aventi natura regolamentare, con i quali il Ministro della giustizia accerta la funzionalita' dei relativi servizi&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 2) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile, q
