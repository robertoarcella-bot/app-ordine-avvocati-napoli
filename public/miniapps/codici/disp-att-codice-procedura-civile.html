. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_137","numText":"Art. 137-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Pubblicita' degli atti dei procedimenti pendenti","contentHtml":"<p>Fermo quanto previsto dall'articolo 51 del decreto legislativo 30 giugno 2003, n. 196, sono pubblicati nel sito istituzionale della Corte, a cura del centro elettronico di documentazione:</p>\n<p>1) i provvedimenti che dispongono il rinvio pregiudiziale di cui all'articolo 363-bis del codice e i decreti del primo presidente ad esso relativi;</p>\n<p>2) i ricorsi proposti dal procuratore generale della Corte di cassazione nell'interesse della legge e le sue conclusioni scritte, quando formulate.</p>\n<p>(54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_138","numText":"Art. 138","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 2 FEBBRAIO 2006, N. 40","contentHtml":"","notesHtml":""},{"id":"art_139","numText":"Art. 139","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza di rimessione alle sezioni unite","contentHtml":"<p>L'istanza prevista nell'articolo 376 del codice si propone con ricorso diretto al primo presidente, contenente l'indicazione del ricorso di cui si chiede la rimessione alle sezioni unite e le ragioni per le quali si ritiene che sia di competenza di queste.</p>\n<p>Il ricorso e' depositato nel termine previsto nell'articolo 376 secondo comma del codice. (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_140","numText":"Art. 140","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"<p><sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_140","numText":"Art. 140-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Svolgimento della camera di consiglio","contentHtml":"<p>La camera di consiglio si svolge in presenza. Il presidente del collegio, con proprio decreto, puo' disporre lo svolgimento della camera di consiglio mediante collegamento audiovisivo a distanza, per esigenze di tipo organizzativo.</p>\n<p>(54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_141","numText":"Art. 141","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Deliberazione dei provvedimenti","contentHtml":"<p>Nel deliberare i provvedimenti la corte applica le disposizioni dell'articolo 276 del codice.</p>\n<p>Il relatore vota per primo, quindi votano i consiglieri in ordine inverso di anzianita' e per ultimo il presidente.</p>\n<p>La scelta dell'estensore della sentenza e' fatta dal presidente tra i componenti il collegio che hanno espresso voto conforme alla decisione.</p>","notesHtml":""},{"id":"art_142","numText":"Art. 142","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ricorso di competenza delle sezioni unite e delle sezioni semplici","contentHtml":"<p>Se nel ricorso sono contenuti motivi di competenza delle sezioni semplici insieme con motivi di competenza delle sezioni unite, queste, se non ritengono opportuno decidere l'intero ricorso, dopo aver deciso i motivi di propria competenza, rimettono, con ordinanza, alla sezione semplice la causa per la decisione, con separata sentenza, degli ulteriori motivi.</p>\n<p>Le sezioni unite possono disporre ai sensi del primo comma anche nel caso di rimessione ai sensi dell'articolo 374, terzo comma, del codice.</p>","notesHtml":""},{"id":"art_143","numText":"Art. 143","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 143.</p>\n<p>(Formulazione del principio di diritto affermato dalla corte).</p>\n<p>La Corte enuncia specificamente, a norma dell'articolo 384 del codice, il principio di diritto al quale il giudice di rinvio deve uniformarsi.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_144","numText":"Art. 144","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma della domanda di restituzione o di riduzione in pristino","contentHtml":"<p>Le domande conseguenti alla cassazione della sentenza previste nell'articolo 389 del codice debbono essere proposte con citazione da notificarsi personalmente alla parte a norma degli articoli 137 e seguenti del codice.</p>","notesHtml":""},{"id":"art_144","numText":"Art. 144-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Attestazione del cancelliere in caso di mancata integrazione del contradditorio","contentHtml":"<p>Qualora non sia stato osservato il disposto di cui all'articolo 371-bis del codice, il cancelliere lo attesta con apposita dichiarazione, da allegare al fascicolo d'ufficio, per gli adempimenti di cui all'articolo 138.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;</p>"},{"id":"art_144","numText":"Art. 144-bis.1","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Restituzione del fascicolo d'ufficio e dei fascicoli di parte","contentHtml":"<p>Dopo la definizione del giudizio, il fascicolo d'ufficio trasmesso ai sensi dell'articolo 137-bis e gli atti e i documenti depositati dalle parti e gia' prodotti nei precedenti gradi del processo sono restituiti, decorsi novanta giorni dal deposito della decisione, alla cancelleria del giudice che ha pronunciato la sentenza impugnata.</p>\n<p>(54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n - (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_144","numText":"Art. 144-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Controversie individuali di lavoro","contentHtml":"<p>Tra le controversie previste dall'articolo 409 del codice non si considerano in ogni caso comprese quelle di cui all'articolo 50-bis, primo comma, n. 5), seconda parte, del codice.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_144","numText":"Art. 144-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"","notesHtml":""},{"id":"art_144","numText":"Art. 144-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Controversie in materia di licenziamento","contentHtml":"<p>Il presidente di sezione e il dirigente dell'ufficio giudiziario favoriscono e verificano la trattazione prioritaria dei procedimenti di cui al capo I-bis del titolo IV del libro secondo del codice. In ciascun ufficio giudiziario sono effettuate estrazioni statistiche trimestrali che consentono di valutare la durata media dei processi di cui all'articolo 441-bis del codice, in confronto con la durata degli altri processi in materia di lavoro.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_145","numText":"Art. 145","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Termine per la nomina del consulente tecnico","contentHtml":"<p>Per le controversie di lavoro e per quelle in materia di previdenza e di assistenza il termine previsto dall'articolo 201 del codice non deve superare i giorni sei.</p>","notesHtml":""},{"id":"art_146","numText":"Art. 146","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Albo dei consulenti tecnici","contentHtml":"<p>Nell'albo dei consulenti tecnici istituiti presso ogni tribunale debbono essere inclusi, per i processi relativi a domande di prestazioni previdenziali e assistenziali, i medici legali e delle assicurazioni e i medici del lavoro.</p>","notesHtml":""},{"id":"art_146","numText":"Art. 146-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Accertamento pregiudiziale sull'efficacia, validita' ed interpretazione dei contratti e accordi collettivi","contentHtml":"<p>Nel caso di cui all'articolo 420-bis del codice si applica, in quanto compatibile, l'articolo 64, commi 4, 6, 7 e 8, del decreto legislativo 30 marzo 2001, n. 165..</p>","notesHtml":""},{"id":"art_147","numText":"Art. 147","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Conciliazione, arbitrati e collegiali mediche nelle controversie in materia di previdenza e di assistenza obbligatorie","contentHtml":"<p>Nelle controversie in materia di previdenza e di assistenza obbligatorie sono privi di qualsiasi efficacia vincolante, sostanziale e processuale, gli arbitrati rituali, gli arbitrati irrituali, le collegiali mediche, quale ne sia la natura giuridica, e le conciliazioni stragiudiziali intervenute anteriormente o posteriormente alla proposizione dell'azione giudiziaria. Nelle controversie di cui al comma precedente i ricorsi amministrativi hanno effetto sospensivo di ogni provvedimento che implichi l'annullamento del rapporto assicurativo.</p>","notesHtml":""},{"id":"art_148","numText":"Art. 148","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Abrogazione delle disposizioni di leggi speciali circa la proponibilita' della domanda in materia di previdenza e di assistenza obbligatorie","contentHtml":"<p>Sono abrogate tutte le disposizioni contenute nelle leggi speciali in materia di previdenza e di assistenza obbligatorie che, in difformita' da quanto stabilito dall'articolo 443 del codice, condizionano la proponibilita' della domanda giudiziaria al preventivo esperimento dei procedimenti amministrativi contenziosi.</p>","notesHtml":""},{"id":"art_149","numText":"Art. 149","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Controversie in materia di invalidita' pensionabile","contentHtml":"<p>Nelle controversie in materia di invalidita' pensionabile deve essere valutato dal giudice anche l'aggravamento della malattia, nonche' tutte le infermita' comunque incidenti sul complesso invalidante che si siano verificate nel corso tanto del procedimento amministrativo che di quello giudiziario.</p>","notesHtml":""},{"id":"art_150","numText":"Art. 150","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Calcolo della svalutazione monetaria","contentHtml":"<p>Ai fini del calcolo di cui all'articolo 429, ultimo comma, del codice; il giudice applichera' l'indice dei prezzi calcolato dall'ISTAT per la scala mobile per i lavoratori dell'industria.</p>","notesHtml":""},{"id":"art_151","numText":"Art. 151","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riunione di procedimenti","contentHtml":"<p>La riunione, ai sensi dell'articolo 274 del codice, dei procedimenti relativi a controversie in materia di lavoro e di previdenza e di assistenza e a controversie dinanzi al giudice di pace, connesse anche soltanto per identita' delle questioni dalla cui risoluzione dipende, totalmente o parzialmente, la loro decisione, deve essere sempre disposta dal giudice, tranne nelle ipotesi che essa renda troppo gravoso o comunque ritardi eccessivamente il processo. In queste ipotesi la riunione, salvo gravi e motivate ragioni, e', comunque, disposta tra le controversie che si trovano nella stessa fase processuale. Analogamente si provvede nel giudizio di appello..</p>\n<p>Le competenze e gli onorari saranno ridotti in considerazione dell'unitaria trattazione delle controversie riunite.</p>","notesHtml":""},{"id":"art_152","numText":"Art. 152","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Esenzione dal pagamento di spese, competenze e onorari nei giudizi per prestazioni previdenziali","contentHtml":"<p>Nei giudizi promossi per ottenere prestazioni previdenziali o assistenziali la parte soccombente, salvo comunque quanto previsto dall'articolo 96, primo comma, del codice di procedura civile, non puo' essere condannata al pagamento delle spese, competenze ed onorari quando risulti titolare, nell'anno precedente a quello della pronuncia, di un reddito imponibile ai fini IRPEF, risultante dall'ultima dichiarazione, pari o inferiore a due volte l'importo del reddito stabilito ai sensi degli articoli 76, commi da 1 a 3, e 77 del testo unico delle disposizioni legislative e regolamentari in materia di spese di giustizia di cui al decreto del Presidente della Repubblica 30 maggio 2002, n. 115. L'interessato che, con riferimento all'anno precedente a quello di instaurazione del giudizio, si trova nelle condizioni indicate nel presente articolo formula apposita dichiarazione sostitutiva di certificazione nelle conclusioni dell'atto introduttivo e si impegna a comunicare, fino a che il processo non sia definito, le variazioni rilevanti dei limiti di reddito verificatesi nell'anno precedente. Si applicano i commi 2 e 3 dell'articolo 79 e l'articolo 88 del citato testo unico di cui al decreto del Presidente della Repubblica n. 115 del 2002. Le spese, competenze ed onorari liquidati dal giudice nei giudizi per prestazioni previdenziali non possono superare il valore della prestazione dedotta in giudizio. A tale fine la parte ricorrente, a pena di inammissibilita' di ricorso, formula apposita dichiarazione del valore della prestazione dedotta in giudizio, quantificandone l'importo nelle conclusioni dell'atto introduttivo.<sup class=\"amd\">42</sup></p>","notesHtml":"<p>AGGIORNAMENTO (42)</p>\n<p>La Corte costituzionale, con sentenza 24 ottobre 2017, n. 241 (in G.U. 1ª 22/11/2017 n. 47), ha dichiarato &quot;l'illegittimita' costituzionale dell'art. 152, ultimo periodo, delle disposizioni di attuazione del codice di procedura civile, come modificato dall'art. 38, comma 1, lettera b), n. 2, del decreto-legge 6 luglio 2011, n. 98 (Disposizioni urgenti per la stabilizzazione finanziaria), convertito, con modificazioni, nella legge 15 luglio 2011, n. 111&quot;.</p>"},{"id":"art_152","numText":"Art. 152-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Liquidazione di spese processuali","contentHtml":"<p>Nelle liquidazioni delle spese di cui all'articolo 91 del codice di procedura civile a favore delle pubbliche amministrazioni di cui all'articolo 1, comma 2, del decreto legislativo 30 marzo 2001, n. 165, e successive modificazioni, se assistite da propri dipendenti ai sensi dell'articolo 417-bis del codice di procedura civile, si applica il decreto adottato ai sensi dell'articolo 9, comma 2, del decreto-legge 24 gennaio 2012, n. 1, convertito, con modificazioni, dalla legge 24 marzo 2012, n. 27, per la liquidazione del compenso spettante agli avvocati, con la riduzione del venti per cento dell'importo complessivo ivi previsto. La riscossione avviene mediante iscrizione al ruolo ai sensi del decreto del Presidente della Repubblica 29 settembre 1973, n. 600.</p>","notesHtml":""},{"id":"art_152","numText":"Art. 152-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Procedimenti in camera di consiglio","contentHtml":"<p>I provvedimenti previsti negli articoli 145 e 316 del codice sono di competenza del tribunale del circondario del luogo in cui e' stabilita la residenza familiare o, se questa manchi, del tribunale del luogo del domicilio di uno dei coniugi. Il tribunale provvede in camera di consiglio in composizione monocratica con decreto immediatamente esecutivo.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_152","numText":"Art. 152-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ascolto del minore","contentHtml":"<p>Quando la salvaguardia del minore e' assicurata con idonei mezzi tecnici, quali l'uso di un vetro specchio unitamente ad impianto citofonico, i difensori delle parti, il curatore speciale del minore, se gia' nominato, ed il pubblico ministero possono seguire l'ascolto del minore, in luogo diverso da quello in cui egli si trova, senza chiedere l'autorizzazione del giudice prevista dall'articolo 473-bis.5, terzo comma, del codice.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_152","numText":"Art. 152-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Registrazione audiovisiva dell'ascolto","contentHtml":"<p>Con provvedimento del Direttore generale dei sistemi informativi e automatizzati del Ministero della giustizia sono stabilite le regole tecniche per la registrazione audiovisiva, la sua conservazione e il suo inserimento nel fascicolo informatico.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_152","numText":"Art. 152-sexies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Indagini del consulente","contentHtml":"<p>Fermo quanto previsto dall'articolo 90, il consulente tecnico nominato ai sensi degli articoli 473-bis.25 e 473-bis.44 del codice fissa il calendario delle operazioni peritali e lo comunica ai difensori e ai consulenti tecnici di parte se nominati.</p>\n<p>Il consulente puo' chiedere al giudice la proroga del termine per il deposito della relazione, con istanza motivata, su concorde richiesta delle parti o in caso di particolare complessita' delle indagini.</p>\n<p>Unitamente alla relazione di cui all'articolo 195 del codice, il consulente deposita la documentazione utilizzata e i supporti contenenti le registrazioni audiovisive delle operazioni relative al minore.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_152","numText":"Art. 152-septies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Scioglimento o cessazione degli effetti civili del matrimonio","contentHtml":"<p>Del ricorso per lo scioglimento o la cessazione degli effetti civili del matrimonio il cancelliere da' comunicazione all'ufficiale dello stato civile del luogo dove il matrimonio fu trascritto per l'annotazione in calce all'atto.</p>\n<p>La sentenza che pronuncia lo scioglimento o la cessazione degli effetti civili del matrimonio, quando sia passata in giudicato, deve essere trasmessa in copia autentica, a cura del cancelliere del tribunale o della Corte che l'ha emessa, all'ufficiale dello stato civile del comune in cui il matrimonio fu trascritto, per le annotazioni e le ulteriori incombenze di cui al decreto del Presidente della Repubblica 3 novembre 2000, n. 396.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_152","numText":"Art. 152-octies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Esame da remoto dell'interdicendo o inabilitando","contentHtml":"<p>Le modalita' del collegamento da remoto previsto dall'articolo 473-bis.54, terzo comma, del codice sono individuate e regolate con provvedimento del Direttore generale dei sistemi informativi e automatizzati del Ministero della giustizia.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_153","numText":"Art. 153","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Copia degli atti ricevuti da notaio o da altro pubblico ufficiale","contentHtml":"<p>La copia degli atti ricevuti da notaio o da altro pubblico ufficiale deve essere munita del sigillo del notaio o dell'ufficio al quale appartiene l'ufficiale pubblico.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_154","numText":"Art. 154","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>Art 154.</p>\n<p>ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197</p>","notesHtml":""},{"id":"art_155","numText":"Art. 155","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Certificato di prestata cauzione","contentHtml":"<p>Il certificato di prestata cauzione indicato nell'articolo 478 del codice e' rilasciato dal cancelliere del giudice che ha pronunciato il provvedimento costituente titolo esecutivo.</p>","notesHtml":""},{"id":"art_155","numText":"Art. 155-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Archivio dei rapporti finanziari","contentHtml":"<p>Per archivio dei rapporti finanziari di cui all'articolo 492-bis, quarto comma, del codice si intende la sezione di cui all'articolo 7, sesto comma, del decreto del Presidente della Repubblica 29 settembre 1973, n. 605. \n (38)(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (38)</p>\n<p>Il D.L. 12 settembre 2014, n. 132, convertito con modificazioni dalla L. 10 novembre 2014, n. 162, ha disposto (con l'art. 19, comma 6-bis) che la presente modifica si applica ai procedimenti iniziati a decorrere dal trentesimo giorno successivo alla data di entrata in vigore della legge di conversione del D.L. medesimo.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_155","numText":"Art. 155-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Partecipazione del creditore alla ricerca dei beni da pignorare con modalita' telematiche","contentHtml":"<p>La partecipazione del creditore alla ricerca dei beni da pignorare di cui all'articolo 492-bis del codice ha luogo a norma dell'articolo 165 di queste disposizioni.</p>\n<p>Nei casi di cui all'articolo 492-bis, ottavo e nono comma, l'ufficiale giudiziario, terminate le operazioni di ricerca dei beni con modalita' telematiche, comunica al creditore le banche dati interrogate e le informazioni dalle stesse risultanti a mezzo telefax o posta elettronica anche non certificata, dandone atto a verbale. Il creditore entro dieci giorni dalla comunicazione indica all'ufficiale giudiziario i beni da sottoporre ad esecuzione; in mancanza la richiesta di pignoramento perde efficacia.(54) <sup class=\"amd\">55</sup> \n (38)</p>","notesHtml":"<p>AGGIORNAMENTO (38)</p>\n<p>Il D.L. 12 settembre 2014, n. 132, convertito con modificazioni dalla L. 10 novembre 2014, n. 162, ha disposto (con l'art. 19, comma 6-bis) che la presente modifica si applica ai procedimenti iniziati a decorrere dal trentesimo giorno successivo alla data di entrata in vigore della legge di conversione del D.L. medesimo.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_155","numText":"Art. 155-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modalita' di accesso alle banche dati","contentHtml":"<p>Le pubbliche amministrazioni che gestiscono banche dati contenenti informazioni utili ai fini della ricerca di cui all'articolo 492-bis del codice mettono a disposizione degli ufficiali giudiziari gli accessi, con le modalita' di cui all'articolo 58 del codice di cui al decreto legislativo 7 marzo 2005, n. 82, e successive modificazioni, su richiesta del Ministero della giustizia. Sino a quando non sono definiti dall'Agenzia per l'Italia digitale gli standard di comunicazione e le regole tecniche di cui al comma 2 del predetto articolo 58 e, in ogni caso, quando l'amministrazione che gestisce la banca dati o il Ministero della giustizia non dispongono dei sistemi informatici per la cooperazione applicativa di cui all'articolo 72, comma 1, lettera e), del medesimo codice di cui al decreto legislativo n. 82 del 2005, l'accesso e' consentito previa stipulazione, senza nuovi o maggiori oneri per la finanza pubblica, di una convenzione finalizzata alla fruibilita' informatica dei dati, sentito il Garante per la protezione dei dati personali. Il Ministero della giustizia pubblica sul portale dei servizi telematici l'elenco delle banche dati per le quali e' operativo l'accesso da parte dell'ufficiale giudiziario per le finalita' di cui all'articolo 492-bis del codice.</p>\n<p>Il Ministro della giustizia puo' procedere al trattamento dei dati acquisiti senza provvedere all'informativa di cui all'articolo 13 del decreto legislativo 30 giugno 2003, n. 196.</p>\n<p>E' istituito, presso ogni ufficio notifiche, esecuzioni e protesti, il registro cronologico denominato &quot;Modello ricerca beni&quot;, conforme al modello adottato con il decreto del Ministro della giustizia di cui al primo comma.</p>\n<p>L'accesso da parte dell'ufficiale giudiziario alle banche dati di cui all'articolo 492-bis del codice e a quelle individuate con il decreto di cui al primo comma e' gratuito. La disposizione di cui al periodo precedente si applica anche all'accesso effettuato a norma dell'articolo 155-quinquies di queste disposizioni. \n (38)</p>","notesHtml":"<p>AGGIORNAMENTO (38)</p>\n<p>Il D.L. 12 settembre 2014, n. 132, convertito con modificazioni dalla L. 10 novembre 2014, n. 162, ha disposto (con l'art. 19, comma 6-bis) che la presente modifica si applica ai procedimenti iniziati a decorrere dal trentesimo giorno successivo alla data di entrata in vigore della legge di conversione del D.L. medesimo.</p>"},{"id":"art_155","numText":"Art. 155-quinquies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Accesso alle banche dati tramite i gestori","contentHtml":"<p>Se e' proposta istanza ai sensi dell'articolo 492-bis del codice, quando le strutture tecnologiche, necessarie a consentire l'accesso diretto da parte dell'ufficiale giudiziario alle banche dati di cui al quarto comma del medesimo articolo e a quelle individuate con il decreto di cui all'articolo 155-quater, primo comma, non sono funzionanti, l'ufficiale giudiziario attesta che l'accesso diretto alle suddette banche dati non e' attuabile.</p>\n<p>L'istante con l'attestazione di cui al primo comma o con l'autorizzazione del presidente del tribunale ai sensi dell'articolo 492-bis, secondo comma, del codice, ove necessaria, puo' ottenere dai gestori delle banche dati previste dal predetto articolo e dall'articolo 155-quater le informazioni nelle stesse contenute.</p>\n<p>Dal rilascio dell'attestazione di cui al primo comma, o dal provvedimento di autorizzazione del presidente del tribunale, se il precetto e' notificato anteriormente, il termine di cui all'articolo 481, primo comma, del codice rimane sospeso per ulteriori novanta giorni. Se il precetto e' notificato dopo il provvedimento di autorizzazione del presidente del tribunale, tale termine rimane sospeso sino al decorso di novanta giorni da tale provvedimento.</p>\n<p>Si applicano per quanto compatibili l'ottavo comma dell'articolo 492 e il decimo comma dell'articolo 492-bis del codice.</p>\n<p>La disposizione di cui al primo comma si applica, limitatamente a ciascuna delle banche dati comprese nell'anagrafe tributaria, ivi incluso l'archivio dei rapporti finanziari, nonche' a quelle degli enti previdenziali, sino all'inserimento di ognuna di esse nell'elenco di cui all'articolo 155-quater, primo comma.</p>\n<p>(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (38)</p>\n<p>Il D.L. 12 settembre 2014, n. 132, convertito con modificazioni dalla L. 10 novembre 2014, n. 162, ha disposto (con l'art. 19, comma 6) che &quot;L'articolo 155-quinquies delle disposizioni per l'attuazione del codice di procedura civile, di cui al regio decreto 18 dicembre 1941, n. 1368, introdotto dal comma 2, lettera a), del presente articolo, si applica anche ai procedimenti di cui al comma 5&quot;. \n Ha inoltre disposto (con l'art. 19, comma 6-bis) che la presente modifica si applica ai procedimenti iniziati a decorrere dal trentesimo giorno successivo alla data di entrata in vigore della legge di conversione del D.L. medesimo.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_155","numText":"Art. 155-sexies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ulteriori casi di applicazione delle disposizioni per la ricerca con modalita' telematiche dei beni da pignorare","contentHtml":"<p>Le disposizioni in materia di ricerca con modalita' telematiche dei beni da pignorare si applicano anche per l'esecuzione del sequestro conservativo e per la ricostruzione dell'attivo e del passivo nell'ambito di procedure concorsuali di procedimenti in materia di famiglia e di quelli relativi alla gestione di patrimoni altrui. Ai fini del recupero o della cessione dei crediti, il curatore, il commissario e il liquidatore giudiziale possono avvalersi delle medesime disposizioni anche per accedere ai dati relativi ai soggetti nei cui confronti la procedura ha ragioni di credito, anche in mancanza di titolo esecutivo nei loro confronti. Quando di tali disposizioni ci si avvale nell'ambito di procedure concorsuali e di procedimenti in materia di famiglia, l'autorizzazione spetta al giudice del procedimento.</p>","notesHtml":""},{"id":"art_156","numText":"Art. 156","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Esecuzione sui beni sequestrati","contentHtml":"<p>Il sequestrante che ha ottenuto la sentenza di condanna esecutiva prevista nell'articolo 686 del codice deve depositarne copia presso il giudice competente per l'esecuzione nel termine perentorio di sessanta giorni dalla comunicazione, e deve quindi procedere alle notificazioni previste nell'articolo 498 del codice.(14)(17) <sup class=\"amd\">59</sup> \n Se oggetto del sequestro sono beni immobili, il sequestrante deve inoltre chiedere, nel termine perentorio di cui al comma precedente, l'annotazione della sentenza di condanna esecutiva in margine alla trascrizione prevista nell'articolo 679 del codice.</p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>Il D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L.6 dicembre 1994, n. 673 nel modificare l'art. 85 della L. 26 novembre 1990, n. 353 ha disposto (con l'art. 4, comma 5) che &quot;Gli articoli 74, 75, 76, 77, 85 e 86 della legge 26 novembre 1990, n. 353, e successive modifiche ed integrazioni, si applicano, in quanto compatibili, ai giudizi pendenti alla data di entrata in vigore del presente decreto; tutti i sequestri anteriormente autorizzati perdono la loro efficacia se con sentenza, anche non passata in giudicato, e' rigettata l'istanza di convalida ovvero e' dichiarato inesistente il diritto a cautela del quale erano stati concessi.&quot;; \n La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_156","numText":"Art. 156-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Esecuzione sui bene sequestrati in forza di sentenza straniera o di lodo arbitrale","contentHtml":"<p>Se la causa di merito e' devoluta alla giurisdizione di un giudice straniero o e' compromessa in arbitri, il sequestrante deve, a pena di perdita di efficacia del sequestro conservativo ottenuto, proporre domanda di esecutorieta' in Italia della sentenza straniera o del lodo entro il termine perentorio di sessanta giorni, decorrente dal momento in cui la domanda di esecutorieta' e' proponibile.</p>\n<p>La dichiarazione di esecutorieta' produce gli effetti di cui all'articolo 686 del codice e diventa applicabile il precedente articolo 156.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>Il D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L.6 dicembre 1994, n. 673 nel modificare l'art. 86 della L. 26 novembre 1990, n. 353 ha disposto (con l'art. 4, comma 5) che &quot;Gli articoli 74, 75, 76, 77, 85 e 86 della legge 26 novembre 1990, n. 353, e successive modifiche ed integrazioni, si applicano, in quanto compatibili, ai giudizi pendenti alla data di entrata in vigore del presente decreto; tutti i sequestri anteriormente autorizzati perdono la loro efficacia se con sentenza, anche non passata in giudicato, e' rigettata l'istanza di convalida ovvero e' dichiarato inesistente il diritto a cautela del quale erano stati concessi.&quot;; \n La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;</p>"},{"id":"art_157","numText":"Art. 157","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processo verbale di pagamento nelle mani dell'ufficiale giudiziario","contentHtml":"<p>L'ufficiale giudiziario redige processo verbale del versamento eseguito dal debitore delle somme che debbono essere consegnate al creditore a norma dell'art. 494 primo comma del Codice.</p>\n<p>Nello stesso processo verbale inserisce l'eventuale riserva di ripetizione della somma versata, prevista nel secondo comma dello stesso articolo.</p>\n<p>Il processo verbale e' depositato immediatamente in cancelleria insieme con la prova del versamento al creditore della somma consegnata dal debitore. Del processo verbale si prende nota nel ruolo generale delle esecuzioni.</p>\n<p>Alla registrazione del processo verbale provvede il cancelliere.</p>","notesHtml":""},{"id":"art_158","numText":"Art. 158","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Avviso al sequestrante","contentHtml":"<p>Quando dall'atto di pignoramento o dai pubblici registri risulta l'esistenza di un sequestro conservativo sui beni pignorati, il creditore pignorante deve fare notificare al sequestrante avviso del pignoramento a norma dell'articolo 498 del codice.</p>","notesHtml":""},{"id":"art_159","numText":"Art. 159","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istituti autorizzati all'incanto, e all'amministrazione dei beni","contentHtml":"<p>Gli istituti ai quali possono essere affidate la vendita all'incanto dei beni mobili a norma dell'articolo 534 del codice o l'amministrazione giudiziaria dei beni immobili a norma dell'articolo 592 del codice sono autorizzati con decreto del Ministro di grazia e giustizia.</p>\n<p>Agli istituti autorizzati alle vendite all'incanto dei mobili pignorati puo' essere affidata anche la custodia e la vendita dei mobili stessi previste negli articoli 520 secondo comma e 532 del codice; ad essi puo' essere inoltre affidata qualsiasi altra vendita mobiliare disposta dall'autorita' giudiziaria.</p>\n<p>Il Ministro di grazia e giustizia stabilisce le modalita' e i controlli per l'esecuzione degli incarichi indicati nei commi precedenti, nonche' la misura dei compensi dovuti agli istituti.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;</p>"},{"id":"art_159","numText":"Art. 159-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Iscrizione a ruolo del processo esecutivo per espropriazione","contentHtml":"<p>La parte che iscrive a ruolo il processo esecutivo per espropriazione indica le generalita' e il codice fiscale delle parti e del proprio difensore, la cosa o il bene oggetto di pignoramento nonche' gli ulteriori dati richiesti dalla normativa, anche regolamentare, concernente la sottoscrizione, la trasmissione e la ricezione dei documenti informatici.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_159","numText":"Art. 159-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Iscrizione a ruolo del processo esecutivo per espropriazione a cura di soggetto diverso dal creditore","contentHtml":"<p>Colui che, prima che il creditore abbia iscritto a ruolo il processo esecutivo ai sensi degli articoli 518, 521-bis, 543 e 557 del codice, deposita per primo un atto o un'istanza iscrive a ruolo il processo depositando una copia dell'atto di pignoramento. Quando all'iscrizione a ruolo procede uno dei soggetti di cui all'articolo 16-bis, comma 1, del decreto-legge 18 ottobre 2012, n. 179, convertito, con modificazioni, dalla legge 17 dicembre 2012, n. 221, e successive modificazioni, diverso dal creditore, il deposito puo' aver luogo con modalita' non telematiche e la copia dell'atto di pignoramento puo' essere priva dell'attestazione di conformita'.\nQuando l'istanza proviene dall'ufficiale giudiziario, anche nel caso di cui all'articolo 520, primo comma, del codice, all'iscrizione a ruolo provvede d'ufficio il cancelliere. Quando l'iscrizione a ruolo ha luogo a norma del presente articolo, il creditore, nei termini di cui agli articoli 518, 521-bis, 543 e 557 del codice, provvede, a pena di inefficacia del pignoramento, al deposito delle copie conformi degli atti previsti dalle predette disposizioni e si applica l'articolo 164-ter delle presenti disposizioni. <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_160","numText":"Art. 160","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma degli avvisi","contentHtml":"<p>Gli avvisi che la legge prescrive siano fatti ai creditori e agli altri intervenuti nel procedimento esecutivo debbono essere sottoscritti dal creditore procedente o dal cancelliere a cura del quale sono notifcati.</p>","notesHtml":""},{"id":"art_161","numText":"Art. 161","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Giuramento dell'esperto e dello stimatore","contentHtml":"<p>L'esperto nominato dal giudice a norma dell'articolo 568 ultimo comma del codice presta giuramento di bene e fedelmente procedere alle operazioni affidategli.</p>\n<p>L'ufficiale giudiziario che per la stima delle cose da pignorare si avvale dell'opera di uno stimatore, prima che questi incominci le sue operazioni, deve raccoglierne il giuramento di bene e fedelmente procedere alla stima.</p>\n<p>Il compenso dell'esperto o dello stimatore nominato dal giudice o dall'ufficiale giudiziario e' calcolato sulla base del prezzo ricavato dalla vendita. Prima della vendita non possono essere liquidati acconti in misura superiore al cinquanta per cento del compenso calcolato sulla base del valore di stima.</p>","notesHtml":""},{"id":"art_161","numText":"Art. 161-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio della vendita dopo la prestazione della cauzione","contentHtml":"<p> Il rinvio della vendita puo' essere disposto solo con il consenso dei creditori e degli offerenti che abbiano prestato cauzione ai sensi degli articoli 571 e 580 del codice.<sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (26)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dalla L. 28 dicembre 2005, n. 263 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° gennaio 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° gennaio 2006.&quot;.</p>\n<p>AGGIORNAMENTO (27)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 dicembre 2005, n. 273, convertito con modificazioni dalla L. 23 febbraio 2006, n. 51 ha disposto (con l'art. 2, comma 3-sexies) che &quot;Le disposizioni di cui ai commi 3, lettera e), numeri da 2) a 43-bis), e 3-ter, lettere a-bis), b), c), c-bis), d), e) ed f), entrano in vigore il 1° marzo 2006 e si applicano anche alle procedure esecutive pendenti a tale data di entrata in vigore. Quando tuttavia e' gia' stata ordinata la vendita, la stessa ha luogo con l'osservanza delle norme precedentemente in vigore. L'intervento dei creditori non muniti di titolo esecutivo conserva efficacia se avvenuto prima del 1° marzo 2006&quot;.</p>"},{"id":"art_161","numText":"Art. 161-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Vendite con modalita' telematiche","contentHtml":"<p>Il Ministro della giustizia stabilisce con proprio decreto le regole tecnico-operative per lo svolgimento della vendita di beni mobili e immobili mediante gara telematica nei casi previsti dal codice, nel rispetto dei principi di competitivita', trasparenza, semplificazione, efficacia, sicurezza, esattezza e regolarita' delle procedure telematiche.</p>\n<p>Con successivi decreti le regole tecnico-operative di cui al primo comma sono adeguate all'evoluzione scientifica e tecnologica. Se occorre, le medesime regole tecnico-operative sono integrate al fine di assicurare un agevole collegamento tra il portale delle vendite pubbliche e i portali dei gestori delle vendite telematiche.\n <sup class=\"amd\">39</sup></p>","notesHtml":"<p>AGGIORNAMENTO (39)</p>\n<p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 23, comma 2) che &quot;Le disposizioni di cui [...] all'articolo 14, comma 1, lettere b) e c) si applicano decorsi trenta giorni dalla pubblicazione in Gazzetta Ufficiale delle specifiche tecniche previste dall'articolo 161-quater delle disposizioni per l'attuazione del codice di procedura civile&quot;.</p>"},{"id":"art_161","numText":"Art. 161-quater","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modalita' di pubblicazione sul portale delle vendite pubbliche","contentHtml":"<p>La pubblicazione sul portale delle vendite pubbliche e' effettuata a cura del professionista delegato per le operazioni di vendita o del commissionario o, in mancanza, del creditore pignorante o del creditore intervenuto munito di titolo esecutivo ed in conformita' alle specifiche tecniche, che possono determinare anche i dati e i documenti da inserire. Le specifiche tecniche sono stabilite dal responsabile per i sistemi informativi automatizzati del Ministero della giustizia entro sei mesi dalla data di entrata in vigore della presente disposizione e sono rese disponibili mediante pubblicazione nel portale delle vendite pubbliche. Quando la pubblicita' riguarda beni immobili o beni mobili registrati, la pubblicazione non puo' essere effettuata in mancanza della prova dell'avvenuto pagamento del contributo per la pubblicazione, previsto dall'articolo 18-bis del decreto del Presidente della Repubblica 30 maggio 2002, n. 115.<sup class=\"amd\">40</sup></p>\n<p>Il portale delle vendite pubbliche deve inviare all'indirizzo di posta elettronica ordinaria o certificata, ad ogni interessato che ne ha fatto richiesta e si e' registrato mediante un'apposita procedura disciplinata dalle specifiche tecniche di cui al primo comma, un avviso contenente le informazioni relative alle vendite di cui e' stata effettuata la pubblicita'.</p>\n<p>Il portale delle vendite pubbliche provvede all'archiviazione e alla gestione dei dati relativi alle vendite in esso pubblicate.</p>\n<p>Il mancato funzionamento dei sistemi informatici e' attestato dal responsabile dei sistemi informativi automatizzati del Ministero della giustizia. \n (39)</p>","notesHtml":"<p>AGGIORNAMENTO (39)</p>\n<p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni, dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 23, comma 2) che &quot;Le disposizioni di cui [...] all'articolo 14, comma 1, lettere b) e c) si applicano decorsi trenta giorni dalla pubblicazione in Gazzetta Ufficiale delle specifiche tecniche previste dall'articolo 161-quater delle disposizioni per l'attuazione del codice di procedura civile&quot;.</p>\n<p>AGGIORNAMENTO (40)</p>\n<p>Il D.L. 30 dicembre 2015, n. 210 convertito con modificazioni dalla L. 25 febbraio 2016, n. 21 ha disposto (con l'art. 2-bis, comma 1) che &quot;E' prorogato fino al 31 dicembre 2016 il termine assegnato al responsabile per i sistemi informativi automatizzati del Ministero della giustizia per l'adozione delle specifiche tecniche di cui all'articolo 161-quater, primo comma, secondo periodo, delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368&quot;.</p>"},{"id":"art_162","numText":"Art. 162","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Deposito del prezzo di assegnazione","contentHtml":"<p>La parte del valore della cosa assegnata che eccede il credito dell'assegnatario deve essere depositata nelle forme dei depositi giudiziari.</p>","notesHtml":""},{"id":"art_163","numText":"Art. 163","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordine di cessazione della vendita forzata","contentHtml":"<p>La cessazione della vendita forzata prevista dall'articolo 504 del codice e' disposta dal giudice dell'esecuzione se questi presiede alla vendita, o altrimenti dall'ufficiale incaricato della stessa, che ne riferisce immediatamente al giudice che lo ha nominato. In questo caso il giudice, sentite le parti, pronuncia definitivamente sulla cessazione.</p>","notesHtml":""},{"id":"art_164","numText":"Art. 164","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Atti di trasferimento del bene espropriato","contentHtml":"<p>Il giudice dell'esecuzione, in seguito all'alienazione del bene espropriato, compie in luogo del debitore tutti gli atti necessari al trasferimento del bene all'acquirente.</p>","notesHtml":""},{"id":"art_164","numText":"Art. 164-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Infruttuosita' dell'espropriazione forzata","contentHtml":"<p>Quando risulta che non e' piu' possibile conseguire un ragionevole soddisfacimento delle pretese dei creditori, anche tenuto conto dei costi necessari per la prosecuzione della procedura, delle probabilita' di liquidazione del bene e del presumibile valore di realizzo, e' disposta la chiusura anticipata del processo esecutivo.</p>","notesHtml":""},{"id":"art_164","numText":"Art. 164-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Inefficacia del pignoramento per mancata iscrizione a ruolo","contentHtml":"<p><sup class=\"amd\">59</sup>.</p>\n<p>Quando il pignoramento e' divenuto inefficace perche' il processo esecutivo non e' stato iscritto a ruolo nel termine stabilito, il creditore entro cinque giorni dalla scadenza del termine ne fa dichiarazione al debitore e all'eventuale terzo, mediante atto notificato. In ogni caso ogni obbligo del debitore e del terzo cessa quando l'iscrizione a ruolo non e' stata effettuata nei termini di legge.\n <sup class=\"amd\">59</sup></p>\n<p>La cancellazione della trascrizione del pignoramento si esegue quando e' ordinata giudizialmente ovvero quando il creditore pignorante dichiara, nelle forme richieste dalla legge, che il pignoramento e' divenuto inefficace per mancata iscrizione a ruolo nel termine stabilito. <sup class=\"amd\">59</sup> \n (38)</p>","notesHtml":"<p>AGGIORNAMENTO (38)</p>\n<p>Il D.L. 12 settembre 2014, n. 132 convertito con modificazioni dalla L. 10 novembre 2014, n. 162 ha disposto (con l'art. 18, comma 3) che la presente modifica si applica ai procedimenti esecutivi iniziati a decorrere dal trentesimo giorno successivo all'entrata in vigore della legge di conversione del decreto-legge medesimo.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_165","numText":"Art. 165","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Partecipazione del creditore al pignoramento","contentHtml":"<p>All'atto della richiesta del pignoramento il creditore puo' dichiarare che intende partecipare personalmente alle operazioni.</p>\n<p>Nel caso di cui al primo comma l'ufficiale giudiziario deve comunicare la data e l'ora dell'accesso, da effettuare entro quindici giorni, con un preavviso di tre giorni, riducibile nei casi di urgenza.</p>\n<p>Il creditore, a sue spese, puo' partecipare alle operazioni di pignoramento eseguite a norma degli articoli 513 e 518 del codice, con l'assistenza o a mezzo di difensore e di esperto o di uno di essi.</p>","notesHtml":""},{"id":"art_166","numText":"Art. 166","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modalita' della custodia","contentHtml":"<p>Il giudice dell'esecuzione da' con decreto le disposizioni circa i modi di custodire i titoli di credito e gli oggetti preziosi pignorati.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_167","numText":"Art. 167","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processo verbale di consegna al commissionario","contentHtml":"<p>Il cancelliere redige processo verbale della consegna delle cose pignorate al commissionario per la vendita. In esso debbono essere descritte le cose consegnate. La descrizione puo' farsi con riferimento a quella contenuta nell'atto di pignoramento, del quale il commissionario deve dichiarare di avere presa esatta cognizione.</p>","notesHtml":""},{"id":"art_168","numText":"Art. 168","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Reclamo contro l'operato dell'ufficiale incaricato della vendita","contentHtml":"<p>I reclami contro l'operato dell'ufficiale incaricato della vendita sono proposti dalle parti e dagli interessati con ricorso al giudice dell'esecuzione nel termine perentorio di venti giorni dal compimento dell'atto o dalla sua conoscenza.</p>\n<p>Il ricorso non sospende le operazioni di vendita, salvo che il giudice dell'esecuzione, concorrendo gravi motivi, disponga la sospensione.</p>\n<p>Sul ricorso il giudice dell'esecuzione, previa applicazione dell'articolo 485 del codice, provvede con ordinanza opponibile ai sensi dell'articolo 617 del codice. \n (54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_169","numText":"Art. 169","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Registrazione del processo verbale di vendita","contentHtml":"<p>Il cancelliere della tribunale presso il quale e' depositato il processo verbale di vendita, a norma dell'articolo 537 ultimo comma del codice, cura la registrazione di esso.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_169","numText":"Art. 169-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione dei compensi per le operazioni delegate dal giudice dell'esecuzione","contentHtml":"<p>Con il decreto di cui all'articolo 179-bis e' stabilita la misura dei compensi dovuti ai notai, agli avvocati e ai commercialisti per le operazioni di vendita dei beni mobili iscritti nei pubblici registri.(25)<sup class=\"amd\">26</sup><sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (25)</p>\n<p>Il D.L. 14 marzo 2005, n. 35, convertito con modificazioni dalla L. 14 maggio 2005, n. 80 come modificato dal D.L. 30 giugno 2005
