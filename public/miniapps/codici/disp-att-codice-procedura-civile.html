uelle previste dal capo I del titolo Vter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' quelle previste dall'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano a decorrere dal 1° gennaio 2023 anche ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Le disposizioni degli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 28 febbraio 2023&quot;. \n - (con l'art. 35, comma 3) che &quot;Davanti al giudice di pace, al tribunale per i minorenni, al commissario per la liquidazione degli usi civici e al tribunale superiore delle acque pubbliche, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile e quelle dell'articolo 196-duodecies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, introdotti dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Davanti ai medesimi uffici, le disposizioni previste dal capo I del titolo V-ter delle citate disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotto dal presente decreto, si applicano a decorrere dal 30 giugno 2023 anche ai procedimenti pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al secondo periodo&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_196","numText":"Art. 196-sexies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Perfezionamento del deposito con modalita' telematiche","contentHtml":"<p>Il deposito con modalita' telematiche si ha per avvenuto nel momento in cui e' generata la conferma del completamento della trasmissione secondo quanto previsto dalla normativa anche regolamentare concernente la trasmissione e la ricezione dei documenti informatici ed e' tempestivamente eseguito quando la conferma e' generata entro la fine del giorno di scadenza. Si applicano le disposizioni di cui all'articolo 155, quarto e quinto comma, del codice. Se gli atti o i documenti da depositarsi eccedono la dimensione massima stabilita nelle specifiche tecniche del direttore generale per i sistemi informativi automatizzati del Ministero della giustizia, il deposito puo' essere eseguito mediante piu' trasmissioni. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.L.gs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, commi 2, 3 e 4) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter del codice di procedura civile, quelle previste dal Capo I del Titolo V-ter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' l'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotte dal presente decreto hanno effetto a decorrere dal 196-septies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Copia cartacea di atti depositati telematicamente","contentHtml":"<p>Con decreto del Ministro della giustizia sono stabilite misure organizzative per l'acquisizione di copia cartacea e per la riproduzione su supporto analogico degli atti depositati con modalita' telematiche nonche' per la gestione e la conservazione delle copie cartacee.</p>\n<p>Con il decreto di cui al primo comma sono altresi' stabilite le misure organizzative per la gestione e la conservazione degli atti depositati su supporto cartaceo a norma dell'articolo 196-quater, primo comma, terzo periodo, e quarto comma. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.L.gs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, commi 2, 3 e 4) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter del codice di procedura civile, quelle previste dal Capo I del Titolo V-ter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' l'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotte dal presente decreto hanno effetto a decorrere dal 1° gennaio 2023 e da tale data si applicano ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Gli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 30 giugno 2023. \n 3. Davanti al giudice di pace e al tribunale superiore delle acque pubbliche le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal 30 giugno 2023, anche ai procedimenti pendenti a tale data, fatte salve le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter che hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al primo periodo. \n 4. Ai procedimenti civili pendenti davanti agli uffici giudiziari diversi da quelli di cui ai commi 2 e 3 le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal quindicesimo giorno successivo alla pubblicazione nella Gazzetta Ufficiale della Repubblica italiana dei decreti, non aventi natura regolamentare, con i quali il Ministro della giustizia accerta la funzionalita' dei relativi servizi&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 2) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile, quelle previste dal capo I del titolo Vter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' quelle previste dall'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano a decorrere dal 1° gennaio 2023 anche ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Le disposizioni degli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 28 febbraio 2023&quot;. \n - (con l'art. 35, comma 3) che &quot;Davanti al giudice di pace, al tribunale per i minorenni, al commissario per la liquidazione degli usi civici e al tribunale superiore delle acque pubbliche, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile e quelle dell'articolo 196-duodecies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, introdotti dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Davanti ai medesimi uffici, le disposizioni previste dal capo I del titolo V-ter delle citate disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotto dal presente decreto, si applicano a decorrere dal 30 giugno 2023 anche ai procedimenti pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al secondo periodo&quot;.</p>"},{"id":"art_196","numText":"Art. 196-octies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Potere di certificazione di conformita' delle copie degli atti e dei provvedimenti contenuti nel fascicolo informatico o allegati alle comunicazioni e notificazioni di cancelleria","contentHtml":"<p>Le copie informatiche, anche per immagine, di atti processuali di parte e degli ausiliari del giudice nonche' dei provvedimenti di quest'ultimo, presenti nei fascicoli informatici o trasmessi in allegato alle comunicazioni telematiche, equivalgono all'originale anche se prive della firma digitale del cancelliere di attestazione di conformita' all'originale.</p>\n<p>Il difensore, il dipendente di cui si avvale la pubblica amministrazione per stare in giudizio personalmente, il consulente tecnico, il professionista delegato, il curatore, il commissario giudiziale e il liquidatore giudiziale possono estrarre con modalita' telematiche duplicati, copie analogiche o informatiche degli atti e dei provvedimenti di cui al primo comma e attestare la conformita' delle copie estratte ai corrispondenti atti contenuti nel fascicolo informatico ovvero allegati alle comunicazioni telematiche. Le copie analogiche e informatiche, anche per immagine, estratte dal fascicolo informatico o dall'allegato alla comunicazione telematica e munite dell'attestazione di conformita' hanno la stessa efficacia probatoria dell'atto che riproducono. Il duplicato informatico di un documento informatico deve essere prodotto mediante processi e strumenti che assicurino che il documento informatico ottenuto sullo stesso sistema di memorizzazione o su un sistema diverso contenga la stessa sequenza di bit del documento informatico di origine.</p>\n<p>Le disposizioni di cui al presente articolo non si applicano agli atti processuali che contengono provvedimenti giudiziali che autorizzano il prelievo di somme di denaro vincolate all'ordine del giudice. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_196","numText":"Art. 196-novies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Potere di certificazione di conformita' di copie di atti e di provvedimenti","contentHtml":"<p>Il difensore, il dipendente di cui si avvale la pubblica amministrazione per stare in giudizio personalmente, il consulente tecnico, il professionista delegato, il curatore, il commissario giudiziale e il liquidatore giudiziale, quando depositano con modalita' telematiche la copia informatica, anche per immagine, di un atto processuale di parte o di un provvedimento del giudice formato su supporto analogico e detenuto in originale o in copia conforme, attestano la conformita' della copia al predetto atto. La copia munita dell'attestazione di conformita' equivale all'originale o alla copia conforme dell'atto o del provvedimento.</p>\n<p>Il difensore, quando deposita nei procedimenti di espropriazione forzata le copie informatiche degli atti indicati dagli articoli 518, sesto comma, 543, quarto comma, e 557, secondo comma, del codice, attesta la conformita' delle copie agli originali. <sup class=\"amd\">59</sup> \n (54) (55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_196","numText":"Art. 196-decies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Potere di certificazione di conformita' delle copie trasmesse con modalita' telematiche all'ufficiale giudiziario","contentHtml":"<p>Il difensore, il dipendente di cui si avvale la pubblica amministrazione per stare in giudizio personalmente, il consulente tecnico, il professionista delegato, il curatore, il commissario giudiziale e il liquidatore giudiziale, quando trasmettono all'ufficiale giudiziario con modalita' telematiche la copia informatica, anche per immagine, di un atto, di un provvedimento o di un documento formato su supporto analogico e detenuto in originale o in copia conforme, attestano la conformita' della copia all'atto detenuto. La copia munita dell'attestazione di conformita' equivale all'originale o alla copia conforme dell'atto, del provvedimento o del documento. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_196","numText":"Art. 196-undecies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modalita' dell'attestazione di conformita'","contentHtml":"<p>L'attestazione di conformita' della copia analogica, prevista dalle disposizioni del presente capo, dal codice e dalla legge 21 gennaio 1994, n. 53, e' apposta in calce o a margine della copia o su foglio separato, congiunto materialmente alla medesima.</p>\n<p>L'attestazione di conformita' di una copia informatica e' apposta nel medesimo documento informatico.</p>\n<p>Nel caso previsto dal secondo comma, l'attestazione di conformita' puo' alternativamente essere apposta su un documento informatico separato e l'individuazione della copia cui si riferisce ha luogo esclusivamente secondo le modalita' stabilite nelle specifiche tecniche del direttore generale per i sistemi informativi automatizzati del Ministero della giustizia. Se la copia informatica e' destinata alla notifica, l'attestazione di conformita' e' inserita nella relazione di notificazione.</p>\n<p>I soggetti che compiono le attestazioni di conformita' previste dagli articoli 196-octies, 196-novies e 196-decies, dal codice e dalla legge 21 gennaio 1994, n. 53, sono considerati pubblici ufficiali ad ogni effetto. \n (54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_196","numText":"Art. 196-duodecies","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Udienza con collegamenti audiovisivi a distanza","contentHtml":"<p>L'udienza di cui all'articolo 127-bis del codice e' tenuta con modalita' idonee a salvaguardare il contraddittorio e ad assicurare l'effettiva partecipazione delle parti e, se l'udienza non e' pubblica, la sua riservatezza. Si applica l'articolo 84.</p>\n<p>Nel verbale si da' atto della dichiarazione di identita' dei presenti, i quali assicurano che non sono in atto collegamenti con soggetti non legittimati e che non sono presenti soggetti non legittimati nei luoghi da cui sono in collegamento.</p>\n<p>I presenti mantengono attiva la funzione video per tutta la durata dell'udienza. Agli stessi e' vietata la registrazione dell'udienza.</p>\n<p>Il luogo dal quale il giudice si collega e' considerato aula d'udienza a tutti gli effetti e l'udienza si considera tenuta nell'ufficio giudiziario davanti al quale e' pendente il procedimento.</p>\n<p>In presenza di gravi motivi il giudice puo' autorizzare, su istanza dei difensori formulata anche all'udienza, il collegamento audiovisivo delle parti da un luogo diverso da quello dal quale si collegano i difensori stessi. I difensori attestano che le parti sono state rese edotte della necessita' di rispettare le previsioni del presente articolo e sono in possesso di strumenti informatici idonei a garantire il collegamento necessario per lo svolgimento dell'udienza.\n <sup class=\"amd\">59</sup></p>\n<p>Con provvedimenti del direttore generale dei sistemi informativi e automatizzati del Ministero della giustizia sono individuati e regolati i collegamenti audiovisivi a distanza per lo svolgimento dell'udienza e le modalita' attraverso le quali e' garantita la pubblicita' dell'udienza in cui si discute la causa. \n (54) (55)</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, commi 2, 3 e 4) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter del codice di procedura civile, quelle previste dal Capo I del Titolo V-ter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' l'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotte dal presente decreto hanno effetto a decorrere dal 1° gennaio 2023 e da tale data si applicano ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Gli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 30 giugno 2023. \n 3. Davanti al giudice di pace e al tribunale superiore delle acque pubbliche le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal 30 giugno 2023, anche ai procedimenti pendenti a tale data, fatte salve le disposizioni di cui agli articoli 127, terzo comma, 127-bis e 127-ter che hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al primo periodo. \n 4. Ai procedimenti civili pendenti davanti agli uffici giudiziari diversi da quelli di cui ai commi 2 e 3 le disposizioni di cui al comma 2, primo periodo, si applicano a decorrere dal quindicesimo giorno successivo alla pubblicazione nella Gazzetta Ufficiale della Repubblica italiana dei decreti, non aventi natura regolamentare, con i quali il Ministro della giustizia accerta la funzionalita' dei relativi servizi&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art. 35, comma 2) che &quot;Salvo quanto previsto dal secondo periodo, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile, quelle previste dal capo I del titolo Vter delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, nonche' quelle previste dall'articolo 196-duodecies delle medesime disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano a decorrere dal 1° gennaio 2023 anche ai procedimenti civili pendenti davanti al tribunale, alla corte di appello e alla Corte di cassazione. Le disposizioni degli articoli 196-quater e 196-sexies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotti dal presente decreto, si applicano ai dipendenti di cui si avvalgono le pubbliche amministrazioni per stare in giudizio personalmente dal 28 febbraio 2023&quot;. \n - (con l'art. 35, comma 3) che &quot;Davanti al giudice di pace, al tribunale per i minorenni, al commissario per la liquidazione degli usi civici e al tribunale superiore delle acque pubbliche, le disposizioni degli articoli 127, terzo comma, 127-bis, 127-ter e 193, secondo comma, del codice di procedura civile e quelle dell'articolo 196-duodecies delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, introdotti dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 anche per i procedimenti civili pendenti a tale data. Davanti ai medesimi uffici, le disposizioni previste dal capo I del titolo V-ter delle citate disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, introdotto dal presente decreto, si applicano a decorrere dal 30 giugno 2023 anche ai procedimenti pendenti a tale data. Con uno o piu' decreti non aventi natura regolamentare il Ministro della giustizia, accertata la funzionalita' dei relativi servizi di comunicazione, puo' individuare gli uffici nei quali viene anticipato, anche limitatamente a specifiche categorie di procedimenti, il termine di cui al secondo periodo&quot;.</p>\n<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_197","numText":"Art. 197","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi di primo grado nei quali non e' avvenuta la comparizione delle parti","contentHtml":"<p>Nei processi di primo grado rispetto ai quali nel giorno in cui entra in vigore il codice non sono scaduti i termini fissati nell'atto di citazione per la comparizione delle parti, queste debbono costituirsi in cancelleria nei termini stessi, depositando gli atti indicati negli articoli 165 e 166 del codice e inoltre la carta bollata e la somma indicata nell'articolo 38. Se la scadenza del termine coincide col giorno dell'entrata in vigore del codice o non restano alle parti almeno dieci giorni per la costituzione, questa deve farsi nel termine di quindici giorni dall'entrata in vigore del codice. Se nessuna delle parti si costituisce in termine il processo si estingue.</p>\n<p>Entro un mese dalla scadenza del termine di comparizione fissato nell'atto di citazione o prorogato a norma del comma precedente, le parti debbono inoltre integrare con comparsa le loro deduzioni, indicando specificamente i mezzi di prova e i documenti a norma degli articoli 163 e 167 del codice. Entro trenta giorni dalla scadenza di tale termine, le parti debbono proporre l'istanza di designazione del giudice istruttore a norma e con gli effetti di cui all'articolo 172 del codice.</p>\n<p>Se il termine fissato nell'atto di citazione e' scaduto prima del giorno in cui entra in vigore il codice senza che le parti si siano costituite, queste debbono riassumere la causa con atto di citazione nel termine perentorio di quindici giorni dall'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_198","numText":"Art. 198","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi di primo grado nei quali le parti sono comparse","contentHtml":"<p>Nei processi di primo grado nei quali, nel giorno in cui entra in vigore il codice, e' avvenuta la comparizione delle parti, queste debbono, nel termine perentorio di tre mesi, procedere ai depositi richiesti dagli articoli 165 e 166 del codice e dall'articolo 38 in quanto necessari, integrare con comparsa le loro deduzioni e proporre l'istanza di designazione del giudice istruttore a norma del secondo comma dell'articolo precedente.</p>","notesHtml":""},{"id":"art_199","numText":"Art. 199","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi di primo grado nei quali e' stata pronunciata sentenza interlocutoria","contentHtml":"<p>Se e' stata pronunciata sentenza interlocutoria passata in giudicato o esecutiva e, fino al giorno dell'entrata in vigore del codice le parti non hanno riassunta la causa davanti al giudice di primo grado, debbono farlo con citazione nel termine di cui all'articolo precedente.</p>\n<p>Se e' stata pronunciata sentenza interlocutoria non esecutiva soggetta ad impugnazione, il termine per la riassunzione e' fissato dal giudice dell'impugnazione con la sentenza che pronuncia sulla stessa.</p>\n<p>Se la sentenza interlocutoria non esecutiva passa in giudicato dopo l'entrata in vigore del codice, il termine di riassunzione di cui all'articolo precedente decorre dal giorno del passaggio in giudicato della sentenza.</p>","notesHtml":""},{"id":"art_200","numText":"Art. 200","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Formazione del fascicolo e designazione del giudice istruttore","contentHtml":"<p>Il cancelliere che riceve il deposito degli atti a norma degli articoli precedenti forma il fascicolo d'ufficio e lo presenta, entro due giorni dal deposito dell'istanza di designazione del giudice istruttore, al presidente del tribunale.</p>\n<p>Il presidente designa il giudice istruttore a norma dell'articolo 173 del codice, e il procedimento prosegue secondo le norme del codice.</p>","notesHtml":""},{"id":"art_201","numText":"Art. 201","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sospensione del processo","contentHtml":"<p>Quando e' impugnata una sentenza interlocutoria esecutiva, il giudice istruttore, dopo l'assunzione dei mezzi di prova ammessi, puo' sospendere su istanza di parte il processo, finche' non sia pronunciata sentenza sull'impugnazione, e puo' sempre autorizzare le parti a ritirare il proprio fascicolo per produrlo davanti al giudice dell'impugnazione.</p>","notesHtml":""},{"id":"art_202","numText":"Art. 202","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Prima udienza di trattazione","contentHtml":"<p>Nella prima udienza davanti al giudice istruttore, che segue alla costituzione o alla riassunzione della causa a norma degli articoli 197, 198 e 199 si applicano le disposizioni dell'articolo 183 del codice.</p>","notesHtml":""},{"id":"art_203","numText":"Art. 203","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Assunzione dei mezzi di prova","contentHtml":"<p>Se nel giorno in cui entra in vigore il codice non e' ancora fissata l'assunzione di un mezzo di prova ammesso, il giudice istruttore provvede anche d'ufficio per l'assunzione a norma del codice, dopo che le parti hanno adempiuto quanto e' prescritto negli articoli 198 e 199.</p>\n<p>Se nel giorno in cui entra in vigore il codice e' fissata o e' in corso l'assunzione di un mezzo di prova, il giudice delegato, che appartiene all'ufficio giudiziario competente per la causa, assume le funzioni e i poteri del giudice istruttore, e le parti adempiono guanto e' prescritto nell'articolo 198.</p>\n<p>Nel caso previsto nel comma precedente, il giudice o il pretore delegato all'assunzione di un mezzo di prova, quando non appartiene all'ufficio giudiziario competente per la causa, esercita i poteri previsti negli articoli 202 e seguenti del codice, e puo', inoltre, concedere proroghe del termine per l'assunzione della prova fino a tre mesi dal giorno in cui il codice entra in vigore.</p>\n<p>Le perizie disposte prima dell'entrata in vigore del codice sono eseguite a norma della legge precedente, ma alle eventuali ulteriori indagini tecniche necessarie nel processo, anche per rinnovazione di quelle gia' eseguite, e alla sostituzione del perito si applicano le disposizioni degli articoli 192 e seguenti del codice.</p>\n<p>In ogni caso rimangono fermi gli effetti delle decadenze verificatisi prima del giorno in cui il codice entra in vigore.</p>","notesHtml":""},{"id":"art_204","numText":"Art. 204","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Cause in decisione davanti al tribunale","contentHtml":"<p>Per le cause che, nel giorno in cui entra in vigore il codice, si trovano in decisione, il tribunale applica gli articoli 276 e seguenti del codice.</p>\n<p>Se le conclusioni non sono complete a norma dell'articolo 189 del codice, il tribunale, quando ritiene che tali conclusioni siano necessarie per la decisione della causa, rimette con ordinanza le parti ad udienza fissa davanti al giudice relatore.</p>\n<p>Se il collegio pronuncia ordinanza, il cancelliere forma il fascicolo d'ufficio. Le parti sono tenute a depositare, su richiesta del cancelliere, le copie degli atti da inserire nel fascicolo d'ufficio, la carta bollata e la somma di cui all'articolo 38.</p>\n<p>In ogni caso di riapertura dell'istruzione il relatore assume le funzioni e i poteri di giudice istruttore.</p>","notesHtml":""},{"id":"art_205","numText":"Art. 205","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Efficacia delle sentenze interlocutorie","contentHtml":"<p>Le sentenze interlocutorie finche' non siano riformate vincolano le parti nelle deduzioni complementari che queste debbono prendere a norma degli articoli 197 e 198.</p>","notesHtml":""},{"id":"art_206","numText":"Art. 206","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Impugnazione delle sentenze interlocutorie","contentHtml":"<p>Le sentenze interlocutorie sono impugnabili a norma della legge precedente, ma il procedimento d'impugnazione e' regolato dal codice, salve le disposizioni delle presenti norme.</p>\n<p>Le sentenze interlocutorie che hanno pronunciato soltanto sulla competenza sono impugnabili solamente col regolamento di competenza nel termine di tre mesi dall'entrata in vigore del codice.</p>\n<p>Le sentenze interlocutorie che hanno pronunciato sulla competenza insieme col merito sono impugnabili a norma dell'articolo 43 del codice. La proposizione del regolamento di competenza indipendentemente dall'impugnazione sul merito deve avvenire entro il termine di cui al comma precedente.</p>","notesHtml":""},{"id":"art_207","numText":"Art. 207","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Termini per le impugnazioni","contentHtml":"<p>I termini per le impugnazioni, che al momento in cui entra in vigore il codice si trovano in corso, sono regolati dalla legge precedente.</p>","notesHtml":""},{"id":"art_208","numText":"Art. 208","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Decadenza dall'impugnazione","contentHtml":"<p>Alle aentenze che sono gia' pubblicate nel giorno in cui entra in vigore il codice si applica la disposizione dell'articolo 327 dello stesso, ma il termine di un anno decorre dal giorno dell'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_209","numText":"Art. 209","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Impugnazioni nei giudizi con pluralita' di parti","contentHtml":"<p>Nei procedimenti d'impugnazione si applicano le disposizioni degli articoli 331 e seguenti del codice se, nel giorno in cui entra in vigore il codice stesso, non sono state pronunciate sentenze dal giudice d'impugnazione; altrimenti si osservano le disposizioni della legge precedente, in quanto non modificate dalle presenti norme.</p>","notesHtml":""},{"id":"art_210","numText":"Art. 210","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi d'appello nei quali sono in corso i termini di comparizione","contentHtml":"<p>Nei processi d'appello rispetto ai quali, nel giorno in cui entra in vigore il codice, non sono scaduti i termini per la comparizione delle parti fissati negli atti d'appello, queste debbono costituirsi a norma dell'articolo 347 del codice. Si applicano le disposizioni dell'articolo 197.</p>\n<p>Il cancelliere forma il fascicolo d'ufficio a norma dell'articolo 200, nel tribunale e nella corte il presidente nomina l'istruttore a norma dell'articolo 349 del codice e il procedimento prosegue secondo le norme del codice.</p>","notesHtml":""},{"id":"art_211","numText":"Art. 211","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi d'appello nei quali le parti sono gia' comparse","contentHtml":"<p>Nei processi d'appello nei quali, nel giorno in cui entra in vigore il codice, le parti sono gia' comparse si applicano le disposizioni degli articoli 198 e 199.</p>\n<p>Il cancelliere forma il fascicolo a norma dell'articolo 200 e, se l'impugnazione riguarda una sentenza interlocutoria esecutiva, inserisce nel fascicolo i soli atti relativi all'impugnazione, ma il giudice d'appello puo' richiedere al cancelliere del giudice di primo grado copia degli atti inseriti nel fascicolo d'ufficio che sono necessari per decidere sull'impugnazione.</p>","notesHtml":""},{"id":"art_212","numText":"Art. 212","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Effetto devolutivo dell'appello","contentHtml":"<p>In tutte le cause d'appello proposte contro sentenze pubblicate prima dell'entrata in vigore del codice, si applica l'articolo 490 del codice precedente.</p>\n<p>La disposizione del comma precedente si applica anche alle cause d'appello proposte contro sentenze non ancora pubblicate, ma relative a cause gia' in decisione nel giorno dell'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_213","numText":"Art. 213","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Decisione delle cause davanti al giudice d'appello","contentHtml":"<p>Il giudice, se la sentenza impugnata e' definitiva, decide secondo gli articoli 353 e seguenti del codice.</p>\n<p>Con la sentenza che conferma o riforma una sentenza interlocutoria senza chiudere il processo, il giudice di appello rimette le parti davanti al giudice di primo grido, fissando il termine perentorio per la riassunzione.</p>","notesHtml":""},{"id":"art_214","numText":"Art. 214","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Cause davanti al pretore e al conciliatore","contentHtml":"<p>Le disposizioni degli articoli precedenti si estendono, in quanto applicabili, anche ai giudizi davanti al pretore e al conciliatore.</p>","notesHtml":""},{"id":"art_215","numText":"Art. 215","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Cause davanti alla corte suprema di cassazione","contentHtml":"<p>Se nel giorno in cui entra in vigore il codice e' stato proposto ricorso per cassazione, al procedimento si applicano le disposizioni del codice, ma i termini per il deposito del ricorso e del controricorso rimangono quelli stabiliti dalla legge precedente.</p>\n<p>Se nel giorno in cui entra in vigore il codice sono stati depositati il ricorso e il controricorso o se i termini per il deposito di essi sono scaduti, si applicano il procedimento le disposizioni degli articoli 374 e seguenti del codice.</p>","notesHtml":""},{"id":"art_216","numText":"Art. 216","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ricorsi sforniti di deposito di cancelleria","contentHtml":"<p>Il cancelliere della corte suprema di cassazione, dopo l'entrata in vigore del codice, invita gli avvocati che hanno sottoscritto i ricorsi sforniti in tutto o in parte dei depositi indicati nell'articolo 38 a provvedere agli stessi entro il termine di trenta giorni dal ricevimento dell'invito.</p>\n<p>Se entro il termine indicato nel comma precedente non e' effettuato alcun deposito, il ricorso e' dichiarato inammissibile dalla corte in camera di consiglio, con ordinanza stesa su carta non bollata. Se il deposito non e' integrato, il cancelliere provvede a norma dell'articolo 38 ultimo comma.</p>","notesHtml":""},{"id":"art_217","numText":"Art. 217","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riassunzione davanti al giudice di rinvio","contentHtml":"<p>Le disposizioni degli articoli 197 e 198 si applicano anche alla riassunzione della causa davanti al giudice di rinvio.</p>\n<p>Al procedimento si applicano le disposizioni del codice.</p>","notesHtml":""},{"id":"art_218","numText":"Art. 218","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Impugnazioni relative alle cause di lavoro","contentHtml":"<p>Le sentenze pronunciate prima dell'entrata in vigore del codice sono impugnabili per il motivo indicato nel secondo comma dell'articolo 450 del codice davanti alla sezione della corte d'appello ivi indicata. Se l'appello e' stato gia' proposto davanti ad un giudice diverso, questi deve rimettere con ordinanza la causa alla sezione della corte.</p>\n<p>In entrambi i casi la sezione della corte provvede a norma dell'articolo 451 del codice.</p>\n<p>Sui ricorsi contro le sentenze, che prima dell'entrata in vigore del codice hanno pronunciato sulla competenza per materia del giudice del lavoro, la corte suprema di cassazione pronuncia a norma della legge precedente.</p>","notesHtml":""},{"id":"art_219","numText":"Art. 219","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Precetto immobiliare non trascritto","contentHtml":"<p>Il precetto immobiliare non trascritto prima dell'entrata in vigore del codice ha soltanto l'efficacia di cui all'articolo 480 del codice. L'espropriazione forzata immobiliare deve seguire secondo le norme del codice.</p>","notesHtml":""},{"id":"art_220","numText":"Art. 220","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Espropriazione forzata soltanto iniziata","contentHtml":"<p>Se prima dell'entrata in vigore del codice e' stato soltanto eseguito il pignoramento mobiliare o trascritto il precetto immobiliare, il creditore procedente deve eseguire o integrare i depositi prescritti dagli articoli 518 ultimo comma e 557 del codice e 38 delle presenti norme e proporre l'istanza di assegnazione o di vendita a norma dell'articolo 501 nel termine di cui all'articolo 497 del codice, decorrente dal giorno dell'entrata in vigore di questo.</p>\n<p>Eseguiti i depositi, il cancelliere forma il fascicolo e lo presenta immediatamente al capo dell'ufficio giudiziario, il quale designa il giudice dell'esecuzione; quindi il processo prosegue secondo le disposizioni del codice.</p>","notesHtml":""},{"id":"art_221","numText":"Art. 221","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi d'espropriazione mobiliare","contentHtml":"<p>Nei processi d'espropriazione di beni mobili in cui prima dell'entrata in vigore del codice e' stata chiesta o disposta la vendita dei beni pignorati, il creditore procedente deve fare i depositi di cui all'articolo precedente prima della vendita, altrimenti il processo si estingue.</p>\n<p>Eseguiti i depositi, si applicano le disposizioni di cui al secondo comma dell'articolo precedente, ma i creditori partecipano alla distribuzione della somma ricavata dalla vendita a norma della legge anteriore.</p>\n<p>Se prima dell'entrata in vigore del codice e' stata eseguita in tutto o in parte la vendita, il processo prosegue secondo le disposizioni della legge precedente.</p>","notesHtml":""},{"id":"art_222","numText":"Art. 222","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi d'espropriazione immobiliare","contentHtml":"<p>Nei processi d'espropriazione di beni immobili, nei quali prima dell'entrata in vigore del codice e' stata chiesta l'autorizzazione a vendere i beni pignorati, l'autorizzazione stessa e' data a norma della legge precedente, ma le condizioni della vendita sono disposte a norma dell'articolo 576 del codice. Quindi il processo prosegue secondo le disposizioni del codice, ma i creditori partecipano alla distribuzione della somma ricavata a norma della legge precedente.</p>\n<p>Il deposito degli atti di cui all'articolo 557 del codice e quello di cui all'articolo 38 deve essere fatto dal creditore procedente nel termine perentorio che il giudice fissa nel provvedimento di autorizzazione a vendere.</p>\n<p>Si applica la disposizione dell'articolo 220 secondo comma.</p>\n<p>Se prima dell'entrata in vigore del codice e' stata autorizzata o eseguita in tutto o in parte la vendita, il processo prosegue secondo le disposizioni della legge precedente.</p>","notesHtml":""},{"id":"art_223","numText":"Art. 223","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi per consegna o rilascio e per esecuzione forzata di obblighi di fare o di non fare","contentHtml":"<p>I processi per consegna o rilascio e per esecuzione forzata di obblighi di fare o di non fare iniziati prima dell'entrata in vigore del codice sono regolati dalla legge precedente.</p>","notesHtml":""},{"id":"art_224","numText":"Art. 224","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processi d'opposizione all'esecuzione","contentHtml":"<p>Ai processi d'opposizione all'esecuzione iniziati prima dell'entrata in vigore del codice si applicano le disposizioni degli articoli 197 e seguenti.</p>","notesHtml":""},{"id":"art_225","numText":"Art. 225","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Opposizione agli atti esecutivi","contentHtml":"<p>Per i processi d'opposizione agli atti esecutivi, nei quali nel giorno dell'entrata in vigore del codice non sono state pronunciate sentenze, si applicano le disposizioni del codice, osservate le norme degli articoli 197 e seguenti in quanto applicabili.</p>\n<p>Se sono state pronunciate sentenze, si osservano le disposizioni della legge precedente con le modificazioni portate dalle presenti norme.</p>","notesHtml":""},{"id":"art_226","numText":"Art. 226","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riassunzione del processo esecutivo sospeso","contentHtml":"<p>Alla riassunzione del processo esecutivo che trovasi sospeso nel giorno dell'entrata in vigore del codice si applica la disposizione dell'articolo 627 del codice. Se il passaggio in giudicato della sentenza di primo grado o la pronuncia della sentenza d'appello e' avvenuto prima dell'entrata in vigore del codice, il termine di tre mesi previsto nell'articolo 627 dello stesso decorre dal giorno dell'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_227","numText":"Art. 227","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Compromessi e clausole compromissorie anteriori all'entrata in vigore del codice","contentHtml":"<p>I compromessi e le clausole compromissorie stipulati anteriormente all'entrata in vigore del codice a norma delle leggi precedenti conservano piena efficacia.</p>","notesHtml":""},{"id":"art_228","numText":"Art. 228","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Arbitri e procedimento arbitrale","contentHtml":"<p>Per la sostituzione o revocazione degli arbitri e per i diritti e doveri ad essi spettanti si applicano le disposizioui degli articoli 811 e 813 e seguenti del codice.</p>\n<p>Al procedimento arbitrale si applicano le disposizioni degli articoli 816 e seguenti del codice, ma sono salvi gli effetti dei lodi interlocutori gia' depositati all'entrata in vigore del codice.</p>","notesHtml":""},{"id":"art_229","numText":"Art. 229","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Impugnabilita' delle sentenze","contentHtml":"<p>Le sentenze pronunciate dagli arbitri prima dell'entrata in vigore del codice sono impugnabili a norma della legge precedente.</p>","notesHtml":""},{"id":"art_230","numText":"Art. 230","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Immutabilita' della competenza gia' fissata","contentHtml":"<p>Il giudice regolarmente adito secondo le leggi anteriori mantiene la competenza sugli affari di cui e' stato investito anche se le norme sulla competenza sono mutate.</p>\n<p>I giudizi proposti prima dell'entrata in vigore del codice davanti ai collegi tecnici per la decisione delle controversie di cottimo e alle commissioni per gli infortuni agricoli e per le assicurazioni sociali continuano ad essere regolati dalla legge precedente fino alla loro definizione.</p>","notesHtml":""},{"id":"art_231","numText":"Art. 231","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Albo degli esperti","contentHtml":"<p>Finche' non siano formati gli albi degli esperti della magistratura del lavoro previsti nell'articolo 4, continuano ad aver vigore quelli formati secondo la legge precedente.</p>\n<p>Visto, d'ordine di Sua Maesta' il Re d'Italia e di Albania</p>\n<p>Imperatore d'Etiopia</p>\n<p>Il Ministro per la grazia e giustizia</p>\n<p>GRANDI</p>","notesHtml":""}]
};</script>
<script>
(function() {
  'use strict';
  // DATA is injected per page

  var currentIdx = 0;
  var filteredIndices = CODE.articles.map(function(_, i) { return i; });

  function init() {
    // Pre-compute plain text for full-text search
    CODE.articles.forEach(function(art) {
      art._searchText = (art.numText + ' ' + (art.heading || '') + ' ' +
        (art.contentHtml || '').replace(/<[^>]+>/g, '')).toLowerCase();
    });
    renderToc();

    // Navigate to hash article if present, otherwise show first article
    var initHash = location.hash.replace('#', '');
    var initIdx = 0;
    if (initHash) {
      var found = CODE.articles.findIndex(function(a) { return a.id === initHash || a.numText === decodeURIComponent(initHash); });
      if (found >= 0) initIdx = found;
    }
    showArticle(initIdx);

    document.getElementById('search').addEventListener('input', onSearch);
    document.getElementById('prev-btn').addEventListener('click', function() { navigate(-1); });
    document.getElementById('next-btn').addEventListener('click', function() { navigate(1); });
    document.getElementById('hamburger').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    });
    window.addEventListener('hashchange', onHashChange);
  }

  function onHashChange() {
    var hash = location.hash.replace('#', '');
    if (!hash) return;
    var idx = CODE.articles.findIndex(function(a) { return a.id === hash || a.numText === decodeURIComponent(hash); });
    if (idx >= 0) showArticle(idx);
  }

  function renderToc() {
    var nav = document.getElementById('toc');
    var html = '';
    var lastGroup = null;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        html += '<div class="group-label">' + esc(art.group) + '</div>';
        lastGroup = art.group;
      }
      html += '<div class="art-link" data-idx="' + i + '" onclick="goTo(' + i + ')">' +
        '<span class="art-num">' + esc(art.numText) + '</span>' +
        '<span class="art-heading-mini">' + esc(art.heading || '') + '</span>' +
        '</div>';
    });
    nav.innerHTML = html;
  }

  function showArticle(idx) {
    if (idx < 0 || idx >= CODE.articles.length) return;
    currentIdx = idx;
    var art = CODE.articles[idx];

    // Update URL hash
    history.replaceState(null, '', '#' + encodeURIComponent(art.numText));

    // Update header title
    document.getElementById('header-article').textContent = art.numText + (art.heading ? ' – ' + art.heading : '');

    // Render article
    var notesSection = art.notesHtml
      ? '<div class="article-notes">' +
        '<button class="notes-toggle" onclick="toggleNotes(this)">Aggiornamenti e note</button>' +
        '<div class="notes-body"><div class="article-body">' + art.notesHtml + '</div></div>' +
        '</div>'
      : '';

    document.getElementById('article-view').innerHTML =
      '<div class="article-card">' +
        '<div class="article-badge">📖 ' + esc(CODE.shortTitle) + '</div>' +
        '<h1 class="article-num">' + esc(art.numText) + '</h1>' +
        (art.heading ? '<p class="article-heading">' + esc(art.heading) + '</p>' : '<div style="margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)"></div>') +
        '<div class="article-body">' + art.contentHtml + '</div>' +
        notesSection +
        '<div class="article-actions">' +
          '<button class="action-btn wa-btn" onclick="shareWhatsApp()" title="Invia su WhatsApp">' +
            '<span class="action-icon">📲</span> WhatsApp' +
          '</button>' +
          '<button class="action-btn" onclick="copyArticle()" title="Copia articolo">' +
            '<span class="action-icon">📋</span> Copia' +
          '</button>' +
        '</div>' +
      '</div>';

    // Update counter
    document.getElementById('article-counter').textContent = (idx + 1) + ' / ' + CODE.articles.length;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === CODE.articles.length - 1;

    // Highlight active in TOC
    document.querySelectorAll('.art-link').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.querySelector('.art-link[data-idx="' + idx + '"]');
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // Scroll main to top
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
  }

  window.goTo = function(idx) { showArticle(idx); closeSidebar(); };

  function navigate(dir) {
    var pos = filteredIndices.indexOf(currentIdx);
    if (pos === -1) pos = 0;
    var newPos = pos + dir;
    if (newPos >= 0 && newPos < filteredIndices.length) {
      showArticle(filteredIndices[newPos]);
    }
  }

  function onSearch(e) {
    var q = e.target.value.toLowerCase().trim();
    filteredIndices = [];
    document.querySelectorAll('.art-link').forEach(function(el) {
      var idx = parseInt(el.dataset.idx, 10);
      var art = CODE.articles[idx];
      var hidden = q && !art._searchText.includes(q);
      el.classList.toggle('hidden', hidden);
      if (!hidden) filteredIndices.push(idx);
    });
    if (!q) filteredIndices = CODE.articles.map(function(_, i) { return i; });
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
  window.toggleNotes = function(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  };

  function getArticleText(art, bold) {
    var body = (art.contentHtml || '').replace(/<\/p>\s*<p>/gi, '\n').replace(/<[^>]+>/g, '').replace(/[ \t]+/g, ' ').trim();
    var heading = art.numText;
    if (art.heading) heading += ' – ' + art.heading;
    if (bold) heading = '*' + heading + '*';
    return CODE.title + '\n' + heading + '\n' + body;
  }

  window.shareWhatsApp = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, true);
    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  };

  window.copyArticle = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, false);
    navigator.clipboard.writeText(text).then(function() {
      showToast('Articolo copiato negli appunti');
    }, function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Articolo copiato negli appunti');
    });
  };

  function showToast(msg) {
    var el = document.getElementById('copy-toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(function() { el.classList.remove('visible'); }, 2000);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
