 1 e 3.&quot;.</p>"},{"id":"art_65","numText":"Art. 65","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Querela di falso","contentHtml":"<p>Il conciliatore, quando rimette le parti davanti al tribunale per il processo di falso, stabilisce un termine perentorio entro il quale le parti stesse debbono riassumere la causa davanti al tribunale.(18)<sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_66","numText":"Art. 66","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. 21 NOVEMBRE 1991, N. 374 (11)(17)<sup class=\"amd\">18</sup></p>","notesHtml":"<p>AGGIORNAMENTO (11)</p>\n<p>La L. 21 novembre 1991, n. 374 ha disposto (con l'art. 49, comma 1) originariamente l'abrogazione del presente articolo a decorrere dal 2 gennaio 1993; successivamente la L. 4 dicembre 1992, n. 477 (con l'art. 1, comma 3) ha differito tale abrogazione al 3 gennaio 1994.</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 21 novembre 1991, n. 374, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 49, comma 1) che &quot;Le disposizioni di cui agli articoli 3, commi 2 e 3; 7; 9; 10; 11; 13; da 15 a 34; da 39 a 41 e da 43 a 47 hanno efficacia a partire dal 1 maggio 1995.&quot;</p>\n<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 118, comma 2) che nel medesimo capo la ripartizione interna e' soppressa.</p>"},{"id":"art_67","numText":"Art. 67","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. 21 NOVEMBRE 1991, N. 374 (11)(17)<sup class=\"amd\">18</sup></p>","notesHtml":"<p>AGGIORNAMENTO (11)</p>\n<p>La L. 21 novembre 1991, n. 374 ha disposto (con l'art. 49, comma 1) originariamente l'abrogazione del presente articolo a decorrere dal 2 gennaio 1993; successivamente la L. 4 dicembre 1992, n. 477 (con l'art. 1, comma 3) ha differito tale abrogazione al 3 gennaio 1994.</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 21 novembre 1991, n. 374, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto (con l'art. 49, comma 1) che &quot;Le disposizioni di cui agli articoli 3, commi 2 e 3; 7; 9; 10; 11; 13; da 15 a 34; da 39 a 41 e da 43 a 47 hanno efficacia a partire dal 1 maggio 1995.&quot;</p>\n<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 118, comma 2) che nel medesimo capo la ripartizione interna e' soppressa.</p>"},{"id":"art_68","numText":"Art. 68","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza di conciliazione","contentHtml":"<p>L'istanza di conciliazione in sede non contenziosa puo' essere proposta al conciliatore con ricorso o verbalmente.</p>\n<p>Se l'istanza e' proposta con ricorso, il conciliatore fa invitare dal cancelliere le parti a comparire davanti a lui in un giorno e in un'ora determinati per cercare di conciliarle.</p>\n<p>Se e' proposta verbalmente, il conciliatore redige di essa processo verbale e da' la disposizione di cui al comma precedente. \n <sup class=\"amd\">18</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 118, comma 2) che nel medesimo capo la ripartizione interna e' soppressa.</p>"},{"id":"art_69","numText":"Art. 69","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Mancata comparizione della parte invitata","contentHtml":"<p>Se la parte invitata non si presenta, il conciliatore ne da' atto nel processo verbale; di questo la parte istante puo' ottenere copia. <sup class=\"amd\">18</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 118, comma 2) che nel medesimo capo la ripartizione interna e' soppressa.</p>"},{"id":"art_69","numText":"Art. 69-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione delle udienze di prima comparizione","contentHtml":"<p>Il decreto del presidente del tribunale, che stabilisce, a norma del secondo comma dell'articolo 163 del codice, i giorni della settimana e le ore delle udienze destinate esclusivamente alla prima comparizione delle parti, deve essere affisso in tutte le sale d'udienza del tribunale entro il 30 novembre di ogni anno e rimanervi durante il successivo anno giudiziario cui si riferisce.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_70","numText":"Art. 70","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza, di abbreviazione dei termini di comparizione","contentHtml":"<p>L'istanza di abbreviazione dei termini di comparizione, prevista nell'art. 163-bis ultimo comma del Codice, e' proposta con ricorso diretto al presidente del tribunale, ovvero, se la causa e' stata gia' assegnata ad una sezione, al presidente di questa.</p>\n<p>Il decreto del presidente fissa l'udienza di prima comparizione e deve essere comunicato, insieme col ricorso stesso, ai procuratori delle parti costituite almeno cinque giorni liberi prima dell'udienza fissata dal presidente. Alle parti non costituite il decreto e il ricorso debbono essere notificati personalmente in un congruo termine stabilito dal presidente. <sup class=\"amd\">59</sup></p>\n<p>Se all'udienza fissata dal presidente non compariscono tutte le parti alle quali deve essere fatta la comunicazione o la notificazione, il giudice istruttore verifica la regolarita' della comunicazione o della notificazione, e ne ordina, quando occorre, la rinnovazione, fissando una nuova udienza di prima comparizione. In tal caso deve essere osservato per la comunicazione lo stesso termine stabilito nel comma precedente; per la notificazione alle parti non costituite il giudice istruttore stabilisce un nuovo termine congruo.</p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_70","numText":"Art. 70-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Computo dei termini di comparizione","contentHtml":"<p>I termini di comparizione, stabiliti nell'art. 163-bis del Codice, debbono essere osservati in relazione all'udienza fissata nell'atto di citazione, anche se la causa e' rinviata ad altra udienza a norma dell'articolo 168-bis quarto comma dello stesso Codice.</p>","notesHtml":""},{"id":"art_70","numText":"Art. 70-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164","contentHtml":"<p><sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_71","numText":"Art. 71","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Iscrizione a ruolo della causa","contentHtml":"<p>La parte che si costituisce in giudizio per prima indica negli schemi informatici le generalita' e il codice fiscale di tutte le parti e del procuratore che si costituisce, nonche' l'oggetto e il valore della domanda, la data di notificazione della citazione e dell'udienza fissata per la prima comparizione delle parti, nonche' gli ulteriori dati richiesti dalla normativa, anche regolamentare, concernente la sottoscrizione, la trasmissione e la ricezione dei documenti informatici.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164 ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_72","numText":"Art. 72","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164","contentHtml":"<p><sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_73","numText":"Art. 73","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164","contentHtml":"<p><sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_74","numText":"Art. 74","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fascicolo d'ufficio e fascicoli di parte","contentHtml":"<p>Il fascicolo d'ufficio informatico contiene una sezione in cui sono inseriti gli atti e i provvedimenti dell'ufficio nonche' una sezione per ogni parte costituita, a sua volta suddivisa in due sottosezioni contenenti rispettivamente gli atti e i documenti depositati, ciascuno numerato e con denominazione descrittiva del suo contenuto.</p>\n<p>Le regole tecniche per l'adozione nel processo civile delle tecnologie dell'informazione e della comunicazione assicurano che per ogni documento prodotto dalle parti sia possibile individuare la data del deposito e l'atto in allegato al quale esso e' stato depositato.</p>\n<p>Nei casi in cui le disposizioni, anche regolamentari, che disciplinano il deposito degli atti del processo consentono il deposito di atti e documenti in formato analogico, il cancelliere forma un fascicolo cartaceo d'ufficio in cui e' inserito il fascicolo di parte contenente gli atti e i documenti depositati.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_75","numText":"Art. 75","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Nota delle spese","contentHtml":"<p>Il difensore al momento del passaggio in decisione della causa deposita la nota delle spese, indicando in modo distinto e specifico gli onorari e le spese, con riferimento all'articolo della tariffa dal quale si desume ciascuna partita. <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_76","numText":"Art. 76","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Potere delle parti sui fascicoli","contentHtml":"<p>Le parti o i loro difensori muniti di procura possono esaminare gli atti e i documenti prodotti su supporto cartaceo e inseriti nel fascicolo d'ufficio e in quelli delle altre parti e farsene rilasciare copia dal cancelliere, osservate le leggi sui diritti di copia. <sup class=\"amd\">59</sup>.</p>\n<p>Le parti e i loro difensori muniti di procura possono accedere al fascicolo informatico e alle informazioni in esso contenute, nei limiti e secondo le modalita' previste dalla normativa, anche regolamentare, concernente la sottoscrizione, la trasmissione e la ricezione dei documenti informatici e l'adozione nel processo civile delle tecnologie dell'informazione e della comunicazione.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_77","numText":"Art. 77","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ritiro del fascicolo cartaceo di parte","contentHtml":"<p>Per ritirare il proprio fascicolo cartaceo a norma dell'articolo 169 del codice, la parte deve fare istanza al giudice istruttore, che provvede con decreto.</p>\n<p>Il cancelliere annota nel fascicolo informatico il ritiro del fascicolo di parte e la sua restituzione.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_78","numText":"Art. 78","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Astensione del giudice istruttore","contentHtml":"<p>Il giudice istruttore, che riconosce l'esistenza di un motivo di astensione a norma dell'articolo 51 del codice, deve farne espressa dichiarazione oppure istanza scritta al presidente del tribunale appena ricevuto il decreto di nomina.</p>\n<p>Se il motivo d'astensione sorge dopo che l'istruzione e' iniziata, il giudice istruttore ne da' subito notizia al capo dell'ufficio giudiziario competente e dichiara o chiede di astenersi.</p>","notesHtml":""},{"id":"art_79","numText":"Art. 79","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sostituzione del giudice istruttore","contentHtml":"<p>La sostituzione del giudice istruttore nei casi previsti nell'articolo 174 del codice e' disposta d'ufficio o su istanza di parte.</p>\n<p>L'istanza e' proposta con ricorso al presidente del tribunale, il quale provvede con decreto designando altro giudice della stessa sezione.</p>\n<p>L'istanza e il decreto sono inseriti nel fascicolo d'ufficio.</p>","notesHtml":""},{"id":"art_80","numText":"Art. 80","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione delle udienze dei giudici istruttori","contentHtml":"<p>Il presidente del tribunale stabilisce con decreto, al principio e alla meta' dell'anno giudiziario, i giorni della settimana e le ore in cui egli stesso, i presidenti di sezione e ciascun giudice istruttore debbono tenere le udienze destinate esclusivamente alla prima comparizione delle parti, e le udienze d'istruzione. Il decreto deve rimanere affisso in tutte le sale d'udienza del tribunale durante il periodo al quale si riferisce. Se nel corso dell'anno uno o piu' giudici istruttori cessano di fare parte del tribunale; o della sezione, debbono di volta in volta essere apportate al decreto le necessarie modificazioni.</p>","notesHtml":""},{"id":"art_80","numText":"Art. 80-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio al collegio nell'udienza di prima comparizione","contentHtml":"<p>La rimessione al collegio, a norma dell'art. 187 del Codice, puo' essere disposta dal giudice istruttore anche nell'udienza destinata esclusivamente alla prima comparizione delle parti.</p>","notesHtml":""},{"id":"art_81","numText":"Art. 81","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fissazione delle udienze d'istruzione","contentHtml":"<p>Le udienze d'istruzione per ogni causa sono fissate di volta in volta dal giudice istruttore.</p>\n<p>Nello stesso processo l'intervallo tra l'udienza destinata esclusivamente alla prima comparizione delle parti e la prima udienza d'istruzione, e quello tra le successive udienze di istruzione, non puo' essere superiore a quindici giorni, salvo che, per speciali circostanze, delle quali dovra' farsi menzione nel provvedimento, sia necessario un intervallo maggiore.</p>","notesHtml":""},{"id":"art_81","numText":"Art. 81-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Calendario del processo","contentHtml":"<p>PERIODO SOPPRESSO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197. I termini fissati nel calendario possono essere prorogati, anche d'ufficio, quando sussistono gravi motivi sopravvenuti. La proroga deve essere richiesta dalle parti prima della scadenza dei termini.</p>\n<p>Il mancato rispetto dei termini fissati nel calendario da parte del giudice, del difensore o del consulente tecnico d'ufficio puo' costituire violazione disciplinare, e puo' essere considerato ai fini della valutazione di professionalita' e della nomina o conferma agli uffici direttivi e semidirettivi. Il rispetto del termine di cui all'articolo 473-bis.14, terzo comma, del codice e' tenuto in considerazione nella formulazione dei rapporti per le valutazioni di professionalita'.(54) (55)</p>\n<p>Quando il difensore documenta il proprio stato di gravidanza, il giudice, ai fini della fissazione del calendario del processo ovvero della proroga dei termini in esso previsti, tiene conto del periodo compreso tra i due mesi precedenti la data presunta del parto e i tre mesi successivi. La disposizione del primo periodo si applica anche nei casi di adozione nazionale e internazionale nonche' di affidamento del minore avendo riguardo ai periodi previsti dall'articolo 26 del testo unico delle disposizioni legislative in materia di tutela e sostegno della maternita' e della paternita', di cui al decreto legislativo 26 marzo 2001, n. 151. Dall'applicazione del presente comma non puo' derivare grave pregiudizio alle parti nelle cause per le quali e' richiesta un'urgente trattazione.</p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_82","numText":"Art. 82","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio delle udienze di prima comparizione e d'istruzione","contentHtml":"<p>Qualora il giudice istruttore designato non tenga udienza nel giorno fissato per la prima comparizione delle parti, questa si intende rinviata d'ufficio alla udienza di prima comparizione immediatamente successiva, assegnata allo stesso giudice.(14) <sup class=\"amd\">17</sup> \n La stessa disposizione si applica anche nel caso che il presidente abbia designato un giudice diverso da quelli che tengono udienze di prima comparizione nel giorno fissato dall'attore.(14)<sup class=\"amd\">17</sup></p>\n<p>Se nel giorno fissato non si tiene udienza d'istruzione per festivita' sopravvenuta o impedimento del giudice istruttore, ovvero per qualsiasi altro motivo, la causa s'intende riavviata d'ufficio alla prima udienza d'istruzione immediatamente successiva.</p>\n<p>Il giudice istruttore puo', su istanza di parte o d'ufficio, fissare altra udienza d'istruzione, ferme le disposizioni dell'articolo precedente. Il decreto e' comunicato dal cancelliere alle parti non presenti alla pronuncia del provvedimento.</p>\n<p>Se le parti alle quali deve essere fatta la comunicazione prevista nel primo e nel terzo comma precedenti, o alcuna di esse, non compariscono nella nuova udienza, il giudice istruttore verifica la regolarita' della comunicazione e ne ordina, quando occorre, la rinnovazione, rinviando la causa, secondo i casi, all'udienza di prima comparizione immediatamente successiva, ovvero ad altra udienza d'istruzione.</p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_83","numText":"Art. 83","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordine di trattazione delle cause","contentHtml":"<p>Il giudice istruttore fissa l'ordine di trattazione delle cause, dando la precedenza a quelle per le quali sono stati abbreviati i termini e a quelle rinviate a norma degli articoli precedenti.</p>","notesHtml":""},{"id":"art_83","numText":"Art. 83-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Trattazione scritta della causa","contentHtml":"<p>Il giudice istruttore, quando autorizza la trattazione scritta della causa, a norma dell'art. 180 primo comma del Codice, puo' stabilire quale delle parti deve comunicare per prima la propria comparsa, ed il termine entro il quale l'altra parte deve rispondere.</p>","notesHtml":""},{"id":"art_83","numText":"Art. 83-ter","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Inosservanza delle disposizioni sulle attribuzioni delle sezioni distaccate del tribunale","contentHtml":"<p>L'inosservanza delle disposizioni di ordinamento giudiziario relative alla ripartizione tra sede principale e sezioni distaccate, o tra diverse sezioni distaccate, delle cause nelle quali il tribunale giudica in composizione monocratica e' rilevata non oltre l'udienza di prima comparizione.</p>\n<p>Il giudice, se ravvisa l'inosservanza o ritiene comunque non manifestamente infondata la relativa questione, dispone la trasmissione del fascicolo d'ufficio al presidente del tribunale, che provvede con decreto non impugnabile.(18) <sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (18)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51 ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace decorso il termine stabilito dall'articolo 1, comma 1, lettera r), della legge 16 luglio 1997, n. 254, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>\n<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_84","numText":"Art. 84","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Svolgimento delle udienze","contentHtml":"<p>Le udienze del giudice istruttore non sono pubbliche.</p>\n<p>Per ciascuna causa sono ammessi davanti al giudice i difensori delle parti e le parti stesse. Queste debbono assistere all'udienza in silenzio, salvo che non ottengano dal giudice, a mezzo del proprio difensore, l'autorizzazione ad interloquire.</p>\n<p>Le parti e i loro difensori non possono dettare le loro deduzioni nel processo verbale se non ne sono autorizzati dal giudice.</p>","notesHtml":""},{"id":"art_85","numText":"Art. 85","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza per imposizione di cauzione","contentHtml":"<p>L'istanza del convenuto per l'imposizione di una cauzione all'attore, a norma dell'articolo 98 del codice, deve essere proposta nella prima udienza di trattazione della causa.</p>\n<p>L'istanza puo' essere proposta successivamente quando e' giustificata da fatti sopravvenuti o non conosciuti al tempo della prima udienza.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma della cauzione","contentHtml":"<p>Salvo che sia diversamente disposto dal giudice a norma dell'articolo 119 del codice, la cauzione deve essere prestata in danaro o in titoli del debito pubblico nei modi stabiliti per i depositi giudiziari.</p>\n<p>Il documento contenente la prova del versamento e' inserito nel fascicolo d'ufficio.</p>","notesHtml":""},{"id":"art_87","numText":"Art. 87","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Produzione dei documenti","contentHtml":"<p>I documenti offerti in comunicazione dalle parti dopo la costituzione sono prodotti mediante deposito ai sensi dell'articolo 196-quater e il relativo elenco deve essere comunicato alle altre parti nelle forme stabilite dall'articolo 170, quarto comma, del codice. Se nel corso dell'udienza emerge la necessita' di produrre documenti, il giudice, su istanza di parte, puo' assegnare termine per il deposito degli stessi nel fascicolo informatico. \n (54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_88","numText":"Art. 88","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Processo verbale di avvenuta conciliazione","contentHtml":"<p>La convenzione conclusa tra le parti per effetto della conciliazioni davanti al giudice istruttore e' raccolta in separato processo verbale, sottoscritto dalle parti stesse, dal giudice e dal cancelliere.</p>\n<p>Quando il verbale di udienza, contenente gli accordi di cui al primo comma ovvero un verbale di conciliazione ai sensi degli articoli 185 e 420 del codice, e' redatto con strumenti informatici, della sottoscrizione delle parti, del cancelliere e dei difensori tiene luogo apposita dichiarazione del giudice che tali soggetti, resi pienamente edotti del contenuto degli accordi, li hanno accettati. Il verbale di conciliazione recante tale dichiarazione ha valore di titolo esecutivo e gli stessi effetti della conciliazione sottoscritta in udienza.</p>\n<p>Se la conciliazione avviene tra i procuratori non autorizzati a conciliare, il giudice ne prende atto nel processo verbale d'udienza e fissa un'udienza per la comparizione delle parti e per la formazione del processo verbale indicato nel comma precedente.</p>\n<p>Se le parti non risiedono nella circoscrizione del giudice, questi puo' autorizzarle a ratificare la convenzione conclusa dai procuratori con dichiarazione ricevuta dal cancelliere della pretura della loro residenza o, se il luogo di residenza non e' sede di pretura, da notaio, fissando all'uopo un termine. La dichiarazione di ratifica e' unita al processo verbale d'udienza contenente la convenzione.</p>","notesHtml":""},{"id":"art_89","numText":"Art. 89","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordinanza sull'astensione o ricusazione del consulente tecnico","contentHtml":"<p>L'ordinanza sull'astensione o sulla ricusazione del consulente tecnico prevista nell'articolo 192 del codice e' scritta in calce al ricorso del consulente o della parte.</p>\n<p>Il ricorso e l'ordinanza sono inseriti nel fascicolo d'ufficio.</p>","notesHtml":""},{"id":"art_90","numText":"Art. 90","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Indagini del consulente senza la presenza del giudice","contentHtml":"<p>Il consulente tecnico che, a norma dell'articolo 194 del codice, e' autorizzato a compiere indagini senza che sia presente il giudice, deve dare comunicazione alle parti del giorno, ora e luogo di inizio delle operazioni, con dichiarazione inserita nel processo verbale d'udienza o con biglietto a mezzo del cancelliere.</p>\n<p>Il consulente non puo' ricevere altri scritti defensionali oltre quelli contenenti le osservazioni e le istanze di parte consentite dall'articolo 194 del codice.</p>\n<p>In ogni caso deve essere comunicata alle parti avverse copia degli scritti defensionali.</p>","notesHtml":""},{"id":"art_91","numText":"Art. 91","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Comunicazioni a consulenti di parte","contentHtml":"<p>Nella dichiarazione di cui all'articolo 201 primo comma del codice deve essere indicato il domicilio o il recapito del consulente della parte.</p>\n<p>Il cancelliere deve dare comunicazione al consulente tecnico di parte, regolarmente nominato, delle indagini predisposte dal consulente d'ufficio, perche' vi possa assistere a norma degli articoli 194 e 201 del codice.</p>","notesHtml":""},{"id":"art_92","numText":"Art. 92","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Questioni sorte durante le indagini del consulente","contentHtml":"<p>Se, durante le indagini che il consulente tecnico compie da se' solo, sorgono questioni sui suoi poteri o sui limiti dell'incarico conferitogli, il consulente deve informarne il giudice, salvo che la parte interessata vi provveda con ricorso.</p>\n<p>Il ricorso della parte non sospende le indagini del consulente.</p>\n<p>Il giudice, sentite le parti, da' i provvedimenti opportuni.</p>","notesHtml":""},{"id":"art_93","numText":"Art. 93","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Assistenza alla persona sottoposta all'ispezione","contentHtml":"<p>Chi e' sottoposto ad ispezione corporale puo' farsi assistere da persona di sua fiducia che sia riconosciuta idonea dal giudice.</p>","notesHtml":""},{"id":"art_94","numText":"Art. 94","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza di esibizione","contentHtml":"<p>L'istanza di esibizione di un documento o di una cosa in possesso di una parte o di un terzo deve contenere la specifica indicazione del documento o della cosa e, quando e' necessario, l'offerta della prova che la parte o il terzo li possiede.</p>","notesHtml":""},{"id":"art_95","numText":"Art. 95","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Notificazione dell'ordinanza di esibizione","contentHtml":"<p>Il giudice, nell'ordinanza con la quale dispone l'esibizione di un documento o di una cosa in possesso di una parte contumace o di un terzo, fissa il termine entro il quale l'ordinanza deve essere notificata e indica la parte che deve provvedere alla notificazione.</p>","notesHtml":""},{"id":"art_96","numText":"Art. 96","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Informazioni della pubblica amministrazione","contentHtml":"<p>La nota contenente le informazioni, che la pubblica amministrazione fornisce su richiesta del giudice a norma dell'articolo 213 del codice, e' inserita nel fascicolo d'ufficio.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Divieto di private informazioni","contentHtml":"<p>Il giudice non puo' ricevere private informazioni sulle cause pendenti davanti a se', ne' puo' ricevere memorie se non per mezzo della cancelleria.</p>","notesHtml":""},{"id":"art_98","numText":"Art. 98","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Deposito di documenti fatto da pubblico depositario","contentHtml":"<p>Il pubblico depositario, al quale e' stato ordinato dal giudice istruttore il deposito in cancelleria delle scritture di comparazione a norma dell'articolo 218 del codice, deve farne copia.</p>\n<p>Le copie sono verificate dal cancelliere che della verificazione redige processo verbale. Questo e' conservato in cancelleria unitamente alle scritture originali e una copia di esso e' consegnata al depositario.</p>\n<p>Il pubblico depositario puo' rilasciare copia delle scritture in base a quella da lui fatta, facendo menzione del processo verbale di verificazione di cui al comma precedente.</p>","notesHtml":""},{"id":"art_99","numText":"Art. 99","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Proposizione della querela di falso","contentHtml":"<p>La querela di falso proposta con atto di citazione deve essere confermata nella prima udienza davanti al giudice istruttore dalla parte personalmente o dal difensore munito di procura speciale.</p>\n<p>Se la parte che propone personalmente in udienza la querela di falso e' analfabeta, la dichiarazione e' raccolta dal cancelliere in apposito processo verbale che tiene luogo della dichiarazione scritta.</p>","notesHtml":""},{"id":"art_100","numText":"Art. 100","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Copie del documento impugnato","contentHtml":"<p>Il cancelliere non puo' rilasciare copia del documento impugnato di falso che si trova depositato in cancelleria senza l'autorizzazione del giudice istruttore.</p>\n<p>L'autorizzazione e' data con decreto.</p>","notesHtml":""},{"id":"art_101","numText":"Art. 101","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio","contentHtml":"<p>Nel procedimento di falso si osservano, in quanto applicabili, le disposizioni del codice relative alla verificazione di scrittura privata.</p>","notesHtml":""},{"id":"art_102","numText":"Art. 102","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ammissione d'interrogatorio o di prova testimoniale","contentHtml":"<p>Nell'ordinanza che ammette l'interrogatorio o la prova testimoniale non e' necessario che siano ripetuti i capitoli relativi, se il giudice fa richiamo a quelli contenuti nell'atto di citazione e nella comparsa di risposta o nei processi verbali di causa.</p>","notesHtml":""},{"id":"art_103","numText":"Art. 103","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Termine per l'intimazione al testimone","contentHtml":"<p>L'intimazione di cui all'articolo 250 del codice deve essere fatta ai testimoni almeno sette giorni prima dell'udienza in cui sono chiamati a comparire.<sup class=\"amd\">27</sup></p>\n<p>Con l'autorizzazione del giudice il termine puo' essere ridotto nei casi d'urgenza.</p>\n<p>L'intimazione a cura del difensore contiene: \n 1) l'indicazione della parte richiedente e della controparte, nonche' gli estremi dell'ordinanza con la quale e' stata ammessa la prova testimoniale; \n 2) il nome, il cognome ed il domicilio della persona da citare; \n 3) il giorno, l'ora e il luogo della comparizione, nonche' il giudice davanti al quale la persona deve presentarsi; \n 4) l'avvertimento che, in caso di mancata comparizione senza giustificato motivo, la persona citata potra' essere condannata al pagamento di una pena pecuniaria non inferiore a 100 euro e non superiore a 1.000 euro.<sup class=\"amd\">27</sup></p>","notesHtml":"<p>AGGIORNAMENTO (27)</p>\n<p>La L. 28 dicembre 2005, n. 263 come modificata dal D.L. 30 dicembre 2005, n. 273 convertito, con modificazioni, dalla L. 23 febbraio 2006, n. 51 ha conseguentemente disposto (con l'art. 2, comma 4) che la presente modifica entra in vigore il 1 marzo 2006.</p>"},{"id":"art_103","numText":"Art. 103-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Modello di testimonianza","contentHtml":"<p>La testimonianza scritta e' resa su di un modulo conforme al modello approvato con decreto del Ministro della giustizia, che individua anche le istruzioni per la sua compilazione, da notificare unitamente al modello. Il modello, sottoscritto in ogni suo foglio o firmato digitalmente dalla parte che ne ha curato la compilazione, deve contenere, oltre all'indicazione del procedimento e dell'ordinanza di ammissione da parte del giudice procedente, idonei spazi per l'inserimento delle complete generalita' del testimone, dell'indicazione della sua residenza, del suo domicilio e, ove possibile, di un suo recapito telefonico. Deve altresi' contenere l'ammonimento del testimone ai sensi dell'articolo 251 del codice e la formula del giuramento di cui al medesimo articolo, oltre all'avviso in ordine alla facolta' di astenersi ai sensi degli articoli 200, 201 e 202 del codice di procedura penale, con lo spazio per la sottoscrizione obbligatoria del testimone, nonche' le richieste di cui all'articolo 252, primo comma, del codice, ivi compresa l'indicazione di eventuali rapporti personali con le parti, e la trascrizione dei quesiti ammessi, con l'avvertenza che il testimone deve rendere risposte specifiche e pertinenti a ciascuna domanda e deve altresi' precisare se ha avuto conoscenza dei fatti oggetto della testimonianza in modo diretto o indiretto. <sup class=\"amd\">59</sup>.</p>\n<p>Quando il modulo e' compilato su supporto cartaceo, al termine di ogni risposta e' apposta, di seguito e senza lasciare spazi vuoti, la sottoscrizione da parte del testimone. <sup class=\"amd\">59</sup></p>\n<p>Le sottoscrizioni apposte sul modulo redatto su supporto cartaceo devono essere autenticate da un segretario comunale o dal cancelliere di un ufficio giudiziario. L'autentica delle sottoscrizioni e' in ogni caso gratuita nonche' esente dall'imposta di bollo e da ogni diritto. <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_104","numText":"Art. 104","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Mancata intimazione ai testimoni","contentHtml":"<p>Se la parte senza giusto motivo non fa chiamare i testimoni davanti al giudice, questi la dichiara, anche d'ufficio, decaduta dalla prova, salvo che l'altra parte dichiari di avere interesse all'audizione.</p>\n<p>Se il giudice riconosce giutificata l'omissione, fissa una nuova udienza per l'assunzione della prova.</p>","notesHtml":""},{"id":"art_105","numText":"Art. 105","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma speciale di esame testimoniale","contentHtml":"<p>La disposizione dell'articolo 255 secondo comma del codice, relativa all'esenzione della comparizione dei testimoni davanti al giudice, si applica in ogni caso ai Principi Reali, ai Cardinali che svolgono una funzione di rilievo particolare presso la Santa Sede e ai Grandi Ufficiali dello Stato.</p>\n<p>Rivestono funzioni di rilievo particolare presso la Santa Sede il cardinale decano del Sacro Collegio, i cardinali prefetti dei dicasteri della Curia romana aventi la qualifica di congregazione, il cardinale prefetto del Supremo tribunale della Segnatura apostolica ed il cardinale che presiede la Penitenzieria apostolica.</p>","notesHtml":""},{"id":"art_106","numText":"Art. 106","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Disposizioni relative al testimone non comparso","contentHtml":"<p>Il giudice istruttore puo' pronunciare i provvedimenti di cui all'articolo 225 primo comma del codice contro il testimone non comparso dopo che e' decorsa un'ora da quella indicata per la comparizione.</p>\n<p>Il provvedimento di condanna costituisce titolo esecutivo contro il testimone.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.P.R. 30 MAGGIO 2002, N. 115","contentHtml":"","notesHtml":""},{"id":"art_108","numText":"Art. 108","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Procuratore autorizzato ad assistere alle prove delegate","contentHtml":"<p>Il difensore munito di mandato alla lite puo' assistere all'assunzione delle prove che si eseguono fuori della circoscrizione del tribunale a norma dell'articolo 203 del codice.</p>\n<p>Il difensore stesso puo' anche incaricare un procuratore del luogo mediante delega scritta, che deve essere unita al processo verbale di assunzione della prova.</p>","notesHtml":""},{"id":"art_109","numText":"Art. 109","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordinanza di pagamento durante il rendiconto","contentHtml":"<p>L'ordinanza prevista nell'articolo 264 ultimo comma del codice costituisce titolo esecutivo.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. 26 NOVEMBRE 1990, N. 353 (14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 89, comma 2) la proroga dell'entrata in vigore dell'abrogazione del presente articolo dal 1° gennaio 1993 al 2 gennaio 1994; \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 89, comma 2) la proroga dell'entrata in vigore dell'abrogazione del presente articolo dal 2 gennaio 1994 al 30 aprile 1995; \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_111","numText":"Art. 111","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Produzione delle comparse","contentHtml":"<p>Le comparse debbono essere inserite nel fascicolo di parte quattro giorni prima dell'udienza che il giudice istruttore ha fissato per la discussione.</p>\n<p>Il cancelliere non deve consentire che s'inseriscano nei fascicoli di parte comparse che non risultano comunicate alle altre parti e di cui non gli sono contemporaneamente consegnate le copie in carta libera per il fascicolo d'ufficio e per gli altri componenti il collegio. Quando le comparse sono depositate con modalita' telematiche, il presente comma non si applica.</p>\n<p>L'inserzione tardiva delle comparse puo' essere autorizzata dal presidente del tribunale per gravi ragioni fino a due giorni prima dell'udienza.</p>\n<p>Le comparse debbono essere scritte in carattere chiaro e facilmente leggibile, altrimenti la parte puo' rifiutarsi di riceverle e il cancelliere puo' non consentire che s'inseriscano nel fascicolo.</p>","notesHtml":""},{"id":"art_112","numText":"Art. 112","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Istanza di decisione secondo equita'","contentHtml":"<p>L'istanza per il giudizio di equita', consentita alle parti dall'articolo 114 del codice, deve essere espressa in ogni caso nelle conclusioni prese a norma dell'articolo 189 del codice.</p>","notesHtml":""},{"id":"art_112","numText":"Art. 112-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"","contentHtml":"<p>ARTICOLO ABROGATO DALLA L. 26 NOVEMBRE 1990, N. 353 (14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 89, comma 2) la proroga dell'entrata in vigore dell'abrogazione del presente articolo dal 1° gennaio 1993 al 2 gennaio 1994; \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 89, comma 2) la proroga dell'entrata in vigore dell'abrogazione del presente articolo dal 2 gennaio 1994 al 30 aprile 1995; \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_113","numText":"Art. 113","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione dei giorni delle camere di consiglio e composizione dei collegi","contentHtml":"<p>Al principio di ogni trimestre il presidente del tribunale o della sezione determina con decreto i giorni in cui di tengono le camere di consiglio e la composizione dei relativi collegi giudicanti.</p>\n<p>Se alla camera di consiglio sono chiamati giudici in numero superiore a quello stabilito, il collegio, per ciascuna causa, e' formato dal presidente, dal relatore e dal giudice piu' anziano.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_114","numText":"Art. 114","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione dei giorni d'udienza e composizione dei collegi","contentHtml":"<p>All'inizio di ciascun anno giudiziario, il presidente del tribunale stabilisce, con decreto approvato, dal primo presidente della Corte d'appello, i giorni della settimana e le ore in cui il tribunale o le sezioni tengono le udienze di discussione di cui ai commi terzo e quarto dell'articolo 275 del codice.</p>\n<p>Il decreto del presidente deve restare affisso per tutto l'anno in ciascuna sala di udienza del tribunale.</p>\n<p>Al principio di ogni trimestre il presidente del tribunale determina con decreto la composizione del collegio giudicante per ogni udienza di discussione di cui ai commi terzo e quarto dell'articolo 275 del codice.</p>\n<p>Se all'udienza sono chiamati giudici in numero superiore a quello stabilito, il collegio, per ciascuna causa, e' formato dal presidente, dal relatore e dal giudice piu' anziano.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_115","numText":"Art. 115","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio della discussione","contentHtml":"<p>Si applica alle udienze del collegio la disposizione dell'articolo 82.</p>\n<p>Il collegio puo' inoltre rinviare la discussione della causa per non piu' di una volta soltanto per grave impedimento del tribunale o delle parti e non oltre la seconda udienza successiva a quella fissata dal giudice istruttore a norma dell'articolo 190 del codice.</p>","notesHtml":""},{"id":"art_116","numText":"Art. 116","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordine di discussione delle cause","contentHtml":"<p>L'ordine di discussione delle cause per ciascuna udienza e' fissato dal presidente ed e' affisso il giorno precedente l'udienza alla porta della sala a questa destinata.</p>\n<p>Le cause sono chiamate dall'ufficiale giudiziario di servizio secondo l'ordine stabilito, salvo che il presidente disponga altrimenti per ragioni di opportunita'.</p>","notesHtml":""},{"id":"art_117","numText":"Art. 117","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Svolgimento della discussione","contentHtml":"<p>I difensori debbono leggere davanti al collegio le loro conclusioni e possono svolgere sobriamente le ragioni che le sorreggono.</p>\n<p>Essi debbono chiedere al presidente la facolta' di parlare e debbono dirigere la parola soltanto al tribunale. Il pubblico ministero ha la parola per ultimo.</p>\n<p>Il presidente puo' consentire una sola replica. Non sono ammesse note d'udienza dopo la discussione; ma il presidente puo' consentirle quando il pubblico ministero prende proprie conclusioni, produce documenti e deduce prove a norma dell'articolo 3 ultimo comma e la causa non e' rimessa al giudice istruttore.</p>","notesHtml":""},{"id":"art_118","numText":"Art. 118","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Motivazione della sentenza","contentHtml":"<p>La motivazione della sentenza di cui all'articolo 132, secondo comma, numero 4), del codice consiste nella succinta esposizione dei fatti rilevanti della causa e delle ragioni giuridiche della decisione, anche con riferimento a precedenti conformi.</p>\n<p>Debbono essere esposte concisamente e in ordine le questioni discusse e decise dal collegio ed indicati le norme di legge e i principi di diritto applicati. Nel caso previsto nell'articolo 114 del codice debbono essere esposte le ragioni di equita' sulle quali e' fondata la decisione.</p>\n<p>In ogni caso deve essere omessa ogni citazione di autori giuridici.</p>\n<p>La scelta dell'estensore della sentenza prevista nell'articolo 276 ultimo comma del codice e' fatta dal presidente tra i componenti il collegio che hanno espresso voto conforme alla decisione.</p>","notesHtml":""},{"id":"art_119","numText":"Art. 119","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Redazione della sentenza","contentHtml":"<p>L'estensore trasmette telematicamente la minuta della sentenza da lui redatta e sottoscritta digitalmente al presidente del tribunale o della sezione. Il presidente, comunicata la minuta, quando lo ritiene opportuno, al collegio, la sottoscrive a sua volta con firma digitale e la deposita telematicamente.\n <sup class=\"amd\">59</sup>.</p>\n<p>COMMA ABROGATO DAL D.LGS. 31 OTTOBRE 2024, N. 164. <sup class=\"amd\">59</sup></p>\n<p>Il giudice che ha steso la motivazione aggiunge la qualifica di estensore alla sua sottoscrizione.</p>\n<p>Quando la sentenza e' pronunziata secondo equita' se ne deve dare atto nel dispositivo.</p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_120","numText":"Art. 120","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 19 FEBBRAIO 1998, N. 51","contentHtml":"<p><sup class=\"amd\">19</sup></p>","notesHtml":"<p>AGGIORNAMENTO (19)</p>\n<p>Il D.Lgs. 19 febbraio 1998, n. 51, come modificato dalla L. 16 giugno 1998, n. 188, ha disposto (con l'art. 247, comma 1) che &quot;Il presente decreto legislativo entra in vigore il giorno successivo alla sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana e diventa efficace a decorrere dal 2 giugno 1999, fatta eccezione per le disposizioni previste dagli articoli 17, 33, comma 1, 38, comma 1 e 40, commi 1 e 3&quot;.</p>"},{"id":"art_121","numText":"Art. 121","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Ordinanza di correzione delle sentenze","contentHtml":"<p>L'ordinanza di correzione delle sentenze e' notificata alle parti a cura del cancelliere.</p>","notesHtml":""},{"id":"art_122","numText":"Art. 122","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Forma dell'istanza per integrazione dei provvedimenti istruttori","contentHtml":"<p>L'istanza per l'integrazione di uu provvedimento istruttorio a norma dell'articolo 289 del codice e' fatta con ricorso diretto al giudice istruttore o, in mancanza, al presidente del collegio.</p>","notesHtml":""},{"id":"art_123","numText":"Art. 123","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Avviso d'impugnazione alla cancelleria","contentHtml":"<p>L'ufficiale giudiziario che ha notificato un atto d'impugnazione deposita immediatamente copia dell'atto nel fascicolo d'ufficio contenente il provvedimento impugnato.</p>\n<p>Il cancelliere annota nel fascicolo informatico la proposizione dell'impugnazione.\n <sup class=\"amd\">59</sup></p>","notesHtml":"<p>AGGIORNAMENTO (59)</p>\n<p>Il D.Lgs. 31 ottobre 2024, n. 164, ha disposto (con l'art. 7, comma 1) che &quot;Ove non diversamente previsto, le disposizioni del presente decreto si applicano ai procedimenti introdotti successivamente al 28 febbraio 2023&quot;.</p>"},{"id":"art_123","numText":"Art. 123-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Trasmissione del fascicolo d'ufficio al giudice superiore","contentHtml":"<p>Se l'impugnazione e' proposta contro una sentenza non definitiva, non si applicano le disposizioni dell'articolo 347 ultimo comma del Codice e dell'articolo 137-bis. Tuttavia il giudice della impugnazione puo', se lo ritiene necessario, richiedere la trasmissione del fascicolo d'ufficio, ovvero ordinare alla parte interessata di produrre copia di determinati atti.(54) <sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti&quot;.</p>"},{"id":"art_124","numText":"Art. 124","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Certificato di passaggio in giudicato della sentenza","contentHtml":"<p>A prova del passaggio in giudicato della sentenza il cancelliere certifica, in calce alla copia contenente la relazione di notificazione, che non e' stato proposto nei termini di legge appello o ricorso per cassazione, ne' istanza di revocazione per i motivi di cui ai numeri 4 e 5 dell'articolo 395 del codice.</p>\n<p>Ugualmente il cancelliere certifica in calce alla copia della sentenza che non e' stata proposta impugnazione nel termine previsto dall'articolo 327 del codice.</p>","notesHtml":""},{"id":"art_125","numText":"Art. 125","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riassunzione della causa","contentHtml":"<p>Salvo che dalla legge sia disposto altrimenti, la riassunzione della causa e' fatta con comparsa, che deve contenere: \n 1) l'indicazione del giudice davanti al quale si deve comparire; \n 2) il nome delle parti e dei loro difensori con procura; \n 3) il richiamo dell'atto introduttivo del giudizio; \n 4) l'indicazione dell'udienza in cui le parti debbono comparire, osservati i termini stabiliti dall'articolo 163-bis del Codice; \n 5) l'invito a costituirsi nei termini stabiliti dall'articolo 166 del Codice; \n 6) l'indicazione del provvedimento del giudice in base al quale e' fatta la riassunzione, e, nel caso dell'art. 307 primo comma del Codice, l'indicazione della data della notificazione della citazione non seguita dalla costituzione delle parti, ovvero del provvedimento che ha ordinato la cancellazione della causa dal ruolo.</p>\n<p>Se, prima della riassunzione, il giudice istruttore abbia tenuto l'udienza di prima comparizione, e la causa debba essere riassunta davanti allo stesso giudice, le parti debbono essere citate a comparire in una udienza d'istruzione. Se il giudice istruttore gia' designato non fa piu' parte del tribunale o della sezione, la Parte che provvede alla riassunzione deve preliminarmente chiedere la sostituzione con ricorso al presidente del tribunale o della sezione.</p>\n<p>La comparsa e' notificata a norma dell'art. 170 del Codice, ed alle parti non costituite deve essere notificata personalmente.</p>","notesHtml":""},{"id":"art_125","numText":"Art. 125-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riassunzione delle cause sospese durante l'istruzione","contentHtml":"<p>Se il giudice istruttore ha sospeso l'esecuzione o la prosecuzione dell'ulteriore istruzione a norme, dell'art. 279 quarto comma del Codice, le parti debbono riassumere la causa davanti a lui nelle forme stabilite dall'articolo che precede, entro il termine perentorio di sei mesi dalla comunicazione della sentenza che definisce il giudizio sull'appello immediato che ha dato luogo alla sospensione.</p>","notesHtml":""},{"id":"art_126","numText":"Art. 126","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fascicolo della causa riassunta","contentHtml":"<p>Il cancelliere del giudice davanti al quale la causa e' riassunta deve immediatamente richiedere il fascicolo d'ufficio al cancelliere del giudice che ha precedentemente conosciuto della causa.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riscossione della pena pecuniaria a carico dell'opponente","contentHtml":"<p>La riscossione della pena pecuniaria, alla quale sia stato condannato il terzo opponente a norma dell'articolo 408 del codice, e' fatta dal cancelliere.</p>","notesHtml":""},{"id":"art_128","numText":"Art. 128","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Determinazione dei giorni d'udienza","contentHtml":"<p>Il decreto del primo presidente della corte d'appello, che stabilisce, a norma dell'art. 1633 secondo comma del Codice, i giorni della settimana e le ore delle udienze (destinate esclusivamente alla prima comparizione delle parti, deve essere affisso in tutte le sale d'udienza della corte d'appello entro il 30 novembre di ogni anno, e rimanervi durante il successivo anno giudiziario cui si riferisce.</p>\n<p>Il primo presidente della Corte d'appello stabilisce con decreto, al principio e alla meta' dell'anno giudiziario, i giorni della settimana e le ore in cui debbono tenersi le udienze destinate esclusivamente alla prima comparizione delle parti, e le udienze d'istruzione. Il decreto deve rimanere affisso in tutte le sale di udienza della Corte d'appello durante il periodo al quale si riferisce.(14)<sup class=\"amd\">17</sup></p>\n<p>Se nel corso dell'anno uno o piu' istruttori cessano di fare parte della corte d'appello o della sezione, debbono di volta in volta essere apportate al decreto le necessarie modificazioni.</p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_129","numText":"Art. 129","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riserva d'appello. Estinzione del processo","contentHtml":"<p>La riserva d'appello contro le sentenze previste nell'art. 278 e nel n. 4 del secondo comma dell'articolo 279 del Codice, puo' essere fatta, nell'udienza del giudice istruttore con dichiarazione orale da inserirsi nel processo verbale, o con dichiarazione scritta su foglio a parte da allegarsi ad esso.</p>\n<p>La riserva puo' essere fatta anche con atto notificato ai procuratori delle altre parti costituite, a norma dell'art. 170 primo e terzo comma, del Codice, o personalmente alla parte, se questa non e' costituita.</p>\n<p>Se il processo si estingue in primo grado, la sentenza di merito contro la quale fu fatta la riserva acquista efficacia di sentenza definitiva dal giorno in cui diventa irrevocabile l'ordinanza, o passa in giudicato la sentenza, che pronuncia l'estinzione del processo.</p>\n<p>Da questa data decorrono i termini stabiliti dall'articolo 325 del Codice per impugnare la sentenza gia' notificata, e, se questa non e' stata notificata, decorre il termine di decadenza stabilito dall'art. 327 del Codice stesso.</p>","notesHtml":""},{"id":"art_129","numText":"Art. 129-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sospensione dell'istruzione nel caso di riforma di sentenza non definitiva","contentHtml":"<p>Se sia stato proposto ricorso per cassazione contro sentenza d'appello che abbia riformato alcuna delle sentenze previste nel n. 4 del secondo comma dell'art. 279 del Codice, il giudice istruttore, su istanza della parte interessata, qualora ritenga che i provvedimenti dati con l'ordinanza collegiale per l'ulteriore istruzione della causa siano dipendenti da quelli contenuti nella sentenza riformata, puo' disporre con ordinanza non impugnabile che la esecuzione o la prosecuzione dell'ulteriore istruzione rimanga sospesa fino alla definizione del giudizio di cassazione.</p>\n<p>Se la sentenza e' cassata, la causa deve essere riassunta davanti al giudice istruttore nelle forme stabilite dall'art. 125, entro il termine perentorio di sei mesi dalla comunicazione della sentenza che accoglie il ricorso.</p>","notesHtml":""},{"id":"art_130","numText":"Art. 130","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Appello contro la sentenza di estinzione del processo","contentHtml":"<p>Nel giudizio d'appello contro la sentenza che ha dichiarato l'estinzione del processo a norma dell'articolo 308 del codice o che ha provveduto sul reclamo previsto nell'articolo 630 del codice stesso, il collegio, quando e' necessario, autorizza le parti a presentare memorie, fissando i rispettivi termini, e provvede in camera di consiglio con sentenza.(14)<sup class=\"amd\">17</sup></p>","notesHtml":"<p>AGGIORNAMENTO (14)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dalla L. 4 dicembre 1992, n. 477, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 2 gennaio 1994, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 2 gennaio 1994.&quot;</p>\n<p>AGGIORNAMENTO (17)</p>\n<p>La L. 26 novembre 1990, n. 353, come modificata dal D.L. 7 ottobre 1994, n. 571, convertito con modificazioni dalla L. 6 dicembre 1994, n. 673, ha disposto: \n - (con l'art. 92, comma 1) che &quot;Fatta eccezione per la disposizione di cui all'articolo 1, la presente legge entra in vigore il 1 gennaio 1993. Ai giudizi pendenti a tale data si applicano, fino al 30 aprile 1995, le disposizioni anteriormente vigenti.&quot;; \n - (con l'art. 92, comma 2) che &quot;Le disposizioni di cui agli articoli 3; 4; da 7 a 15; da 17 a 19; da 22 a 32; da 36 a 47; da 50 a 58; 70; 73; da 78 a 83 e 88 hanno efficacia a partire dal 30 aprile 1995.&quot;</p>"},{"id":"art_131","numText":"Art. 131","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Deliberazione dei provvedimenti","contentHtml":"<p>Nel deliberare i provvedimenti la corte d'appello applica le disposizioni dell'articolo 276 del codice.</p>\n<p>Il relatore vota per primo, quindi votano i consiglieri in ordine inverso di anzianita' e per ultimo il presidente.</p>\n<p>La scelta dell'estensore della sentenza e' fatta dal presidente tra i componenti il collegio che hanno espresso voto conforme alla decisione.</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sospensione dell'esecuzione delle sentenze impugnate per cassazione","contentHtml":"<p>Sull'istanza di sospensione dell'esecuzione della sentenza prevista dall'art. 373 del Codice, il giudice non puo' decidere se la parte istante non ha dimostrato di avere depositato il ricorso per cassazione contro la sentenza medesima.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Rinvio","contentHtml":"<p>Nei procedimenti d'appello si osservano, in quanto applicabili, le norme dettate nel capo secondo, se non sono incompatibili con quelle contenute nel presente capo.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Riserva di ricorso. Estinzione del processo","contentHtml":"<p>La riserva di ricorso per cassazione prevista nell'art. 361 del Codice deve essere fatta nei modi stabiliti dall'art. 129 primo e secondo comma.</p>\n<p>Si applicano al ricorso per cassazione le disposizioni dell'art. 129 terzo comma.</p>\n<p>L'articolo 129, terzo comma, si applica altresi' se il processo si estingue dopo la pronuncia delle sentenze previste dall'articolo 360, terzo comma, del codice.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Sospensione dell'istruzione in pendenza di ricorso per cassazione","contentHtml":"<p>Se sia stato proposto ricorso immediato per cassazione contro alcuna delle sentenze previste nel n. 4 del secondo comma dell'articolo 279 del Codice, l'istruttore, su istanza concorde delle parti, qualora ritenga che i provvedimenti dati con l'ordinanza collegiale per l'ulteriore istruzione della causa siano dipendenti di quelli contenuti nella sentenza impugnata, puo' disporre con ordinanza non impugnabile che l'esecuzione o la prosecuzione dell'ulteriore istruzione rimanga sospesa fino alla definizione del giudizio di cassazione.</p>\n<p>Se il ricorso e' rigettato o dichiarato inammissibile la causa deve essere riassunta davanti all'istruttore nelle forme stabilite dall'art. 125, entro il termine perentorio di sei mesi dalla comunicazione della sentenza di rigetto</p>","notesHtml":""},{"id":"art_134","numText":"Art. 134","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"<p><sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_134","numText":"Art. 134-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"<p><sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_135","numText":"Art. 135","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"<p><sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_136","numText":"Art. 136","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DALLA L. 18 OTTOBRE 1977, N. 793","contentHtml":"","notesHtml":""},{"id":"art_137","numText":"Art. 137","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"ARTICOLO ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197","contentHtml":"<p><sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 5) che &quot;Salvo quanto disposto dal comma 6, le norme del capo III del titolo III del libro secondo del codice di procedura civile e del capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificati dal presente decreto, hanno effetto a decorrere dal 1° gennaio 2023 e si applicano ai giudizi introdotti con ricorso notificato a decorrere da tale data&quot;.</p>"},{"id":"art_137","numText":"Art. 137-bis","group":"DISPOSIZIONI DI ATTUAZIONE DEL CODICE DI PROCEDURA CIVILE","heading":"Fascicolo d'ufficio","contentHtml":"<p>Il cancelliere della corte, entro sessanta giorni dal deposito del ricorso, acquisisce il fascicolo d'ufficio dalla cancelleria del giudice che ha pronunciato il provvedimento impugnato.</p>\n<p>Nello stesso modo procede nei casi previsti dagli articoli 41, 47, 362 e 363-bis del codice.</p>\n<p>(54)<sup class=\"amd\">55</sup></p>","notesHtml":"<p>AGGIORNAMENTO (54)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che &quot;Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.\nAi procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti&quot;. \n Ha inoltre disposto (con l'art. 35, comma 6) che &quot;Salvo quanto disposto dal comma 7, le norme di cui al capo III del titolo III del libro secondo del codice di procedura civile e di cui al capo IV delle disposizioni per l'attuazione del codice di procedura civile e disposizioni transitorie, di cui al regio decreto 18 dicembre 1941, n. 1368, come modificate dal presente decreto, si applicano ai giudizi introdotti con ricorso notificato a decorrere dal 1° gennaio 2023&quot;.</p>\n<p>AGGIORNAMENTO (55)</p>\n<p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto: \n - (con l'art
