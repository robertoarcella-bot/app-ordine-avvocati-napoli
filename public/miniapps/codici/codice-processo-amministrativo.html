i. I verbali e le decisioni deliberate all'esito dell'udienza o della camera di consiglio si considerano, rispettivamente, formati ed assunte nel comune sede dell'ufficio giudiziario presso il quale e' stato iscritto il ricorso trattato. Il luogo da cui si collegano i magistrati, gli avvocati, le parti che si difendano personalmente e il personale addetto e' considerato aula di udienza a tutti gli effetti di legge. In alternativa alla partecipazione alla discussione da remoto, il difensore puo' chiedere il passaggio della causa in decisione fino alle ore 12 del terzo giorno antecedente a quello dell'udienza stessa; il difensore che deposita tale richiesta e' considerato presente a ogni effetto. Ai magistrati che partecipano alla trattazione di cause da remoto non spetta alcun trattamento di missione ne' alcun rimborso di spese)) .</p>","notesHtml":""},{"id":"art_13-ter_all2","numText":"Art. 13-ter","group":"Allegato 2 — Norme di attuazione","heading":"","contentHtml":"<p>(Criteri per la sinteticita' e la chiarezza degli atti di parte).</p><p>1. Al fine di consentire lo spedito svolgimento del giudizio in coerenza con i principi di sinteticita' e chiarezza di cui all'articolo 3, comma 2, del codice, le parti redigono il ricorso e gli altri atti difensivi secondo i criteri e nei limiti dimensionali stabiliti con decreto del presidente del Consiglio di Stato, da adottare entro il 31 dicembre 2016, sentiti il Consiglio di presidenza della giustizia amministrativa, il Consiglio nazionale forense e l'Avvocato generale dello Stato, nonche' le associazioni di categoria degli avvocati amministrativisti.</p><p>2. Nella fissazione dei limiti dimensionali del ricorso e degli atti difensivi si tiene conto del valore effettivo della controversia, della sua natura tecnica e del valore dei diversi interessi sostanzialmente perseguiti dalle parti. Dai suddetti limiti sono escluse le intestazioni e le altre indicazioni formali dell'atto.</p><p>3. Con il decreto di cui al comma 1 sono stabiliti i casi per i quali, per specifiche ragioni, puo' essere consentito superare i relativi limiti.</p><p>4. Il Consiglio di presidenza della giustizia amministrativa, anche mediante audizione degli organi e delle associazioni di cui al comma 1, effettua un monitoraggio annuale al fine di verificare l'impatto e lo stato di attuazione del decreto di cui al comma 1 e di formulare eventuali proposte di modifica. Il decreto e' soggetto ad aggiornamento con cadenza almeno biennale, con il medesimo procedimento di cui al comma 1.</p><p>5. ((Indipendentemente dall'esito del giudizio, la parte che in qualsiasi atto del processo superi, senza avere ottenuto una preventiva autorizzazione, i limiti dimensionali stabiliti ai sensi del presente articolo puo' essere tenuta al pagamento di una somma complessiva per l'intero grado del giudizio fino al doppio del contributo unificato previsto in relazione all'oggetto del giudizio medesimo e, ove occorra, in aggiunta al contributo gia' versato.))</p><p>5-bis. ((Il giudice, con la decisione che definisce il giudizio, determina l'importo di cui al comma 5 tenendo conto dell'entita' del superamento dei limiti dimensionali stabiliti ai sensi del presente articolo nonche' della complessita' ovvero della dimensione degli atti impugnati o della sentenza impugnata.))</p><p>5-ter. ((Si applica l'articolo 15)) .</p>","notesHtml":""},{"id":"art_14_all2","numText":"Art. 14","group":"Allegato 2 — Norme di attuazione","heading":"Commissione per l'ammissione al patrocinio a spese dello Stato","contentHtml":"<p>1. Presso il Consiglio di Stato, il Consiglio di giustizia amministrativa per la Regione siciliana e ogni tribunale amministrativo regionale e relative sezioni staccate e' istituita una commissione per l'ammissione anticipata e provvisoria al patrocinio a spese dello Stato, composta da due magistrati amministrativi, designati dal presidente, il piu' anziano dei quali assume le funzioni di presidente della commissione, e da un avvocato, designato dal presidente dell'Ordine degli avvocati del capoluogo in cui ha sede l'organo. Per ciascun componente sono designati uno o piu' membri supplenti. Esercita le funzioni di segretario un impiegato di segreteria, nominato dal presidente. Al presidente e ai componenti non spetta nessun compenso ne' rimborso spese. ((I verbali e i provvedimenti della commissione sono sottoscritti con firma digitale del presidente e del segretario. Le sedute della commissione si tengono con strumenti di collegamento da remoto. Si da' atto nel verbale della seduta delle modalita' con cui si accerta l'identita' dei soggetti partecipanti e della loro libera volonta', anche ai fini della disciplina sulla protezione dei dati personali)) .</p>","notesHtml":""},{"id":"art_15_all2","numText":"Art. 15","group":"Allegato 2 — Norme di attuazione","heading":"Devoluzione del gettito delle sanzioni pecuniarie","contentHtml":"<p>1. Il gettito delle sanzioni pecuniarie previste dal codice e' versato al bilancio dello Stato, per essere riassegnato allo stato di previsione del Ministero dell'economia e delle finanze per le spese di cui all'articolo 1, comma 309, della legge 30 dicembre 2004, n. 311, e successive modificazioni.</p>","notesHtml":""},{"id":"art_16_all2","numText":"Art. 16","group":"Allegato 2 — Norme di attuazione","heading":"Misure straordinarie per la riduzione dell'arretrato e per l'incentivazione della produttivita'","contentHtml":"<p>1. Con decreto del Presidente del Consiglio dei Ministri, d'intesa con il Ministro dell'economia e delle finanze, su proposta del presidente del Consiglio di presidenza della giustizia amministrativa previa delibera dello stesso Consiglio, sono adottate, nei limiti dei fondi disponibili nel relativo bilancio ed effettivamente non utilizzati, misure straordinarie per la riduzione dell'arretrato e per l'incentivazione della produttivita'. ((1-bis. In analogia a quanto stabilito al comma 1, nell'ambito dei progetti finalizzati all'abbattimento dell'arretrato inclusi nel Piano nazionale di ripresa e resilienza (PNRR) tali misure straordinarie nei confronti del personale amministrativo non dirigenziale della Giustizia amministrativa, ad eccezione di quello assunto ai sensi dell'articolo 11, comma 1, del decreto-legge 9 giugno 2021, n. 80, convertito, con modificazioni, dalla legge 6 agosto 2021, n. 113, sono adottate con decreto del Presidente del Consiglio di Stato, su proposta del Segretario generale della Giustizia amministrativa, tra i dipendenti che hanno concorso al raggiungimento dell'obiettivo del PNRR, secondo parametri indicati, all'inizio di ogni anno, dal Segretario generale della Giustizia amministrativa. Le misure di cui al presente comma trovano copertura mediante utilizzo delle risorse ancora disponibili nel bilancio della Giustizia amministrativa, tenuto conto di quanto previsto al comma 1)) .</p>","notesHtml":""},{"id":"art_1_all3","numText":"Art. 1","group":"Allegato 3 — Norme transitorie","heading":"Nuova istanza di fissazione d'udienza","contentHtml":"<p>1. Nel termine di centottanta giorni dalla data di entrata in vigore del codice, le parti presentano una nuova istanza di fissazione di udienza, sottoscritta dalla parte che ha rilasciato la procura di cui all'articolo 24 del codice e dal suo difensore, relativamente ai ricorsi pendenti da oltre cinque anni e per i quali non e' stata ancora fissata l'udienza di discussione. In difetto, il ricorso e' dichiarato perento con decreto del presidente.</p><p>2. Se tuttavia, nel termine di centottanta giorni dalla comunicazione del decreto, il ricorrente deposita un atto, sottoscritto dalla parte personalmente e dal difensore e notificato alle altre parti, in cui dichiara di avere ancora interesse alla trattazione della causa, il presidente revoca il decreto disponendo la reiscrizione della causa sul ruolo di merito.</p><p>3. Se, nella pendenza del termine di cui al comma 1, e' comunicato alle parti l'avviso di fissazione dell'udienza di discussione, il giudice provvede ai sensi dell'articolo 82, comma 2, del codice.</p>","notesHtml":""},{"id":"art_2_all3","numText":"Art. 2","group":"Allegato 3 — Norme transitorie","heading":"Ultrattivita' della disciplina previgente","contentHtml":"<p>1. Per i termini che sono in corso alla data di entrata in vigore del codice continuano a trovare applicazione le norme previgenti.</p>","notesHtml":""},{"id":"art_3_all3","numText":"Art. 3","group":"Allegato 3 — Norme transitorie","heading":"Disposizione particolare per il giudizio di appello","contentHtml":"<p>1. La disposizione di cui all'articolo 101, comma 2, del codice non si applica agli appelli depositati prima dell'entrata in vigore del codice medesimo.</p>","notesHtml":""},{"id":"art_1_all4","numText":"Art. 1","group":"Allegato 4 — Disposizioni abrogative e di coordinamento","heading":"Norme di coordinamento e abrogazione in materia di elezioni dei membri del Parlamento europeo spettanti all'Italia","contentHtml":"<p>1. Alla legge 24 gennaio 1979, n.18, sono apportate le seguenti modificazioni: a) l'articolo 42 e' sostituito dal seguente: \"Art. 42. La tutela giurisdizionale contro gli atti di proclamazione degli eletti, per motivi inerenti alle operazioni elettorali successive all'emanazione del decreto di convocazione dei comizi, e' disciplinata dalle disposizioni dettate dal codice del processo amministrativo.\"; b) sono abrogati gli articoli 43 e 46, secondo comma.</p>","notesHtml":""},{"id":"art_2_all4","numText":"Art. 2","group":"Allegato 4 — Disposizioni abrogative e di coordinamento","heading":"Norme di coordinamento e abrogazioni in materia di elezioni amministrative","contentHtml":"<p>1. Al testo unico delle leggi per la composizione e la elezione degli organi delle Amministrazioni comunali, di cui al decreto del Presidente della Repubblica 16 maggio 1960, n. 570, sono apportate le seguenti modificazioni: a) l'articolo 83 e' sostituito dal seguente: \"Art. 83. La tutela in materia di operazioni per l'elezione dei consiglieri comunali, successive all'emanazione del decreto di convocazione dei comizi, e' disciplinata dalle disposizioni dettate dal codice del processo amministrativo.\"; b) sono abrogati gli articoli: 83/2; 83/3; 83/4; 83/5; 83/6, 83/7; 83/8; 83/9; 83/10; 83/11; 83/12; c) all'articolo 84, primo comma, le parole: \", la Sezione per il contenzioso elettorale, il Consiglio di Stato\" sono soppresse.</p><p>2. Alla legge 5 agosto 1962, n. 1257, sono apportate le seguenti modificazioni: a) all'articolo 21, primo comma, le parole: \"sia in materia di eleggibilita' sia in materia di operazioni elettorali\" sono sostituite dalle seguenti: \"in materia di eleggibilita'\"; b) l'articolo 23 e' sostituito dal seguente: \"Art. 23. Ricorso giurisdizionale in materia di operazioni elettorali. La tutela in materia di operazioni per l'elezione dei consiglieri comunali, successive all'emanazione del decreto di convocazione dei comizi, e' disciplinata dalle disposizioni dettate dal codice del processo amministrativo.\"; c) all'articolo 24, nella rubrica, le parole: \"Consiglio regionale, della Corte di appello e del Consiglio di Stato\" sono sostituite dalle seguenti: \"Consiglio regionale e della Corte di appello\" e, al primo comma, le parole: \"Consiglio regionale, la Corte d'appello di Torino ed il Consiglio di Stato\" sono sostituite dalle seguenti: \"Consiglio regionale e la Corte d'appello di Torino\"; d) all'articolo 30 sono apportate le seguenti modificazioni: 1) al primo comma le parole: \"al Consiglio di Stato\" sono sostituite dalle seguenti: \"alla Corte di appello di Torino\" e le parole: \", giudicando in sede di giurisdizione esclusiva\" sono soppresse; 2) al secondo comma le parole: \"al Consiglio di Stato\" sono sostituite dalle seguenti: \"alla Corte di appello di Torino\"; e) all'articolo 31, primo comma, le parole: \"il Consiglio regionale, la Corte d'appello di Torino ed il Consiglio di Stato\" sono sostituite dalle seguenti: \"il Consiglio regionale e la Corte d'appello di Torino\"; f) all'articolo 33, terzo comma, le parole: \"al Consiglio di Stato ed\" sono soppresse.</p><p>3. Alla legge 23 dicembre 1966, n. 1147, sono apportate le seguenti modificazioni: a) all'articolo 3, primo comma, le parole: \", sia davanti agli organi di giurisdizione ordinaria, sia davanti agli organi di giurisdizione amministrativa,\" sono sostituite dalle seguenti: \"davanti agli organi di giurisdizione ordinaria\"; b) all'articolo 7: 1) al comma 2 le parole: \"sia per quanto riguarda la materia relativa alle operazioni per l'elezione, sia\" sono soppresse; 2) dopo il secondo comma e' inserito il seguente: \"La tutela contro le operazioni per l'elezione dei consiglieri provinciali, successive all'emanazione del decreto di convocazione dei comizi, e' disciplinata dalle disposizioni dettate dal codice del processo amministrativo.\". c) sono abrogati gli articoli: 2 e 8.</p><p>4. Alla legge 17 febbraio 1968, n. 108, sono apportate le seguenti modificazioni: a) all'articolo 19 il primo comma e' sostituito dal seguente: \"Per i ricorsi in materia di eleggibilita' e decadenza si osservano le norme di cui agli articoli 1, 3, 4 e 5 della legge 23 dicembre 1966, n. 1147.\"; b) all'articolo 19, dopo il terzo comma e' aggiunto il seguente: \"La tutela in materia di operazioni per l'elezione dei consiglieri regionali, successive all'emanazione del decreto di convocazione dei comizi, e' disciplinata dalle disposizioni dettate dal codice del processo amministrativo.\".</p><p>5. Agli articoli 31, primo comma, e 34, primo comma, del decreto del Presidente della Repubblica 16 maggio 1960, n. 570, nonche' all'articolo 17, primo comma, n.1), della legge 8 marzo 1951, n. 122, e all'articolo 11, primo comma, n. 4), della legge 17 febbraio 1968, n. 108, le parole: \"il quindicesimo giorno\" sono sostituite dalle seguenti: \"l'ottavo giorno\".</p>","notesHtml":""},{"id":"art_3_all4","numText":"Art. 3","group":"Allegato 4 — Disposizioni abrogative e di coordinamento","heading":"Ulteriori norme di coordinamento","contentHtml":"<p>1. L'articolo 17, secondo comma, della legge 24 marzo 1958, n. 195, e' sostituito dal seguente: \"La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>2. Alla legge 7 agosto 1990, n. 241, sono apportate le seguenti modificazioni: a) l'articolo 2, comma 8, e' sostituito dal seguente: \"8. La tutela in materia di silenzio dell'amministrazione e' disciplinata dal codice del processo amministrativo.\"; b) l'articolo 15, comma 2, le parole: \"commi 2, 3 e 5\" sono sostituite dalle seguenti: \"commi 2 e 3\"; c) l'articolo 25, comma 5, e' sostituito dal seguente: \"5. Le controversie relative all'accesso ai documenti amministrativi sono disciplinate dal codice del processo amministrativo.\".</p><p>3. L'articolo 33, comma 1, della legge 10 ottobre 1990, n. 287, e' sostituito dal seguente: \"1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>4. L'articolo 10, comma 2-quinquies, del decreto-legge 15 gennaio 1991, n. 8, convertito, con modificazioni, dalla legge 15 marzo 1991, n. 82, e' sostituito dal seguente: \"2-quinquies. La tutela avverso i provvedimenti della commissione centrale con cui vengono applicate, modificate o revocate le speciali misure di protezione anche se di tipo urgente o provvisorio a norma dell'articolo 13, comma 1, e' disciplinata dal codice del processo amministrativo.\".</p><p>5. All'articolo 5 della legge 24 febbraio 1992, n. 225, dopo il comma 6 e' aggiunto il seguente: \"6-bis. La tutela giurisdizionale davanti al giudice amministrativo avverso le ordinanze adottate in tutte le situazioni di emergenza dichiarate ai sensi del comma 1 e avverso i consequenziali provvedimenti commissariali e' disciplinata dal codice del processo amministrativo.\". ((5-bis.) All'articolo 145-bis del decreto legislativo 1° settembre 1993, n. 385, sono apportate le seguenti modificazioni: a) il comma 2 e' sostituito dal seguente: \"2. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\"; b) il comma 4 e' sostituito dal seguente: \"4. Copia della sentenza del tribunale amministrativo regionale e' trasmessa, a cura delle parti, all'Organismo ai fini della pubblicazione, per estratto.))</p><p>6. L'articolo 2, comma 25, della legge 14 novembre 1995, n. 481, e' sostituito dal seguente: \"25. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>7. L'articolo 13, comma 11, del testo unico delle disposizioni concernenti la disciplina dell'immigrazione e norme sulla condizione dello straniero, di cui al decreto legislativo 25 luglio 1998, n. 286, e' sostituito dal seguente: \"11. Contro il decreto ministeriale di cui al comma 1 la tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>8. L'articolo 1, comma 26, della legge 31 luglio 1997, n. 249, e' sostituito dal seguente: \"26. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>9. Al decreto ((legislativo)) 8 giugno 2001, n. 325, l'articolo 53 e' sostituito dal seguente: \"Art. 53 (L). Disposizioni processuali.</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo. (L).</p><p>2. Resta ferma la giurisdizione del giudice ordinario per le controversie riguardanti la determinazione e la corresponsione delle indennita' in conseguenza dell'adozione di atti di natura espropriativa o ablativa.(L)\".</p><p>10. Al decreto del Presidente della Repubblica 8 giugno 2001, n. 327, l'articolo 53 e' sostituito dal seguente: \"Art. 53 (L). Disposizioni processuali.</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo (L).</p><p>2. Resta ferma la giurisdizione del giudice ordinario per le controversie riguardanti la determinazione e la corresponsione delle indennita' in conseguenza dell'adozione di atti di natura espropriativa o ablativa (L).\".</p><p>11. All'articolo 13, comma 6-bis, del testo unico delle disposizioni legislative e regolamentari in materia di spese e di giustizia, di cui al decreto del Presidente della Repubblica 30 maggio 2002, n. 115, le parole: \"per i ricorsi previsti dall'articolo 23-bis, comma 1, della legge 6 dicembre 1971, n. 1034, nonche' da altre disposizioni che richiamano il citato articolo 23-bis, il contributo dovuto e' di euro 1.000; per i ricorsi\" sono sostituite dalle seguenti: \"per i ricorsi cui si applica il rito abbreviato comune a determinate materie previsto dal Libro IV, Titolo V, Capo I del codice del processo amministrativo, nonche' da altre disposizioni che richiamino il citato rito, il contributo dovuto e' di euro 1.000; per i ricorsi\" e alla fine del comma e' aggiunto il seguente periodo: \"Per ricorsi si intendono quello principale, quello incidentale e i motivi aggiunti che introducono domande nuove.\".</p><p>12. L'articolo 9 del decreto legislativo 1 agosto 2003, n. 259, e' sostituito dal seguente: \"Art. 9. Ricorsi avverso provvedimenti del Ministero e dell'Autorita'</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>13. Nell'articolo 3, comma 1, del decreto-legge 19 agosto 2003, n. 220, convertito, con modificazioni, dalla legge 17 ottobre 2003, n. 280, le parole: \"e' devoluta alla giurisdizione esclusiva del giudice amministrativo\" sono sostituite dalle seguenti: \"e' disciplinata dal codice del processo amministrativo\".</p><p>14. L'articolo 81 del decreto legislativo 30 dicembre 2003, n. 396, e' sostituito dal seguente: \" Art. 81. Tutela giurisdizionale</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.(L)\".</p><p>15. L'articolo 81 del decreto del Presidente della Repubblica 30 dicembre 2003, n. 398, e' sostituito dal seguente: \" Art. 81(L) Tutela giurisdizionale.</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo. (L).\".</p><p>16. L'articolo 142, comma 5, del decreto legislativo 10 febbraio 2005, n. 30, e' sostituito dal seguente: \"5. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>17. L'articolo 3, comma 1-ter, del decreto legislativo 7 marzo 2005, n. 82, e' cosi' sostituito: \"1-ter. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\". ((17-bis. «L'articolo 140, comma 11, del decreto legislativo 6 settembre 2005, n. 206 e' cosi' sostituito: \"11. Resta ferma la giurisdizione esclusiva del giudice amministrativo in materia di servizi pubblici ai sensi dell'articolo 133, comma 1, lettera c) del codice del processo amministrativo\"»)) .</p><p>18. L'articolo 326, comma 7, del decreto legislativo 7 settembre 2005, n. 209, e' sostituito dal seguente: \"7. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo. I ricorsi sono notificati anche all'ISVAP, che provvede alla difesa in giudizio con propri legali.\".</p><p>19. Nel decreto legislativo 12 aprile 2006, n. 163, sono apportate le seguenti modificazioni: a) all'articolo 11, comma 10-ter, le parole: \"dell'articolo 245, comma 2-quater, primo periodo\" sono sostituite dalle seguenti: \"dell'articolo 14, ((comma 3)) , del codice del processo amministrativo\"; b) l'articolo 243 bis, comma 6, e' cosi' sostituito: \"6. Il diniego totale o parziale di autotutela, espresso o tacito, e' impugnabile solo unitamente all'atto cui si riferisce, ovvero, se quest'ultimo e' gia' stato impugnato, con motivi aggiunti.\"; c) l'articolo 244 e' sostituito dal seguente: \"Art. 244. Giurisdizione.</p><p>1. Il codice del processo amministrativo individua le controversie devolute alla giurisdizione esclusiva del giudice amministrativo in materia di contratti pubblici.\"; d) l'articolo 245 e' sostituito dal seguente: \"Art. 245. Strumenti di tutela.</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\"; e) l'articolo 245-bis e' sostituito dal seguente: \"Art. 245-bis. Inefficacia del contratto in caso di gravi violazioni.</p><p>1. L'inefficacia del contratto nei casi di gravi violazioni e' disciplinata dal codice del processo amministrativo.\"; f) l'articolo 245-ter e' sostituito dal seguente: \"Art. 245-ter. Inefficacia dei contratti negli altri casi.</p><p>1. L'inefficacia del contratto nei casi diversi da quelli previsti dall'articolo 245-bis e' disciplinata dal codice del processo amministrativo.\"; g) l'articolo 245-quater e' sostituito dal seguente: \"Art.</p><p>245-quater. Sanzioni alternative.</p><p>1. Le sanzioni alternative applicate dal giudice amministrativo alternativamente o cumulativamente sono disciplinate dal codice del processo amministrativo.\"; h) l'articolo 245-quinquies e' sostituito dal seguente: \"Art.</p><p>245-quinquies. Tutela in forma specifica e per equivalente.</p><p>1. La tutela in forma specifica e per equivalente e' disciplinata dal codice del processo amministrativo.\"; i) l'articolo 246 e' sostituito dal seguente: \"Art. 246. Norme processuali ulteriori per le controversie relative a infrastrutture e insediamenti produttivi.</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo nelle controversie relative a infrastrutture e insediamenti produttivi e' disciplinata dal codice del processo amministrativo.\". ((19-bis. Al decreto legislativo 25 luglio 2006, n. 198, sono apportate le seguenti modificazioni: a) all'articolo 37, comma 4, secondo periodo, le parole \"Il giudice adito\" sono sostituite dalle seguenti: \"Il Tribunale in funzione di giudice del lavoro adito\"; b) all'articolo 37, comma 4, sono aggiunte, in fine, le seguenti parole: \"La tutela davanti al giudice amministrativo e' disciplinata dall'articolo 119 del codice del processo amministrativo.\"; c) all'articolo 37, comma 5, le parole \"sentenza di cui al comma 3\" sono sostituite dalle seguenti: \"sentenza di cui al comma 3 e al comma 4\"; d) all'articolo 38, comma 1, le parole \"o il tribunale amministrativo regionale competente,\" sono soppresse; e) all'articolo 38, il comma 5 e' sostituito dal seguente: \"5. La tutela davanti al giudice amministrativo e' disciplinata dall'articolo 119 del codice del processo amministrativo.))</p><p>20. L'articolo 22, comma 1, del decreto legislativo 6 febbraio 2007, n. 30, e' sostituito dal seguente: \"1. Avverso i provvedimenti di allontanamento per motivi di sicurezza dello Stato o per motivi di ordine pubblico di cui all'articolo 20, comma 1, la tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>21. L'articolo 14, comma 1, del decreto legislativo 22 giugno 2007, n. 109, e' sostituito dal seguente: \"1. Avverso i provvedimenti previsti dal presente decreto la tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>22. L'articolo 22 della legge 3 agosto 2007, n. 124, e' sostituito dal seguente: \"Art. 22. Tutela giurisdizionale</p><p>1. La tutela giurisdizionale davanti al giudice amministrativo, avente ad oggetto controversie relative al rapporto di lavoro, e' disciplinata dal codice del processo amministrativo.\".</p><p>23. All'articolo 54, comma 2, del decreto-legge 25 giugno 2008, n. 112, convertito, con modificazioni, dalla legge 6 agosto 2008, n. 133, le parole: \"un'istanza ai sensi del secondo comma dell'articolo 51 del regio decreto 17 agosto 1907, n. 642 \"sono sostituite dalle seguenti: \"l'istanza di prelievo di cui all'articolo ((71, comma 2)) , del codice del processo amministrativo, ne' con riguardo al periodo anteriore alla sua presentazione.\".</p><p>24. L'articolo 9, comma 1, decreto-legge 4 febbraio 2010, n. 4, convertito, con modificazioni, dalla legge 31 marzo 2010, n. 50, e' sostituito dal seguente: \"1. Avverso i provvedimenti previsti dal presente decreto la tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\".</p><p>25. Al decreto legislativo ((15 marzo)) 2010, n. 66, sono apportate le seguenti modificazioni: a) l'articolo 441 e' cosi' sostituito: \"Art. 441. Tutela giurisdizionale.</p><p>1. La cognizione delle controversie in ordine ai requisiti di cui al presente Capo e' devoluta al giudice ordinario per quanto attiene alla liquidazione delle indennita'; la tutela davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\"; b) l'articolo 1940, comma 2 e' sostituito dal seguente: \"2. Avverso i provvedimenti in materia di leva e contro quelli di decisione dei ricorsi gerarchici di cui al comma 1 la tutela giurisdizionale davanti al giudice amministrativo e' disciplinata dal codice del processo amministrativo.\". ((25-bis. Il comma 26-bis dell'art. 10 del decreto-legge 13 maggio 2011, n. 70, convertito, con modificazioni, dalla legge 12 luglio 2011, n. 106 e' sostituito dal seguente: «26-bis. La tutela avverso i provvedimenti dell'Agenzia e' disciplinata dal codice del processo amministrativo.»)) . ((25-ter. L'articolo 114, comma 1, del decreto legislativo 6 settembre 2011, n. 159, e' sostituito dal seguente: \"1. Per tutte le controversie attribuite alla cognizione del giudice amministrativo derivanti dall'applicazione del presente titolo, la competenza e' determinata ai sensi dell'articolo 135, comma 1, lettera p), del codice del processo amministrativo.)) ((25-quater. All'articolo 3, comma 2, del decreto legislativo 6 settembre 2011, n. 149, le parole \"Il giudizio sulla relativa impugnazione e' devoluto alla giurisdizione esclusiva del giudice amministrativo\" sono sostituite dalle seguenti: \"Alle relative controversie si applica l'articolo 133 del codice del processo amministrativo.))</p>","notesHtml":""},{"id":"art_4_all4","numText":"Art. 4","group":"Allegato 4 — Disposizioni abrogative e di coordinamento","heading":"Ulteriori abrogazioni","contentHtml":"<p>1. A decorrere dall'entrata in vigore del presente decreto legislativo sono o restano abrogati i seguenti atti normativi: 1) regio decreto 17 agosto 1907, n. 638; 2) regio decreto 17 agosto 1907, n. 642; 3) regio decreto 30 dicembre 1923, n. 2840; 4) regio decreto 26 giugno 1924, n. 1054: articoli da 1 a 4 compresi; da 6 a 10 compresi; da 26 a 32 compresi; 33, secondo comma; da 34 a 47; da 49 a 56 compresi; 5) regio decreto 26 giugno 1924, n. 1058; 6) regio decreto 8 gennaio 1931, n. 148: articolo 58, secondo comma; 6-bis) regio decreto 21 aprile 1942, n. 444: articoli da 71 a 74; 7) decreto legislativo 5 maggio 1948, n. 642; 8) legge 21 dicembre 1950, n. 1018: articoli 5; 6; 9; 10; 9) legge 21 novembre 1967, n. 1185: articolo 11; 10) legge 6 dicembre 1971, n. 1034: articoli da 2 a 8 compresi; 10; da 19 a 39 compresi; 40, primo comma; da 42 a 52 compresi; 11) decreto del Presidente della Repubblica 21 aprile 1973, n. 214: articoli 3; 4; 5; 12; 13; da 23 a 27 compresi; 30; 34; da 37 a 40 compresi; 11-bis) legge 27 maggio 1975, n. 166: articolo 8; 11-ter) legge 7 giugno 1975, n. 227: articolo 9; 11-quater) legge 8 agosto 1977, n. 546: articolo 4, comma 11; 12) legge 20 marzo 1980, n. 75: articolo 6; 13) legge 27 aprile 1982, n. 186: articoli 1, quarto comma , dalle parole: \"le sezioni giurisdizionali\" fino alla fine; 5; 55; 14) legge 7 agosto 1990, n. 241: articoli 2-bis, comma 2; 11, comma 5; 19, comma 5; 20, comma 5-bis; 21-quinquies, comma 1, ultimo periodo; 21-septies, comma 2; 25, commi 5-bis e 6; 15) decreto legge 15 gennaio 1991, n. 8, convertito, con modificazioni, dalla legge 15 marzo 1991, n. 82: articolo 10, commi 2-sexies, 2-septies, 2-octies; 16) legge 11 agosto 1991, n. 266: articolo 6, comma 5; 17) decreto legislativo 1° settembre 1993, n. 385: articolo 145, commi da 4 a 8; articolo 145-bis, comma 3; ((11)) 18) NUMERO SOPPRESSO DAL D.LGS. 15 NOVEMBRE 2011, N. 195; 19) NUMERO SOPPRESSO DAL D.LGS. 14 SETTEMBRE 2012, N. 160; ((11)) 20) decreto legislativo 31 marzo 1998, n. 80: articoli 33, 34 e 35; 21) legge 4 maggio 1998, n. 133: articolo 4, comma 3; 22) legge 22 febbraio 2000, n. 28: articoli 10, comma 10; 11-quinquies, comma 4; 23) legge 21 luglio 2000, n. 205: articoli 1; 2; 3, commi 1, 2, 3; 4; 6, comma 2; 7; 8; 11; 12; 16; 24) legge 7 dicembre 2000, n. 383: articolo 10, comma 2; 25) decreto legislativo 6 giugno 2001, n. 378: articolo 45, comma 2; 26) decreto del Presidente della Repubblica 6 giugno 2001, n. 380: articolo 45, comma 2; 27) decreto legislativo 8 luglio 2003, n. 188: articolo 37, comma 7; 28) decreto legislativo 1° agosto 2003, n. 259: articolo 92, comma 9; 29) decreto-legge 19 agosto 2003, n. 220, convertito, con modificazioni, dalla legge 17 ottobre 2003, n. 280: articolo 3, commi 2, 3 e 4; 30) legge 30 dicembre 2004, n. 311: articolo 1, comma 552; 31) decreto-legge 26 aprile 2005, n. 63, convertito, con modificazioni, dalla legge 25 giugno 2005, n. 109: articolo 2-sexies, comma 1; 32) decreto-legge 27 luglio 2005, n. 144, convertito, con modificazioni, dalla legge 31 luglio 2005, n. 155: articolo 3, comma 4-bis; 33) decreto legislativo 6 settembre 2005, n. 206: articolo 27, comma 13, primo periodo; 34) decreto legge 30 novembre 2005, n. 245, convertito, con modificazioni, dalla legge 27 gennaio 2006, n. 21: articolo 3, commi 2-bis, 2-ter e 2-quater; 35) legge 28 dicembre 2005, n. 262: articolo 24, commi 5 e 6; 36) decreto legislativo 3 aprile 2006, n. 152: articoli 310, comma 2, limitatamente alle parole:\", in sede di giurisdizione esclusiva,\"; 316, comma 1, limitatamente alle parole:\", in sede di giurisdizione esclusiva,\"; 36-bis) decreto legislativo 12 aprile 2006, n. 163: articolo 246-bis; 37) legge 27 dicembre 2006, n. 296; articolo 1, comma 1308; 38) decreto legislativo 2 agosto 2007, n. 145: articolo 8, comma 13, primo periodo; 39) decreto-legge 23 maggio 2008, n. 90, convertito, con modificazioni, dalla legge 14 luglio 2008, n. 123: articolo 4; 40) decreto-legge 25 giugno 2008, n. 112, convertito, con modificazioni,dalla legge 6 agosto 2008, n. 133: articolo 54, comma 3, lettere c) e d); 41) decreto-legge 29 novembre 2008, n. 185, convertito, con modificazioni, dalla legge 28 gennaio 2009, n. 2: articolo 20, comma 8, fermo quanto previsto dall'articolo 15, comma 4, del decreto legislativo 20 marzo 2010, n. 53; 42) legge 18 giugno 2009, n. 69: articolo 46, comma 24, limitatamente alle parole: \"amministrativi e\"; 43) legge 23 luglio 2009, n. 99: articoli 41; 53, comma 2.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (11)</p><p>La Corte Costituzionale, con sentenza 9 - 15 aprile 2014, n. 94 (in G.U. 1a s.s. 23/4/2014, n. 18) ha dichiarato \"l'illegittimita' costituzionale dell'art. 4, comma 1, numero 17), dell'Allegato 4 al medesimo d.lgs. n. 104 del 2010, nella parte in cui abroga l'art. 145, commi da 4 a 8, del decreto legislativo 1° settembre 1993, n. 385 (Testo unico delle leggi in materia bancaria e creditizia)\".</p><p>Ha inoltre dichiarato \"l'illegittimita' costituzionale dell'art. 4, comma 1, numero 19), dell'Allegato 4 al medesimo d.lgs. n. 104 del 2010, nella parte in cui abroga gli artt. 187-septies, commi da 4 a 8, e 195, commi da 4 a 8, del decreto legislativo 24 febbraio 1998, n. 58 (Testo unico delle disposizioni in materia di intermediazione finanziaria, ai sensi degli articoli 8 e 21 della legge 6 febbraio 1996, n. 52)\".</p>"}]};</script>
<script>
(function() {
  'use strict';
  // DATA is injected per page

  var currentIdx = 0;
  var filteredIndices = CODE.articles.map(function(_, i) { return i; });

  function init() {
    // Pre-compute plain text for full-text search
    CODE.articles.forEach(function(art) {
      art._searchText = (art.numText + ' ' + (art.heading || '') + ' ' +
        (art.contentHtml || '').replace(/<[^>]+>/g, '')).toLowerCase();
    });
    renderToc();

    // Navigate to hash article if present, otherwise show first article
    var initHash = location.hash.replace('#', '');
    var initIdx = 0;
    if (initHash) {
      var found = CODE.articles.findIndex(function(a) { return a.id === initHash || a.numText === decodeURIComponent(initHash); });
      if (found >= 0) initIdx = found;
    }
    showArticle(initIdx);

    document.getElementById('search').addEventListener('input', onSearch);
    document.getElementById('prev-btn').addEventListener('click', function() { navigate(-1); });
    document.getElementById('next-btn').addEventListener('click', function() { navigate(1); });
    document.getElementById('hamburger').addEventListener('click', toggleSidebar);
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    });
    window.addEventListener('hashchange', onHashChange);
  }

  function onHashChange() {
    var hash = location.hash.replace('#', '');
    if (!hash) return;
    var idx = CODE.articles.findIndex(function(a) { return a.id === hash || a.numText === decodeURIComponent(hash); });
    if (idx >= 0) showArticle(idx);
  }

  function renderToc() {
    var nav = document.getElementById('toc');
    var html = '';
    var lastGroup = null;
    CODE.articles.forEach(function(art, i) {
      if (art.group && art.group !== lastGroup) {
        html += '<div class="group-label">' + esc(art.group) + '</div>';
        lastGroup = art.group;
      }
      html += '<div class="art-link" data-idx="' + i + '" onclick="goTo(' + i + ')">' +
        '<span class="art-num">' + esc(art.numText) + '</span>' +
        '<span class="art-heading-mini">' + esc(art.heading || '') + '</span>' +
        '</div>';
    });
    nav.innerHTML = html;
  }

  function showArticle(idx) {
    if (idx < 0 || idx >= CODE.articles.length) return;
    currentIdx = idx;
    var art = CODE.articles[idx];

    // Update URL hash
    history.replaceState(null, '', '#' + encodeURIComponent(art.numText));

    // Update header title
    document.getElementById('header-article').textContent = art.numText + (art.heading ? ' – ' + art.heading : '');

    // Render article
    var notesSection = art.notesHtml
      ? '<div class="article-notes">' +
        '<button class="notes-toggle" onclick="toggleNotes(this)">Aggiornamenti e note</button>' +
        '<div class="notes-body"><div class="article-body">' + art.notesHtml + '</div></div>' +
        '</div>'
      : '';

    document.getElementById('article-view').innerHTML =
      '<div class="article-card">' +
        '<div class="article-badge">📖 ' + esc(CODE.shortTitle) + '</div>' +
        '<h1 class="article-num">' + esc(art.numText) + '</h1>' +
        (art.heading ? '<p class="article-heading">' + esc(art.heading) + '</p>' : '<div style="margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)"></div>') +
        '<div class="article-body">' + art.contentHtml + '</div>' +
        notesSection +
        '<div class="article-actions">' +
          '<button class="action-btn wa-btn" onclick="shareWhatsApp()" title="Invia su WhatsApp">' +
            '<span class="action-icon">📲</span> WhatsApp' +
          '</button>' +
          '<button class="action-btn" onclick="copyArticle()" title="Copia articolo">' +
            '<span class="action-icon">📋</span> Copia' +
          '</button>' +
        '</div>' +
      '</div>';

    // Update counter
    document.getElementById('article-counter').textContent = (idx + 1) + ' / ' + CODE.articles.length;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === CODE.articles.length - 1;

    // Highlight active in TOC
    document.querySelectorAll('.art-link').forEach(function(el) { el.classList.remove('active'); });
    var activeEl = document.querySelector('.art-link[data-idx="' + idx + '"]');
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // Scroll main to top
    document.getElementById('main').scrollTop = 0;
    window.scrollTo(0, 0);
  }

  window.goTo = function(idx) { showArticle(idx); closeSidebar(); };

  function navigate(dir) {
    var pos = filteredIndices.indexOf(currentIdx);
    if (pos === -1) pos = 0;
    var newPos = pos + dir;
    if (newPos >= 0 && newPos < filteredIndices.length) {
      showArticle(filteredIndices[newPos]);
    }
  }

  function onSearch(e) {
    var q = e.target.value.toLowerCase().trim();
    filteredIndices = [];
    document.querySelectorAll('.art-link').forEach(function(el) {
      var idx = parseInt(el.dataset.idx, 10);
      var art = CODE.articles[idx];
      var hidden = q && !art._searchText.includes(q);
      el.classList.toggle('hidden', hidden);
      if (!hidden) filteredIndices.push(idx);
    });
    if (!q) filteredIndices = CODE.articles.map(function(_, i) { return i; });
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
  window.toggleNotes = function(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  };

  function getArticleText(art, bold) {
    var body = (art.contentHtml || '').replace(/<\/p>\s*<p>/gi, '\n').replace(/<[^>]+>/g, '').replace(/[ \t]+/g, ' ').trim();
    var heading = art.numText;
    if (art.heading) heading += ' – ' + art.heading;
    if (bold) heading = '*' + heading + '*';
    return CODE.title + '\n' + heading + '\n' + body;
  }

  window.shareWhatsApp = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, true);
    var url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  };

  window.copyArticle = function() {
    var art = CODE.articles[currentIdx];
    var text = getArticleText(art, false);
    navigator.clipboard.writeText(text).then(function() {
      showToast('Articolo copiato negli appunti');
    }, function() {
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Articolo copiato negli appunti');
    });
  };

  function showToast(msg) {
    var el = document.getElementById('copy-toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(function() { el.classList.remove('visible'); }, 2000);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
