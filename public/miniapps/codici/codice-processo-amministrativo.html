esidente puo' disporre la prestazione di una cauzione, anche mediante fideiussione, cui subordinare la concessione della misura cautelare. Il provvedimento di accoglimento perde comunque effetto ove entro quindici giorni dalla sua emanazione non venga notificato il ricorso con la domanda cautelare ed esso non sia depositato nei successivi cinque giorni corredato da istanza di fissazione di udienza; in ogni caso la misura concessa ai sensi del presente articolo perde effetto con il decorso di sessanta giorni dalla sua emissione, dopo di che restano efficaci le sole misure cautelari che siano confermate o disposte in corso di causa. Il provvedimento di accoglimento non e' appellabile ma, fino a quando conserva efficacia, e' sempre revocabile o modificabile su istanza di parte previamente notificata. A quest'ultima si applica il comma 2.</p><p>6. Per l'attuazione del provvedimento cautelare e per la pronuncia in ordine alle spese si applicano le disposizioni sui provvedimenti cautelari in corso di causa.</p><p>7. Le disposizioni del presente articolo non si applicano ai giudizi in grado di appello.</p>","notesHtml":""},{"id":"art_62","numText":"Art. 62","group":"Allegato 1 — Codice del processo amministrativo","heading":"Appello cautelare","contentHtml":"<p>1. Contro le ordinanze cautelari e' ammesso appello al Consiglio di Stato, da proporre nel termine di trenta giorni dalla notificazione dell'ordinanza, ovvero di sessanta giorni dalla sua pubblicazione.</p><p>2. L'appello, depositato nel termine di cui all'articolo 45, e' deciso in camera di consiglio con ordinanza. Al giudizio si applicano gli articoli 55, comma 2 e commi da 5 a 10, 56 e 57.</p><p>3. L'ordinanza di accoglimento che dispone misure cautelari e' trasmessa a cura della segreteria al primo giudice, anche agli effetti dell'articolo 55, comma 11. ((4. Nel giudizio di cui al presente articolo e' rilevata anche d'ufficio la violazione, in primo grado, degli articoli 10, comma 2, 13, 14, 15, comma 2, 42, comma 4, e 55, comma 13. Se rileva la violazione degli articoli 13, 14, 15, comma 2, 42, comma 4 e 55, comma 13, il giudice competente per l'appello cautelare sottopone la questione al contraddittorio delle parti ai sensi dell'articolo 73, comma 3, e regola d'ufficio la competenza ai sensi dell'articolo 16, comma 3. Quando dichiara l'incompetenza del tribunale amministrativo regionale adito, con la stessa ordinanza annulla le misure cautelari emanate da un giudice diverso da quello di cui all'articolo 15, comma 6. Per la definizione della fase cautelare si applica l'articolo 15, comma 8.))</p>","notesHtml":""},{"id":"art_63","numText":"Art. 63","group":"Allegato 1 — Codice del processo amministrativo","heading":"Mezzi di prova","contentHtml":"<p>1. Fermo restando l'onere della prova a loro carico, il giudice puo' chiedere alle parti anche d'ufficio chiarimenti o documenti.</p><p>2. Il giudice, anche d'ufficio, puo' ordinare anche a terzi di esibire in giudizio i documenti o quanto altro ritenga necessario, secondo il disposto degli articoli 210 e seguenti del codice di procedura civile; puo' altresi' disporre l'ispezione ai sensi dell'articolo 118 dello stesso codice.</p><p>3. Su istanza di parte il giudice puo' ammettere la prova testimoniale, che e' sempre assunta in forma scritta ai sensi del codice di procedura civile.</p><p>4. Qualora reputi necessario l'accertamento di fatti o l'acquisizione di valutazioni che richiedono particolari competenze tecniche, il giudice puo' ordinare l'esecuzione di una verificazione ovvero, se indispensabile, puo' disporre una consulenza tecnica.</p><p>5. Il giudice puo' disporre anche l'assunzione degli altri mezzi di prova previsti dal codice di procedura civile, esclusi l'interrogatorio formale e il giuramento.</p>","notesHtml":""},{"id":"art_64","numText":"Art. 64","group":"Allegato 1 — Codice del processo amministrativo","heading":"Disponibilita', onere e valutazione della prova","contentHtml":"<p>1. Spetta alle parti l'onere di fornire gli elementi di prova che siano nella loro disponibilita' riguardanti i fatti posti a fondamento delle domande e delle eccezioni.</p><p>2. Salvi i casi previsti dalla legge, il giudice deve porre a fondamento della decisione le prove proposte dalle parti nonche' i fatti non specificatamente contestati dalle parti costituite.</p><p>3. Il giudice amministrativo puo' disporre, anche d'ufficio, l'acquisizione di informazioni e documenti utili ai fini del decidere che siano nella disponibilita' della pubblica amministrazione.</p><p>4. Il giudice deve valutare le prove secondo il suo prudente apprezzamento e puo' desumere argomenti di prova dal comportamento tenuto dalle parti nel corso del processo.</p>","notesHtml":""},{"id":"art_65","numText":"Art. 65","group":"Allegato 1 — Codice del processo amministrativo","heading":"Istruttoria presidenziale e collegiale","contentHtml":"<p>1. Il presidente della sezione o un magistrato da lui delegato adotta, su istanza motivata di parte, i provvedimenti necessari per assicurare la completezza dell'istruttoria.</p><p>2. Quando l'istruttoria e' disposta dal collegio, questo provvede con ordinanza con la quale e' contestualmente fissata la data della successiva udienza di trattazione del ricorso. La decisione sulla consulenza tecnica e sulla verificazione e' sempre adottata dal collegio.</p><p>3. Ove l'amministrazione non provveda al deposito del provvedimento impugnato e degli altri atti ai sensi dell'articolo 46, il presidente o un magistrato da lui delegato ovvero il collegio ordina, anche su istanza di parte, l'esibizione degli atti e dei documenti nel termine e nei modi opportuni.</p>","notesHtml":""},{"id":"art_66","numText":"Art. 66","group":"Allegato 1 — Codice del processo amministrativo","heading":"Verificazione","contentHtml":"<p>1. Il collegio, quando dispone la verificazione, con ordinanza individua l'organismo che deve provvedervi, formula i quesiti e fissa un termine per il suo compimento e per il deposito della relazione conclusiva. Il capo dell'organismo verificatore, o il suo delegato se il giudice ha autorizzato la delega, e' responsabile del compimento di tutte le operazioni.</p><p>2. L'ordinanza e' comunicata dalla segreteria all'organismo verificatore.</p><p>3. Con l'ordinanza di cui al comma 1 il collegio puo' disporre che venga corrisposto all'organismo verificatore, o al suo delegato, un anticipo sul compenso.</p><p>4. Terminata la verificazione, su istanza dell'organismo o del suo delegato, il presidente liquida con decreto il compenso complessivamente spettante al verificatore, ponendolo provvisoriamente a carico di una delle parti. Si applicano le tariffe stabilite dalle disposizioni in materia di spese di giustizia, ovvero, se inferiori, quelle eventualmente stabilite per i servizi resi dall'organismo verificatore. Con la sentenza che definisce il giudizio il Collegio regola definitivamente il relativo onere.</p>","notesHtml":""},{"id":"art_67","numText":"Art. 67","group":"Allegato 1 — Codice del processo amministrativo","heading":"Consulenza tecnica d'ufficio","contentHtml":"<p>1. Con l'ordinanza con cui dispone la consulenza tecnica d'ufficio, il collegio nomina il consulente, formula i quesiti e fissa il termine entro cui il consulente incaricato deve comparire dinanzi al magistrato a tal fine delegato per assumere l'incarico e prestare giuramento ai sensi del comma 4. L'ordinanza e' comunicata al consulente tecnico a cura della segreteria.</p><p>2. Le eventuali istanze di astensione e ricusazione del consulente sono proposte, a pena di decadenza, entro il termine di cui al comma 1 (( . . . )) .</p><p>3. Il collegio, con la stessa ordinanza di cui al comma 1, assegna termini successivi, prorogabili ai sensi dell'articolo 154 del codice di procedura civile, per: a) la corresponsione al consulente tecnico di un anticipo sul suo compenso; b) l'eventuale nomina, con dichiarazione ricevuta dal segretario, di consulenti tecnici delle parti, i quali, oltre a poter assistere alle operazioni del consulente del giudice e a interloquire con questo, possono partecipare all'udienza e alla camera di consiglio ogni volta che e' presente il consulente del giudice per chiarire e svolgere, con l'autorizzazione del presidente, le loro osservazioni sui risultati delle indagini tecniche; c) la trasmissione, ad opera del consulente tecnico d'ufficio, di uno schema della propria relazione alle parti ovvero, se nominati, ai loro consulenti tecnici; d) la trasmissione al consulente tecnico d'ufficio delle eventuali osservazioni e conclusioni dei consulenti tecnici di parte; e) il deposito in segreteria della relazione finale, in cui il consulente tecnico d'ufficio da' altresi' conto delle osservazioni e delle conclusioni dei consulenti di parte e prende specificamente posizione su di esse.</p><p>4. Il giuramento del consulente e' reso davanti al magistrato a tal fine delegato, secondo le modalita' stabilite dall'articolo 193 del codice di procedura civile.</p><p>5. Il compenso complessivamente spettante al consulente d'ufficio e' liquidato, al termine delle operazioni, ai sensi dell'articolo 66, comma 4, primo e terzo periodo.</p>","notesHtml":""},{"id":"art_68","numText":"Art. 68","group":"Allegato 1 — Codice del processo amministrativo","heading":"Termini e modalita' dell'istruttoria","contentHtml":"<p>1. Il presidente o il magistrato delegato, ovvero il collegio, nell'ammettere i mezzi istruttori stabiliscono i termini da osservare e ne determinano il luogo e il modo dell'assunzione applicando, in quanto compatibili, le disposizioni del codice di procedura civile.</p><p>2. Per l'assunzione fuori udienza dei mezzi di prova e' delegato uno dei componenti del collegio, il quale procede con l'assistenza del segretario che redige i relativi verbali. Il segretario comunica alle parti almeno cinque giorni prima il giorno, l'ora e il luogo delle operazioni.</p><p>3. Se il mezzo istruttorio deve essere eseguito fuori dal territorio della Repubblica, la richiesta e' formulata mediante rogatoria o per delega al console competente, ai sensi dell'articolo 204 del codice di procedura civile.</p><p>4. Il segretario comunica alle parti l'avviso che l'istruttoria disposta e' stata eseguita e che i relativi atti sono presso la segreteria a loro disposizione.</p>","notesHtml":""},{"id":"art_69","numText":"Art. 69","group":"Allegato 1 — Codice del processo amministrativo","heading":"Surrogazione del giudice delegato all'istruttoria","contentHtml":"<p>1. La surrogazione del magistrato delegato o la nomina di altro magistrato che debba sostituirlo in qualche atto relativo all'esecuzione della prova e' disposta con provvedimento del presidente, ancorche' la delega abbia avuto luogo con ordinanza collegiale.</p>","notesHtml":""},{"id":"art_70","numText":"Art. 70","group":"Allegato 1 — Codice del processo amministrativo","heading":"Riunione dei ricorsi","contentHtml":"<p>1. Il collegio puo', su istanza di parte o d'ufficio, disporre la riunione di ricorsi connessi.</p>","notesHtml":""},{"id":"art_71","numText":"Art. 71","group":"Allegato 1 — Codice del processo amministrativo","heading":"Fissazione dell'udienza","contentHtml":"<p>1. La fissazione dell'udienza di discussione deve essere chiesta da una delle parti con apposita istanza, non revocabile, da presentare entro il termine massimo di un anno dal deposito del ricorso o dalla cancellazione della causa dal ruolo.</p><p>2. La parte puo' segnalare l'urgenza del ricorso depositando istanza di prelievo.</p><p>3. Il presidente, decorso il termine per la costituzione delle altre parti, fissa l'udienza per la discussione del ricorso.</p><p>4. La pendenza del termine di cui all'articolo 15, comma 2, e la proposizione del regolamento di competenza non precludono la fissazione dell'udienza di discussione ne' la decisione del ricorso, anche ai sensi degli articoli 60 e 74, salvo che nel termine di cui all'articolo 73, comma 1, la parte interessata depositi l'istanza di regolamento di competenza notificata ai sensi dello stesso articolo 15, comma 2. In tal caso, il giudice puo' differire la decisione fino alla decisione del regolamento di competenza.</p><p>5. Il decreto di fissazione e' comunicato a cura dell'ufficio di segreteria, almeno sessanta giorni prima dell'udienza fissata, sia al ricorrente che alle parti costituite in giudizio. Tale termine e' ridotto a quarantacinque giorni, su accordo delle parti, se l'udienza di merito e' fissata a seguito di rinuncia alla definizione autonoma della domanda cautelare.</p><p>6. Il presidente designa il relatore almeno trenta giorni prima della data di udienza.</p>","notesHtml":""},{"id":"art_71-bis","numText":"Art. 71-bis","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Effetti dell'istanza di prelievo). )) ((1. A seguito dell'istanza di cui al comma 2 dell'articolo 71, il giudice, accertata la completezza del contraddittorio e dell'istruttoria, sentite sul punto le parti costituite, puo' definire, in camera di consiglio, il giudizio con sentenza in forma semplificata)) .</p>","notesHtml":""},{"id":"art_72","numText":"Art. 72","group":"Allegato 1 — Codice del processo amministrativo","heading":"Priorita' nella trattazione dei ricorsi vertenti su un'unica questione","contentHtml":"<p>1. Se al fine della decisione della controversia occorre risolvere una singola questione di diritto, anche a seguito di rinuncia a tutti i motivi o eccezioni, e se le parti concordano sui fatti di causa, il presidente fissa con priorita' l'udienza di discussione.</p><p>2. Il collegio, se rileva l'insussistenza dei presupposti di cui al comma 1, dispone con ordinanza che la trattazione della causa prosegua con le modalita' ordinarie.</p>","notesHtml":""},{"id":"art_72-bis","numText":"Art. 72-bis","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Decisione dei ricorsi suscettibili di immediata definizione). )) ((1. Il presidente, quando i ricorsi siano suscettibili di immediata definizione, anche a seguito della segnalazione dell'ufficio per il processo, fissa la trattazione alla prima camera di consiglio successiva al ventesimo giorno dal perfezionamento, anche per il destinatario, dell'ultima notificazione e, altresi', al decimo giorno dal deposito del ricorso. Le parti possono depositare memorie e documenti fino a due giorni liberi prima della camera di consiglio. Salvi eccezionali motivi, non e' possibile chiedere il rinvio della trattazione della causa. Se e' concesso il rinvio, la trattazione del ricorso e' fissata alla prima camera di consiglio utile successiva.</p><p>2. Se e' possibile definire la causa in rito, in mancanza di eccezioni delle parti, il collegio sottopone la relativa questione alle parti presenti. Nei casi di particolare complessita' della questione sollevata, il collegio, con ordinanza, assegna un termine non superiore a venti giorni per il deposito di memorie. La causa e' decisa alla scadenza del termine, senza che sia necessario convocare un'ulteriore camera di consiglio. Se la causa non e' definibile in rito, il collegio con ordinanza fissa la data dell'udienza pubblica. In ogni caso la decisione e' adottata con sentenza in forma semplificata)) .</p>","notesHtml":""},{"id":"art_73","numText":"Art. 73","group":"Allegato 1 — Codice del processo amministrativo","heading":"Udienza di discussione","contentHtml":"<p>1. Le parti possono produrre documenti fino a quaranta giorni liberi prima dell'udienza, memorie fino a trenta giorni liberi e presentare repliche, ai nuovi documenti e alle nuove memorie depositate in vista dell'udienza, fino a venti giorni liberi.</p><p>1-bis. Non e' possibile disporre, ((...)) su istanza di parte, la cancellazione della causa dal ruolo. Il rinvio della trattazione della causa e' disposto solo per casi eccezionali, che sono riportati nel verbale di udienza, ovvero, se il rinvio e' disposto fuori udienza, nel decreto presidenziale che dispone il rinvio.</p><p>2. Nell'udienza le parti possono discutere sinteticamente.</p><p>3. Se ritiene di porre a fondamento della sua decisione una questione rilevata d'ufficio, il giudice la indica in udienza dandone atto a verbale. Se la questione emerge dopo il passaggio in decisione, il giudice riserva quest'ultima e con ordinanza assegna alle parti un termine non superiore a trenta giorni per il deposito di memorie.</p>","notesHtml":""},{"id":"art_74","numText":"Art. 74","group":"Allegato 1 — Codice del processo amministrativo","heading":"Sentenze in forma semplificata","contentHtml":"<p>1. Nel caso in cui ravvisi la manifesta fondatezza ovvero la manifesta irricevibilita', inammissibilita', improcedibilita' o infondatezza del ricorso, il giudice decide con sentenza in forma semplificata. La motivazione della sentenza puo' consistere in un sintetico riferimento al punto di fatto o di diritto ritenuto risolutivo ovvero, se del caso, ad un precedente conforme.</p>","notesHtml":""},{"id":"art_75","numText":"Art. 75","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deliberazione del collegio","contentHtml":"<p>1. Il collegio, dopo la discussione, decide la causa.</p><p>2. La decisione puo' essere differita a una delle successive camere di consiglio.</p>","notesHtml":""},{"id":"art_76","numText":"Art. 76","group":"Allegato 1 — Codice del processo amministrativo","heading":"Modalita' della votazione","contentHtml":"<p>1. Possono essere presenti in camera di consiglio i magistrati designati per l'udienza.</p><p>2. La decisione e' assunta in camera di consiglio con il voto dei soli componenti del collegio.</p><p>3. Il presidente raccoglie i voti. La decisione e' presa a maggioranza di voti. Il primo a votare e' il relatore, poi il secondo componente del collegio e, infine, il presidente. Nei giudizi davanti al Consiglio di Stato il primo a votare e' il relatore, poi il meno anziano in ordine di ruolo, e cosi' continuando sino al presidente.</p><p>4. Si applicano l'articolo 276, secondo, quarto e quinto comma, del codice di procedura civile e ((l'articolo)) 118, quarto comma, delle disposizioni per l'attuazione del codice di procedura civile.</p>","notesHtml":""},{"id":"art_77","numText":"Art. 77","group":"Allegato 1 — Codice del processo amministrativo","heading":"Querela di falso","contentHtml":"<p>1. Chi deduce la falsita' di un documento deve provare che sia stata gia' proposta la querela di falso o domandare la fissazione di un termine entro cui possa proporla innanzi al tribunale ordinario competente.</p><p>2. Qualora la controversia possa essere decisa indipendentemente dal documento del quale e' dedotta la falsita', il collegio pronuncia sulla controversia.</p><p>3. La prova dell'avvenuta proposizione della querela di falso e' depositata agli atti di causa entro trenta giorni dalla scadenza del termine fissato ai sensi del comma 1. In difetto il presidente fissa l'udienza di discussione.</p><p>4. Proposta la querela, il collegio sospende la decisione fino alla definizione del giudizio di falso.</p>","notesHtml":""},{"id":"art_78","numText":"Art. 78","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deposito della sentenza resa sulla querela di falso","contentHtml":"<p>1. Definito il giudizio di falso, la parte che ha dedotto la falsita' deposita copia autentica della sentenza in segreteria.</p><p>2. Il ricorso e' dichiarato estinto se nessuna parte deposita la copia della sentenza nel termine di novanta giorni dal suo passaggio in giudicato.</p>","notesHtml":""},{"id":"art_79","numText":"Art. 79","group":"Allegato 1 — Codice del processo amministrativo","heading":"Sospensione e interruzione del processo","contentHtml":"<p>1. La sospensione del processo e' disciplinata dal codice di procedura civile, dalle altre leggi e dal diritto dell'Unione europea.</p><p>2. L'interruzione del processo e' disciplinata dalle disposizioni del codice di procedura civile. ((L'interruzione del processo e' immediatamente dichiarata dal presidente con decreto; il decreto e' comunicato alle parti costituite a cura della segreteria)) .</p><p>3. Le ordinanze di sospensione emesse ai sensi dell'articolo 295 del codice di procedura civile sono appellabili. L'appello e' deciso in camera di consiglio.</p>","notesHtml":""},{"id":"art_80","numText":"Art. 80","group":"Allegato 1 — Codice del processo amministrativo","heading":"Prosecuzione o riassunzione del processo sospeso o interrotto","contentHtml":"<p>1. In caso di sospensione del giudizio, per la sua prosecuzione deve essere presentata istanza di fissazione di udienza entro novanta giorni dalla comunicazione dell'atto che fa venir meno la causa della sospensione.</p><p>2. Il processo interrotto prosegue se la parte nei cui confronti si e' verificato l'evento interruttivo presenta nuova istanza di fissazione di udienza.</p><p>3. Se non avviene la prosecuzione ai sensi del comma 2, il processo deve essere riassunto, a cura della parte piu' diligente, con apposito atto notificato a tutte le altre parti, nel termine perentorio di novanta giorni dalla conoscenza legale dell'evento interruttivo, acquisita mediante dichiarazione, notificazione o certificazione. ((3-bis. In tutti i casi di sospensione e interruzione del giudizio il presidente puo' disporre istruttoria per accertare la persistenza delle ragioni che le hanno determinate e l'udienza e' fissata d'ufficio trascorsi tre mesi dalla cessazione di tali ragioni)) .</p>","notesHtml":""},{"id":"art_81","numText":"Art. 81","group":"Allegato 1 — Codice del processo amministrativo","heading":"Perenzione","contentHtml":"<p>1. Il ricorso si considera perento se nel corso di un anno non sia compiuto alcun atto di procedura. Il termine non decorre dalla presentazione dell'istanza di cui all'articolo 71, comma 1, e finche' non si sia provveduto su di essa, salvo quanto previsto dall'articolo 82.</p>","notesHtml":""},{"id":"art_82","numText":"Art. 82","group":"Allegato 1 — Codice del processo amministrativo","heading":"Perenzione dei ricorsi ultraquinquennali","contentHtml":"<p>1. Dopo il decorso di cinque anni dalla data di deposito del ricorso, la segreteria comunica alle parti costituite apposito avviso in virtu' del quale e' fatto onere al ricorrente di presentare nuova istanza di fissazione di udienza, sottoscritta dalla parte che ha rilasciato la procura di cui all'articolo 24 e dal suo difensore, entro ((centoventi)) giorni dalla data di ricezione dell'avviso. In difetto di tale nuova istanza, il ricorso e' dichiarato perento.</p><p>2. Se, in assenza dell'avviso di cui al comma 1, e' comunicato alle parti l'avviso di fissazione dell'udienza di discussione nel merito, il ricorso e' deciso qualora il ricorrente dichiari, anche in udienza a mezzo del proprio difensore, di avere interesse alla decisione; altrimenti e' dichiarato perento dal presidente del collegio con decreto.</p>","notesHtml":""},{"id":"art_83","numText":"Art. 83","group":"Allegato 1 — Codice del processo amministrativo","heading":"Effetti della perenzione","contentHtml":"<p>1. La perenzione opera di diritto e puo' essere rilevata anche d'ufficio. Ciascuna delle parti sopporta le proprie spese nel giudizio.</p>","notesHtml":""},{"id":"art_84","numText":"Art. 84","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rinuncia","contentHtml":"<p>1. La parte puo' rinunciare al ricorso in ogni stato e grado della controversia, mediante dichiarazione sottoscritta da essa stessa o dall'avvocato munito di mandato speciale e depositata presso la segreteria, o mediante dichiarazione resa in udienza e documentata nel relativo verbale.</p><p>2. Il rinunciante deve pagare le spese degli atti di procedura compiuti, salvo che il collegio, avuto riguardo a ogni circostanza, ritenga di compensarle.</p><p>3. La rinuncia deve essere notificata alle altre parti almeno dieci giorni prima dell'udienza. Se le parti che hanno interesse alla prosecuzione non si oppongono, il processo si estingue.</p><p>4. Anche in assenza delle formalita' di cui ai commi precedenti il giudice puo' desumere dall'intervento di fatti o atti univoci dopo la proposizione del ricorso ed altresi' dal comportamento delle parti argomenti di prova della sopravvenuta carenza d'interesse alla decisione della causa.</p>","notesHtml":""},{"id":"art_85","numText":"Art. 85","group":"Allegato 1 — Codice del processo amministrativo","heading":"Forma e rito per l'estinzione e per l'improcedibilita'","contentHtml":"<p>1. L'estinzione e l'improcedibilita' di cui all'articolo 35 possono essere pronunciate con decreto dal presidente o da un magistrato da lui delegato.</p><p>2. Il decreto e' depositato in segreteria, che ne da' comunicazione alle parti costituite.</p><p>3. Nel termine di sessanta giorni dalla comunicazione ciascuna delle parti costituite puo' proporre opposizione al collegio, con atto notificato a tutte le altre parti.</p><p>4. Il giudizio di opposizione si svolge ai sensi dell'articolo 87, comma 3, ed e' deciso con ordinanza che, in caso di accoglimento dell'opposizione, fissa l'udienza di merito.</p><p>5. In caso di rigetto, le spese sono poste a carico dell'opponente e vengono liquidate dal collegio nella stessa ordinanza, esclusa la possibilita' di compensazione anche parziale.</p><p>6. L'ordinanza e' depositata in segreteria, che ne da' comunicazione alle parti costituite.</p><p>7. Avverso l'ordinanza che decide sull'opposizione puo' essere proposto appello. ((8. Il giudizio di appello si svolge secondo le disposizioni di cui all'articolo 87, comma 3.))</p><p>9. L'estinzione e l'improcedibilita' sono dichiarate con sentenza se si verificano, o vengono accertate, all'udienza di discussione.</p>","notesHtml":""},{"id":"art_86","numText":"Art. 86","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procedimento di correzione","contentHtml":"<p>1. Ove occorra correggere omissioni o errori materiali, la domanda per la correzione deve essere proposta al giudice che ha emesso il provvedimento, il quale, se vi e' il consenso delle parti, dispone con decreto, in camera di consiglio, la correzione.</p><p>2. In caso di dissenso delle parti, sulla domanda di correzione pronuncia il collegio con ordinanza in camera di consiglio.</p><p>3. La correzione si effettua a margine o in calce al provvedimento originale, con indicazione del decreto o dell'ordinanza che l'ha disposta.</p>","notesHtml":""},{"id":"art_87","numText":"Art. 87","group":"Allegato 1 — Codice del processo amministrativo","heading":"Udienze pubbliche e procedimenti in camera di consiglio","contentHtml":"<p>1. Le udienze sono pubbliche a pena di nullita', salvo quanto previsto dal comma 2 , ma il presidente del collegio puo' disporre che si svolgano a porte chiuse, se ricorrono ragioni di sicurezza dello Stato, di ordine pubblico o di buon costume. (29)</p><p>2. Oltre agli altri casi espressamente previsti, si trattano in camera di consiglio: a) i giudizi cautelari e quelli relativi all'esecuzione delle misure cautelari collegiali; b) il giudizio in materia di silenzio; c) il giudizio in materia di accesso ai documenti amministrativi e di violazione degli obblighi di trasparenza amministrativa; d) i giudizi di ottemperanza; e) i giudizi in opposizione ai decreti che pronunciano l'estinzione o l'improcedibilita' del giudizio.</p><p>3. Nei giudizi di cui al comma 2, con esclusione dell'ipotesi di cui alla lettera a) e fatto salvo quanto disposto dall'articolo 116, comma 1, tutti i termini processuali sono dimezzati rispetto a quelli del processo ordinario, tranne, nei giudizi di primo grado, quelli per la notificazione del ricorso introduttivo, del ricorso incidentale e dei motivi aggiunti. La camera di consiglio e' fissata d'ufficio alla prima udienza utile successiva al trentesimo giorno decorrente dalla scadenza del termine di costituzione delle parti intimate. Nella camera di consiglio sono sentiti i difensori che ne fanno richiesta.</p><p>4. La trattazione in pubblica udienza non costituisce motivo di nullita' della decisione. ((4-bis. Le udienze straordinarie dedicate allo smaltimento dell'arretrato sono svolte in camera di consiglio da remoto. Non si applica il comma 3, fatta eccezione per l'ultimo periodo)) .</p>","notesHtml":"<p>-----------</p><p>AGGIORNAMENTO (29)</p><p>L'aggiornamento in calce, precedentemente disposto dall'art. 3, comma 6 del D.L. 8 marzo 2020, n. 11 e' stato eliminato; la modifica ha perso efficacia per effetto dell'abrogazione del D.L. medesimo ad opera della L. 24 aprile 2020, n. 27, la quale ne ha contestualmente fatti salvi gli effetti.</p>"},{"id":"art_88","numText":"Art. 88","group":"Allegato 1 — Codice del processo amministrativo","heading":"Contenuto della sentenza","contentHtml":"<p>1. La sentenza e' pronunciata in nome del popolo italiano e reca l'intestazione &lt;Repubblica italiana&gt; .</p><p>2. Essa deve contenere: a) l'indicazione del giudice adito e del collegio che l'ha pronunciata; b) l'indicazione delle parti e dei loro avvocati; c) le domande; d) la concisa esposizione dei motivi in fatto e in diritto della decisione, anche con rinvio a precedenti cui intende conformarsi; e) il dispositivo, ivi compresa la pronuncia sulle spese; f) l'ordine che la decisione sia eseguita dall'autorita' amministrativa; g) l'indicazione del giorno, mese, anno e luogo in cui la decisione e' pronunciata; h) la sottoscrizione del presidente e dell'estensore.</p><p>3. Si applica l'articolo 118, comma 3, delle disposizioni per l'attuazione del codice di procedura civile.</p><p>4. Se il presidente non puo' sottoscrivere per morte o altro impedimento, la sentenza e' sottoscritta dal componente piu' anziano del collegio, purche' prima della sottoscrizione sia menzionato l'impedimento; se l'estensore non puo' sottoscrivere la sentenza per morte o altro impedimento, e' sufficiente la sottoscrizione del solo presidente, purche' prima della sottoscrizione sia menzionato l'impedimento.</p>","notesHtml":""},{"id":"art_89","numText":"Art. 89","group":"Allegato 1 — Codice del processo amministrativo","heading":"Pubblicazione e comunicazione della sentenza","contentHtml":"<p>1. La sentenza deve essere redatta non oltre il quarantacinquesimo giorno da quello della decisione della causa.</p><p>2. La sentenza, che non puo' piu' essere modificata dopo la sua sottoscrizione, e' immediatamente resa pubblica mediante deposito nella segreteria del giudice che l'ha pronunciata.</p><p>3. Il segretario da' atto del deposito in calce alla sentenza, vi appone la data e la firma ed entro cinque giorni ne da' comunicazione alle parti costituite.</p>","notesHtml":""},{"id":"art_90","numText":"Art. 90","group":"Allegato 1 — Codice del processo amministrativo","heading":"Pubblicita' della sentenza","contentHtml":"<p>1. Qualora la pubblicita' della sentenza possa contribuire a riparare il danno, compreso quello derivante per effetto di quanto previsto all'articolo 96 del codice di procedura civile, il giudice, su istanza di parte, puo' ordinarla a cura e spese del soccombente, mediante inserzione per estratto, ovvero mediante comunicazione, nelle forme specificamente indicate, in una o piu' testate giornalistiche, radiofoniche o televisive e in siti internet da lui designati. Se l'inserzione non avviene nel termine stabilito dal giudice, puo' procedervi la parte a favore della quale e' stata disposta, con diritto a ripetere le spese dall'obbligato.</p>","notesHtml":""},{"id":"art_91","numText":"Art. 91","group":"Allegato 1 — Codice del processo amministrativo","heading":"Mezzi di impugnazione","contentHtml":"<p>1. I mezzi di impugnazione delle sentenze sono l'appello, la revocazione, l'opposizione di terzo e il ricorso per cassazione per i soli motivi inerenti alla giurisdizione.</p>","notesHtml":""},{"id":"art_92","numText":"Art. 92","group":"Allegato 1 — Codice del processo amministrativo","heading":"Termini per le impugnazioni","contentHtml":"<p>1. Salvo quanto diversamente previsto da speciali disposizioni di legge, le impugnazioni si propongono con ricorso e devono essere notificate entro il termine perentorio di sessanta giorni decorrenti dalla notificazione della sentenza.</p><p>2. Per i casi di revocazione previsti nei numeri 1, 2, 3 e 6 del primo comma dell'articolo 395 del codice di procedura civile e di opposizione di terzo di cui all'articolo 108, comma 2, il termine di cui al comma 1 decorre dal giorno in cui e' stato scoperto il dolo o la falsita' o la collusione o e' stato recuperato il documento o e' passata in giudicato la sentenza di cui al numero 6 del medesimo articolo 395.</p><p>3. In difetto della notificazione della sentenza, l'appello, la revocazione di cui ai numeri 4 e 5 dell'articolo 395 del codice di procedura civile e il ricorso per cassazione devono essere notificati entro sei mesi dalla pubblicazione della sentenza.</p><p>4. La disposizione di cui al comma 3 non si applica quando la parte che non si e' costituita in giudizio dimostri di non aver avuto conoscenza del processo a causa della nullita' del ricorso o della sua notificazione.</p><p>5. Fermo quanto previsto dall'articolo 16, comma 3, l'ordinanza cautelare che, in modo implicito o esplicito, ha deciso anche sulla competenza e' appellabile ai sensi dell'articolo 62. Non costituiscono decisione implicita sulla competenza le ordinanze istruttorie o interlocutorie di cui all'articolo 36, comma 1, ne' quelle che disattendono l'istanza cautelare senza riferimento espresso alla questione di competenza. La sentenza che, in modo implicito o esplicito, ha pronunciato sulla competenza insieme col merito e' appellabile nei modi ordinari e nei termini di cui ai commi 1, 3 e 4.</p>","notesHtml":""},{"id":"art_93","numText":"Art. 93","group":"Allegato 1 — Codice del processo amministrativo","heading":"Luogo di notificazione dell'impugnazione","contentHtml":"<p>1. L'impugnazione deve essere notificata nella residenza dichiarata o nel domicilio eletto dalla parte nell'atto di notificazione della sentenza o, in difetto, presso il difensore o nella residenza dichiarata o nel domicilio eletto per il giudizio e risultante dalla sentenza.</p><p>2. Qualora la notificazione abbia avuto esito negativo perche' il domiciliatario si e' trasferito senza notificare una formale comunicazione alle altre parti, la parte che intende proporre l'impugnazione puo' presentare al presidente del tribunale amministrativo regionale o al presidente del Consiglio di Stato, secondo il giudice adito con l'impugnazione, un'istanza, corredata dall'attestazione dell'omessa notificazione, per la fissazione di un termine perentorio per il completamento della notificazione o per la rinnovazione dell'impugnazione.</p>","notesHtml":""},{"id":"art_94","numText":"Art. 94","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deposito delle impugnazioni","contentHtml":"<p>1. Nei giudizi di appello, di revocazione e di opposizione di terzo il ricorso deve essere depositato nella segreteria del giudice adito, a pena di decadenza, entro trenta giorni dall'ultima notificazione ai sensi dell'articolo 45, unitamente ad una copia della sentenza impugnata e alla prova delle eseguite notificazioni.</p>","notesHtml":""},{"id":"art_95","numText":"Art. 95","group":"Allegato 1 — Codice del processo amministrativo","heading":"Parti del giudizio di impugnazione","contentHtml":"<p>1. ((L'impugnazione della sentenza pronunciata in causa inscindibile o in cause tra loro dipendenti e' notificata)) a tutte le parti in causa e, negli altri casi, alle parti che hanno interesse a contraddire.</p><p>2. L'impugnazione deve essere notificata a pena di inammissibilita' nei termini previsti dall'articolo 92 ad almeno una delle parti interessate a contraddire.</p><p>3. Se la sentenza non e' stata impugnata nei confronti di tutte le parti di cui al comma 1, il giudice ordina l'integrazione del contraddittorio, fissando il termine entro cui la notificazione deve essere eseguita, nonche' la successiva udienza di trattazione.</p><p>4. L'impugnazione e' dichiarata improcedibile se nessuna delle parti provvede all'integrazione del contraddittorio nel termine fissato dal giudice.</p><p>5. Il Consiglio di Stato, se riconosce che l'impugnazione e' manifestamente irricevibile, inammissibile, improcedibile o infondata, puo' non ordinare l'integrazione del contraddittorio, quando l'impugnazione di altre parti e' preclusa o esclusa.</p><p>6. Ai giudizi di impugnazione non si applica l'articolo 23, comma 1.</p>","notesHtml":""},{"id":"art_96","numText":"Art. 96","group":"Allegato 1 — Codice del processo amministrativo","heading":"Impugnazioni avverso la medesima sentenza","contentHtml":"<p>1. Tutte le impugnazioni proposte separatamente contro la stessa sentenza devono essere riunite in un solo processo.</p><p>2. Possono essere proposte impugnazioni incidentali, ai sensi degli articoli 333 e 334 del codice di procedura civile.</p><p>3. L'impugnazione incidentale di cui all'articolo 333 del codice di procedura civile puo' essere rivolta contro qualsiasi capo di sentenza e deve essere proposta dalla parte entro sessanta giorni dalla notificazione della sentenza o, se anteriore, entro sessanta giorni dalla prima notificazione nei suoi confronti di altra impugnazione.</p><p>4. Con l'impugnazione incidentale proposta ai sensi dell'articolo 334 del codice di procedura civile possono essere impugnati anche capi autonomi della sentenza; tuttavia, se l'impugnazione principale e' dichiarata inammissibile, l'impugnazione incidentale perde ogni efficacia.</p><p>5. L'impugnazione incidentale di cui all'articolo 334 del codice di procedura civile deve essere proposta dalla parte entro sessanta giorni dalla data in cui si e' perfezionata nei suoi confronti la notificazione dell'impugnazione principale e depositata, unitamente alla prova dell'avvenuta notificazione, ((nel termine di cui all'articolo 45)) .</p><p>6. In caso di mancata riunione di piu' impugnazioni ritualmente proposte contro la stessa sentenza, la decisione di una delle impugnazioni non determina l'improcedibilita' delle altre.</p>","notesHtml":""},{"id":"art_97","numText":"Art. 97","group":"Allegato 1 — Codice del processo amministrativo","heading":"Intervento nel giudizio di impugnazione","contentHtml":"<p>1. Puo' intervenire nel giudizio di impugnazione, con atto notificato a tutte le parti, chi vi ha interesse.</p>","notesHtml":""},{"id":"art_98","numText":"Art. 98","group":"Allegato 1 — Codice del processo amministrativo","heading":"Misure cautelari","contentHtml":"<p>1. Salvo quanto disposto dall'articolo 111, il giudice dell'impugnazione puo', su istanza di parte, valutati i motivi proposti e qualora dall'esecuzione possa derivare un pregiudizio grave e irreparabile, disporre la sospensione dell'esecutivita' della sentenza impugnata, nonche' le altre opportune misure cautelari, con ordinanza pronunciata in camera di consiglio. ((2. Il procedimento si svolge secondo le disposizioni del libro II, titolo II, in quanto applicabili.))</p>","notesHtml":""},{"id":"art_99","numText":"Art. 99","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deferimento all'adunanza plenaria","contentHtml":"<p>1. La sezione cui e' assegnato il ricorso, se rileva che il punto di diritto sottoposto al suo esame ha dato luogo o possa dare luogo a contrasti giurisprudenziali, con ordinanza emanata su richiesta delle parti o d'ufficio puo' rimettere il ricorso all'esame dell'adunanza plenaria. ((L'adunanza plenaria, qualora ne ravvisi l'opportunita', puo' restituire gli atti alla sezione.))</p><p>2. Prima della decisione, il presidente del Consiglio di Stato, su richiesta delle parti o d'ufficio, puo' deferire all'adunanza plenaria qualunque ricorso, per risolvere questioni di massima di particolare importanza ovvero per dirimere contrasti giurisprudenziali.</p><p>3. Se la sezione cui e' assegnato il ricorso ritiene di non condividere un principio di diritto enunciato dall'adunanza plenaria, rimette a quest'ultima, con ordinanza motivata, la decisione del ricorso.</p><p>4. L'adunanza plenaria decide l'intera controversia, salvo che ritenga di enunciare il principio di diritto e di restituire per il resto il giudizio alla sezione remittente.</p><p>5. Se ritiene che la questione e' di particolare importanza, l'adunanza plenaria puo' comunque enunciare il principio di diritto nell'interesse della legge anche quando dichiara il ricorso irricevibile, inammissibile o improcedibile, ovvero l'estinzione del giudizio. In tali casi, la pronuncia dell'adunanza plenaria non ha effetto sul provvedimento impugnato.</p>","notesHtml":""},{"id":"art_100","numText":"Art. 100","group":"Allegato 1 — Codice del processo amministrativo","heading":"Appellabilita' delle sentenze dei tribunali amministrativi regionali","contentHtml":"<p>1. Avverso le sentenze dei tribunali amministrativi regionali e' ammesso appello al Consiglio di Stato, ferma restando la competenza del Consiglio di giustizia amministrativa per la Regione siciliana per gli appelli proposti contro le sentenze del Tribunale amministrativo regionale per la Sicilia.</p>","notesHtml":""},{"id":"art_101","numText":"Art. 101","group":"Allegato 1 — Codice del processo amministrativo","heading":"Contenuto del ricorso in appello","contentHtml":"<p>1. Il ricorso in appello deve contenere l'indicazione del ricorrente, del difensore, delle parti nei confronti delle quali e' proposta l'impugnazione, della sentenza che si impugna, nonche' l'esposizione sommaria dei fatti, le specifiche censure contro i capi della sentenza gravata, le conclusioni, la sottoscrizione del ricorrente se sta in giudizio personalmente ((ai sensi dell'articolo 22, comma 3,)) oppure del difensore con indicazione, in questo caso, della procura speciale rilasciata anche unitamente a quella per il giudizio di primo grado.</p><p>2. Si intendono rinunciate le domande e le eccezioni dichiarate assorbite o non esaminate nella sentenza di primo grado, che non siano state espressamente riproposte nell'atto di appello o, per le parti diverse dall'appellante, con memoria depositata a pena di decadenza entro il termine per la costituzione in giudizio.</p>","notesHtml":""},{"id":"art_102","numText":"Art. 102","group":"Allegato 1 — Codice del processo amministrativo","heading":"Legittimazione a proporre l'appello","contentHtml":"<p>1. Possono proporre appello le parti fra le quali e' stata pronunciata la sentenza di primo grado.</p><p>2. L'interventore puo' proporre appello soltanto se titolare di una posizione giuridica autonoma.</p>","notesHtml":""},{"id":"art_103","numText":"Art. 103","group":"Allegato 1 — Codice del processo amministrativo","heading":"Riserva facoltativa di appello","contentHtml":"<p>1. Contro le sentenze non definitive e' proponibile l'appello ovvero la riserva di appello, con atto notificato entro il termine per l'appello e depositato nei successivi trenta giorni presso la segreteria del tribunale amministrativo regionale.</p>","notesHtml":""},{"id":"art_104","numText":"Art. 104","group":"Allegato 1 — Codice del processo amministrativo","heading":"Nuove domande ed eccezioni","contentHtml":"<p>1. Nel giudizio di appello non possono essere proposte nuove domande, fermo quanto previsto dall'articolo 34, comma 3, ne' nuove eccezioni non rilevabili d'ufficio. Possono tuttavia essere chiesti gli interessi e gli accessori maturati dopo la sentenza impugnata, nonche' il risarcimento dei danni subiti dopo la sentenza stessa.</p><p>2. Non sono ammessi nuovi mezzi di prova e non possono essere prodotti nuovi documenti, salvo che il collegio li ritenga indispensabili ai fini della decisione della causa, ovvero che la parte dimostri di non aver potuto proporli o produrli nel giudizio di primo grado per causa ad essa non imputabile.</p><p>3. Possono essere proposti motivi aggiunti qualora la parte venga a conoscenza di documenti non prodotti dalle altre parti nel giudizio di primo grado da cui emergano vizi degli atti o provvedimenti amministrativi impugnati.</p>","notesHtml":""},{"id":"art_105","numText":"Art. 105","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rimessione al primo giudice","contentHtml":"<p>1. Il Consiglio di Stato rimette la causa al giudice di primo grado soltanto se e' mancato il contraddittorio, oppure e' stato leso il diritto di difesa di una delle parti, ovvero dichiara la nullita' della sentenza, o riforma la sentenza ((o l'ordinanza)) che ha declinato la giurisdizione o ha pronunciato sulla competenza o ha dichiarato l'estinzione o la perenzione del giudizio.</p><p>2. Nei giudizi di appello contro i provvedimenti dei tribunali amministrativi regionali che hanno declinato la giurisdizione o la competenza si segue il procedimento in camera di consiglio, di cui all'articolo 87, comma 3. ((3. Le parti devono riassumere il processo con ricorso notificato nel termine perentorio di novanta giorni dalla notificazione o, se anteriore, dalla comunicazione della sentenza o dell'ordinanza.))</p>","notesHtml":""},{"id":"art_106","numText":"Art. 106","group":"Allegato 1 — Codice del processo amministrativo","heading":"Casi di revocazione","contentHtml":"<p>1. Salvo quanto previsto dal comma 3, le sentenze dei tribunali amministrativi regionali e del Consiglio di Stato sono impugnabili per revocazione, nei casi e nei modi previsti dagli articoli 395 e 396 del codice di procedura civile.</p><p>2. La revocazione e' proponibile con ricorso dinanzi allo stesso giudice che ha pronunciato la sentenza impugnata.</p><p>3. Contro le sentenze dei tribunali amministrativi regionali la revocazione e' ammessa se i motivi non possono essere dedotti con l'appello.</p>","notesHtml":""},{"id":"art_107","numText":"Art. 107","group":"Allegato 1 — Codice del processo amministrativo","heading":"Impugnazione della sentenza emessa nel giudizio di revocazione","contentHtml":"<p>1. Contro la sentenza emessa nel giudizio di revocazione sono ammessi i mezzi di impugnazione ai quali era originariamente soggetta la sentenza impugnata per revocazione.</p><p>2. La sentenza emessa nel giudizio di revocazione non puo' essere impugnata per revocazione.</p>","notesHtml":""},{"id":"art_108","numText":"Art. 108","group":"Allegato 1 — Codice del processo amministrativo","heading":"Casi di opposizione di terzo","contentHtml":"<p>1. Un terzo (( . . . )) puo' fare opposizione contro una sentenza del tribunale amministrativo regionale o del Consiglio di Stato pronunciata tra altri soggetti, ancorche' passata in giudicato, quando pregiudica i suoi diritti o interessi legittimi.</p><p>2. Gli aventi causa e i creditori di una delle parti possono fare opposizione alla sentenza, quando questa sia effetto di dolo o collusione a loro danno.</p>","notesHtml":""},{"id":"art_109","numText":"Art. 109","group":"Allegato 1 — Codice del processo amministrativo","heading":"Competenza","contentHtml":"<p>1. L'opposizione di terzo e' proposta davanti al giudice che ha pronunciato la sentenza impugnata, salvo il caso di cui al comma 2.</p><p>2. Se e' proposto appello contro la sentenza di primo grado, il terzo deve introdurre la domanda di cui all'articolo 108 intervenendo nel giudizio di appello. Se l'opposizione di terzo e' gia' stata proposta al giudice di primo grado, questo la dichiara improcedibile e, se l'opponente non vi ha ancora provveduto, fissa un termine per l'intervento nel giudizio di appello, ai sensi del periodo precedente.</p>","notesHtml":""},{"id":"art_110","numText":"Art. 110","group":"Allegato 1 — Codice del processo amministrativo","heading":"Motivi di ricorso","contentHtml":"<p>1. Il ricorso per cassazione e' ammesso contro le sentenze del Consiglio di Stato per i soli motivi inerenti alla giurisdizione.</p>","notesHtml":""},{"id":"art_111","numText":"Art. 111","group":"Allegato 1 — Codice del processo amministrativo","heading":"Sospensione della sentenza","contentHtml":"<p>1. Il Consiglio di Stato, se richiesto con istanza previamente notificata alle altre parti, in caso di eccezionale gravita' ed urgenza, puo' sospendere gli effetti della sentenza impugnata e disporre le altre opportune misure cautelari. Al procedimento si applicano gli articoli 55, commi 2, 5, 6 e 7, e 56, commi 1, primo periodo, 2, 3, 4 e 5. ((Copia dell'ordinanza e' trasmessa alla cancelleria della Corte di cassazione.))</p>","notesHtml":""},{"id":"art_112","numText":"Art. 112","group":"Allegato 1 — Codice del processo amministrativo","heading":"Disposizioni generali sul giudizio di ottemperanza","contentHtml":"<p>1. I provvedimenti del giudice amministrativo devono essere eseguiti dalla pubblica amministrazione e dalle altre parti.</p><p>2. L'azione di ottemperanza puo' essere proposta per conseguire l'attuazione: a) delle sentenze del giudice amministrativo passate in giudicato; b) delle sentenze esecutive e degli altri provvedimenti esecutivi del giudice amministrativo; c) delle sentenze passate in giudicato e degli altri provvedimenti ad esse equiparati del giudice ordinario, al fine di ottenere l'adempimento dell'obbligo della pubblica amministrazione di conformarsi, per quanto riguarda il caso deciso, al giudicato; d) delle sentenze passate in giudicato e degli altri provvedimenti ad esse equiparati per i quali non sia previsto il rimedio dell'ottemperanza, al fine di ottenere l'adempimento dell'obbligo della pubblica amministrazione di conformarsi alla decisione; e) dei lodi arbitrali esecutivi divenuti inoppugnabili al fine di ottenere l'adempimento dell'obbligo della pubblica amministrazione di conformarsi, per quanto riguarda il caso deciso, al giudicato. ((3. Puo' essere proposta, anche in unico grado dinanzi al giudice dell'ottemperanza, azione di condanna al pagamento di somme a titolo di rivalutazione e interessi maturati dopo il passaggio in giudicato della sentenza, nonche' azione di risarcimento dei danni connessi all'impossibilita' o comunque alla mancata esecuzione in forma specifica, totale o parziale, del giudicato o alla sua violazione o elusione.))</p><p>4. ((COMMA SOPPRESSO DAL D.LGS. 15 NOVEMBRE 2011, N. 195)) .</p><p>5. Il ricorso di cui al presente articolo puo' essere proposto anche al fine di ottenere chiarimenti in ordine alle modalita' di ottemperanza.</p>","notesHtml":""},{"id":"art_113","numText":"Art. 113","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giudice dell'ottemperanza","contentHtml":"<p>1. Il ricorso si propone, nel caso di cui all'articolo 112, comma 2, lettere a) e b), al giudice che ha emesso il provvedimento della cui ottemperanza si tratta; la competenza e' del tribunale amministrativo regionale anche per i suoi provvedimenti confermati in appello con motivazione che abbia lo stesso contenuto dispositivo e conformativo dei provvedimenti di primo grado.</p><p>2. Nei casi di cui all'articolo 112, comma 2, lettere c), d) ed e), il ricorso si propone al tribunale amministrativo regionale nella cui circoscrizione ha sede il giudice che ha emesso la sentenza di cui e' chiesta l'ottemperanza.</p>","notesHtml":""},{"id":"art_114","numText":"Art. 114","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procedimento","contentHtml":"<p>1. L'azione si propone, anche senza previa diffida, con ricorso notificato alla pubblica amministrazione e a tutte le altre parti del giudizio definito dalla sentenza o dal lodo della cui ottemperanza si tratta; l'azione si prescrive con il decorso di dieci anni dal passaggio in giudicato della sentenza.</p><p>2. Unitamente al ricorso e' depositato in copia autentica il provvedimento di cui si chiede l'ottemperanza, con l'eventuale prova del suo passaggio in giudicato.</p><p>3. Il giudice decide con sentenza in forma semplificata.</p><p>4. Il giudice, in caso di accoglimento del ricorso: a) ordina l'ottemperanza, prescrivendo le relative modalita', anche mediante la determinazione del contenuto del provvedimento amministrativo o l'emanazione dello stesso in luogo dell'amministrazione; b) dichiara nulli gli eventuali atti in violazione o elusione del giudicato; c) nel caso di ottemperanza di sentenze non passate in giudicato o di altri provvedimenti, determina le modalita' esecutive, considerando inefficaci gli atti emessi in violazione o elusione e provvede di conseguenza, tenendo conto degli effetti che ne derivano; d) nomina, ove occorra, un commissario ad acta; e) salvo che cio' sia manifestamente iniquo, e se non sussistono altre ragioni ostative, fissa, su richiesta di parte, la somma di denaro dovuta dal resistente per ogni violazione o inosservanza successiva, ovvero per ogni ritardo nell'esecuzione del giudicato; tale statuizione costituisce titolo esecutivo ((. Nei giudizi di ottemperanza aventi ad oggetto il pagamento di somme di denaro, la penalita' di mora di cui al primo periodo decorre dal giorno della comunicazione o notificazione dell'ordine di pagamento disposto nella sentenza di ottemperanza; detta penalita' non puo' considerarsi manifestamente iniqua quando e' stabilita in misura pari agli interessi legali)) .</p><p>5. Se e' chiesta l'esecuzione di un'ordinanza il giudice provvede con ordinanza.</p><p>6. Il giudice conosce di tutte le questioni relative all'ottemperanza, nonche', tra le parti nei cui confronti si e' formato il giudicato, di quelle inerenti agli atti del commissario ad acta. Avverso gli atti del commissario ad acta le stesse parti possono proporre, dinanzi al giudice dell'ottemperanza, reclamo, che e' depositato, previa notifica ai controinteressati, nel termine di sessanta giorni. Gli atti emanati dal giudice dell'ottemperanza o dal suo ausiliario sono impugnabili dai terzi estranei al giudicato ai sensi dell'articolo 29, con il rito ordinario.</p><p>7. Nel caso di ricorso ai sensi del comma 5 dell'articolo 112, il giudice fornisce chiarimenti in ordine alle modalita' di ottemperanza, anche su richiesta del commissario.</p><p>8. Le disposizioni di cui al presente Titolo si applicano anche alle impugnazioni avverso i provvedimenti giurisdizionali adottati dal giudice dell'ottemperanza.</p><p>9. I termini per la proposizione delle impugnazioni sono quelli previsti nel Libro III.</p>","notesHtml":""},{"id":"art_115","numText":"Art. 115","group":"Allegato 1 — Codice del processo amministrativo","heading":"Iscrizione di ipoteca (44) (45","contentHtml":"<p>1. ((COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197)) .</p><p>2. I provvedimenti emessi dal giudice amministrativo che dispongono il pagamento di somme di denaro costituiscono titolo anche per l'esecuzione nelle forme disciplinate dal Libro III del codice di procedura civile e per l'iscrizione di ipoteca.</p><p>3. ((COMMA ABROGATO DAL D.LGS. 10 OTTOBRE 2022, N. 149, COME MODIFICATO DALLA L. 29 DICEMBRE 2022, N. 197)) .</p>","notesHtml":"<p>---------------</p><p>AGGIORNAMENTO (44)</p><p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che \"Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.</p><p>Ai procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti\".</p><p>---------------</p><p>AGGIORNAMENTO (45)</p><p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che \"Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti\".</p>"},{"id":"art_116","numText":"Art. 116","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rito in materia di accesso ai documenti amministrativi","contentHtml":"<p>1. Contro le determinazioni e contro il silenzio sulle istanze di accesso ai documenti amministrativi ((, nonche' per la tutela del diritto di accesso civico connessa all'inadempimento degli obblighi di trasparenza)) il ricorso e' proposto entro trenta giorni dalla conoscenza della determinazione impugnata o dalla formazione del silenzio, mediante notificazione all'amministrazione e ad almeno un controinteressato. Si applica l'articolo 49. Il termine per la proposizione di ricorsi incidentali o motivi aggiunti e' di trenta giorni.</p><p>2. In pendenza di un giudizio cui la richiesta di accesso e' connessa, il ricorso di cui al comma 1 puo' essere proposto con istanza depositata presso la segreteria della sezione cui e' assegnato il ricorso principale, previa notificazione all'amministrazione e agli eventuali controinteressati. L'istanza e' decisa con ordinanza separatamente dal giudizio principale, ovvero con la sentenza che definisce il giudizio.</p><p>3. L'amministrazione puo' essere rappresentata e difesa da un proprio dipendente a cio' autorizzato.</p><p>4. Il giudice decide con sentenza in forma semplificata; sussistendone i presupposti, ordina l'esibizione ((e, ove previsto, la pubblicazione)) dei documenti richiesti, entro un termine non superiore, di norma, a trenta giorni, dettando, ove occorra, le relative modalita'.</p><p>5. Le disposizioni di cui al presente articolo si applicano anche ai giudizi di impugnazione.</p>","notesHtml":""},{"id":"art_117","numText":"Art. 117","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ricorsi avverso il silenzio","contentHtml":"<p>1. Il ricorso avverso il silenzio e' proposto, anche senza previa diffida, con atto notificato all'amministrazione e ad almeno un controinteressato nel termine di cui all'articolo 31, comma 2.</p><p>2. Il ricorso e' deciso con sentenza in forma semplificata e in caso di totale o parziale accoglimento il giudice ordina all'amministrazione di provvedere entro un termine non superiore, di norma, a trenta giorni.</p><p>3. Il giudice nomina, ove occorra, un commissario ad acta con la sentenza con cui definisce il giudizio o successivamente su istanza della parte interessata.</p><p>4. Il giudice conosce di tutte le questioni relative all'esatta adozione del provvedimento richiesto, ivi comprese quelle inerenti agli atti del commissario.</p><p>5. Se nel corso del giudizio sopravviene il provvedimento espresso, o un atto connesso con l'oggetto della controversia, questo puo' essere impugnato anche con motivi aggiunti, nei termini e con il rito previsto per il nuovo provvedimento, e l'intero giudizio prosegue con tale rito.</p><p>6. Se l'azione di risarcimento del danno ai sensi dell'articolo 30, comma 4, e' proposta congiuntamente a quella di cui al presente articolo, il giudice puo' definire con il rito camerale l'azione avverso il silenzio e trattare con il rito ordinario la domanda risarcitoria.</p><p>6-bis. Le disposizioni di cui ai commi 2, 3, 4 e 6, si applicano anche ai giudizi di impugnazione. ((10))</p>","notesHtml":"<p>---------------</p><p>AGGIORNAMENTO (10)</p><p>Il D.L. 21 giugno 2013, n. 69 ha disposto (con l'art. 28, comma 4) che \"Nel giudizio di cui all'articolo 117, puo' proporsi, congiuntamente al ricorso avverso il silenzio, domanda per ottenere l'indennizzo. In tal caso, anche tale domanda e' trattata con rito camerale e decisa con sentenza in forma semplificata\".</p><p>Ha inoltre disposto (con l'art. 28, comma 10) che \"Le disposizioni del presente articolo si applicano, in via sperimentale e dalla data di entrata in vigore della legge di conversione del presente decreto, ai procedimenti amministrativi relativi all'avvio e all'esercizio dell'attivita' di impresa iniziati successivamente al detta data di entrata in vigore\".</p>"},{"id":"art_118","numText":"Art. 118","group":"Allegato 1 — Codice del processo amministrativo","heading":"Decreto ingiuntivo","contentHtml":"<p>1. Nelle controversie devolute alla giurisdizione esclusiva del giudice amministrativo, aventi ad oggetto diritti soggettivi di natura patrimoniale, si applica il Capo I del Titolo I del Libro IV del codice di procedura civile. Per l'ingiunzione e' competente il presidente o un magistrato da lui delegato. L'opposizione si propone con ricorso.</p>","notesHtml":""},{"id":"art_119","numText":"Art. 119","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rito abbreviato comune a determinate materie","contentHtml":"<p>1. Le disposizioni di cui al presente articolo si applicano nei giudizi aventi ad oggetto le controversie relative a: a) i provvedimenti concernenti le procedure di affidamento di pubblici lavori, servizi e forniture nonche' i provvedimenti di ammissione ed esclusione dalle competizioni professionistiche delle societa' o associazioni sportive professionistiche, o comunque incidenti sulla partecipazione a competizioni professionistiche, salvo quanto previsto dagli articoli 120 e seguenti; (26) b) i provvedimenti adottati dalle Autorita' amministrative indipendenti, con esclusione di quelli relativi al rapporto di servizio con i propri dipendenti; b-bis) ((i provvedimenti adottati dall'Agenzia per la cybersicurezza nazionale)) ; c) i provvedimenti relativi alle procedure di privatizzazione o di dismissione di imprese o beni pubblici, nonche' quelli relativi alla costituzione, modificazione o soppressione di societa', aziende e istituzioni da parte degli enti locali; c-bis) i provvedimenti adottati nell'esercizio dei poteri speciali inerenti alle attivita' di rilevanza strategica nei settori della difesa e della sicurezza nazionale e nei settori dell'energia, dei trasporti e delle comunicazioni; d) i provvedimenti di nomina, adottati previa delibera del Consiglio dei ministri; e) i provvedimenti di scioglimento degli organi di governo degli enti locali e quelli connessi, che riguardano la loro formazione e il loro funzionamento; f) i provvedimenti relativi alle procedure di occupazione e di espropriazione delle aree destinate all'esecuzione di opere pubbliche o di pubblica utilita' e i provvedimenti di espropriazione delle invenzioni adottati ai sensi del codice della proprieta' industriale; g) i provvedimenti del Comitato olimpico nazionale italiano o delle Federazioni sportive; h) le ordinanze adottate in tutte le situazioni di emergenza dichiarate ai sensi dell'articolo 5, comma 1, della legge 24 febbraio 1992, n. 225, e i consequenziali provvedimenti commissariali; (24) i) il rapporto di lavoro del personale dei servizi di informazione per la sicurezza, ai sensi dell'articolo 22, della legge 3 agosto 2007, n. 124; l) le controversie comunque attinenti alle procedure e ai provvedimenti della pubblica amministrazione in materia di impianti di generazione di energia elettrica di cui al decreto legge 7 febbraio 2002, n. 7, convertito, con modificazioni, dalla legge 9 aprile 2002, n. 55, comprese quelle concernenti la produzione di energia elettrica da fonte nucleare, i rigassificatori, i gasdotti di importazione, le centrali termoelettriche di potenza termica superiore a 400 MW nonche' quelle relative ad infrastrutture di trasporto ricomprese o da ricomprendere nella rete di trasmissione nazionale o rete nazionale di gasdotti; m) i provvedimenti della commissione centrale per la definizione e applicazione delle speciali misure di protezione, recanti applicazione, modifica e revoca delle speciali misure di protezione nei confronti dei collaboratori e testimoni di giustizia; m-bis) le controversie aventi per oggetto i provvedimenti dell' Agenzia nazionale di regolamentazione del settore postale di cui alla lettera h) del comma 2 dell'articolo 37 della legge 4 giugno 2010, n. 96, compresi quelli sanzionatori ed esclusi quelli inerenti ai rapporti di impiego; m-ter) i provvedimenti dell'Agenzia nazionale per la regolazione e la vigilanza in materia di acqua istituita dall'articolo 10, comma 11, del decreto-legge 13 maggio 2011, n. 70, convertito, con modificazioni, dalla legge 12 luglio 2011, n. 106; m-quater) le azioni individuali e collettive avverso le discriminazioni di genere in ambito lavorativo, previste dall'articolo 36 e seguenti del decreto legislativo 25 luglio 2006, n. 198, quando rientrano, ai sensi del citato decreto, nella giurisdizione del giudice amministrativo; m-quinquies) gli atti e i provvedimenti adottati in esecuzione di una decisione di recupero di cui all'articolo 16 del regolamento (UE) 2015/1589 del Consiglio, del 13 luglio 2015. (20) m-sexies) i provvedimenti di espulsione dello straniero adottati dal Ministro dell'interno ai sensi degli articoli 9, comma 10, primo periodo, e 13, comma 1, del decreto legislativo 25 luglio 1998, n. 286, e quelli adottati ai sensi dell'articolo 3 del decreto-legge 27 luglio 2005, n. 144, convertito, con modificazioni, dalla legge 31 luglio 2005, n. 155. m-septies) l'autorizzazione unica di cui agli articoli 52-bis e seguenti del testo unico di cui al decreto del Presidente della Repubblica 8 giugno 2001, n. 327, per le infrastrutture lineari energetiche, quali i gasdotti, gli elettrodotti, gli oleodotti e le reti di trasporto di fluidi termici, ivi inclusi le opere, gli impianti e i servizi accessori connessi o funzionali all'esercizio degli stessi, i gasdotti e gli oleodotti necessari per la coltivazione e lo stoccaggio degli idrocarburi, nonche' rispetto agli atti riferiti a tali infrastrutture inerenti alla valutazione ambientale strategica, alla verifica di assoggettabilita' e alla valutazione di impatto ambientale e a tutti i provvedimenti, di competenza statale o regionale, indicati dall'articolo 27 del decreto legislativo 3 aprile 2006, n. 152, nonche' agli atti che definiscono l'intesa Stato-regione. m-octies) i provvedimenti che si assumono lesivi di diritti sindacali del singolo militare o dell'associazione professionale a carattere sindacale tra militari che lo rappresenta; m-novies) i provvedimenti relativi alle procedure di risanamento e risoluzione delle controparti centrali di cui al regolamento (UE) 2021/23.</p><p>2. Tutti i termini processuali ordinari sono dimezzati salvo, nei giudizi di primo grado, quelli per la notificazione del ricorso introduttivo, del ricorso incidentale e dei motivi aggiunti, nonche' quelli di cui all'articolo 62, comma 1, e quelli espressamente disciplinati nel presente articolo.</p><p>3. Salva l'applicazione dell'articolo 60, il tribunale amministrativo regionale chiamato a pronunciare sulla domanda cautelare, accertata la completezza del contraddittorio ovvero disposta l'integrazione dello stesso, se ritiene, a un primo sommario esame, la sussistenza di profili di fondatezza del ricorso e di un pregiudizio grave e irreparabile, fissa con ordinanza la data di discussione del merito alla prima udienza successiva alla scadenza del termine di trenta giorni dalla data di deposito dell'ordinanza, disponendo altresi' il deposito dei documenti necessari e l'acquisizione delle eventuali altre prove occorrenti. In caso di rigetto dell'istanza cautelare da parte del tribunale amministrativo regionale, ove il Consiglio di Stato riformi l'ordinanza di primo grado, la pronuncia di appello e' trasmessa al tribunale amministrativo regionale per la fissazione dell'udienza di merito. In tale ipotesi, il termine di trenta giorni decorre dalla data di ricevimento dell'ordinanza da parte della segreteria del tribunale amministrativo regionale, che ne da' avviso alle parti.</p><p>4. Con l'ordinanza di cui al comma 3, in caso di estrema gravita' ed urgenza, il tribunale amministrativo regionale o il Consiglio di Stato possono disporre le opportune misure cautelari. Al procedimento cautelare si applicano le disposizioni del Titolo II del Libro II, in quanto non derogate dal presente articolo.</p><p>5. Quando almeno una delle parti, nell'udienza discussione, dichiara di avere interesse alla pubblicazione anticipata del dispositivo rispetto alla sentenza, il dispositivo e' pubblicato mediante deposito in segreteria, non oltre sette giorni dalla decisione della causa. La dichiarazione della parte e' attestata nel verbale d'udienza.</p><p>6. La parte puo' chiedere al Consiglio di Stato la sospensione dell'esecutivita' del dispositivo, proponendo appello entro trenta giorni dalla relativa pubblicazione, con riserva dei motivi da proporre entro trenta giorni dalla notificazione della sentenza ovvero entro tre mesi dalla sua pubblicazione. La mancata richiesta di sospensione dell'esecutivita' del dispositivo non preclude la possibilita' di chiedere la sospensione dell'esecutivita' della sentenza dopo la pubblicazione dei motivi.</p><p>7. Le disposizioni del presente articolo si applicano anche nei giudizi di appello, revocazione e opposizione di terzo.</p>","notesHtml":"<p>---------------</p><p>AGGIORNAMENTO (20)</p><p>La L. 7 luglio 2016, n. 122, nel modificare l'art. 49, comma 1 della L. 24 dicembre 2012, n. 234, ha conseguentemente disposto (con l'art. 35, comma 4) che la presente modifica si applica alle decisioni di recupero notificate a decorrere dal 1° gennaio 2015.</p><p>---------------</p><p>AGGIORNAMENTO (24)</p><p>Il D.Lgs. 2 gennaio 2018, n. 1 ha disposto (con l'art. 47, comma 1, lettera i)) che \"Tutti i riferimenti alla legge 24 febbraio 1992, n. 225 e ai relativi articoli, contenuti in altre disposizioni, si intendono riferiti al presente decreto e ai corrispondenti articoli.</p><p>In particolare:</p><p>[...]</p><p>i) l'articolo 5 della legge n. 225 del 1992, citato negli articoli 119, comma 1, 133, comma 1, e nell'articolo 135, comma 1, del decreto legislativo 2 luglio 2010, n. 104, deve intendersi riferito agli articoli 24, 25 e 26 del presente decreto\".</p><p>---------------</p><p>AGGIORNAMENTO (26)</p><p>La L. 30 dicembre 2018, n. 145 ha disposto (con l'art. 1, comma 650) che \"Le disposizioni di cui ai commi da 647 a 649 si applicano anche ai processi ed alle controversie in corso alla data di entrata in vigore della presente legge\".</p>"},{"id":"art_120","numText":"Art. 120","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Disposizioni specifiche ai giudizi di cui all'articolo 119, comma 1, lettera a)) )) ((1. Gli atti delle procedure di affidamento e di concessione disciplinate dal codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge 21 giugno 2022, n. 78, comprese le procedure di affidamento di incarichi e concorsi di progettazione e di attivita' tecnico-amministrative a esse connesse, i quali siano relativi a pubblici lavori, servizi o forniture, nonche' i provvedimenti dell'Autorita' nazionale anticorruzione in materia di contratti pubblici, sono impugnabili unicamente mediante ricorso al tribunale amministrativo regionale competente. In tutti gli atti di parte e in tutti i provvedimenti del giudice e' indicato il codice identificativo di gara (CIG); nel caso di mancata indicazione il giudice procede in ogni caso e anche d'ufficio, su segnalazione della segreteria, ai sensi dell'articolo 86, comma 1.</p><p>2. Per l'impugnazione degli atti di cui al presente articolo il ricorso, principale o incidentale, e i motivi aggiunti, anche avverso atti diversi da quelli gia' impugnati, sono proposti nel termine di trenta giorni. Il termine decorre, per il ricorso principale e per i motivi aggiunti, dalla ricezione della comunicazione di cui all'articolo 90 del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022 oppure dal momento in cui gli atti sono messi a disposizione ai sensi dell'articolo 36, commi 1 e 2, del medesimo codice. Per i bandi e gli avvisi con cui si indice una gara che siano autonomamente lesivi, il termine decorre dalla pubblicazione di cui agli articoli 84 e 85 del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022. Il ricorso incidentale e' disciplinato dall'articolo 42.</p><p>3. Nel caso in cui sia mancata la pubblicita' del bando, il ricorso e' comunque proposto entro trenta giorni dalla data di pubblicazione dell'avviso di aggiudicazione o della determinazione di procedere all'affidamento in house al soggetto partecipato o controllato. Per la decorrenza del termine l'avviso deve contenere la motivazione dell'atto di aggiudicazione e della scelta di affidare il contratto senza pubblicazione del bando e l'indicazione del sito dove sono visionabili gli atti e i documenti presupposti. Se sono omessi gli avvisi o le informazioni di cui al presente comma oppure se essi non sono conformi alle prescrizioni ivi indicate, il ricorso puo' essere proposto non oltre sei mesi dal giorno successivo alla data di stipulazione del contratto comunicata ai sensi del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022.</p><p>4. Se la stazione appaltante o l'ente concedente e' rappresentato dall'Avvocatura dello Stato, il ricorso e' notificato anche presso la sede dell'Amministrazione, ai soli fini della operativita' della sospensione obbligatoria del termine per la stipulazione del contratto.</p><p>5. Se le parti richiedono congiuntamente di limitare la decisione all'esame di un'unica questione, nonche' in ogni altro caso compatibilmente con le esigenze di difesa di tutte le parti in relazione alla complessita' della causa, il giudizio e' di norma definito, anche in deroga al comma 1, primo periodo, dell'articolo 74, in esito all'udienza cautelare ai sensi dell'articolo 60, ove ne ricorrano i presupposti, e, in mancanza, e' comunque definito con sentenza in forma semplificata a una udienza fissata d'ufficio, da tenersi entro quarantacinque giorni dalla scadenza del termine per la costituzione delle parti diverse dal ricorrente e nel rispetto dei termini per il deposito dei documenti e delle memorie. Della data di udienza e' dato immediato avviso alle parti a cura della segreteria, a mezzo posta elettronica certificata. In caso di esigenze istruttorie o quando e' necessario integrare il contraddittorio o assicurare il rispetto di termini a difesa, la definizione del merito e' rinviata, con l'ordinanza che dispone gli adempimenti istruttori o l'integrazione del contraddittorio o dispone il rinvio per l'esigenza di rispetto dei termini a difesa, a una udienza da tenersi non oltre trenta giorni.</p><p>6. In caso di istanza cautelare, all'esito dell'udienza in camera di consiglio e anche in caso di rigetto dell'istanza, il giudice provvede ai necessari approfondimenti istruttori.</p><p>7. I nuovi atti attinenti alla medesima procedura di gara sono impugnati con ricorso per motivi aggiunti, senza pagamento del contributo unificato.</p><p>8. Salvo quanto previsto dal presente articolo e dagli articoli da 121 a 125, si applica l'articolo 119.</p><p>9. Anche se dalla decisione sulla domanda cautelare non derivino effetti irreversibili, il collegio puo' subordinare la concessione o il diniego della misura cautelare alla prestazione, anche mediante fideiussione, di una cauzione di importo commisurato al valore dell'appalto e comunque non superiore allo 0,5 per cento di tale valore. La durata della misura subordinata alla cauzione e' indicata nell'ordinanza. Resta fermo quanto stabilito dal comma 3 dell'articolo 119.</p><p>10. Nella decisione cautelare il giudice tiene conto di quanto previsto dagli articoli 121, comma 1, e 122, e delle esigenze imperative connesse a un interesse generale all'esecuzione del contratto, dandone conto nella motivazione.</p><p>11. Il giudice deposita la sentenza con la quale definisce il giudizio entro quindici giorni dall'udienza di discussione. Quando la stesura della motivazione e' particolarmente complessa, il giudice pubblica il dispositivo nel termine di cui al primo periodo, indicando anche le domande eventualmente accolte e le misure per darvi attuazione, e comunque deposita la sentenza entro trenta giorni dall'udienza.</p><p>12. Le disposizioni dei commi 1, secondo periodo, 5, 6, 8, 9, 10 e 11 si applicano anche innanzi al Consiglio di Stato nel giudizio di appello proposto avverso la sentenza o avverso l'ordinanza cautelare, e nei giudizi di revocazione o opposizione di terzo. La parte puo' proporre appello avverso il dispositivo per ottenerne la sospensione prima della pubblicazione della sentenza.</p><p>13. Nel caso di presentazione di offerte per piu' lotti l'impugnazione si propone con ricorso cumulativo solo se sono dedotti identici motivi di ricorso avverso lo stesso atto.)) ((46))</p>","notesHtml":"<p>------------</p><p>AGGIORNAMENTO (13)</p><p>Il D.L. 24 giugno 2014, n. 90 convertito con modificazioni dalla L. 11 agosto 2014, n. 114 ha disposto (con l'art. 40, comma 2) che le presenti modifiche si applicano ai giudizi introdotti con ricorso depositato, in primo grado o in grado di appello, in data successiva alla data di entrata in vigore del suindicato decreto.</p><p>Ha inoltre disposto (con l'art. 40, comma 2-bis) che le disposizioni relative al contenimento del numero delle pagine, stabilite dal decreto del Presidente del Consiglio di Stato di cui al comma 6 del presente articolo, sono applicate in via sperimentale per due anni dalla data di entrata in vigore della legge di conversione del suindicato decreto. Al termine di un anno decorrente dalla medesima data, il Consiglio di presidenza della giustizia amministrativa effettua il monitoraggio degli esiti di tale sperimentazione.</p><p>-----------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7-bis, comma 2, alinea) che le presenti modifiche decorrono dalla data di entrata in vigore del decreto del presidente del Consiglio di Stato previsto al comma 1 dell'articolo 13-ter delle norme di attuazione, di cui all'allegato 2 al decreto legislativo 2 luglio 2010, n. 104.</p><p>--------------</p><p>AGGIORNAMENTO (27)</p><p>Il D.L. 18 aprile 2019, n. 32, convertito con modificazioni dalla L. 14 giugno 2019, n. 55, ha disposto (con l'art. 1, comma 23) che le presenti modifiche \"si applicano ai processi iniziati dopo la data di entrata in vigore della legge di conversione del presente decreto\".</p><p>--------------</p><p>AGGIORNAMENTO (46)</p><p>Il D.Lgs. 31 marzo 2023, n. 36 ha disposto (con l'art. 229, comma 2) che la presente modifica acquista efficacia il 1° luglio 2023.</p>"},{"id":"art_121","numText":"Art. 121","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(Inefficacia del contratto nei casi di gravi violazioni)</p><p>1. Il giudice che annulla l'aggiudicazione o gli affidamenti senza bando di cui al comma 2 dell'articolo 120 dichiara l'inefficacia del contratto nei seguenti casi: a) se l'aggiudicazione e' avvenuta senza pubblicazione del bando o avviso con cui si indice una gara ((...)) quando tale pubblicazione e' prescritta dal codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022; b) se l'aggiudicazione e' avvenuta con procedura negoziata senza bando o con affidamento in economia fuori dai casi consentiti e questo abbia determinato l'omissione della pubblicita' del bando o avviso con cui si indice una gara ((...)) quando tale pubblicazione e' prescritta dal codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022; c) se il contratto e' stato stipulato senza rispettare il termine dilatorio stabilito dall'articolo 18 del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022, qualora tale violazione abbia impedito al ricorrente di avvalersi di mezzi di ricorso prima della stipulazione del contratto e sempre che tale violazione, aggiungendosi a vizi propri dell'aggiudicazione, abbia influito sulle possibilita' del ricorrente di ottenere l'affidamento; d) se il contratto e' stato stipulato senza rispettare la sospensione obbligatoria del termine per la stipulazione derivante dalla proposizione del
