<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codice del processo amministrativo</title>
<meta name="description" content="Codice del processo amministrativo (D.Lgs. 2 luglio 2010, n. 104, Allegato 1).">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0066CC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root { --code-color: #c0392b; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 300px;
  --header-h: 58px;
  --sidebar-bg: #003F7F;
  --sidebar-hover: rgba(255,255,255,.12);
  --sidebar-active-bg: rgba(255,255,255,.20);
  --sidebar-text: #ffffff;
  --sidebar-muted: #d6e2f4;
  --sidebar-border: rgba(255,255,255,.18);
  --main-bg: #f7f8fc;
  --article-bg: #ffffff;
  --text: #1a1d2e;
  --muted: #6b7280;
  --border: #e4e7f0;
  --accent: var(--code-color, #2471a3);
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: "SF Mono", Consolas, "Courier New", monospace;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--main-bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── HEADER ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--sidebar-border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  z-index: 100;
}
.site-logo {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.site-logo:hover { color: #dce8ff; }
.header-sep { width: 1px; height: 28px; background: var(--sidebar-border); }
.header-title {
  font-size: .875rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.header-vigenza {
  font-size: .75rem;
  color: var(--sidebar-muted);
  white-space: nowrap;
  background: rgba(255,255,255,.06);
  padding: 3px 10px;
  border-radius: 20px;
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--sidebar-text);
  border-radius: 2px;
  transition: all .2s;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: transform .25s ease;
}
.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px;
  color: #fff;
  font-size: .82rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input::placeholder { color: var(--sidebar-muted); }
.sidebar-search input:focus { border-color: rgba(255,255,255,.3); }
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

.group-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sidebar-muted);
  padding: 14px 16px 6px;
}
.art-link {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
}
.art-link:hover { background: var(--sidebar-hover); }
.art-link.active {
  background: var(--sidebar-active-bg);
  border-left-color: var(--accent);
}
.art-link.hidden { display: none; }
.art-num {
  font-size: .78rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 56px;
  flex-shrink: 0;
}
.art-heading-mini {
  font-size: .78rem;
  color: var(--sidebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: .85;
}
.art-link.active .art-heading-mini { opacity: 1; }

/* ── MAIN CONTENT ── */
.main-content {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── ARTICLE CARD ── */
.article-card {
  background: var(--article-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 820px;
  width: 100%;
  padding: 44px 52px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.article-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: color-mix(in srgb, var(--accent) 10%, white);
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 18px;
}
.article-num {
  font-family: var(--sans);
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 6px;
}
.article-heading {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.85;
  color: var(--text);
}
.article-body p {
  margin-bottom: 1.1em;
  text-align: justify;
  hyphens: auto;
}
.article-body p:last-child { margin-bottom: 0; }
.para-num {
  font-family: var(--sans);
  font-size: .75rem;
  font-weight: 700;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, white);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  vertical-align: middle;
}
mark.ins {
  background: color-mix(in srgb, #2980b9 12%, white);
  color: #1a5276;
  border-radius: 2px;
  padding: 0 2px;
  font-style: italic;
}

/* Notes / Aggiornamento */
.article-notes {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}
.notes-toggle {
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.notes-toggle::before { content: '▶'; font-size: .6em; transition: transform .2s; }
.notes-toggle.open::before { transform: rotate(90deg); }
.notes-body {
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}
.notes-body.visible { display: block; }
.notes-body p { margin-bottom: .7em; }

/* ── NAV FOOTER ── */
.nav-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 820px;
  width: 100%;
  margin-top: 20px;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.article-counter {
  font-size: .8rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  max-width: 820px;
  width: 100%;
}
.empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }
  .hamburger { display: flex; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 20px rgba(0,0,0,.4);
  }
  .main-content {
    margin-left: 0;
    padding: 20px 12px 60px;
  }
  .article-card { padding: 28px 22px; }
  .article-num { font-size: 1.5rem; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 49;
    display: none;
  }
  .overlay.visible { display: block; }
}

/* ── ACTION BUTTONS (WA + COPY) ── */
.article-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--article-bg);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  text-decoration: none;
}
.action-btn:hover {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
}
.action-btn.wa-btn:hover {
  background: #25D366;
  border-color: #25D366;
}
.action-btn .action-icon {
  font-size: 1rem;
  line-height: 1;
}
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: .85rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  opacity: 0;
  transition: all .3s ease;
  z-index: 9999;
  pointer-events: none;
}
.copy-toast.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── SCROLLBAR ── */
* { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }

</style>
</head>
<body>

  <a href="home.html" class="site-logo">🏛️ Codici Italiani</a>

<!-- SIDEBAR -->

    <input type="search" id="search" placeholder="Cerca per articolo, titolo o testo…" autocomplete="off">

<!-- MAIN -->

</main>

<script>const CODE = {"title":"Codice del processo amministrativo","shortTitle":"CPA","slug":"codice-processo-amministrativo","vigenza":"08/10/2025","color":"#0066CC","articles":[{"id":"art_1","numText":"Art. 1","group":"Allegato 1 — Codice del processo amministrativo","heading":"Effettivita'","contentHtml":"<p>1. La giurisdizione amministrativa assicura una tutela piena ed effettiva secondo i principi della Costituzione e del diritto europeo.</p>","notesHtml":""},{"id":"art_2","numText":"Art. 2","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giusto processo","contentHtml":"<p>1. Il processo amministrativo attua i principi della parita' delle parti, del contraddittorio e del giusto processo previsto dall'articolo 111, primo comma, della Costituzione.</p><p>2. Il giudice amministrativo e le parti cooperano per la realizzazione della ragionevole durata del processo.</p>","notesHtml":""},{"id":"art_3","numText":"Art. 3","group":"Allegato 1 — Codice del processo amministrativo","heading":"Dovere di motivazione e sinteticita' degli atti","contentHtml":"<p>1. Ogni provvedimento decisorio del giudice e' motivato.</p><p>2. Il giudice e le parti redigono gli atti in maniera chiara e sintetica ((, secondo quanto disposto dalle norme di attuazione)) .</p>","notesHtml":""},{"id":"art_4","numText":"Art. 4","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giurisdizione dei giudici amministrativi","contentHtml":"<p>1. La giurisdizione amministrativa e' esercitata dai tribunali amministrativi regionali e dal Consiglio di Stato secondo le norme del presente codice.</p>","notesHtml":""},{"id":"art_5","numText":"Art. 5","group":"Allegato 1 — Codice del processo amministrativo","heading":"Tribunali amministrativi regionali","contentHtml":"<p>1. Sono organi di giurisdizione amministrativa di primo grado i tribunali amministrativi regionali e il Tribunale regionale di giustizia amministrativa per la regione autonoma del Trentino - Alto Adige.</p><p>2. Il tribunale amministrativo regionale decide con l'intervento di tre magistrati, compreso il presidente. In mancanza del presidente, il collegio e' presieduto dal magistrato con maggiore anzianita' nel ruolo.</p><p>3. Il Tribunale regionale di giustizia amministrativa per la regione autonoma del Trentino - Alto Adige resta disciplinato dallo statuto speciale e dalle relative norme di attuazione.</p>","notesHtml":""},{"id":"art_6","numText":"Art. 6","group":"Allegato 1 — Codice del processo amministrativo","heading":"Consiglio di Stato","contentHtml":"<p>1. Il Consiglio di Stato e' organo di ultimo grado della giurisdizione amministrativa.</p><p>2. Il Consiglio di Stato in sede giurisdizionale decide con l'intervento di cinque magistrati, di cui un presidente di sezione e quattro consiglieri. In caso di impedimento del presidente, il collegio e' presieduto dal consigliere piu' anziano nella qualifica.</p><p>3. Salvo quanto previsto dalle norme di attuazione richiamate al comma 6, l'adunanza plenaria e' composta dal presidente del Consiglio di Stato che la presiede e da dodici magistrati del Consiglio di Stato, assegnati alle sezioni giurisdizionali.</p><p>4. In caso di impedimento, il presidente del Consiglio di Stato e' sostituito dal presidente di sezione giurisdizionale piu' anziano nel ruolo; gli altri componenti dell'adunanza plenaria, in caso di assenza o di impedimento, sono sostituiti dal magistrato piu' anziano nella stessa qualifica della rispettiva sezione.</p><p>5. Per gli appelli avverso le pronunce della sezione autonoma di Bolzano del Tribunale regionale di giustizia amministrativa si applicano anche le disposizioni dello statuto speciale e delle relative norme di attuazione.</p><p>6. Gli appelli avverso le pronunce del Tribunale amministrativo regionale della Sicilia sono proposti al Consiglio di giustizia amministrativa per la Regione siciliana, nel rispetto delle disposizioni dello statuto speciale e delle relative norme di attuazione.</p>","notesHtml":""},{"id":"art_7","numText":"Art. 7","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giurisdizione amministrativa","contentHtml":"<p>1. Sono devolute alla giurisdizione amministrativa le controversie, nelle quali si faccia questione di interessi legittimi e, nelle particolari materie indicate dalla legge, di diritti soggettivi, concernenti l'esercizio o il mancato esercizio del potere amministrativo, riguardanti provvedimenti, atti, accordi o comportamenti riconducibili anche mediatamente all'esercizio di tale potere, posti in essere da pubbliche amministrazioni. Non sono impugnabili gli atti o provvedimenti emanati dal Governo nell'esercizio del potere politico.</p><p>2. Per pubbliche amministrazioni, ai fini del presente codice, si intendono anche i soggetti ad esse equiparati o comunque tenuti al rispetto dei principi del procedimento amministrativo.</p><p>3. La giurisdizione amministrativa si articola in giurisdizione generale di legittimita', esclusiva ed estesa al merito.</p><p>4. Sono attribuite alla giurisdizione generale di legittimita' del giudice amministrativo le controversie relative ad atti, provvedimenti o omissioni delle pubbliche amministrazioni, comprese quelle relative al risarcimento del danno per lesione di interessi legittimi e agli altri diritti patrimoniali consequenziali, pure se introdotte in via autonoma.</p><p>5. Nelle materie di giurisdizione esclusiva, indicate dalla legge e dall'articolo 133, il giudice amministrativo conosce, pure ai fini risarcitori, anche delle controversie nelle quali si faccia questione di diritti soggettivi.</p><p>6. Il giudice amministrativo esercita giurisdizione con cognizione estesa al merito nelle controversie indicate dalla legge e dall'articolo 134. Nell'esercizio di tale giurisdizione il giudice amministrativo puo' sostituirsi all'amministrazione.</p><p>7. Il principio di effettivita' e' realizzato attraverso la concentrazione davanti al giudice amministrativo di ogni forma di tutela degli interessi legittimi e, nelle particolari materie indicate dalla legge, dei diritti soggettivi.</p><p>8. Il ricorso straordinario e' ammesso unicamente per le controversie devolute alla giurisdizione amministrativa.</p>","notesHtml":""},{"id":"art_8","numText":"Art. 8","group":"Allegato 1 — Codice del processo amministrativo","heading":"Cognizione incidentale e questioni pregiudiziali","contentHtml":"<p>1. Il giudice amministrativo nelle materie in cui non ha giurisdizione esclusiva conosce, senza efficacia di giudicato, di tutte le questioni pregiudiziali o incidentali relative a diritti, la cui risoluzione sia necessaria per pronunciare sulla questione principale.</p><p>2. Restano riservate all'autorita' giudiziaria ordinaria le questioni pregiudiziali concernenti lo stato e la capacita' delle persone, salvo che si tratti della capacita' di stare in giudizio, e la risoluzione dell'incidente di falso.</p>","notesHtml":""},{"id":"art_9","numText":"Art. 9","group":"Allegato 1 — Codice del processo amministrativo","heading":"Difetto di giurisdizione","contentHtml":"<p>1. Il difetto di giurisdizione e' rilevato in primo grado anche d'ufficio. Nei giudizi di impugnazione e' rilevato se dedotto con specifico motivo avverso il capo della pronuncia impugnata che, in modo implicito o esplicito, ha statuito sulla giurisdizione.</p>","notesHtml":""},{"id":"art_10","numText":"Art. 10","group":"Allegato 1 — Codice del processo amministrativo","heading":"Regolamento preventivo di giurisdizione","contentHtml":"<p>1. Nel giudizio davanti ai tribunali amministrativi regionali e' ammesso il ricorso per regolamento preventivo di giurisdizione previsto dall'articolo 41 del codice di procedura civile. Si applica il primo comma dell'articolo 367 dello stesso codice.</p><p>2. Nel giudizio sospeso possono essere chieste misure cautelari, ma il giudice non puo' disporle se non ritiene sussistente la propria giurisdizione.</p>","notesHtml":""},{"id":"art_11","numText":"Art. 11","group":"Allegato 1 — Codice del processo amministrativo","heading":"Decisione sulle questioni di giurisdizione","contentHtml":"<p>1. Il giudice amministrativo, quando declina la propria giurisdizione, indica, se esistente, il giudice nazionale che ne e' fornito.</p><p>2. Quando la giurisdizione e' declinata dal giudice amministrativo in favore di altro giudice nazionale o viceversa, ferme restando le preclusioni e le decadenze intervenute, sono fatti salvi gli effetti processuali e sostanziali della domanda se il processo e' riproposto innanzi al giudice indicato nella pronuncia che declina la giurisdizione, entro il termine perentorio di tre mesi dal suo passaggio in giudicato.</p><p>3. Quando il giudizio e' tempestivamente riproposto davanti al giudice amministrativo, quest'ultimo, alla prima udienza, puo' sollevare anche d'ufficio il conflitto di giurisdizione.</p><p>4. Se in una controversia introdotta davanti ad altro giudice le sezioni unite della Corte di cassazione, investite della questione di giurisdizione, attribuiscono quest'ultima al giudice amministrativo, ferme restando le preclusioni e le decadenze intervenute, sono fatti salvi gli effetti processuali e sostanziali della domanda, se il giudizio e' riproposto dalla parte che vi ha interesse nel termine di tre mesi dalla pubblicazione della decisione delle sezioni unite.</p><p>5. Nei giudizi riproposti, il giudice, con riguardo alle preclusioni e decadenze intervenute, puo' concedere la rimessione in termini per errore scusabile ove ne ricorrano i presupposti.</p><p>6. Nel giudizio riproposto davanti al giudice amministrativo, le prove raccolte nel processo davanti al giudice privo di giurisdizione possono essere valutate come argomenti di prova.</p><p>7. Le misure cautelari perdono la loro efficacia trenta giorni dopo la pubblicazione del provvedimento che dichiara il difetto di giurisdizione del giudice che le ha emanate. Le parti possono riproporre le domande cautelari al giudice munito di giurisdizione.</p>","notesHtml":""},{"id":"art_12","numText":"Art. 12","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rapporti con l'arbitrato","contentHtml":"<p>1. Le controversie concernenti diritti soggettivi devolute alla giurisdizione del giudice amministrativo possono essere risolte mediante arbitrato rituale di diritto ((ai sensi degli articoli 806 e seguenti del codice di procedura civile)) .</p>","notesHtml":""},{"id":"art_13","numText":"Art. 13","group":"Allegato 1 — Codice del processo amministrativo","heading":"Competenza territoriale inderogabile","contentHtml":"<p>1. Sulle controversie riguardanti provvedimenti, atti, accordi o comportamenti di pubbliche amministrazioni e' inderogabilmente competente il tribunale amministrativo regionale nella cui circoscrizione territoriale esse hanno sede. Il tribunale amministrativo regionale e' comunque inderogabilmente competente sulle controversie riguardanti provvedimenti, atti, accordi o comportamenti di pubbliche amministrazioni i cui effetti diretti sono limitati all'ambito territoriale della regione in cui il tribunale ha sede.</p><p>2. Per le controversie riguardanti pubblici dipendenti e' inderogabilmente competente il tribunale nella cui circoscrizione territoriale e' situata la sede di servizio.</p><p>3. Negli altri casi e' inderogabilmente competente, per gli atti statali, il Tribunale amministrativo regionale del Lazio, sede di Roma e, per gli atti dei soggetti pubblici a carattere ultra regionale, il tribunale amministrativo regionale nella cui circoscrizione ha sede il soggetto. ((4. La competenza di cui al presente articolo e all'articolo 14 e' inderogabile anche in ordine alle misure cautelari.)) ((4-bis. La competenza territoriale relativa al provvedimento da cui deriva l'interesse a ricorrere attrae a se' anche quella relativa agli atti presupposti dallo stesso provvedimento tranne che si tratti di atti normativi o generali, per la cui impugnazione restano fermi gli ordinari criteri di attribuzione della competenza.))</p>","notesHtml":""},{"id":"art_14","numText":"Art. 14","group":"Allegato 1 — Codice del processo amministrativo","heading":"Competenza funzionale inderogabile","contentHtml":"<p>1. Sono devolute funzionalmente alla competenza inderogabile del Tribunale amministrativo regionale del Lazio, sede di Roma, le controversie indicate dall'articolo 135 e dalla legge.</p><p>2. Sono devolute funzionalmente alla competenza inderogabile del Tribunale amministrativo regionale della Lombardia, sede di Milano, le controversie relative ai poteri esercitati dall'Autorita' per l'energia elettrica e il gas.</p><p>3. La competenza e' funzionalmente inderogabile altresi' per i giudizi di cui agli articoli 113 e 119, nonche' per ogni altro giudizio per il quale la legge o il presente codice individuino il giudice competente con criteri diversi da quelli di cui all'articolo 13.</p>","notesHtml":""},{"id":"art_15","numText":"Art. 15","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Rilievo dell'incompetenza) )) ((1. Il difetto di competenza e' rilevato d'ufficio finche' la causa non e' decisa in primo grado. Nei giudizi di impugnazione esso e' rilevato se dedotto con specifico motivo avverso il capo della pronuncia impugnata che, in modo implicito o esplicito, ha statuito sulla competenza.</p><p>2. In ogni caso il giudice decide sulla competenza prima di provvedere sulla domanda cautelare e, se non riconosce la propria competenza ai sensi degli articoli 13 e 14, non decide sulla stessa.</p><p>3. In mancanza di domanda cautelare, il difetto di competenza puo' essere eccepito entro il termine previsto per la costituzione in giudizio. Il presidente fissa la camera di consiglio per la pronuncia immediata sulla questione di competenza. Si osserva il procedimento di cui all'articolo 87, comma 3.</p><p>4. Il giudice provvede con ordinanza, nei casi di cui ai commi 2 e 3. Se dichiara la propria incompetenza, indica il giudice ritenuto competente. Se, nel termine perentorio di trenta giorni dalla comunicazione di tale ordinanza, la causa e' riassunta davanti al giudice dichiarato competente, il processo continua davanti al nuovo giudice. Salvo quanto previsto al comma 6, la riassunzione preclude alla parte che l'ha effettuata la proposizione del regolamento di competenza.</p><p>5. L'ordinanza che pronuncia sulla competenza senza decidere sulla domanda cautelare e' impugnabile esclusivamente con il regolamento di competenza di cui all'articolo 16. Il giudice dinanzi al quale la causa e' riassunta, se ritiene di essere a sua volta incompetente, richiede d'ufficio il regolamento di competenza. L'ordinanza che pronuncia sulla competenza e sulla domanda cautelare puo' essere impugnata col regolamento di competenza, oppure nei modi ordinari quando insieme con la pronuncia sulla competenza si impugna quella sulla domanda cautelare.</p><p>6. In pendenza del regolamento di competenza la domanda cautelare si propone al giudice indicato come competente nell'ordinanza di cui al comma 4, che decide in ogni caso, fermo restando quanto disposto dal comma 7.</p><p>7. I provvedimenti cautelari pronunciati dal giudice dichiarato incompetente perdono efficacia alla scadenza del termine di trenta giorni dalla data di pubblicazione dell'ordinanza che regola la competenza.</p><p>8. La domanda cautelare puo' essere riproposta al giudice dichiarato competente.</p><p>9. Le disposizioni di cui ai commi 7 e 8 si applicano anche ai provvedimenti cautelari pronunciati dal giudice privato del potere di decidere il ricorso dall'ordinanza presidenziale di cui all'articolo 47, comma 2.))</p>","notesHtml":""},{"id":"art_16","numText":"Art. 16","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Regolamento di competenza) )) ((1. Il regolamento di competenza e' proposto con istanza notificata alle altre parti nel termine, perentorio e non soggetto a dimezzamento, di trenta giorni dalla notificazione ovvero di sessanta giorni dalla pubblicazione dell'ordinanza che pronuncia sulla competenza ed e' depositato, unitamente a copia degli atti utili al fine del decidere, entro il termine di cui all'articolo 45 ridotto alla meta' presso la segreteria del Consiglio di Stato. Nel caso di regolamento richiesto di ufficio, ai sensi dell'articolo 15, comma 5, l'ordinanza e' immediatamente trasmessa al Consiglio di Stato a cura della segreteria e comunicata alle parti.</p><p>2. Il Consiglio di Stato decide con ordinanza in camera di consiglio, previo avviso della fissazione della medesima, inviato almeno dieci giorni prima ai difensori che si siano costituiti. L'ordinanza provvede anche sulle spese del regolamento salvo il caso di regolamento richiesto d'ufficio. La pronuncia sulle spese conserva efficacia anche dopo la sentenza che definisce il giudizio, salvo diversa statuizione espressa nella sentenza. Al procedimento si applicano le disposizioni di cui all'articolo 55, commi da 5 a 8.</p><p>3. La pronuncia sulla competenza resa dal Consiglio di Stato, in sede di regolamento o di appello ai sensi dell'articolo 62, comma 4, vincola i tribunali amministrativi regionali. Se viene indicato come competente un tribunale diverso da quello adito, il giudizio deve essere riassunto nel termine perentorio di trenta giorni dalla notificazione dell'ordinanza che pronuncia sul regolamento, ovvero entro sessanta giorni dalla sua pubblicazione.))</p>","notesHtml":""},{"id":"art_17","numText":"Art. 17","group":"Allegato 1 — Codice del processo amministrativo","heading":"Astensione","contentHtml":"<p>1. Al giudice amministrativo si applicano le cause e le modalita' di astensione previste dal codice di procedura civile. ((L'astensione non ha effetto sugli atti anteriori.))</p>","notesHtml":""},{"id":"art_18","numText":"Art. 18","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ricusazione","contentHtml":"<p>1. Al giudice amministrativo si applicano le cause di ricusazione previste dal codice di procedura civile.</p><p>2. La ricusazione si propone, almeno tre giorni prima dell'udienza designata, con domanda diretta al presidente, quando sono noti i magistrati che devono prendere parte all'udienza; in caso contrario, puo' proporsi oralmente all'udienza medesima prima della discussione.</p><p>3. La domanda deve indicare i motivi ed i mezzi di prova ed essere firmata dalla parte o dall'avvocato munito di procura speciale.</p><p>4. Proposta la ricusazione, il collegio investito della controversia puo' disporre la prosecuzione del giudizio, se ad un sommario esame ritiene l'istanza inammissibile o manifestamente infondata.</p><p>5. In ogni caso la decisione definitiva sull'istanza e' adottata, entro trenta giorni dalla sua proposizione, dal collegio previa sostituzione del magistrato ricusato, che deve essere sentito.</p><p>6. I componenti del collegio chiamato a decidere sulla ricusazione non sono ricusabili.</p><p>7. Il giudice, con l'ordinanza con cui dichiara inammissibile o respinge l'istanza di ricusazione, provvede sulle spese e puo' condannare la parte che l'ha proposta ad una sanzione pecuniaria non superiore ad euro cinquecento.</p><p>8. ((La ricusazione non ha)) effetto sugli atti anteriori. L'accoglimento dell'istanza di ricusazione rende nulli gli atti compiuti ai sensi del comma 4 con la partecipazione del giudice ricusato.</p>","notesHtml":""},{"id":"art_19","numText":"Art. 19","group":"Allegato 1 — Codice del processo amministrativo","heading":"Verificatore e consulente tecnico","contentHtml":"<p>1. Il giudice puo' farsi assistere, per il compimento di singoli atti o per tutto il processo, da uno o piu' verificatori, ovvero, se indispensabile, da uno o piu' consulenti.</p><p>2. L'incarico di consulenza puo' essere affidato a dipendenti pubblici, professionisti iscritti negli albi di cui all'articolo 13 delle disposizioni per l'attuazione del codice di procedura civile, o altri soggetti aventi particolare competenza tecnica. Non possono essere nominati coloro che prestano attivita' in favore delle parti del giudizio. La verificazione e' affidata a un organismo pubblico, estraneo alle parti del giudizio, munito di specifiche competenze tecniche.</p><p>3. Il verificatore e il consulente compiono le indagini che sono loro affidate dal giudice e forniscono anche oralmente i chiarimenti richiesti.</p>","notesHtml":""},{"id":"art_20","numText":"Art. 20","group":"Allegato 1 — Codice del processo amministrativo","heading":"Obbligo di assumere l'incarico e ricusazione (( . . . )","contentHtml":"<p>1. Il verificatore e il consulente, se scelto tra i dipendenti pubblici o tra gli iscritti negli albi di cui all'articolo 13 delle disposizioni per l'attuazione del codice di procedura civile, hanno l'obbligo di prestare il loro ufficio, tranne che il giudice riconosca l'esistenza di un giustificato motivo.</p><p>2. Il consulente, o il verificatore, puo' essere ricusato dalle parti per i motivi indicati nell'articolo 51 del codice di procedura civile. Della ricusazione conosce il giudice che l'ha nominato.</p>","notesHtml":""},{"id":"art_21","numText":"Art. 21","group":"Allegato 1 — Codice del processo amministrativo","heading":"Commissario ad acta","contentHtml":"<p>1. Nell'ambito della propria giurisdizione, il giudice amministrativo, se deve sostituirsi all'amministrazione, puo' nominare come proprio ausiliario un commissario ad acta. Si applica l'articolo 20, comma 2.</p>","notesHtml":""},{"id":"art_22","numText":"Art. 22","group":"Allegato 1 — Codice del processo amministrativo","heading":"Patrocinio","contentHtml":"<p>1. Salvo quanto previsto dall'articolo 23, nei giudizi davanti ai tribunali amministrativi regionali e' obbligatorio il patrocinio di avvocato.</p><p>2. Per i giudizi davanti al Consiglio di Stato e' obbligatorio il ministero di avvocato ammesso al patrocinio innanzi alle giurisdizioni superiori.</p><p>3. La parte o la persona che la rappresenta, quando ha la qualita' necessaria per esercitare l'ufficio di difensore con procura presso il giudice adito, puo' stare in giudizio senza il ministero di altro difensore.</p>","notesHtml":""},{"id":"art_23","numText":"Art. 23","group":"Allegato 1 — Codice del processo amministrativo","heading":"Difesa personale delle parti","contentHtml":"<p>1. Le parti possono stare in giudizio personalmente senza l'assistenza del difensore nei giudizi in materia di accesso ((e trasparenza amministrativa)) , in materia elettorale e nei giudizi relativi al diritto dei cittadini dell'Unione europea e dei loro familiari di circolare e di soggiornare liberamente nel territorio degli Stati membri.</p>","notesHtml":""},{"id":"art_24","numText":"Art. 24","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procura alle liti","contentHtml":"<p>1. La procura rilasciata per agire e contraddire davanti al giudice si intende conferita anche per proporre motivi aggiunti e ricorso incidentale, salvo che in essa sia diversamente disposto.</p>","notesHtml":""},{"id":"art_25","numText":"Art. 25","group":"Allegato 1 — Codice del processo amministrativo","heading":"Domicilio","contentHtml":"<p>1. Fermo quanto previsto, con riferimento alle comunicazioni di segreteria, dall'articolo 136, comma 1: a) nei giudizi davanti ai tribunali amministrativi regionali, la parte, se non elegge domicilio nel comune sede del tribunale amministrativo regionale o della sezione staccata dove pende il ricorso, si intende domiciliata, ad ogni effetto, presso la segreteria del tribunale amministrativo regionale o della sezione staccata; b) nei giudizi davanti al Consiglio di Stato, la parte, se non elegge domicilio in Roma, si intende domiciliata, ad ogni effetto, presso la segreteria del Consiglio di Stato. ((1-bis. Al processo amministrativo telematico si applica, in quanto compatibile, l'articolo 16-sexies del decreto-legge 18 ottobre 2012, n. 179, convertito, con modificazioni, dalla legge 17 dicembre 2012, n. 221.)) ((21)) ((1-ter. A decorrere dal 1° gennaio 2018 il comma 1 non si applica per i ricorsi soggetti alla disciplina del processo amministrativo telematico)) . ((21))</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197 ha disposto (con l'art. 7, comma 1, alinea) che le presenti modifiche decorrono dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che le presenti modifiche hanno efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_26","numText":"Art. 26","group":"Allegato 1 — Codice del processo amministrativo","heading":"Spese di giudizio","contentHtml":"<p>1. Quando emette una decisione, il giudice provvede anche sulle spese del giudizio, secondo gli articoli 91, 92, 93, 94, 96 e 97 del codice di procedura civile , tenendo anche conto del rispetto dei principi di chiarezza e sinteticita' di cui all'articolo 3, comma 2. ((In ogni caso, il giudice, anche d'ufficio, puo' altresi' condannare la parte soccombente al pagamento, in favore della controparte, di una somma equitativamente determinata, comunque non superiore al doppio delle spese liquidate, in presenza di motivi manifestamente infondati.))</p><p>2. Il giudice condanna d'ufficio la parte soccombente al pagamento di una sanzione pecuniaria, in misura non inferiore al doppio e non superiore al quintuplo del contributo unificato dovuto per il ricorso introduttivo del giudizio, quando la parte soccombente ha agito o resistito temerariamente in giudizio. ((Nelle controversie in materia di appalti di cui agli articoli 119, lettera a), e 120 l'importo della sanzione pecuniaria puo' essere elevato fino all'uno per cento del valore del contratto, ove superiore al suddetto limite.)) Al gettito delle sanzioni previste dal presente comma si applica l'articolo 15 delle norme di attuazione.</p>","notesHtml":""},{"id":"art_27","numText":"Art. 27","group":"Allegato 1 — Codice del processo amministrativo","heading":"Contraddittorio","contentHtml":"<p>1. Il contraddittorio e' integralmente costituito quando l'atto introduttivo e' notificato all'amministrazione resistente e, ove esistenti, ai controinteressati.</p><p>2. Se il giudizio e' promosso solo contro alcune delle parti e non si e' verificata alcuna decadenza, il giudice ordina l'integrazione del contraddittorio nei confronti delle altre entro un termine perentorio. Nelle more dell'integrazione del contraddittorio il giudice puo' pronunciare provvedimenti cautelari interinali.</p>","notesHtml":""},{"id":"art_28","numText":"Art. 28","group":"Allegato 1 — Codice del processo amministrativo","heading":"Intervento","contentHtml":"<p>1. Se il giudizio non e' stato promosso contro alcuna delle parti nei cui confronti la sentenza deve essere pronunciata, queste possono intervenirvi, senza pregiudizio del diritto di difesa.</p><p>2. Chiunque non sia parte del giudizio e non sia decaduto dall'esercizio delle relative azioni, ma vi abbia interesse, puo' intervenire accettando lo stato e il grado in cui il giudizio si trova.</p><p>3. Il giudice, anche su istanza di parte, quando ritiene opportuno che il processo si svolga nei confronti di un terzo, ne ordina l'intervento.</p>","notesHtml":""},{"id":"art_29","numText":"Art. 29","group":"Allegato 1 — Codice del processo amministrativo","heading":"Azione di annullamento","contentHtml":"<p>1. L'azione di annullamento per violazione di legge, incompetenza ed eccesso di potere si propone nel termine di decadenza di sessanta giorni.</p>","notesHtml":""},{"id":"art_30","numText":"Art. 30","group":"Allegato 1 — Codice del processo amministrativo","heading":"Azione di condanna","contentHtml":"<p>1. L'azione di condanna puo' essere proposta contestualmente ad altra azione o, nei soli casi di giurisdizione esclusiva e nei casi di cui al presente articolo, anche in via autonoma.</p><p>2. Puo' essere chiesta la condanna al risarcimento del danno ingiusto derivante dall'illegittimo esercizio dell'attivita' amministrativa o dal mancato esercizio di quella obbligatoria. Nei casi di giurisdizione esclusiva puo' altresi' essere chiesto il risarcimento del danno da lesione di diritti soggettivi. Sussistendo i presupposti previsti dall'articolo 2058 del codice civile, puo' essere chiesto il risarcimento del danno in forma specifica.</p><p>3. La domanda di risarcimento per lesione di interessi legittimi e' proposta entro il termine di decadenza di centoventi giorni decorrente dal giorno in cui il fatto si e' verificato ovvero dalla conoscenza del provvedimento se il danno deriva direttamente da questo. Nel determinare il risarcimento il giudice valuta tutte le circostanze di fatto e il comportamento complessivo delle parti e, comunque, esclude il risarcimento dei danni che si sarebbero potuti evitare usando l'ordinaria diligenza, anche attraverso l'esperimento degli strumenti di tutela previsti.</p><p>4. Per il risarcimento dell'eventuale danno che il ricorrente comprovi di aver subito in conseguenza dell'inosservanza dolosa o colposa del termine di conclusione del procedimento, il termine di cui al comma 3 non decorre fintanto che perdura l'inadempimento. Il termine di cui al comma 3 inizia comunque a decorrere dopo un anno dalla scadenza del termine per provvedere.</p><p>5. Nel caso in cui sia stata proposta azione di annullamento la domanda risarcitoria puo' essere formulata nel corso del giudizio o, comunque, sino a centoventi giorni dal passaggio in giudicato della relativa sentenza.</p><p>6. Di ogni domanda di condanna al risarcimento di danni per lesioni di interessi legittimi o, nelle materie di giurisdizione esclusiva, di diritti soggettivi conosce esclusivamente il giudice amministrativo.</p>","notesHtml":""},{"id":"art_31","numText":"Art. 31","group":"Allegato 1 — Codice del processo amministrativo","heading":"Azione avverso il silenzio e declaratoria di nullita'","contentHtml":"<p>1. Decorsi i termini per la conclusione del procedimento amministrativo ((e negli altri casi previsti dalla legge)) , chi vi ha interesse puo' chiedere l'accertamento dell'obbligo dell'amministrazione di provvedere.</p><p>2. L'azione puo' essere proposta fintanto che perdura l'inadempimento e, comunque, non oltre un anno dalla scadenza del termine di conclusione del procedimento. E' fatta salva la riproponibilita' dell'istanza di avvio del procedimento ove ne ricorrano i presupposti.</p><p>3. Il giudice puo' pronunciare sulla fondatezza della pretesa dedotta in giudizio solo quando si tratta di attivita' vincolata o quando risulta che non residuano ulteriori margini di esercizio della discrezionalita' e non sono necessari adempimenti istruttori che debbano essere compiuti dall'amministrazione.</p><p>4. La domanda volta all'accertamento delle nullita' previste dalla legge si propone entro il termine di decadenza di centottanta giorni. La nullita' dell'atto puo' sempre essere opposta dalla parte resistente o essere rilevata d'ufficio dal giudice. Le disposizioni del presente comma non si applicano alle nullita' di cui all'articolo 114, comma 4, lettera b), per le quali restano ferme le disposizioni del Titolo I del Libro IV.</p>","notesHtml":""},{"id":"art_32","numText":"Art. 32","group":"Allegato 1 — Codice del processo amministrativo","heading":"Pluralita' delle domande e conversione delle azioni","contentHtml":"<p>1. E' sempre possibile nello stesso giudizio il cumulo di domande connesse proposte in via principale o incidentale. Se le azioni sono soggette a riti diversi, si applica quello ordinario, salvo quanto previsto ((dal)) Titolo V del Libro IV.</p><p>2. Il giudice qualifica l'azione proposta in base ai suoi elementi sostanziali. Sussistendone i presupposti il giudice puo' sempre disporre la conversione delle azioni.</p>","notesHtml":""},{"id":"art_33","numText":"Art. 33","group":"Allegato 1 — Codice del processo amministrativo","heading":"Provvedimenti (( . . . )","contentHtml":"<p>1. Il giudice pronuncia: a) sentenza quando definisce in tutto o in parte il giudizio; b) ordinanza quando assume misure cautelari o interlocutorie, ovvero decide sulla competenza; c) decreto nei casi previsti dalla legge.</p><p>2. Le sentenze di primo grado sono esecutive.</p><p>3. Le ordinanze e i decreti, se non pronunciati in udienza o in camera di consiglio e inseriti nel relativo verbale, sono comunicati alle parti dalla segreteria nel termine di cui all'articolo 89, comma 3.</p><p>4. L'ordinanza che dichiara l'incompetenza indica in ogni caso il giudice competente.</p>","notesHtml":""},{"id":"art_34","numText":"Art. 34","group":"Allegato 1 — Codice del processo amministrativo","heading":"Sentenze di merito","contentHtml":"<p>1. In caso di accoglimento del ricorso il giudice, nei limiti della domanda: a) annulla in tutto o in parte il provvedimento impugnato; b) ordina all'amministrazione, rimasta inerte, di provvedere entro un termine; c) condanna al pagamento di una somma di denaro, anche a titolo di risarcimento del danno, all'adozione delle misure idonee a tutelare la situazione giuridica soggettiva dedotta in giudizio e dispone misure di risarcimento in forma specifica ai sensi dell'articolo 2058 del codice civile ((. L'azione di condanna al rilascio di un provvedimento richiesto e' esercitata, nei limiti di cui all'articolo 31, comma 3, contestualmente all'azione di annullamento del provvedimento di diniego o all'azione avverso il silenzio)) ; d) nei casi di giurisdizione di merito, adotta un nuovo atto, ovvero modifica o riforma quello impugnato; e) dispone le misure idonee ad assicurare l'attuazione del giudicato e delle pronunce non sospese, compresa la nomina di un commissario ad acta, che puo' avvenire anche in sede di cognizione con effetto dalla scadenza di un termine assegnato per l'ottemperanza.</p><p>2. In nessun caso il giudice puo' pronunciare con riferimento a poteri amministrativi non ancora esercitati. Salvo quanto previsto dal comma 3 e dall'articolo 30, comma 3, il giudice non puo' conoscere della legittimita' degli atti che il ricorrente avrebbe dovuto impugnare con l'azione di annullamento di cui all'articolo 29.</p><p>3. Quando, nel corso del giudizio, l'annullamento del provvedimento impugnato non risulta piu' utile per il ricorrente, il giudice accerta l'illegittimita' dell'atto se sussiste l'interesse ai fini risarcitori.</p><p>4. In caso di condanna pecuniaria, il giudice puo', in mancanza di opposizione delle parti, stabilire i criteri in base ai quali il debitore deve proporre a favore del creditore il pagamento di una somma entro un congruo termine. Se le parti non giungono ad un accordo, ovvero non adempiono agli obblighi derivanti dall'accordo concluso, con il ricorso previsto dal Titolo I del Libro IV, possono essere chiesti la determinazione della somma dovuta ovvero l'adempimento degli obblighi ineseguiti.</p><p>5. Qualora nel corso del giudizio la pretesa del ricorrente risulti pienamente soddisfatta, il giudice dichiara cessata la materia del contendere.</p>","notesHtml":""},{"id":"art_35","numText":"Art. 35","group":"Allegato 1 — Codice del processo amministrativo","heading":"Pronunce di rito","contentHtml":"<p>1. Il giudice dichiara, anche d'ufficio, il ricorso: a) irricevibile se accerta la tardivita' della notificazione o del deposito; b) inammissibile quando e' carente l'interesse o sussistono altre ragioni ostative ad una pronuncia sul merito; c) improcedibile quando nel corso del giudizio sopravviene il difetto di interesse delle parti alla decisione, o non sia stato integrato il contraddittorio nel termine assegnato, ovvero sopravvengono altre ragioni ostative ad una pronuncia sul merito.</p><p>2. Il giudice dichiara estinto il giudizio: a) se, nei casi previsti dal presente codice, non viene proseguito o riassunto nel termine perentorio fissato dalla legge o assegnato dal giudice; b) per perenzione; c) per rinuncia.</p>","notesHtml":""},{"id":"art_36","numText":"Art. 36","group":"Allegato 1 — Codice del processo amministrativo","heading":"Pronunce interlocutorie","contentHtml":"<p>1. Salvo che il presente codice disponga diversamente, il giudice provvede con ordinanza in tutti i casi in cui non definisce nemmeno in parte il giudizio.</p><p>2. Il giudice pronuncia sentenza non definitiva quando decide solo su alcune delle questioni, anche se adotta provvedimenti istruttori per l'ulteriore trattazione della causa.</p>","notesHtml":""},{"id":"art_37","numText":"Art. 37","group":"Allegato 1 — Codice del processo amministrativo","heading":"Errore scusabile","contentHtml":"<p>1. Il giudice puo' disporre, anche d'ufficio, la rimessione in termini per errore scusabile in presenza di oggettive ragioni di incertezza su questioni di diritto o di gravi impedimenti di fatto.</p>","notesHtml":""},{"id":"art_38","numText":"Art. 38","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rinvio interno","contentHtml":"<p>1. Il processo amministrativo si svolge secondo le disposizioni del Libro II che, se non espressamente derogate, si applicano anche alle impugnazioni e ai riti speciali.</p>","notesHtml":""},{"id":"art_39","numText":"Art. 39","group":"Allegato 1 — Codice del processo amministrativo","heading":"Rinvio esterno","contentHtml":"<p>1. Per quanto non disciplinato dal presente codice si applicano le disposizioni del codice di procedura civile, in quanto compatibili o espressione di principi generali.</p><p>2. Le notificazioni degli atti del processo amministrativo sono comunque disciplinate dal codice di procedura civile e dalle leggi speciali concernenti la notificazione degli atti giudiziari in materia civile.</p>","notesHtml":""},{"id":"art_40","numText":"Art. 40","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Contenuto del ricorso) )) ((1. Il ricorso deve contenere distintamente: a) gli elementi identificativi del ricorrente, del suo difensore e delle parti nei cui confronti il ricorso e' proposto; b) l'indicazione dell'oggetto della domanda, ivi compreso l'atto o il provvedimento eventualmente impugnato, e la data della sua notificazione, comunicazione o comunque della sua conoscenza; c) l'esposizione sommaria dei fatti; d) i motivi specifici su cui si fonda il ricorso; e) l'indicazione dei mezzi di prova; f) l'indicazione dei provvedimenti chiesti al giudice; g) la sottoscrizione del ricorrente, se esso sta in giudizio personalmente, oppure del difensore, con indicazione, in questo caso, della procura speciale.</p><p>2. I motivi proposti in violazione del comma 1, lettera d), sono inammissibili.))</p>","notesHtml":""},{"id":"art_41","numText":"Art. 41","group":"Allegato 1 — Codice del processo amministrativo","heading":"Notificazione del ricorso e suoi destinatari","contentHtml":"<p>1. Le domande si introducono con ricorso al tribunale amministrativo regionale competente.</p><p>2. Qualora sia proposta azione di annullamento il ricorso deve essere notificato, a pena di decadenza, alla pubblica amministrazione che ha emesso l'atto impugnato e ad almeno uno dei controinteressati che sia individuato nell'atto stesso entro il termine previsto dalla legge, decorrente dalla notificazione, comunicazione o piena conoscenza, ovvero, per gli atti di cui non sia richiesta la notificazione individuale, dal giorno in cui sia scaduto il termine della pubblicazione se questa sia prevista dalla legge o in base alla legge. Qualora sia proposta azione di condanna, anche in via autonoma, il ricorso e' notificato altresi' agli eventuali beneficiari dell'atto illegittimo, ai sensi dell'articolo 102 del codice di procedura civile; altrimenti il giudice provvede ai sensi dell'articolo 49.</p><p>3. La notificazione dei ricorsi nei confronti delle amministrazioni dello Stato e' effettuata secondo le norme vigenti per la difesa in giudizio delle stesse.</p><p>4. Quando la notificazione del ricorso nei modi ordinari sia particolarmente difficile per il numero delle persone da chiamare in giudizio il presidente del tribunale o della sezione cui e' assegnato il ricorso puo' disporre, su richiesta di parte, che la notificazione sia effettuata per pubblici proclami prescrivendone le modalita'.</p><p>5. Il termine per la notificazione del ricorso e' aumentato di trenta giorni, se le parti o alcune di esse risiedono in altro Stato d'Europa, o di novanta giorni se risiedono fuori d'Europa.</p>","notesHtml":""},{"id":"art_42","numText":"Art. 42","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ricorso incidentale e domanda riconvenzionale","contentHtml":"<p>1. Le parti resistenti e i controinteressati possono proporre domande il cui interesse sorge in dipendenza della domanda proposta in via principale, a mezzo di ricorso incidentale. Il ricorso si propone nel termine di sessanta giorni decorrente dalla ricevuta notificazione del ricorso principale. Per i soggetti intervenuti il termine decorre dall'effettiva conoscenza della proposizione del ricorso principale.</p><p>2. Il ricorso incidentale, notificato ai sensi dell'articolo 41 alle controparti personalmente o, se costituite, ai sensi dell'articolo 170 del codice di procedura civile, ha i contenuti di cui all'articolo 40 ed e' depositato nei termini e secondo le modalita' previste dall'articolo 45.</p><p>3. Le altre parti possono presentare memorie e produrre documenti nei termini e secondo le modalita' previsti dall'articolo 46.</p><p>4. La cognizione del ricorso incidentale e' attribuita al giudice competente per quello principale, salvo che la domanda introdotta con il ricorso incidentale sia devoluta alla competenza del Tribunale amministrativo regionale del Lazio, sede di Roma, ovvero alla competenza funzionale di un tribunale amministrativo regionale, ai sensi dell'articolo 14; in tal caso la competenza a conoscere dell'intero giudizio spetta al Tribunale amministrativo regionale del Lazio, sede di Roma, ovvero al tribunale amministrativo regionale avente competenza funzionale ai sensi dell'articolo 14.</p><p>5. Nelle controversie in cui si faccia questione di diritti soggettivi le domande riconvenzionali dipendenti da titoli gia' dedotti in giudizio sono proposte nei termini e con le modalita' di cui al presente articolo.</p>","notesHtml":""},{"id":"art_43","numText":"Art. 43","group":"Allegato 1 — Codice del processo amministrativo","heading":"Motivi aggiunti","contentHtml":"<p>1. I ricorrenti, principale e incidentale, possono introdurre con motivi aggiunti nuove ragioni a sostegno delle domande gia' proposte, ovvero domande nuove purche' connesse a quelle gia' proposte. Ai motivi aggiunti si applica la disciplina prevista per il ricorso, ivi compresa quella relativa ai termini.</p><p>2. Le notifiche alle controparti costituite avvengono ai sensi dell'articolo 170 del codice di procedura civile.</p><p>3. Se la domanda nuova di cui al comma 1 e' stata proposta con ricorso separato davanti allo stesso tribunale, il giudice provvede alla riunione dei ricorsi ai sensi dell'articolo 70.</p>","notesHtml":""},{"id":"art_44","numText":"Art. 44","group":"Allegato 1 — Codice del processo amministrativo","heading":"Vizi del ricorso e della notificazione","contentHtml":"<p>1. Il ricorso e' nullo: a) se manca la sottoscrizione; b) se, per l'inosservanza delle altre norme prescritte nell'articolo 40, vi e' incertezza assoluta sulle persone o sull'oggetto della domanda.</p><p>2. Se il ricorso contiene irregolarita', il collegio puo' ordinare che sia rinnovato entro un termine a tal fine fissato.</p><p>3. La costituzione degli intimati sana la nullita' della notificazione del ricorso, salvi i diritti acquisiti anteriormente alla comparizione, nonche' le irregolarita' di cui al comma 2. (25) 4. Nei casi in cui sia nulla la notificazione e il destinatario non si costituisca in giudizio, il giudice, se ritiene che l'esito negativo della notificazione dipenda da causa non imputabile al notificante, fissa al ricorrente un termine perentorio per rinnovarla. La rinnovazione impedisce ogni decadenza. ((36))</p><p>4-bis. Fermo quanto previsto dall'articolo 39, comma 2, la nullita' degli atti e' rilevabile d'ufficio.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (25)</p><p>La Corte Costituzionale, con sentenza 22 maggio - 26 giugno 2018, n. 132 (in G.U. 1ª s.s. 04/07/2018, n. 27), ha dichiarato \"l'illegittimita' costituzionale dell'art. 44, comma 3, del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), limitatamente alle parole «salvi i diritti acquisiti anteriormente alla comparizione,»\".</p><p>------------</p><p>AGGIORNAMENTO (36)</p><p>La Corte Costituzionale, con sentenza 26 maggio - 9 luglio 2021, n. 148 (in G.U. 1ª s.s. 14/07/2021, n. 28), ha dichiarato \"l'illegittimita' costituzionale dell'art. 44, comma 4, dell'Allegato 1 (codice del processo amministrativo) al decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), limitatamente alle parole «, se ritiene che l'esito negativo della notificazione dipenda da causa non imputabile al notificante,»\".</p>"},{"id":"art_45","numText":"Art. 45","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deposito del ricorso e degli altri atti processuali","contentHtml":"<p>1. Il ricorso e gli altri atti processuali soggetti a preventiva notificazione sono depositati nella segreteria del giudice nel termine perentorio di trenta giorni, decorrente dal momento in cui l'ultima notificazione dell'atto stesso si e' perfezionata anche per il destinatario. I termini di cui al presente comma sono aumentati nei casi e nella misura di cui all'articolo 41, comma 5.</p><p>2. E' fatta salva la facolta' della parte di effettuare il deposito dell'atto, anche se non ancora pervenuto al destinatario, sin dal momento in cui la notificazione del ricorso si perfeziona per il notificante.</p><p>3. La parte che si avvale della facolta' di cui al comma 2 e' tenuta a depositare la documentazione comprovante la data in cui la notificazione si e' perfezionata anche per il destinatario. In assenza di tale prova le domande introdotte con l'atto non possono essere esaminate.</p><p>4. La mancata produzione, da parte del ricorrente, della copia del provvedimento impugnato e della documentazione a sostegno del ricorso non implica decadenza.</p>","notesHtml":""},{"id":"art_46","numText":"Art. 46","group":"Allegato 1 — Codice del processo amministrativo","heading":"Costituzione delle parti intimate","contentHtml":"<p>1. Nel termine di sessanta giorni dal perfezionamento nei propri confronti della notificazione del ricorso, le parti intimate possono costituirsi, presentare memorie, fare istanze, indicare i mezzi di prova di cui intendono valersi e produrre documenti.</p><p>2. L'amministrazione, nel termine di cui al comma 1, deve produrre l'eventuale provvedimento impugnato, nonche' gli atti e i documenti in base ai quali l'atto e' stato emanato, quelli in esso citati e quelli che l'amministrazione ritiene utili al giudizio.</p><p>3. Della produzione di cui al comma 2 e' data comunicazione alle parti costituite a cura della segreteria.</p><p>4. I termini di cui al presente articolo sono aumentati nei casi e nella misura di cui all'articolo 41, comma 5.</p>","notesHtml":""},{"id":"art_47","numText":"Art. 47","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ripartizione delle controversie tra tribunali amministrativi regionali e sezioni staccate","contentHtml":"<p>1. Nei ricorsi devoluti alle sezioni staccate in base ai criteri di cui all'articolo 13, il deposito del ricorso e' effettuato presso la segreteria della sezione staccata. Fuori dei casi di cui all'articolo 14, non e' considerata questione di competenza la ripartizione delle controversie tra tribunale amministrativo regionale con sede nel capoluogo e sezione staccata.</p><p>2. Se una parte, diversa dal ricorrente, ritiene che il ricorso debba essere deciso dal tribunale amministrativo regionale con sede nel capoluogo anziche' dalla sezione staccata, o viceversa, deve eccepirlo nell'atto di costituzione o, comunque, con atto depositato non oltre trenta giorni dalla scadenza del termine di cui articolo 46, comma 1. Il presidente del tribunale amministrativo regionale provvede sulla eccezione con ordinanza motivata non impugnabile, udite le parti che ne facciano richiesta. Se sono state disposte misure cautelari, si applica l'articolo 15, commi 8 e 9.</p><p>3. Salvo quanto previsto dall'ultimo periodo del comma 2, alla ripartizione di cui al presente articolo non si applica l'articolo 15.</p>","notesHtml":""},{"id":"art_48","numText":"Art. 48","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giudizio conseguente alla trasposizione del ricorso straordinario","contentHtml":"<p>1. Qualora la parte nei cui confronti sia stato proposto ricorso straordinario ai sensi degli articoli 8 e seguenti del decreto del Presidente della Repubblica 24 novembre 1971, n. 1199, proponga opposizione, il giudizio segue dinanzi al tribunale amministrativo regionale se il ricorrente, entro il termine perentorio di sessanta giorni dal ricevimento dell'atto di opposizione, deposita nella relativa segreteria l'atto di costituzione in giudizio, dandone avviso mediante notificazione alle altre parti.</p><p>2. Le pronunce sull'istanza cautelare rese in sede straordinaria perdono efficacia alla scadenza del sessantesimo giorno successivo alla data di deposito dell'atto di costituzione in giudizio previsto dal comma 1. Il ricorrente puo' comunque riproporre l'istanza cautelare al tribunale amministrativo regionale.</p><p>3. Qualora l'opposizione sia inammissibile, il tribunale amministrativo regionale dispone la restituzione del fascicolo per la prosecuzione del giudizio in sede straordinaria.</p>","notesHtml":""},{"id":"art_49","numText":"Art. 49","group":"Allegato 1 — Codice del processo amministrativo","heading":"Integrazione del contraddittorio","contentHtml":"<p>1. Quando il ricorso sia stato proposto solo contro taluno dei controinteressati, il presidente o il collegio ordina l'integrazione del contraddittorio nei confronti degli altri.</p><p>2. L'integrazione del contraddittorio non e' ordinata nel caso in cui il ricorso sia manifestamente irricevibile, inammissibile, improcedibile o infondato; in tali casi il collegio provvede con sentenza in forma semplificata ai sensi dell'articolo 74.</p><p>3. Il giudice, nell'ordinare l'integrazione del contraddittorio, fissa il relativo termine, indicando le parti cui il ricorso deve essere notificato. Puo' autorizzare, se ne ricorrono i presupposti, la notificazione per pubblici proclami prescrivendone le modalita'. Se l'atto di integrazione del contraddittorio non e' tempestivamente notificato e depositato, il giudice provvede ai sensi dell'articolo 35.</p><p>4. I soggetti nei cui confronti e' integrato il contraddittorio ai sensi del comma 1 non sono pregiudicati dagli atti processuali anteriormente compiuti.</p>","notesHtml":""},{"id":"art_50","numText":"Art. 50","group":"Allegato 1 — Codice del processo amministrativo","heading":"Intervento volontario in causa","contentHtml":"<p>1. L'intervento e' proposto con atto diretto al giudice adito, recante l'indicazione delle generalita' dell'interveniente. L'atto deve contenere le ragioni su cui si fonda, con la produzione dei documenti giustificativi, e deve essere sottoscritto ai sensi dell'articolo 40, comma 1, lettera d).</p><p>2. L'atto di intervento e' notificato alle altre parti ed e' depositato nei termini di cui all'articolo 45; nei confronti di quelle costituite e' notificato ai sensi dell'articolo 170 del codice di procedura civile.</p><p>3. Il deposito dell'atto di intervento di cui all'articolo 28, comma 2, e' ammesso fino a trenta giorni prima dell'udienza.</p>","notesHtml":""},{"id":"art_51","numText":"Art. 51","group":"Allegato 1 — Codice del processo amministrativo","heading":"Intervento per ordine del giudice","contentHtml":"<p>1. Il giudice, ove disponga l'intervento di cui all'articolo 28, comma 3, ordina alla parte di chiamare il terzo in giudizio, indicando gli atti da notificare e il termine della notificazione.</p><p>2. La costituzione dell'interventore avviene secondo le modalita' di cui all'articolo 46. Si applica l'articolo 49, comma 3, terzo periodo.</p>","notesHtml":""},{"id":"art_52","numText":"Art. 52","group":"Allegato 1 — Codice del processo amministrativo","heading":"Termini e forme speciali di notificazione","contentHtml":"<p>1. I termini assegnati dal giudice, salva diversa previsione, sono perentori.</p><p>2. Il presidente puo' autorizzare la notificazione del ricorso o di provvedimenti anche direttamente dal difensore con qualunque mezzo idoneo, compresi quelli per via telematica o fax, ai sensi dell'articolo 151 del codice di procedura civile.</p><p>3. Se il giorno di scadenza e' festivo il termine fissato dalla legge o dal giudice per l'adempimento e' prorogato di diritto al primo giorno seguente non festivo.</p><p>4. Per i termini computati a ritroso, la scadenza e' anticipata al giorno antecedente non festivo.</p><p>5. La proroga di cui al comma 3 si applica anche ai termini che scadono nella giornata del sabato.</p>","notesHtml":""},{"id":"art_53","numText":"Art. 53","group":"Allegato 1 — Codice del processo amministrativo","heading":"Abbreviazione dei termini","contentHtml":"<p>1. Nei casi d'urgenza, il presidente del tribunale puo', su istanza di parte, abbreviare fino alla meta' i termini previsti dal presente codice per la fissazione di udienze o di camere di consiglio. Conseguentemente sono ridotti proporzionalmente i termini per le difese della relativa fase.</p><p>2. Il decreto di abbreviazione del termine, redatto in calce alla domanda, e' notificato, a cura della parte che lo ha richiesto, all'amministrazione intimata e ai controinteressati; il termine abbreviato comincia a decorrere dall'avvenuta notificazione del decreto.</p>","notesHtml":""},{"id":"art_54","numText":"Art. 54","group":"Allegato 1 — Codice del processo amministrativo","heading":"Deposito tardivo di memorie e documenti e sospensione dei termini","contentHtml":"<p>1. La presentazione tardiva di memorie o documenti puo' essere eccezionalmente autorizzata, su richiesta di parte, dal collegio, assicurando comunque il pieno rispetto del diritto delle controparti al contraddittorio su tali atti, qualora la produzione nel termine di legge sia risultata estremamente difficile.</p><p>2. I termini processuali sono sospesi dal 1° agosto al 31 agosto di ciascun anno. (15) ((29))</p><p>3. La sospensione dei termini prevista dal comma 2 non si applica al procedimento cautelare. ((29))</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (15)</p><p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 20, comma 1-ter) che la modifica al comma 2 del presente articolo decorre dall'entrata in vigore dell'art. 16 del D.L. 12 settembre 2014, n. 132, convertito con modificazioni dalla L. 10 novembre 2014, n. 162, come modificato dal medesimo comma 1-ter dell'art. 20.</p><p>-----------</p><p>AGGIORNAMENTO (29)</p><p>L'aggiornamento in calce, precedentemente disposto dall'art. 3, comma 1 del D.L. 8 marzo 2020, n. 11 e' stato eliminato; la modifica ha perso efficacia per effetto dell'abrogazione del D.L. medesimo ad opera della L. 24 aprile 2020, n. 27, la quale ne ha contestualmente fatti salvi gli effetti.</p>"},{"id":"art_55","numText":"Art. 55","group":"Allegato 1 — Codice del processo amministrativo","heading":"Misure cautelari collegiali","contentHtml":"<p>1. Se il ricorrente, allegando di subire un pregiudizio grave e irreparabile durante il tempo necessario a giungere alla decisione sul ricorso, chiede l'emanazione di misure cautelari, compresa l'ingiunzione a pagare una somma in via provvisoria, che appaiono, secondo le circostanze, piu' idonee ad assicurare interinalmente gli effetti della decisione sul ricorso, il collegio si pronuncia con ordinanza emessa in camera di consiglio.</p><p>2. Qualora dalla decisione sulla domanda cautelare derivino effetti irreversibili, il collegio puo' disporre la prestazione di una cauzione, anche mediante fideiussione, cui subordinare la concessione o il diniego della misura cautelare. La concessione o il diniego della misura cautelare non puo' essere subordinata a cauzione quando la domanda cautelare attenga a diritti fondamentali della persona o ad altri beni di primario rilievo costituzionale. Il provvedimento che impone la cauzione ne indica l'oggetto, il modo di prestarla e il termine entro cui la prestazione va eseguita.</p><p>3. La domanda cautelare puo' essere proposta con il ricorso di merito o con distinto ricorso notificato alle altre parti.</p><p>4. La domanda cautelare e' improcedibile finche' non e' presentata l'istanza di fissazione dell'udienza di merito, salvo che essa debba essere fissata d'ufficio.</p><p>5. Sulla domanda cautelare il collegio pronuncia nella prima camera di consiglio successiva al ventesimo giorno dal perfezionamento, anche per il destinatario, dell'ultima notificazione e, altresi', al decimo giorno dal deposito del ricorso. Le parti possono depositare memorie e documenti fino a due giorni liberi prima della camera di consiglio.</p><p>6. Ai fini del giudizio cautelare, se la notificazione e' effettuata a mezzo del servizio postale, il ricorrente, se non e' ancora in possesso dell'avviso di ricevimento, puo' provare la data di perfezionamento della notificazione producendo copia dell'attestazione di consegna del servizio di monitoraggio della corrispondenza nel sito internet delle poste. E' fatta salva la prova contraria.</p><p>7. Nella camera di consiglio le parti possono costituirsi e i difensori sono sentiti ove ne facciano richiesta. La trattazione si svolge oralmente e in modo sintetico.</p><p>8. Il collegio, per gravi ed eccezionali ragioni, puo' autorizzare la produzione in camera di consiglio di documenti, con consegna di copia alle altre parti fino all'inizio della discussione.</p><p>9. L'ordinanza cautelare motiva in ordine alla valutazione del pregiudizio allegato e indica i profili che, ad un sommario esame, inducono ad una ragionevole previsione sull'esito del ricorso.</p><p>10. Il tribunale amministrativo regionale, in sede cautelare, se ritiene che le esigenze del ricorrente siano apprezzabili favorevolmente e tutelabili adeguatamente con la sollecita definizione del giudizio nel merito, fissa con ordinanza collegiale la data della discussione del ricorso nel merito. Nello stesso senso puo' provvedere il Consiglio di Stato, motivando sulle ragioni per cui ritiene di riformare l'ordinanza cautelare di primo grado; in tal caso, la pronuncia di appello e' trasmessa al tribunale amministrativo regionale per la sollecita fissazione dell'udienza di merito.</p><p>11. L'ordinanza con cui e' disposta una misura cautelare fissa la data di discussione del ricorso nel merito. In caso di mancata fissazione dell'udienza, il Consiglio di Stato, se conferma in appello la misura cautelare, dispone che il tribunale amministrativo regionale provveda alla fissazione della stessa con priorita'. A tal fine l'ordinanza e' trasmessa a cura della segreteria al primo giudice.</p><p>12. In sede di esame della domanda cautelare il collegio adotta, su istanza di parte, i provvedimenti necessari per assicurare la completezza dell'istruttoria e l'integrita' del contraddittorio.</p><p>13. Il giudice adito puo' disporre misure cautelari solo se ritiene sussistente la propria competenza ai sensi degli articoli 13 e 14; altrimenti provvede ai sensi dell'articolo 15, ((comma 4)) .</p>","notesHtml":""},{"id":"art_56","numText":"Art. 56","group":"Allegato 1 — Codice del processo amministrativo","heading":"Misure cautelari monocratiche","contentHtml":"<p>1. Prima della trattazione della domanda cautelare da parte del collegio, in caso di estrema gravita' ed urgenza, tale da non consentire neppure la dilazione fino alla data della camera di consiglio, il ricorrente puo', con la domanda cautelare o con distinto ricorso notificato alle controparti, chiedere al presidente del tribunale amministrativo regionale, o della sezione cui il ricorso e' assegnato, di disporre misure cautelari provvisorie. La domanda cautelare e' improcedibile finche' non e' presentata l'istanza di fissazione d'udienza per il merito, salvo che essa debba essere fissata d'ufficio. Il presidente provvede sulla domanda solo se ritiene la competenza del tribunale amministrativo regionale, altrimenti rimette le parti al collegio per i provvedimenti di cui all'articolo 55, comma 13.</p><p>2. Il presidente o un magistrato da lui delegato verifica che la notificazione del ricorso si sia perfezionata nei confronti dei destinatari o almeno della parte pubblica e di uno dei controinteressati e provvede con decreto motivato non impugnabile. La notificazione puo' avvenire da parte del difensore anche a mezzo fax. Si applica l'articolo 55, comma 6. Qualora l'esigenza cautelare non consenta l'accertamento del perfezionamento delle notificazioni, per cause non imputabili al ricorrente, il presidente puo' comunque provvedere, fatto salvo il potere di revoca. Ove ritenuto necessario il presidente, fuori udienza e senza formalita', sente, anche separatamente, le parti che si siano rese disponibili prima dell'emanazione del decreto.</p><p>3. Qualora dalla decisione sulla domanda cautelare derivino effetti irreversibili, il presidente puo' subordinare la concessione o il diniego della misura cautelare alla prestazione di una cauzione, anche mediante fideiussione, determinata con riguardo all'entita' degli effetti irreversibili che possono prodursi per le parti e i terzi.</p><p>4. Il decreto, nel quale deve essere comunque indicata la camera di consiglio di cui all'articolo 55, comma 5, in caso di accoglimento e' efficace sino a detta camera di consiglio. Il decreto perde efficacia se il collegio non provvede sulla domanda cautelare nella camera di consiglio di cui al periodo precedente. Fino a quando conserva efficacia, il decreto e' sempre revocabile o modificabile su istanza di parte notificata. A quest'ultima si applica il comma 2.</p><p>5. Se la parte si avvale della facolta' di cui al secondo periodo del comma 2 le misure cautelari perdono efficacia se il ricorso non viene notificato per via ordinaria entro cinque giorni dalla richiesta delle misure cautelari provvisorie.</p>","notesHtml":""},{"id":"art_57","numText":"Art. 57","group":"Allegato 1 — Codice del processo amministrativo","heading":"Spese del procedimento cautelare","contentHtml":"<p>1. Con l'ordinanza che decide sulla domanda il giudice provvede sulle spese della fase cautelare. La pronuncia sulle spese conserva efficacia anche dopo ((il provvedimento)) che definisce il giudizio, salvo diversa statuizione espressa nella sentenza ((di merito)) .</p>","notesHtml":""},{"id":"art_58","numText":"Art. 58","group":"Allegato 1 — Codice del processo amministrativo","heading":"Revoca o modifica delle misure cautelari collegiali e riproposizione della domanda cautelare respinta","contentHtml":"<p>1. Le parti possono riproporre la domanda cautelare al collegio o chiedere la revoca o la modifica del provvedimento cautelare collegiale se si verificano mutamenti nelle circostanze o se allegano fatti anteriori di cui si e' acquisita conoscenza successivamente al provvedimento cautelare. In tale caso, l'istante deve fornire la prova del momento in cui ne e' venuto a conoscenza.</p><p>2. La revoca puo' essere altresi' richiesta nei casi di cui all'articolo 395 del codice di procedura civile.</p>","notesHtml":""},{"id":"art_59","numText":"Art. 59","group":"Allegato 1 — Codice del processo amministrativo","heading":"Esecuzione delle misure cautelari","contentHtml":"<p>1. Qualora i provvedimenti cautelari non siano eseguiti, in tutto o in parte, l'interessato, con istanza motivata e notificata alle altre parti, puo' chiedere al tribunale amministrativo regionale le opportune misure attuative. Il tribunale esercita i poteri inerenti al giudizio di ottemperanza di cui al Titolo I del Libro IV e provvede sulle spese. La liquidazione delle spese operata ai sensi del presente comma prescinde da quella conseguente al giudizio di merito, salvo diversa statuizione espressa nella sentenza.</p>","notesHtml":""},{"id":"art_60","numText":"Art. 60","group":"Allegato 1 — Codice del processo amministrativo","heading":"Definizione del giudizio in esito all'udienza cautelare","contentHtml":"<p>1. In sede di decisione della domanda cautelare, purche' siano trascorsi almeno venti giorni dall'ultima notificazione del ricorso, il collegio, accertata la completezza del contraddittorio e dell'istruttoria, sentite sul punto le parti costituite, puo' definire, in camera di consiglio, il giudizio con sentenza in forma semplificata, salvo che una delle parti dichiari che intende proporre motivi aggiunti, ricorso incidentale o regolamento di competenza, ovvero regolamento di giurisdizione. Se la parte dichiara che intende proporre regolamento di competenza o di giurisdizione, il giudice assegna un termine non superiore a trenta giorni. Ove ne ricorrano i presupposti, il collegio dispone l'integrazione del contraddittorio o il rinvio per consentire la proposizione di motivi aggiunti, ricorso incidentale, regolamento di competenza o di giurisdizione e fissa contestualmente la data per il prosieguo della trattazione.</p>","notesHtml":""},{"id":"art_61","numText":"Art. 61","group":"Allegato 1 — Codice del processo amministrativo","heading":"Misure cautelari anteriori alla causa","contentHtml":"<p>1. In caso di eccezionale gravita' e urgenza, tale da non consentire neppure la previa notificazione del ricorso e la domanda di misure cautelari provvisorie con decreto presidenziale, il soggetto legittimato al ricorso puo' proporre istanza per l'adozione delle misure interinali e provvisorie che appaiono indispensabili durante il tempo occorrente per la proposizione del ricorso di merito e della domanda cautelare in corso di causa.</p><p>2. L'istanza, notificata con le forme prescritte per la notificazione del ricorso, si propone al presidente del tribunale amministrativo regionale competente per il giudizio. Il presidente o un magistrato da lui delegato, accertato il perfezionamento della notificazione per i destinatari, provvede sull'istanza, sentite, ove necessario, le parti e omessa ogni altra formalita'. La notificazione puo' essere effettuata dal difensore a mezzo fax. Qualora l'esigenza cautelare non consenta l'accertamento del perfezionamento delle notificazioni, per cause non imputabili al ricorrente, il presidente puo' comunque provvedere, fatto salvo il potere di revoca da esercitare nelle forme di cui all'articolo 56, comma 4, terzo e quarto periodo.</p><p>3. L'incompetenza del giudice e' rilevabile d'ufficio.</p><p>4. Il decreto che rigetta l'istanza non e' impugnabile; tuttavia la stessa puo' essere riproposta dopo l'inizio del giudizio di merito con le forme delle domande cautelari in corso di causa.</p><p>5. Il provvedimento di accoglimento e' notificato dal richiedente alle altre parti entro il termine perentorio fissato dal giudice, non superiore a cinque giorni. Qualora dall'esecuzione del provvedimento cautelare emanato ai sensi del presente articolo derivino effetti irreversibili il pr
