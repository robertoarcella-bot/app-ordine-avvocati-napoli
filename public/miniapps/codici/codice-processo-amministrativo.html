 ricorso giurisdizionale avverso l'aggiudicazione, ai sensi dell'articolo 18, comma 4, del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022, qualora tale violazione, aggiungendosi a vizi propri dell'aggiudicazione, abbia influito sulle possibilita' del ricorrente di ottenere l'affidamento.</p><p>2. Il giudice precisa, in funzione delle deduzioni delle parti e della valutazione della gravita' della condotta della stazione appaltante o dell'ente concedente e della situazione di fatto, se la declaratoria di inefficacia e' limitata alle prestazioni ancora da eseguire alla data della pubblicazione del dispositivo o se essa opera in via retroattiva.</p><p>3. Il contratto resta efficace, anche in presenza delle violazioni di cui al comma 1, qualora venga accertato che il rispetto di esigenze imperative connesse a un interesse generale imponga che i suoi effetti siano mantenuti. Tra le esigenze imperative rientrano, fra l'altro, quelle imprescindibili di carattere tecnico o di altro tipo, tali da rendere evidente che i residui obblighi contrattuali possono essere rispettati solo dall'esecutore attuale. Gli interessi economici sono presi in considerazione come esigenze imperative solo quando l'inefficacia del contratto condurrebbe a conseguenze sproporzionate, avuto anche riguardo all'eventuale mancata proposizione della domanda di subentro nel contratto nei casi in cui il vizio dell'aggiudicazione non comporta l'obbligo di rinnovare la gara. Non costituiscono esigenze imperative gli interessi economici legati direttamente al contratto, che comprendono fra l'altro i costi derivanti dal ritardo nell'esecuzione del contratto stesso, dalla necessita' di indire una nuova procedura di aggiudicazione, dal cambio dell'operatore economico e dagli obblighi di legge risultanti dalla dichiarazione di inefficacia.</p><p>4. A cura della segreteria, le sentenze che provvedono in applicazione del comma 3 sono trasmesse alla Presidenza del Consiglio dei ministri -Dipartimento per le politiche europee.</p><p>5. Quando, nonostante le violazioni, il contratto e' considerato efficace o l'inefficacia e' temporalmente limitata, si applicano le sanzioni alternative di cui all'articolo 123.</p><p>6. La inefficacia del contratto prevista dal comma 1, lettere a) e b), non si applica quando la stazione appaltante o l'ente concedente ha seguito la seguente procedura: a) con atto motivato anteriore all'avvio della procedura di affidamento ha dichiarato che la procedura senza pubblicazione del bando o avviso con cui si indice una gara ((...)) e' consentita dal codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022; b) rispettivamente per i contratti di rilevanza europea e per quelli sotto soglia, ha pubblicato nella Gazzetta ufficiale dell'Unione europea oppure nella Gazzetta Ufficiale della Repubblica italiana un avviso volontario per la trasparenza preventiva ai sensi dell'articolo 86 del codice dei contratti pubblici, di cui al decreto legislativo di attuazione della legge n. 78 del 2022, in cui manifesta l'intenzione di concludere il contratto; ((49)) c) il contratto non e' stato concluso prima dello scadere di un termine di almeno dieci giorni decorrenti dal giorno successivo alla data di pubblicazione dell'avviso di cui alla lettera b). (46)</p>","notesHtml":"<p>--------------</p><p>AGGIORNAMENTO (46)</p><p>Il D.Lgs. 31 marzo 2023, n. 36 ha disposto (con l'art. 229, comma 2) che la presente modifica acquista efficacia il 1° luglio 2023.</p><p>---------------</p><p>AGGIORNAMENTO (49)</p><p>Il D.Lgs. 31 dicembre 2024, n. 209, nel modificare l'art. 209, comma 1, lettera b) del D.Lgs. 31 marzo 2023, n. 36, ha conseguentemente disposto (con l'art. 61, comma 1, lettera b)) che \"al capoverso Articolo 121, comma 6, le parole: «nella Gazzetta ufficiale dell'Unione europea ovvero nella Gazzetta Ufficiale della Repubblica italiana», ovunque ricorrano, sono soppresse\".</p>"},{"id":"art_122","numText":"Art. 122","group":"Allegato 1 — Codice del processo amministrativo","heading":"Inefficacia del contratto negli altri casi","contentHtml":"<p>1. Fuori dei casi indicati dall'articolo 121, comma 1, e dall'articolo 123, comma 3, il giudice che annulla l'aggiudicazione definitiva stabilisce se dichiarare inefficace il contratto, fissandone la decorrenza, tenendo conto, in particolare, degli interessi delle parti, dell'effettiva possibilita' per il ricorrente di conseguire l'aggiudicazione alla luce dei vizi riscontrati, dello stato di esecuzione del contratto e della possibilita' di subentrare nel contratto, nei casi in cui il vizio dell'aggiudicazione non comporti l'obbligo di rinnovare la gara e la domanda di subentrare sia stata proposta.</p>","notesHtml":""},{"id":"art_123","numText":"Art. 123","group":"Allegato 1 — Codice del processo amministrativo","heading":"Sanzioni alternative","contentHtml":"<p>1. Nei casi ((di cui all'articolo 121, comma 5)) , il giudice amministrativo individua le seguenti sanzioni alternative da applicare alternativamente o cumulativamente: ((46)) a) la sanzione pecuniaria nei confronti della stazione appaltante, di importo dallo 0,5% al 5% del valore del contratto, inteso come prezzo di aggiudicazione, che e' versata all'entrata del bilancio dello Stato - con imputazione al capitolo 2301, capo 8 \"Multe, ammende e sanzioni amministrative inflitte dalle autorita' giudiziarie ed amministrative, con esclusione di quelle aventi natura tributaria\" - entro sessanta giorni dal passaggio in giudicato della sentenza che irroga sanzione; decorso il termine per il versamento, si applica una maggiorazione pari ad un decimo della sanzione per ogni semestre di ritardo. La sentenza che applica le sanzioni e' comunicata, a cura della segreteria, al Ministero dell'economia e delle finanze entro cinque giorni dalla pubblicazione; b) la riduzione della durata del contratto, ove possibile, da un minimo del dieci per cento ad un massimo del cinquanta per cento della durata residua alla data di pubblicazione del dispositivo.</p><p>2. Il giudice amministrativo applica le sanzioni assicurando il rispetto del principio del contraddittorio e ne determina la misura in modo che siano effettive, dissuasive, proporzionate al valore del contratto, alla gravita' della condotta della stazione appaltante e all'opera svolta dalla stazione appaltante per l'eliminazione o attenuazione delle conseguenze della violazione. A tal fine si applica l'articolo 73, comma 3. In ogni caso l'eventuale condanna al risarcimento dei danni non costituisce sanzione alternativa e si cumula con le sanzioni alternative.</p><p>3. Il giudice applica le sanzioni di cui al comma 1 anche qualora il contratto e' stato stipulato senza rispettare il termine dilatorio stabilito per la stipulazione del contratto, ovvero e' stato stipulato senza rispettare la sospensione della stipulazione derivante dalla proposizione del ricorso giurisdizionale avverso l'aggiudicazione definitiva, quando la violazione non abbia privato il ricorrente della possibilita' di avvalersi di mezzi di ricorso prima della stipulazione del contratto e non abbia influito sulle possibilita' del ricorrente di ottenere l'affidamento. ((46))</p>","notesHtml":"<p>--------------</p><p>AGGIORNAMENTO (46)</p><p>Il D.Lgs. 31 marzo 2023, n. 36 ha disposto (con l'art. 229, comma 2) che la presente modifica acquista efficacia il 1° luglio 2023.</p>"},{"id":"art_124","numText":"Art. 124","group":"Allegato 1 — Codice del processo amministrativo","heading":"","contentHtml":"<p>(( (Tutela in forma specifica e per equivalente) )) ((1. L'accoglimento della domanda di conseguire l'aggiudicazione e di stipulare il contratto e' comunque condizionato alla dichiarazione di inefficacia del contratto ai sensi degli articoli 121, comma 1, e 122. Se non dichiara l'inefficacia del contratto, il giudice dispone il risarcimento per equivalente del danno subito e provato. Il giudice conosce anche delle azioni risarcitorie e di quelle di rivalsa proposte dalla stazione appaltante nei confronti dell'operatore economico che, con un comportamento illecito, ha concorso a determinare un esito della gara illegittimo.</p><p>2. La condotta processuale della parte che, senza giustificato motivo, non ha proposto la domanda di cui al comma 1, o non si e' resa disponibile a subentrare nel contratto, e' valutata dal giudice ai sensi dell'articolo 1227 del codice civile.</p><p>3. Ai sensi dell'articolo 34, comma 4, il giudice individua i criteri di liquidazione del danno e assegna un termine entro il quale la parte danneggiante deve formulare una proposta risarcitoria. La mancata formulazione della proposta nel termine assegnato o la significativa differenza tra l'importo indicato nella proposta e quello liquidato nella sentenza resa sull'eventuale giudizio di ottemperanza costituiscono elementi valutativi ai fini della regolamentazione delle spese di lite in tale giudizio, fatto salvo quanto disposto dall'articolo 91, primo comma, del codice di procedura civile.)) ((46))</p>","notesHtml":"<p>--------------</p><p>AGGIORNAMENTO (46)</p><p>Il D.Lgs. 31 marzo 2023, n. 36 ha disposto (con l'art. 229, comma 2) che la presente modifica acquista efficacia il 1° luglio 2023.</p>"},{"id":"art_125","numText":"Art. 125","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ulteriori disposizioni processuali per le controversie relative a infrastrutture strategiche","contentHtml":"<p>1. Nei giudizi che riguardano le procedure di progettazione, approvazione, e realizzazione delle infrastrutture e degli insediamenti produttivi e relative attivita' di espropriazione, occupazione e asservimento, di cui alla parte II, titolo III, capo IV del decreto legislativo 12 aprile 2006, n. 163, oltre alle disposizioni del presente Capo, con esclusione dell'articolo 122, si applicano le seguenti previsioni.</p><p>2. In sede di pronuncia del provvedimento cautelare, si tiene conto delle probabili conseguenze del provvedimento stesso per tutti gli interessi che possono essere lesi, nonche' del preminente interesse nazionale alla sollecita realizzazione dell'opera, e, ai fini dell'accoglimento della domanda cautelare, si valuta anche la irreparabilita' del pregiudizio per il ricorrente, il cui interesse va comunque comparato con quello del soggetto aggiudicatore alla celere prosecuzione delle procedure.</p><p>3. Ferma restando l'applicazione degli articoli 121 e 123, al di fuori dei casi in essi contemplati la sospensione o l'annullamento dell'affidamento non comporta la caducazione del contratto gia' stipulato, e il risarcimento del danno eventualmente dovuto avviene solo per equivalente. Si applica l'articolo 34, comma 3. ((4. Le disposizioni del comma 3 si applicano anche alle controversie relative: a) alle procedure di cui all'articolo 140 del decreto legislativo 12 aprile 2006, n. 163; b) alle procedure di progettazione, approvazione e realizzazione degli interventi individuati nel contratto istituzionale di sviluppo ai sensi dell'articolo 6 del decreto legislativo 31 maggio 2011, n. 88; c) alle opere di cui all'articolo 32, comma 18, del decreto-legge 6 luglio 2011, n. 98 convertito in legge 15 luglio 2011, n. 111)) .</p>","notesHtml":""},{"id":"art_126","numText":"Art. 126","group":"Allegato 1 — Codice del processo amministrativo","heading":"Ambito della giurisdizione sul contenzioso elettorale","contentHtml":"<p>1. Il giudice amministrativo ha giurisdizione in materia di operazioni elettorali relative al rinnovo degli organi elettivi dei comuni, delle province, delle regioni e all'elezione dei membri del Parlamento europeo spettanti all'Italia.</p>","notesHtml":""},{"id":"art_127","numText":"Art. 127","group":"Allegato 1 — Codice del processo amministrativo","heading":"Esenzione dagli oneri fiscali","contentHtml":"<p>1. Gli atti sono esenti dal contributo unificato e da ogni altro onere fiscale.</p>","notesHtml":""},{"id":"art_128","numText":"Art. 128","group":"Allegato 1 — Codice del processo amministrativo","heading":"Inammissibilita' del ricorso straordinario al Presidente della Repubblica","contentHtml":"<p>1. Nella materia di cui al presente Titolo non e' ammesso il ricorso straordinario al Presidente della Repubblica.</p>","notesHtml":""},{"id":"art_129","numText":"Art. 129","group":"Allegato 1 — Codice del processo amministrativo","heading":"Giudizio avverso gli atti di esclusione dal procedimento preparatorio per le elezioni comunali, provinciali e regionali","contentHtml":"<p>1. I provvedimenti immediatamente lesivi del diritto del ricorrente a partecipare al procedimento elettorale preparatorio per le elezioni comunali, provinciali e regionali e per il rinnovo dei membri del Parlamento europeo spettanti all'Italia sono impugnabili innanzi al tribunale amministrativo regionale competente nel termine di tre giorni dalla pubblicazione, anche mediante affissione, ovvero dalla comunicazione, se prevista, degli atti impugnati.</p><p>2. Gli atti diversi da quelli di cui al comma 1 sono impugnati alla conclusione del procedimento unitamente all'atto di proclamazione degli eletti.</p><p>3. Il ricorso di cui al comma 1, nel termine ivi previsto, deve essere, a pena di decadenza: a) notificato, direttamente dal ricorrente o dal suo difensore, esclusivamente mediante consegna diretta, posta elettronica certificata o fax, all'ufficio che ha emanato l'atto impugnato, alla Prefettura e, ove possibile, agli eventuali controinteressati; in ogni caso, l'ufficio che ha emanato l'atto impugnato rende pubblico il ricorso mediante affissione di una sua copia integrale in appositi spazi all'uopo destinati sempre accessibili al pubblico e tale pubblicazione ha valore di notifica per pubblici proclami per tutti i controinteressati; la notificazione si ha per avvenuta il giorno stesso della predetta affissione; b) depositato presso la segreteria del tribunale adito, che provvede a pubblicarlo sul sito internet della giustizia amministrativa e ad affiggerlo in appositi spazi accessibili al pubblico.</p><p>4. Le parti , ove stiano in giudizio personalmente e non siano titolari di indirizzi di posta elettronica certificata risultanti dai pubblici elenchi, indicano, rispettivamente nel ricorso o negli atti di costituzione, l'indirizzo di posta elettronica certificata o il numero di fax da valere per ogni eventuale comunicazione e notificazione. (15) ((21))</p><p>5. L'udienza di discussione si celebra, senza possibilita' di rinvio anche in presenza di ricorso incidentale, nel termine di tre giorni dal deposito del ricorso, senza avvisi. Alla notifica del ricorso incidentale si provvede con le forme previste per il ricorso principale.</p><p>6. Il giudizio e' deciso all'esito dell'udienza con sentenza in forma semplificata, da pubblicarsi nello stesso giorno. La relativa motivazione puo' consistere anche in un mero richiamo delle argomentazioni contenute negli scritti delle parti che il giudice ha inteso accogliere e fare proprie.</p><p>7. La sentenza non appellata e' comunicata senza indugio dalla segreteria del tribunale all'ufficio che ha emanato l'atto impugnato.</p><p>8. Il ricorso di appello, nel termine di due giorni dalla pubblicazione della sentenza, deve essere, a pena di decadenza: a) notificato, direttamente dal ricorrente o dal suo difensore, esclusivamente mediante consegna diretta, posta elettronica certificata o fax, all'ufficio che ha emanato l'atto impugnato, alla Prefettura e, ove possibile, agli eventuali controinteressati; in ogni caso, l'ufficio che ha emanato l'atto impugnato rende pubblico il ricorso mediante affissione di una sua copia integrale in appositi spazi all'uopo destinati sempre accessibili al pubblico e tale pubblicazione ha valore di notifica per pubblici proclami per tutti i controinteressati; la notificazione si ha per avvenuta il giorno stesso della predetta affissione; per le parti costituite nel giudizio di primo grado la trasmissione si effettua presso l'indirizzo di posta elettronica certificata o il numero di fax indicato negli atti difensivi ai sensi del comma 4; b) depositato in copia presso il tribunale amministrativo regionale che ha emesso la sentenza di primo grado, il quale provvede ad affiggerlo in appositi spazi accessibili al pubblico; c) depositato presso la segreteria del Consiglio di Stato, che provvede a pubblicarlo nel sito internet della giustizia amministrativa e ad affiggerlo in appositi spazi accessibili al pubblico.</p><p>9. Nel giudizio di appello si applicano le disposizioni del presente articolo.</p><p>10. Nei giudizi di cui al comma 1 non si applicano le disposizioni di cui agli articoli 52, comma 5, e 54, commi 1 e 2.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (15)</p><p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 20, comma 1-bis) che la modifica del comma 4 del presente articolo decorre dall'entrata in vigore del processo amministrativo telematico.</p><p>-----------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, nel modificare l'art. 20, comma 1-bis del D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha conseguentemente disposto (con l'art. 7, comma 3) che la modifica del comma 4 del presente articolo ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_130","numText":"Art. 130","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procedimento in primo grado in relazione alle operazioni elettorali di comuni, province, regioni e Parlamento europeo","contentHtml":"<p>1. Salvo quanto disposto nel Capo II del presente Titolo, contro tutti gli atti del procedimento elettorale successivi all'emanazione dei comizi elettorali e' ammesso ricorso soltanto alla conclusione del procedimento elettorale, unitamente all'impugnazione dell'atto di proclamazione degli eletti: a) quanto alle elezioni di comuni, province e regioni, da parte di qualsiasi candidato o elettore dell'ente della cui elezione si tratta, al tribunale amministrativo regionale nella cui circoscrizione ha sede il predetto ente territoriale, da depositare nella segreteria del tribunale adito entro il termine di trenta giorni dalla proclamazione degli eletti; b) quanto alle elezioni dei membri del Parlamento europeo spettanti all'Italia, da parte di qualsiasi candidato o elettore, davanti al Tribunale amministrativo regionale del Lazio, sede di Roma, da depositare nella relativa segreteria entro il termine di trenta giorni dalla pubblicazione nella Gazzetta Ufficiale dell'elenco dei candidati proclamati eletti.</p><p>2. Il presidente, con decreto: a) fissa l'udienza di discussione della causa in via di urgenza; b) designa il relatore; c) ordina le notifiche, autorizzando, ove necessario, qualunque mezzo idoneo; d) ordina il deposito di documenti e l'acquisizione di ogni altra prova necessaria; e) ordina che a cura della segreteria il decreto sia immediatamente comunicato, con ogni mezzo utile, al ricorrente.</p><p>3. Il ricorso e' notificato, unitamente al decreto di fissazione dell'udienza, a cura di chi lo ha proposto, entro dieci giorni dalla data della comunicazione del decreto di cui al comma 2: a) all'ente della cui elezione si tratta, in caso di elezioni di comuni, province, regioni; b) all'Ufficio elettorale centrale nazionale, in caso di elezioni dei membri del Parlamento europeo spettanti all'Italia; c) alle altre parti che vi hanno interesse, e comunque ad almeno un controinteressato.</p><p>4. Entro dieci giorni dall'ultima notificazione di cui al comma 3, il ricorrente deposita nella segreteria del tribunale la copia del ricorso e del decreto, con la prova dell'avvenuta notificazione, insieme con gli atti e documenti del giudizio.</p><p>5. L'amministrazione resistente e i controinteressati depositano nella segreteria le proprie controdeduzioni nei quindici giorni successivi a quello in cui la notificazione si e' perfezionata nei loro confronti.</p><p>6. All'esito dell'udienza, il collegio, sentite le parti se presenti, pronuncia la sentenza.</p><p>7. La sentenza e' pubblicata entro il giorno successivo alla decisione della causa. Se la complessita' delle questioni non consente la pubblicazione della sentenza, nello stesso termine di cui al periodo precedente e' pubblicato il dispositivo mediante deposito in segreteria. In tal caso la sentenza e' pubblicata entro i dieci giorni successivi.</p><p>8. La sentenza e' immediatamente trasmessa in copia, a cura della segreteria del tribunale amministrativo regionale, al Sindaco, alla giunta provinciale, alla giunta regionale, al presidente dell'ufficio elettorale nazionale, a seconda dell'ente cui si riferisce l'elezione. Il comune, la provincia o la regione della cui elezione si tratta provvede, entro ventiquattro ore dal ricevimento, alla pubblicazione per quindici giorni del dispositivo della sentenza nell'albo o bollettino ufficiale dell'ente interessato a mezzo del segretario che ne e' diretto responsabile. In caso di elezioni relative a comuni, province o regioni, la sentenza e' comunicata anche al Prefetto. Ai medesimi incombenti si provvede dopo il passaggio in giudicato della sentenza annotando sulla copia pubblicata la sua definitivita'.</p><p>9. Il tribunale amministrativo regionale, quando accoglie il ricorso, corregge il risultato delle elezioni e sostituisce ai candidati illegittimamente proclamati coloro che hanno diritto di esserlo. In caso di ricorso avverso le operazioni elettorali inerenti il Parlamento europeo, i voti delle sezioni le cui operazioni sono state annullate non hanno effetto.</p><p>10. Tutti i termini processuali diversi da quelli indicati nel presente articolo e nell'articolo 131 sono dimezzati rispetto ai termini del processo ordinario.</p><p>11. L'ente comunale, provinciale o regionale, della cui elezione si tratta, comunica agli interessati la correzione del risultato elettorale. L'Ufficio elettorale nazionale comunica la correzione del risultato elettorale agli interessati e alla segreteria del Parlamento europeo.</p>","notesHtml":""},{"id":"art_131","numText":"Art. 131","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procedimento in appello in relazione alle operazioni elettorali di comuni, province e regioni","contentHtml":"<p>1. L'appello avverso le sentenze di cui all'articolo 130 e' proposto entro il termine di venti giorni dalla notifica della sentenza, per coloro nei cui confronti e' obbligatoria la notifica; per gli altri candidati o elettori nel termine di venti giorni decorrenti dall'ultimo giorno della pubblicazione della sentenza medesima nell'albo pretorio del comune.</p><p>2. Il presidente fissa in via d'urgenza l'udienza di discussione. Al giudizio si applicano le norme che regolano il processo di appello innanzi al Consiglio di Stato, e i relativi termini sono dimezzati rispetto a quelli del giudizio ordinario.</p><p>3. La sentenza, quando, in riforma di quella di primo grado, accoglie il ricorso originario, provvede ai sensi dell'articolo 130, comma 9.</p><p>4. La sentenza e' immediatamente trasmessa in copia, a cura della segreteria del Consiglio di Stato, ai soggetti di cui all'articolo 130, comma 8, i quali provvedono agli ulteriori incombenti ivi previsti e a quelli di cui al comma 11 dello stesso articolo 130.</p>","notesHtml":""},{"id":"art_132","numText":"Art. 132","group":"Allegato 1 — Codice del processo amministrativo","heading":"Procedimento in appello in relazione alle operazioni elettorali del Parlamento europeo","contentHtml":"<p>1. Le parti del giudizio di primo grado possono proporre appello mediante dichiarazione da presentare presso la segreteria del tribunale amministrativo regionale che ha pronunciato la sentenza, entro il termine di cinque giorni decorrenti dalla pubblicazione della sentenza o, in mancanza, del dispositivo.</p><p>2. L'atto di appello contenente i motivi deve essere depositato entro il termine di trenta giorni decorrenti dalla ricezione dell'avviso di pubblicazione della sentenza.</p><p>3. Per quanto non disposto dal presente articolo si applicano le norme dell'articolo 131.</p>","notesHtml":""},{"id":"art_133","numText":"Art. 133","group":"Allegato 1 — Codice del processo amministrativo","heading":"Materie di giurisdizione esclusiva","contentHtml":"<p>1. Sono devolute alla giurisdizione esclusiva del giudice amministrativo, salvo ulteriori previsioni di legge: a) le controversie in materia di: 1) risarcimento del danno ingiusto cagionato in conseguenza dell'inosservanza dolosa o colposa del termine di conclusione del procedimento amministrativo; 2) formazione, conclusione ed esecuzione degli accordi integrativi o sostitutivi di provvedimento amministrativo e degli accordi fra pubbliche amministrazioni; 3) silenzio di cui all'articolo 31, commi 1, 2 e 3, e provvedimenti espressi adottati in sede di verifica di segnalazione certificata, denuncia e dichiarazione di inizio attivita', di cui all'articolo 19, comma 6-ter, della legge 7 agosto 1990, n. 241; 4) determinazione e corresponsione dell'indennizzo dovuto in caso di revoca del provvedimento amministrativo; 5) nullita' del provvedimento amministrativo adottato in violazione o elusione del giudicato; 6) diritto di accesso ai documenti amministrativi e violazione degli obblighi di trasparenza amministrativa; a-bis) le controversie relative all'applicazione dell'articolo 20 della legge 7 agosto 1990, n. 241; b) le controversie aventi ad oggetto atti e provvedimenti relativi a rapporti di concessione di beni pubblici, ad eccezione delle controversie concernenti indennita', canoni ed altri corrispettivi e quelle attribuite ai tribunali delle acque pubbliche e al Tribunale superiore delle acque pubbliche; c) le controversie in materia di pubblici servizi relative a concessioni di pubblici servizi, escluse quelle concernenti indennita', canoni ed altri corrispettivi, ovvero relative a provvedimenti adottati dalla pubblica amministrazione o dal gestore di un pubblico servizio in un procedimento amministrativo, ovvero ancora relative all'affidamento di un pubblico servizio, ed alla vigilanza e controllo nei confronti del gestore, nonche' afferenti alla vigilanza sul credito, sulle assicurazioni e sul mercato mobiliare, al servizio farmaceutico, ai trasporti, alle telecomunicazioni e ai servizi di pubblica utilita'; d) le controversie concernenti l'esercizio del diritto a chiedere e ottenere l'uso delle tecnologie telematiche nelle comunicazioni con le pubbliche amministrazioni e con i gestori di pubblici servizi statali; e) le controversie: 1) relative a procedure di affidamento di pubblici lavori, servizi, forniture, svolte da soggetti comunque tenuti, nella scelta del contraente o del socio, all'applicazione della normativa comunitaria ovvero al rispetto dei procedimenti di evidenza pubblica previsti dalla normativa statale o regionale, ivi incluse quelle risarcitorie e con estensione della giurisdizione esclusiva alla dichiarazione di inefficacia del contratto a seguito di annullamento dell'aggiudicazione ed alle sanzioni alternative; 2) relative al divieto di rinnovo tacito dei contratti pubblici di lavori, servizi, forniture, relative alla clausola di revisione del prezzo e al relativo provvedimento applicativo nei contratti ad esecuzione continuata o periodica, nell'ipotesi di cui all'articolo 115 del decreto legislativo 12 aprile 2006, n. 163, nonche' quelle relative ai provvedimenti applicativi dell'adeguamento dei prezzi ai sensi dell'articolo 133, commi 3 e 4, dello stesso decreto; f) le controversie aventi ad oggetto gli atti e i provvedimenti delle pubbliche amministrazioni in materia urbanistica e edilizia, concernente tutti gli aspetti dell'uso del territorio, e ferme restando le giurisdizioni del Tribunale superiore delle acque pubbliche e del Commissario liquidatore per gli usi civici, nonche' del giudice ordinario per le controversie riguardanti la determinazione e la corresponsione delle indennita' in conseguenza dell'adozione di atti di natura espropriativa o ablativa; g) le controversie aventi ad oggetto gli atti, i provvedimenti, gli accordi e i comportamenti, riconducibili, anche mediatamente, all'esercizio di un pubblico potere, delle pubbliche amministrazioni in materia di espropriazione per pubblica utilita', ferma restando la giurisdizione del giudice ordinario per quelle riguardanti la determinazione e la corresponsione delle indennita' in conseguenza dell'adozione di atti di natura espropriativa o ablativa; h) le controversie aventi ad oggetto i decreti di espropriazione per causa di pubblica utilita' delle invenzioni industriali; i) le controversie relative ai rapporti di lavoro del personale in regime di diritto pubblico; l) le controversie aventi ad oggetto tutti i provvedimenti, compresi quelli sanzionatori ed esclusi quelli inerenti ai rapporti di impiego privatizzati, adottati dalla Banca d'Italia, dagli Organismi di cui agli articoli 112-bis, 113 e 128-duodecies del decreto legislativo 1° settembre 1993, n. 385, dall'Autorita' garante della concorrenza e del mercato, dall'Autorita' per le garanzie nelle comunicazioni, dall'Autorita' per l'energia elettrica e il gas, e dalle altre Autorita' istituite ai sensi della legge 14 novembre 1995, n. 481, dall'Autorita' per la vigilanza sui contratti pubblici di lavori, servizi e forniture, dalla Commissione vigilanza fondi pensione, dalla Commissione per la valutazione, la trasparenza e l'integrita' della pubblica amministrazione, dall'Istituto per la vigilanza sulle assicurazioni private, comprese le controversie relative ai ricorsi avverso gli atti che applicano le sanzioni ai sensi dell'articolo 326 del decreto legislativo 7 settembre 2005, n. 209 ((, e dall'Agenzia per la cybersicurezza nazionale)) ; (6) (11) m) le controversie aventi ad oggetto i provvedimenti in materia di comunicazioni elettroniche, compresi quelli relativi all'imposizione di servitu', nonche' i giudizi riguardanti l'assegnazione di diritti d'uso delle frequenze, la gara e le altre procedure di cui ai commi da 8 a 13 dell'articolo 1 della legge 13 dicembre 2010, n. 220, incluse le procedure di cui all'articolo 4 del decreto-legge 31 marzo 2011, n. 34, convertito, con modificazioni, dalla legge 26 maggio 2011, n. 75; n) le controversie relative alle sanzioni amministrative ed ai provvedimenti adottati dall'organismo di regolazione competente in materia di infrastrutture ferroviarie ai sensi dell'articolo 37 del decreto legislativo 8 luglio 2003, n. 188; o) le controversie, incluse quelle risarcitorie, attinenti alle procedure e ai provvedimenti della pubblica amministrazione concernenti la produzione di energia, i rigassificatori, i gasdotti di importazione, le centrali termoelettriche e quelle relative ad infrastrutture di trasporto ricomprese o da ricomprendere nella rete di trasmissione nazionale o rete nazionale di gasdotti; p) le controversie aventi ad oggetto le ordinanze e i provvedimenti commissariali adottati in tutte le situazioni di emergenza dichiarate ai sensi dell'articolo 5, comma 1, della legge 24 febbraio 1992, n. 225, nonche' gli atti, i provvedimenti e le ordinanze emanati ai sensi dell'articolo 5, commi 2 e 4 della medesima legge n. 225 del 1992 e le controversie comunque attinenti alla complessiva azione di gestione del ciclo dei rifiuti, seppure posta in essere con comportamenti della pubblica amministrazione riconducibili, anche mediatamente, all'esercizio di un pubblico potere, quand'anche relative a diritti costituzionalmente tutelati;(24) q) le controversie aventi ad oggetto i provvedimenti anche contingibili ed urgenti, emanati dal Sindaco in materia di ordine e sicurezza pubblica, di incolumita' pubblica e di sicurezza urbana, di edilita' e di polizia locale, d'igiene pubblica e dell'abitato; r) le controversie aventi ad oggetto i provvedimenti relativi alla disciplina o al divieto dell'esercizio d'industrie insalubri o pericolose; s) le controversie aventi ad oggetto atti e provvedimenti adottati in violazione delle disposizioni in materia di danno all'ambiente, nonche' avverso il silenzio inadempimento del Ministro dell'ambiente e della tutela del territorio e del mare e per il risarcimento del danno subito a causa del ritardo nell'attivazione, da parte del medesimo Ministro, delle misure di precauzione, di prevenzione o di contenimento del danno ambientale, nonche' quelle inerenti le ordinanze ministeriali di ripristino ambientale e di risarcimento del danno ambientale; t) le controversie relative all'applicazione del prelievo supplementare nel settore del latte e dei prodotti lattiero-caseari; u) le controversie aventi ad oggetto i provvedimenti in materia di passaporti; v) le controversie tra lo Stato e i suoi creditori riguardanti l'interpretazione dei contratti aventi per oggetto i titoli di Stato o le leggi relative ad essi o comunque sul debito pubblico; z) le controversie aventi ad oggetto atti del Comitato olimpico nazionale italiano o delle Federazioni sportive non riservate agli organi di giustizia dell'ordinamento sportivo ed escluse quelle inerenti i rapporti patrimoniali tra societa', associazioni e atleti. z-bis) le controversie aventi ad oggetto tutti i provvedimenti, compresi quelli sanzionatori ed esclusi quelli inerenti i rapporti di impiego, adottati dall'Agenzia nazionale di regolamentazione del settore postale di cui alla lettera h) del comma 2 dell'articolo 37 della legge 4 giugno 2010, n. 96. z-ter) le controversie aventi ad oggetto i provvedimenti dell'Agenzia nazionale per la regolazione e la vigilanza in materia di acqua istituita dall'articolo 10, comma 11, del decreto-legge 13 maggio 2011, n. 70, convertito, con modificazioni, dalla legge 12 luglio 2011, n. 106; z-quater) le controversie aventi ad oggetto i provvedimenti adottati ai sensi dell'articolo 3, comma 2, del decreto legislativo 6 settembre 2011, n. 149; z-quinquies) le controversie relative all'esercizio dei poteri speciali inerenti alle attivita' di rilevanza strategica nei settori della difesa e della sicurezza nazionale e nei settori dell'energia, dei trasporti e delle comunicazioni; z-sexies) le controversie relative agli atti ed ai provvedimenti che concedono aiuti di Stato in violazione dell'articolo 108, paragrafo 3, del Trattato sul funzionamento dell'Unione europea e le controversie aventi ad oggetto gli atti e i provvedimenti adottati in esecuzione di una decisione di recupero di cui all'articolo 16 del regolamento (UE) 2015/1589 del Consiglio, del 13 luglio 2015, a prescindere dalla forma dell'aiuto e dal soggetto che l'ha concesso.(20) z-septies) le controversie relative ai provvedimenti di ammissione ed esclusione dalle competizioni professionistiche delle societa' o associazioni sportive professionistiche, o comunque incidenti sulla partecipazione a competizioni professionistiche. (26) z-octies) le controversie relative alle procedure di risanamento e risoluzione delle controparti centrali di cui al regolamento (UE) 2021/23.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (6)</p><p>La Corte Costituzionale, con sentenza 20 - 27 giugno 2012, n. 162 (in G.U. 1a s.s. 4/7/2012, n. 27) ha dichiarato \"l'illegittimita' costituzionale degli articoli 133, comma 1, lettera l), 135, comma 1, lettera c), e 134, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo con cognizione estesa al merito e alla competenza funzionale del TAR Lazio - sede di Roma, le controversie in materia di sanzioni irrogate dalla Commissione nazionale per le societa' e la borsa (CONSOB), e dell'art. 4, comma 1, numero 19), dell'Allegato numero 4, del medesimo d.lgs. n. 104 del 2010\".</p><p>-------------</p><p>AGGIORNAMENTO (11)</p><p>La Corte Costituzionale, con sentenza 9 - 15 aprile 2014, n. 94 (in G.U. 1a s.s. 23/4/2014, n. 18) ha dichiarato \"l'illegittimita' costituzionale degli artt. 133, comma 1, lettera l), 134, comma 1, lettera c), e 135, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo, con cognizione estesa al merito, e alla competenza funzionale del Tribunale amministrativo regionale per il Lazio - sede di Roma le controversie in materia di sanzioni irrogate dalla Banca d'Italia\".</p><p>---------------</p><p>AGGIORNAMENTO (20)</p><p>La L. 7 luglio 2016, n. 122, nel modificare l'art. 49, comma 2 della L. 24 dicembre 2012, n. 234, ha conseguentemente disposto (con l'art. 35, comma 4) che la presente modifica si applica alle decisioni di recupero notificate a decorrere dal 1° gennaio 2015.</p><p>---------------</p><p>AGGIORNAMENTO (24)</p><p>Il D.Lgs. 2 gennaio 2018, n. 1 ha disposto (con l'art. 47, comma 1, lettera i)) che \"Tutti i riferimenti alla legge 24 febbraio 1992, n. 225 e ai relativi articoli, contenuti in altre disposizioni, si intendono riferiti al presente decreto e ai corrispondenti articoli.</p><p>In particolare:</p><p>[...]</p><p>i) l'articolo 5 della legge n. 225 del 1992, citato negli articoli 119, comma 1, 133, comma 1, e nell'articolo 135, comma 1, del decreto legislativo 2 luglio 2010, n. 104, deve intendersi riferito agli articoli 24, 25 e 26 del presente decreto\".</p><p>---------------</p><p>AGGIORNAMENTO (26)</p><p>La L. 30 dicembre 2018, n. 145 ha disposto (con l'art. 1, comma 650) che \"Le disposizioni di cui ai commi da 647 a 649 si applicano anche ai processi ed alle controversie in corso alla data di entrata in vigore della presente legge\".</p>"},{"id":"art_134","numText":"Art. 134","group":"Allegato 1 — Codice del processo amministrativo","heading":"Materie di giurisdizione estesa al merito","contentHtml":"<p>1. Il giudice amministrativo esercita giurisdizione con cognizione estesa al merito nelle controversie aventi ad oggetto: a) l'attuazione delle pronunce giurisdizionali esecutive o del giudicato nell'ambito del giudizio di cui al Titolo I del Libro IV; b) gli atti e le operazioni in materia elettorale, attribuiti alla giurisdizione amministrativa; c) le sanzioni pecuniarie la cui contestazione e' devoluta alla giurisdizione del giudice amministrativo, comprese quelle applicate dalle Autorita' amministrative indipendenti e quelle previste dall'articolo 123; (6) (11) d) le contestazioni sui confini degli enti territoriali; e) il diniego di rilascio di nulla osta cinematografico di cui all'articolo 8 della legge 21 novembre 1962, n. 161. ((23))</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (6)</p><p>La Corte Costituzionale, con sentenza 20 - 27 giugno 2012, n. 162 (in G.U. 1a s.s. 4/7/2012, n. 27) ha dichiarato \"l'illegittimita' costituzionale degli articoli 133, comma 1, lettera l), 135, comma 1, lettera c), e 134, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo con cognizione estesa al merito e alla competenza funzionale del TAR Lazio - sede di Roma, le controversie in materia di sanzioni irrogate dalla Commissione nazionale per le societa' e la borsa (CONSOB), e dell'art. 4, comma 1, numero 19), dell'Allegato numero 4, del medesimo d.lgs. n. 104 del 2010\".</p><p>-------------</p><p>AGGIORNAMENTO (11)</p><p>La Corte Costituzionale, con sentenza 9 - 15 aprile 2014, n. 94 (in G.U. 1a s.s. 23/4/2014, n. 18) ha dichiarato \"l'illegittimita' costituzionale degli artt. 133, comma 1, lettera l), 134, comma 1, lettera c), e 135, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo, con cognizione estesa al merito, e alla competenza funzionale del Tribunale amministrativo regionale per il Lazio - sede di Roma le controversie in materia di sanzioni irrogate dalla Banca d'Italia\".</p><p>---------------</p><p>AGGIORNAMENTO (23)</p><p>Il D.Lgs. 7 dicembre 2017, n. 203 ha disposto (con l'art. 13, comma 2, lettera b)) che \"A decorrere dalla medesima data di cui al comma 1:</p><p>[...]</p><p>b) la lettera e) del comma 1 dell'articolo 134 del decreto legislativo 2 luglio 2010, n. 104, e' sostituita dalla seguente: «e) la classificazione delle opere cinematografiche per la visione dei minori di cui al decreto legislativo attuativo della delega di cui all'articolo 33 della legge 14 novembre 2016, n. 220.\"</p>"},{"id":"art_135","numText":"Art. 135","group":"Allegato 1 — Codice del processo amministrativo","heading":"Competenza funzionale inderogabile del Tribunale amministrativo regionale del Lazio, sede di Roma","contentHtml":"<p>1. Sono devolute alla competenza inderogabile del Tribunale amministrativo regionale del Lazio, sede di Roma, salvo ulteriori previsioni di legge: a) le controversie relative ai provvedimenti riguardanti i magistrati ordinari adottati ai sensi dell'articolo 17, primo comma, della legge 24 marzo 1958, n. 195, nonche' quelle relative ai provvedimenti riguardanti i magistrati amministrativi adottati dal Consiglio di Presidenza della Giustizia Amministrativa; b) le controversie aventi ad oggetto i provvedimenti dell'Autorita' garante per la concorrenza ed il mercato e quelli dell'Autorita' per le garanzie nelle comunicazioni; c) le controversie di cui all'articolo 133, comma 1, lettera l), fatta eccezione per quelle di cui all'articolo 14, comma 2, nonche' le controversie di cui all'articolo 104, comma 2, del testo unico delle leggi in materia bancaria e creditizia, di cui al decreto legislativo 1° settembre 1993, n. 385; (6) (11) d) le controversie contro i provvedimenti ministeriali di cui all'articolo 133, comma 1, lettera m), nonche' i giudizi riguardanti l'assegnazione di diritti d'uso delle frequenze, la gara e le altre procedure di cui ai commi da 8 al 13 dell'articolo 1, della legge 13 dicembre 2010, n. 220, incluse le procedure di cui all'articolo 4 del decreto-legge 31 marzo 2011, n. 34, convertito, con modificazioni, dalla legge 26 maggio 2011, n. 75; e) le controversie aventi ad oggetto le ordinanze e i provvedimenti commissariali adottati in tutte le situazioni di emergenza dichiarate ai sensi dell'articolo 5, comma 1, della legge 24 febbraio 1992, n. 225 nonche' gli atti, i provvedimenti e le ordinanze emanati ai sensi dell'articolo 5, commi 2 e 4 della medesima legge n. 225 del 1992; (24) f) le controversie di cui all'articolo 133, comma 1, lettera o), limitatamente a quelle concernenti la produzione di energia elettrica da fonte nucleare, i rigassificatori, i gasdotti di importazione, le centrali termoelettriche di potenza termica superiore a 400 MW nonche' quelle relative ad infrastrutture di trasporto ricomprese o da ricomprendere nella rete di trasmissione nazionale o rete nazionale di gasdotti, salvo quanto previsto dall'articolo 14, comma 2; g) le controversie di cui all'articolo 133, comma 1, lettera z); h) le controversie relative all'esercizio dei poteri speciali inerenti alle attivita' di rilevanza strategica nei settori della difesa e della sicurezza nazionale e nei settori dell'energia, dei trasporti e delle comunicazioni; h-bis) le controversie aventi ad oggetto i provvedimenti dell'Agenzia per la cybersicurezza nazionale; i) le controversie aventi ad oggetto i provvedimenti di espulsione di cittadini extracomunitari per motivi di ordine pubblico o di sicurezza dello Stato; l) le controversie avverso i provvedimenti di allontanamento di cittadini comunitari per motivi di sicurezza dello Stato o per motivi di ordine pubblico di cui all'articolo 20, comma 1, del decreto legislativo 6 febbraio 2007, n. 30, e successive modificazioni; m) le controversie avverso i provvedimenti previsti dal decreto legislativo 22 giugno 2007, n. 109; n) le controversie disciplinate dal presente codice relative alle elezioni dei membri del Parlamento europeo spettanti all'Italia; o) le controversie relative al rapporto di lavoro del personale del DIS, dell'AISI, dell'AISE e dell'Agenzia per la cybersicurezza nazionale; p) le controversie attribuite alla giurisdizione del giudice amministrativo derivanti dall'applicazione del Titolo II del Libro III del decreto legislativo 6 settembre 2011, n. 159, relative all'Agenzia nazionale per l'amministrazione e la destinazione dei beni sequestrati e confiscati alla criminalita' organizzata; q) le controversie relative ai provvedimenti adottati ai sensi degli articoli 142 e 143 del testo unico delle leggi sull'ordinamento degli enti locali, di cui al decreto legislativo 18 agosto 2000, n. 267; q-bis) le controversie di cui all'articolo 133, comma 1, lettera z-bis); q-ter) le controversie di cui all'articolo 133, comma 1, lettera z-ter); q-quater) le controversie aventi ad oggetto i provvedimenti emessi dall'Amministrazione autonoma dei monopoli di Stato in materia di giochi pubblici con vincita in denaro e quelli emessi dall'Autorita' di polizia relativi al rilascio di autorizzazioni in materia di giochi pubblici con vincita in denaro. (12) q-quinquies) le controversie relative alle decisioni adottate ai sensi dell'articolo 24, paragrafo 2, lettera b), del regolamento (CE) n. 1987/2006 del Parlamento europeo e del Consiglio del 20 dicembre 2006 sull'istituzione, l'esercizio e l'uso del sistema d'informazione Schengen di seconda generazione (SIS II). q-sexies) le controversie relative ai provvedimenti di ammissione ed esclusione dalle competizioni professionistiche delle societa' o associazioni sportive professionistiche, o comunque incidenti sulla partecipazione a competizioni professionistiche.(26) ((q-septies) le controversie relative alle procedure di risanamento e risoluzione delle controparti centrali di cui al regolamento (UE) 2021/23.))</p><p>2. Restano esclusi dai casi di competenza inderogabile di cui al comma 1 le controversie sui rapporti di lavoro dei pubblici dipendenti, salvo quelle di cui alla lettera o) dello stesso comma 1.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (6)</p><p>La Corte Costituzionale, con sentenza 20 - 27 giugno 2012, n. 162 (in G.U. 1a s.s. 4/7/2012, n. 27) ha dichiarato \"l'illegittimita' costituzionale degli articoli 133, comma 1, lettera l), 135, comma 1, lettera c), e 134, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo con cognizione estesa al merito e alla competenza funzionale del TAR Lazio - sede di Roma, le controversie in materia di sanzioni irrogate dalla Commissione nazionale per le societa' e la borsa (CONSOB), e dell'art. 4, comma 1, numero 19), dell'Allegato numero 4, del medesimo d.lgs. n. 104 del 2010\".</p><p>-------------</p><p>AGGIORNAMENTO (11)</p><p>La Corte Costituzionale, con sentenza 9 - 15 aprile 2014, n. 94 (in G.U. 1a s.s. 23/4/2014, n. 18) ha dichiarato \"l'illegittimita' costituzionale degli artt. 133, comma 1, lettera l), 134, comma 1, lettera c), e 135, comma 1, lettera c), del decreto legislativo 2 luglio 2010, n. 104 (Attuazione dell'articolo 44 della legge 18 giugno 2009, n. 69, recante delega al governo per il riordino del processo amministrativo), nella parte in cui attribuiscono alla giurisdizione esclusiva del giudice amministrativo, con cognizione estesa al merito, e alla competenza funzionale del Tribunale amministrativo regionale per il Lazio - sede di Roma le controversie in materia di sanzioni irrogate dalla Banca d'Italia\".</p><p>-------------</p><p>AGGIORNAMENTO (12)</p><p>La Corte Costituzionale, con sentenza 11 - 13 giugno 2014, n. 174 (in G.U. 1a s.s. 18/06/2014, n. 26) ha dichiarato l'illegittimita' costituzionale del presente articolo, comma 1, lettera q-quater) \"nella parte in cui prevede la devoluzione alla competenza inderogabile del Tribunale amministrativo regionale del Lazio, sede di Roma, delle controversie aventi ad oggetto i provvedimenti emessi dall'autorita' di polizia relativi al rilascio di autorizzazioni in materia di giochi pubblici con vincita in denaro\".</p><p>---------------</p><p>AGGIORNAMENTO (24)</p><p>Il D.Lgs. 2 gennaio 2018, n. 1 ha disposto (con l'art. 47, comma 1, lettera i)) che \"Tutti i riferimenti alla legge 24 febbraio 1992, n. 225 e ai relativi articoli, contenuti in altre disposizioni, si intendono riferiti al presente decreto e ai corrispondenti articoli.</p><p>In particolare:</p><p>[...]</p><p>i) l'articolo 5 della legge n. 225 del 1992, citato negli articoli 119, comma 1, 133, comma 1, e nell'articolo 135, comma 1, del decreto legislativo 2 luglio 2010, n. 104, deve intendersi riferito agli articoli 24, 25 e 26 del presente decreto\".</p><p>---------------</p><p>AGGIORNAMENTO (26)</p><p>La L. 30 dicembre 2018, n. 145 ha disposto (con l'art. 1, comma 650) che \"Le disposizioni di cui ai commi da 647 a 649 si applicano anche ai processi ed alle controversie in corso alla data di entrata in vigore della presente legge\".</p>"},{"id":"art_136","numText":"Art. 136","group":"Allegato 1 — Codice del processo amministrativo","heading":"Disposizioni sulle comunicazioni e sui depositi informatici","contentHtml":"<p>1. I difensori indicano nel ricorso o nel primo atto difensivo un recapito di fax, che puo' essere anche diverso da quello del domiciliatario. La comunicazione a mezzo fax e' eseguita esclusivamente qualora sia impossibile effettuare la comunicazione all'indirizzo di posta elettronica certificata risultante da pubblici elenchi, per mancato funzionamento del sistema informatico della giustizia amministrativa. E' onere dei difensori comunicare alla segreteria e alle parti costituite ogni variazione del recapito di fax o di indirizzo di posta elettronica certificata. Ai fini dell'efficacia delle comunicazioni di segreteria e' sufficiente che vada a buon fine una sola delle comunicazioni effettuate a ciascun avvocato componente il collegio difensivo.(21)</p><p>2. I difensori, le parti nei casi in cui stiano in giudizio personalmente e gli ausiliari del giudice depositano tutti gli atti e i documenti con modalita' telematiche. In casi eccezionali, anche in considerazione della ricorrenza di particolari ragioni di riservatezza legate alla posizione delle parti o alla natura della controversia il presidente del tribunale o del Consiglio di Stato, il presidente della sezione se il ricorso e' gia' incardinato o il collegio se la questione sorge in udienza possono dispensare, previo provvedimento motivato, dall'impiego delle modalita' di sottoscrizione e di deposito di cui al comma 2-bis ed al primo periodo del presente comma; in tali casi e negli altri casi di esclusione dell'impiego di modalita' telematiche previsti dal decreto di cui all'articolo 13, comma 1, delle norme di attuazione, si procede al deposito ed alla conservazione degli atti e dei documenti. (21)</p><p>2-bis. Salvi i casi di cui al comma 2, tutti gli atti e i provvedimenti del giudice, dei suoi ausiliari, del personale degli uffici giudiziari e delle parti sono sottoscritti con firma digitale. Dall'attuazione del presente comma non devono derivare nuovi o maggiori oneri per la finanza pubblica. (13) (14) (15) (17) (19) (21)</p><p>2-ter. Quando il difensore depositi con modalita' telematiche la copia informatica, anche per immagine, di un atto processuale di parte, di un provvedimento del giudice o di un documento formato su supporto analogico e detenuto in originale o in copia conforme, attesta la conformita' della copia al predetto atto mediante l'asseverazione di cui all'articolo 22, comma 2, del codice di cui al decreto legislativo 7 marzo 2005, n. 82. Analogo potere di attestazione di conformita' e' esteso agli atti e ai provvedimenti presenti nel fascicolo informatico, con conseguente esonero dal versamento dei diritti di copia. ((PERIODO SOPPRESSO DAL D.LGS. 10 OTTOBRE 2022, N. 149)) . La copia munita dell'attestazione di conformita' equivale all'originale o alla copia conforme dell'atto o del provvedimento. Nel compimento dell'attestazione di conformita' di cui al presente comma i difensori assumono ad ogni effetto la veste di pubblici ufficiali. (21)</p><p>2-quater. COMMA ABROGATO DAL D.L. 30 APRILE 2020, N. 28.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (13)</p><p>Il D.L. 24 giugno 2014, n. 90, convertito con modificazioni dalla L. 11 agosto 2014, n. 114, ha disposto (con l'art. 38, comma 1-bis) che la presente modifica decorre dal 1º gennaio 2015.</p><p>-------------</p><p>AGGIORNAMENTO (14)</p><p>Il D.L. 24 giugno 2014, n. 90, convertito con modificazioni dalla L. 11 agosto 2014, n. 114, come modificato dal D.L. 31 dicembre 2014, n. 192, convertito con modificazioni dalla L. 27 febbraio 2015, n. 11, ha disposto (con l'art. 38, comma 1-bis) che la modifica di cui al comma 2-bis del presente articolo decorre dal 1° luglio 2015.</p><p>------------</p><p>AGGIORNAMENTO (15)</p><p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 20, comma 1-bis) che la modifica del comma 2 del presente articolo decorre dall'entrata in vigore del processo amministrativo telematico.</p><p>Il D.L. 24 giugno 2014, n. 90, convertito con modificazioni dalla L. 11 agosto 2014, n. 114, come modificato dal D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 38, comma 1-bis) che la modifica del comma 2-bis del presente articolo decorre dal 1° gennaio 2016.</p><p>-------------</p><p>AGGIORNAMENTO (17)</p><p>Il D.L. 24 giugno 2014, n. 90, convertito con modificazioni dalla L. 11 agosto 2014, n. 114, come modificato dal D.L. 30 dicembre 2015, n. 210, convertito con modificazioni dalla L. 25 febbraio 2016, n. 21 ha disposto (con l'art. 38, comma 1-bis) che le disposizioni previste dal comma 2-bis del presente articolo decorrono dal 1 luglio 2016.</p><p>-------------</p><p>AGGIORNAMENTO (19)</p><p>Il D.L. 24 giugno 2014, n. 90, convertito con modificazioni dalla L. 11 agosto 2014, n. 114, come modificato dal D.L. 30 giugno 2016, n. 117, convertito con modificazioni dalla L. 12 agosto 2016, n. 161, ha disposto (con l'art. 38, comma 1-bis) che le disposizioni previste dal comma 2-bis del presente articolo decorrono dal 1 gennaio 2017.</p><p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 1, alinea) che le presenti modifiche decorrono dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che le presenti modifiche hanno efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_137","numText":"Art. 137","group":"Allegato 1 — Codice del processo amministrativo","heading":"Norma finanziaria","contentHtml":"<p>1. Le amministrazioni competenti provvedono all'attuazione del codice nell'ambito delle risorse umane, strumentali e finanziarie disponibili a legislazione vigente e, comunque, senza nuovi o maggiori oneri per la finanza pubblica.</p>","notesHtml":""},{"id":"art_1_all2","numText":"Art. 1","group":"Allegato 2 — Norme di attuazione","heading":"Registro generale dei ricorsi","contentHtml":"<p>1. Presso ciascun ufficio giudiziario e' tenuto il registro di presentazione dei ricorsi, diviso per colonne, nel quale sono annotate tutte le informazioni occorrenti per accertare esattamente la presentazione del ricorso, del ricorso incidentale, della domanda riconvenzionale, dei motivi aggiunti, della domanda di intervento, degli atti e documenti prodotti, nonche' le notificazioni effettuate, l'esecuzione del pagamento del contributo unificato, l'indicazione dei mezzi istruttori disposti o compiuti e i provvedimenti adottati , la notizia delle impugnazioni proposte avverso i provvedimenti del giudice e il relativo esito. La proposizione dell'impugnazione e' registrata quando la segreteria del giudice ne riceve notizia ai sensi dell'articolo 6, comma 2, dell'allegato 2, ovvero ai sensi degli articoli 123 e 137-bis delle disposizioni di attuazione al codice di procedura civile. La segreteria del giudice a cui l'impugnazione e' proposta trasmette senza ritardo copia del provvedimento giurisdizionale che definisce il giudizio di impugnazione. (44) ((45))</p><p>2. I ricorsi sono iscritti giornalmente secondo l'ordine di presentazione.</p><p>3. Il registro e' vistato e firmato in ciascun foglio dal segretariato, con l'indicazione in fine del numero dei fogli di cui il registro si compone.</p><p>4. Il registro e' chiuso ogni giorno con l'apposizione della firma di un addetto al segretariato generale.</p>","notesHtml":"<p>---------------</p><p>AGGIORNAMENTO (44)</p><p>Il D.Lgs. 10 ottobre 2022, n. 149 ha disposto (con l'art. 35, comma 1) che \"Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 30 giugno 2023 e si applicano ai procedimenti instaurati successivamente a tale data.</p><p>Ai procedimenti pendenti alla data del 30 giugno 2023 si applicano le disposizioni anteriormente vigenti\".</p><p>---------------</p><p>AGGIORNAMENTO (45)</p><p>Il D.Lgs. 10 ottobre 2022, n. 149, come modificato dalla L. 29 dicembre 2022, n. 197, ha disposto (con l'art. 35, comma 1) che \"Le disposizioni del presente decreto, salvo che non sia diversamente disposto, hanno effetto a decorrere dal 28 febbraio 2023 e si applicano ai procedimenti instaurati successivamente a tale data. Ai procedimenti pendenti alla data del 28 febbraio 2023 si applicano le disposizioni anteriormente vigenti\".</p>"},{"id":"art_2_all2","numText":"Art. 2","group":"Allegato 2 — Norme di attuazione","heading":"Ruoli e registri particolari, collazione dei provvedimenti e forme di comunicazione","contentHtml":"<p>1. Le segreterie degli organi di giustizia amministrativa tengono i seguenti registri: a) il registro delle istanze di fissazione di udienza, vistato e firmato in ciascun foglio dal segretario generale, con l'indicazione in fine del numero dei fogli di cui il registro si compone; b) il registro delle istanze di prelievo; c) il registro per i processi verbali di udienza; d) il registro dei decreti e delle ordinanze del presidente; e) il registro delle ordinanze cautelari; f) il registro delle sentenze e degli altri provvedimenti collegiali; g) il registro dei ricorsi trattati con il beneficio del patrocinio a spese dello Stato; g-bis) il registro dei provvedimenti dell'Adunanza plenaria.</p><p>2. Il segretario, ricevuta l'istanza di cui alle lettere a) e b) del comma 1, ne fa annotazione nei relativi registri e ne rilascia ricevuta, se richiesta.</p><p>3. Nei registri di cui alle lettere d) ed e) del comma 1 sono annotati gli estremi della comunicazione dei provvedimenti.</p><p>4. La segreteria cura la formazione dei ruoli secondo le disposizioni del presidente.</p><p>5. COMMA ABROGATO DAL D.L. 27 GIUGNO 2015, N. 83, CONVERTITO CON MODIFICAZIONI DALLA L. 6 AGOSTO 2015, N. 132. (15) ((21))</p><p>6. La segreteria effettua le comunicazioni alle parti ai sensi dell'articolo 136, comma 1, del codice, o, altrimenti, nelle forme di cui all'articolo 45 delle disposizioni per l'attuazione del codice di procedura civile.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (15)</p><p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 20, comma 1-bis) che l'abrogazione del comma 5 del presente articolo decorre dall'entrata in vigore del processo amministrativo telematico.</p><p>-----------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, nel modificare l'art. 20, comma 1-bis del D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha conseguentemente disposto (con l'art. 7, comma 3) che l'abrogazione del comma 5 del presente articolo ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_3_all2","numText":"Art. 3","group":"Allegato 2 — Norme di attuazione","heading":"Registrazioni in forma automatizzata","contentHtml":"<p>1. Le registrazioni di cui agli articoli 1 e 2 ((sono eseguite)) in forma automatizzata secondo quanto previsto dal decreto del Presidente del Consiglio dei Ministri 8 gennaio 1999, n. 52, e dalla ulteriore normativa applicabile. ((21))</p><p>2. Il segretario, ove richiesto, rilascia all'interessato dichiarazione delle registrazioni effettuate.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 2, alinea) che la presente modifica decorre dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che la presente modifica ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_4_all2","numText":"Art. 4","group":"Allegato 2 — Norme di attuazione","heading":"Orario","contentHtml":"<p>1. Le segreterie sono aperte al pubblico nelle ore stabilite dal presidente del tribunale amministrativo regionale, della sezione staccata, del Consiglio di Stato e del Consiglio di giustizia amministrativa per la Regione siciliana.</p><p>2. Nei casi in cui il codice prevede il deposito di atti o documenti sino al giorno precedente la trattazione di una domanda in camera di consiglio, il deposito deve avvenire entro le ore 12.00 dell'ultimo giorno consentito.</p><p>3. Nei casi in cui il codice prevede termini calcolati in ore le segreterie danno atto dell'ora di deposito degli atti e dei provvedimenti giurisdizionali e adeguano gli orari di apertura degli uffici. ((4. E' assicurata la possibilita' di depositare con modalita' telematica gli atti in scadenza fino alle ore 24:00 dell'ultimo giorno consentito. Il deposito e' tempestivo se entro le ore 24:00 del giorno di scadenza e' generata la ricevuta di avvenuta accettazione, ove il deposito risulti, anche successivamente, andato a buon fine. Agli effetti dei termini a difesa e della fissazione delle udienze camerali e pubbliche il deposito degli atti e dei documenti in scadenza effettuato oltre le ore 12:00 dell'ultimo giorno consentito si considera effettuato il giorno successivo.)) ((21))</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 2, alinea) che la presente modifica decorre dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che la presente modifica ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_5_all2","numText":"Art. 5","group":"Allegato 2 — Norme di attuazione","heading":"Formazione e tenuta dei fascicoli di parte e d'ufficio. Surrogazione di copie agli originali mancanti e ricostituzione di atti","contentHtml":"<p>1. Ciascuna parte, all'atto della propria costituzione in giudizio, consegna il proprio fascicolo, contenente gli originali degli atti ed i documenti di cui intende avvalersi nonche' il relativo indice.</p><p>2. COMMA ABROGATO DAL D.L. 27 GIUGNO 2015, N. 83, CONVERTITO CON MODIFICAZIONI DALLA L. 6 AGOSTO 2015, N. 132. (15) ((21))</p><p>3. Allorche' riceve il deposito dell'atto introduttivo del giudizio, il segretario forma il fascicolo d'ufficio in formato digitale, corredato di indice cronologico degli atti e documenti delle parti, dei verbali di udienza per estratto, di ogni atto e provvedimento del giudice, dei suoi ausiliari e della segreteria. (15) ((21)) ((3-bis. Nei casi in cui e' previsto il deposito di atti e documenti in forma cartacea, il segretario forma un fascicolo cartaceo recante i dati identificativi del procedimento; nel fascicolo cartaceo, che si considera parte integrante del fascicolo d'ufficio, sono inseriti l'indice dei documenti depositati, gli atti legittimanti il deposito in forma cartacea e i documenti depositati. L'aggiornamento dell'indice e' curato dal segretario ai sensi del comma 4.)) ((21))</p><p>4. Il segretario, dopo aver controllato la regolarita' anche fiscale degli atti e dei documenti depositati da ciascuna parte, data e sottoscrive l'indice del fascicolo ogni qualvolta viene inserito in esso un atto o un documento.</p><p>5. In caso di smarrimento, furto o distruzione del fascicolo d'ufficio o di singoli atti il presidente del tribunale o della sezione, ovvero, se la questione sorge in udienza, il collegio, ne da' comunicazione al segretario e alle parti al fine, rispettivamente, di ricerca o deposito di copia autentica, che tiene luogo dell'originale. Qualora non si rinvenga copia autentica il presidente, con decreto, fissa una camera di consiglio, di cui e' dato avviso alle parti, per la ricostruzione degli atti o del fascicolo. Il collegio, con ordinanza, accerta il contenuto dell'atto mancante e stabilisce se, e in quale tenore, esso debba essere ricostituito; se non e' possibile accertare il contenuto dell'atto il collegio ne ordina la rinnovazione, se necessario e possibile, prescrivendone il modo.</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (15)</p><p>Il D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha disposto (con l'art. 20, comma 1-bis) che l'abrogazione del comma 2 e la modifica del comma 3 del presente articolo decorrono dall'entrata in vigore del processo amministrativo telematico.</p><p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 2, alinea) che la modifica del comma 3-bis del presente articolo decorre dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che la modifica del comma 3-bis del presente articolo ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, nel modificare l'art. 20, comma 1-bis del D.L. 27 giugno 2015, n. 83, convertito con modificazioni dalla L. 6 agosto 2015, n. 132, ha conseguentemente disposto (con l'art. 7, comma 3) che l'abrogazione del comma 2 e la modifica del comma 3 del presente articolo hanno efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_6_all2","numText":"Art. 6","group":"Allegato 2 — Norme di attuazione","heading":"Ritiro e trasmissione dei fascicoli di parte e del fascicolo d'ufficio","contentHtml":"<p>1. I documenti e gli atti prodotti davanti al tribunale amministrativo regionale non possono essere ritirati dalle parti prima che il giudizio sia definito con sentenza passata in giudicato.</p><p>2. In caso di appello, il segretario del giudice di appello richiede la trasmissione del fascicolo d'ufficio al segretario del giudice di primo grado.</p><p>3. Se e' appellata una sentenza non definitiva, ovvero un'ordinanza cautelare, non si applica il comma 2. Tuttavia il giudice di appello, puo', se lo ritiene necessario, chiedere la trasmissione del fascicolo d'ufficio, ovvero ordinare alla parte interessata di produrre copia di determinati atti.</p><p>4. Il presidente della sezione puo' autorizzare la sostituzione degli eventuali documenti e atti esibiti in originale con copia conforme degli stessi, predisposta a cura della segreteria su istanza motivata della parte interessata.</p>","notesHtml":""},{"id":"art_7_all2","numText":"Art. 7","group":"Allegato 2 — Norme di attuazione","heading":"Rilascio di copie","contentHtml":"<p>1. Il segretario rilascia copia delle decisioni e di ogni altro provvedimento del giudice a richiesta degli interessati e a loro spese.</p>","notesHtml":""},{"id":"art_8_all2","numText":"Art. 8","group":"Allegato 2 — Norme di attuazione","heading":"Ordine di fissazione dei ricorsi","contentHtml":"<p>1. La fissazione del giorno dell'udienza per la trattazione dei ricorsi e' effettuata secondo l'ordine di iscrizione delle istanze di fissazione d'udienza nell'apposito registro, salvi i casi di fissazione prioritaria previsti dal codice.</p><p>2. Il presidente puo' derogare al criterio cronologico per ragioni d'urgenza, anche tenendo conto delle istanze di prelievo, o per esigenze di funzionalita' dell'ufficio, ovvero per connessione di materia, nonche' in ogni caso in cui il Consiglio di Stato abbia annullato la sentenza o l'ordinanza e rinviato la causa al giudice di primo grado.</p>","notesHtml":""},{"id":"art_9_all2","numText":"Art. 9","group":"Allegato 2 — Norme di attuazione","heading":"","contentHtml":"<p>((Calendario delle udienze e formazione dei collegi)) ((1. I presidenti delle sezioni giurisdizionali del Consiglio di Stato, il presidente del Consiglio di giustizia amministrativa per la Regione siciliana e i presidenti dei tribunali amministrativi regionali ovvero, nel caso in cui il tribunale e' suddiviso in sezioni, i presidenti delle sezioni staccate e interne, all'inizio di ogni anno, stabiliscono il calendario delle udienze, con l'indicazione dei magistrati chiamati a parteciparvi e, all'inizio di ogni trimestre, la composizione dei collegi giudicanti, in base ai criteri stabiliti dal Consiglio di presidenza della giustizia amministrativa.))</p>","notesHtml":""},{"id":"art_10_all2","numText":"Art. 10","group":"Allegato 2 — Norme di attuazione","heading":"Toghe e divise","contentHtml":"<p>1. I magistrati amministrativi, il personale di segreteria e il personale ausiliario indossano nelle pubbliche udienze la toga o la divisa stabilita dal Consiglio di presidenza della giustizia amministrativa.</p><p>2. Gli avvocati vestono nelle pubbliche udienze la toga.</p>","notesHtml":""},{"id":"art_11_all2","numText":"Art. 11","group":"Allegato 2 — Norme di attuazione","heading":"Direzione dell'udienza","contentHtml":"<p>1. L'udienza e' diretta dal presidente del collegio.</p><p>2. Il segretario redige il verbale dell'udienza.</p>","notesHtml":""},{"id":"art_12_all2","numText":"Art. 12","group":"Allegato 2 — Norme di attuazione","heading":"Polizia dell'udienza","contentHtml":"<p>1. Chi assiste all'udienza deve stare in silenzio, non puo' fare segni di approvazione o di disapprovazione o cagionare disturbo.</p><p>2. Il presidente del collegio, ove lo ritenga necessario per il regolare svolgimento dell'udienza, puo' chiedere l'intervento della forza pubblica.</p><p>3. Per le riprese audiovisive delle trattazioni dei ricorsi in pubblica udienza si applica l'articolo 147 delle norme di attuazione, di coordinamento e transitorie del codice di procedura penale.</p>","notesHtml":""},{"id":"art_13_all2","numText":"Art. 13","group":"Allegato 2 — Norme di attuazione","heading":"Processo telematico","contentHtml":"<p>1. Con decreto del Presidente del Consiglio di Stato, sentiti il Dipartimento della Presidenza del Consiglio dei ministri competente in materia di trasformazione digitale, il Consiglio nazionale forense, il Consiglio di presidenza della giustizia amministrativa e le associazioni specialistiche maggiormente rappresentative, che si esprimono nel termine perentorio di trenta giorni dalla trasmissione dello schema di decreto, sono stabilite, nei limiti delle risorse umane, strumentali e finanziarie disponibili a legislazione vigente, le regole tecnico-operative per la sperimentazione e la graduale applicazione degli aggiornamenti del processo amministrativo telematico, anche relativamente ai procedimenti connessi attualmente non informatizzati, ivi incluso il procedimento per ricorso straordinario ((, nonche' lo svolgimento da remoto di udienze, camere di consiglio e adunanze)) . Il decreto si applica a partire dalla data nello stesso indicata, comunque non anteriore al quinto giorno successivo a quello della sua pubblicazione nella Gazzetta Ufficiale della Repubblica italiana.</p><p>1-bis. In attuazione del criterio di graduale introduzione del processo telematico e fino alla data del 30 novembre 2016 si procede alla sperimentazione delle nuove disposizioni presso tutti i tribunali amministrativi regionali e le sezioni giurisdizionali del Consiglio di Stato. L'individuazione delle concrete modalita' attuative della sperimentazione e' demandata agli organi della giustizia amministrativa nel rispetto di quanto previsto nel predetto decreto.(21)</p><p>1-ter. Salvi i casi in cui e' diversamente disposto, tutti gli adempimenti previsti dal codice e dalle norme di attuazione inerenti ai ricorsi depositati in primo o secondo grado dal 1° gennaio 2017 sono eseguiti con modalita' telematiche, secondo quanto disciplinato nel decreto di cui al comma 1.(21)</p><p>1-quater. Sino al 31 dicembre 2017 i depositi dei ricorsi, degli scritti difensivi e della documentazione possono essere effettuati con PEC o, nei casi previsti, mediante upload attraverso il sito istituzionale, dai domiciliatari anche non iscritti all'Albo degli avvocati. Le comunicazioni di segreteria possono essere fatte alla PEC del domiciliatario. (21)</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 2, alinea) che le presenti modifiche decorrono dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che le presenti modifiche hanno efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_13-bis_all2","numText":"Art. 13-bis","group":"Allegato 2 — Norme di attuazione","heading":"","contentHtml":"<p>((Misure transitorie per l'uniforme applicazione del processo amministrativo telematico.)) ((1. Per un periodo di tre anni a decorrere dal 1° gennaio 2017, il collegio di primo grado cui e' assegnato il ricorso, se rileva che il punto di diritto sottoposto al suo esame e vertente sull'interpretazione e sull'applicazione delle norme in tema di processo amministrativo telematico ha gia' dato luogo a significativi contrasti giurisprudenziali rispetto a decisioni di altri tribunali amministrativi regionali o del Consiglio di Stato, tali da incidere in modo rilevante sul diritto di difesa di una parte, con ordinanza emanata su richiesta di parte o d'ufficio e pubblicata in udienza, puo' sottoporre al presidente del Consiglio di Stato istanza di rimessione del ricorso all'esame dell'adunanza plenaria, contestualmente rinviando la trattazione del giudizio alla prima udienza successiva al sessantesimo giorno dall'udienza in cui e' pubblicata l'ordinanza. Il presidente del Consiglio di Stato comunica l'accoglimento della richiesta entro trenta giorni dal ricevimento, e in tal caso nell'udienza davanti al tribunale il processo e' sospeso fino all'esito della decisione dell'adunanza plenaria. La mancata risposta del presidente del Consiglio di Stato entro trenta giorni dal ricevimento della richiesta equivale a rigetto. L'adunanza plenaria e' convocata per una data non successiva a tre mesi dalla richiesta e decide la sola questione di diritto relativa al processo amministrativo telematico.)) ((21))</p>","notesHtml":"<p>-------------</p><p>AGGIORNAMENTO (21)</p><p>Il D.L. 31 agosto 2016, n. 168, convertito con modificazioni dalla L. 25 ottobre 2016, n. 197, ha disposto (con l'art. 7, comma 2, alinea) che la presente modifica decorre dal 1 gennaio 2017.</p><p>Ha inoltre disposto (con l'art. 7, comma 3) che la presente modifica ha efficacia con riguardo ai giudizi introdotti con i ricorsi depositati, in primo o in secondo grado, a far data dal 1° gennaio 2017; ai ricorsi depositati anteriormente a tale data, continuano ad applicarsi, fino all'esaurimento del grado di giudizio nel quale sono pendenti alla data stessa e comunque non oltre il 1° gennaio 2018, le norme vigenti alla data di entrata in vigore del medesimo D.L. 31 agosto 2016, n. 168.</p>"},{"id":"art_13-quater_all2","numText":"Art. 13-quater","group":"Allegato 2 — Norme di attuazione","heading":"","contentHtml":"<p>(( (Trattazione da remoto). )) ((1. Fermo quanto previsto dall' articolo 87, comma 4-bis, del codice, in tutti i casi di trattazione di cause da remoto la segreteria comunica, almeno tre giorni prima della trattazione, l'avviso dell'ora e delle modalita' di collegamento. Si da' atto nel verbale dell'udienza delle modalita' con cui si accerta l'identita' dei soggetti partecipanti e della libera volonta' delle parti, anche ai fini della disciplina sulla protezione dei dati personal
